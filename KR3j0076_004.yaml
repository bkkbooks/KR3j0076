body:
  text: 義門讀書記卷四翰林院侍讀學士何焯撰論語下先進篇先進於禮樂章謂孔子患時文之敝而欲救之以質者發自明道其在伊川亦云矯枉以救文之敝則從先進小過之義也奢則不孫儉則固與其不孫也寧固此之謂也不必惑從周之説此重質之説也朱子或問謂安知當世所謂儉者非昔之所謂中耶故集注採尹氏所述伊川當時謂之野人是言文質相稱者也謂之君子則過乎文者也四語而兩下今反謂之字以明周末文勝故持論倒置此重中之説也然朱子作家禮序云畧浮文敦本實竊自附於孔子從先進之意而語類中論考禮綱領數條持論亦多如此則重質尤合朱子本意第一節細㸔野人二字自有質勝之意江陵程文所主自得之但須云救之以質乃就於中方圓備禮之本只是教以人倫樂之本只是養其徳性注不自知其過於文也按朱子謂同時考禮者下稍溺于噐數一齊多昏倒了亦所謂不自知也第二節朱子嘗云古禮於今實難行後世有大聖人者作與他整頓一番令人甦醒必不盡如古人之繁但放古之大意此節能透出甦醒二字精神來則大佳矣且如此則於不自知三字亦照應得有意味朱子又云若聖賢有作必簡易疏通使見之而易知推之而易行從我於陳蔡者章第二節是時子游年十八子夏年十九總注曾子傳道而不與焉按曾子年最少時未及門也子貢晚而聞一貫之傳有不止於善為説詞者葢進徳有不可限也季氏富於周公章第二節注又見其愛人之無已也按聖人氣象方説得到柴也愚章愚魯是氣質之偏辟喭是氣習之染總注四者性之偏按性如何有偏回也其庶乎章總注簞食瓢飲屢絶而不改其樂也按補足此句方見庶㡬下落子路曾晳冉有公西華侍坐章第六節注衆頫曰同按周禮殷頫曰同避宣祖諱故改曰衆第七節鏗爾集解於鼓瑟希下一斷以鏗爾屬下句孔疏云鏗者投瑟之聲異乎三子者之撰此句是謙詞暮春者七句曾晳進取須於言外得之王文恪作此段題只淡寫直留在大結發見斟酌至當不然其言不讓殆有甚於率爾者矣注曾㸃之學四句推其根動静之際六句本文而其胸次悠然以下言外之意分三層㸔第八節曾㸃是其中有疑見得三子儘好何故不見許於夫子故獨留再問此不是自喜見許真以夫子為必薄三子而復問也葢狂者平日心胸灑落或不暇於細務一聞三子之言未嘗不以為實事切務必不可少異撰之言仍寓謙退在其間也正狂者進取不肯倒却一邉處未可以他日行不掩言便疑其夷然不屑一徃放曠為樂也末節私箋云自卿大夫而下有都宫而無宗廟自附庸而下有通問而無㑹同此宗廟㑹同所以為諸侯之事按附庸無㑹同不逹於天子故也顔淵篇顔淵問仁章首節唯復禮為克己之盡但言克己而不至於禮則不過一時强制病根仍在故朱子不取吕與叔克己銘他日作詩又云寳鑑當年照膽寒向來埋沒太無端袛令垢盡明全見還得當年寳鑑㸔則禮之未復亦豈遂可以言克己哉禮字最喫𦂳注已謂身之私欲也按身字𦂳要空説私欲不得下文視聽言動為身之用則其目也讀或問自明伊川嘗云大抵人有身便有自私之理宜其與道難一或問以理易禮則無可持循之實聖人所謂禮者正以禮文而言其所以為操存持守之地者宻矣注謝氏云云或疑顔子具體聖人不宜有性偏難克處然觀其自言願無伐善無施勞則亦必曾有伐施之病是亦偏處也但不可説得太重耳總注非至明不能察其㡬二句何謂察其㡬莫見乎隐莫顯乎微故君子慎其獨也是何謂致其决如惡惡臭如好好色此之謂自慊故君子必慎其獨也是自慎獨而精之至於應物之處無少差謬則并無三月之違矣仲弓問仁章出門使民時能敬則未出門使民時便自無不敬所為涵養工夫也但學者却須從出門使民時著力方有實地據為工夫下手處仲弓所謂請事此也兩如字亦必用實貼然後見其為敬之至若約畧寫大意直似易以他語亦得則仲弓之請事者安據耶司馬牛憂曰章總注意圓而語滯者也按此謂其有無差等之弊子張問明章易云誣善者其辭游葢謂誣善必浮游其辭使事雖無據而可疑聞之者以為發于無心而不覺正浸潤之類也不行焉又須将二者互説方透或問甚明注毁人者漸漬而不驟至而發之暴矣句句對勘互形事變無窮已約畧可見矣易疑者不疑易信者不信合來方是明無不照大全輔饒之説皆可觀二者難察而能察之按惟二者相反故尤難察子貢問政章首節兵食而信之説本之大全中所採語錄然非朱子最後定本必如本注中補足教化方有在上者信孚於民根本豈得謂止須足食足兵民信盡此哉至教民以信雖不可一日緩若不待既足之後而總注復分出以人情而言以民徳而言兩層則施為固自有序大全所採黄直卿至此而後民有以全其信非謂至此而後方施信于民之語亦不必據以獻疑直卿自云夫子初答為政之先後也再答復告以義理之重輕也既有先後即當如注中以人情而言之解矣第二節觀周官小司徒及司馬法則所謂兵者即其民也召募始於桓文之説初無所據即三代而後兵制亦自唐之府兵既壊始專事召募當孔子之時舎井田邱甸之民豈别有可去之兵在哉下兩節問答但欲窮此理之極而非實事也時文云於是下去兵之令於是乎下去食之令死句下矣兩不得已而去猶云二者不可得兼也聖賢要是無可奈何故程子謂之直窮到底不可作去之所以足之一切兒戲之譚末節去食去字只對上足字亦非遂至無食也末二句乃究極其理而言之註語當分界清楚不得将易子析骸納入去字中哀公問於有若曰章首節哀公發問之意本為年飢之時徵斂不給而商所以足國用者其初亦非欲加賦也特聞有子行徹之論誤以有子之意反在减二為一務欲損上益下則於足國之道逺矣故疑而再問首節中不必即入加賦二字此安溪先生意按先生之論最細當飢嵗而議加賦雖至愚者不為也第二節此盍字與孟子則盍反其本矣口氣同是為他徹底打筭盡除一切苟且之政反之於以三十年之通制國用雖有凶荒不能為害本計但講徹法不做盍字便非注中通字要透末節全脉在此末節財聚則民散君不務行徹以聚民而沾沾然曰吾猶不足亦思百姓足則孰與不足者百姓不足則孰與足者耶子張問崇徳辨惑章首節主忠信則其徙義也有地而可據能徙義則其主忠信也有用而日新片言可以折獄者章首節注忠信明决按四字皆重在上一箇字聽訟吾猶人也章此節無訟重在教化上季康子問政於孔子曰如殺無道章私箋云但言感應之機未及乎政教法令之施也子張問士章第五節即察言觀色處便慮以下人若非慮以下人則察言觀色又是徇外樊遲問仁子曰愛人章舉直錯枉智也然所以不容己於舉錯其源則自愛來精義中載楊中立引孟子語解富哉句極分曉云智者無不知也當務之為急仁者無不愛也急親賢之為務葢當務為急莫如親賢舜湯之有天下以選於衆舉臯陶伊尹為先務然則問智以舉直錯諸枉告之則仁智之務兼舉矣合之語類沈杜仲所錄尋常説仁智一箇是慈愛一箇是辨别各自向一路惟此方見得仁智合一處仁裡面包得智智裡面包得仁潘子善所錄愛人知人自相為用若不論直與枉一例愛他也不得大抵惟先智了方能頓放箇仁聖人只此兩句自包上下後來子夏所言皆不出此兩句意二條皆是正為愛他不得不用分别也第三節樊遲疑二者之相悖以愛欲周而知有擇夫子則示以愛之者原不可混然無所别必慎擇以風示之使其感化而同歸於善斯吾仁之施自可無所不周耳上句固智之事而從愛人生來朱子所謂仁裡面有智也能使句則朱子所謂智裡面有仁也若以下文只言問智於夫子口中上句亦突然從知説起便失來脈下句又如何突然轉到仁字相為用耶子貢問友章善道正所以善用其忠也君子以文會友章講學即致知之事所以明善也若講成相聚做詩文與下便不相闗講學取善皆以我為主子路篇子路問政章首節注中兩凡字便含得終身為之不盡意第二節無倦是訶其請非益之也葢禁止辭衛君待子而為政章第二節作文當如謝氏之説寛説道理漸虛虛歸到綱常上㸔子貢猶不斥衛君而問夷齊豈聖人詞氣而顧昧于不非大夫之義乎注中是時云云前輩必倶入大結也第四節鄙俗則所見限於淺近素無以與乎極本窮源之慮也輕率是帶説第六節禮樂只是事之理不興興字亦與崩壊殊總注而子路終不喻也云云按子路不去雖乖亂邦不居之義然謂其終於不喻則非也其死也仕於孔氏則亦聞悝之難而赴之而已故其言曰若燔臺半必舎孔叔死悝非死輒也先儒於此多失之其身正章此節要重講下截則上截鞭辟愈有力輕帶則聖人何苦有此贅令無不正身有不正耳此章全是辨令子適衛章總注明帝尊師重傅云云按京江文教先公族而後庶民只説得明帝事善人為邦百年章私箋云為邦猶云治天下也按三代治天下未有在為邦之外者私箋云謂之亦可者微寓不足之意按當時之論必有謂非嚴猛不可以更化者故夫子述人言以致意即子為政焉用殺子欲善而民善矣之意何嘗微寓不足耶尹氏注只泛論義理與當日語氣不合百年二字亦不可㸔得迂緩風俗淳厚斷非一時一人事如有王者章班固曰言聖王承衰撥亂而起被民以徳教變而化之必世然後仁道成焉此得如有二字語意程子謂仲尼三年有成因周之舊然則必世後仁者其繼亂之後無可因者乎茍正其身矣章私箋云正其身主臣言正人人字兼君民説葉公語孔子曰章第二節何故要隐正謂其事於理有未當耳則就其隐時義理昭然自在是非之理即在惻隐羞惡之中並行不悖在中之解如是原無所枉也茍有過人必知之直之至矣庚辰八月因論春秋書夫人遜于齊夫人氏之䘮至自齊相與剖析及此樊遲問仁章居處恭方外也執事敬直内也總注程子曰此是徹上徹下語按道理盡於敬與誠矣君子和而不同章當論其心之無所乖和字非止溫乎其容也善人教民七年章教民而可以即戎具在周官小司徒之所掌七年則大比者再矣憲問篇克伐怨欲不行焉章第二節此章當取雍也篇或問程韓之論不貳過叅㸔又必歸重在以復乎禮上斯暢其㫖矣制之於外以安其内克己亦是制私也憲之病在不能㧞本塞源徒争末流耳制字貶剥不得注語須從有是四者一氣讀下荆川文掃制私二字便謬以千里為難是因錯用工夫非僅許為勉仁也以安勉為言尤失分刌有徳者必有言章有徳者未必以能言稱然因事而言則言之中理可必也仁者未必以勇著然義理所當為則為之必力可必也此程允夫問語首二句朱子畧改君子而不仁者有以夫章蔡氏曰玩語氣似為易言仁者而發為命章為命二字要從義理上説起葢是國家一大事又要存得禮讓誠慤之意極難盡善而鄭國之事次第不茍有可取者自然應對諸侯可以無辱命敗事之失不可将當日晉楚争鄭事勢闌入喧客奪主反狹了題理或問子產章第二節彼讀若賁卦之賁彼義切哀也廣韵在五寘中注其後卒召白公以致亂按孔子卒于哀公十六年夏四月白公殺子西在七月末節注而富人莫之敢拒者按拒敵也言其富無敵見仲尼篇貧而無怨難章私箋云怨字要説得細方見其難按難字只對易字耳説得細非復常情矣有粗亦有細到夷齊方是貧而無怨之極處怨有怨嘆有怨悔不以其道得之不處而終焉於義理毫無可悔處亦只是無怨也但此意當留在後半推進説耳子路問成人章首節文之以禮樂句是涵養以至於成徳之事不可作變化氣質㸔變化在前涵養在後兩意俱有程子云英氣最害事無偏倚駁雜只是連那一㸃英氣也融釋了此雖非聖人亦顔曾之徒也注中窮理養心力行泛應八字於為學次序極好第二節注中忠信之實四字亦不可㸔得太粗總注胡氏云云按紹聞編云下節胡氏之説較近然有一疑子路之言如此夫子何以無言子問公叔文子於公明賈曰章注衛大夫公孫枝也按王厚齋云孔注作公孫㧞枝字傳寫之誤臧武仲以防求為後於魯章曰字不是他人即指武仲自己藏頭露尾耳次崖謂當時之人未見得他意思乃對信字説後人誤㑹都将曰字坐在旁人為他解釋非也表記曰事君三違而不出竟則利祿也人雖曰不要吾不信也與叔引此章以為並得於孔子然言各有當經文無人字不必强加注楊氏云云按既以防則迹亦露矣故程子於中説心迹之判久矣不以為是亦春秋誅意之法也按何休注公羊晉趙鞅歸于晉傳云君子誅意不誅事晉文公譎而不正章先言晉文者甚文故不得不予桓也桓雖假抑猶愈乎文之譎云爾子之抑傷之也桓公殺公子糾章第二節如其仁言似此功業也庶㡬其仁也誰如之訓當斟酌注葢管仲雖未得為仁人按此謂全體之仁九合若如舊説則其中有兵車之㑹三本文何以云不以兵車故朱子不從春秋之時上無天子下無方伯有伯功則封建得以不廢生民稍獲休息從合諸侯包含利澤及人者大與仁字乃有闗管仲非仁者與章總注程子云云按程子桓兄糾弟之説無據特以兩人皆亡公子非有君臣之定分猶可以無死故孔子不以是深責管仲也若召忽之死雖不可謂之非然亦不過小諒而已如匹夫以意氣然諾相死當其奉公子糾來奔之時未嘗有荀息仇牧之責任春秋之時與亡人求入而死者多矣則未知為亂賊之黨歟否歟又惡得而深予之此段本安溪先生之意言之未嘗受命於先君則兄弟均之非嫡嗣桓公雖兄亦不得名其為賊也從前輔糾争國仲之失也却不可責以糾死亦隨而死古注王子邕云管仲召忽之於子糾君臣之義未正成故死之未足深嘉不死未足多非死事既難亦在于過厚故仲尼但美管仲之功亦不言召忽之不當死按此説精當緻宻其言之不怍章私箋云則字即就言之不怍時説非待其為而後見其難也陳成子弑簡公章厚齋云請討陳恒之年春秋終焉夫子之請討也将以見之行事請討不從然後托之空言總注程子云云當參觀或問朱子所推本末尤為精盡以魯之半加齊之半是釋哀公魯為齊弱久矣之疑非先力而後義也不逆詐章私箋云三句一氣不斷按不妨斷注言雖不逆不億按全要體會雖字得力抑亦語脈方醒楊氏説只末二句好若説君子一於誠則不逆億便自然能先覺了或曰以徳報怨章第三節以直二字凡待天下之常人皆然不因報怨而有所增損耳竟将以直筭做報怨之法便糊塗總注中怨有不讐四字要㸔得圓葢因怨有公私曲直之不同不皆在所必報也不可竟抺去題中報字莫我知也夫章末節為學一凌躐便易怨天一輕浮便易尤人注中不得不合皆要在做工夫上㸔公伯寮愬子路於季孫章第二節私箋云兩将字正在未興未廢之間不知命者以為人可與得力時節也朱子云這是未定之詞賢者辟世章次第以時地區分辟色則嘗居是邦辟言則嘗仕其國也彼婦之口可以出走亦辟言之一事子路宿於石門章是字言獨是他如此若作原來是他豈不懸絶注中胡氏譏字須活㸔晨門尚從吏隐與下章荷蕢不同只他見得難便住手與字有未知聖人更用何法以旋乾轉坤之意葢疑詞非刺也先儒因下文子路無酬答之語故謂其似譏然葉公問孔子於子路子路不對亦豈謂其有所譏耶子擊磬於衛章末節注且言人之出處二句按此指淺深二句子路問君子章安溪先生評貞父修已以敬文云修已非無事者自一言一行至于應事接物皆是也但非以敬為主則不能耳不是一敬而修已之事已畢程子言但知主敬而不知集義則是都無事也此意少人識取私箋云安即敬之極處總注此體信逹順之道按體信逹順出禮運原壤夷俟章注以其自幼至老按宋本老作長此解上二句也衛靈公篇賜也女以予為多學而識之者與章此章注脚只在孟子盡其心者章後須補到存養安溪先生於長史文後頗引其端然説得不斬截天下之理千變皆由此出者天命之性也知所本即中庸立天下之大本意思朱子語錄及北溪字義中發明謝氏説精矣此葢進子貢以涵養徳性之要第一節注夫子欲其知所本也按本者誠而明也以行言故曰忠恕以知言則誠明而已第二節注葢其積學功至按積學致知也功至知至也無為而治者章無為者猶言行其所無事也注中下二層意本揚子法言非正解直哉史魚章第二節注如於孫林父寗殖放弑之謀按厚齋云寗殖當為寗喜顔淵問為邦章首節封建不廢治天下即在為邦内謙詞二字似稍濶逺第五節必言舞者舞所以象成功此章是論為邦如舜之九成為邦功業方做得完備也不專是包聲在内臧文仲其竊位者與章斥為竊位紙上都是霜氣者與二字豈復尚留不盡或以此二字都帶委婉則譬之小人其猶穿窬之盗也與等語亦委婉也夫謂聖人出語渾融不為已甚者謂於竊位之外不宜别有深文如恐公室有人私家翼翦之類羅織沒左証疑獄耳豈蔽賢應得之辜可為末减耶三思節其義亦爾一友謂予再字亦且放活些予應之曰幸文子非四思而後行恐不好更説箇三斯可矣竟無以難也躬自厚而薄責於人章注易從二字妙亦欲其同歸於厚先之以善道之方耳非竟薄待之也不曰如之何如之何者章此節當兼指窮理君子義以為質章蟬聫而下三之字俱就處事説首句體下三句用義是天理之宜安有不誠實者信以成之恐是謂其及於物處合内外皆誠實也吾之於人也章上節自是聖人盡其性以盡人之性事下又援古以曉有世教之責者不當薄待今此之人耳第一節私箋云如字活其字實注中揚是善未著而自我表之稱是惡未著而自我發之二字不可順口讀過若善惡為衆所共見則公好公惡不待言也第二節饒雙峯曰民字即上面人字人對已而言民對君而言下有三代字面也斯民也即三代之君直道而行之民而三代之君所以直道而行之民者以民心本直不可枉其是非之實也故直道二字偏主君説不得所以二字之意偏主民説又不得三代之三字口氣注今此之人按箋云即上節人字也葢以此民即三代之時按即字極可味行之以私即此人行之以直即此人顧轉移何如耳吾猶及史之闕文也章闕文西涯兼其事其文言之巧言亂徳章婦人之仁不能忍其愛匹夫之勇不能忍其忿衆惡之章私箋云察字活有可信可疑二端在内按如鄉人之善者好之其不善者惡之則亦無所疑矣可與楊説叅㸔吾嘗終日不食章此章以仰之彌髙一章㸔方得勞心必求遜志自得真解思與學不可分知行説學是求之實地注却云遜志便非學而不思者矣君子謀道不謀食章不是中二句是無命也不是末一句是無義也命是中人説的知義則命不足道故口氣須着一折當仁不讓於師章朱子云此仁字當在大處難做處説私箋云重一當字當擔當也季氏篇洪氏云云按洪氏此條不根應從辨疑刋削季氏将伐顓臾章通章尤重在責由求第三節注冉求為季氏聚斂尤用事此句是第四節費在蒙之陽魯以費為東郊故謂之東蒙詩魯頌正義云謂之社稷臣者以其附屬于魯亦謂魯之社稷其國猶是世繼非專臣也然非專臣故季氏将伐若其純臣魯君季氏豈得伐取之也横渠云雖非魯臣乃吾所以事社稷之臣也注先王封顓臾於此山之下按先王通指虞夏以來言之在魯地七百里之中按此則自周以來錫之山川土田附庸也第六節二子之罪只在不持不扶致季氏得縱其欲故夫子亦止責之如此下文注中冉有實與謀句太過弑父與君亦不從也夫子固有以信之矣凡讀傳注須就經文彼此叅㸔乃可以折其衷耳第八節此節自解所以難於救止之故不可説似代季氏逺慮注中是朱子過於疾惡處固謂阻東蒙若虎之負嵎登蒙山則下臨費邑故曰近第九節欲之即夫子欲之二字第十節安溪先生謂凡物兼并則多均分則寡均未必無寡也富者多危貧者多安安未必無貧也古人之意以為寧寡而不可使不均寧貧而不可使不安故所患者在彼而不在此夫子又推論其理謂古人所以不患寡而患不均者葢均則各得其分不相侵奪雖或有寡不至於貧且均則各得其分不相侵奪其和可知和則有無可以相資盈虛可以相濟并可不至于寡矣此古人所以貴于均也古人所以不患貧而患不安者葢安則内變不生外釁不作雖或不免於貧而决不至于傾矣夫為國家計者慮傾危耳無傾危之慮則貧猶不足患而况於寡乎此古人所以貴于安也十一節逺人猶當來且安之况邦域之中可尋干戈乎十二節相夫子即上彼相之相分崩離析即上所謂危也顛也私箋云顓臾在邦域中如何謂之逺人夫子以蕭墻對顓臾則蕭牆近顓臾逺其為逺人可知按動干戈於邦内指顓臾此逺人只泛言天下有道章此章只指周家一代説第二節獨言政不在大夫諸侯糾合同盟翼戴天子方伯連帥之職大夫竊柄即名不正也豈不有其君顧能奉天子哉安溪先生云天子主天下之政諸侯亦主一國之政雖至治盛世諸侯得自治其國但禮樂征伐之權則不敢自專耳若大夫則無政大夫有政即無道之邦矣故特舉大夫言之自諸侯亦是無道何以只説大夫須分曉又諸侯若數世之内增修其徳亦代有天下矣商周是也須并見得對面之意第三節不議不横議也益者三樂章注節謂辨其制度聲容之節按樂字精神正在辨字上見君子有三畏章三畏九思其數則經文所定凡以并合作對者皆庸人自擾不待閲而始棄擲者也存心養性所以事天生而知之者章氣質不同是正意楊氏説又言表推論耳此只可於下三段中見之如俗下于上也中即攙入不廢學為金針則中庸至誠盡性當照其次致曲耶君子有九思章九思是内外合一之事須體味南軒九者當養之于未發之先持之于方發之際二語毎句兼敬義夾持工夫則程子所云各專其一朱子語錄中所謂一是主一之義方有歸宿曰忠曰敬曰言曰事二句所占地甚濶此章次序似當以君子不重則不威章叅觀辛巳與世得商論得此見善如不及章第二節志者萬物一體之志也養此心謂之求其志道者萬物得所之道求志之時而道在我矣至此乃見之施行耳安溪先生少時解注守其所逹之道也按守字好便貼得隐居二字出邦君之妻章稱之異邦句若縁上邦人二字來則曰寡君夫人可已守溪據禮記自不謬若如禮記夫人自稱於異邦之君則當在自稱曰小童之下萊峯文亦是雜記訃于他國之君夫人曰寡小君不祿此稱之異邦之一證不得專據曲禮陽貨篇陽貨欲見孔子章第二節孔子時年四十三子之武城章首節弦歌四逹則邑人皆化於上之教而古治可復矣故夫子尤深喜之第三節君子學道句不可粘着武城君子須㸔注中皆字及必教二字夫子二句平説子游之意尤在下句見不可遺一人也能句句叙述中作虛歩引起下句乃佳愛人二字即説不忍下有不學道之人亦得君子雖以位言然只是俊秀之屬愛人謂他日臨民也方是子游所取之人私箋云道字不專指禮樂按率性謂道禮樂所以養其徳性故學道者必由之學字重與教字對今人只粘道字無欛柄矣注皆不可以不學按皆字是指地無大小非總上之語子張問仁於孔子章注又言其效如此按言其效亦仲弓問仁章使以自考之意仍須收向裏來説必有其效始是能行究竟佛肸召章末節此節是答昔言由也女聞六言六蔽矣乎章第三節好仁不好學二句此仁字只是愛之理不宜㸔得太濶故注中解愚字云若可陷可罔之類總注又皆所以救其偏也論來説信便可該直説勇便可該剛乃繁而不殺列之為六皆因子路氣質所偏尤在此處故加詳也但言仁智實包禮義在好學二字内辨之明義也處之當而有節文禮也小子何莫學夫詩章次節是立志三節是修已四節應事接物五節不惟知常而能處變六節詩本性情教歸敦厚又就修已應事之重者言之子謂伯魚曰章二南之詩但言治國由於齊家耳若夫起化之本始于修身必待為之者自得于聲詩之表然後有所感發興起為能推之而通放之而準若将注中修身齊家句囫圇吞棗㸔過便似不曾讀詩者末二句亦安能醒發禮云禮云章注敬而将之以玉帛和而發之以鐘鼓此用禮樂之本此和字就人心言總注禮只是一箇序樂只是一箇和此制禮樂之本此和字就統體言古者民有三疾章首節全是傷今不可雜以思古意須㸔民字若古之君子有禮樂以養其中和之徳氣禀之偏無所不化矣第二節私箋云此是即習氣以驗風俗狂矜愚是病曰肆曰㢘曰直猶為本症曰蕩曰忿戾曰詐則已變而為别候矣予欲無言章第三節天理發見流行固不待言而顯著然非黙識而深察之則亦有不可得見者須照首節注中不察二字下意乃抉開示子貢之神孺悲欲見孔子章士相見禮疏云傳通孺悲欲見孔子不由紹介故孔子辭以疾宰我問三年之喪章第四節注禮父母之喪云云皆撮舉閒傳受以成布按受繼也君子亦有惡乎章總注侯氏云云按此人人所當惡微子篇栁下恵為士師章子未可以去乎言未可以去而事人乎是望之變通不是疑其不見㡬齊景公待孔子曰章只是禮貎在季孟之間故曰不能用若權位如此則舉國而聽矣當就事權上説景公初意本欲用孔子也及為人所沮而志氣頓衰故復有不能用之言非特禮貎之謂也注中貴字及程子禮字不可誤㸔齊人歸女樂章聽行如季孫孟子以證見行可之仕桓子始非不善也俗下欲深文之不知如此則孔子去國反不得為見㡬矣楚狂接輿歌而過孔子曰章接輿佯狂事同箕子其心乃近於狷者也如上章季桓子便是今之從政者第二節曾㸃之狂有茂對時物氣象接輿之狂但知天地閉賢人隐而已此夫子欲與言以廣之也長沮桀溺耦而耕章第二節注今下問津今宋本作令按作令乃應上使字第三節厯聘而終無所遇則是未嘗不避人也末節夫子于他隐士未嘗自辯正為桀溺之言有過甚者故明人之不可避因見天下之無可易也子路嘗聞浮海之嘆而喜恐其惑於桀溺之言亦因以喻之孔疏隐于山林是同羣言吾自當天下同羣安能去人而從鳥獸居乎子路從而後章首節尹氏謂其詞氣雍容不當直云責子路言我惟恐如此何暇知夫子也私箋云四體三句葢言夫人四體不勤則不分五穀即莊子漢隂丈人徃矣無乏吾事之意責子路意在言外末節道之行廢闗氣運之盛衰非一身計也若君臣之義則吾性分所固有職分所當為廢之則此身先有虧闕處矣故明知道雖不行此義不敢自我而廢也行義對徇祿説玩注然謂之義則事之可否云云自見今人與潔身亂倫滚作一句都謬注福州有國初時寫本云云按聖人説話便是八面俱到子路恐不解便如此當是受辭於夫子也逸民章第二第三第四節三節須兼時與道言之太師摯適齊章安溪先生謂此章官名次序皆有義理葢分堂上堂下之樂言之侑食之官乃近君者故貴之也周有八士章或曰成王時人按此鄭康成説賈逵又以為文王時當從子政季長之説作宣王時中興之業所以不能盡復文武之舊者生材雖盛而淪于下位也子張篇執徳不宏章注有所得而守之太狹按所得只是這些道理别無所有故謂之徳孤孤只是孤單朱子子夏之門人問交於子張章我之不賢與須於絜長量短時指與一箇茫然長思瞿然内愧光景上與字語意極安詳此與字極跼蹐子張之言乃泛然處衆之道非所以交朋友也毋友不如己者孔子言之但一拒字太迫狹耳注中過髙二字尚斷不倒君子信而後勞其民章未字只是足上後字作此句須沉吟追味見而後二字為必不可易之法乃有情有味仕而優則學章重下截上句為世卿言之下句則草野之秀民也聖門無突然便説仕者兩則字亦須説得微不同上句是但有餘力便學下句是須有餘力乃仕也堂堂乎張也章重不能輔人邊吾聞諸夫子人未有自致者也章此所以觀常人之用情非立教然也孟氏使陽膚為士師章法家謂刑亂國用重典不知自上致之也哀矜勿喜包當用法平恕不失其怵惕惻隐意紂之不善章甚多也公羊傳云曹伯之罪何甚惡也其甚惡奈何不可以一罪言也有人之惡有水之惡左傳有汾澮以流其惡是也須還他兩層君子之過也章此章乃警戒至切之語不可放退説日月之食在君子為非常之變人皆見之不可得而掩也人皆仰之惟速改斯得復其常也衛公孫朝問於子貢曰章衛公孫雖知夫子者淺然亦見其無所不通以為求之當世何處得此大成規模可從他就學故有焉學之問子貢告以夫子之大固有自來却四面零星鬬合非可限定一處何處不從學其成就亦非必專師一人也注夫子生知而未嘗不好學按此句是朱子言外推論非問答正解道字固不論道體朱子解為謨訓功烈與凡周之禮樂文章以為此則有時墜地賴人能記者耳其實列聖相傳之微言已不外此故孟子注亦舉此節證聞而知之但非子貢當下問答所及故或問於范太史之説復謂其不切叔孫武叔毁仲尼章多見其不知量也邢云古人多祗同音引襄二十九年左傳多見疏也服䖍本作袛見疏及張衡西京賦為證子為恭也章第三節大可為化不可為非人力可及當就徳性學問至處實講末節上節總包體用説此節就徳性之及人一半可見處示之與大哉堯之為君章同堯曰篇堯曰章第三節有罪謂得罪於天簡在句似並指有罪無罪説注又言君有罪非民所致按此二句最難措詞第四節私箋云大賚正以富善人也按鹿臺鉅橋之積雖多亦安能徧及四海須知此是第一節事正為商家畿内之民身在水火有朝不及夕之憂雖有善政亦莫能待故首為此舉四海聞之亦如被其賜也善人則尤有加焉洪範中所謂富者有廪祿也注中皆字不可貼大字説下文方説四方政行天下民歸次第自可想見第五節安溪先生云此節正申明善人是富之意歸重在仁人上私箋云過即督過之過按此節叙在大賚之後只當就仁人上并見虐政汚俗所當咸與維新大慰百姓責望與之更始意不可泥書今朕必徃重説伐紂也第六節權量者萬事萬物之本謹之而後法度可審法度審然後有官守第七節世者賢者之後世其家者也逸民又是無位之人二句亦相因説注箕子商容不必拘第八節所重中便該得教化在内從善也輕民徳歸厚也末節信字貼誠字説末句歸于公子張問於孔子曰章第二節欲仁而得仁私箋云孜孜所欲所得者在澤民之仁心政上則儘欲儘好儘得儘不妨按此説仁字極分曉總注尹氏云云按顔師古前漢書注中并以上章為告子張之語不知命章此章胡雲峯以為入徳之事者自好首節志士不忘在溝壑勇士不忘喪其元只是信得命及便一直向前做得瀟灑磊落此命字但在氣上説與道之将行也與命也命字同義不可説向理上去了義門讀書記卷四

body:
  text: 義門讀書記卷五十翰林院侍讀學士何焯撰陶靖節詩時運山滌餘靄宇曖微消二句含下風字榮木序總角聞道白首無成斯人豈徒頺然自放者耶贈長沙公族祖族祖二字衍雖同出大司馬而已在五服之外服盡矣長沙謂淵明為族祖也傳寫誤衍二字閻百詩云自昭明誤讀陶命子詩以祖與考係於陶侃之下及作淵明傳遂謂侃乃淵明會祖其實不然又贈長沙公詩敘中長沙公於豫為族族是一句祖同出大司馬大字當作右即漢高時功臣舍也云云按顔延之陶徴士誄云韜此洪族抑彼名級可證此詩序中大司馬斷指士行非漢初開封侯陶舍以右司馬從高祖訛右為大也延之與淵明同時安得云傳文昭明誤讀命子及此二詩乎命子於赫愍侯六句前漢書高祖功臣表開封愍侯陶舍以右司馬從擊燕代侯子夷侯青嗣亹亹丞相前漢書百官公卿表孝景二年八月丁未御史大夫陶青為丞相七年六月乙巳免在我中晉漢季稱東漢為中漢此中晉所本也尚想孔伋庶其企而字之求思企孔思也厲夜生子遽而求火欲其勝父真如孔思也爾之不才亦已焉哉末句警儼并自悼也歸鳥雖無昔侣衆聲每諧鄰曲妻孥雖不如中朝舊侣為多才然真趣則相入也遊不曠林宿則森標不曠林而森標則深潛山澤物色不至已起末二句形贈影此篇言百年忽過行與草木同腐此形必不可恃尚及時行樂下篇反其意不如立善也神釋此篇言縱欲足以伐生求名猶為願外但委運以全吾神則死而不亡與天地俱永也日醉或能忘二句對首篇立善常所欣二句對次篇示周續之祖企謝景夷三郎道喪向千載四句上二句一揚下二句一抑從我潁水濱魯兩生不肯起從漢高况見此季代篡奪乎故勸之從我為箕潁之遊也乞食感子漂母惠二句雲起龍驤非我所處矣銜戢知何謝二句胸中亦將以有為也冥報相貽則不事二姓以遺逸終焉之志亦已久矣怨詩楚調示龎主簿鄧治中收斂不盈㕓毛詩一夫之居曰㕓連雨獨飲句句折移居春秋多佳日首農務各自歸插此句起結處此理將不勝言勝絶惟此也和劉柴桑歲月共相疏我棄世世亦棄我也和郭主簿藹藹堂前林首遙遙望白雲二句富貴非吾願帝鄊不可期所謂望雲懷古蓋西方之思也懷安止足皆遜詞自晦耳與殷晉安别方熊曰殷已為太尉參軍而仍稱之曰晉安蓋先作長史掾者晉所命也題即有意語默自殊勢不曰出處而曰語默公之遜詞也悠悠東去雲東下良才不隱世二句應語默贈羊長史愚生三季後二句托意非常得知千載上六句言僅以書知之餘迹向者未之見也九域甫已一二句逸興高騫義熙十三年八月平姚泓擁懷纍代下二句始皇雖一九域四皓逃之此篇所以庶武羅於羿奡之域想王躅於亡齊之境聊以寄其難言之隱也歲暮和張常侍窮通靡攸慮四句民生多以愁苦自賊若自以年至氣衰窮通不一關其慮久矣然亦有撫已慨然者則冉冉老至修名不立也庚子歲五月中從都還阻風於規林近瞻百里餘應前望字巽坎難與期巽坎以代風水謂下連用風浪字也癸卯嵗始春懷古田舍二篇發端皆自言躬耕非始志下半篇則申時不可為不事伯朝之本趣屢空既有人言已不足以當之也即下章難逮之意詞有輕重下字尤工即理愧通識二句自詭通識而至喪節乃吾所羞也正言若反瞻望邈難逮二句此謂道不可行聊為農以沒世也雖未量嵗功二句妙絶仍不一於憂貧故言近旨逺行者無問津此句寓遁世之意乙巳嵗三月為建威參軍使都經錢溪微雨洗高林二句奮迅出塵戊申嵗六月中遇火形迹慿化往四句形骸猶外而况華軒所以遺宇都盡而孤介一念炯炯獨存之死靡它也庚戌嵗九月中於西田穫早稻遙遙沮溺心二句本非沮溺之徒而生乎晉宋之交避世之心乃若與之符也丙辰嵗八月中於下潠田舍穫姿年逝已老二句似此老而好學故有年逝未乖之喜飲酒衰榮首邵生瓜田中二句先世宰輔故以邵平自比達人解其會四句邵平可遊蕭相之門淵明何妨飲王宏之酒在我皭然不滓則衰榮各適而不相疑也積善首九十猶帶索四句當年壯時也今都下語猶爾言老彌戒得則壯盛之厲節可想所以使百世興起也此又自言其可得而同不可得而雜道喪首有酒不肯飲直是有人不肯做之託詞耳百年幾何奈何不及時自立也持此欲何成惜其情而不反則是忘其性也結廬首欲辨已忘言辨字與前問字相應在昔首恐此非名計恐墜固窮之節也顔生稱為仁首前後自作客主志士不忘在溝壑則陶公篇末所自矢也祼葬猶可又何枯稿之恨哉死去何所知二句曲折頓挫有客首規規一何愚四句張睢陽有言未識人倫焉知天道不明大義則醒者何必愈於醉也少年首敝廬交悲風四句謂不見治平也子雲首有時不肯言四句可得而親不可得而雜政所以待王顔輩也羲農首終日馳車走六句終日狂馳則汨沒聲利將貽名教之憂所謂人而不仁其如禮樂何又不若沉飲者反與真淳之意差近矣此反言以激之也止酒昔昏而今明故曰將止扶桑涘述酒此詩真不可解責子老夫耄矣子又凡劣北山愚公竟何人哉此責子所為作也總不好紙筆人不學安知忠孝為何事陶士行後人遂為原伯魯之子此公所以俯仰家國而感歎於天運如此也天運茍如此國亡主滅何暇復恤子孫為門戶計故歸之天運也有會而作後半言蒙袂揚目者誠過然斯濫可戒當以固窮為師也斯濫豈攸志攸亦所也變文作對蠟日梅多用一枝未有用一條者擬古日暮天無雲首似詠懷少時壯且厲首伯牙與莊周鍾期與惠施陶公所自託也種桑長江邊首此言下流不可處不得謬比易代柯葉自摧折倒裝句雜詩人生無根蒂首金源劉從益和陶詩以此篇合榮華難久居為一篇日月不肯遲合我行未云逺為一篇丈夫志四海首歎老嗟卑則常自托於志在四海於是冰炭交戰至死不悟吾知空名為無益故不知老之將至而目前莫非真樂也行路難中有一篇用其意樽中酒不燥燥字新只將孔北海語易一字憶我少壯時首沉著痛快中年人讀之始覺味長無樂自欣豫妙妙與值歡無復娛反對日月不肯遲首素標插人頭險語代耕本非望首拙生失其方自謂謀道不謀食也嫋嫋松標崖首舊注東坡和陶詩無此篇詠貧士詩以言志君子固窮七篇皆自道也萬族各有託首孤雲自比其高潔下六篇皆言聖賢惟能固窮所以輝曜千載迥立於萬族之表不可如世人之但見目前也凄厲嵗云暮首患難不失其常陳蔡見圍仲尼不疑吾道之非况止於飢乏何為不追古人而從之乎榮叟老帶索首非獨逺於人情生不逢堯與舜禪則宜以榮期原思自居求無愧於仲尼而已如子貢所以告二子者姑舍是可也安貧守賤者首死生不改其操非道故無憂貧賤不以道得者不去陶公誠造次顛沛必於是者矣袁安門積雪首茍求富樂則身敗名辱有甚於飢寒者故不戚戚於貧賤但恐修名之不立也採莒足朝餐莒疑作稆後漢獻紀尚書郎以下自出採稆注云稆音吕與穭同仲蔚愛窮居首自言事在詩外有不易其介者俟後人論其世而知之昔在黃子廉首妻子不撓其慮言終不為妻子所纍貶節而復出也詠二疏雖無揮金事濁酒聊可恃此千載心期也離别情所悲四句洗發詠三良針規嚮已從含下厚恩臨穴罔惟疑惟思也詠荆軻心知去不歸二句抑揚三致讀山海經玉臺凌霞秀首王母自謡耳豈為周王亦自道一談一詠與世俗了不相關也迢遞槐江嶺首落落清瑶流當作洛洛清淫流按山海經槐江之山爰有淫水其清洛洛注水流下之貌淫音遙夸父誕宏忘首妙在縱其詞以夸之後人不窺此妙也餘迹寄鄧林二句其為夸也死猶不悟精衛銜微木首周益公云宣和末臨漢曽紘謂形夭無千嵗當作形天舞干戚某初喜其援證甚明已而再味前篇專詠夸父事次篇亦當專詠精衛不應旁及他獸今觀康節只從舊本則紘言似未可憑矣按尤延之所開山海經作形天桃花源記此文極古率妻子邑人來此絶境曰邑人則先世固所謂彼都人士者也詩嬴氏亂天紀謂以十月為正舉一端以概其餘也雖無紀歷志與亂天紀相對兼收足遁世怡然有餘樂二句暗藏淳字於何勞智慧世外之淳也彌縫使其淳名教中之淳也義門讀書記卷五十

body:
  text: 義門讀書記卷四十四翰林院侍讀學士何焯撰元豐類稿文大悲謝雨文立致雱霈之澤雱霈作滂沛謝晴文今蠶麥將成將作甫諸廟祈雨文注伸布䖍誠伸作仰洪州謁謝廟文謝作諸敢修禱謁禱作禮洪州謁夫子廟文尚其聖德聖德作降𠂻洪州諸寺觀祈晴文蓋兹疲癃之民癃作瘵窪下之田窪作窪已傷稼穡稼穡作流潦實某慧䕃某作繄感慰輿情感作俯諸寺觀廟謝晴文即俾時暘俾作畀祭西山玉隆觀許真君文􅒺惟真馭之升􅒺作𬗟人承餘烈承作思俾往陳于薄具陳作羞諸寺觀祈雪文蕩除隂氣隂作沴使閭巷消癘瘥之菑癘作薦諸寺觀謝雪文致祈寒之協序祈作祁祭順濟王文章云見象云作示福州謁諸廟文攸賚斯民攸作終福州鱔溪禱雨文晀㫰出沒晀㫰作跳踉或就纏徽纏作今寧宇矣寧宇作宇寧如京如坻京作陵式于末世末作永謝雨文岡不馳告岡作罔敢飭豆邊邊作籩題禱雨文後更呪􅔼蜴􅔼作蜥下同還所迎像像作佛及水蜥蜴水字下增送字眀州修城祭土神文肅工始事肅作嘯諸廟祈雨文麥有立苖之艱立苖未詳祭勾芒神文敢奉嵗詞詞作祠慈聖光獻皇后百日轉經疏功崇而不載載作宰伏願克配坤元願作願諸廟祈雨文神之食于此生生作土太清眀道宫祈雨文允兹東眷東作柬蘇眀允哀詞表見于當時當字衍眀允所為文集有二十卷集有作有集所集太常因革禮有一百卷有字衍則其人之所存可知也存作有過人氣和而色溫過作遇其年以眀允之喪歸葬于蜀地其作某地作也而詞將刻之于冡上也于字衍决大河兮嚙扶桑扶作浮齧桑邑名浮是為水所浮漂此恐趁韻作扶桑未詳作扶桑是决江河而注之海也衆伏玩兮雕肺腸雕作雕吳太初哀詞勤事死州瘴沴地州字下有外字勢弭以偏兮弭作阻卒與子逢子作此我知子初兮子作太為其子孤兮為其二字衍此行中有脫誤父母之歎兮歎作歡剖劂又工剖疑作剞吾詞傳子兮公之自信如此王君俞哀詞擬歐陽詹生哀詞君俞在京兆門外作君俞在京師居北門外慶歷元年豫入太學公于二十二嵗入太學蓄妻子不驕蓄作畜拔君俞以託其後拔作扳而不享于貴且夀享作卒君禔而秀兮禔作提其博而殽其作甚雖裕于心兮心作實不耀其華華作華維友則信兮友作文莫敢責辭敢作致恨與天終末句不類虞部即中戚公墓志銘大父諱同文戚同文事其略見于吕氏童蒙訓宋史不為立傳失之有傳附見于子傳者東都事略也學士以論天書出出作絀而即中亦舉賢良不就中字下有蓋字蓋自父子兄弟之出處如此自作其能師其家師作帥何其盛哉哉作也世世茍德者德作得而民之養其父者得以其義貰死今家無次丁者得減死留養法似始此濮民相驚且亂且作幾年五十有七七作五自長豐之戚材材作村荒諼悖冒荒字上增雖字夫赴時趍務趍作趣豈可輕也哉豈可上增是字傳即家梁自祖琮傳作侍詆符繩公事魁崛詆符謂論天書恂恂南安得家規規作規戚元魯墓志銘百有六十餘年矣矣字衍元魯初以父任于建州于作為為亳州永成縣主簿成作城年三十有五三作二以其配陳氏王氏祔􅀈葬􅀈作將而于元魯未見其止也其作所尚書都官員外即陳君墓志然猶為所記所試者小也所記二字衍徙簽書簽作僉以疾請致任任作仕然不得卒至中夀作然卒不得至中夀詩以銘之銘作名故翰林侍讀學士我公墓志銘我作錢左侍禁閣門祇候閣作閣其見于文詞其作具以慈恕簡重為禮重作靜而為屬者後卒亦心服也為字下有公字公于衆不矯矯為異此處似擬權文公墓碑其後至照化照作昭刑部即中致仕王公墓志銘祖考名犯濮王諱犯濮王諱四字當側注取君主萬年薄薄作簿轉運使李綺綺作紘咨任公具材治宫室材字下有用字遷祕書著作佐即書字下有省字王駿知益州駿作騣或謂君禍自此始也作或謂君禍始此矣知處州處作䖍改湖北路轉運使改字下有荆字君要論之曰論作諭于人何負哉人作吾知光州逾日日作月遷尚書兵部員外即徐州知州作遷尚書兵部員外即知徐州是時富丞相相下有弼字加直龍圖閣閣作閣濬渠水利作濬渠為水利知西京留守御史臺守作司司封即中孔君墓志銘杜祀之使南方祀作把君䇿書居多書作畫程督與稅等與字下有租字須負重三千人重字下有者字悉使官屬并拏繫獄使作收拏作孥并字下有其字軍事推官吕潛以瘦死瘦作瘐下同罷鼎州六塞塞作寨君奏以為不可乃止之之字衍而俸錢嘗以聚書三孔文詞聚書之效也讀書未嘗日廢也嘗下有一字四十七世孫七作六羲仲太廟齊即餘早卒餘字宋本作官官字疑當在太廟上孫男女八人書孫男女但舉其數都官員外即曽君墓志銘君曽氏諱誼誼是太宗嫌名當時乃不避耶博聞強記記作志自請罷去自字上有則字楚饑以下敘致甚佳又取民之食其伎者伎作技市井騷然井作里朝廷命他吏覆視命作遣既死楚之人迎哭其喪甚慟死字下有而字之字衍不奪其守如此不字下有可字景融景初融作獻尚告厥志志作忘王容季墓志銘曽大父諱廷金金作銘為逺安軍使逺安作安逺大父諱居正正作政主蔡州之新蔡縣簿縣字衍年三十有二二作一旌義鄉衆義營下義字作乂尤能刻意學問能字衍其磨礱涵養而不止者涵作灌又不可得之一鄉一國也可字下有以字未有同時並出于一家未有同時並出為一句出于一家為一句于字上叠一出字而命之至于如此何也折一筆便杳然無際容季葬有曰容字上有而字曰作日都官員外即胥君墓志銘胥偃之子簽書河南府簽作僉初娶李氏初字上有君字曰茂諶太廟至長至作室又謹畏亷潔亷潔作潔亷建康郡太君田氏年七十田作刁以篤其義義作乂考已無遺遺作違我材之亢亢作尤劉伯聲墓志銘無事蹟從豫與與作逰余故不得而辭也故作固妻賈氏賈作費子四人人下有曰字有既畀之既作孰尚書比部員外郎李君墓志銘自山陽祗京師祗作抵海州朐山人海字上有君字用君主宿州糴糴作糶下同去為䖍州司法參軍作處優致如主糴優上有君字君考校程度程度作度程有不能决者多屬君君所决者三十有八事上君字衍有不能决者多屬君所為一句下决字上叠一所字為一句蓋復太平州囚官夀活之復作覆官作管遷祕書著作佐即書字下有省字課嬴十有七萬嬴作贏久不能决能字衍以母者出通判杭州者作老葬安樂之揚興里樂下有鄉字辨且裕也辨作辦且作其尚佑爾裔佑作祐司封員外即蔡公墓志銘任事無纎芥之失任事二字衍芥作介自微起隆用兢兢起作訖贈職方員外即蘇君墓志銘曽大父欽欽作釿爭欲執事學中爭上有士字軾殿中丞直史館二句書孫以二蘇有名位故詳之而并見于銘詩庫部員外即知臨江軍范君墓志銘萬家山前葬其孤屬君之故人前字下有一將字使告于鞏曰使字衍元配某某作鄭氏次適都昌主簿周詠昌作曷孫男六人書孫不著其為某所塵張久中墓志銘陳惇張持之交可為張陳洗隙末之穢一時所與之逰者甚衆所字衍力能以君之柩歸柩作喪歸君之葬地葬字上有喪字孔孟已然已作以銘詞未免過夸曽王皆然祕書丞知成都府雙流縣事周君墓志銘歷南劍之將樂劍下有州字曰某曰某下增曰某二字葬君于某縣某鄉某所之原作葬君于某州某縣某里之原居常分月俸居作君或止食館劵而已館劵未詳疑即浙東俗所謂關約也殿中丞致仕王君墓志銘孫女二人并書孫女為有所自出也贈大理寺丞致仕杜君墓志銘簡淨可法胡君墓志銘亦是學韓生于天禧之戊午此文書生于某年與人逰與上有其字弟某兼書弟某琢斯珉琢作瑑光祿寺丞通判太平州吳君墓志銘幸得名信後世名作銘殿中丞監揚州稅徐君墓志銘筆力馳驟何必韓歐徐君更無事蹟自合但感慨盛衰姓李氏名忭一段南唐僭國故不稱其諡號而名之初東南之地一段妙在敘議相夾永州軍事推官孫君墓志銘諱杭以文學見于世杭作抗君不有子無子于銘中補見尚書都官員外即王公墓志銘精悍知韶州知上增還字謂俗止如此止疑作正夫所謂因其俗俗下有者字子男七人七子知名者三皆長夀縣君吳氏所出位不滿其志志作意使者以安石之述與書介甫請銘于子固而不之歐陽氏或疑此時未與歐陽公相知則仁夀縣太君之葬介甫已為知制誥亦子固志其墓也其尤可哀者也也作曰衛尉寺丞致仕金君墓志銘顧朝士大夫皆褒崇其親顧作願生于淳化之庚寅書生年傳至孫則亡傳字上叠􅀈侯二字太子右司禦率府副率致仕沈君墓志銘沈氏自齊太子家令約家于吳興何以不稱梁侍中而稱齊家令且吳興之有沈氏自東漢始始為㑹稽烏程縣之餘不鄉也大抵曽王于史牒皆疏君以宗室密州觀察使宗旦恩至蓋君之姪也補敘得法宗子緣同姓之故其祖父既貴極人臣遇覃恩則得推之外家亦可為後世法太濫不可為法雖假之官稱而不蒞任然名器固當慎惜也曽孫三人并書曽孫寶月大師塔銘終無一語及其法噫是非可銘也歟但銘其一節金華縣君曽氏墓志銘蓋其子五人五子知名者三以魯公恩賜冠帔推恩于大臣之女兄弟泌汾汶沂潢潢作澺為妻若母作若為妻母自荆祖粵祖作徂象服貂冠象作卷尚寵爾從從作後夀安縣君錢氏墓志銘祖考內閣使閣作園其難其豫難作艱天長縣君黃氏墓志銘有曽孫十有二人并書曽孫然獨與他文不同以收處觀之乃得其用意所在以進士中其拜拜作科附屯田府君之兆附作祔仁夀縣太君吳氏墓志銘曰雱敷旁瓬􅣆防斿旗放旗斿與雱敷同列是不識偃字介甫深于小學何以有此孫女九人以下并書孫女之所歸夀昌縣太君許氏墓志銘沈存中之母蘇州吳縣人縣字衍昔先王之治一段夫人非有殊絶之行此論與此志不稱夫人周氏墓志銘行其素所學所字衍永安縣君謝氏墓志銘其葬于撫州金溪縣縣下有之字余觀詩人之歌其后妃一段篇篇如此却是一套永安縣君李氏墓志銘卒于其家之正寢女亦得稱正寢初刑部之兄昌齡一段有波瀾試祕書省校書即李君墓志銘李君無復事蹟只敘其數千年世次成文歸熙甫趙汝淵墓志似出于此此文可敵荆公許氏世譜歐公疑世譜為公所作不徒然也維李氏逺出于皋陶一段所敘大抵用唐書宰相世系表自楚邱以後則其家之九世譜也雖出其家譜牒其人與官皆茫昧無徵何不但近取可知者使班孟堅為之必不肯如是曇子牧事趙作曇子璣璣子牧事趙曰輯晃芬徑􅀈􅀈作睿德裕相文宗武宗并及文饒與後昌齡對試祕書省校書即李君妻太原王氏墓志銘既銘校書而夫人復自為銘以其異于尋常之婦也此變例岡不采獲岡作罔池州貴池縣主簿沈君夫人墓志銘夫人年三十餘一段使今人為此鋪陳數千言不盡其實則記乎其所不必記也元出于危危疑作魏雙君夫人邢氏墓志銘有過人之行似刲股之事于是人知夫人之善三句敘婦之賢而仍歸美于姑語得體而于法亦謹嚴矣旌德縣太君薛氏墓志銘祥符初為東頭供奉常將屯宫門供奉下有官供奉三字祔其夫人柩人作之福昌縣君傅氏墓志銘景芬芬作棻下同夀安縣太君張氏墓志銘受養被封被作收亡兄墓志銘字叔茂作茂叔能辨說辨作辨下同又思事未至當何如何如作如何故髙郵主簿朱君墓志銘銘外翁無溢詞君嘗試于祕書省校書即于作為其子象之東之東作柬其年歸于曽氏年作季鄆州平隂縣主簿關君妻曽氏墓表余校史館書籍余字下有被命二字故太常博士吳君墓碣開封縣縣丞下縣字衍謂君一强可以取其贏強字下有出字不與􅀈者校􅀈作犯知處州青田縣朱君夫人戴氏墓志銘某年某月上某字作其曰某曰某曰某下曰某二字衍宋本同疑上四人當作五人亡姪韶州軍事判官墓志銘髙皇考諱致堯髙字衍皇作王致堯作易占曽皇考諱易占皇作王易占作致堯志氣不獲氣作棄光祿少卿朝君墓志銘銘婦翁亦無夸詞其家先濟州之巨野家先作先家公諱宗格格作恪合葬于杭州杭作揚安州政待公而決安字衍大有文元有作自先于外服先作光夫人曽氏墓志銘皇考諱某皇作王天長朱君墓志銘識美幽堂幽作山祕書省著作佐即致仕曽君墓志銘字眀升升作叔列幽隧幽作山亡弟湘潭縣主簿子翊墓志銘曽氏兄弟皆篤學雖欲不名世得乎聲音訓話話作詁未嘗易意易意上有一日二字二女墓志銘吾繼室李氏出也李氏乃是後妻公深于經學而繼室二字亦誤仙源縣君曽氏墓志銘淑眀許嫁而夭遂以妹婦之太子賔客致仕陳公神道碑銘乃論具公胄出位序行治之實論具作具論曰知公曽祖考也知下原注下一字同濮王諱宜興本闕三字是知某州非其名也盜卒不得死不得作得不嶽州滕宗亮亮作諒及退而自休日日下有脫今得宋本補足云使家人誦書常數千言危坐聽之未嘗有倦色江于東南為水陸之衝賔客日凑公廣于招納與之釃酒髙㑹彈琴賦詩曰是足以佚吾老也及間而言天下之事于其是非得失之際慨然奮勵少者有所不能及聞其言者莫不壯其意少客京師有欲教公以化黃金者公辭不受教公以寡欲乃受而行之蓋出事天子四十有八年退老于家又十有五年年八十餘飲食倍人儀狀甚偉聲音滿堂進拜公于前者不知其已老也前終十餘年自為冡于南康軍星子縣白鹿原距尚書之兆千有八百步棺槨衣衾皆豫自製屬疾至終容止如常遺言里中親疏各盡其意享年八十有五殁于熙寧九年五月壬申葬于是年八月壬寅纍階至朝散大夫勳至上柱國封至潁川郡開國侯食邑至一千二百户娶張氏尚書屯田員外即詡之女封清河縣君再娶王氏尚書都官員外即告之女封同安郡君子男二人曰耆太廟室長有易疾次即聃也守江州瑞昌縣主簿女五人嫁太常博士文勸進士吳􅀢光祿寺丞曽軫進士陶舜儀吉州廬陵縣主簿薛縫孫男一人曰瓌女三人聃承德襲教能世其家者也銘曰允穆陳公學繇自力收科于少其髦維特于陪于二懿其壯畫于附于顓焯其偉績驅之磔之于其蝥賊膏之嫗之于其黍稷彼疾而馳我徐不亟寧無爾諧不渝我則于即于卿進皆以序疾集于微乃謝而去乃長書省云云世狠而爭狠作很曽不頻呻頻作嚬有歸墓隧歸作巋祕書少監贈吏部尚書陳公神道碑銘媯滿之封國滿作汭曽大父昶昶作昶遂始學書作遂使書學盜以故不可迫可作敢自宋興小吏勢勢下别本有弱字宋本無疑有脫文盜起往往轉掠數百千里二句讀此可見削弱方鎮州縣無偹自宋初即受其弊而歐公為丁元珍墓表亦非以相知曲加寬解也政要策所謂張雍守梓州者即此事蓋亦以無為有以作易歷河南府新安縣歷下有知字公因築武陵澧州三寨陵作口州作川刑部即中張府君神道碑此篇叙事頗為生色拔府君自贊拔作扳趣作誣狀趣作趨幸授已甲捕兩營授作受頴又莫敢相曲直又作人府君身省護作者省作自者作省屬下句讀官至庫員外即庫下有部字府君甚愛考城劉侍制侍作待端重不惰惰作忲民趙昌以畫名至未嘗致一器一物畫猶不收則其居州之亷靜益見矣自知漢州而治由已出官止于兩浙轉運故舉二事以概見其始終即下文所謂自守及使也雖小者如此立稱立字疑誤故朝散大夫孫公行狀吏遂得弛負錢數十萬而已句未詳北方益土兵二十萬兵下有亦字又何益之耶何作可豈可謂知先後哉知下有所字于是極論古養兵古下有今字謀立永洛城永作水下同而赦滬之輒遂從公議輒遂似謂專擅今且以輒為讀宋本同又言後事後字下有宫字又言宰相其罪當罷其字衍不飭玩好飭作飾二三大臣又與同心共事與下有公字所著唐史記五十七篇五作七七作五徐復傳五行術數之說術數作數術皆盡恭謹遇人恭謹真有德而隱者也復所以為上言者以字衍太一主客位成歷位作立州牧每至牧作將洪渥傳公篤于友愛而久宦不大顯傳渥蓋亦有感云初進于有司連三黜連三黜作輒連黜里中人聞渥死里字上有渥字渥得官而兄已老而作時則必安焉必作心如渥所存渥下有之字蓋人人所易到下人字作之徐復洪渥二傳為一卷疑其不完宋本同本朝政要䇿讀此卷乃知南豐史才考課滕正中正中作中正沔既奏其法既下有條字然親書課最之意書字下有考字親書如陽城自書考是也訓兵至周世宗髙平之退至自此始也故代周者不在藩鎮而在內之大臣東京時王德用狄青皆被口語宋興益精其法精作修而羣臣莫能本其意本作奉添兵慶歷以後益兵愈多國用愈絀以下蓋尤寓意于簡汰也始置神武䇿為禁兵神武䇿當作龍武神䇿太原青杜杜作社邠寧寧武作邠寧武寧養之既廢廢作費才五六千而已才作才下同至太宗伐劉繼元伐作代取環慶諸州之兵之作役然羣臣莫能承上意意下有焉字兵器弓矢之取睽取下有諸字國公署有南北作坊公作工嵗造甲鎧具裝鎗劍刀鋸器械具作貝努撞床子努努並作弩下同撞作橦甲袋征鼓征作鉦炒鍋鉶行橧鉶作䥷橧作槽城壘太宗既平太原以下太宗以晉陽自髙歡以來嘗因以起既平劉氏乃隳其城可復遷其民以實京輔則謬算也河東力既單弱豈復能東向以與遼人爭幽州雲中故地哉宗廟但立髙曽禰曽下有祖字傎探傎作偵趙瑢瑢作鎔京人皆寃之京下有師字貢舉下詔賜其第至殿試自此始也賜進士第與殿試之名皆始于此而眀之殿試天子親䇿問之則又仿宋時賢科之意與覆試異焉今釋褐亦始于此元好問中州集第八卷載擢第者廷試時務䇿自髙有鄰發之此殿試試䇿之始開寶殿試進士內出未眀求衣賦設爵待士詩仍不異禮部考試之法也按柳開集與鄭景宗書云開寶六年進士徐士亷伏闕下求見請太祖廷試曰方今中外兵百萬提強黜弱決自上前惟取儒為吏常以授于人而不自決為國止文與武二柄取士無為下鬻恩也太祖即命禮部試所中不中貢舉人列于殿庭試之得百有二十七人賜登第使解褐焉此今日釋褐之始受詔即赴貢院亦始于此至殿試又為糊名之制按此似宋時糊名但用之於廷試然歐公得眉山而疑為公殆皆用糊名也軍賞罰惟傾土疆耳傾字衍莊宗好畋至賞賚無節也五代史但言莊宗以吝賞失軍士心不知此事尤當垂監于後蓋無功僣賞與不加優恤其失惟均爾吝賞詳見劉后傳二十年夾河爭取天下河下有戰字雅樂又定十一曲名一作二乃太祖之聖意太祖取王朴樂下一律用之史官季冬終則送于史官冬字疑衍姚夀以為帝王謨訓夀作璹入閣日閣作閣正量衡動必數嵗計爭計字疑誤一忽為絲一作十自分釐毫絲忽釐作氂毫作豪下同任將兵未嘗少衄少作小汴水裴雄卿言江南租船雄作耀太宗嘗命張洎論著其興鑿蘇子瞻注浮于淮泗似未見洎所論著故援据不能若此之詳密刑法太祖即位祖作宗管𣙜管作管實鹽價于海濵濵作瀕兵簿既衆簿作籍自此山海之入四句宋之弊政皆始于太宗錢幣而安易之辨不可出出作屈宦者相慙而退相作洎名教蜀人有事于中州事當作仕䄍祭宋興推應天行天作火祠太一兆太一于城南兆下疑有闕郊配南豐亦主太祖配天之議蓋郊配自當論功德也南蠻安南之蠻是也蠻作變契丹尊擇用將帥尊作專委任專而聼斷眀任作付當世以為黠黠作諺劉廷讓敗于君子館又敗上敗字衍虜輒掠垌野垌作坰始科河內之民以戍邊科疑作料則取後兵為振武之軍以自助後作役楊延以為乘其敝延下有釗字賊盜天子常薄吏罪漢髙紀陳豨反周昌奏常山亡二十城請誅守尉上曰守尉反乎對曰否上曰是力不足亡罪聖主之恕非文墨吏所知也讀此篇乃知歐王丁寶臣墓表與志不為失出文館而衰于唐室之瓌瓌作壞而法變卑矣變作度而縉紳之學彬彬文文作矣屯田議者以為豈晏然不知兵農兼務哉議者以下疑尚有脫誤東出宿毫毫作亳水利李沐以區區之蜀沐作􅖅文翁穿前溲前作煎至晉杜預疏荆兖之水兖宋本兖宜興本作衮固非是然杜元凱未嘗為兖州則兖字亦非也恐當為襄字黃河此條但據漢書溝洫志立論然朝補之亦不能似此使水得自行者水得自行四字尚未盡得本意張戒之說是也戒作戎王延平當之說是也王延下有世字故務壅塞居水者數語簡括故言河宜散裂言散裂而不言游蕩只得其半邊防􅘵莫以通􅘵作瀛茶又設三說之法三說之法見沈存中筆談以上諸策皆真得其要而其文無不出入漢之西京此固五朝國史諸志之椎輪也世人競耳剽隆平集而莫知愛玩此一卷何哉金石録跋尾九成宫醴泉銘祕書省檢校侍中省作監可以見魏之志也只一語自有味魏侍中王粲石井欄記貞元十七年貞作正掌書記胡證書證作證一記作記一襄州遍學寺禪院碑惟嗜書惟疑作性襄州興國寺碑特見其模本于太學官楊衷家衷作褒十八官號姓名八疑作人其字猶可喜猶作尤韓公井記兼山東道山下有南字行人雖渴困渴作暍桂陽周府君碑并碑隂圖經但云周府君府作使按武水源出彬州彬作郴南流三百里入桂陽水入下有桂陽而三字其俗謂湍浚為瀧溪謂下有水字浚字衍蓋當時已有此語有作為惟十有亖月二二并寫作亖原注古二字古字如亦作􅀢􅀢作􅀢人作􅀢之類􅀢作如此者甚衆如此者下宜興本闕二字宋本作如此者甚衆唐安鄉開化寺卧禪師淨土堂碑銘化作元住河南開元寺南作州則能令其信慕者二句善據名論江西石幢記潁川郡鍾某為始五代史記鍾傳封南平王潁川乃其郡望也漢武都太守漢陽阿陽李翕西狹頌乃與功曹吏吏作史鐉大石作燒其頌有二頌作文馬瑊中玉瑊作城然後漢畫始見于人人作今成州則武都之上流也流作祿集外續附行狀母吳氏文城郡太君母吳氏上不似世俗加前字公嘉祐二年進士及第嘉祐丁酉距公卒之年元豐癸亥凡二十年公之及第已三十八嵗矣年十有二試六論二下有日字婦人孺子皆道公姓字皆下有能字學者憊精思莫能到也精下脫一覃字宋本亦然前期喻屬縣富人縣下宋本闕一字今以名臣言行録補一召字粟賈平賈下有為字故盜發輒得有葛友諒者宋本無諒字謬加可笑下同縣毋遣人至甲里甲作田言行録作縣毋遣人呼其門遂以為修撰以下有公字墓志數對便殿發其所言宋本無發字訃聞計亟作計聞訃亟神道碑鼓腹而嬉擢齊州鼓作果擢下有知字哀詞秦少游作也見本集第四十卷秦觀二字誤入行中耳協秦觀而四塞兮秦觀二字乃氣鬱二字之訛辰來遲而去速兮遲下闕一兮字典貢絶而復作兮貢作章早獲進於門牆少游秋懷詩云昔者曽中書門户實難瞰筆勢如長淮初源可觴濫經營終入海欲語焉能暫斯人今則亡悲歌風慘淡其于曽氏未後蘇門也張文潛有祭公文今不傳挽詞功名取次休功名陳后山集作功言指立功立言為是始作後程仇作疑怍程元仇璋文中子之徒后山有妾薄命二篇自注云為曽南豐作蘇子由曽子固舍人挽詞云少年漂泊馬光祿末路騫騰朱㑹稽儒術逺追齊稷下文詞近比漢京西平生碑版無容繼此日銘詩誰為題試數廬陵門下士十年零落曉星低宜補載於陳作之前己卯冬於保定行臺閲內府所賜大臣古文淵鍳有在集外者六篇則書魏鄭公傳邪正辨說用讀賈誼傳上田正言書上歐蔡書也書魏鄭公傳既為公傑出之文其五篇則皆公之少作亦唯上歐蔡書差善而詞雖激昻氣實輕淺其謂所見聞士大夫不少人人唯一以茍且畏慎隂拱默處為故未嘗有一人見當世事僅若毛髮而肯以身任之不為回避計惜者則慶歷間士風亦豈至是度先生年長後以其言為過而藏弆是稿如居士集不録與髙司諌之意前輩録公文者偶未之察近日學士專以得集外人所不常見者為竒故録此等耳他日討論續稿者倘精思吾言或芻蕘之一得也後知立齊相公有建本聖宋文選數冊其中載南豐文二卷嘉善柯崇朴借鈔遂傳於外此六篇者皆在焉蓋以世不經見過而録之不略慎擇也何椒邱云南豐續稿外集南渡後散軼無傳開禧間建昌郡守趙汝礪始得其書於先生族孫濰缺誤頗多乃與郡丞陳東合續稿外集較定而刪其僞者因舊題定為四十卷繕寫以傳元季又亡於兵火國初惟類稿藏於祕閣士大夫鮮得見之永樂初李文􅐧公為庶吉士讀書祕閣日記數篇休沐日輒録之今書坊所刻南豐文粹十卷是也正統中昆夷二字疑作毗陵趙司業琬始得類稿全書以畀宜興令鄒旦刻之然字多訛舛讀者病焉成化中南豐令楊參又取宜興本重刻於其縣踵訛承謬無能是正太學生趙璽訪得舊本悉力讐校而未能盡善豫取文粹文鑑諸書參校乃稍可讀文鑑載雜識二首并書魏鄭公傳後類稿無之意必續稿所載也故附録於類稿之末眀初曽得之嘗著南豐類稿辨誤則此集自南渡以後善本難得久矣得之書惜乎不傳吾將安所取正哉南豐有懷友一篇寄介卿見能改齊漫録第十四卷中又有厄臺記見莊綽雞肋編中但似非全文厄臺記亦見聖宋文選中髙似孫緯略有南豐謝實録院賜硯紙筆墨表疑亦續稿施武子蘇詩注中尚載有雜識義門讀書記卷四十四

body:
  text: 義門讀書記卷十八翰林院侍讀學士何焯撰前漢書司馬相如傳分上下卷小顔以注文繁多分為上下二卷非班書本然也宋儒作一人行狀有上下二卷為失據矣惟食貨志小顔無注然亦似非班書舊次云以訾為郎訾郎猶今擇有身家之人非入粟拜爵之比漢初得官皆由訾算有市籍者亦不得宦也郎官宿衛親近欲其有所顧藉重於犯法乃令文君當盧當字作對字釋之為長顔說非也長卿故倦遊倦游注意言所遊之多今人以怠且病解之誤矣下屬江河文潁曰南方無河也冀州凡水大小皆謂之河詩賦通方言耳按今吳諺水無大小皆謂之河非獨冀州方言然矣於是楚王乃登陽雲之臺陽雲按孟注當從文選作雲陽此本對以雲夢之事也游孟諸縱言之耳非必屬齊也文注誤東注太湖太湖恐當闕疑未必如郭璞所謂震澤也針疵鵁盧群浮乎其上張揖注盧白雉也按盧是黑色安得反為白非獨雉不浮也孫叔奉轡衛公參乘扈從橫行出乎四校之中按奉轡參乘皆指乘輿而言則文潁注所言四校為得之矣便嬛繛約師古曰繛音綽按綽即繛之省何云借音夫以諸侯之細而樂萬乘之所侈萬乘之所侈謂天子猶自謂此太奢侈者也文選無所字非也逡巡避席席選作廗為是此賦多古字也陛下患使者有司之若彼至讓三老孝弟以不教誨之過既得伸其使指又不重以驚恐則國體無損民怨亦徐弭矣卭筰冉䮾者近蜀至今誠復通為置縣愈於南夷前檄為天子文過宣諭之體不得不然也何復為此以長君惡耶漢興七十有八載全篇此篇仍賦頌之體較之前檄為辭勝事今割齊民以附夷狄附附益之也割齊民謂賂以巴蜀吏幣物則是蜀不變服而巴不化俗也巴蜀本禹貢梁州之域豈徼外耶昔者洪水沸出至聲稱浹乎于茲禹之治水為民除患也武之通道為民生患也可引以為解乎以禹為堙水者始自相如而孟堅仍之故馳騖乎兼容并包而勤思乎參天二地親親仁民仁民愛物斯能兼容并包矣盡人之性盡物之性斯能參天二地矣非不務德而勤逺略也將博恩廣施至得耀乎光明近似有理然此堯舜猶病諸矣且夫王者固未有不始於憂勤而終於佚樂者也揚子謂勸百諷一果然即其所謂終於佚樂者方且導以封禪之侈心萬乘豫遊民間困於供賦又有飾太平之容增逃亡自賊殺之實者此浮華文士不可使在人主左右也其後人有上書言相如使時受金其勸人主通道蠻夷不過以眩曜臨卭冨人復分其財所過縣道迫脅長吏多受金耳父母之邦勞弊數萬生民之命於相如何有哉漢廷文士嚴助首開用兵之端卒以罪棄市相如以多病避事得免於禍幸矣且夫清道而後行至臣竊為陛下不取諫書正須若此平易可曉推之逺則其語支而聽者厭矣招翠黃乘龍於沼翠黃當如孟說作乘黃言黃帝孔甲之乘黃乘龍皆歸池沼也相如既卒至采其尤著公卿者云傳遂終言其事固不悟封禪之非而直以為惟此盛典皆發自相如也史通云馬卿為自叙傳具在其集中子長因録斯篇即為列傳班氏仍舊更無改作固於揚馬傳末皆云遷雄之自叙如此至於相如篇下獨無此言其例不純按傳中終言相如卒後之事則非止録自叙也贊司馬遷稱春秋推見至隱推見至隱言由人事之見著者推而至於天道之隱微也李注失之然近人讀見為本字則去之彌逺矣揚雄以為靡麗之賦至不已戲乎此揚子篤論蓋其意雖主諷而鋪陳侈蕩不知所裁則中人驟恱其辭反溺其指希不鄰於勸矣上林之作不若諫獵之為益也然虛詞濫說之中亦寓諷焉揚子甘泉上比於帝室紫宮以為此非人力黨鬼神其可是已公孫宏傳年四十餘乃學春秋雜說雜說雜家之說兼儒墨合名法者也藝文志亦有公羊雜記八十三篇以宏所對智者術之原也一條味之其學蓋出於雜家則此雜說非春秋經師之雜說也此天文地理人事之紀若云天文地理之變惟人事足以救之則統紀之所在明矣習文法吏事緣飾以儒術上說之宏號以儒進然所以當上意者習文法吏事乃少為獄吏之力也常與主爵都尉汲黯請間至以順上指他人先發而推其後則先以他人試上之喜怒背約則上盡踈他人而獨親巳此巧佞之尤者也宏為人談笑多聞多聞由於學雜說夫九卿與臣善者無過黯然今日庭詰宏誠中宏之病此語亦自處於長者而隂目黯以險薄也賴黯素以直著故雖賢宏亦不因此憎黯爾韓大夫所以教武安侯皆此術於是起客館開東閣以延賢人與參謀議宏起儒生地逺而族寡延賔之事足以潤色太平不為人主所忌故行之無患衛霍后戚又立大功則不得不以竇灌為懲亦各因其勢也閣東向所以為敬今人多昧其本意若衙門之迎賔館則猶仍此制也或反以官職尊重不見於館由當庭入中門為榮昧之甚者矣自以為無功而封侯至避賢者路安輕宏至有發蒙振落之語當日治其獄無有不聞於上者惶恐避位蓋亦非得已也漢興以來至食邑三百户此詔乃莽借宏以自褒大耳史家不探其隱而録之卜式傳此非人情至願陛下勿許宏言是也式屢以此術嘗漢武漢武再布告天下而莫有應者於是告緡之禍作矣凡事足以動人主釣名譽官位便於已而難以概人人使禍機由此發者居大臣之位皆當遏其萌茁毋使一人得志而困苦天下式曰非獨羊也至欲試使治民式至是因牧以露竒欲假助邉以求官之始志顯矣齊相雅行躬耕至不為利惑式反覆任術愚其主以財釣取髙位其差賢者內行之素而已式既在位至上由是不說式天下豈有始以入財結人主知一朝能白罷此利孔者乎式果有才智思顯方其始舍田牧而以為吏進如黃霸所由可也式又不習文章文章謂文物典章稽古以立文垂訓者也兒寬傳寬既治民勸農桑至吏民大信愛之寬當入循吏傳封禪事於郊祀志詳之可也定水令以廣溉田召信臣為民作均水約束本之兒大夫也張湯傳湯决大獄欲傅古義律令一定欲借古義以上下其手使人畏且感之耳非佳事也所治即豪至上裁察獄一不平即為酷吏豪者必失入羸弱必失出後世廉直之人用心偶偏有不自知其蹈湯之謬者矣湯爭曰伍被本造反謀至多此類此守法非巧排籠天下鹽鐡排富商大賈出告緡令按鹽鐵出於宏羊告緡出於楊可然非倚湯不能取信於天子以酷虐助而成之故惡皆歸之湯臣固愚忠至臣固知湯之為詐忠不論其以酷逢君之貪使天下騷動乃言前此治反者過當誠愚儒寡要之談也彼徒見鼂錯常以此死不知言此適增武帝倚信湯耳趙王求湯隂事至疑與為大姦趙王彭祖至陷御史大夫於死豈惟國中相二千石無能滿三嵗輒以罪去而已被惡言而死惡言謂分田信所居物張安世傳上竒其材擢為尚書令即擢為令武帝真能程其器能用之如不及明主在上賢不肖較然至逺權勢如此宣帝尤多忌不欲權在臣下觀趙充國傳始亦嘗不快上故務為畏謹抑退求自免也欲封其冡為恩德侯以封侯告墓故曰封其冡上曰吾自為掖庭令至不敢復言張賀初欲以女孫妻宣帝安世禁止之帝初即位稱安世為是以慰其心也及深辭賀封帝乃有自為掖庭令非為將軍之言則安世亦必有慙懼於前事者故不敢復言耳然身衣弋綈至富於大將軍光儉以養其福勤以遏其淫如是善矣纎微必殖則近於鄙而不可為也學子孺者當知所裁富過於光亦足致禍曹洪可鑒也雖不能視事折衝萬里此舊臣有名德者所以可貴宣帝之識偉矣諡曰敬侯張氏兄弟不愧易名贊馮商稱張湯之先至故闕焉班史之闕疑如此杜周傳後為執金吾至遷為御史大夫桑宏羊謀反在昭帝元鳯元年此云逐捕桑宏羊疑有誤史漢並同注家亦無及之者恐因延年首發上官桀父子大姦并誤以周為逐捕宏羊也而兩子夾河為郡守家訾纍巨萬矣治皆酷暴禇先生書田仁事云仁㓨舉三河時河南河內太守皆杜周子弟河東太守石丞相子孫仁已㓨三河皆下吏誅死當史遷作酷吏傳時未覩其終班氏遂仍之爾天之報虐無或爽也杜延年傳廷尉王平與少府徐仁雜治反事至皆論棄市廷尉少府議是光以此殺守法之吏以快餘憤雖無妻顯殺后之罪有以知其不能福流纍葉矣見國家承武帝奢侈師旅之後至皆自延年發之延年有撥亂反治之功非張安世所及而丞相魏相奏延年素貴用事至削户二千此魏相引繩排根之過延年所以不相隨坐者賴仲子他早與宣帝愛善首定策耳延年以故九卿外為邉吏治郡不進治郡不進者以霍氏舊人自託於無能也五鳯中徵入為御史大夫凡居外十餘年始徴又以丙吉遺言薦于定國杜延年陳萬年故也諡曰敬侯延年安世同諡可知猜嫌之㑹惟敬可免緩輒上書入錢榖以助用前後數百萬延年不絶賂遺未革昏風緩此舉足以為保家之主矣與張氏之有臨一也杜欽傳惟陛下正后妾至咎異何足消滅其言要亦深中成帝之病杜欽雖在大將軍幕府然初無邪謀未可過於吹索也救解馮野王王尊胡常之罪過欽為野王奏記王鳯不見聽語在馮奉世傳野王以京兆尹王章薦以代鳯鳯風御史中丞劾之欽之救解亦為王氏補過也欽令鳯上疏謝罪至鳯復起視事如鳯由此遂退亦王氏之福也欽前既進戒於鳯豈未知其人復勸其固位哉至京兆尹寃死欽雖欲彌縫無可奈何矣欽愚以為宜因章事舉直言極諫至疑惑著明粉飾虛美遂為王氏歷世欺誣之術章既死誰復敢言元舅乎僅得一踈逺之梅福而亦卒不許其假軺傳詣行在所也竟何補哉丞相史搜得紅陽侯書奏業聽請不敬坐免就國書從長所搜得則未致之業也安得便以聽請奏免遣使者毛莫如考驗毛莫如當作屯莫如後李尋傳同業復上書言王氏世權日久至幾為姦臣笑此因哀帝素惡王氏之専故為此奏與請為恭王立廟同耳觀其所薦者朱博可以得其情矣贊自謂唐杜苖裔豈其然乎自謂唐杜苖裔史家之微辭也蓋謂推其故而不得張騫傳誠得而以義屬之至天子欣欣以騫言為然慕虛名被實禍由來為此數言致敗亡者多矣後二年騫為衛尉至漢擊走單于於幕北序此見漢武通西域本不為共擊胸奴騫以失職要功逢迎成之復置大夏而通烏孫其勞費遂與西京相終始焉誠以此時厚賂烏孫至則是斷胸奴右臂也騫所謂斷丐奴右臂者指招烏孫居祁連敦煌間故地而言多持節副使道可便遣之旁國於道中騫得便宜遣其副也後嵗餘其所遣副使通大夏之屬者至外國由是信之西域之開自騫導之故於其傳終言漢武以兒戲敝中國以深著其罪也豫節至以廣其道如此則生事外夷無所不至矣李廣利傳往來二嵗至敦煌士不過什一二讀之使人悲歎張騫之罪不下江充也桀令四騎士縛守詣大將軍將字衍文如注强為之說耳下同軍還入玉門者萬餘人馬千餘匹六萬人生還者萬餘人馬三萬匹還者千餘匹牛十萬驢槖駝萬數皆無一存者其所得則善馬數十匹而已豈不痛哉後行非乏食至以此物故者衆亦非獨將吏不愛士卒以侵牟物故絶域往返死者必衆西域傳所載杜欽語得之矣乃下詔曰胸奴為害久矣至畢陳於闕前張騫傳中云並南山至鹽澤空無胸奴胸奴時有候者到而希矣所以為此詔起本深明其事不實而兵為得已也使是嵗積雪則六萬人之歸者能什一乎贊禹本紀言河出昆侖至惡睹所謂昆侖者乎昆侖析支亦禹貢所載山川不容以為無有但不如禹本紀所言耳日月所相避隱近佛氏須彌山之說司馬遷傳其在周程伯休甫其後也當宣王時官失其守而為司馬氏詩常武王謂尹氏命程伯休甫毛傳尹氏掌命卿士程伯休父始命為大司馬正當宣王之時已失典司天地之守故僅以時王所命之官别為司馬氏也天厯始改謂自此初用夏正也春秋文成數萬史記裴駰注云太史公此辭是述董生之言董仲舒自治公羊經傳凡有四萬四千餘字故云云其說得之故易曰差以豪釐謬以千里禮記經解篇易曰君子慎始差若豪釐謬以千里則非獨易緯有之孔氏正義以為繫辭之文固無明據小顔於此直云易家别說亦未盡也十年而遭李陵之禍十年史記作七年徐廣注曰天漢三年作七為是漢興蕭何次律令至太史公仍父子相繼饌其職又叙當代文獻足徴以見述而不作之意仍推本先世以終前文之緒而十篇缺有録無書注中所云兵書即謂律書也太史公自序甚明謂亡失與本無者皆踈迫季冬迫季冬謂恐行法也時安為北軍使者坐受戾太子節當要斬奈何令刀鋸之餘薦天下豪俊哉袁繼咸云負絶代良史才寧賤辱自處以杜奄宦擅政用人之漸其為天下萬世慮尤深逺矣僕以為戴盆何以望天如淳注言已方有所造不暇修人事也師古曰言營職務耳未論造書也按造書即其職務下文亦自云草創未就適㑹此禍則如說是也贊此贊即叔皮之論據左氏國語采世本戰國策述楚漢春秋接其後事訖於大漢可見作史雖欲網羅放失實亦無取乎雜駮武五子傳戾太子據德懼為師傅并誅至太子將不念秦扶蘇事耶因懼并誅遂教太子以反鄙夫始為身謀不顧禍及宗社往往如此壺關三老茂師古引荀恱漢紀云令狐茂按後漢郡國志注中引上黨記作令狐茂疑又在荀紀之後廣陵厲王胥使所幸八子郭昭君太子止有妃良娣孺子三等皇孫止有家人子今藩國乃有八子之號未詳昌邑哀王髆揚州刺史柯奏賀至今見為侯柯廖皆刻薄小人不知國體沾沾以虐無告取媚於上元帝復封賀後善哉賀不堪玉天下身既廢黜髆則何罪并斬其一國之祀也海昏之嗣歷莽世至中興不絶異哉贊秦始皇即位三十九年至信矣舉秦以見漢之得禍未極猶有幸焉痛其詞以著戒也嚴助傳郡舉賢良吳人舉賢良自助始且秦舉咸陽而棄之何但越也利口遂開黷武之端其不以令終也宜淮南王安上書諫一篇安之上書特以博名髙而不出於誠故其詞過於煩侈越人欲為變至乃入伐材治船盧循入寇亦先於豫章作伐材治船之計凡此書所載皆字字實録今古可以施行者也因其弱弟餘善以成其謀至故使臣助來諭王意助適㑹天幸淮南之言乃常道也後有妄思立功安南諸國者不可不取諫書深味之助由是與淮南王相結而還助以此舉尤為武帝親任豈知與淮南相結他日禍胎已在此乎稱春秋天王出居於鄭不能事母故絶之引經不倫廷尉張湯爭以為助出入禁門至後不可治湯誅助宏誅解皆合法意朱買臣傳召見說春秋言楚詞春秋楚詞漢初吳㑹之學主父偃傳乃西入關見衛將軍衛將軍數言上衛將軍不推薦士乃獨言主父偃於上何也今諸侯或連城數十至以地侯之此策用之一時可以稍殺尾大之勢久則諸侯分割太弱不收封建之效矣宜隨時補救過此惟有功德於民者始得推恩子弟地不足者稍益以世絶而地入王朝之故封乃善耳彼人人喜得所願人人喜得所願管子所謂令出當如流水也朝賈謀國巧拙之判如此茂陵初立至此所謂不誅而害除上因賈生之智此則祖劉敬之策已行而人不至驚擾生亂故可用也非其時則不可尊立衛皇后及發燕王定國隂事偃有功焉偃固有以報衛氏矣偃盛言朔方地肥饒至本偃計也前諫伐胸奴此何以議置朔方前書云地固澤鹵不生五榖轉輸率三十鍾致一石此何以復云地肥饒內省轉輸戍漕豈非進由衛氏衛將軍始取其地故偃變前說以建此計乎雖然秦漢既都關中不取河南置朔方則逼近寇戎偃之計不以私故詘偃服受諸侯之金實不劫齊王令自殺上欲勿誅欲勿誅者上以偃策本以銷弱諸侯明不受金也偃不承齊事而服趙王使人所告對獄甚巧齊王自殺無後至乃遂族偃偃有迫劫齊王之非一死固當且因趙王所告而得禍亦使諸侯不自疑為己見削弱宏議未為失也族誅則漢法之過嚴安傳臣願為民制度至和之至也承文景之積若使不喜功生事實行斯政則既冨加教三代之俗可致也安書意雖未密而頗見大體今天下煆甲摩劍至非宗室之利也安意蓋指連年征伐五大在邉恐一朝有末大於本之患又懼觸貴臣之怒故借郡守言之然東漢末祀之州牧唐中葉之蕃鎮亦如燭照數計矣不敢斥言天子故曰宗室終軍傳臣聞詩頌君德一篇無補於用而極精鍊麟之是非不可知只就本事推論功德徵應諛而不入於僞王褒傳詞賦大者與古詩同義至賢於倡優博奕逺矣此論自非六代之君所及知此者又何病乎辭賦也然何如崇尚經學則治理明風俗亦淳厚後方士言益州有金馬碧雞之寶至上閔惜之褒以往祀金馬碧雞病死於道自與得賢臣頌篇終託諷之意反所以為詞人也賈捐之傳於是還馬與道里費文帝還馬而仍與道里費其通人情若此乃所以為至誠也當此之時逸游之樂絶至廟稱太宗元帝既好聲色貨利而當日所以必欲擊定其地者亦為珠犀玳瑁可貪後宫近幸皆得以撓外庭之議故舉文帝之事預拄之丞相于定國以為前日興兵擊之連年至捐之議是定國主捐之之議復活數萬人隂德過於治獄矣捐之即與興共為荐顯奏君房荐顯比之君明不密又下一等興減死罪一等髠鉗為城旦成帝時至部㓨史成帝時諫大夫楊興嘗與博士駟勝對黃霧四塞終日咎由太后諸弟以無功封不知即君蘭否東方朔傳三冬文史足用文史足用謂史書足得九千字以上可用以應試也後乃私置更衣周禮天官內司服有女御二人縫人有女御八人注家云有女御者以衣服進或當於王廣其禮使無色過漢置更衣蓋本於此然豈謂在外囿游皆是哉衛子夫以更衣得幸亦主家循宫禁之事而失之者也願陳泰階六符注中應劭所引黃帝泰階六符經與今之占三台者異令中府曰董君所發至乃白之竇太后崩遺詔盡以東宫金錢財物賜長公主嫖豈知乃以佐其淫縱如此耶東司馬門更名東交門蘇林注曰以偃從此門入交㑹於內故以名焉按東司馬門後已更名故自疏之不如蘇說也是後公主貴人多踰禮制自董偃始如蓋主近幸子客丁外人皆武帝啓之也陽石公主與太僕公孫敬聲私通事在武帝存時著於竹帛著讀陟略反昌黎詩吾老著讀書本此故曰水至清則無魚至則敏且廣矣此望武帝知之不盡而言明有所遺者君道固然或有遺行獲在所恕不亟勸我以大官者亦所以待其自得非棄之也今則不然至為天下笑張湯譖顔異被誅隂擠狄山死地汲黯亦以直廢朔之言皆藥武帝之病也贊而後世好事者至故詳録焉此傳詳著其事者不欲異端之徒得假託於朔非㓨取叢脞以博異聞也六代史家知此者鮮矣劉屈氂傳㑹侍郎莽通使長安莽通即馬通及北軍使者任安至皆要斬任安田仁皆出衛將軍府故坐太子事死車千秋傳此髙廟神靈使公教我千秋髙寢郎又自言白頭翁教之言故曰此髙廟神靈使公唯將軍留意即天下幸甚終不肯有所言千秋徒以智免而偷者遂謂果當如是則焉用彼相乎楊敞傳敞夫人遽從東箱謂敞敞夫人是後妻非司馬遷女觀下子幼傳中後母無子之文可證真人所謂鼠不容穴銜窶數者也真人猶云誠若人言也李竒注非總領從官中郎將光祿勳所領皆宿衛士故曰總領從官陳萬年傳所居以殺伐立威至其廉不如咸當入酷吏傳或附嚴延年傳末咸數賂遺湯至死不恨復行賄咸晚節掃地矣胡建傳守軍正丞以軍正之丞故係正言之猶上卷言廬江太守丞非兼守正丞二官也故下云丞於用法疑朱雲傳年四十乃變節至當世以是髙之成帝以後士皆依附儒術容身固位志節日微卒成王氏之篡故史家於朱雲深有取焉特為立傳蓋激於張孔之徒爾今嘉從守丞而圖大臣之位至嘉竟坐之貢禹雖賢然為石顯所荐朱雲好大節又從蕭望之受經此固顯等所畏惡也衡之對嘉之坐其或有使之者歟坐故縱亡命故縱亡命是猶通輕俠之餘習也臣願賜上方斬馬劍至安昌侯張禹當建武之後追思元始之代群公頌莽功德天下風靡思一見朱雲者何可復得此天下傳述雲名如雷如霆且過其實而梅福於孤逺訟王章之寃譏切王鳯不顧有公卿側目而視之元舅其言皆開通天下忠臣誼士之憤悶世亦遂目之以為仙也一上書而至今骨不腐矣仙以長生久視乎哉勤苦治經不一行其要然則止以供其為侫而已侫臣之名自匡衡以逮劉歆之徒一言以蔽矣梅福傳聖庶奪適聖庶奪嫡語乃不根福此心拳拳恆在本朝然論則迂矣云敞傳初章為當世名儒至京師稱焉鉤黨始自王莽非起於桓靈時也千餘人乃獨得一敞可厚責之弟子哉贊觀楊王孫之志賢於秦始皇逺矣漢諸陵無不為赤眉所發故班氏特追稱楊王孫之志立傳以諷曉當代其言始皇所謂借秦為喻不敢謗議上及山陵也霍光傳出入禁闥二十餘年至甚見親信博陸武鄊皆以謹慎受遺寄命止畫室中不入或云畫室即武帝畫周公負成王朝諸侯以賜光光奉之於室中也遣行大鴻臚事少府樂成至迎昌邑王賀史樂成光所親信故首遣之丙吉亦故大將軍長史也始至謁見立為皇太子先立為皇太子則無明世宗不父孝宗之變矣此舊儀不可不素講也就次發璽不封今各官用印隨必緘封蓋亦古制大將軍光送至昌邑邸自送至邸防其自裁或他人承望意指逼之使死致負謗於天下此亦皆光之謹慎也不審其素行於置後之始此則不學為之光悉誅殺二百餘人至反受其亂誅其尤無誼者而流放其餘可也悉誅二百餘人不已濫乎然觀其臨死之言則昌邑群臣亦謀為變光微覺之不獨以其行淫亂而憂悶改圗史家使人得諸言外爾自昭帝時光子禹及兄子雲皆中郎將至根據於朝廷光懲燕王上官之難故使其子孫黨親典兵居中以自衛不思時勢遞變權重勢逼滿盈致禍又基於此矣蓋不涉學之患也初光愛幸監奴馮子都至與子都亂霍氏之禍皆起於顯而其萌芽則以婢為後妻也故治國者先正家使蒼頭奴上朝謁上謁猶今鴻臚所收職名上令吏民得奏封事不關尚書群臣進見獨往來上下之情通則權復歸王室矣光大驚欲自發舉不忍猶與光何惜一婢不令宗祀血食乎惜也不聞於古有大義滅親者窮侍醫之獄討顯以謝上徒跣自拘勿復與政歸老博陸此人臣分所當然也更以禹為大司馬冠小冠亡印綬至悉易以所親信許史子弟代之先收其兵權人人自使書對事對或作封誤也後因尚書屏不奏乃上封事耳盡奏封事輒使中書令出取之不關尚書使中書令出取不關尚書一時以防權臣壅蔽然自此浸任宦豎矣成帝以後政出外家有太后為之內主故宦豎不得撓不然霍顯之後必有五侯十常侍之禍人君權宜之制偶然一用事過隨復舊章乃不至左右近習得以干政耳長安男子張章告之禇先生建元以來侯者年表後續記云張章故潁川人為長安亭長失官之北闕上書寄宿霍氏第舍卧馬櫪間夜聞養馬奴相與語言霍氏子孫欲謀反狀因上書告反見其竈直突突當作式林反與突字窔字異義玉篇所分甚明金日磾傳日磾母教誨兩子甚有法度一胡婦耳能教子從國破家亡沒身厮養後復獲七葉珥貂之福日磾固材興家豈不自內始哉日磾以帝少不受封以帝少不受封安得來王忽自相貴之謗大將軍識不逮也霍氏有事萌芽上書去妻霍氏事關弒逆當以義斷恩欽因緣謂當至欽自殺王莽方殺其子於姨母及姨母之子何有欽自背典禮宜其及也邯雖以逢迎時宰然其言也直亦欲為父立廟不入夷侯常廟比例將必至此不為深文獨罪欽而不及當此獄尤頗欽即罪當削户南不得稱太夫人可也贊昔霍叔封於晉晉即河東光豈其苖裔乎昭宣之際有推霍光為霍叔後者其語殊怪謬足纍光之誠節詳見史記三代世表後禇少孫所記班氏特略舉於贊中以傳疑亦兼以為微戒云元康四年二月河東霍徵史等謀反誅蓋必光之族人亦任章之流也義門讀書記卷十八

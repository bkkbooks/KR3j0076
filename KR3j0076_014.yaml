body:
  text: 義門讀書記卷十四翰林院侍讀學士何焯撰史記伯夷列傳此七十列傳之凡例也本紀世家事迹顯著若列傳則無所不録然大旨有二一曰徴信不經聖人表章雖遺冢可疑而無徴不信如由光是已一曰闡幽積仁潔行雖窮餓巖穴困頓生前而名施後世者如伯夷顔淵是已太公曰此異人也異作義管晏列傳倉廩實而知禮節至因而去之一部管子數行盡之事齊靈公莊公景公鈍吟云以一心事三君晏子之節也此一句大有關係贊鈍吟云傳內事亦出管子但不敘其書直撮略其行事文甚有裁製老子韓非列傳震川云太史公列傳或數人合傳皆聫書不斷今合讀之尤見其竒近時刻本每人界斷必小司馬之陋也鈍吟云道德之言流失有二莊子放蕩晉人尚虛浮而亡申韓劖刻秦人尚刑名而亡太史公以莊子申韓同傳有旨哉小司馬不知也諡曰聃此諡曰聃亦諡曰洞簫之諡非易名也乃遂去至關抱朴子云遇尹喜于散關或以為函谷關申不害篇本于黃老而主刑名刑作形韓非篇喜刑名法術之學刑亦作形人或傳其書至秦傳作得孫子吳起列傳孫子武者齊人也吳越春秋云武吳人也吳起篇以事魯君魯君疑之二魯字衍伍子胥列傳鈍吟云孟子疏有西施事引史記今本無之知此書已為宋人刪削矣按孟子疏乃南宋一邵武士人偽作非北宋孫宣公為之恐不足據或所引者他書誤以為史記亦未可知也彼見求之并禽求作來仲尼弟子列傳顔回者魯人也字子淵少孔子三十嵗閻云三十下當脫七字蓋生于魯昭公二十八年丁亥卒于哀公十二年戊午方合三十二嵗之數曾蒧字晢震川云按蒧古點字聖門有三蒧曾蒧公西蒧奚容蒧也月離于畢俾滂沱矣震川云月離于畢他書有明言其故者此不明言蓋妙處正在不説破商君列傳事魏相公叔座為中庶子座諸本俱作痤蘇秦列傳城方二千餘里城作地據衛取􅀈巷巷作卷臣竊以天下之地圖至豈可同日而論哉震川云所以言從之利實擇交而得之意夫衡人者至願大王孰計之震川云所以言衡之害實擇而不得之意當敵則斬堅甲鐵幕案索隱幕字絶句顧朗仲云斬字絶句謬也今王秦仇讐以伐援國秦作奉封曰凡天下戰國七封作對張儀列傳秦西有巴蜀至此其勢不相及也得蜀則易于舉楚古今形勢同也陳軫篇主以其言為然主作王穰侯列傳白起者穰侯之所任舉也此武安與應侯不平之根王翦傳始王聞之王作皇王翦至堅壁而守之亞夫祖之以破吳楚即髙祖之于黥布亦然也至鄿南鄿作蘄孟子荀卿列傳鈍吟云此篇總敘諸子前篇言老子附以莊生申韓不同老子于諸子且窮其流失也商君秦之所以興亡有事業故别敘韓子只敘其書申子事不詳只與韓子同論小司馬不知也作王運王作主淳于髠篇豈寡人不是為言耶是作足荀卿篇楚有尸子長廬長廬一作長盧正義曰長盧九篇阿之吁子焉吁别録作芋子孟嘗君列傳嬰卒諡為靖郭君亭林云以號為諡猶之以諡為姓皆漢初時人語也呂不韋傳諡為帝太后與此同王褒賦幸得諡為洞簫兮亦是作號字用人人各自以為孟嘗君將親己本無將字平原君虞卿列傳明日嬖者至平原門嬖作躄虞卿篇趙王召樓昌亭林云樓昌樓緩恐是一人虞卿進説亦是一事記者或以為趙王不聽或以為聽之太史公兩收之而不覺其重耳開關通弊弊作幣魏公子列傳于四君之中獨書之曰魏公子者以為國之存亡所係也偏贊賔客偏作遍而公子親往車騎往作枉如姬資之三年資之謂以資財求客報仇春申君列傳王又割濮磨之地磨新序作歷本一字磨乃傳寫之誤其于楚王之為帝有餘矣楚索隱本作禁云楚誤左施以東山之險左作王春申君相楚八年為楚北伐滅魯黃歇滅魯殄周公之祀卒就誅夷固天道也范雎蔡澤列傳為其割榮也謂能割去素所尊榮之人索隱之説非也贊范雎蔡澤所為一世辨士世作切樂毅列傳襄王使樂乘伐廉頗伐作代贊其本師曰河上丈人本師猶言祖師廉頗藺相如列傳趙奢篇趙奢曰胥後令邯鄲邯鄲二字當為欲戰李牧篇滅簷襤簷作襜魯仲連鄒陽列傳鄒陽篇繫阿遍之辭哉遍作偏屈原賈生列傳漁父見而問之鈍吟云詹尹漁父皆實有是人非若後人文字之寓言也賈生篇鈍吟云太史公敘賈生惟載二賦不敘其新書以賈生繼屈原傷其遇并重其詞賦與漢書異意而賈嘉最好學世世其家衍一世字贊又怪屈原以彼其材云云即賦內歷九州二句謂賈生怪之也爽然自失亦謂賈生更不下一語含蓄無盡呂不韋列傳見而鄰之曰鄰作憐刺客列傳曹沫篇曹沫之事亦戰國好事者為之春秋無此風也况魯又禮義之國乎聶政篇重自刑以絶從按徐注絶從讀如字荆軻篇被有善有不善被作彼李斯列傳而詬莫大于卑賤而作故丞相謬其説絀其詞云云始皇有子二十人而無尺地之封故其後趙髙得乘其孤立行其易置樹子之謀其禍固始于李斯破淳于越之議也詳敘于始皇本紀中而李斯傳復備載始末正為後半血脈遣胡亥客奉書賜扶蘇與上郡與作於故吾願賜志廣欲賜作肆謂之為桎不亦宜乎桎下有梏字先生之時生作王蒙恬列傳中軍府令趙髙常從軍作車隂用荆朝之謀而倍秦約朝作軻張耳陳餘列傳兩人對曰夫秦為無道云云鈍吟云酈生説漢王立六國後張良以為諫至石勒以為此法宜失張耳陳餘説陳涉立六國後當時不從以為失䇿何也蓋陳王初起慮在亡秦而已法宜樹黨漢方與項羽爭天下又立六國反覆不可一是樹敵也其勢變不同耳張耳與陳與相見陳與作陳餘項羽亦素數問張耳賢問作聞陳餘多説項羽曰陳餘下有客字念諸侯無可歸者者下有曰字留傳趙王傳作傅今王事髙祖甚恭此與下髙祖二字俱誤當從漢書作皇帝及封張敖他姬子二人為樂昌侯為上有夀字黥布列傳漢王曰孰能為我使淮南亭林云當云使九江歸漢後乃封淮南王也蓋採之諸書其稱不一淮隂侯列傳廣武君季左車季作李則諸侯謂吾怯而聽來伐我聽作輕未至井陘口三千里千作十止舍夜傳發夜下有半字且信非得素拊循士大夫也六句鈍吟云信所將非素所拊循也兵不為用與驅市人同耳戰國之後民猶習兵諸將灌嬰曹參之流百戰之餘非真市人也故背水而陳得以用之若市人也有相擠而入水耳烏能使之殊死戰乎不可不察也牧野之事太公背洹水向山坂信學之也因請立張耳為趙王以鎮撫其國鈍吟云破趙立張耳撫之破齊亦不得不自立時齊王尚在楚兵雖敗齊反覆之國非王無以鎮之信亦實語也漢王出成臯一段鈍吟云漢使至韓信必有證驗故漢王詐稱使者入信軍偏裨皆漢將故漢王得麾召易置之非他國敵人所能為也宋人不知兵種種妄論可笑范陽辨士蒯通説信先云范陽辨士蒯通後云齊人蒯通一傳互異漢王亦悟人見漢王轉換之捷不知太史公用筆入神也他人不過曰漢王怒良平諫乃許之如是而已時乎時乎不再來無下乎字韓信猶豫不忍背漢鈍吟云韓信自負其能已據千里擁強兵漢即忌之無如之何且忠信而多功取之無名若背漢豫楚楚不可必以一身支二雄其事難為與漢滅楚長王千乘信以為便此所以猶豫也信持其首謁髙祖于陳鈍吟云信反必用鍾離昧斬昧其不反自明然髙祖欲取信不反亦不免自解無益此信之失也陳豨拜為巨鹿守辭于淮隂侯一段震川云陳豨事疑出告者之口按必相國與呂后文致之者鈍吟云陳豨以賔客盛為周昌所疑髙祖使案其客始反耳未必素有逆謀且豨以信幸為趙相國將兵居邉非韓彭之儔有震主之威據大國者也何為先自疑而有反慮乎韓信處嫌疑之地輕與一陳豨出口言反此亦非人情信以淮隂侯家居雖赦諸徒奴合而使之未易部勒也上自出關中雖虛未能全無備亦不可信也論者却未及此又云太史敘彭越直云呂后使舍人告之敘淮隂則詳其反迹贊語亦以為真反也又功臣表告英布反者賁赫封期思侯告韓信樂説封慎陽侯不聞告彭越者亦不同也韓王信盧綰列傳胸奴復聚兵樓頓西北頓作煩陳豨篇及髙祖七年七月作十年贊是以日疏事危事作自張丞相列傳申屠嘉篇劉舍為丞相舍作含陸賈傳陸生竟以夀終在兩傳中間不可無此句朱建篇陸生素與平原君善此篇仍歸重陸生贊至平原君子與余善標目不列平原蓋附書也謹嚴如此劉敬叔孫通列傳鈍吟云秦人廢三代之禮樂漢髙馬上得天下先王之制崩壞廢缺有間矣爭功殿上妄呼拔劍擊柱何異劉盆子時此不可旦夕安矣夫自古以來開國承家有百年之內全不立上下儀制者哉且叔孫未嘗興禮樂直一時權宜定儀法使君臣上下略有節度如此至于百年庶幾可興三代之禮樂耳濶哉二生真腐儒也鼂錯傳七國之反人情皇皇未知成敗關中已搖矣而朝廷無骨鯁之臣可以託腹心者錯不信列侯恐任之將兵或與吳楚連和即不然戰有利鈍則有章邯降楚之事故欲天子自將又關中不可空虛故欲自居守此其計出於不得已也錯不自將者恐身出而讒言至一有撓沮更易則敗矣蘇子瞻之論未得其情也然觀錯舉措亦自不能辦矣始言削吳既乃言以徐僮之傍與之此何説哉直欲媚吳冀其自止耳景帝當時同心之臣任事者祗一鼂錯一得袁盎之言不謀而誅之臨大難者可以如此耶當日君臣以刻薄為事天下叛之宜亡國者也不亡直幸耳萬石張叔列傳雖齊魯諸儒質行質對也比校其內行慶于諸子中最為簡易矣猶然如此猶然作然猶田叔列傳褚先生補傳敘事甚佳贊不稱與任安事不合疑錯誤扁鵲倉公列傳與百神遊于鈎天鈎作鈞橋引案杌橋作嬌太倉公傳臣意年盡三年三十九嵗也亭林云按徐廣注髙后八年意年二十六當作年盡十三年三十九嵗也脫十字病得之流汗出潃滫作潃即為藥酒盡三日日一作石故胸滿汁出伏地者汁作汗有數者能異之能作皆吳王濞列傳錯為御史大夫説上鈍吟云鼂錯無謀之人其言云吳削亦反不削亦反似也然既知吳當反宜先有以備之則吳可削也及其舉事反聞一無所施乃欲以徐僮之傍所未下者與吳不反則削之一反即益之此何説哉錯有可死之道四行事無次第一也官不過內史任事又淺不為天下所服一旦取祖宗之法令紛更之公卿列侯宗室人人不平錯何以自安輕脫無術二也當時處心積慮而反者只一吳耳諸侯王無與也宜先施恩慰安之使人人自保則吳人無黨欲反不能獨舉吳乃可滅吳滅則七國在掌握矣先削楚趙膠西何耶是動天下之兵也不知時三也李斯商君以刻薄變詐取天下當列國之相爭也漢有一統之天下宜恩威並濟以公道行之列國雖強大難制然漢之骨肉同姓天子之藩輔呂氏之禍亦賴于諸侯也汲汲求其罪如與之有讐者為天下當如是耶此與二世之行督責何異不知人無黨四也一時名臣將相漢所以平七國者更無一人為錯所厚可知其無所知矣錯者一天資刻薄讀書不解事之亂臣耳誅之恨不以罪然千古更無一人能言其失者吾不知何也鼂錯因言楚王戊往為年薄太后服私姦服舍為年作年為魏其武安侯列傳灌將軍篇引繩批根拫音痕當作拫誤作根灌夫亦時丞相隂事時作持武安起為夀一段敘鴻門易此際難御史大夫韓安國曰上只撮敘五語即及兩人相毁却于韓大夫口中補敘則一時廷辨乃不寂寞無色後不敢堅封封作對上未有太子云云梁與淮南事首尾亦相映以見兩人之賢否鈍吟云魏其言丞相短不及淮南王事何耶豈魏其終長者不忍出此此君子所以往往困于小人也贊音被惡言音作竟韓長孺列傳安國持重持重二字是眼目將兵繫卻吳楚繫作擊李將軍列傳以李將軍次胸奴傳前見北邉非將軍不可寄管鑰惜乎其不善用之也于是乃徙為上郡太守徙上郡太守當是欲敘胸奴入上郡事故先書此句其實為隴西北地雁門代郡雲中乃徙上郡也胸奴列傳與胸奴間中有棄地莫唐千餘里唐作居故冒頓常往來侵盜伐地伐作代文帝以中尉周召郎中令張武為將軍召作舍孝文帝後二年使使遺胸奴書備録和親詔書繁而不殺窮兵黷武之誡隱然言外于贊始微及之二主已和親主作國贊不參彼己將率鈍吟云參彼己者即兵法云知彼己也注引詩彼己之子似失之下即繼以衛霍公孫宏而全録主父偃諫伐胸奴書太史之意深矣此贊以定哀微詞發端當知此意衛將軍列傳敖與壯士篡取之敖字衍敗韓將軍軍安國也封蒲泥封作討而驃騎尚穿域踏鞠踏鞠二十五篇漢書附兵家技巧中長平侯伉伐侯伐作代李息篇出代從三嵗從作後公孫敖篇復以因杵將軍杵作杅贊衛霍將略太史公不之取也此論却許其能知時變以保祿位非以示譏平津侯主父列傳是章朕之不得也得作德主父偃傳衛將軍數言上書不召書作上何征而不服乎載載作哉乃遂族主父偃公孫宏以議朔方族主父二人合傳猶之袁盎鼂錯也南越尉陀列傳侍諸侯變侍作待别異變夷變作蠻東越列傳令諸校屯預章梅嶺預作豫朝鮮列傳許其軍以報天下下作子天子誅逐逐作遂西南夷列傳冉駹為汶山郡注應劭曰今蜀郡岷江鈍吟云岷江當作汶江司馬相如列傳所不足者非材也財宋本作材古假借字也文君及與相如歸成都及作乃鶩乎仁義之塗鶩作騖且夫王事固未有不始于憂勤事漢書作者其進仕宦進作於勇期奮育奮作賁斯征北僑斯作厮北作伯其遺札書言封禪事鈍吟云封禪古禮也自宋真宗以矯偽舉其事儒者諱言之遂以此為人主失德之舉古道之廢于宋非一事也可勝歎哉後世雖有周成王漢光武不敢行矣續韶夏韶作昭故軌於夷易易遵也於作迹贊揚雄以下二十八字係漢書贊語一本削去淮南衡山列傳丞相臣張倉倉作蒼士五開章五當作伍淮南王安傳塞環轅伊闕之道環作轘收太平之賦平作半伍被自詣吏因告與淮南王謀反鈍吟云伍被與王造反謀實也雅辭稱漢美語皆出于被蓋為此詞希望得不死耳非實也史公敘此甚明衡山王賜傳王又數侵人曰曰作田以為淮南巴西巴作巳及太子爽王后不孝作及太子爽坐告王不孝循吏列傳鈍吟云所列循吏五人略其事實有空敘有敘其逸事者止寫性情氣度而循吏一片惻怛湧現太史公曰法令云云鈍吟云此敘亦刺時之言孫叔敖篇三去相而不侮侮作悔子産篇不用左傳公儀休篇見其家織好布本作布好鈍吟云太史公敘循吏而本朝無一人焉以為循吏必如古諸人則可若漢書所載太史公猶以為未慊耳不然文翁在景帝時何不存之耶又云太史公敘子産孫叔敖二君有政事勳業皆不敘濶略僅數語若曰為吏當如此也二君一邦名相當與管晏並傳此敘循吏非為二君作傳也與漢書不同汲鄭列傳鈍吟云汲黯傳多敘公孫宏張湯之過失遊狹任氣節狹作俠然黯見蚡未常拜常損之損作揖贊一貴一賤交情乃見北雍本作交態乃見葉石君云循吏傳後即次以汲黯其以黯列于循吏乎何太史公深得春秋之旨所謂定哀之際則微也武帝好為更張黯尚無為之化而以鄭當時附之蓋當時尚黃老言亦無為云豫嘗讀二漢書班有循良傳蓋指武宣時之刻核而表揚之以為循良之難得也范則如杜詩之儔皆置之列傳蓋光武明章之代吏皆謹慤不必另立名目也此又史家論世深旨法太史公而妙者也儒林列傳尚書不列孔安國傳其書未列于學官也申公篇令申公傅其太子戌戌作戊無傳疑者則闕不傳疑字下重一疑字伏生篇鈍吟云衛宏云伏生老不能正言言不可曉使其女傳言教錯齊人語與潁川多不同錯所不知者凡十二三略以意屬讀而已按此言妄也濟南潁川相去不至甚逺青之與豫何至語言不通俗言語或有小小異同書是文字何至以土語傳受妄一也伏生有孫亦必有子使女授書二妄也濟南張生千乘歐陽生自是伏生弟子其書不出朝錯錯雖十不得二三張生同郡人必得真本三妄也史云秦時藏書壁中至漢定乃得十九篇是伏生已有本不假口授四妄也伏生口不能正言未聞喪明朝生受書必應寫本伏生豈不一視五妄也顔籀載此言于漢書注使宋人因此生疑竟無辨者不可解也按此條辨證精核有功于今文尚書當如三劉之例附見漢書葉石君云儒林諸公皆取其廉直而異于公孫宏者太史公以為武帝雖好文學而所重者公孫宏張湯而已張固刑名法律而公孫宏乃曲學也適足以亂道而聖人又不在區區書卷間故命之曰儒林而已此蓋對公孫宏而發下卷酷吏則為張湯而發矣其次第條理不爽毫髮如此太史公受學于董仲舒仲舒之學具于天人三策兹不載之非故抹煞也蓋太史公之意一本于春秋所以救時之失三䇿雖合于正道而當時不能行之班固所以載之者蓋謂國家有如此學術正宜表章同一史也而立意各殊不得雷同視之鈍吟云漢興文學於焚書之後學官所立各有大師傳之有本敘中甚明非取廉直也公孫宏漢相有功業自宜特傳此非不取也廣厲學宮仲尼之道興千古之美事也用酷吏一代之大失也乃云太史公為張湯公孫宏不亦末乎子長不善張湯公孫宏則有之矣非作傳之本旨也聖人不在書卷宋儒之言周程以後方有此學問子長時無之也又云傳中兩言公孫宏側目轅固排董仲舒皆刺之也酷吏列傳寧成篇出從數千騎千作十趙禹篇吏傳得相監司司似當讀為伺謂互相監察也張湯篇受而著讞決法廷尉潔令漢書作挈令揚主之明云云傳敘張湯不沒其善是湯益尊任是上有於字買臣楚士深怨漢書地理志云本吳粵與楚接比數相并兼故其民俗略同當日目買臣為楚士者此也義縱篇遷為長安及長安令上長安作長陵而平氏朱強杜衍杜周漢書注平氏杜衍二縣名掩定襄獄中重罪輕繫二百餘人輕繫即注中解脫桎梏鉗赭也然取為小治取音趨上幸鼎湖病久湖當作胡王溫舒篇以治獄至廷史廷下漢書有尉字擇郡中豪敢任吏十餘人任漢書作往失之旁郡國梨來梨來漢書作追求徙諸名禍猾吏與從事徙諸作徒請楊僕傳以牧司姦盜賊牧應作收本漢書其吏多以權富權下漢書有貴字光祿徐自為曰光祿下漢書有勳字尸亡去歸葬尸亡去亭林言家人竊尸而逃也漢書作妻亡去歸葬諸輔都尉輔漢書作部非也百官表左右京輔都尉屬中尉減宣篇詆罪以為大逆詆作抵贊抃擊賣請抃作撲大宛列傳初騫行時百餘人去十三嵗騫以建元中奉使至元朔元年從擊胸奴封侯是未及十年此云十三嵗疑有誤然聞其四可千餘里四作西若出其用抵大宛大月氏相屬用作南贊至禹本紀三句不好竒遊俠列傳秦任法律赭衣盈路漢初矯枉過正或漏吞舟故朱家劇孟之徒以豪俠聞而保首領武帝時禁網密矣戰國餘風盡矣郭解不終宜其然矣然非詩書之教相傳者未有不犯世忌太史公引季次原憲而歎之蓋有由哉近世延陵亭林云延陵謂季札佞幸列傳患者則趙同患作宦滑稽列傳贊優頭搖頭而歌上頭字作孟東郭篇故所以同官待詔者以同與王先生篇武帝時徴北海北守下北字作太字西門豹篇三老官屬豪長者異父老皆會異作里以人民往觀之者三二千人以同與皆衣繪單衣繪作繒民可以樂成以同與日者列傳此文學莊子而為之者也託之季主以詆訾當世龜䇿列傳亦以決疑之卜以作有略聞夏殷欲卜者卜下有筮字悖背人道或以悖字讀句褚先生曰云云按此卷但有敘論而無傳故褚先生補之以下乃少孫所補若序論則非少孫所能為也今人概焉忽之惑于索隱有録無書之一言耳下有搗蓍搗古稠字蚗龍伏之蚗龍即乖龍也仰天而視月之光以下用韻五采青黃以下多用韻長于黃土以下多用韻諸侯兵服兵作賔桀為瓦室自桀以前雖天子皆茅茨也河淮以北瓦室尚少其猶古風乎邦福重寶福作福音副者從衣廣韻二十九宥中有此字匡謬正俗引東京賦仰福帝居亦從衣與福祿之福異也神龜知吉凶面骨直空枯面作而卜病者崇曰崇作祟足肣手仰手作首鈍吟云太史公上窮天文下窮地紀中窮人事雖一才一藝無不具載故日者龜策貨殖列于卷末不必有其人凡以有其事者無不載焉褚生或有所補非本旨也貨殖列傳民各甘其食美其服各自以為甘美無羡于外也故善者因之云云宜與平準書對看故待農而食之五句著眼人富而仁義附焉有天下者藏富于民以此千金之子不死于市不死市者知榮辱恥犯法也是以富商大賈五句著眼櫟邑北郤伐翟伐作戎昔咸人都河東咸作唐楊平陽陳西賈秦翟索隱陳蓋衍字以下有楊平陽陳掾此因衍也而民雕捍少慮捍作悍而合肥受南北潮潮作湖果隋螺蛤隋作陏是以廉吏久久更富此下推廣而極言見貨殖不專商賈也今有無秩祿之奉下專言樹牧之利所謂本富也通邑大都約略都邑嵗時資用之數子貸金千貫金下有錢字蜀卓氏之先此下貨殖本傳民工于市易賈市漢書作布任氏獨取貴善善字自當屬上句顔氏漢書注作善富恐非盡椎埋去就亭林云椎埋當是推移二字之誤而田叔以起田漢書作曲而桓發用之富桓漢書作稽冒脯簡微耳冒漢書作胃此皆誠一之所致秉心塞淵騋牝三千豈所謂素封者耶非也備言逐末之利微乎微矣只兩字掉轉與平準書同一杼軸太史公自序乃論六家之要指鈍吟云史談黃老自是漢初之論至史遷當武帝時則重儒矣因物為合合漢書作舍人者生之本也人作神易著天地隂陽四時五行鈍吟云此下方是子長言六經前是史談之言也父子意不同孟堅不分别而并譏之未為審篤也春秋是非秋下有辨字春秋采善貶惡至謬矣鈍吟云太史本意學春秋此巽詞也申呂肖矣亭林云申呂肖矣肖乃削字脫其旁耳與孟子魯之削也滋甚義同徐以為痟者非子産之仁鄭世家獨稱子産之仁無知名二句出孫子圖難于易二句出老子王翥之計翥作翦號令不順順作煩破神連神作祁第七十注敬仲之言與漢書違錯王肅取之非也義門讀書記卷十四

body:
  text: 義門讀書記卷三十九翰林院侍讀學士何焯撰歐文偃虹隄記王得臣麈史云嶽陽西瀕大江夏秋洞庭水平望與天際而洲步無艤舟之所人甚病之慶歷間滕子京謫守是邦常欲起巨堤以捍怒濤使為弭楫之便先名曰偃虹隄求文于歐陽永叔故述隄之利詳且博矣碑刻傳于世甚多治平末豫宰巴陵首訪是隄郡人曰滕未及作而去然則文中云用民力若干及上于朝廷決之三司之語何以書也姑採之以存疑長史云前段敘次又是一法真州東園記只在許君口中作一大段敘出此又分作數次問答逐段零星更不雷同凡記之正面皆從使人口中敘出後半只以望後人不至怠廢發論抒柚特變王彥章畫像記擬書張中丞傳後惜乎舊史殘略不能備公之事長史云用兩語引下其記德勝之戰尤詳長史云先提此句下復插入他語然後接出總撮家傳敘過然後獨提德勝之戰洗發抒寫胸臆公之攻德勝也重提起是時莊宗在魏至已不及矣反襯生色竒在速速在果與四夷相持當務持重李牧之事千古不能易也邊將以輕入屢敗其誤正在速而果耳歐公此論蓋不知事勢之異而慕為竒所謂以口擊賊者也每讀其傳未嘗不想見其人長史云又用兩語引下又得公畫像而拜焉長史云亦先出畫像下復插入寺名所由然後接説畫像至今俗猶以名其寺終人死留名之意而歸重于忠義豈其忠義之節使然歟收前一段而豫尤區區如此者打轉中一段樊侯廟災記鄭之盜至侯怒而為之也先記其事怒而為一篇總破此句禮所謂有功德于民則祠之者歟以下明侯之必不為是以病民而駭之風霆雨雹天之所以震耀威罰以下又見亦非侯之所能為也有司者三字為句猶陳平云有主者蓋聞陰陽之氣至疑有不和而凝結者又從怒字轉出陰陽之怒一層還他個為之者有此方能持論不輕淺不然則喑嗚叱吒至末不直不盡破得倒仍不似村公語末一轉正反復以見其不由于侯却不作煞語故有餘味明因大師塔記亦學圬者傳又言為兒時聞長老語至為太平之幸人為浮屠矣轉搬此等語何為因并書其常語豫者不欲為外氏之説又嫌文太寥落故出此變例然了無真味武恭王公神道碑銘多精彩處而恨其過于煩德用當附王超後刪取此文三之一為傳使士知畏愛而怯者勇至豈多言哉真知兵矣太尉文正王公神道碑銘嘗諭杜重威使無反漢三句鹿門謂此處序得少鬯按此王旦碑也可復煩乎冦凖為樞密使至豈可求耶或謂此事宜諱冦公亦賢相也按冦公既有此不學無術之事生平專主北人擯排南士故歐公不復為之諱爾諸孫十四人書孫幾人而不詳其名晏元獻碑亦然贈太師中書令程公神道碑銘公以謂合而沒其名一時之便後有興利之臣必復增之是重困民也志之他日以搘欲于一條鞭之外議加者可也銘皆發明勞字贈司空兼侍中晏公神道碑銘丁父憂去官至求去官服喪不許起復與不許服喪皆非美事碑中略之可也坐以笏擊其僕誤折其齒罷留守南京明著其事者見罷之非罪爾孫十有三人書孫幾人資政殿學士户部侍郎文正范公神道碑銘敘范吕本末斟酌稱量特微而顯公文之至者公少有大節至吾豈茍哉此段先敘公之志行其後立朝皆事事與其言相符以言事忤章獻太后旨至以全大德見不擇利害為趨舍當太后臨朝聽政時至其事遂已其事遂已四字東坡嘗質之于公以為誤於延州築青澗城至又城細腰胡蘆築城據要害之地有險可守而又營田以足食訓練以足兵先為不可勝以待敵之可勝備邊之長䇿也若寡謀輕舉鮮不敗事公始分延州兵為六將訓練齊整州兵萬八千人一將所訓練三千人人或疑公見敵應變為如何至于是諸將皆服公為不可及見公非不能戰一旦引兵出諸將不知所向機事密至于版築之用大小畢具儲備預戰而賊走追勿過河料敵審公居三嵗至復靈武此見公非止以自守方俟制敵有餘徐規進取初西人籍其鄉兵者十數萬至而紓西人饋挽之勞禦邊非參用民兵不可習其地利知賊虛實又愛護宗族鄉黨人自為戰也然悉黥以為軍則兵休事息不可復為平民而養兵之費亦難以支矣銷兵省運尤公䇿之要者故帶敘于後自公坐吕公貶至遂起而不能止數行中無窮轉折中間吕雖借用公以困公然其事非失舉也故平心而進之可謂得春秋書事之法矣吕公患之凡直公者皆指為黨厲階然朋黨之論遂起而不能止流毒然事有先後三句見公之為政本與更張無漸者不同但為忌者百計撓之耳而嫉公者亦幸外有言喜為之佐佑與前朋黨之論遂起而不能止二句暗接其知政事才一嵗而罷元昊請和而遽召歸邊事不竟其用也參政才一嵗而復出有司悉奏罷前所施行政地不竟其用也皆與公自言其成與否有不在我者雖聖賢不能必相應其為政所至民多立祠畫像文中但詳于言職邊備政地故知七州以二語包之亦公之志也歟收轉有志于天下句贈刑部尚書余襄公神道碑銘孫女五人并書孫女幾人尚書度支郎中天章閣待制王公神道碑銘介介然有仁者之勇君子之剛虛提然若得為黨人公之賜某厚矣此實其剛勇之大者故另敘小人連搆大獄坐貶廢者十餘人即蘇子美事尚書戶部郎中贈右諫議大夫曾公神道碑銘文特遒徑及為曾氏而蒧參元西始有聞于後世蒧古點字史記仲尼列傳如此而亦有所不得載也此句暗太子太師致仕杜祁公墓志銘自杜赫為秦將軍敘杜氏當自杜周始又十有四世岐國公佑顯于唐又九世而至于祁公京兆之杜以何時徙越亦不可無據公治吏事至則簡而易行明敏則易略故審核為難推析豪髮則易煩故簡易為難必使吏不得為姦而已而已猶而後已贈中書令諡文簡程公墓志銘趙元昊死子諒祚立方幼至不如因而撫之此不可不審若彼不肯分反為所笑耳尚書戶部侍郎參知政事贈右僕射文安王公墓志銘郭皇后廢居瑤華宫有疾至以釋天下之疑詳此段郭后之疾已非一日其謂文應鴆之者亦非也端明殿學士蔡公墓志銘往時閩人多好學至作五戒以教諭之對明知風俗句三司開封府世稱省府至遂拜三司使留開封事與三司同敘回應精明句來者有醫來疑作疾資政殿學士尚書戶部侍郎簡肅薛公墓志銘初舉進士為州第一讓其里人王嚴而居其次茅云舉進士何以得讓按舉進士乃漕試也悉除故時王氏無名租王審知據閩時無名租也茅謂即五代王建之後者謬若何而拜乎善于立言湘山野録載此事曰簡肅公關右人語氣明直簾外口奏曰陛下大謁之日還作漢兒拜耶女兒拜耶明肅無答是夕報罷直道當時語極有生氣如歐公云若何而拜耶便無力此并不如李習之作韓文公行狀手段也翰林侍讀學士給事中梅公墓志銘至于咸平景德之際尤為詳焉提筆時邊將皆守境不能出師至宰相有言不可者乃已守境而不出師是承平備邊良䇿若輕舉以致喪敗則事不可為矣但當擇將以任之爾李文靖詘梅詢之請老成碩畫非喜事少年所知也其後繼遷卒為潘羅支所困至而河北之兵解前二邊並提此處雙應還判三司開拆司還朝復直集賢院還朝召為龍圖閣待制還朝入知通進銀臺司還朝已而失職逾二十年至不復言兵矣又將前後一鎖瀠洄有情享年七十有八以終二十六至七十八五十二年白首擯抑結此句有無窮悲慨惟其夀考福祿之隆言所得于斯世者僅夀考爾蓋深悲其不遇也翰林侍讀學士右諌議大夫楊公墓志銘通篇以論兵作主公嘗為御史至貶監舒州酒稅此是公立朝大節故亦另敘拜著作佐郎先總一句又娶王氏太原郡君六孫景略景亮景謨景道景直景彥子見前不重敘尚書刑部郎中充天章閣待制兼侍讀贈右諫議大夫孫公墓志銘初舉進士至再舉進士及第得同學究出身者舉進士不中而以明經出身至八年則再舉而及第也兵部員外郎天章閣待制杜公墓志銘蒙趕率偽將相數十人以其衆降至君即上書引咎既納其降奈何復盡戮之蠻亦人類耳若希範窮走被擒醯之以懾羣蠻可也尚書比部員外郎陳君墓志銘過鳯翔謁其府尹至以謝君俯伏庭下何其賤也責尹慢士何其妄也陳家小兒特紈袴中之無賴子弟耳此何足書尚書工部郎中充天章閣待制許公墓志銘請髙塞粟之價下南鹽以償之似明朝商屯之法太常博士尹君墓志銘趙元昊冦邊至遂以敗死此邊將所當知唐與茅皆喜談兵亦不知斯言為可取何歟而兵法有不得而救者讀李牧傳自見君歎息憂悲發憤至已而以疾卒朝以道作李挺之傳言子漸以哭李過哀而死蓋其中本以時事抑塞適會哭李乃發病也朝之文見賔退録豈其志之將衰不然世果可嫉其如斯亦悲憤亦深逺湖州長史蘇公墓志銘是公極用意之文精神筆力兩到長史云寫子美事見其關係却大其意亦直以史筆自負悲當世無人拯子美于既廢之後聽其一斥不復身後僅賴一婦人能守其文章則所得于斯世者何疏濶耶文章須識變不可執徂徠明允諸例繩之也故湖州長史蘇君有賢妻杜氏或疑起手為失體謂蘇君豈僅以妻重者按宰相杜公壻句難點故先伏在此若至後始見則似范公因杜公故而薦矣作者各有苦心難與村漢道也又號泣于其父曰至皆以書來乞銘以葬內言不出于閫張圓之妻無宗族子方在抱故可以未亡人之辭為請若宰相之女參政之家子又長矣可自言非歐君不可銘其墓耶鹿門議之謬矣其上世居蜀亦欒城之别耶少好古工為文章上已敘過集次文章故此處略帶長史云此句只略敘因已見文集自元昊反兵出無功至乃以事中君長史云通篇只著意重寫此一段亦可窺見公史筆之大槩也集序中所謂意不在子美句于志乃暢言之祁公雖為宰相尚非小人所深忌故先敘范富更張秕政而後帶出坐監進奏院祠神奏用市故紙錢會客長史云奏用二字書法大涵肆于六經而時發其憤悶于歌詩長史云此獨詳其能詩宜豫述其得罪以死之詳而使後世知其有以也長史云以史筆自負銘辭深歎仁宗聽之不聰而不訐露荒孰問兮杳難知此句即屈子天問之意也徂徠石先生墓志銘其氣象甚宏偉然後來廓落之弊亦自此開不如胡先生墓表為穩當而稱情也先生貌厚而氣完至吾勇過孟軻矣長史云提出先生直道取禍處先重寫一大段其遇事發憤作為文章長史云此處虛提既卒而姦人有欲以竒禍中傷大臣者猶指先生以起事長史云死後事倒提在前以竒禍中傷大臣謂朋黨也先生世為農家至乃詩之所斥也長史云敘次事實亦于作詩一節獨用詳寫先生年二十七舉進士甲科石與公同年一甲進士乃作慶歷詩至子禍始于此矣長史云此處實敘先生自間居徂徠發明所以稱徂徠先生及在太學長史云與前為直講相接其斥佛老時文至亦以是教于人長史云插入此段敘其著述及所為教法以是行于已亦以是教于人終前以師道自居之事杜祁公薦之天子至乃直集賢院敘杜韓之薦暗終前欲中傷大臣借以起事安在夫桓魋與臧倉至末長史云公之直亦甚矣故霸州文安縣主簿蘇君墓志銘有蜀君子曰蘇君張云昌黎敘孔司勳法是用有吳延陵季子之墓文法所謂國士無雙也君之文博辨宏偉至可謂純明篤實之君子也張云又提出寫其所以為文因及其人以實其為君子而君少獨不喜學至故號老蘇以别之張云再詳寫其為文之始末蓋其稟也厚四句透出前純明篤實四字初修為上其書至未報而君以疾卒張云然後敘其出處三女皆早卒溫公程夫人墓志銘云長男景先及三女皆早夭幼女有夫人之風能屬文年十九既嫁而卒既不著其所歸而此文又止云三女所未詳也君善與人交四句張云補敘其為人蓋晚而好易至未成而卒補敘著述在晚年者此與卒葬相連故補敘蘇顯唐世實欒城人以宦留眉張云補蔡君山墓志銘吾兄弟始去其親而來京師至何以塞吾親之悲亦用歐陽詹哀詞之意永叔之于韓其尊信蓋亞于六經云梅聖俞墓志銘唐荆川曰一凖貞曜志按視孟志已冗矣嘉祐五年至皆有以賻恤其家敘此者正以哀其窮而不遇知之者如此其衆而僅以詩鳴為可悲也至聖俞遂以詩聞至而聖俞詩遂行天下長史云從其有詩名先寫一段其初喜為清麗間肆平淡至僻固而狹陋也長史云又從其所以為詩處重寫一段其應于人者多帶上段一筆至于他文章皆可喜補此句伏後唐載諸書聖俞為人至可謂君子者也長史云寫其為人仍不脫詩初在河南王文康公見其文至惟梅某為宜亦不報長史云敘其平生遭遇又特提出寫此一段總在能詩處著眼聖俞初以從父廕至纍官至尚書都官員外郎長史云然後總敘平生仕宦嘗奏其所撰唐載二十六卷至書成未奏而卒長史云然後及他著述曾奏御者此與宦迹相連故先敘余嘗論其詩長史云仍以詩結銘詞絶妙槩括書聖俞稿後之意而尤渾雅雖韓公不過也江鄰幾墓志銘雅潔不煩濫君于治人至冀以感悟用之不盡故僅舉其略著書則所由以改官者神告一篇為當時切務故提出另説黃夢升墓志銘尤以文章意氣自豪通篇以此四字為眼目張子野墓志銘此又一張子野非張三影也然雖洛人至今皆以為無嚮時之盛此句剔得好初在洛時至可哀也已摹擬馬少監志尹師魯墓志銘謹嚴而凄婉師魯志外子美志為勝又欲訓土兵代戍卒以減邊用為禦戎長久之䇿意所謂息戍者不外乎此家無餘資此句兼寓不辨之辨銘詞非公自言之固未易窺其用意之深如此也孫明復先生墓志銘如此古雅峻潔何必減班孟堅勝徂徠文李丞相迪將以其弟之女妻之至而李丞相孔給事亦以此見稱于士大夫學史記極生動先生治春秋不惑傳注首尾以治春秋為結搆南陽縣君謝氏墓志銘此非歐公得意之作長夀縣太君李氏墓志銘不作可書其子孫之衆五句他墓志孫不書故自發明變例渤海縣太君髙氏墓碣見其鬢髮垂白至皆頴發而秀好太涉摹擬北海郡君王氏墓志銘女子又早亡故不得不寫虛景于是娶其女弟以為繼室言繼室則非夫人歐公似讀左傳不熟蘇文忠富公神道碑亦誤石曼卿墓表幽燕俗徑武至而不知其才之有以用也長史云先總提一段曼卿少舉進士不第至還為校理長史云先總敘平生皆略而不詳莊獻明肅太后臨朝至則人人皆勝兵也長史云此乃表其大者其視世事蔑若不足為至稱其意氣長史云應起處一段其施設之方三句其所負者大退而質其生平趣舍大節無一悖于理者其自顧也重及可否天下是非善惡當其意者無幾人此與世難合官其一子使祿其家長史云亦與起處照應太常博士周君墓表有篤行君子曰周君者至故吾于周君有所取也發端太冗胡先生墓表極鄭重而又不失于夸大此歐公之文所以情味獨至也其在湖州之學至取旁官署以為學舍長史云詳敘湖學太學兩節乃是表其大者其言談舉止至不問可知為胡公也文氣一收束先生初以白衣見天子論樂至又以太常博士致仕長史云然後總敘平生俱略而不詳論樂只輕敘遂居湖學乃居太學仍居太學此三句是眼目東歸之日至路人嗟歎以為榮長史云亦是收束其世次官邑三句長史云俱略而不詳此是墓表之體瀧岡阡表孔叢載孔子曰古之聽訟者惡其意不惡其人求所以生之不得其所以生乃刑之君必與衆共焉愛民而重棄之也今之聽訟者不惡其意而惡其人求所以殺是反古之道也歐公所述崇公之言全本于此自吾為汝家婦至然知汝父之必將有後也先虛提四句歐文往往如此回顧乳者劍汝而立于旁劍今本作抱按抱字是不知者妄改鄭氏曲禮注劍謂挾之于旁洪容齋隨筆五卷辨之甚明于是小子修泣而言曰遙接有待句而幸全大節不辱其先者韓吏部行狀幸不至失大節以下見先人可謂榮矣公蓋本此語集賢校理丁君墓表鹿門云丁元珍失守端州一節生平瑕指處歐陽公曲意摹畫以覆之按曾子固政要䇿云宋興既斂兵于內盜賊輒發而州郡無守備急則吏走匿自存天子常薄吏罪而言事者以為適然故盜賊起輒轉劫數百千里非天子自出兵往往不能格由此觀之此文蓋適得其平非曲為解也不可以明制有衛所之兵有城守之責議論前人文字祭蘇子美文激昂祭梅聖俞文真至祭石曼卿文擬柳子祭呂化先文無味不知人何以多好之祭丁學士文施之元珍亦過情是皆生則狐鼠死為狗彘太劇傷雅秋聲賦雖非楚人之辭然于體物自工至後乃推論人事初非純用議論也譏之者只是不識公于文章變而不失其正爾異哉初淅瀝以蕭颯至胡為而來哉先賦聲又如赴敵之兵與後殺字相映四無人聲人聲二字上顧赴敵下為在樂一段起本蓋夫秋之為狀也至乃其一氣之餘烈此賦秋故其為聲也合到聲字亦何恨乎秋聲反結悲哉句但聞四壁蟲聲唧唧以細聲結韓子云以蟲鳴秋結仍渾成該括怪竹辨頗似論衡無一結則為小兒語矣欒城云歐公碑版今世第一怪竹辨乃甚無謂非所以示後世論尹師魯墓志意謂舉世無可告語至詩人之意也銘詞非公自言固不能遽得之也總之古人文章其來源甚逺非深考六藝未足以知其深處不辨師魯以非罪至自然知非罪矣其祭師魯文已極言其寃矣此亦在可以互見之例也則前有穆修鄭條輩厚齋云條蜀人自號金斗先生名其文金斗集及有宋先達甚多如栁開孫僅皆學韓開之徒又有張景也記舊本韓文後則喟然歎曰至以償其素志立志之始亦志乎久而已矣應素志故豫之仕至而所學者宜然也昌黎云非其文之好好其道焉爾公亦謂吾所謂文必與道俱此五語者學韓之本也韓氏之文之道萬世所共尊暗收久字讀李翺文此文免不得學陋心粗四字此中庸之義疏爾中庸言致中和而習之欲滅情以復性正墮于佛氏之説而與中庸相反以是為中庸之義疏亦歐公知言者淺也恨翺不生于今透出一今字已為後半地况乃翺一時人有道而能文者至則不復云矣此數語過于抑揚遂似此賦後半公未之見者無論李非韓匹也宋人文字中大病皆自公開之然翺幸不生今時四句此是作文主意借河北以比遼夏也可歎也夫與前兩歎字呼應收住書梅聖俞稿後擬送孟東野序詩本出于樂但後半于和字無所發明不若昌黎所謂鳴其盛鳴其衰説得有分曉也義門讀書記卷三十九

body:
  text: 義門讀書記卷四十九翰林院侍讀學士何焯撰文選雜文枚叔七發數千言之賦讀者厭倦裁而為七移形換步處處足以回易耳目此枚叔所以獨為文章宗劉彥和以宋玉對問枚叔七發揚雄連珠為雜文之祖楚太子有疾至太子曰諾病已請事此言此一段猶賦之序龍門之桐以下要言妙道在末一段中先之以此者見極天下之樂不如親正士為能起疾蓋叔方客遊諸侯故為文以開喻之也原本山川至離辭連類四語作賦之大略也然聞于師曰似神而非者三波瀾相推才情橫溢曹子建七啓啓亦發也七啓之作可以希風平子朝旡咎見蘇子瞻子瞻為稱枚乘曹植七啓七發之文引物連類能究情狀于是擬之為七述是此體北宋人猶知貴之珠翠之珍注珠翠珠柱也南方異物記曰採珠人以珠肉作鮓按珠柱似即江瑶柱寒芳苓之巢龜注寒與韓同按此韓乃三韓之韓亦有韓羊韓張景陽七命七命𨽻事煩富然秀不逮曹王至七發因楚太子方疾故有僕病未能之言而景陽招隱之辭亦承而不革不亦踈乎細讀之其淵博真不可及宜乎枚曹之外獨存此八篇木既繁而後緣二句便是一篇梧桐賦翦㽔賔之陽柯二句用經當如此脫化追逸響于八風四句括盡律吕源流後人那得有其根柢乃有􅍮南烏程注吳録地理志曰吳興烏程縣酒有名按既云荆南則與吳之烏程不相及荆豫是借對字髙似孫緯略第十卷中所辨得之囿棲三足之鳥尋注反哺之語鳥當作烏但韻不叶潘元茂册魏公九鍚文大手筆唯退之平淮西碑與之角耳此篇視漢書中張竦為陳崇稱莽功德奏精力不逮而體之雅潔過之任彥升宣德皇后令此文不當在選欲侈陳乃考功烈耳建武維新至嘉庸莫疇四語難掩其為齊明帝佐命矣王元長永明九年䇿秀才文秀才之科始自漢武帝元封五年時名臣文武欲盡乃詔令州郡察吏民有茂材異等可為將相及使絶國者與明經各殊此連類及之非本意矣永明十一年䇿秀才文若間冗卑棄至則坐談彌積元長王謝子弟乃見及此昔宋臣以禮樂為殘賊四句此問在江右尤為知務任彥升天監三年策秀才文又在元長之下日伏青蒲罕能切直伏蒲事謬用始此孔文舉薦禰衡表章表多浮此建安文敝特其氣猶壯諸葛孔明出師表誠宜開章聖聽以光先帝遺德恢志士之氣此句對後興復髙明光大之本不宜妄自菲薄引喻失義以塞忠諫之路也此句對後規益涵養成就之助若有作姦犯科及為忠善者主於逺小人故先以作姦犯科為言將軍向寵此下承不懈于內親賢臣至後漢所以傾頽也先漢後漢各指東西治亂之君而分言之侍中尚書長史參軍攸之等管機密陳震等統庶政任分內外故别而言之後但言攸之等者內職諸臣専以成就君德為務震等乃代理留府事皆惟公裁決也臣本布衣此下承忘身于外願陛下託臣以討賊興復之效至以告先帝之靈收第三節若無興德之言則戮允等以章其慢收第二節陛下亦宜自謀至深追先帝遺詔收第一節咨諏善道四字對開張察納雅言四字包規益曹子建求自試表絶纓盜馬之臣赦楚趙以濟其難注引吕氏春秋云云此秦而謂之趙者史記曰趙氏之先與秦共祖然則以其同祖故曰趙焉按秦本紀蜚亷子季勝之後造父以善御幸于周穆王穆王以趙城封造父造父由此為趙氏蜚亷子惡來之後非子以造父之寵皆蒙趙城姓趙氏周孝王以其柏翳後邑之秦使續嬴氏祀號曰秦嬴然則秦固嘗為趙矣不特為其同祖也曹子建求通親親表此文可匹出師表而文彩辭條更為蔚然世以令伯表仰希葛相者非知言之選惠洽椒房恩昭九親先疏後親事與堯反至于臣者人道絶緒禁固明時臣竊自傷也通親親自致意近且婚媾不通至殊于胡越承人道絶緒今臣以一切之制至常有戚戚具爾之志承禁固明時臣伏自惟省至實在陛下因致其意中間包親親在內逺慕鹿鳴君臣之宴至終懷蓼莪罔極之哀鹿鳴謂明帝棠棣謂諸王伐木謂宗族蓼莪謂太皇太后四年崩若降天地之施三句應則天今之否隔至末又從親親中帶結自致意李令伯陳情事表既無叔伯至形影相弔先明無人可代本圖宦達至有所希冀又明非有偽託以解逋慢之責庶劉僥幸二句報劉臣生當隕首二句報國臣不勝犬馬怖懼之情收責催陸士衡謝平原內史表此文亦學蔡中郎讓髙陽侯表身登三閣官成兩宫注引晉令曰祕書郎掌中外三閣經書兩宫東宫及上臺也按所謂臺閣者此也唐之鳳閣鸞臺則當為閣字重蒙陛下愷悌之宥注陛下謂成都也按此表自上惠帝非成都也觀表首稱陪臣可見是時士衡從成都在鄴下魏郡太守治鄴故詔書下魏守守復遣丞授之耳兼以表末便道之官等語證之其義尤明李注恐誤五情震悼方氏韓文舉正云説文悼懼也陳楚謂懼曰悼引五情震悼句為證然顏魯公祭姪季明文震悼心顔只作悲悼也張士然為吳令謝詢求為諸孫置守冡人表臣聞成湯革夏而封杞至燕祭齊廟得體是以孫氏雖家失吳祚至多有過望從加恩孫氏子孫引入語便易入伏見平吳之初至欲封其墓又舉詔書以見事之相符二君私奴多在墓側按堅傳云還葬曲阿不知何以吳令請之後讀吳主傳大書太元元年秋八月大風吳髙陵松柏斯拔其在吳無疑庾元規讓中書令表與二王不平詞多激烈其才氣頗鋭是以前後二漢至可為寒心者也觀元規之意非志存退讓但欲以箝天下之口耳東京六姓注章德竇后和熹鄧后安思閻后順烈梁后桓思竇后靈思何后按六姓并馬氏言之章德桓思本一姓也馬光亦自殺故率其所嫌而嫌之于國意指二王言之桓元子薦譙元彥表亦自遒健殷仲文解尚書表情詞亦自曲盡于時皇輿否隔謂桓玄劫以西上傅季友為宋公至洛陽謁五陵表敘致曲折復自遒緊季友章表故有専長猶有東漢風味若使宋不代晉則讀此文者有不感激涕下者乎為宋公求加贈劉前軍表質直詳盡內難亦薦內難謂劉毅劉籓諸葛長民司馬楚之也任彥升為齊明帝讓宣城郡公第一表彥升表章此篇頗健不減傅季友也為范尚書讓吏部封侯第一表豈宜妄加寵私至授受交失六句似彈文不似讓表為蕭揚州作薦士表勢門上品謂王暕英俊下僚謂王僧孺字思晦注梁書曰儉子暕字思晦何之元梁典曰侍中領右驍騎王騫字思晦太尉文憲公長子也左僕射王暕字思叔文憲公次子王筠為騫碑亦云騫字思晦據此及梁書明梁典及碑誤也按碑亦有誤然則歐公謂據碑可以證史者未盡合也李斯上書秦始皇戰國之文楚人頗工為辭李斯本楚産故其文華艷而文選録之為祖師云竊以為過矣一句折倒截斷以下歷舉用客之利見不當逐今陛下致崑山之玉至此非所以跨海內制諸侯之術也今字對前昔字只昔字今字對照兩大段文字前舉先世之典以事證後就秦王一身以物喻即小見大于人情尤易通曉也必秦國之所生以下至佳冶窈窕趙女不列于側也漢以後文字筆力必不能若此馳騁所以飾後宫以下一意翻作兩層夫擊甕叩缶至適觀而已矣反覆洄漩今乃棄黔首以資敵國至此所謂藉寇兵而齎盜糧者也應明過矣前動以利此怵以害鄒陽獄中上書自明已之節不可變王之聽不可偏只二意反覆言之臣聞忠無不報信不見疑忠信在士無不報不見疑則在王二句包下二層意左右不明卒從吏訊注張晏曰不敢斥王也按下文皆言左右所排非避指斥也左右謂勝詭之徒皆信必然之畫至故不能自免于嫉妬之人也此言己所以見憎左右之故今人主能去驕傲之心至無愛于士此言王所以使左右得伸其喙之由司馬長卿上書諫獵簡當深切章奏當以此為準矱枚叔上書諫吳王頗似老子夫以一縷之任至間不容髮語語危竦任彥升上蕭太傅固辭奪禮啓昉啓昉一作君吕延濟曰昉家集諱其名但云君撰者因而録之按六朝諸集書啓多作君啓君白之語吕説得之下文君于品庶之君同沈休文奏彈王源自宋氏失御禮教雕衰宋大明五年詔士族雜婚者皆補將吏當時與工啇雜户為婚蓋有明禁後所謂黜之流伍也風聞東海王源風聞言事本此豈有六卿之胄至于事為甚此風于今為甚管庫謂為吳正閣主簿楊德祖答臨淄侯箋若仲宣之擅漢表至斯皆然矣答今之作者云云伏想執事不知其然至固所以殊絶凡庸也答好人譏彈云云不更孔公風雅無别耳言特未更孔子刪定耳若比仲山周旦之疇注詩無仲山甫作者而吉父美仲山甫之德未詳德祖何以言之按定是一時誤使君侯忘聖賢之顯迹三句答壯夫不為云云若乃不忘經國之大美至豈與文章相妨害哉答戮力上國云云敢望惠施以忝莊氏答惠子知我云云吳季重答魏太子箋若乃邉境有虞至非其任也暗入自己即後所云展其用也往者孝武之世至則徐生庶幾焉賔主錯綜但欲保身敕行不陷有過之地對前不慎其身任彥升百辟勸進今上箋注引梁典云是任昉之辭按梁書邱遲傳以此箋為遲作與梁典異李少卿答蘇武書似亦建安才人之作若西京斷乎無是即自從初降一段便似子卿從末悉其降北後事者其為擬托何疑意謂此時功難堪矣功大誠以虛死不如立節滅名不如報德也罪小不察當享茅土之薦蔡雍獨斷云漢興惟王子封為王者得受茅土其他功臣以户數租入為節不受茅土不立社此言當享茅土之薦故是後人語也况漢法非軍功不侯丞相封侯始自公孫夷之恩澤博望裂土事由導軍茅土千乘之云雅殊事實燕王上書亦以楊敞無勞為搜粟都尉相提言之可知武雖守節無緣得侯自唐以後承用多誤若夫定陵之侯乃出亂政不容相難也司馬子長報任少卿書僕聞之修身者智之符也以下言推賢進士非己責且事本末未易明也以下辨用流俗之言為非得已而兼以抒其憤悶僕少負不羈之才言不合禮法也注謂材質髙逺不可羈繫者非僕與李陵俱居門下以下言已非平日不慎于接物重為天下觀笑三句結上起下僕之先人非有剖符丹書之功以下言已亦非隨俗流轉不自樹立顧自有足以垂榮百世者欲少卿知其心之所存勿責望以不師用其言也而世俗又不能與死節者次比次字衍言不得與死節者比耳注迂謬僕竊不遜猶言當仁不讓耳注非故且從浮沉與時俯仰少卿所謂用流俗之言今少卿乃教以推賢進士打轉前文朱叔元為幽州牧與彭寵書此書在建武中興之初而列建安七子之伍誤矣陳孔璋為曹洪與魏文帝書筆殊健魏文帝與吳質書按魏志質時為元城令而偉長獨懷文抱質至此子為不朽矣先賢行狀稱幹篤行體道不耽世榮魏太祖特旌命之辭疾不就後以為上艾長又以疾不行與箕山之云為合若文章志之云則幹嘗出而仕矣且文帝言其著中論二十餘篇而文章志止言二十篇皆不足據七子之文獨推中論可謂知輕重既痛逝者行自念也橫插此句為年行長大以下伏脈其五言詩之善者妙絶時人與子建並稱曹劉以此譽也但為未及古人其未及古人建安能者自知明矣年行已長大至良有以也德薄位尊年長才退所以倣徨歎息也曹子建與楊德祖書氣焰殊非阿兄敢望僕少小好為文章言少小者非謂自少篤好蓋言故吾非今吾也是以篇末又引子雲壯夫不為之語以孔璋之才不間于辭賦不間者不可加以妄譽不逮者亦不畏其妄毁樂相知之譏彈異流俗之好尚此作者自信于心者也敬禮謂僕至後世誰相知定吾文者邪言吾自得潤飾之益後世讀者孰知吾文乃賴改定耶今人多因相字誤會失本意矣改定猶言改正定亦改也虞松定五字義同如今人解則與卿何所疑難句意不相貫屬今之仲連求之不難蓋以仲連屬德祖嵇叔夜與山巨源絶交書又仲尼兼愛不羞執鞭鄭康成解論語云雖執鞭之賤職吾亦為之邢叔明引周禮秋官條狼氏掌執鞭以辟趨條狼氏下士故云賤職又每非湯武而薄周孔非湯武薄周孔不過莊氏之舊論耳而鍾會輩遂以此為指斥當世赤口青蠅何所不至然適成叔夜之名矣豈可見黃門而稱貞哉黃門不男者也癸辛雜志引佛書甚詳孫子荆為石仲容與孫晧書自是大才不減孔璋其源出於辭賦故雅麗過之飲馬南海注引李陵與蘇武書曰陵當為單于畜兵養士循先將軍之令將飲馬河洛收珠南海按此書尤鄙倍委巷小人語何事引之然杜子美自平篇中却採用收珠南海四字趙景真與嵇茂齊書雞鳴戒旦至良不可度後人行役百方翻騰不越此數語劉孝標重答劉秣陵沼書孝標不能引短推長見惡武帝淪抑冗散而其文章録于副君之選蓋當時是非之公如此其難泯君父莫之奪也孔坦臨終與庾亮書亮報書致祭古人雖一書不以存沒異也此似重答劉書之序值余有天倫之戚當是其兄孝慶云亡劉子駿移書讓太常博士昔唐虞既衰陶唐既衰而後有劉纍衰字有本孔德璋北山移文值薪歌于延瀨延瀨似指延陵季子值被裘公事司馬長卿喻巴蜀檄皆非陛下之意也三句先釋其驚恐下乃復喻以自反陛下患使者有司之若彼至以不教誨之過既得伸其使指又不重以驚恐則國體無損民怨亦徐弭矣悼不肖愚民之若此得體陳孔璋為袁紹檄豫州因贓假位假一作買范書宦者傳嵩靈帝時貨賂中官及輸西園錢一億萬故位至太尉時冀州方有北鄙之警至翊衛幼主紹不聽郭圖沮授言天子在曹陽去鄴甚近不肯奉迎乃為曹操所先及見詔書每下有不便于已者始悔其失故檄中極意彌縫之操因其未破至厥圖不果後漢書注引獻帝春秋云操引軍渡河託言助紹實欲襲鄴以為瓚援會瓚破滅紹亦覺之以軍退屯于敖倉又操持部曲精兵七百至可不朂哉收得竦切有力亦以彌縫不奉迎天子之謬也檄吳將校部曲文甚凡冗何事濫存五道並入按使征西將軍至扼據庸蜀本是一道所以斷蜀之援吳也不應折而為二樓船橫海直指吳會乃是二道吳郡會稽地皆濵海故分命舟師從海道入耳注誤近魏叔英秀出髙峙至能負析薪後漢書黨錮傳魏朗字少英會稽上虞人當是叔英也虞仲翔父名歆為日南太守周泰明是周昕字周榮會稽典録作周林吳夫人傳注中引典録名騰吳範傳及注中作滕鍾士季檄蜀文當時事勢固然筆力却無過人處司馬長卿難蜀父老今割齊民以附夷狄至不識所謂此皆假以諷且夫賢君之踐位也至而勤思乎參天二地以武帝而復為此言所謂諷一而勸百也且夫王者未有不始于憂勤而終于逸樂者也此寓亦當與民休息之意應前天下晏如句宋玉對楚王問此文見于新序氣焰自非小才可及東方曼倩答客難上觀許由四句上觀許由天下不貪也下察接輿從政不殆也計同范蠡忠合子胥有子胥之強諫亦能為范蠡之早退也此適足以明其不知權變二句不知權變收前後惑于大道計功而不道其常也揚子雲解嘲詞古義深子雲文如此篇固退之所當遜避進學解不能及也本之東方之體然恢竒深妙過之故有造蕭何之律至末此借以自寓已所抱者唐虞三代之道不可時施則甘守吾元也班孟堅答賔戲麗過于揚其氣質則逺不逮要非崔蔡所及此體止于賔戲而裁達旨應間釋誨得之著作者前烈之餘事耳退之餘事作詩人本此昔者咎繇謨虞二句對下夷惠孔顔殷説夢發于傅巖四句對下陸董劉揚近者陸子優遊至法言太元此所友也辨章舊聞平章也皆及時君之門闈二句時君則但及門闈言不用其身也先聖則深究壼奧言不限其進也若乃伯夷抗行于首陽至孔終篇于西狩此所師也賔又不聞和氏之璧四句全其質不知其將含景曜三句發其文若乃牙曠清耳于管絃八句此則一藝故不為漢武帝秋風辭湛淵靜語云武帝祠后土者六五幸河東一幸髙里幸河東皆在三月獨始立祠睢上乃元鼎四年十一月也以詞中物色考之曰木落雁南蓋其時尚循秦舊以亥為正十一月即夏正九月詞作于此時無疑時方有事于五嶽四夷而文中子以為樂極哀來乃悔心之萌何也史記漢書藝文志皆不載吕延濟注佳人謂群臣也陶淵明歸去來雖去騷人已逺而詞旨超然自覺塵埃不到田園將蕪胡不歸一篇波瀾從田園二字生出奚惆悵而獨悲悲與樂首尾相應三徑就荒至撫孤松而盤桓敘其所得于園者眄庭柯以怡顔朱子語録載張以道曰眄庭柯以怡顏眄讀如俯讀作盻者非此説甚異當更考之秦少遊詩昔同裴博士酌酒俯庭柯䇿扶老以流憩中山經龜山多扶竹傳卭竹也髙節實中中杖名之扶老竹雲無心以出岫至撫孤松而盤桓因物起興生出下段其出也無心其還也不改感王室之將微願守其後雕之節也農人告余以春及至感吾生之行休敘其所得于田者西疇之西當讀為先即農服先疇之畎畝也西與先古通用木欣欣二句因物起興又生出下段富貴非吾願本不足願何待世之遺我哉聊乘化以歸盡二句親戚琴書有待而樂也乘化歸盡復何待哉淺言之而銷憂深言之而樂天庶幾其不為形役者歟孔安國尚書序此文似東漢人所作杜預春秋左氏傳序詳明典核此先儒之説經也將令學者原始要終至然後為得也數語非好學深思者不能道可為讀書要訣賈景伯父子至末有頴子嚴者賈逵父徽字元伯授業于劉歆作春秋條例逵傳父業作左氏傳訓詁許惠卿名淑魏郡人潁子嚴名容陳郡人皆見正義故余以為感麟而作至為得其實此説最穩皇甫士安三都賦序世説注此序及劉注即太沖所自為蓋託之勝流以重其價也按太沖賦序其卒章曰聊舉一隅攝其體統歸之訓詁則注明是太沖所為又魏都注或云張載今文選中仍題劉逵參差不合孝標之言未為無據此序結處竟沒收煞石季倫思歸引序此曲有絃無歌至末琴曲之不必諧乎律吕自晉以來則然觀此引可見矣陸士衡豪士賦序當時之體然慤切動聼廣樹恩不足以敵怨二句驚心動魄之言君奭怏怏不悅公旦之舉時王豹致箋于冏亦引周公流言為戒顔延年三月三日曲水詩序亭林云李春之月辰為建巳為除故用三月上已祓除不祥古人為病愈為已亦此意也周公謹癸辛雜志以為戊巳之己者非按古人上丁下辛皆取十幹亭林之説疑非亦本之仲逺劉昭續漢書禮儀志補注云自魏不復用三日水宴蓋此二會及右軍之臨河敘皆一時偶修也顔王二序皆出張班顔猶有制王則以夸以麗欲以掩顔而轉見卑冗宋齊文格不止判若啇周也王元長三月三日曲水詩序序記雜文遂與辭賦混為一途自此作俑其藻愈肥其味愈瘠使人思顔之妙昭華之珍既徙二句序禪代新妙虎視龍超至羌難得而稱計并用賦家音節可謂不善變矣任彥升王文憲集序任筆為有重名亦以在當時稍為質健特不能離去俗格故髙出有限耳大略昭明輩猶思上追元嘉也直是一篇四六行狀王子淵聖主得賢臣頌工用相得也屢提得字故世必有聖智之君二句一綰休徴自至至末因之諷喻漢書是時上好神仙故褒對及之文各有體此固頌也不得以浮靡薄之揚子云趙充國頌百餘字耳敘致詳贍可為後人法戒所以為作者史孝山出師頌文雖曰頌其實刺也隲先敗冀西再敗平襄辱國數奔議棄涼州稱引古烈所以愧之太后臨朝不加之罪反迎拜為大將軍失政刑矣末又深著天子篤念渭陽使自知其非據而思所以善其後也况我將軍至功銘鼎鉉羌之初叛揭木負柴非勍敵也故但言其逺且不過鼓無停響旗不暫褰則勞而無功更在言外下便歸本渭陽鋪陳薦鍚之隆所謂具文見意我出我師至路車乘黃前止敘授戟出餞平樂并于此詳之此作者位置之妙微旨攸存也劉伯倫酒德頌撮莊生之旨為有韻之文仍不失瀟灑自得之趣真逸才也陸士衡漢髙祖功臣頌平陽樂道至亞迹蕭公爰淵爰默謂清淨寧一也從學問説到武功結句收轉亞迹蕭公即位次而相業亦自在其內曲逆宏逹孔氏雜説載曲逆漢書無别音文選注曲區句反逆音遇當是五臣注也按漢書曹參傳西擊秦將楊熊軍于曲遇破之小顔注曲音邱羽反遇音顒文選緣此遂讀曲為區句反且忘遇之為顒而讀為遇其失甚矣又後書郡國志章帝醜其名改為蒲隂則當讀如本字審矣規主于足二句作贊用此等語恐未髙雅覩幾蟬蛻二句不類矯矯三雄至舍福取禍注三雄謂韓信彭越英布按信越誅夷于此贊中總見此文章變化處王信韓孽至寧為亂亡韓信盧綰合為一贊奄有燕韓兼勃平燕王盧綰及擊破王信下晉陽兩事言之滌穢紫宫按周勃傳臣無功請得除宫二句乃東平侯興居語勃無此言自乃與太僕滕公以下云云皆敘興居事與勃無涉注誤引也滌穢句蓋謂勃之能誅諸吕以清宫禁之亂乃文帝未至以前事故下繼云徴帝太原耳注中勃曰以下數語皆可刪陽陵之勛至俾亂作懲傅寬靳歙合為一贊無知睿敏至唯生之績魏無知隨何合為一贊紀信誑楚至後嗣是膺紀信周苛合為一贊皇媪來歸按髙紀但云歸太公吕后無歸媪之文善注未詳何據惟頂羽傳中有歸漢王父母語皇媪句殆本之此耶然髙祖母實已先亡無留楚及來歸事髙紀十年太上皇后崩一條下如晉二説辨之甚核羽傳本不可據也晉氏既定髙紀中載太上皇后崩一事於文為長則羽傳中母字其誤無疑矣夏侯孝若東方朔畫贊序平原厭次人也地理志平原郡富平縣應劭曰明帝更名厭次小顔注本傳云髙祖功臣表有厭次侯袁類是則厭次之名其來久矣而説者乃云後漢始為縣于此致疑斯未通也或漢初本名厭次中更富平至明帝乃復其故中間曲折失其傳耳厭一涉反又一琰反魏建安中建安猶是漢年漢雖守府烏可系之魏耶誤無疑也袁彥伯三國名臣序贊贊勝士衡髙祖功臣頌序亦激昻晉代之佳者贊雅質勝陸然陸甚變化公達慨然志在致命致命謂與鄭泰何顒謀誅董卓垂就而覺卓收顒攸繫獄顒憂懼自殺攸言語飲食自若卓死得免也魏志九人不及幼安當以其不得而臣也司馬長卿封禪文符命諛佞之祖非唯雨之至懷而慕思本之以功德善其始也上下相發至末仍申之以規戒善其終也顧省闕遺非謂不封禪也揚子雲劇秦美新上覽古在昔至而能享祐者哉此數語即劇秦中帶起美新意貞明若古者是也此解若古作順字義帝典闕者已補二句并帶漢家崇嶽渟海通瀆之神咸設壇場望受命之臻焉此即本相如泰山梁父設壇望幸之語宜命賢哲作帝典一篇舊三為一襲舊一作奮前言仲尼不遭用春秋因斯發此言宜命賢哲作帝典一篇奮三為一襲雄蓋以自負也班孟堅典引靡而無實故味不長然自一時之極思也系不得而綴也起引字鋪觀二代洪纎之度至光藻朗而不渝耳襯出典字頂誥誓來乃始虔鞏勞謙鞏亦勞也易曰勞謙君子有終吉將絣萬嗣至用而不竭此數語是引汪汪乎丕天之大律四句應誥誓所不及收轉典字于令升晉紀論晉武帝革命于字宋人定為干晉紀總論平冗失裁故于時天下非暫弱也至豈不哀哉此段直用過秦腔子蓋民情風教國家安危之本也以上説民情風教以下忽説取天下當積德纍仁段落不清昔周之興也至如此之纒綿也敘周事亦過于煩而其妃后至有純一之德此段對後宫貴主放恣而言然其段落不清然懷帝初載至末以下致亂極思治之意淳耀之烈未渝司馬氏重黎之後也故云范蔚宗後漢書二十八將傳論中興二十八將前世以為上應二十八宿未之詳也此説疑出緯書逸民傳論此篇抑揚反覆殊有雅思可以希風班孟堅也處子耿介至多失其中行焉言王氏二姓篡竊義憤逺引斯為得中若亂世暗君遽同作者則已過也同于作者注引論語注包咸曰七人謂長沮桀溺丈人石門荷蕢儀封人楚狂接輿按七人之列有石門儀封人焉則隱于下位如陳實者亦髙士也沈休文宋書謝靈運傳論注休文修宋書見靈運是文士遂于傳下作此書説文之利害辭之是非按有宋文章靈運為冠故系之耳若夫平子艷發至久無嗣響司馬以後平子尤為秀出特舉斯人固是真賞子建仲宣以氣質為體並標能擅美獨映當時詩品以公幹配陳王而豫意獨在仲宣及得此論益歎休文權衡之審縟旨星稠至事極江右謂對偶漸盛也若前有浮聲則後須切響浮聲切響即是輕重今曲家猶講陰陽清濁恩幸傳論胡廣纍世農夫伯始致位公相胡廣當作匡衡以前後漢書考之可見注家無改正者若伯始亦當作稚圭晉魏以來以貴役賤士庶之科較然有辨以上論恩澤以下論佞幸賈誼過秦論自首至尾光焰動蕩如鯨魚暴鱗于皎日之中燭天耀海合從締交相與為一不弱皆明智而忠信不愚于是廢先王之道至陳利兵而誰何以攻之道為守天下已定至子孫帝王萬世之業頓挫然而陳涉甕牖繩樞至遷徙之徒也跌宕材能不及中庸愚之無益率罷敝之卒弱之無益試使山東之國至則不可同年而語矣又一層勢乃紆餘仁義不施而攻守之勢異也收出過字王子淵四子講德論天符既章人瑞又明二句提綱是以北狄賔洽三句即帶起人瑞班叔皮王命論世俗見髙祖興于布衣至幸捷而得之此假皆搘拄隗囂之説乃論所由作也注引囂語惜不詳著題下若乃靈瑞符應至非人力也讖起于哀平新莽遂以符命篡盜故並舉瑞應以折之曹元首六代論注魏氏春秋曰曹冏字元首少帝族祖也按冏係中常侍兄叔興之後從馬之秦楚之際月表班之諸侯王表議論中來假成式語資篇載元魏尉瑾曰九鍚或稱王粲六代亦言曹植按元首不以文章名世安得宏偉至此意者陳王感愴孤立常著論欲上以身屬親籓嫌為已地至身沒而元首以貽曹爽歟晉書曹志傳武帝嘗閲六代論問志曰是卿先王所作耶志對曰先王有手所作目録請歸尋按還奏曰按録無此帝曰誰作對曰以臣所聞是臣族父冏所作以先王文髙名著欲令書傳于後是以假托帝顧謂公卿曰父子證明足以為審可無復疑按允恭最稱好學豈有先王所作必待尋按目録乃定是非且素知元首假托何不即相證明待帝再問耶或緣此論于司馬氏後事有若燭照方身立其廷恐以先王遺訓致招猜忌故遜詞詭對耳觀其纍吏郡職不以政事為意遊獵聲色自娛示無當世之用可知其晦迹逺禍非一事矣至異日爭齊王攸不當出藩則又依然淵源此論而為晉效忠者也反覆痛切其才力亦當不減過秦然髙祖封建地過古制此轉無滲漏兆發髙祖謂東南有反者豈汝耶尾同于體猶且不掉况非體之尾其可掉哉明辨至乎哀平至豈不哀哉晉之代魏已如燭照斯豈非宗子之力邪至而僥幸無疆之期轉接緊健于今二十有四年矣云二十四年則此論當齊王芳正始四年上也又六年為嘉平元年春曹爽誅滅魏祚遂為司馬氏所據嵇叔夜養生論晉書阮种傳云弱冠為嵇康所重康著養生論所稱阮生即种也今此文無之殆不止一篇李蕭逺運命論雖仲尼至聖至而莫敢間其言蘇子瞻韓文公廟碑變化此段文意却自瑰竒顔冉大賢注冉求字子有按此謂仲弓非子有也以窺看為精神以向背為變通二語已盡情變陸士衡五等論使其並賢居治至則過有深淺並賢兩愚合五等與郡縣言之注失其意劉孝標辨命論全篇多有激之談收束愔愔德音乃殊莊叟􅏏談蕩而不歸也廣絶交論文中子見此論曰惜乎譽任公而毁也任公于是不可謂知人矣其旨可謂深逺然他日又謂門人曰五交三釁劉峻亦知言哉蓋雲雨翻覆雖賢者亦難以情恕理遣也噫范張欵欵于下泉注王仲宣七哀詩曰悟彼下泉人按七哀所謂下泉非及泉也注贅馳騖之俗至其流五也此段尤為痛快寄命障癘之地瘴三國志皆作障周靖云本是山嵐之氣後人乃轉為瘴字陸士衡演連珠日薄星回首是以百官恪居至以要克諧之會似是可否相成之義注未昭暢利眼臨雲首注引抱朴子云日月之蝕乃至于盡天何為當故壞其眼目以行譴人乎按玉川月蝕詩出于此尋煙染芬首似是服子規矩律吕之説班孟堅封燕然山銘能盡以約所以為大手朱旗絳天注引李陵與蘇武書曰雷鼓動天朱旗翳日按此書又不知見于何書躡冒頓之區落焚老上之龍庭冒頓對髙老上對文非茍下語崔子玉座右銘隱心而後動仁之施也陸佐公石闕銘序亦規橅元長前頌武功故爾辭費銘非極工能搆形似戴記顯遊觀之言戴記之名本于此潘安仁馬汧督誄簡汰其半則遒烈矣顔延年陽給事誄合後陶徴士誄及祭屈原文觀之殆過其詩陶徴士誄南嶽之幽居者也南嶽謂廬山糾纒斡流注何異糾纒纒字當作纆乃節録鵩賦中語非還與纒為韻後人謬改耳謝希逸宋孝武宣貴妃誄殷淑儀當時傳為義宣之女此言育德素里蓋諱之也翼訓姒幄贊軌堯門廢帝不悉翼訓贊軌之義故幾于見法世覆沖華謂晉陵王子雲潘安仁哀永逝文會悲引泣文以情變重曰已矣至末結得變惟悲之甚故不得已為是言也顔延年宋文皇帝元皇后哀䇿文無繁長語方江泳漢載謠南國言其在江陵時也撫存悼亡感今懷昔八字故自一篇體要謝元暉齊敬皇后哀䇿文懷豐沛之綢繆兮蕭氏陵在武進故云豐沛繼池綍于通軌兮二句太祖紀云梓宫于東府前渚升龍舟始協德于蘋蘩兮謂歸自潛邸也哀日隆于撫鏡注引西京雜記云云按于時佛法未入中國安得身毒寶鏡為甲觀之佩明是六朝人附會之書也撫鏡當引明帝覩陰后鏡奩中物事蔡伯喈郭有道碑文伯喈朱公叔諡議優于此文稟命不融毛萇詩傳曰融長也陳太邱碑文臨沒顧命顧命古人通用不避文為德表範為士則魏志鄧艾傳作文為世範行為士則非是王仲寶禇淵碑文頻作二守注蕭子顯齊書曰尋遷散騎常侍丹陽尹按晉書丹楊郡丹楊下注云丹楊山多赤栁在西也是楊之從木審矣惟唐以來潤州丹陽乃作陽王簡栖頭陀寺碑文簡栖之名當作􅋄古文左字也步中雅頌驟合韶濩注禮記曰步中武象驟中韶濩所以養耳按三語撿禮記不得蓋今日所見又非唐初之本矣沈休文齊故安陸昭王碑文稷契身佐唐虞至神基與極天比峻規模宏逺都會殷負至曾何足稱當時吳郡奢靡已爾牛酒日至至夷歌成韻此等敘致後人那能倣佛方欲振䇿燕趙至侍紫蓋于咸陽一振勢有起伏任彥升劉先生夫人墓志肇允才淑閫德斯諒被出而有斯語無愧者鮮矣齊竟陵文宣王行狀碑版行狀之文自蔡中郎以來皆華而無實唐梁肅李華獨孤及權德輿輩欲變而未能至昌黎而始一洗其習劉又稱為謏墓特一時相謔之言細讀諸碑志此言非實也南徐州南蘭陵郡縣中都鄉中都里蕭公年三十五行狀漢書髙紀求賢詔書曰詣相國府署行義年蘇林云行狀年紀也此行狀所自始後則太常議諡史官紀事皆取之首行必書幾歲猶其遺也栁河東集中此體僅存韓李為人所刋削汨亂也爰造九言至申炯戒于兹日敘致實事使人不復可曉亦一蔽也陸士衡弔魏武帝文又曰吾媫妤伎人至學作履組賣也百年之後汝曹皆當出嫁此建安十四年作銅雀臺時令也奈何猶有不從其治命且至狗鼠不食其餘者乎雖龍飛于文昌文昌即操所自謂吾其為周文王也注非憤西夏以鞠旅至彌四旬而成災按此言操以西征無功發憤疾作與魏志不同蓋諱之也諸葛武侯正議云孟德以其譎勝之力舉數十萬之師救張郃于陽平勢窮慮悔僅能自脫辱其鋒鋭之衆遂喪漢中之地深知神器不可妄獲旋還未至感毒而死以此互證知武侯之言也信援貞吝以惎悔貞謂持法吝謂小忿怒大過失注非既晞古以遺絫信簡禮而薄葬魏志建安二十三年六月令曰古之葬者必居瘠薄之地其規西門豹祠西原上為夀陵因髙為基不封不植所謂遺纍薄葬也謝惠連祭古塜文合葬非古四句他人意所不到處所謂波瀾老成也義門讀書記卷四十九

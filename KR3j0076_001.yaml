body:
  text: 義門讀書記卷一翰林院侍讀學士何焯撰大學聖經章第一節語類云天之賦於人物者謂之命人與物受之者謂之性主於一身者謂之心有得於天而光明正大者謂之明德按此解明德比注更優止字本在事物上説然必其本體無有不盡故能立事理當然之極則止至善自須兼體用乃是易艮背有不見之止體也又有止所之止用也又即是周子主靜人極之意第二節知止只是識得大段定靜安是入道之始一段涵養德性工夫有此基址然後可為致知力行之本慮字則便是從致知做將去知所先後則條理脈絡一一分明前知止是嚮道而行此下便循途而至矣定而后能靜靜只是此心更不動搖走作非虛靜之謂也如明德便以聖人為必可學而不惑於異端虛無寂滅之教新民便以三代為必可復而不惑於後世術數功利之卑慮而后能得知止是先知事之理如此如平日知得為子當孝為臣當忠慮是臨事親事君之時更研窮其精微曲折使此理無一毫欠缺故知止僅云有定到慮後便云能得脫却注中處事二字則知止時豈未曾思慮耶注安謂所處而安言隨其所之此心只安在這裏今人將安字講做安土敦乎仁光景則豈止能得地位哉第三節所字是著力字知其當先當後而即如此以從事也故近道第四節朱子云知主别識意主營為知近性近體意近情近用誠者真實無妄全盡天理之謂故必推極其知於天理之極處也天下無性外之物而萬理同出一原格者物物必至其物與無妄之極也看得誠字真則致字格字皆是推到頂上不泛然説向汗漫處去矣致知次第當由外以及內蓋隨事精察而忽焉貫通則性無不在而天下無性外之物矣如小德之統於大德也博我以文到如有所立卓爾地位亦今日格明日格脫然貫通之極致也注意者心之所發也有主之心所發也故好者必善惡者必惡欲其必自慊必自慊宋元板作一於善欲其極處無不到也是言其根柢之處無不到乃窮源之意非汗漫博求之謂也極猶太極皇極之極非北極之極證以無所不用其極句自曉第五節注物格知至四句但可如此收轉照應不可作知止節正解第六節由上文觀之必至於修身而已之明德始明由修身推之而後能明明德於天下是故皆以修身為本天子有天下諸侯有國大夫士有家又佐天子諸侯治國平天下者庶人雖無國天下之責然亦必有家身不行道不行於妻子豈不均以修身為本哉末節又言家者此則自天子至庶人所同也只從末不治中推以示人見當修身以為家之準則不如此則國與天下更無可言耳傳首章第一節此節本是著力之辭次言顧諟則涵養工夫終言峻德則逹天德之妙也第二節存其心所以養其性也存心養性所以事天也顧諟明命實際不外此第三節峻字見至善意黎民於變皆克明中事即含下新民意末節自字是非於所性之外有加毫末之意所謂明命峻德即是這箇也傳二章第一節一層進一層即此之謂極第二節作字是又從而振德之意思已經咸與維新再造四海之民彜復加鼓舞作興之不已乃是極字意第三節舊邦非衰敝之謂言先世積德纍仁太王王季肇基而文王之德又能克享天心也注能新其德三句能新其德句頂首節以及於民句頂次節始受天命句貼本節即起下極字末節新命不過新民之極至處故注中只言兩項傳三章第三節作為人君五段題不細貼緝熙敬止著語無由説著與國人交止於信當就邦交説即朋友之道也國人若仍作庶民則是為人君一項內事不必分五者矣注則於天下之事皆有以知其所止而無疑矣緝熙是知承上節知字來第四節瑟僩是敬以直內赫喧是義以方外恂栗威儀是成德後培養功夫末節君子二句即是平天下傳中政事蓋必至此而後為新民之止至善也賢賢親親則有所師法樂樂利利則從善也輕注咏歎淫泆泆宋本液傳四章易天與水違行訟君子以作事謀始畏民志者謀始之道也上三章皆明新平説此章承上起下又見修身以上一截尤為用力之地所謂六分是內四分是外也補傳以求至乎其極極是根本非泛濫周詳之謂傳六章首節意是好善惡惡之發非一念善惡之發真西山曰自慊是為己言己之所以為善者乃自我合當如此若不為善則此心自不快足自不能安非是為他人而為善也自欺是為人本無實意為善但外面若假借以欺人欲人講好而已自慊是誠自欺是偽注自修之首也按此句貫注德潤身二句以徇外而為人也按外字人字即對獨字看他人不及知按不及二字是幾以審其幾焉按獨字只是對人説幾是為己為人之幾只在好一邉説但審好之實與不實耳第二節其始為人則其繼必至欺人故復以小人警之厭然身不泰如見肺肝心不安第三節此節只是證上人之視己二句指視乃言其形外之實嚴字即指形外之可畏非形容掩著時自苦如是也十目十手是實事掩其不善而著其善即注中所謂善惡也歷來講章認得不清所以有兼指善惡及重惡一邊之紛紜傳七章第一第二節二節分有心之病無心之病本是但語未圓不如云心有偏倚之病心無存主之病耳有所即不在朱子未定之説不可從觀或問自明此章是説正心故上節先從感於物而用心偏倚處説起若未感之時先無主而昏則此身日用動靜之間尤無往而可矣上節是隨事反求下節是涵養大本但説有所即不在道理狹矣聖賢豈如此其辭費哉忿􅓰等字與下親愛五者同注蓋是四者皆心之用按心之用是已發下節心有不存是未發末節正心是敬以直內孝弟慈是義以方外傳八章首節私箋云上章忿􅓰四者自其主乎心而有所係纍則以言心之病此章親愛五者自其發於事而有所偏向則以言身之病按偏向之根在不正心病而事從之也好惡是情情之發是意注辟猶偏也按偏對正字而不加察焉按病在心上末節此二句反覆言之者對經文其本亂而末治者否矣下章先反喝其家不可教而能教人者無之對經文其所厚者薄三句所藏身三句又廽顧傳九章此章只説教家故以身之感發言之下章説治國故必以政事言之乃家人國人之分今人誤以為國與天下之分不可通矣聞之李世得首節孝者三句頂上不出家而成教只講理之相通方不預奪後三節教國人一層注身修則家可教矣按此跟身修來則所藏乎身句亦極要緊此所以家齊於上二句按此乃推開説以起下文不是孝者三句本位第二節世得云此節是鞭䇿人致力於本之詞按引書之意只以母子之心不逺喻家國之心無二覺於上下文義更為貫穿且不費力未有學養子而後嫁者也此養字即上保字近文多用薑嫄生民等詩謬甚注又明立教之本按如此説恐單就教家上説亦得不假強為二句按孝弟慈乃心之同然所得于天也識其端謂孝弟慈推廣則所令皆是第三節仁讓又從孝弟慈推開説是因三者又推類以盡其餘也讓兼節文言之注此教成於國之效按效猶云實迹也第四節上文言家齊而即成教於國此以下又言教國非本之身修家齊不可三引詩反覆詠歎皆以足上其家不可教而能教人者無之之意按其所令二句打轉其家不可教而能教人者無之第六第七第八節三節中皆暗伏一箇身字在內桃夭節刑于寡妻宜兄節至于兄弟其儀節以御于家邦本或問傳十章首節所謂平天下在治其國者一句領起通章所言潔矩同好惡皆治國之事觀所謂得國失國及結處此謂國可見上老老三句與孝者三句分别處只是彼但言其理之相通此則有國者所行之政事如恤孤便是指慈己之幼説不倍謂不倍死忘生也注不可使有一夫之不獲矣按醒得此句是以二字乃分明第三節此節正潔矩之實蓋既有教化以興起其善而乂必好民所好惡民所惡使獲遂其善也泛説以欲從人不得君子自任如是不謂民之愛之而加以是名也注而民愛之如父母矣按愛之亦如父母不可落空須照為天下僇矣下以得失對言第四節辟則為天下僇矣辟字反對均齊方正撫則后而虐則讎既為民所讎疾則危辱隨之矣僇字亦不必説出身弒國亡來第十節有德有人順而入者也外本內末悖而入者也只説到爭民施奪民散上悖出却只論其理不可鋪張其事聖賢論理極透快而仍有餘地第十二節惟字本是謙詞却是極鄭重要從心裏透出來第十三節此是舅犯教公子之詞作公子辭秦使語者非第十五節此謂唯仁人新安陳氏謂此引孔子之言故著此謂二字第十八節前所云慎德及所云仁皆忠信實際工夫注君子以位言之按君子指有國者第十九節藍田解中四句皆專責之在上者方是潔矩之大道也王政固因民所利而利之然豈聽其自生自為哉注朝無幸位按出荀子王制篇第二十二節前言以財發身以身發財此二節又言非獨其身為之所用之人亦不容于不審本節眼目在不畜聚斂之臣下節則畜聚斂之臣者也伐冰之家左傳食肉之祿冰皆與焉杜注在朝廷治其職事就官食者孔疏在官之食有冰下云自命夫命婦無不受冰謂賜之受以歸在家用者也是伐冰得兼食言之周禮云春始治鑑凡內外饔之膳羞鑑焉凡酒漿之酒醴亦如之祭祀共冰鑑賓客共冰注中獨言祭乃舉食之重者此謂國不以利為利二句此節就義理以明用心之公下復舉利害以明擇術之審注不忍傷民之力按不忍二字從好仁來義門讀書記卷一

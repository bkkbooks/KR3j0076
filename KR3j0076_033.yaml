body:
  text: 義門讀書記卷三十三翰林院侍讀學士何焯撰昌黎集碑志雜文祭田橫墓文祭舊刻作弔不知誰何改之此擬弔屈原文不當有墓字題哀辭後古之道不茍毁譽於人此專為孟簡誤信穆􅏏道之語有為太原伎慟怨而歿之謗又以其事不足辨故但自明其不茍譽則毁者之為非實可見矣祭虞部張員外文篇中注維元和十年月日中書舍人王涯云云按古人於同年不敘爵崔敦詩在韓公之下可以為法各以文售至永絶心耳此段是敘情廬親之墓至以播華問此段是論德祭河南張員外文來寅其徴寅或作夤按唐碑寅卯之寅多作夤蓋通用字也考異之云贅矣祭薛中丞文似非公文祭裴太常文題注裴之諱字皆不可考按柳子厚有裴墐崇豐二陵集禮後序墐字封叔以太常丞佐杜佑是其人也篇中注載給事中李逄吉等五人按此則古人朋友皆序齒祭栁子厚文嗟惜子厚只以其文志墓亦此意若此文明云非我知子矣犧尊靑黃二句謂見用於世為害子之中棄二句謂不用乃造物者使其傳子厚之利也祭馬僕射文曾不醉飽以勸酒胾按此則唐時大僚在輦下無酒食遊戲之會弔武侍御所畫佛文晢晢兮目存至末漢武李夫人賦不如祭十二郎文杜拾遺志其姑萬年縣君墓志曰銘而不韻蓋情至無文公似用其例告汝十二郎子之靈舊注郎子是當時語雖不必存亦不可不知也吾上有三兄曰介曰會一人失其名吾年十九始來京城以後漸相離請歸取其孥自是長别矣施先生墓銘新唐書啖助傳大厯時助匡質以春秋施士丐以詩仲子陵袁彜韋彤韋茝以禮蔡廣成以易強蒙以論語皆自名其學而士丐子陵最卓異士丐撰春秋傳未甚傳後文宗喜經術宰相李石因言士丐春秋可讀帝曰朕見之矣穿鑿之學徒為異同但學者如浚井得美水而已何必勞苦立異然後為得耶施州房使君鄭夫人殯表殯表宜如此簡監察御史元君妻京兆韋氏夫人墓志銘蒼崖金石例前輩云銘婦人墓當詳於家世議論取法於韓退之退之所作蓋出於碩人之詩觀其銘元稹妻韋夫人墓可見矣登封縣尉盧殷墓志詩可録傳者在紙凡千餘篇殷詩今惟唐御覽集中猶存十四篇然止用以資為詩注以下或有自字按當有自字惜其不有試用而止自鳴於詩也唐故江西觀察使韋公墓志銘初讀此似無竒後觀杜牧遺愛碑僅存一空殼乃服其敘致之精贍也號曰私覿官雖非體然有以見國家恤臣之私非要害地不足張職張猶設也以晉慈隰屬河東此句點在下錯綜始教人為瓦屋至民無火憂敘致如在目灌陂塘五百九十八二句韋公之功於是尤大銘傳於後固不朽矣言不望其伸於今也銘詞卒之誣公者皆忌者嫉公聲名使之末四語有餘味唐故河南府王屋縣尉畢君墓志銘宗人宏以家財贖出之畢宏疑即杜詩所稱畫松者襄陽盧丞墓志銘潘氏金石例云漢碑有銘詞亦有無者孔司勳墓志銘君陰爭不從先著此句好曰公當為彼三句一斷警動佐昭義軍至君不得已留一嵗又詳其始佐前帥不得已而強留非不知從史為人茍應其請唐銀靑光祿大夫襄陽郡王平陽路公神道碑事零雜無成片文章又不可提一節為線索者稍煆鍊其句使古不欲似斷爛册籍耳冀公諱嗣恭嗣恭初名劍客玄宗以為可嗣漢魯恭賜今名又甓其城人不嵗苫苫土城覆以草也或作苦非朱子不至北方容有未及知耳公之為州逄水旱至而官府畜積此常平之法曹成王亦然此一事所同故於最後帶出從前捴敘文勢即作一束朝夕人事人事民事也滎陽鄭公神道碑削四鄰之交賄至軍給以饒儋為率僅一年數語敘得精鍊緊簇而曾不得須臾有焉為帥僅一年故也劉統軍碑聲駕元侯元侯謂上官説非韓全義也峻之大夫考異以峻為可疑按猶言陟也唐人每用之無可疑者衢州徐偃王廟碑偃王本不合祀典特其子孫為之立廟故借秦之僨國沉宗以相形而略舉小説稗史所載偃王之事以見本宜有後而非淫祠可比其廽護處甚得體此碑徐放自書徐與秦俱出柏翳至咸有大功與孔子廟碑舉勾龍后稷並説同法左氏傳齊侯夫人徐嬴此文所本秦處西偏專用武勝無中生有好道士説初學記載樓觀本記云周穆王好尚神仙因尹真人學制樓觀遂召幽逸之士置為道士平王東遷又置道士七人四方諸侯之爭辨者至得朱弓赤矢之瑞偃王事蔚宗既據以作東夷列傳故昌黎得而引之自秦至今名公巨人繼迹史書帶入秦衢州故會稽太末也即用秦時郡名或曰偃王之逃戰傳説妙故制粗朴下窄廣川書跋云故制朴角用淮南子朴多不斫下有梁桷則此本為是民皆曰耿耿祉哉二句仍歸到有功於民上袁氏先廟碑袁公滋既成廟截去無限陳冗刻詩牲繫碑也魏博節度觀察使沂國公先廟碑銘起手詳敘奉勑撰碑所以鋪揚國家寵嘉順命之臣以勸來者得體田季安卒以下其先心在王室已見詔中此處只敘宏正功得立廟之由贈工部尚書太原郡公神道碑文此文可謂贍而不穢曹成王碑朱子極喜此篇文公志銘括例云法揚子雲造語其先王明以太宗子國曹明自以太宗子封兆紹巢刺王史誤當以此文正之兼州别駕德宗復置别駕一人唐故事以宗室為州别駕見孔若思傳禁無以家事關我太妃既薨則惟以王事為急可無復顧家也王親教之搏力勾卒嬴越之法搏力秦法勾卒越法以與賊遌紹定本作遻按遻與􅘅同遇也若遌則不欲見而見也嘬鋒蔡山踣之至捁其州此段學左傳襄十八年圍齊文法而變其語鏺廣濟審配獻袁談書放兵鈔鏺十抽一推厚齋云始皇紀王翦什推二人從軍索隱云什中推擇二人公語本此不必改為椎大小之戰三十有二又撮敘王坐南方北向落其角距成王當時無大功但以牽制之績歸之其實有待歐公蓋有待也用此語試大理評事王君墓志銘王適之才必有過人者如柏耆之屬而以不拘小節大冠若箕者遂失之於牝牡驪黃之外故即瑣事摹畫其生平大槩如此狂子不足以共事立謝客此事略見其名節櫛垢爬癢民獲蘇醒二句略見其功業居嵗餘三句負氣處士髙女亦無資地自方阿衡太師亦懷竒再試吏再怒去亦負氣初處士將嫁其女至以女與王氏懷竒之人困於資地思女嫁官人至為人紿其情亦既可悲而兩人情性反適相合因而記之乃極跌宕一妻耳猶謾言官人而乃得之則何事不困於無資地而不能自出乎書此以見其窮所謂微而顯也點破即與前半不稱矣妙在仍有濶略不羈之意扶風郡夫人墓志銘長子殿中丞繼祖考異云少監志云諱繼祖或是反用此志誤本補足按繼祖小説有德宗所命繫縛其祖之説則少監志諱繼祖者非仍誤本補足也殿中侍御史李君墓志銘深於五行百不失一二乃信道士説妄冀大還卒以疽死所以深著學仙服食之愚也唐故朝散大夫商州刺史除名徙封州董府君墓志銘觀銘詞則溪之獲罪殆亦出於不幸非自盜者也前引陸長源稱舉以戒子弟見溪必不肯一旦隤其家聲其為銘也豈我一人私故府之子弟而為之説哉他日送陸暢云云蓋深恨不能直溪寃也退而見其人二句沉厚也囊篋二句是精敏有赦令許歸葬二句左降官死亦必遇赦而後歸葬李道古墓志可參考善為詩張籍稱之文昌之見重於當世如此貞曜先生墓志銘諸嘗與往來者咸來哭弔韓氏舊以哭弔絶句哭弔韓氏檀弓所謂吾哭諸賜氏也時昌黎為之主唯其大玩於詞至其猶足存耶言其玩詞而抹煞名利故人所徴逐者處之裕如謂是我所棄以讓人者不足爭先也而與世抹摋此用抹殺恐是塗殺之意殺字不當從手旁親拜其母於門內此鄭拜孟母耳拜從事母真盛德事維執不猗二句執不猗言其進之難出不訾其文之盛也上言貞下言曜也齊語訾相其質韋昭注訾量也不訾蓋不可量非貧也注謬統軍劉公墓志銘即其日與使者俱西至曰吾恐不得生謝天子元和中朝廷威令之行如此河南令張君墓志銘諸曹白事至事以辦治精彩鳳翔隴州節度使李公墓志銘隴州地與土蕃接至相繼不絶敘事詳贍唐故相權國公墓碑權公有文而厚重無震世功烈故只銘其大略其詳則公之門生故吏當列其行狀上史館也其臣有安邱公翼者有大臣之言大臣之言即詆訶浮屠公在相位三年頂上其相曰權公句來改左補闕至一不以綴意為諫官知貢舉以明其長厚非鄉願中庸之比而人自無忌嫉所以為道中人也平淮西碑題注命段文昌重撰按觀段文乃當年刻之蔡州者非重撰也天以唐克肖其德以天祖起相臣將臣文恬武嬉與一二臣反對明年平夏至無不從志因平淮西而盡舉當時武功所以昭示天下節將使知所警以寧朝廷也皇帝曰不可究武二句一頓最髙乃有王者氣象皇帝厯問於朝一二臣外一篇歸美君相所謂辭尚體要也大官臆決唱聲至牢不可破當時謂其有私蓋因此數語曰光顏至曰訴汝帥唐鄧隨諸將一處敘各以其兵進戰總束諸將一句曰度汝長御史其往視師至豫其臨門送汝使相都統監軍一處敘晉公前以中丞視師後以使相拒討故作兩畨敘以既厥事四字見成之由于斷非郊廟祠祀其無用樂王者氣象襯出斷來訴入其西至戰比有功非略也訴原未嘗下其城邑十二年八月丞相度至師度至師書月十月壬申訴用所得賊將至盡得其所屬人卒訴取元濟書日安溪云至此才詳書日月則數年淹師之迹隱矣所謂微而顯也辛已丞相度入蔡以皇帝命赦其人度入蔡書日應既厥事赦其人應生蔡人河北悍驕二句從河北説到河南敘致既源委分明以下魏將首義及奔走偕來等語節節有根魏將首義書法淮蔡不順悍驕者已恭順而附起者顧倔強深著其愚而不可赦也遂連姦鄰二句姦鄰謂李師道時裴止為中丞相臣謂武元衡也二句補前所略乃相同德此相字指裴言常兵時曲至郾城來降補前所略兵頓不厲二句安溪云序隱而銘見譏帝有恩言至教而不稅此段見天子之恩若往哺以下即接為之擇人四句便恨其直妙在翦斷為之擇人以下是既平之後其恩如此蔡人有言至同我太平此段見天子之威聲勢相倚應前遂連姦鄰汝弱奚恃所謂王承宗破膽矣淮蔡為亂至惟斷乃成束上歸美君相四夷畢來况河北內地乎遂開明堂二句依然罔有內外悉主悉臣高祖太宗之業矣南海神廟碑題注蘇內翰嘗移書楊康公使遷廟文登按遷廟文登乃東海神廟處州孔子廟碑昌黎文無不根據經籍而議論仍未嘗襲前人陳言故下筆如魚龍百變曾王文字只讀死書未解此祕也與徐偃王碑皆以賔形主其高下輕重不失銖黍句龍與棄乃其佐享用康成之説不屋而壇謂句龍與棄不得專立廟附祭於壇非謂廟屋尊於壇也巍然當座專主自古多有以功德得其位者不得常祀又轉此層波瀾始富筆力始高又令工改為顔子至子夏十人像招魂云像設君室其來亦已久矣不始於佛教之行也故其為政知所先後收能以為先柳州羅池廟碑侯之船兮兩旗度中流兮風泊之若見兩旗風又亂之有無恍惚正與下不來相貫中流豈可泊也定從蘇本不嚬以笑即匪怒伊教也蘇本嚬下有兮字亦更頓挫北方之人北當作此黃陵廟碑老學庵筆記周子光言退之黃陵廟碑辨陟方事非也古蓋謂適逺為陟書曰若陟遐必自邇猶今人言上路也豈得云南方地勢下耶以此謂舜死葬蒼梧於時二妃從之不及而溺者皆不可信李云為神何故在湘禮記離騷注言之必有其端緒懼不得脫死過廟而禱之有此事故人傳其信奉佛氏也退之兄會死南方故尤以竄潮為憂耳且令後世知有子名此亦習氣不可為法孔孟必不為此言也贈太尉許國公神道碑銘通篇大意只説韓宏帥汴居蔡鄆之交而能屹然中立制之使不得逞卒成朝廷翦逆之功首尾只一節但敘得逐層變化耳韓宏入朝不可比田宏正之以六州來歸鹿門分七節而以入朝為一大節故詳敘何不看通鑑乎近見新刻本文章正宗亦分七節舊刻正宗無批語此惡本妄增先提擊走少誠來敘然後敘誅劉鍔事便不平直此左氏敘事法也若今人則有其舅之兵與地下即接自吾舅沒云云矣能遏賊然後能自立故有其舅之兵與地下急敘走少誠也能久安然後可以居二寇之衝而不懾故繼即敘誅劉鍔也古人作文設身處地井井有條一字不亂下夫人之兄曰司徒元佐提筆此軍司徒所樹元佐增其軍至十萬當此時提自是訖公之朝京師三句精神貫注直透到此然後層次敘去方緊少誠以牛皮鞋材遺師古至此於法不得以私相餽此段將鄆蔡一紐無自行以遏北寇帶鄆初公有汴至至於露積不垣又一束瀠洄曲折不可一覽而盡自是訖公之朝京師初公有汴周環一線又除河中節度使三句略汴之南則蔡至孰與髙下發明前案通篇只此意將他不黨惡處點綴成一段伐謀靜勝之功又使人全不覺其罅漏左史筆力不過如此公子公武至莫與為比此段又敘國家報功之厚淋漓有餘情極設色之工然于事未嘗有所增加宋以後人不及也自唐以來莫與為比應上至唐始大公之為治略補止除害本如誅鍔之類在所以富收公私充塞衆乃一愒史記務以秦權恐愒諸侯似當讀喝然與上猘犬猘字音季者相叶只當讀器銘詩亦偉麗絶世栁子厚墓志銘此文失當時碑額公此文亦在逺貶之後作故尤淋漓感慨為拓跋魏侍中公他文皆作拓拔俊傑亷悍此是雅健後云泛濫停蓄則更雄深也合此八字略盡栁氏一家詩筆之長矣因其土俗三句簡括羅池廟碑著其有功德于斯土可以世祀者故詳敘政事志則所重者在文章必傳於後區區下州之理特餘事也故只用三語虛括衡湘以南至悉有法度可觀通篇重文學故此事不得略其召至京師至夢得於是改刺連州詳栁待劉之厚所以愧他人有力不救子厚者士窮乃見節義至亦可以少愧矣以子厚無人推挽故發此論子厚前時少年至且必復用不窮持論既嚴精神亦打得緊上既敘子厚之篤于朋友因反復嗟惜人莫為推挽言子厚始誠有過及其能改奈何使之終窮後以文之必傳慰死者而生者之失才蓋無可解矣勇於為人為猶助也不自貴重顧籍猶顧惜也讀本安溪謂功業可立就言子厚欲藉叔文輩引用以就功業非餮富怙權不枉子厚用心材不為世用二句許之者不小然子厚斥不久至如今無疑也此是篤論使子厚見用詩不窺建安文不到西京不過與常楊輩爭伯而已即有功業豈能數有唐第二人也其得歸葬也至庶幾有始終者復詳裴盧之待子厚以愧有力者與前一段感慨亦相配且以深著子厚之窮也既固既安二句子厚已矣不復能伸其志矣庶幾以待後之人乎銘詞蓋深痛之也唐故朝散大夫越州刺史薛公墓志銘部刺史得自為治此部刺史謂觀察所部中之州守與漢之部刺史不同國子司業竇公墓志銘初公善事繼母孝行名聲詞章行於京師文然實未嘗以干有司以下皆發明其謹厚六段相對其為郎官令守令守即上為洛陽令澤州刺史先言郎中者以京朝官書令守下即不成語也注欲易為守令以配慎法非尚書左丞孔公墓志銘曹娥碑銘曰作亂曰蓋於篇終復理其事而詠歎之此文兩以孔子起不為復也孔子之後三十八世倒敘吾為左丞至二宜去含正平意且公雖貴而無留資含淸苦意守節淸苦論議正平二語為通篇眼目事有害於正者二句故曰議論平正言京兆尹阿縱罪人以下發明無所不言約以取足至悉放不收守節淸苦公屢言逺人急之至不足與論是非議論平正公之北歸不載南物守節淸苦奴婢之籍不增一人嶺南以口為貨故書不增殿中少監馬君墓志如此俯仰淋漓仍是簡古不覺繁溢屈指三四十年事寫得厯厯在目依依如畫真神筆也無可志故只以世舊為波瀾又一體王軫其寒飢至稱其家兒也將三人性情容止描寫一段在中方有風神有賓主而馬氏榮落之故亦可想見於千載之下矣當是時見王於北亭至稱其家兒也作兩層寫不直瑶環瑜珥帶補服飾一句吾未耄老至末使我亦不樂其生則於故舊盛衰之際哀歎至矣中大夫陜府左司馬李公墓志銘比四世至為士大夫家當時王孫之貴不及士大夫家宜人之勵於善也故幽州節度判官贈給事中淸河張君墓志銘今牛宰相為御史中丞注陳齊之云云按牛宰相三字豈成文理耶好惡豫奪固不在此作今宰相牛公為是太學博士李君墓志銘志子弟墓不嫌於直深切著明筆力亦健時主好方士服金丹公之為世誡者微詞也故非臚列故人之失以訐為直也余不知服食説自何世起至以為世誡憲宗服栁泌藥躁怒為左右所弒公作此文蓋所戒者逺不嫌於訐也凡作文立論須權輕重耳以此立坊而武宗又服趙歸真之藥矣乳母墓銘題注葬乳母且為之銘自公始按王獻之已有保母志瘞硯銘硯乎硯乎與瓦礫異不當有與字從髙氏硯箋毛頴傳栁子厚所最喜者毛頴傳孫可之所特稱者進學解今人不以為俳體則以為六朝多見其不知量也即其用參同契一節變化深妙至此宜乎栁子之折服也參同契云故易統天心復卦建如蒙長子繼父體因母立兆基消息應鍾律升降據斗樞三日出為爽震庚受西方八日兑受丁上弦平如繩十五乾體成盛滿甲東方蟾蜍與兔魄日月氣雙明蟾蜍視卦節兔老吐生光七八道已訖屈折低下降十六轉受統巽辛見平明艮直於丙南下弦二十三坤乙三十日東北喪其朋中山之云蓋當東北也類聚載廣志云漢諸郡獻兔豪書鴻都門題惟趙國豪中用博物志云蒙恬造筆李白殷十一贈栗岡硯詩灑染中山豪光輝吳門練以三代比三十日筆始於三代後故云然南伐楚次中山此中山是宣州地名正楚地孫大雅贈筆生張蒙序云昌黎韓子傳毛頴為中山人中山非晉乃唐宣州中山也宣州自唐來多擅名筆而諸葛氏尤精孫説疑強為之解姑備異聞及至浮圖老子外國之説浮屠之説秦時無之二字亦信筆寫入也又善隨人意正直邪曲巧拙至然見請亦時往馳驟亦用子雲心盡之意上親決事至上未嘗怪焉又兩層旁襯見絶於孔子而非其罪時所謂筆乃刀削也故云而姬姓之毛無聞瀠洄此句文法乃見斷續曲折送窮文卓犖宏肆只固窮二字翻出爾許波瀾攜朋挈儔伏中間子在孩提吾不子愚下五者首曰智窮故著此二句我非其鄉波瀾心無異謀至敢不回避逐層應轉情狀二字開下羞為姦欺二句上句是義下句是仁正言若反磨肌戞骨四句上二句就已説下二句就人言能使我迷四句先伏固窮在內應前自初至終及有間於余等語乃與天通天之心即君子之心也攜持琬琰四句足上癡字請質詩書希聖人也聖則與天一矣鱷魚文浩然之氣悚懾百靈誠能動物非其剛猛之謂此文曲折次第曲盡情理所以近於六經古者貓虎之類俱有迎祭而除治蟲獸蛙龜猶設專官不以為物而不教且制也韓子斯舉明於古義矣辭旨之妙兩漢以來未有昔先王既有天下至驅而出之四海之外發端先提破必無可容之道况潮嶺海之間至亦固其所開其前愆鱷魚其不可與刺史雜處此土也責其更新刺史雖駑弱至以偷活於此耶平之以情且承天子命以來為吏二句又一提諭之以體潮之州至鱷魚朝發而夕至也導之以路應前驅而出之四海之外今與鱷魚約至至七日寬之以期七日不能至不聞不知也逐層逆捲後復順下三段有千層萬疊之勢不有刺史應與鱷魚辨冥頑三句應有知聽刺史言夫傲天子之命吏至皆可殺竦之以法為民物害應惡物為民害句刺史則選材技吏民至末迫之以威強弓毒矢應罔繩獨刃句贈大傅董公行狀兼御史中丞知臺事三司使少章云若以三司使為句則時無此官若以使字屬下句則恐上下猶有脫誤按雲麓漫抄云唐三司使有三凡鞠獄以尚書侍郎與御史中丞大理寺卿為三司使中葉以後有三司使捴户部鹽鐵度支皇太子監國則詹事左右庶子亦號三司使據此則董公以中丞鞠獄故有三司使之號非脫誤也南部新書大歷十四年六月勑御史中丞董晉中書舍人薛播給事中劉乃宜充三司使仍取右金吾將軍廳一所充三司使院并西朝堂置幕屋收詞訟至建中二年十一月停後不常置有大獄即命御史中丞刑部侍郎大理卿充謂之大三司使次又以刑部員外郎御史大理寺官為之謂之小三司使皆事畢日罷此董公為三司使之明徴其事不見於本紀疑出唐大詔令也與汝州盧郎中論薦侯喜狀素不薦士之人其能力乎故或靳以激之或稱道以引之未聞有所推引二句以之激勸今子鬱為選首二句頓挫若自有名聲至又何貴乎恐其後之不力又反激之閣下既已知侯生至末鼓而勸其後論今年權停舉選狀竊以為十口之家至未見其弊先論乏食臣聞古之求雨之詞曰至使人失職而召災也二段即從旱上轉出不可停罷妙絶臣又聞君者陽也至銷殄旱災不惟不當停罷方且更廣其路又進一步絶妙漢武帝之取公孫宏公孫是應選舉人此句不倫唐故贈絳州刺史馬府君行狀許國薨少府始孩顧託以其為繼室繼室二字惟公不失左氏本義復讐狀題注舊史書於憲宗紀刑法志新史書於孝友張琇傳按舊史載刑法志者是也新史書於孝友傳則謬矣以復讐為孝則非語常也議論極得其平錢重物輕狀禁錢不得出五嶺注下或有復出五嶺字按復出五嶺為是張文昌詩海國戰騎象蠻州市用銀是唐時嶺外用銀買賣也進撰平淮西碑文表今詞學之英至無有不可此公之謙詞却似含諷數句本屬可已捕賊行賞表何為辭費乃爾孔子欲存信去食至况可無故而輕棄也此下即宜接漢高一段昔周成王尚小至于是遂封叔虞於晉不須蔓引此等論佛骨表惑之大者則用借鑒失之小者則用直陳極得因事納誨立言之體憲宗奉佛求夀故前半只從年夀上立論伏以佛者二句見非中國天子所當奉惟梁武帝在位四十八年又變臣常以為高祖之志二句倒跌今聞陛下令羣僧迎佛骨於鳳翔以下指其失臣雖至愚至而肯信此等事哉此數句是前後關鍵綰結處祈福無驗上已開陳故入迎佛骨本事後一句撇過只以國家大體反復言之然百姓愚冥至非細事也就詭異戲玩上推言其不可即加禁遏破上遞迎供養夫佛夲夷狄之人至豈宜令入宫禁破上舁入大內假如其身至今尚在至不令惑衆也與前高祖之志必行於陛下之手一樣文法長史云有此推駁方是論佛骨不是論佛法使天下之人至豈不快哉與前天子大聖一段相對佛如有靈四句安溪云後段既欲上奮然投之水火便只言其不足畏以推廣上心可矣復欲以身任其禍是欲使上𡨕行也潮州刺史謝上表此文亦仿虞仲翔交州上吳大帝書須玩其位置之巧篇中並無乞憐祗自傷耳若以文章自任非惟時輩見推即憲宗亦自深知之也孔子曰文莫吾猶人也班固云著作者前烈之餘事公固不僅以文章自任者勿謂其不謙也議之者適見其眼孔之淺耳封禪之事自宋以後始同辭非之前此儒者多以為盛事未可守一師之學疑其導人主以侈心也漢書藝文志封禪録於禮十三家之中臣受性愚陋至所見推許接縫處有痕無迹伏以大唐受命有天下至以至陛下拓開旋乾轉坤四句十六字雖揚子雲不能過也天地父母哀而憐之只一語見意亦使之得奏薄技以贖罪過非為祿位計也賀册尊號表栁表中附會古有尊號及白虎通道德論皆近於誣韓公二表中不涉一語雖順時為之其識自高也臣聞體仁長人之謂元八句表中逐字疏釋韓栁皆然請上尊號表在漢廷亦僅有之作今天子整齊乾坤至各修貢職勢如湧出雄偉非常非臣之愚所敢隱蔽其歌功頌德之語皆托于太學廣文諸生列狀後以代奏收之斟酌得宜取正於經則亦非必然之辭也論孔戣致仕狀以明人君貪賢敬老之道也貪賢出鄭禮注若戣尚以繁要為辭二句如此乃曲盡優之之方有年過於戣即前所謂雖八九十也然人皆求進三句又即從求退一事上明其為朝廷所少老固當敬而賢尤可貪也國子監論新注學官牒題注此疏公為祭酒時所論按此牒吏部者非疏也黃家賊事宜狀若令於雍容側近至攻則有利不用客兵而召募側近土人公於此及淮西事屢言之論淮西事宜狀然可圖功考異云此蓋當時俗體如此按文選注中最多凡然後然則皆獨用然字一諸道發兵至閭里懷離别之思發兵之害今聞陳許安唐汝夀等州以下召募之利識賊深淺非不相諳委若令召募可立成軍不煩資遣若要添兵自可取足不致單弱賊平之後易使歸農又無後患擇要害地屯聚一處使有隱然之望兵勢忌分此雖防邊亦然處處置屯節節立堡但可令邊民自為之重兵扼要寇亦不敢大入若狗盜則邊民自足禦之也一論語曰欲速則不達此段尤為精彩宜特下詔云至回軍討之李文饒之討劉楨祖述公意以諭河北朕即赦元濟不問李云諸道亦知朝廷不能分兵故以實告之盧循入寇宋高祖建牙石頭城時議者謂宜分兵以守諸津要公以為賊衆我寡若分兵屯則人測虛實且一處失利則沮三軍之心今聚衆石頭隨宜應赴既令賊無以測多少又於衆力不分若徒旅轉集徐更論之耳此可與公第二條相恭末二句乃婉其詞以謝衆賊一道致死而我分數道雖衆亦力分而不可用矣義門讀書記卷三十三

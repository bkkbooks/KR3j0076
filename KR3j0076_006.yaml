body:
  text: 義門讀書記卷六翰林院侍讀學士何焯撰孟子下離婁篇離婁之明章通章皆為當時君臣非先王之道者而發第四節注所行不過差按所行接上節行字來末節我非堯舜之道不敢陳於王前正與此處相發規矩方圓之至也章惟聖人能盡其性故為人倫之至而所由無不盡其道焉愛人不親章第二節此正字與大學潔矩矩字同意我之仁智禮無所不到也天下有道章第四節可學問所謂小國七年者非謂封建小國恐是燕韓之類曰然見滕文公問為國章下所以多二年是兼要略寧外侮第五節殷士膚敏詩中多連舉殷商然此殷字乃非商之變文當解為衆也上云斯二者天也以氣化言之詩云上帝既命以主宰言之仁者上帝生物之心所以反亂為治而維氣化之衰也故有以獨當天心而非大小強弱之可論自不可為衆矣自暴者不可與有言也章首節本其身之所固有故曰自暴自棄注中著兩身字於自字極醒第二節道理若待外求則暴棄猶可解也今人人生來性中有個仁居之便是人之安宅人人生來性中有個義由之便是人之正路莫非固有無待外求豈吾身所不能乎而反甘自暴棄是則可哀也己道在爾而求諸逺章上章警不求者此覺悟求者此與上章蓋一時之言親親長長仁義之發最切近者也淳于髠曰章末節權字即是義字與術字不同權正在道上見離道言權便似將稱錘打在無星處如何稱得一物淳于誚孟子以不援正不知權耳孟子以為不足與深言故聊以手援一語謝之其實權非枉道求合之謂不得將權字看壞人不足與適也章語類云首三句當作一句讀注間字上亦當有與字按辨疑云中原古注本間上本有與字人之患在好為人師章易變盈流謙揚子雲言山殺瘦澤增髙此好為人師之善喻也樂正子從於子敖之齊章第二節舍館未定則是僅偕之行非親附王歡者也故下章但以餔啜責之末節注非好善而篤信之按陳氏所謂篤信與有諸已之謂信稍别孟子謂樂正子曰章但從之來不竟與之居徒餔啜只以道途言之仁之實事親是也章仁義是性事親從兄是道性之所發惟此為實際處盡道乃所以盡性也下禮樂只作中和兩字看不可誤認注意使經文俱成倒説程子説孝弟也者其為仁之本歟處最分曉此章可以參觀而得之參以程子論孝弟為仁之本語實字乃得分明天下大悅而將歸已章首節順者父母所為合乎道子所為亦合乎道彼此無違逆之謂非順從之順舜生於諸馮章第三節注得行其道於天下也按此道字乃指散見於禮樂文章謨訓功烈者言之第四節惟其道無不同故為國班爵祿二章孟子但因其大略即可因略以致詳推舊而為新不拘盡得其迹而自有以不拂乎先王之意也子思曰百世以俟聖人而不惑知人也亦猶是而已矣子産聽鄭國之政章第三節小水則駕木大水則造舟均人掌均人民牛馬車輦之力政讀為征注云力征人民則治城郭塗巷溝渠牛馬車輦則轉委積之屬巾車庶人乘役車言轉委積則薪芻可知委人斂薪芻亦為之役也君之視臣如手足章第三節然後收其田里季彭山讀禮疑圖云三年不收其所入誰與掌乎蓋存之以待去國之臣之歸耳按此語看得下落分明人有不為也章張子云不為不仁而後可以為仁不為不義而後可以為義有不為須兼辨之明守之嚴兩意蓋辨之愈明則其心有主而其有為也釋然不疑其所行守之愈嚴則其氣自充而其有為也沛然莫禦其所往本安溪仲尼不為已甚者章注本分之外不加毫末按朱子云然所謂本分者乃義理之至當非茍然已也大人者言不必信章當作一句讀義見語類格心章總注尹氏云云朱子曰亦言外之餘意君子深造之以道章此章重處固在自得然逐句之次又不容略須參觀或問徐子曰仲尼亟稱於水曰章仲尼所取於水者道體其事則聖人之純一不已其意亦未嘗不在學者故程子補出君子法之一層孟子因徐辟之病而藥之止告以務實者之立心似乎狹矣然斯耻也與中庸惡文之著同耻無實之不可繼則時時省察自不容己故實即是本朱子謂學聖人者必自孟子耻過情之語始第四節注暴得虛譽二句按暴得虛譽與上節注中兩漸字反不能長久與上節注中兩不已反人之所以異於禽獸者章首節注而能有以全其性按明庶物察人倫由仁義正是全其性禹惡旨酒章第五節四事之中其所以操心省身能盡其性者無不合也其所以施政立教盡人之性者則時異勢殊容有不合者矣有字作如此解則施字更有下落安溪先生全章文云其有不合者是三王有未兼也更現成得好王者之迹熄而詩亡章首節歐陽公云霸者興變風息焉謂詩盡亡者獨公一人之論如此龜山云雅亡則無政春秋所為作也安溪云詩亡殆謂正風正雅亡也周之盛也天子舉巡狩之典陳詩觀風於是慶讓行焉諸侯修述職之禮朝會雅歌於是勸戒繼焉夫是以王道行而功罪勸懲明也及周之東天子不巡狩則太師無採也故謂之風亡其有風者列國謳謡相為傳播者耳諸侯不述職則朝會無聞也故謂之雅亡其有雅者賢人君子思古念亂者耳夫是以王道不行功罪勸懲不明諸侯僭大夫叛子弒其父臣弒其君其所由來者漸矣是故春秋之褒貶所以申王事之勸懲也按鄭漁仲始疑胡氏雅亡之説謂美刺之詩亡而褒貶之書作矣非有定義詩亡於陳靈公乃孔子未生之前故曰詩亡然後春秋作東萊亦謂蓋指筆削春秋之時非謂春秋之所始也第二第三節後之學者不知所以作之由不以春秋為經世之大法而但以史視春秋則晉楚魯三國之記載其始固一也要之乃未經筆削則然耳豈知其事則桓文而已辨其名實其文則史而已正其名分不惟大義數千炳如日星抑且時措從宜莫非制事之權衡道揆之模範孔子自言曰其義則竊取之矣第三節義字兼正名盡性二意方能貼到存心義者宜也盡性命之理故皆得時措之宜可以取章首段不重恐人過與而輕死也或問甚明當參觀之逄蒙學射於羿章末節今日我疾作趙注疾作瘧疾注庾斯雖全私恩二句廢公義之説不必拘曰侵則為患小曰追則不過驅之速去使毋輕我為無備而已不必殪其將取其師也多閲春秋事自見西子章趙注蒙不潔以不潔汚巾帽而蒙其頭面天下之言性也章首節照注故利並重照語類則獨重在利末節反牽合難曉故者以利為本故有善惡兩件故必以利為本注猶所謂善言天者二句按此荀子性惡篇文第三節若將首節則字看得有不足之意則末節厯學中亦當挽入利字公行子有子之喪章首節疏云喪其子故有子之喪亭林云禮父為長子斬衰三年第二節簡略也謂於禮不足故下即以禮折之第三節注若周禮三句按周禮宰夫三公六卿之喪與職喪帥百官有司而治之凡諸大夫之喪使其旅帥有司而治之注旅冡宰下士君子所以異於人者章首節語録節問一條下云集注非定本存心只是處心與盡心篇存其心不同本語録末節許魯齋云草木到秋精氣展盡故風霜亦搖落之人精神耗散故疾病侵之到德行虧時便患難及之人若德行充實雖禍患不害也孟子有浩然之氣只是德行充實裏頭縮一分外面侵一分人有召禍之由則凡物皆能為祟難防備以此意看此節書則更無滲漏矣又云坎不盈祗既平無咎人行到憂患處如水到流得滿然後過去少些子不滿過去不得所以要宏毅堅重如舜事瞽瞍只得竭力供子職負罪引慝而已到底豫時是坑坎自滿然後流得出天下事到行不得處皆如此只得動心忍性以待不敢怠躁到見幾而作不俟終日時却又不得如此以此意看終身二字亦妙禹稷當平世章第四節禹稷所任乃轉旋天下之責直欲萬物皆得其所非效一官而已切天下剔發出有飢溺則其急宜乎倍萬方是解上三過其門不入也若空空描取思字則以聖人之材處此綽有餘裕何為如是急哉末節閉户暗貼樂字乃有味曾子居武城章首節沈猶行沈直深切廣韻在二十一侵中儲子曰王使人􅗎夫子章朱子謂楊氏所論得之楊曰聖人人倫之至也豈有異於人乎哉堯舜之道曰孝弟不過行止疾徐而已皆人所日用而昧者不知也齊人有一妻一妾而處室者章宋元刋本以卒之東郭墦間句之祭者乞其餘句不足句又顧而之他句按上文云􅗎良人之所之此卒之字之祭者字之他字緊相貫注大全不從朱子而從舊讀謬矣萬章篇舜往于田章第二節竭力耕田猶是養口體之粗節必是於視無形聽無聲有不到處不知以何事得罪於父母耳於我何哉須是孝子心裏已打算到那窮處故下節説個如窮人無所歸末節熱中趙注以為心熱恐懼猶言憂心如焚也近之大孝終身慕父母親親仁也慕親乃所性之仁根於心者物欲害之則孝衰矣聖人盡性斯渾然天理身終不足以移之只大概透發不失本心不可即貼舜説娶妻如之何章第一節故為孤孑之行以遂其孤憤之私是為懟末節然則舜偽喜者與與疑詞非詰詞蓋欲求其義理之歸也象日以殺舜為事章第二節殺三苖於三危尚書纂言曰左傳云蔡蔡叔孟子曰殺三苖字異音同古字通用也末節趙注源源而來如流水之與源通咸邱蒙問曰章首節注齊東齊國之東鄙也按趙氏解為東作田野之人故釋此句東鄙則海濵之野人也第二節普天之下四句引詩之意是舉逺以該近我獨賢勞也北山詩云大夫不均我從事獨賢孟子即以詩説詩也注此詩今毛氏序云按此注獨取小序為説第三節瞽瞍底豫而天下之為父子者定孝思維則之謂也人有言至於禹而德衰章安溪云其子之賢不肖皆天也天字似以氣數言天之所廢天字似以天心言要之皆氣數而理存乎中如堯舜之有敗子仲尼之不遇其君氣數之不幸也天心亦不得已而廢之夏商周繼世有人是氣數之幸也天心亦因而不廢之第二節一以二十又八載一以十七年一以七年故曰相去久逺施澤於民當根薦於天説方與上下相應第四節伊尹周公非客也萬章問意原統自禹以後言之故并推論商周之事若仲尼則生於王澤既竭乃有聖人之德而不在天子之位其遇獨與舜禹異此又其事理之變故并推明其有德無薦之由使天意人事詳盡無遺耳人有言伊尹以割烹要湯章第二節繫馬千駟弗視也韋昭國語注繫馬良馬在間非放牧者也第三節若講成髙蹈避世便不是伊尹心事蓋耕野而樂堯舜之道便是自任以天下之重但非有王者興則不可為名世必成湯果大有為然後出而於吾身親見之所謂逹可行於天下而後行之者也第六節只緣已是先知先覺常處畎畝斯其責不可他辭不就湯聘便屬推而納或曰百里奚自鬻於秦章第二節注故不諫而去之秦按元板無秦字末節注然此事當孟子時已無所據按辨疑云孟子言宫之竒諫百里奚不諫又言年已七十所指之事亦已詳矣末可謂之無據也注文蓋見孟子之言與史記所載有不同故有此説讀此章者當以知虞公之不可諫而去為句去謂去位也之秦年已七十矣則與史記所言晉虜走宛秦贖之授以政自不相妨不必言已無所據伯夷目不視惡色章首節以待天下之清也德盛化隆既洗腥聞又不煩放伐方是伯夷所謂清而與神農虞夏若合符節也第四節龜山云孔子之去魯曰遲遲吾行也去父母國之道也然燔肉不至不稅冕而行何遲遲之有曰孔子之欲去魯也久矣欲以微罪行不欲為苟去故遲遲其行也燔肉不至則得以微罪行矣過此復無辭以去故不稅冕而行非速也第六節條理二字亦要重注若獨奏一音三句按此有始終而無條理而後擊特磬以收其韻按李云此於三禮無所考不知朱子所本周室班爵祿也章第四節天子之制地方千里百倍公侯凡言方者皆四方齊一之數當開方計算方千里者千倍一百萬里也方百里者百倍一萬里也七十里者七十倍四千九百里也五十里者五十倍二千五百里也附庸四十里者四十倍一千六百里也三十里者三十倍九百里也二十里者二十倍四百里也十五里者十五倍二百二十五里也禮王制注小城曰附庸庸古墉字厚齋云王莽曰附城蓋以墉為城也以姓名通謂之附庸猶言屬城也第五節內諸侯祿也外諸侯嗣也王官不言公者官闕而不備也受地止言視侯者朱子謂古者天子之三公八命及其出封然後得用諸侯之禮蓋仕於王朝者其禮反有所厭而不得伸今但視其祿耳公侯皆方百里故受地惟凖之侯也亦有本為侯伯入為卿士者則亦受畿內之地蓋國祿所入自以守宗廟之典籍此則所以報其功不嫌其富倍也且王畿備五等之制而陪臣極隆殺之殊又不使侯國得擬於天子耶注王畿之內二句按國不繼世故畿內得以容之第六節注徐氏曰大國君田三萬二千畝云云按三萬二千畝三十五井三千二百畝不及四井八百畝不及一井庶人在官府史胥徒也按府史由辟召胥徒給徭役第七節安溪先生謂君田皆三萬二千畝卿田皆三千二百畝徐注誤矣但次國三卿下卿命於其君小國三卿中卿下卿命於其君皆止食大夫之祿故有三之二之之殺耳按但以大夫倍上士之數核之又不合上下文法正同不應大夫士不用合算也姑如徐説可矣朱子謂周禮王制不同姑勿一一以求其合可也况王制有下大夫五人若以四千八百四倍算之與三卿又不合乎敢問友章第二節注張子曰獻子忘其勢云云按或問中不滿張子説敢問交際何心也章第二節託於諸侯章云無常職而賜於上者以為不恭也此云尊者賜之是蓋有君臣之義存焉故末節云際可之仕也公養之仕也交際即是仕於其國而所得之祿賜孟子為卿於齊其祿十萬乃交際之一端也而况受其句上冠以孔子之仕於魯也可見交際與仕不是兩事但將以為行道之機非徒貪其豢養耳舊文皆作前論交際後論仕合者反離多費穿插可謂憒憒第三節注孔子受之云云按下文於衛之事即是本身證佐引陽貨蒸豚事却稍逺第四節罔不憝是衆之所共棄而無復可以交接之理矣私箋云所不辭二句一説三代相傳以此法不須辭問也於今為烈烈明法如之何受其餽也此承不待教説來甚明順按此本趙注第五節與之交際非徒免死而已矣蓋亦化之於善使諸侯聞吾教而能改則可以取民有制以三代之治民者治民即此人也充類至義之盡也義即義乎不義乎之義當云合道得宜守溪用權變推移未諦第六節注亦欲小試行道之端以示於人按示於人見字明白第七節孔子有見行可之仕見即上注中所謂示也見行可即是為之兆萬厯癸未文都不合上節注意大全中輔氏説得之世得云以所就三章觀之則見行可不根為之兆亦未為不是仕非為貧也章首節道不可行於時本不當仕然家貧親老或需祿養則我身有時而不得不仕也漢書兒寬傳注養主給烹炊者也故趙注云不能親執釡竈注道與時違按四字乃喫緊當著眼第二第三節郝京山文兩用不敢也甚合第三節其職易稱非茍簡之謂職小任專反無撓之使不得行其道者也國外百里為郊郊外有關抱關迹最踈逺與下立朝相反行夜擊柝則凡清晝攫金不與其責矣注柝夜行所擊木也按元板作行夜朱子本用趙注末節立乎人之本朝二句申明有時二字罪也此卑貧所以宜居耻也此尊富所以當辭士之不託諸侯章第五節使之亟拜則亦幾於賜矣養君子之道楊氏引周禮王燕則以膳夫為獻主之説甚妙敢問不見諸侯何義也章首節管子注立市必四方若造井之制故曰市井一鄉之善士章首節一鄉之善士亦有散在一國之中天下之大惟我之善蓋於一鄉自然心同理同相為契合矣盡字須如此看注隨其髙下以為廣狹也廣狹指善説若看作人之衆寡則上半截便説不去第二節知其人則非徒想像之而已亦還以自驗吾身之善如何尚友何所為取諸人以為善也告子篇性猶把栁也章告子但知氣之為性而不知理之為性故妄謂知覺運動乃人生所固有仁義禮智則皆自外而至乃人所本無必待為之而始成遂設把栁杯棬之喻孟子亦未與正言性為天理仁義之根於性只就一為字折倒渠使無所置辨既而告子自病其説之偏於惡也於是下章復為湍水之喻謂善惡皆性之所無而生於習則終以氣為性而已首節注如荀子性惡之説也按性無善無不善此告子宗旨所在與荀揚所見自别注意當渾之性猶湍水也章末節其勢則然也勢字與理字相反食色性也章第三節且謂長者義乎二句當如存疑兼長馬長人之説孟季子問公都子曰章孟季子初是謂所長非所敬辨上章長之者為外及孟子剖析出斯須之敬則又謂敬如此隨人轉變則并敬亦不由內也始之外長蔽於一偏既乃外敬則陷於性本無善之説而莫悟矣答問間有兩層意思首節未逹長之者義乎之言故私論義內為不可解也第三節上章就敬之同處謂其在外此章是就敬之異處見其在外兩般説話一樣機鋒也第四節為尸是為祖尸語類云古者為尸必隔一代孫可以為祖尸子不可為父尸以昭穆不可亂也公都子曰告子曰性無善無不善也章首節未發以前何嘗有所謂善惡第二節此言雖未可定於初但教化所係者大此近荀子説第三節有性善有性不善二有字對第一節二無字下又言非他人所能為對第二節似駁兩家第五節乃若之若舊訓順故注特云發語辭須看注中但字天下之言性也則故而已矣即此節以情言性之意也情之發也兼善惡而此言但可以為善不可以為惡者故者以利為本情之發而為善則本乎性而理之順者也其為惡乃鑿而使逆其所發者也第六節此處才字孟子從性字一滚説下只在理上論未曾論到氣程子之説當從言外補出夾雜便失語意注乃物欲陷溺而然按此已起下章第七節我固有之也有字正破告子無字第八節上即情善而泝源於性此又舉孔子之説詩見惟性本善故情善而孟子之獨言性善非無徴也性不可見故以情言然斷乎以善為固有者人之性天所命也推本生民之始是固有二字下落有物有則有字與上節有字相應秉彛指性商書所謂恆性也懿德指仁義禮智中庸所謂性之德也雖一理而層次有分注是民所秉執之常性也按千萬人所同千萬世不易故曰常總注學而知之按此所謂思也求也孔子所言下愚不移者按此所謂舍則失之富歲子弟多賴章第二節牟麥是降才之同能同生同熟者不陷溺者也其不同生同熟者陷溺則然也曰播種曰其地曰樹之時是三者皆非從天降也而可云皆熟以上明降才之同乎不同熟者地之不齊雨露之不齊人事之不齊非牟麥之才有殊也末節邵子曰命之在我之謂性性之在物之謂理牛山之木嘗美矣章第二節此節氣字根脈須要分曉語録中有兩條最善而大全皆遺之葉味道問良心與氣合下雖是相資而生到得後來或消或長畢竟以心為主曰主漸盛則客漸衰主漸衰則客漸盛客盛然後勝得這主故曰志動氣者十九氣動志者十一吕昭德問夜氣一章曰這病根只在放其良心上蓋心既放則氣必昏氣既昏則心愈亡兩個互相牽動所謂牿之反覆按此則放其良心下當先補出氣昏一層日夜所息中又當就無所作為補出氣定而性復之意然後轉出平旦清明良心必有發見前後意方融貫雖存乎人者人字謂人之本來質地方與下未嘗有才相應以下氣字自貫注有梏亡之矣有當讀去聲魚我所欲也章第二節義非外至乃所欲有之所惡有之蓋本心也是故從其甚者耳此處是精義事第四節此處是省察事即省察此良心之失與不失也第五節此節重在皆字見非但可以望賢者而不可以責中人也羞惡之心義之端也能常存之則必能舍生取義矣第七節臨事不能省察者由於平日先無精義之功良心雖有時發見却易為利欲所昏蔽故不辨禮義而至於喪失也末節注本心謂羞惡之心按羞惡之心是義然義皆從仁出蓋謂失其仁義之心也故下章以求放心言之總注是以君子不可頃刻而不省察於斯焉按此所以下章説求放心仁人心也章首節私箋云有此心即有此仁心而不仁即非人矣末節私箋云心即仁也求放心即求仁也注蓋能如是云云按自蓋字以下乃朱子以程子之意推而論之所以防異端之流弊也不必入口氣程子云云按約之使反指未學問人尋向上去指既學問人此章大意新安陳氏之説甚明鈞是人也章第二節注心得其職則得其理按理即天之理若能有以立之按此句是操存根本則事無不思按謂無不得其理操存涵養使常清明乃所謂先立其大也事至能思當留在不能奪中講總注君子存誠二句按純乎天理之謂存誠在思之先敬則不昏故常能思天君泰然按心居中虛以治五官夫是之謂天君出荀子天論篇有天爵者章首節南軒云仁義又言忠信忠信只是誠實此二者雙峯云須忠信樂善仁義方為我有乃為可貴天爵性分也人爵勢分也欲貴者人之同心也章首節貴於已者已有可貴之實人亦從而貴之兼內外兩層説故下文既言仁義又言聞譽末節以食比仁義以衣比聞譽蓋二者又有內外先後略分輕重也膏粱趙注膏細粱如膏者也令聞廣譽根仁義來文是衣繡是裳欲貴之情有貪與夸二種聞譽二句又對夸者言之也不然只説仁義貴於己之理盡矣羿之教人射章首節盡其性第二節由其道上節立志希聖下節用力有漸此章言教與學不是空談須從實地做得到家方能有成聖譬則力也規矩方員之至也本非易事看得彀與規矩粗淺是時文之謬也任人有問屋廬子曰章第三節不識性則但知甘食悅色而以義為外不知教則縱其甘食悅色之欲而以禮為輕豈知禮本於羞惡辭讓之天則不如是則違禽獸不逺而無以立也可與立而後可與權第五節孟子以本末破他輕重二字下上之解不如趙注云夫物當揣量其本以齊等其末知其大小輕重乃可言也數語明暢末節往應之曰孟子言當應任人如是也人皆可以為堯舜章第三節奚有於是朱風林四書旁注作言安有食粟而已之理却不若後來林次崖云是字指形體而言所以為堯舜者不在於形體在於作為也口氣較合弗為耳弗為者不盡其才者也第四節注陳氏云云按道性善稱堯舜原是一事今人只讀楊氏説便非公孫丑問曰髙子曰章第二節小辨之怨親親也親親仁也須看注中一發字謂其猶有戚之之意則所性之仁見於父子者賴以未泯耳兩截固有次第第三節此問最善善於説詩即亦可以通乎孝之變矣第四節過小孔疏母遂不嫁之説甚善幽王黜嫡妻廢嫡子已是人倫之大變不須更推到宗社安危上孟子居鄒章第五節成字從上節及字中來末節儲子得之平陸趙注儲子為相得循行國中淳于髠曰先名實者章末節注則亦未為深知孔子者按知其一不知其二知其小不知其大也總注尹氏云云按未嘗知仁第一第二節未嘗識賢第三節至末五霸者三王之罪人也章第二節天之立君以為民也必有綱紀法度則兵爭可息逐層敘致正見討伐為最重之事而不輕於勞師動衆也五伯摟伐則無王勦民斯為罪之魁矣然桓盟之盛猶不約而信豈若今之諸侯爭城爭地者乎以下章連類參觀則今之大夫所為逄長者亦可以得其實矣王制名山大澤不以封其餘以為附庸間田諸侯之有功者取於間田以祿之其有削地者歸之間田曰祿之則以其地所入者為慶及身而止非此地世世屬之此國也注益其地句當酌趙氏於制度未暇詳也然王制固有加地進律之語更詳之第三節無有封而不告安溪先生云此句繫在交鄰之後蓋存亡繼絶如城楚邱之類非指本國臣下魯欲使慎子為將軍章第三節趙注曰山南曰陽太山之南謂之南陽也君子不亮章語類云亮信之小者孟子所謂亮恐當訓明字魯欲使樂正子為政章末節人將曰者中心逹於面目人一望而識之描寫之如此也舜發於畎畝之中章首節孟子羞稱五伯何以帶説三子為以下即是中人也第二節須看是人人字原與下節不同其生也有自來命於帝廷為大任也然既生之後或不能無氣質之蔽習尚之染故必先磨鍊一番此又存乎其人之善體天心自能成就乃因材而篤耳苦心志是動心勞筋骨三句是忍性行拂亂是益不能陳定宇分配極好第三節而後作如太甲悔過自怨自艾處仁遷義後字對上先字第四節法家拂士對上徴色發聲敵國外患對上困心衡慮舉有國以包在下者不是又推開説末節論來末節只宜頂人恆過兩節不宜因尹氏注總上四節來盡心篇盡其心者章第二節存心似致中養性似致和操而不舍是敬以直內順而不害是義以方外總注然智而不仁云云按如釋氏之學是也萬物皆備於我矣章首節安溪云萬物直以人物言不兼事類説尤與下文仁恕相貫免費曲折末節進於萬物一體之公則無所虧於皆備之本然矣子好遊乎章末節獨善其身謂其德望足以輔世長民而仍不枉道以求合待文王而後興者章此為當世學者不知信從孟子而發世得云不云待聖人而後興而曰待文王而後興隱隱有權德兼優意思若道德不藉勢位而常存乎人心雖去聖千載誦詩讀書與並世無異霸者之民章末節注舉一世而甄陶之按如陽和一煦萬物皆新仁言不如仁聲章四項都不可少而其效有淺深故當務其至者無為其所不為章安溪云而已矣三字在能擴充上見注不能以禮義制之私箋云又添出一層按禮義是能反是心之實非添一層也人之有德慧術知者章首節先生云術如四術之術在心之理謂之德得之于天處事之方謂之術得之于人第二節德而動忍之使慧生則知幾其神矣術而增益之使智全則誠能動物矣操心危故戒懼于預而常覺慮患深故修省益密而常慎也操心德慧之本慮患術知之發操心危則涵養到慮患深是閲厯熟有事君人者章第二節為悅當對下二種人説不當以首節佞媚比擬能安社稷其人品亦髙矣只是太著意耳注中如小人之務悅其君句有病廣土衆民章第三節分如左傳四國皆有分之分惟人也得其秀而最靈性之稟其全者其分同也然欲動情勝利害相攻無以定之者多矣聖人定之以中正仁義而主靜立人極焉則分定之説也以太極圖解證之定字不可落空明甚語録所謂合下都定者言聖人不待勉強耳第四節此節為定之之藴藴積也指四德之根於心若誤為韞櫝而藏之韞謂四德乃性之所藏失朱子本義矣注氣稟清明性之也無物欲之纍不為他隔斷總注然其所得于天者按此句是分伯夷避紂章末節注趙氏曰三句只解得上半截五十以下又反覆言之若無王政則雖有美意亦不能使老者皆得其養不暖不飽二句正與上節兩足以一可以反應孟子言之重辭之復須著體貼不可只與上半截一直説了孔子登東山而小魯章第二節安溪云瀾與容光不是大處亦未是本處蓋所由以觀本者但觀斷港絶潢必無瀠洄湍急而雷電爝影不能幾微畢照可見總注此章言聖人之道大而有本按本猶之基也楊子取為我章第一第二節拔毛摩頂是孟子形容不可看作實有此事總注中之所貴者權按只是辨中飢者甘食章心不在則食而不知其味人心一向迫於飢渴便此心做不得主失飲食之正上四句中須隱隱見得沒有為味之主宰者方好人心亦皆有害是道心為人心所汩口腹以人心之知覺為主則知所擇而不失其正味矣人心以天命之秉彛為主則知所擇而不失其正理矣正字還他分曉始得栁下惠不以三公易其介章不易當對不辨禮義而受萬鍾看蓋察義至精而常不失其本心故也陳夀翁云介有剛介介特廉介之意惟其分辨所以能如此亦如廉本訓廉隅惟其廉隅分辨所以清廉廉潔有為者辟若掘井章此章不可作始勤終怠等語蓋掘井九仭原是能用力者所差不及泉耳猶如讀書窮年纍月所讀頗多但未通耳茍其及泉雖不九仞何害但不及泉雖更加九仞之功倍於九仞之功亦不得不然耳何則井中本自有泉及泉而後為井乃已焉而棄其井乎如此方不是為山九仞章公共話頭仲子不義與之齊國而弗受章孝者所以事君弟者所以事長無親戚則必并君臣上下而亡之矣孟子自范之齊章首節私箋云居移氣二句當虛説不專屬貴的一邊按夫字始落到王子身上只言盡人之子皆有可移但患自不肯移耳第二節廣居人所固有却必待養而始成始之求放心終之得安宅動心忍性等事皆所以移之也形色天性也章須體會總注中程子意今人只是楊氏説耳齊宣王欲短喪章第三節注陳氏云云按陳氏耆卿字夀老著孟子紀蒙厭於嫡母按厭於王耳母不厭子此趙注也亦誤閻若璩曰陳氏之誤亦有自來趙岐注王之庶夫人死迫於嫡夫人不得行其喪親之數當岐同時康成亦注孟子未知其解云何要以喪服記公子為其母練冠麻麻衣縓緣既葬除之鄭注曰諸侯之妾子厭於父為母不得伸權為制此服不奪其恩也傳曰何以不在五服之中君之所不服子亦不敢服也蓋諸侯尊絶旁期以下何有於妾公子被厭不敢私服其母父卒猶有先君餘尊所厭亦不過服大功其嚴如此晉胡淡生母喪嫡母尚存疑不得三年以問范宣宣答曰嫡母雖貴然厭降之制父所不及婦人無專制之事豈得引父為比而屈降支子也説與鄭注合不知何緣孔頴逹疏戴記多有厭嫡母之説流傳至宋闌入集注朱子亦有取此遂成不刋之典且公子為母練冠之下麻衣之上仍有一麻字蓋以麻為絰帶何竟遺去是不獨陳氏之説當請刋正所引儀禮亦當請加補正云君子之所以教者五章第二節草木之生亦須先問其種子如何其天資誠如顔之明健曾之宏毅又當用力已至乃可言雨化耳為注中補此一層方是五教第一句第五節重在君子使人得以私淑與豫私淑諸人句不同道則髙矣美矣章末節注中道而立言其非難非易按非難非易不可平對中道句只對針不可幾及耳君子之於物也章上四句入講宜云君子所施不自物始其於物也但愛之而弗仁君子所厚不自民始其於民也但仁之而弗親知者無不知也章鄭氏禮記注放飯云去手餘飯於器中人所穢此從趙注以流字例之趙注是總注雖遍知人之所知二句按出荀子儒效篇有人曰我善為陳章第四節革車兵車也左傳吳用木楚用革留侯曰殷事以畢偃為軒民為貴章得乎天子者得乎君也即於民為貴對面引起君為輕脈絡復言得乎諸侯者諸侯亦君理如是始備也有此句則下節發明君為輕即可承諸侯來説不言天子而義自顯且亦言之無罪矣孟子文章周密穩當如此所以為經仁也者人也章此章只言道之所由名故曰合而言之不説體道上注人之所以為人之理也按此釋人也句齊飢章首節須看國人皆以四字不問其義之可否而但欲以衆情動之也第二節則之野句法閻引周書則至於豐為證口之於味也章安溪云兩謂字是辨明性命之説蓋不與命合一者非真性不與性合一者非正命也不是果有兩項性命而君子有意伸抑其間本文所謂性也命也乃就世俗所謂性命言之如論語野人也君子也之比第二節聖人之於天道也聖人與仁義禮智相承天道與人倫相對今人俱誤讀注意浩生不害問曰章朱子答敬夫此六位皆他人指而名之之辭第三節注可欲而不可惡按語録作有可欲而無可惡更明人皆有所不忍章第一節注物欲之蔽按蔽字極好人心一為私欲所蔽到處有物隔礙壅塞見得這邊昧却那邊仁義雖吾固有不能坦然由之矣須猛力抉去其蔽使豁然洞逹方能自此至彼通行無礙而克全吾仁義之本然也如水然抉去壅塞方能通流決逹也充則洊至習坎之功清流既導又流而不已第二節逹是由此及彼用力做去充則更能滿其量也自是兩層若兩節一意則贅設矣堯舜性者也章第二節或能於暫而不能於久或顧其大而不暇於細即非盛德之至養心莫善於寡欲章安溪云寡欲是就見成説其所以寡欲則自克己持敬中來又云養心是養其仁義之心非徒養其虛靈之心也曾晳嗜羊棗章首節羊棗非棗也乃柿之小者初生色黃熟則黑似羊矢其樹再接即成柿矣余乙亥客授臨沂始覩之沂近魯地可據也今俗呼牛嬭柿一名㮕棗而臨沂人亦呼羊棗曰㮕棗此尤可證柿之小者通得棗名不必以爾雅遵羊棗之説為疑若邵武士人偽作正義以羊棗為樲棘之屬則甚謬此乃本草所收酸棗也自出山石間色赤味酸第二節膾是生肉炙是熟肉孔子在陳曰章第七節又不可得與上不可必得相應第十二節義信亦德之類特佞與利口所亂者一節而鄉原賊德五常百行無不為所亂耳由堯舜至於湯章首節朱子謂得以聞之賴於見者經文語勢固然看先有首句既言堯舜以是傳諸湯矣而又敘見之大意似個中間接續人孟子亦自任如此耳講章輒謂看此得以二字便見是見知重殊覺誤會朱子本意第三節尚書大傳曰閎夭南宫適散宜生學於太公望見羣輔録末節上而為君者其事行則聖人作而萬物覩孔子不得位垂諸文以傳諸其徒一時或無由盡知莫為之後恐其淆亂所以獨幸鄒魯之近故此節比上文但言世之相去又多一層亦正與君子之澤章相表裏也然而句指見知則亦句指聞知説無正是説有注不敢自謂已得其傳此正文然而句而憂後世遂失其傳此正文則亦句然乃自見其有不得辭者此正文二句交關處此層須於言外或篇終見之所以明其傳之有在然而句又以俟後聖於無窮則亦句義門讀書記卷六

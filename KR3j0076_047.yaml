body:
  text: 義門讀書記卷四十七翰林院侍讀學士何焯撰文選詩顔延年北使洛擬士衡赴洛詩與下還至梁城首在顔集中亦為清拔還至梁城作擬赴洛道中作始安郡還都與張湘州登巴陵城樓作清壯鮑明逺還都道中作字字清新句句竒登艫眺淮甸一頓妙謝元暉之宣城出新林浦向版橋次聨固自警絶然其得勢全在首聨出字向字無不貫注既歡懷祿情二句上句是之郡下句是出江雖無元豹姿二句之郡收以亷節自厲使事無迹休沐重還道中還卭歌賦似二句按還卭義取家徒四壁言遊宧以來有相如之四壁無袁紹之兼輌所以思歸耳重闈之戀非其誠也晚登三山還望京邑首聨可作用事之法次聨三山在金陵西故向晚而西頽之日轉明也喧鳥覆春洲二句喧鳥雜英以比當日得路之人去國已可悲况滯淫而佳期不可必乎邱希範旦發漁浦潭步趨康樂而未屆精微所工特模範間矣體物工矣興象不逮沓障下插出村童野老一聨與棹歌鳴鞞縈拂則結處坐嘯卧治氣脈皆貫穿生動然後模山範水亦紆餘不直矣邱方出守永嘉未容先事遊覽也崖傾嶼難傍五字不惟敘致窈折亦可隨勢脫卸出後四句書家所謂意在筆先也沈休文新安江水至清淺深見底貽京邑遊好休文素被文惠太子親遇鬱林隆昌元年由吏部郎出為東陽太守此詩蓋不能無望於中矣清濟涸無津續漢書郡國志溫蘇子所都濟水出王莽時久旱枯絶非用吳越春秋事紛吾隔囂滓隔囂滓自言此生辱在泥塗也注非寧假濯衣中假當從文苑英華作可為是乃與隔字相應無斥京師為囂滓之理也王仲宣從軍詩按詩所言亦不止二十年事當是二十一年從征吳時作也徒行兼乘還二句如此何異作賊何如昌黎士飽而歌馬騰于槽八字為有雅頌風格也詩取紀實亦不為病孰覽夫子詩二句建安二十一年操進爵為王殺中尉崔琰斥尚書僕射毛玠當時必有髙蹈以避禍者故粲之言云涼風首我君順時發桓桓東南征魏志建安二十一年冬十月治兵遂征孫權朝發首許歷為完士史記軍士許歷請以軍事諌完當作軍傳寫之誤也善以為全具張銑又解為凡士六臣之庸妄如此司馬貞史記索隱載江邃解完士之語云漢令稱完而不髠曰耐是完士未免從軍亦復過於迂曲然相仍作完固已久矣悠悠首上半篇皆反與譙郡激射顔延年宋郊祀歌不採録漢郊祀房中諸篇者與此書文體不相入雅與題稱麗不病蕪揚班儔也康樂亦復不能兼古辭飲馬長城窟行兩地難會面兩情終如一輾轉生出結句長字綿綿思逺道伏長字枯桑知天風二句桑常經風雖枯猶知之水常經寒到海猶知之若新少年不通人情各自媚恱於君子誰為我言離思之苦乎客從逺方來應前逺字上有加餐食下有長相憶亦先尊者而後及已私長相憶應前思字長歌行何等筆力魏武帝短歌行猶是漢音宋書明明如月一解在呦呦鹿鳴之上斯為文從字順觀後半則發端乃傳所謂古之王者知壽命之不長故並建聖哲蓋此詩之旨也何以解憂反言之也唯有杜康説文帚字下注云古者少康作箕帚秫酒少康杜康也葬長垣苦寒行此篇征髙幹時作魏文帝善哉行丕他日詩云壽命非􅔬松誰能得神仙遨遊快心志保已終百年其言如此其偷也復有子孫黎民之逺圖哉詩以言志文帝之志固已荒矣風俗衰敝不待何晏王弼之徒出也髙山有崖二句崖與枝以比氣類之同注非燕歌行秋風之變七言之祖魏世已作燕歌行十六國之機兆動矣極於梁元帝而文武之道盡于江陵之敗曹子建樂府詩四篇不無托寄一一牽附反失之矣箜篌引此篇亦長歌短歌之義置酒髙殿上髙殿猶髙堂美女篇采桑岐路間豳風之采桑者女公子也故以自比珊瑚間木難上云明珠交玉體則珊瑚當從廣雅木難廣箋其色黃出東夷行徒用息駕二句用羅敷詩中語借問女安居二句不惟其才身又托在親藩非若幽陋難於上逹豈宜反見遺也詩靜女俟我于城隅傳云以言髙不可踰盛年處房室二句植求自試而不得故其言云白馬篇此即所謂間居非吾志甘心赴國憂者也仰手接飛猱二句倒裝句身俯則馬馳故迎于前也名都篇結處四句言不能垂功名于竹帛而徒逰戲以須老為可歎也石季倫王明君辭逼似陳王此詩可以諷失節之士序胸奴盛請婚於漢時陳湯斬郅支傳首呼韓邪單于復入朝非薦女和親也強盛請婚殊乖本事後世作者多謬宜也昔為匣中玉二句世之不安為匣中玉而甘心為糞上英者多矣如昭君自向掖庭令請行其鑒也君子行語甚質直却近于風雅前三聨君子之事後三連則聖賢之歸前則自律之嚴後則與人之周也瓜田不納履邱光庭兼明書云諸經傳無納履之語按曲禮曰俯而納屨正義曰俯低頭也納猶著也低頭著屨則似取瓜故為人所疑也履無𢃄著時不必低頭故知履當為屨傳寫誤也陸士衡樂府數詩沉著痛快可以直追曹王顔延年專寫仿其典麗則偶人而已猛虎行起手反古詞之意宋人翻案實祖述於此自日歸功末建以下所謂多苦心也末云俯仰愧古今惟恐有愧於俯仰所以一食息而不敢茍也君子行較之古詞猶為深切去疾苦不逺二句此即發眀古詞不處嫌疑間之意乃下所謂近情苦自信也福鍾有兆以下言天命之不可知禍來誠無所避人事可以自主猶可無愧于心傾冠之難掩于朗鏡皆自取之是以君子常防未然豫逺疑似於兆端未著之時卒能自求多福順乎夷簡之天道也注家未暢作者本意從軍行胡馬如雲屯應北戍越旗亦星羅應南陟豫章行逺節嬰物淺逺節謂向時飲馬長城窟行後惟老杜前後出塞可以追配之末德爭先鳴在傳師克在和故以爭功為末德也門有車馬客行悲涼古直君子有所思行此君子以戒有位者也以此與鮑明逺相較則遺山詆士衡為布榖真不知量也齊謳行南界聊攝城南字必為西字之誤而李善必為曲説以解之何哉長存非所營師尚父桓公之業所當及時自勉長存非所營也悲哉行緣情綺麗斯為不負此入洛之後為北士所輕而賦長秀被髙岑秀樂府作莠亦澗松山苖之意傷哉遊客士遊客樂府作客遊然似與發端遊客二字相應也按宋本亦作遊客吳趨行曰昌門曰吳邑所歌專在一縣不為吳郡作也泠泠祥風過祥當作鮮江淹雜擬許徵君自序詩注中引此句作鮮風樂府及吳郡志皆作鮮如詩度其鮮原之鮮詁為善風亦與泠泠相貫慶雲恰對王迹隤陽九以下言昔惟為侯國今乃出天子也矯手頓世羅世羅猶言世變也吕向注以為舉手下羅天下英賢而用之亦非也禮讓何濟濟二句收泰伯季札密緻短歌行華不再陽華日華也豈曰無感六句忘憂所以合歡無荒所以知莭日出東南隅行或曰羅敷艷歌注引崔豹古今注羅敷為千乘王仁妻採桑于陌上趙王見而悅之欲奪焉羅敷作陌上歌以自明按詩中不見自明之意玉臺只題為艷歌行照此髙臺端髙臺指在上之人此刺晉人無政淫荒遊蕩王公以下皆不能正其家當以令升之論同觀與羅敷本解殊旨塘上行注古詞或云甄皇后造或云魏文帝或曰武帝按以本詞為甄皇后造者近之謝靈運會吟行會謂會稽也吟猶咏也擬吳趨行樂府詩宜讓明逺謝公不嫻斯體他章亦無可觀曩疑吳趨行既述泰伯仲雍之化復述大帝創業四姓夾輔所謂樂操土風也靈運此詩既序大禹及句踐舊迹當舉永嘉南渡名臣將相出於會稽以徴邦彥之盛且文靖常居會稽而獻武又為內史乃皆略之未免舉典而忘其祖後細玩詩中亦故有微旨首敘禹功及勾踐伯業不敢忘其在上者也自范蠡以下皆客遊之杞梓則所以增土風之重固隱然在南渡諸賢矣不明言近事恐一羣白項烏張其喙耳往時於斯藝實粗致滋妄議會吟自有初二句會稽以大禹得名兩京愧佳麗八句會稽之初安得有此梁鴻去桑梓事止於明帝時則吳會未分之始也鮑明逺樂府詩至明逺已發露無餘李杜元白皆從此出也鍾記室謂其含景陽之俶詭兼茂先之靡嫚知之最深然亦具太沖之瑰竒太白退之學鮑處多他家則求味兼採耳鮑不及謝行路難諸篇却是七言之祖與此書之體不合故未甄收東武吟密塗亘萬里二句語極竒然烏有是理將軍既下世八句波瀾甚濶已為老杜啓行腰鎌刈葵藿二句晦翁謂此二語分明説得個倔強不肯甘心之意棄席思君幄四句言欲如晉主之不捐棄席田子之不棄疲馬也文義本明注者自擾結客少年場行結語作悔艾之詞於詩教合矣東門行直追十九首又近景陽鮑詩中過事夸飾竒之又竒顧少餘味此篇佳處乃在真朴也一息不相知二句驚心動魄苦熱行可敵景陽苦雨白頭吟世議逐衰興恆言興衰倒作衰興韓詩用字多如此放歌行八篇之中此作無愧風雅矣小人自齷齪二句即下所謂遲回也夷世不可逄二句曠士所懷則如此也今君有何疾二句結得婉有味外味升天行似景純解玉飲椒庭解玉謂服玉屑繆熙伯挽歌詩注譙周法訓曰挽歌者髙帝召田橫至尸鄉自殺從者不敢哭而不勝哀故為此歌按五百人不難自殺乃至不敢哭耶周奈何以小人之腹量君子風俗通義言漢末時京師賔婚嘉會皆作魁􅪡酒酣之後續以挽歌又後漢書周舉傳陽嘉六年三月上己日大將軍梁啇大會賔客宴於洛水酣飲極歡及酒闌唱罷繼以薤露之歌坐中聞者皆為掩涕蓋漢末尤尚之故魏武父子皆有此作論其出拔莫過陳思王首録熙伯拘限本詞也謂挽歌始于田橫賓客恐亦不然纂文云薤露今之挽歌也宋玉對問已有陽阿薤露矣推而上之左傳哀十一年公孫夏命其徒歌虞殯杜注云送葬歌曲莊子亦有紼挽之文司馬紹統注紼引柩索也挽哀歌也詞極峭促亦淡以悲陸士衡挽歌詩卜擇首按虞殯本謂啓殯將虞之歌此為得其本意也殺子非所能此用芊尹申亥事雜歌荆軻漢髙祖二歌不可以詩格論劉越石扶風歌此詩疑為假氏所幽而作陸韓卿中山王孺子妾歌擬怨歌行陸士衡之樂府雖本前人之意實能自回風氣所以可尚韓卿生永明天監之時而規撫前人略不能自出新意豈非所謂失肉餘皮者乎古詩十九首行行首胡馬依北風比興下所謂顧返也浮雲蔽白日風刺努力加餐飯忠厚青青河畔草首草興蕩子栁興美人昔為倡家女二句昔為倡家女閉之總章晚嫁復遇蕩子則是終身不諧也西北有髙樓首誰能為此曲二句水經注引琴操云殖死妻援琴作歌曰樂莫樂兮新相知悲莫悲兮生離别明月皎夜光首此其太初以前之詩乎下孟冬寒氣至則為夏令故詩非一時一人之詞也秋蟬鳴樹間自比如秋蟬之悲吟也冉冉孤生竹首孤竹是興女蘿是比劉彥和云古詩佳麗或稱枚叔其孤竹一篇則傅毅之詞迢迢牽牛星首脈脈不得語脈當從見從目亦可通從月則乖其義廣韻嗼字下箋列此作嗼嗼不得語回車首榮名以為寶榮名以名之不朽為榮也諺曰人貌榮名驅車首萬嵗更相送六句深言之即退之謝自然詩不越此矣彼儒者之文詩人忌語切耳去者日以疏首此亦當時紼謳也生年不滿百首唐李石為文宗説此詩云人生不滿百常懷千嵗憂會不逢也晝短苦夜長暗時多也何不秉燭遊勸之照也臣願捐軀命濟國家惟陛下鑑照不惑則安人強國其庶乎孟冬寒氣至首月令季秋命有司曰寒氣總至其皆入室康成曰總猶猥卒也此篇則夏時之孟冬矣李少卿與蘇武詩子瞻辨蘇李之詩皆為後人擬作然固非曹劉下之人所辨也良時首長當從此别四句已自知當别而惜良時之不再忽復忘已身之莫可偕往也嘉會首幽咽怨亂臨河濯長纓羡其揚名胸奴功顯漢室也獨有盈觴酒容齋隨筆云盈字惠帝諱漢法觸諱者有罪不應陵敢用之東坡云後人所擬為可信也㩦手首遊子暮何之遊子陵自謂也暮字與第一首中欲因晨風發晨字相呼應何之者言我欲乘風送子然君臣之義已乖將安歸乎徘徊終日遂别隔生死行人難久留行人謂武也安知非日月二句此設為子卿慰之之語努力崇明德二句自悲無可奈何而祝故人益崇明德也蘇子卿古詩子卿歸以始元六年庚子少卿死以元平元年丁未又十五年神爵二年辛酉子卿年八十餘病卒注甚疏骨肉首昔為鴛與央指同仕漢庭時今為參與辰左傳髙辛氏有二子伯曰閼伯季曰實沉居於曠林日尋干戈后帝不臧遷閼伯於啇邱主辰遷實沉於大夏主參杜預注后帝堯也辰大火也邈若胡與秦指同在胸奴時注胡秦之義猶胡越也按史記大宛列傳宛城中新得秦人知穿井當時塞外謂中國人為秦人猶魏以後謂之漢人也胡與秦中外之辨非胡越比我有一樽酒四句胡秦既判知復何言然子雖為逺人而故者無失其故惟有樽酒之贈用解其憂以敘昔年同仕漢庭之舊意也言我與子昔為朋友今各事敵國矣惟以離别之故盡暫時之欵洽耳黃鵠首何况雙飛龍退之雲龍之喻本此念子不忘歸反應請為遊子吟願為雙黃鵠二句言本願固爾其如子自不可歸哉結髮首上篇言念子不能歸此復動以吾君之舊恩而冀其復來歸也參辰皆已沒言將旦也晨起踐嚴霜則即路矣自有次第行役在戰場謂少卿也生當復來歸家雖被戮天不可讎沒身異域所謂一慚之不忍而終身慚矣故既云念子不忘歸仍招其復來歸也燭燭首征夫懷逺路二句征夫憚逺遊子戀歸則不顧蒙犯霜露也寒冬十二月漢書本傳武以始元六年春至京師則與少卿話别在五年之冬也俯觀江漢流二句江漢浮雲一去不復返一分不復合以比離别不得以地非塞外為疑隨時愛景光少卿詩曰皓首子卿報以隨時亦不欲其沒身異域示之以不可長也張平子四愁詩四愁之作所謂我瞻四方蹙蹙靡所騁者也自東而南又自西而北言終嵗愁望以四方比四時也一思首欲往從之梁父難注梁父喻小人按梁父似不得喻小人若以泰山比王朝梁父比河間亦得但難例之下三篇耳二思首我所思兮在桂林二句注舜死蒼梧葬九疑故思明君按惟美人謂君耳若泰山桂林指眀君則漢陽雁門將何以解之王仲宣雜詩風飈揚塵起二句謂值衰亂而獻帝播遷也劉公幹雜詩人不當如晉人之虛薄然羈鞅官人讀此詩如六月北窗下涼風至也釋此出西城六句所謂公幹有逸氣於此見之魏文帝雜詩注集云枹中作下篇云於黎陽作按子桓不從西征集云枹中作者亦後人妄加也漫漫首俯視一聨清新萬古西北首此篇恐子建奪嫡而自言欲為泰伯而不能也南行至吳會注當時實至廣陵按既云至黎陽作則非自謂征吳而至廣陵也吳會陸務觀以為吳郡與會稽也按秦置會稽郡治吳故謂之吳會吳書朱桓傳除餘姚長遷蕩冦校尉使部伍吳會二郡此吳會為吳與會稽之明徴曹子建雜詩髙臺首朝日照北林注朝日喻君此言是也其他太繁雜反入於晦孤雁南飛以下言欲附書以逹意耳南國有佳人本詩漢有遊女故曰南國嵇叔夜雜詩與爾剖符剖符乃同樂之意不謂仕也傳元雜詩亦只隨人作計然自清麗張茂先情詩二詩疑為荀馮所搆而作曹顔逺感舊詩淺薄無餘味殷領軍誦之而泣下蓋各有所感耳亷藺門易軌注引史記曰藺相如出望見亷頗相如引車避匿云云按因亷公客去之事并藺牽連及之不用相避事也素絲與路岐素絲應前奪移路岐應前易軌棗道彥雜詩擬仲宣從軍張季鷹雜詩嘉卉亮有觀二句胸懷本趣張景陽雜詩胸次之髙言語之妙景陽與元亮之在兩晉蓋猶長庚啓明之麗天矣詩家錬字琢句始於景陽而極於鮑明逺於建安能者而外復變創斯體鍾記室品目之云風流調逹實曠代之髙手詞彩蔥蒨音韻鏗鏘使人味之亹亹不倦不為妄歎也大火首骨氣挺拔不徒工於造語忽如鳥過目身輕一鳥過蓋本諸此朝霞首叢林森如束鍾記室所謂巧搆形似之言昔我首巴人皆下節下節似擊節之意朝登魯陽關首文中子曰與其居險而運竒不如宅平而無為亦景陽此詩之趣也陶淵明雜詩結廬首悠然望南山望一作見就一句而言望字誠不若見字為近自然然山氣飛鳥皆望中所有非復偶然見此也悠然二字從上心逺來東坡之論不必附會謝惠連七月七日夜詠牛女不為髙格後半尤穢褻搗衣詩簪玉鳴金無乃不類結語托意髙妙謝靈運南樓中望所遲客孟夏非長夜二句此本楚詞之意而反用之蓋楚詞所謂晦明若嵗者乃言秋夜之長望夏夜之短而不得也齋中讀書懷抱觀古今二句起下達字石門新營所住四靣髙山回溪石瀨修竹茂林詩所引楚詞參觀王逸注乃知此詩托意之逺庶特乘日用特當作持用當作車以日為車而遊六合之外則屈子之逺遊也謝元暉始作尚書省與下直中書省一首皆祖述顔光祿防口猶寬政二句言昭業凶暴防口尚為寬政朝士懼禍者餐荼亦如薺也善注全乖文義劉良注得之黃旗映朱邸明帝為揚州刺史輔政直中書省結語亦學公幹風動萬年枝二句承上彤庭萬年枝即詩山有杻疏中所謂萬年樹蓋檍也玲瓏結綺錢二句承上紫殿紅藥當階翻從宏敞生來蒼苔依砌上從隂陰生來春物方駘蕩三輔黃圖駘蕩宫言春時景物駘蕩滿宫中也觀朝雨元暉之言如此而卒不免自蹈暴腮之禍者蓋清雨曉涼萬慮俱息能戰勝俄頃之間而不覺旋惑於富貴之途也行之維艱亦可悲夫戢翼希驤首四句是戰即所謂貧賤常思富貴富貴必履危機者也郡內登望晦翁賞寒城一以眺十字以為有力借問下車日二句逼出登望言匪直數月而已經嵗故下云心已極魂屢遷也山積陵陽阻四句是郡內結髮倦為旅為旅二字起末句避世之意王弼云仲尼旅人則國可知矣和伏武昌登孫權故城孫權嘗都武昌復徙建業無句不妙然比之前人意味力量自殊此退之所以并掃齊梁也鮑明逺太麗謝元暉太工皆求勝前人而反不及鵲起登吳山吳山顔氏家訓作吳臺為姑蘇也鳯翔陵楚甸緊入武昌文物共葳蕤二句葳蕤蔥蒨與下故林一聨借映從賞乖纓辨亦切楚事良書限聞見注良書謂伏詩按下芳音乃謂伏詩注非和王著作八公山詩向疑何以不用苻堅八公山草木皆疑晉兵事豈王詩已及之耶王詩今不傳細玩詩中已用宗袞此事何必瑣屑又晉書中以為禱於蔣侯而然固宜在所棄也西距孟諸陸注孟諸澤在八公山東按睢陽乃今歸德八公山在今壽州則孟諸在西也長蛇固能翦二句注長蛇喻融奔鯨喻堅非也蛇鯨總謂苻堅耳和徐都曹日華川上動二句川上承上蒼江草際承上青郊二句妙是昧旦即目和王主簿怨情掖庭聘絶國四句是怨花叢亂數蝶四句是情生平一顧重二句如此説怨情方見身分力量沈休文應王中丞思逺詠月小庾以降必無此力量一詩中戶隙樓園軒門房七事可抵小賦三四一大一小五六一憂一樂七八一髙一下髙樓一聨自小庾至玉溪皆奉為使事之法夜靜滅氛埃頂華字方暉竟戶入二句頂滅氛埃説文間字下云隙也從門從月注當引此髙樓切思婦二句以思婦自比以上才比思逺劉彥和曰言對為易事對為難反對為優正對為劣思婦上才一憂一樂理殊趣合者也網軒映珠綴二句又從細處寫清光信悠哉收足華字悠哉二字括盡達曙事沈休文冬節後至丞相第詣世子車中作結有萬鈞力詠湖中鴈詩園葵湖鴈詠物之祖三月三日率爾成篇東出千金堰頂洛陽西臨雁鶩陂頂長安清晨戲伊水頂洛陽薄暮宿蘭池頂長安寧憶春蠶起四句諷刺陸士衡擬古詩十二首擬古十二首逺不如樂府十七首擬今日良宴會首曷為恆憂苦守此貧與賤華亭鶴唳復可得聞乎張孟陽擬四愁詩集是四首昭明欲備擬詩各體遂録其一亦編集文章變例也陶淵明擬古詩豈無一時好不久當如何傅謝惜不早聞斯言謝靈運擬魏太子鄴中集詩當是與廬陵周旋時所作惟陳徐二詩為可觀首篇真副君語矣不在貌似也擬古變體序建安末末當為中按徐陳應劉一時俱逝二十二年事也魏太子首柏梁發唱云日月星辰和四時起手從此出也起二句有蓋世之氣結句緼藉有餘味王粲首此篇自比公子特先賞注公子謂曹植非也公子明兩皆謂子桓既作長夜飲二句言終於此而已矣自傷止以文義見賞不參權要如仲宣在建安中也徐幹首棲集建薄質李周翰注中有延及之語則建者逮字傳寫之誤也永夜繫白日以注觀之繫字當作繼如五臣本此又以音同傳寫誤耳劉楨首貧居晏里閈六句言適當本州不能逺引既覽古今事二句注解達言相説而進達也按非此意也言古今逢亂失所何事不有緣此互相解譬雖乖平生之素亦安之也應瑒首調笑輒酬答二句皆飄蕩不見禮不勝後生末契之感也平原侯植首中山不知醉中山用漢書中山王勝事願以黃髮期植贈白馬王彪詩王其愛玉體俱享黃髮期養生念將老注引左傳隱公曰使營莬裘吾將老焉按序所謂憂生之嗟通指後事言之然如本注亦得袁陽源效曹子建樂府白馬篇音節悲壯近太沖劉休元擬古詩注世祖時進侍中司空後以藥內食中毒殺之按二詩不懼孝武之猜忍而作鮑明逺擬古十五諷詩書首兩説窮舌端此句起下五車摧筆鋒句顧上解佩襲犀渠佩佩玉也卷􅐆奉盧弓􅐆書帙也學劉公幹體不過當識時之意代君子有所思繡甍結飛霞四句伏下滿字選色遍齊代四句伏下厚字服理辨昭昧收所思范彥龍效古遲留法未輕注遲或作逗按當作逗留為是江文通雜體詩所擬既衆才力髙下時有不齊意製體源罔軼尺寸爰自椎輪漢京訖乎大明泰始五言之變旁備無遺矣雖孫許似道德論泉明為隱逸宗亦并别搆成是總雜唯永明聲病不在舊列也古離别擬古詩殆欲逺跨士衡不在多少也李都尉從軍悠悠清川水四句河魴以味美獲薦結髮以命舛逺隔注非魏文帝遊宴小儒安足為點出文帝陳思王贈友擬陳王亦自遒秀延陵輕寶劍二句起下葵藿處富不忘貧二句應前禮賢阮步兵詠懷精衛銜木石阮公知己張司空離情玉臺生網絲玉臺似指鏡臺左記室詠史左之詠史大抵賔主相形此作既以衛霍諸公形容仲蔚乃復以韓梅發端不已贅乎太沖本詩雖用事錯雜而指趣瞭然此徒放其體不復能文從字順矣張黃門苦雨苦雨本趣在乎固窮擬者殊不及此索居慕儔侣風雨思朋友劉太尉傷亂氣味逼真秦趙值薄蝕成都王頴據鄴河間王顒據關中皆王室懿親故謂之薄蝕千里何蕭條二句所謂日暮途窮也功名惜未立二句覆裝以起下文郭宏農遊仙亦失本趣海濵饒竒石竒石如丹砂空青琉黃之屬可鍊藥者許徴君自序采藥白雲隈八句有此即虛實相間不復苦其平典此擬議之變化也殷東陽興曯稍革孫許之風餘有虛無之趣推移方始實之惟肖直置忘所宰二句清曠如接仙真謝僕射遊覽極似叔源陶徴君田居擬陶能得其自然歸人望煙火二句詩中畫素心正如此二句陶詩聞多素心人樂與數晨夕結句欲起古人而從之托意於三益耳謝臨川遊山模範之巧工細無敵兼以一幽一顯更互成竒妙是謝公屐齒淹留非復尋常登眺平明登雲峰四句總領大槩桐林𢃄晨霞八句一巖一壑一顯一幽夜聞猩猩啼四句分寫鳥獸草木寒暄朝暮亦盡淹留之趣且泛桂水潮二句反映遊山轉餘興會即應轉江海邅迥映月映轉備盈缺兼映平明也顔特進侍宴擬顔遂蹈困躓然顔之詩體本爾謝法曹贈别子襟怨勿往四句激昂處去法曹微逺謝光祿郊遊涼葉昭沙嶼昭當作照吕延濟謂秋葉黃故云照雲鬱石道深名句鮑參軍戎行明逺之竒麗是其天才絶倫固非文通所能到也鷦䳟不能飛四句亦自凄壯休上人怨别看其層次勝本詩悵望陽雲臺陽雲當作雲陽在雲澤之陽也義門讀書記卷四十七

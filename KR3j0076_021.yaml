body:
  text: 義門讀書記卷二十一翰林院侍讀學士何焯撰後漢書光武帝紀且王莽敗亡已兆天下方亂遂與定謀若敗亡未兆而先之則徒為劉信翟義矣十月與李通從弟軼等起於宛起宛書月更始元年正月甲子朔漢軍復與甄阜梁邱賜戰於沘水西大破之斬阜賜光武紀中大書更始元年緣莽旣破滅光武又未建號不書更始事無所繫故也阜賜死漢帝立莽乃懼故皆書日初光武為舂陵侯家訟逋租於尤注所引東觀記壬寅前書作乙未朱福即朱祜光武笑而起諸將無識不窮迫爭之無益也故笑而起尋邑自以為功在漏刻意氣甚逸以驕惰當必死六月己卯昆陽一戰光武王業所基書日尋邑亦遣兵數千合戰光武奔之偏敗衆擕故急奔之九月庚戌三輔豪傑共誅王莽莽誅乃復漢所始書日十月持節北度河北度河書月二年郞遣將倪宏劉奉率數萬人救鉅鹿光武迎戰於南䜌通典唐鉅鹿漢南䜌地漢鉅鹿縣今平鄕也五月甲辰㧞其城誅王郞誅王郞則河北定光武始有土書日自是始貳於更始更始倉卒所立才下政亂不可輔也貳於更始乃可光復髙祖之業此為審輕重是非梁王劉永擅命睢陽至悉破降之此皆聖公所不能辦者光武取天下於羣盜之手故先撮聚之敇令各歸營勒兵至由是皆服令其歸營勒兵即以輕騎按行制御在我不暇别生他謀故但感其推誠而在光武仍非以危地自試也使呉漢岑彭襲殺謝躬於鄴至光武亦令馮異守孟津以拒之殺謝躬後與更始遂絶旣定河北又得銅馬之衆可以自樹無所瞻顧也建武元年立前孺子劉嬰為天子更始遣丞相李松擊斬之當時可假以為名者惟嬰而更始為之驅除於是諸將議上尊號旣與更始之兵相攻破斬其將不建大號則名不正矣於是二字緣上事為文下文云今此誰賊而馳騖擊之乎謂不即尊位則與羣賊無異何以名其為賊而擊之也光武於是命有司設壇塲于鄗南千秋亭五成陌鄗莽曰禾成亭當時即位于此蓋亦取與光武名相應也六月己未即皇帝位即位書日以野王令王梁為大司空以䜟文超拜此蹈王莽之謬髙祖必不為也按梁居位八月而免然中興之初舉錯豈可不愼于始哉景丹傳云世祖即位以䜟文用平狄將軍孫咸行大司馬衆咸不悅咸以未真拜故不見于紀梁本彭寵所遣以無功居三公而寵亦觖望卒至于反以前髙密令卓茂為太傅按茂本傳注云今洛州宻縣則是左傳所謂新宻此云髙宻者誤衍髙字而注因以誤耳亭林亦云冬十月癸丑車駕入洛陽入洛陽書日二年惟諸將業逺功大至日慎一日懲更始諸將放縱故首以此告之大破五校於羛陽注云羛陽聚名屬魏郡又引杜預注左傳卒於戲陽句云内黄縣北有戲陽城戲與羛同按說文墨翟書義從弗魏郡有羛陽鄕讀若錡則羛與戲不同六年詔曰頃者師旅未解至三十稅一如舊制觀此詔光武所以能削平盗賊不憂轉漕者以軍士屯田韓浩棗袛襲用其智耳七年詔曰今國有衆軍至令復還民伍此制一罷則兵農遂分不可合一有養軍之患矣按翟義誅王莽以九月都試日勒東郡車騎材官士起光武初與李通定謀期以材官都試騎士日刼前隊大夫及屬正號令大衆其罷此制蓋恐州郡各有兵衆復將因以為資所謂懲噎廢食者也十一年初㫁州牧自還奏事天下始平務在休息故并自還奏事亦㫁之也十二年威虜將軍馮峻㧞江州馮駿與峻前後互異十三年詔曰長沙王興至茂為單父侯注云以其服屬旣疏不當襲爵為王非也以人臣受封不加王爵故改封公侯耳下文降趙王良為趙公可謂服屬疎乎真定王名得與徳前後互異行大司空馬成罷行大司空按如下劉隆行大司馬例當有事字然陳承祚三國志中皆作行某不着事字其外戚恩澤封者四十五人中興之始以外戚恩澤封者即有四十五人所以復有竇梁之横十四年是歲會稽大疫古今注以為十三年十六年遣使者下郡國聽羣盗自相紏擿至邑門不閉盗賊始起用此法可以即時解散田况之謀則施之旣久且盛者也二十三年春正月南郡蠻叛遣武威將軍劉尚討破之徙其種人於江夏徙蠻與徙羌同幸無變耳其原則自武帝徙甌越于江淮之間始也遣使詣河西内附宣帝時置西河北地屬國以處匈奴降者故詣西河内附二十六年春正月詔有司増百官奉邊鄙獲安經費益省故增奉勸亷則内治亦加修矣使後世之人不知其處因不知其處一言愚者遂為疑冢遣中郞將段郴授南單于璽綬令入居雲中自郡縣之後裔夏不相謀此又為易代之楇始二十八年夏六月丁卯沛太后郭氏薨此緣下捕王侯賔客書廢后薨例不見于紀也詔死罪繫囚皆一切募下蠶室其女子宫民少故通以肉刑之意中元元年遷吕太后廟主于園四時上祭此但黜其配食未嘗貶其尊號也明帝紀永平三年是歲起北宫及諸官府光武時止起南宫前殿至是始起北宫及諸官府去建武十四年又二十四年其不輕用民力如此八年初置度遼將軍前書昭紀元鳯三年以中郞將范明友為度遼將軍此注與南匈奴傳注中皆誤作武帝十八年北匈奴及車師後王圍戊己校尉耿㳟己字衍時闗寵為己校尉下章帝紀同章帝紀建初七年因渉郡界至動務省約帝雖動務省約然廵幸亦太頻煩矣元和二年又詔三公曰方春生養至稱朕意焉此等詔令不减文景加賜河南女子百戸牛酒注姚察云女子謂賜爵者之妻臣賢按此女子百戸若是戸頭之妻不得更稱為戸此謂女戸頭即今之女戸也天下稱慶恩當普洽所以男戸賜爵女子賜牛酒按以女子百戸為女戸說似近理然考之前書凡賜爵而更賜牛酒者則有女子百戸之文其但賜牛酒者則或書賜民百戸牛酒或書吏民五十戸牛酒明女子百戸為賜爵者之妻非女戸矣惟此詔女子百戸上有經曰無侮鰥寡惠此㷀獨加賜河南女子云云則或當如章懷之說也詔文有河南字亦不得普洽天下但賜河南尹所屬縣女子耳三年其嬰兒無父母親屬及有子不能養食者廩給如律當合二年春産子復三歲姙身賜胎養榖事觀之周禮大司徒之職以保息六養萬民一曰慈幼注曰產子三人與之母二人與之餼十四以下不從征此蓋王政之最急者也漢律本有此條今舉行之蓋緣俗吏視為不急中失墜耳無父母親族所謂養孤子也有子不能養食者如後世收育嬰兒雇人哺之漢代官為廩給則不必通都大邑始有好義者為之無棄子不舉之事矣賈彪為新息長按婦人殺子者蓋當桓帝時此政已廢桓帝采女無數卒以無後宜哉章和元年月氏國遣使獻扶㧞師子西域傳月氏作安息扶㧞作符㧞意其與下卷和紀章和二年所書本為一事兩紀中複出致誤耳和帝紀孝和皇帝諱肈注伏侯古今注曰肇之字曰始肇音兆臣賢案許慎說文肇音火可反上諱也按今徐鼎臣所校定說文直去火可之音又無一語證明後此字書亦遂仍之恐昧多聞闕疑之意也永元二年復置西河上郡屬國都尉官注十三州志曰典屬國武帝置掌納匈奴降者也哀帝省并大鴻臚故今復置之按光武紀建武六年罷郡國都尉官故屬國都尉亦省此復置之與典屬國何與四年竇憲潛圖弑逆至到皆自殺和帝誅竇憲時年十四其㫁可比昭帝之明亦得清河王慶為助時慶年長于帝一歲安帝紀恭宗孝安皇帝按和帝旣不冠以穆宗此紀恭宗二字為衍又祭祀志云安帝以讒害大臣廢太子及崩無上宗之奏後以自建武以來無毁者故遂常祭因以其陵號稱恭宗故此紀仍前史廟曰恭宗之文未及刋削然獨無尊字尤與以前諸紀迥異明是不知者謬加也引拜帝為長安侯宣帝先封陽武侯然後即位此漢家故事也不以父命辭王父命不以父命辭者引傳文見不必受命於慶也其以枯為孝和皇帝嗣奉承祖宗嗣和帝不嗣殤帝從殤禮也永初三年三公以國用不足奏令吏人入錢榖至各有差粥賣官爵之始三公者太尉張禹司徒夏勤司空張敏也元初二年太尉司馬苞薨注謝承書曰會司徒楊震為樊豐等所譖連及苞苞乞骸骨未見聽以疾薨也按永寧元年十二月劉愷罷楊震始為司徒苞之薨在其前六年甚矣謝書之失實也建光元年復㫁大臣二千石以上服三年喪即此一節安帝之昏謬可見陳忠傳云宦䜿不便之從尙書令祝諷尚書孟布議也延光三年告祀二祖六宗六宗謂太宗世宗中宗顯宗肅宗穆宗也中興後孝元不復稱宗孝和穆宗之號至獻帝時始省注誤四年北鄕侯懿注東觀記及續漢書並曰北鄕侯犢今作懿蓋二名按懿似改名不以畜牲之意也順帝紀永和元年登雲臺此靈臺也緣近下避火雲臺而誤冲帝紀永嘉元年永嘉宋史慶長以卭州蒲江縣發地所得石刻作永憙定為永嘉之誤按左雄傳中有迄于永憙察選清平之文則永嘉者永憙之誤也質帝紀本初元年大將軍梁冀潛行鴆弑帝崩于玉堂前殿年九歲此用春秋殤公孔父書法贊保阿傳土謂聽中官得以養子世襲桓帝紀建和元年欲立清河王蒜為天子至自殺清河之死與趙宋濟王竑事相類自是改清河為甘陵黨錮之禍由此地起遂以亡漢吁可畏哉黄巾反安平甘陵人各執其主以應之二年嘉禾生大司農帑藏生大司農帑藏可徵信者故不得異其文也和平元年春正月甲子大赦天下改元和平己亥詔曰至則所望矣若以甲子下赦則己亥歸政當在二月疑日有誤宋本己丑延熹二年大將軍梁冀謀為亂梁冀兇忍奢僭罪莫大焉以本傳觀之未謀為亂也班陳則書法必審初置秘書監官置秘書監太常博士所傳之秘書經牒皆典校之三年車騎將軍單超薨單超亦書薨四年占賣闗内侯虎賁羽林緹騎營士五大夫錢各有差永初攝政為賣爵之始桓猶因飢旱踵之靈遂以為市并賣公卿守相而國以亡矣六年康陵東署火此康陵似是平帝陵靈帝紀建寧元年中常侍曹節矯詔誅太傅陳蕃至皇太后遷于南宫唐甘露之變與此役畧同二年尊慎園董貴人為孝仁皇后桓帝自梁太后崩乃尊博園匽貴人為孝崇皇后今則竇太后遷南宫故即上尊號也四年七月癸丑立貴人宋氏為皇后按禮儀志注中載蔡質所記立后儀下詔之日非癸丑乃乙未太尉奉璽綬者乃聞人襲非李咸疑范氏誤六年市賈民為宣陵孝子者數十人以小民而冐宣陵孝子之號此帝系將降為庶人之兆也太常河南孟􅖢為太尉蜀志孟光傳注引續漢書云郁中常侍孟賁之弟光和元年太常常山張顥為太尉續漢書云張顥中常侍張奉弟初開西邸賣官至卿五百萬賣公卿雖靈帝亦知其不可也假託左右以欺天下然書之史冊萬世孰能掩哉謂之修宫錢見劉陶傳令中使督之名曰左騶見羊續傳富者則先入錢貧者到官而後倍輸見崔駰傳末崔烈入錢五百萬為司徒所謂以徳次者半之也亦有其人本非以入錢得官横從乞索者李燮傳擢遷河南尹時旣以賄賂為官詔書復横發錢三億以實西園燮切諫乃止是也其詳偹于張讓傳中四年領受郡國調馬調馬謂調良之馬猶言過馬也注謂徵發似誤中平元年春二月鉅鹿人張角自稱黄天其部帥有三十六萬三十六方見皇甫嵩傳不知何日訛寫為万復緣注引續漢書語相沿不察也四年是歲賣闗内侯假金印紫綬傳世入錢五百萬光和元年已賣闗内侯此則井傳世也六年幷州牧董卓殺執金吾丁原至董卓廢帝為宏農王此處書董卓事未分明獻帝紀賜公卿以下至以補宦官所領諸署注靈帝建寧四年改平凖為中凖使宦者為令按事在熹平四年非建寧也董卓為相國為相國上脫一自字詔除光熹昭寧永漢三號復還中平六年革除建文年號事與董卓同初平元年三月乙巳車駕入長安幸未央宫宋本未央宫下有是日書晦有翟雉飛入官獲之十二字又恭懐敬隱恭愍三皇后並非正嫡不合稱后皆請除尊號當時不并孝穆孝崇孝元孝仁四后號正之何也三年袁術遣將孫堅至瓚軍大敗如袁孫相攻之類非闗興滅皆不足書東郡太守曹操大破黄巾於壽張降之是役也鮑信等迎操領兗州牧遂以兗州為代漢之資宜書操自領兖州牧董卓部曲將李傕郭氾潘岳西征賦作􅔸汎則氾字從卩從巳者非四年六月華山崩裂漢之亡岱華皆崩興平二年李傕殺樊稠而與郭氾相攻傕氾事皆瑣屑詳書于紀不知所裁建安元年鎮東將軍曹操自領司隷校尉錄尚書事曹操奉迎亦當分明敘出封衛將軍董承為輔國將軍伏完等十三人為列侯輔國將軍非封號以董卓傳互校董承下衍一為字曹操自為司空至百官總已以聽此時操之逆迹未著不當遽書自為是年徐州牧陶謙表劉偹為豫州刺史謙卒偹遂領徐州後階之以承漢祀宜書七年袁紹薨袁紹亦當從死例八年初置司直官督中都官省司直所以抑損宰相之權今曹操復置之以自輔十一年濟北北海阜陵下邳常山甘陵濟陰平原八國皆除因事除八國所以削漢之枝葉十三年曹操以舟師伐孫權權將周瑜敗之於烏林赤壁烏林之役紀實當並書劉偹操亦未渉孫權之境不得云伐權操旣敗還劉備據荆州上表子琦領牧上孫權領徐州宜書蓋由此三分之勢成矣十七年馬超破凉州殺刺史韋康旣書破凉州殺韋康淵之破超何獨漏畧十九年曹操殺皇后伏氏滅其族及二皇子注山陽公載記曰劉備在蜀聞之遂發喪按載記之說無據皇后紀東京皇后竇鄧閻梁竇何臨朝者六其間殤帝北鄕侯冲帝質帝皆未嘗親政鄧后旣立安帝復臨朝者十六年遂終身稱制作皇后紀為得其實雖後人所不必效然范氏自合史家之變未可議也史記索隱外戚世家注云王隱則謂之為紀而在列傳之首進賢才以輔君子注闗雎憂在進賢不滛其色按憂在進賢蓋指内職而言作者又合卷耳小序内有進賢之志而無險詖私謁之心以立說閨房肅雍險謁不行也肅雍對後妖幸險謁對後外姻詩正義云私謁者婦人有寵多私薦親戚蓋六朝相傳如此解也未有專任婦人㫁割重器以下專論臨朝之謬外姻亂邦兩漢之患尤深也抑明賢以專其威如梁冀忌清河王䔉嚴明徵至京師復捨之而立質桓二帝也郭后紀光武擊王郞至真定因納后光武初納郭后本以結劉楊出于權計非由嘉耦故不終厥位事在劉植傳中陰后紀自我不見于今三年引詩言以舊恩非新寵也馬后紀又數為權貴所侵侮至求進女掖庭嚴此舉殊謬妄未可以後之得福從而是之我子豈宜與先帝子等乎開創之主功徳隆盛皇子亦時有賢勞繼體之君其子未可舉以為例明帝此言萬世之法也此條當載明八王傳中范繫于此者欲與不許封外戚詔相應耳自撰顯宗起居注殆是今時内起居注之屬竇后紀馬竇事事相反禍福自求法戒偹矣儀比敬園注敬園安帝祖母宋貴人之園也按此即謂章帝敬陵之園也豈得反以後事為比注殊誤鄧后紀和熹傳全無裁制使修石臼河使修當作罷修又詔中官近臣於東觀受讀經傳至朝夕濟濟中官得以竊政乃自兹始平望侯劉毅以太后多徳政至以崇陛下烝烝之孝此文何所取而載之其耆宿者皆稱中大人至絶屬籍中大人之語康傳旣詳此亦宜畧論然而建光之後王柄有歸后崩在未改元之前注云建光之中者誤建光紀元亦不及經歲也梁后紀太后寢疾遂篤至其各自勉焉順烈旣得疾乃始歸政蓋亦稱制終身矣匽后紀以帝弟平原王為喪主居于博陵以平原王為喪主雖失禮之中猶存不二統之義竇后紀太后素忌忍至遂殺田聖后無母天下之徳故家不蒙福武以忠被戮崩後宦官追怨之幾不成喪又欲别葬之不配祔桓帝賴李咸陳球正議乃不能奪事詳陳球傳董后紀帝使中常侍迎貴人至居南宫嘉徳殿尊崇本生母至靈帝又一變然尚居南宫雖桓思為宦豎遷徙亦未與之抗行蓋仍畧存不二統之餘風焉皇女不足别載故附于后紀末新唐書採此例皇女華適不其侯輔國將軍伏完注完伏湛五世孫按伏皇后紀及湛本傳注中五世五字誤當作七世義門讀書記卷二十一

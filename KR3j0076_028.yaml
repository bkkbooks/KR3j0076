body:
  text: 義門讀書記卷二十八翰林院侍讀學士何焯撰三國志吳志孫破虜討逆傳堅薨還葬曲阿按此云還葬曲阿而吳主傳太元元年秋八月大書吳髙陵松柏斯拔參之謝詢請置守冡之表則文臺定葬于吳也彭城張昭廣陵張紘秦松陳端等為謀主伯符以勇鋭摧破繇朗然能繫屬士民修其政理遂創霸圖亦子布三四公之助時袁術僭號策以書責而絶之策前此猶為術部曲自絶術乃正名漢藩得以自立矣後曹公亦以策絶術授討逆之號㑹為故吳郡太守許貢客所殺注引江表傳云云策本袁氏部曲覩其喪敗乃始暌二于漢則江外之大賊也貢既忠臣其客亦無愧髙漸離矣吳主傳建安十六年權徙治秣陵至作濡須塢城石頭以偹陸作濡須塢以偹水然後建業勢壯二十二年春權令都尉徐詳詣曹公請降請降者規以全力取荆也二十五年十一月策命權曰至永終爾顯烈特載魏朝策命于傳蓋醜之也注孫盛曰余觀吳蜀咸稱奉漢至於漢代莫能固秉臣節盛何所見言蜀于漢代臣節不固與操異即為二漢乎大司馬漢中王之號非是無以繫屬人心異乎因危自擅也黃武元年權使太中大夫鄭泉聘劉偹于白帝始復通也注採江表傳云云按此非惟以通好亦謂漢帝改步可以各王其地自為計也然與魏文帝相往來待西鄰之固也五年陸遜陳便宜至此實甘心所望於君也魏方大喪未能議逺故勸及時息民以固基本而權詞已有猜焉所以末年自用益甚黃龍元年造為盟曰天降喪亂至其明鍳之讀其載書不惟先㰱者漢而主是盟者惟丞相矣盛德之所及逺哉嘉禾元年春正月注江表傳云云按仲謀既自擅尊號以天子臨其臣民不修郊祀是子不事父野哉詔曰朕以不德至乘海授淵為之下赦此氣湧如山所由迫也權自稱尊號無一可觀矣史家鋪陳其事亦醜之也此舉本欲蓋其身受魏封之恥然下詔可以少需人衆但遣數百亦自足也其後朱然征柤中預表必勝權抑其表不出其鑑於是哉六年顧談議以為奔喪立科至其後必絶身在疆場與强敵對親老不預陳請棄軍敗國不俟交代宜嚴立科禁若內地守令自無事限制也加罪傳者尤為謬濫談綜之議吳朝可謂無治赤烏元年春鑄當千大錢錢當五百已不可通行又鑄當千徒為妄作有以知吳之無制也初權信任校事吕一至匡所不逮魏吳皆有校事而適生奸無政而好察何如劉氏之平明也權既迷謬于前引咎方新責數隨至不思反求所以致此之由洞然無猜更始納誨惟思歸過于下又何怪乎國之日亂民之日瘠哉四年遣衛將軍全琮略淮南至大將軍諸葛瑾取柤中注採漢晉春秋云云按札乃禮字之訛見顧邵傳中字德嗣欲用其民必其政教足以使之蜀之跨渭虎爭蓋以十年教訓民忘其勞今吳之政教粗足檢制其衆不至離叛但舉見兵淺嘗伺利則所及耳滌境大舉事異季漢難可得動倘致內憂是為未戰自困仲謀雅知虛實亦審已而動其弗能用避所短也茍非伯符公瑾之時又無武侯易地而處雖雄略逺規固無所施哉元遜逺覽荆邯說公孫述進取之圖近見家叔父與賊爭競之計鋭意北伐亦殷德嗣斯志也然審巳量敵未能萬全頓兵新城威挫于外釁生于內家族旋夷吳亦終以不振矣惟務自强母狃于逸以徐俟其巇則得之矣評豈所謂貽厥孫謀以燕翼子哉總上嫌忌殺戮言之承祚蓋謂皓之昏虐此其貽謀也三嗣主傳孫亮大赦改元是歲於魏嘉平四年也閏月以恪為帝太傅改元下脫建興二字以後永安元年例之則閏月上脫建興元年或尚有他文未可知也太平元年春注採吳歷曰正月為鐘立廟稱太祖廟按孫堅父名鐘見宋書志然北宋諸本皆作權字孫休永安五年休鋭意於典籍欲畢覽百家之言齊梁以下人主都類此蓋未知所學之要也時年三十諡曰景皇帝注採葛洪抱朴子曰云云按不知注家何所取而濫載于此孫晧元興元年貶太后為景皇后貶太后而興布不爭其死宜矣皓蓋又甚于明世宗也建衡三年是歲汜璜破交址禽殺晉所置守將注引漢晉春秋華陽國志云云按華陽國志欲見蜀士之多耳當從習氏天紀四年渾復斬丞相張悌丹陽太守沈瑩等注採襄陽記宜畜衆力待來一戰若勝之日江西自清上方雖壞可還取之按宋王權還師保江而金亮卒敗退瑩計不為非但孫皓已在必亡故張悌勉强一戰耳注且我作兒童時至復何遁耶孔明一顧使人自厲如此評注採陸機著辨亡論上篇丁奉鍾離斐以武毅稱按文選無鐘字注云魏將諸葛誕據壽春降魏人圍之使奉與黎斐解圍奉為先登黎斐力戰有功拜左將軍黎與離音相近是一人但字不同余謂李善所見之本必可徵信但此斐字恐牧字之訛鍾離牧為武陵太守以少衆討五溪事在蜀并于魏之後作牧為得也妃嬪傳吳主權謝夫人後權納姑孫徐氏欲令謝下之三國之君皆不知正家納再婚之女而反使聘嫡下之此權晚年所以繼嗣不定也步夫人少曰魯育字小虎前配朱據後配劉纂注吳歷曰纂先尚權中女早卒故又以小虎為繼室按繼室之名于時已謬故委巷之書君子所愼孫和何姬故民訛言皓久死立者何氏子云甲申南渡福邸不君民間亦訛言非朱氏子立者福邸李伴讀云宗室傳孫奐一入魏黃初三年死按魏書甘露二年以孫一為侍中車騎將軍假節交州牧吳侯又三少帝紀甘露四年十一月癸卯車騎將軍孫一為婢所殺黃初疑首尾之誤孫賁子鄰嗣鄰年九嵗代領豫章九嵗無領郡理疑脫十字孫翊子松為射聲校尉注採吳録云云按孔明為之感涕斯言信矣惜其亡早乃使峻綝敗國顧雍傳雍往斷獄至何至于此國體當爾一之死于此益無所展矣權多猜不使一得盡其情則疑大臣銜前事而周內之矣注徐衆評云云按引季武子事不倫不為子産地異也吕一狐鼠亦非子晳强家怙亂當急除之以防他變也邵烏程吳粲即吾粲也按庾信作吳明徹墓志用吾彥事對吳起豈吾吳同耶古書吾邱壽王多作虞邱而虞仲亦為吳仲則吾吳通也諸葛瑾傳琅邪陽都人也注採風俗通云云按孝文時侯者十人無姓葛者高祖封樂毅後于一鄉嬰何功德而其孫乃食一縣此風俗通傳聞之謬也瑾與備箋曰奄聞旗鼓至易於反掌及昭烈之時以大義討賊則人心尤易於聳動子瑜之言至言也股肱或虧何痛如之顧可以先元首乎後儒謂孫權亦漢賊也則誠如裴氏所論於此時也責以犄角討賊同好棄惡告諸天地騰書逺近為文祭羽曉示士衆旋師北向身出秦川若克關中漢業可復權即稱藩矣謂非保家之子每以憂戚注吳書曰瑾有所愛妾生子不舉按生子不舉此非人情果崇不邇之德無姬侍可也赤烏四年年六十八卒天不祚漢武侯不同乃兄之壽注融部曲吏士親附之疆外無事按此十二字疑當屬下秋冬乃陳氏正文也步騭傳闡抗陷城斬闡等步氏泯滅騭有君子之名而二宫相構不能守正闡之作逆或其餘殃耶闞澤傳又著乾象歷注以正時日宋書歷注云吳中書令闞澤受劉洪乾象法於東萊徐嶽字公河故孫氏用乾象歷至於吳亡薛綜傳沛郡竹邑人也注採吳録云云按此因求信陵後事從而僞造果有之則馬遷亦載之傳後矣昔帝舜南巡卒於蒼梧至以廣聖思此文當與韓退之送鄭權尚書序參觀由此以降四百餘年按自錫光任延至此尚未及三百年四字恐二字之訛為太子少傅領選職如故注引吳書曰後權賜綜紫綬囊綜陳讓紫色非所宜服左傳渾良夫紫衣狐裘杜預注紫衣君服周瑜傳以中護軍與長史張昭共掌衆事注採江表傳云云胡三省曰此數語所謂相時而動也然瑜之言不悖於大義魯肅呂蒙輩皆不及也瑜曰不然操雖托名漢相其實漢賊也至此天以君授孤也注引江表傳云云按此則多取諸葛語增飾之故陳氏略焉魯肅傳曹公聞權以土地業備方作書落筆於地著此句以見肅計非左諸葛亮亦為發哀既交分不茍而結好孫氏専力治操惟子敬克諧故也呂蒙傳蒙盛稱肅有膽用且慕化逺來於義宜益不宜奪也此舉徵其為萬人督矣蒙移書二郡望風歸服孫氏自武烈為長沙太守討平區星任用良吏又越境尋討零桂諸賊以全異國三郡懷之故移書即下雖以昭烈之得人心不如其素服從於孫氏也子明小數豈得貪天功哉蒙乃密陳計策曰至欲復陳力其可得耶規取荆州是蒙本謀然此傳之語多不可信前據襄陽或取荆州之後復向襄樊若白帝在蜀潘璋何緣便可往住乎又此時蒙始逾四十亦未應便計一旦僵仆也今操逺在河北新破諸袁撫集幽冀尚熙之死在建安十二年魯肅沒於十年之後而此方云新破諸袁撫集幽冀不乖錯乎即蒙陳此計在代肅之先曹公亦不得逺在河北矣甚矣作史之難也士仁麋芳皆降注引吳書云云按觀仲翔之辱芳則吳書為不審矣㑹蒙疾發權時在公安至為之降損權真有勾踐之風雖晚謬多猜於時欲不為盡死得乎年四十二遂卒於內殿周公瑾年止三十六魯子敬四十六呂子明四十二使子敬十年不死吳盟尚固襄樊舉而漢室復興矣後雖勸吾借𤣥德地是其一短按魯呂各以其時當操氣未衰屢出巢湖當共劉氏結好以分其勢及操老而無舉吳之志鼎足勢成不襲定上游亦非所以立國也然其作軍屯營不失至其法亦美也子敬作軍幾於孔明之法二人故足相友評呂蒙勇而有謀斷至最其妙者譎普細務而與禽關並論者其襲取南郡亦譎兵也黃蓋傳零陵泉陵人也注採吳書云云按風俗通義潁川黃子亷每飲馬輒投錢于水然則公覆之祖自潁川徙零陵也時郡兵才五百人至盡歸邑落我整彼亂以練習擊烏合乃可如此用竒陳武傳奮命戰死權哀之自臨其葬注中殉妾之事固非孫盛之論亦奢濶無當初表所受賜復人得二百家所謂復人者不知是有罪之人乎若後以正戶羸民補其處則直以平民賞將家為僮僕較之後世所謂驅戶其虐又有甚焉甘寧傳寧建計先徑取夷陵既取夷陵則江路通利進可以戰退可以守寧益貴重增兵二千人甘寧可為特將督萬兵臨敵場吳人未盡其用凌統傳二子烈封年各數嵗至還其故兵注孫盛云云按仲謀之事惟殉妾失禮其他亦王者所不廢但非其本也一部周禮至纎至悉矣孫盛之論意則逺而未密也丁奉傳太平二年魏大圍之二年下宋本有魏大將軍諸葛誕據壽春來降十二字不可缺大元本作人朱然傳然臨行上疏曰馬茂小子至責臣後效然若無此表幾無以測其所至虞翻傳陳琳檄吳文虞文繡砥礪清節耽學好古仲翔能負析薪文繡之名注家未及詳翻别傳自敘云臣亡考曰南太守歆自今酒後言殺皆不得殺則前此之殺者有矣孫皓昏虐權之貽也翻性疏直數有酒失自有酒失何以正君此權所以遂不能容也又為老子論語國語訓注皆傳於世注臣松之云云按丣即大篆酉字與􅣧不同􅣧古文作裴謂字同音異誤矣詳說文第十五卷在南十餘年年七十卒注採江表傳云云按遭風沒失乃泊成山而為田豫所破悔赦虞翻泣謝陸抗此權所以稍過于亡國之主耶歸葬舊墓注採㑹稽典録徵士餘姚嚴遵按嚴遵是君平育於先賢之名亦有誤乎范史云一名遵者亦惑于此語也注吳寧斯敦續漢志注于諸暨下引越絶書云興平二年分立吳寧縣張溫傳溫至蜀詣闕拜章曰昔高宗以諒暗至謹奉所齎函書一封以當日人心思漢有不自知其出諸口者然于敵國之體則失辭矣以殷宗傅說稱漢君臣則勤任旅力者不自同東藩乎其居位貪鄙志節汙卑者至浸潤之譖行矣置營府以處之是合其黨而使聚以謀我也又殷禮者本占候召至無所不為此吳王假以示意其刻骨之恨故在表辭以暨豔事坐溫者溫方為衆望所歸欲移衆之怨豔者使之怨溫又吳王之謬術也暨徐之獄類魏崔毛誅廢事惟蜀無之駱統傳尤以占募在民間長惡敗俗生離叛之心急宜絶置時兵民初分故統言若此今則漸以相安又難變矣朱據傳中書令孫宏譖潤據因權寢疾宏為詔書追賜死魏有孫資吳有孫宏皆敗國政蜀用董允何可比也陸遜傳陸遜意思深長至然後可克魯肅初亡議以嚴畯為代意或同此遜曰此必有譎且觀之注吳書云云按赤壁乘其疲利速戰西陵避其鋭宜緩攻臣初嫌之水陸並進至必無他變水陸並進則及鋒而用舍船就步則師老運艱漸見釁隙敵得以逸待勞伺變擊怠也又備既住白帝至謹决計輒還大勝之後將驕卒惰泝流仰攻轉饋又難一有失利前功盡棄昭烈老于兵得蜀已固非若曹仁之在南郡可懼而走也連兵于西主客異勢决還者中人所能知也盛璋謙如豕突耳及公孫淵背盟權欲往征遜上疏至權用納焉伯言固有逺猷此則中智所悉其文可以不載峻等奄至至斬首獲生凡千餘人注臣松之云云按渭濵之規模自逺此舉聊以解權之忿恥但詆其無逺略可也觀朱桓傳與胡綜相激事足明遜非得已矣又魏江夏太守逯式兼領兵馬至遂以罷免此自為將者所不廢但作史者乃可不載大抵吳志煩長未削者多裴注論之尤乖錯時中書典校呂一竊弄權柄至語在權傳此等事他傳已見似不必復載本傳抗二月壬戌晏為王濬别軍所殺癸亥景亦遇害注採機雲别傳初抗之克步闡云云按步氏夷滅出于國典本傳云自將吏以下所請赦者數萬口如别傳所言又當以此責福報乎但三世為將由來所忌且機雲本當與吳存亡國亡之後不思野哭自屏而彈冠敵國自結强藩終致斯咎為可嗟惜耳吳主五子傳孫登而謝景范愼刀𤣥羊衜等皆為賔客注採江表傳云云按景愼未嘗敗也古無刁字宜從宋本作刀登將拜太子至權默然有防微之慮者當在此時蔣修虞翻志節分明此虞翻字疑誤于時仲翔沒于交州已十餘年且未嘗厠迹宫僚也孫和後遂幽閉和至族誅正象據晃牽入殿杖一百老悖昏惑吳亡不待皓而决孫霸和同母弟也同母二字衍傳後云霸二子與祖母謝姬俱徙烏傷則和出自王霸出自謝矣周魴傳乞遣親人齎箋七條以誘休譎休七條凡鄙寡要何事塵穢簡牘人才如魴即傳可以不立此與胡綜傳所載僞為吳質三表豈故鋪陳其事以見吳人智略本疏好行小慧君臣皆草竊一時耶潘濬傳拜濬輔軍中郎將注採江表傳云云按濬漢之叛臣此略之者已見楊戲輔臣贊下也江表傳為不實權假濬節督諸軍討之注採吳書疏到急就往使受杖一百促責所餉按濬本二劉舊人故尤懼降人反覆為巳纍也黃門侍郎謝肱語次問一至遂解散雍事此肱之巧于解元歎之結也陸凱傳豫連從荆揚來者至故鈔列于凱傳左云此閭閻之人恨晧之虐思凱之慤私造此書以為口實事辭俱無足徵陳氏録之蓋其識卑也是儀傳郡相孔融嘲儀言氏字民無上可改為是注採徐衆評云云按古之氏族本出上賜漢吏皆成君臣未宜深責顧以聞知當有本末據實答問辭不傾移若辭有傾移亦并得禍巧者不皆可幸也胡綜傳權以蕃盛論刑獄用為廷尉監蕃蓋投權之多猜也初以內外多事特立科至由是奔喪乃斷此事已見權傳復出乃刋削不盡吳範傳後呂岱從蜀還遇之白帝先主入蜀自葭萌還攻璋無緣復在白帝與岱相遇承祚蜀人宜知道里違錯故載之以見吳人僞妄耳劉惇傳時有星變以問惇至卒如惇言時孫翊名位甚微安能星躔示變此又吳人之誇也趙逹傳權聞逹有書求之不得乃録問其女及發棺無所得可以為術家之戒矣評然君子算役心神宜于大者逺者算宜從宋本作等注採孫盛云云盛言是也若嫌魏得不以正亦當崎嶇入蜀注然則鵝死亦有鬼也此必覡者先得之左右待推問急而始言之則休信為實見其狀耳鵝微物氣當旋散安得埋著土中復有相耶注故為陛下取以作生鱠張溫使蜀時權方為吳王何以得稱陛下且正當魏軍頻出廣陵洞口權亦不在武昌也諸葛恪傳讀諸葛恪傳雖孟堅當無以過吳書中惟陸伯言事似稍煩冗他傳亦篇篇可觀想周韋華薛之徒其書本勝經其整比乃遂逼前良耳恪盛陳其必捷權拜恪撫越將軍領丹陽太守張溫未竟之績元遜收之乃移書四部屬城長吏至漸出降首先使之無所略而後困之則不得不出矣四部當作四郡即上所謂與四郡鄰接也御覽正作郡復逺遣斥候觀相徑要欲圖壽春權以為不可以為不可者蓋以此地南北襟喉雖得其地非十萬之衆不足屯守若魏傾國來爭恐致利鈍其後恪出新城欲卒此規又輕用大衆圖不以漸遂致師老民愁家族傾覆權疾困召恪宏及太常滕𦙍將軍吕據侍中孫峻屬以後事注採吳書曰權寢疾云云按峻始保恪而後乃相圖權勢之難共如此注諸法令有不便者條列以聞權輒聽之及權在時改紀此有逺見不當以成敗論㑹衆于東興更作大隄左右結山俠築兩城至振旅而歸築兩城所以致人也攻新城則致於人矣然此舉雖勝已失之驟注採漢晉春秋今敵政在私門外內猜隔至破之必矣誠有是形但亦當審已恪乃著論諭衆意此論祖述武侯出散關表每覽荆邯說公孫述以進取之圖近見家叔父表陳與賊爭競之計未嘗不喟然歎息也元遜但知忠武頻煩出師而不規其務農殖穀閉關息民三年而後南征還師之後又蓄力一年乃屯漢中其明年始攻祁山耳惡有狃於一勝主少國疑羣情未一遽圖輕舉者乎是役也雖克新城歸將不免而况違衆玩冦弗戢自焚釁非馬謖不請貶三等謝創夷之衆塞同異之口乃更思興作愈治威嚴虹繞鼉鳴身分族赤畫虎類狗元遜之謂矣荆邯語見後漢書公孫述傳中於是違衆出軍至驅略民人若不過驅略民人曜武邊界但選督將伺利而動足矣何必發二十萬衆耶今既大舉又惑于諸將之言頓兵堅城之下是徒爾好大乃素無成算者也滕𦙍傳𦙍白日接賔客夜省文書或通曉不寐注採吳書曰𦙍寵任彌髙接士愈下表奏書疏皆自經意不以委下按經意處即疏處也上相出征其門如市即異同之嫌專擅之咎將自此構矣𦙍與恪特未久故無敗耳孫琳傳使光祿勳孟宗告廟廢亮孟宗恨于此無大節可紀與王祥皆一行而已又壞浮屠祠斬道人釋子稱僧到赤烏年此是其證笮融丹楊人意其所煽也休既即位稱草莽臣詣闕上書劉宗周南渡時上書號草莽臣自是不觀史書之失王蕃傳永元傳劉洪乾象歷依乾象法而制渾儀立論考度具載宋書天文志中此注失採賀邵傳注吳書曰邵賀齊之孫景之子按景賀齊之弟邵乃從子非孫也吳書誤韋曜傳時蔡頴亦在東宮性好博奕太子和以為無益命曜論之此事已載和傳似可省也評必不得已元宜在先至庶幾忠臣矣瑩言既不及核冲又謂樓宜在先故評家為之折𠂻然邵亦以直廢義門讀書記卷二十八

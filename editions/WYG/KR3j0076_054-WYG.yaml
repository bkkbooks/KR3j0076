body:
  text: 義門讀書記卷五十四翰林院侍讀學士何焯撰杜工部集蜀相錦官城外柏森森破蜀字映堦碧草自春色一連與下淚滿襟反對自字空字呼應最㣲三顧頻煩天下計以下深歎其止以蜀相終也見隆中規取荆益以爭天下豈知創業未半而崩永安受遺北伐又不及擒叡馘懿丞相先鞠躬盡瘁天下之才僅為偏安輔佐所以一瞻廟貎而不禁涕之無從也出師未㨗身先死㨗注一作用按順宗實録中作出師未用身先死未用未展其用也作未㨗了無意味矣讀袁子論武侯語自知卜居東行萬里堪乗興二句東行萬里當指萬里橋耳方公以為落句公中有所不自得雖卜築而已欲去誤也二泉云用王猷事暗指裴公草堂在西却縱言東面澄江之可以銷愁則水西幽勝言外益見如此詩法使人何處捉摸一室大巧若拙乃此等也應同王粲宅二句江船空見獨滯一室也梅雨梅雨是及時之雨不得一例怨咨如昭諫長安有貧者為瑞不宜多便覺偏枯淺薄湛湛長江去妙為結句生根茅茨疎易濕㸃眼竟日蛟龍喜暗藏苦雨之人在内為農錦里烟塵外照去國賖圓荷浮小葉一連冩時令將有事于農也為農去國賖為農只一㸃逺慚句漏令二句收為農脫灑末句言去國無禄衣食累之不得不為農也所謂味在鹹酸之外有客草堂本作賔至詩紀編客至後二詩體勢相似意味各别公詩所以妙方云江干僻地老病才盡聞人足音而喜幾於清談不爨矣幽棲地僻經過少一連先敘主反破有字漫勞車馬駐江干破至字竟日淹留佳客坐始出賔字百年麤糲腐儒餐百年麤糲猶云家常茶飯也不嫌野外無供給二句結嫌以文章自居故但回顧幽棲而云看藥欄也江干逺訪淹留清坐其人亦應妙觧書味知其不縁簡率興盡乃復因其至之疎期其至之數云耳狂夫清風峻節固窮獨立比賦相參不全訐露萬里橋西一草堂一草堂猶言家徒四壁意百花潭水即滄浪即滄浪三字含後半所謂世人皆濁我獨清也風含翠篠娟娟靜一連風雨起下故人碧篠紅蕖襯出潭水之清娟娟冉冉風雨相闗句法之工細乃爾曰娟娟風中有雨曰冉冉雨中有風此羅大經所謂互體欲填溝壑惟疎放二句只自嘲怨而不怒賔至草堂本作有客七言幽棲地僻一篇稍廓而大之喧卑方避俗對下情親王十五司馬弟出郭相訪兼遺營茅屋貲如話堂成句句是初成語縁江路熟俯青郊草堂在西郭故曰俯青郊小謝詩結軫青郊路善注引周禮東方謂之青榿林碍日吟風葉一連以竹木襯出新堂之髙頂上俯字榿從人易求竹隨時可移新居所有真景也吟風滴露交互對暫止飛烏將數子一連室家有定飛鳥依人腹聫暗藏得一靣在言外自比避地偶托旁人錯比揚雄宅二句本非蜀士而自守泊如頗同揚子故曰宅誠錯比嘲亦懶觧也田舍草深迷市井承古道地僻懶衣裳承清江曲鸕鷀西日照二句收足江曲進艇南京久客畊南畝成都嘗為南京晝引老妻乘小艇一連言尚得團圞可無飲恨西郊西郊向草堂向字生出腹聮暗藏徃來蹤迹在内市橋官栁細徃西郊江路野梅香路注作岸岸字方是郊只有官栁野梅含下無人競三字傍架齊書帙二句來草堂疎嬾意何長長字收足時字暗藏營競短半靣所思苦憶荆州醉司馬崔自吏部謫司馬可憐懐抱向人盡一連對屬渾化江村自去自來梁上燕一連頂幽字中四句皆一句内一句外若云分屬江字村字則不通矣多病所需惟藥物二句藥物之外更無求于斯世吾將老于江村矣野老漁人網集澄潭下下下網也賈客船隨返照來賈客來者只隨返照則東路未通也片雲何意傍琹臺片雲公自謂也舊注琹臺詩引成都記云在浣花溪之海安寺南此句猶云不意自全至此王師未報收東郡二句我野老也猶可漂泊息肩于此若天子幸蜀則如所謂公出在野豈可狃于奔竄西京並置不急收山東乎雲山京洛雲山外含下望鄉神交作賦客作賦客謂如屈子之南放也白鷗元水宿二句將白鷗襯出哀字妙有味外味白鷗無上所云云而猶有餘哀則公之哀其可盡乎宿字比留滯不能去北鄰愛酒晉山簡一連山水借對増一晉字作對政自無妨南鄰錦里先生烏角巾呼後半角巾隠居之服是不出户人也園收芧栗不全貧乃政言其貧也莊子山木篇衣皮裘食杼栗此句似用此又徐无鬼篇居山林食茅栗釋文本亦作茅栗芧音序作芋者字之譌慣看賔客兒童喜兒童猶喜賔客則其好事可知得食階除鳥雀馴鳥雀皆為之馴則其接物可知二句見先生故貧所以尤難也野航恰受兩三人注航魯直作艇音平聲方言云小舟也按淮南子越舲蜀艇注艇一版之舟魯直惜不據此故明人疑為臆說杜更有進艇篇可知當作艇也釋名三百斛以下曰艇其形徑挺一人二人所乗行也兩三人亦惟艇字為穏相對柴門月色新對注作送棹舟過訪月生而未厭相對作送字反覺意味殊短落句襯出竟日淹留無迹出郭逺烟鹽井上無人烟也斜景雪峰西無村落也還與舊烏啼頂亦字言舊則夜啼非自今始也過南鄰朱山人水亭看君多道氣更酌數隨皆縁道氣綰結上下見不但境幽可愛也恨别成都作草木變衰行劍外頂四千里兵戈阻絶老江邊頂五六年思家歩月清宵立一連清宵立白日眠兼冩出老態來若使賊仍不破此恨不復可以年計矣聞道河陽近乗勝二句近字急字並應五六年寄楊五桂州譚因州参軍叚子之任雪片一冬深此句虛對實嶺外梅花十月即發非獨桂林一冬作雪獨不炎熱江邊送孫楚指叚参軍逄唐興劉主簿弟劉杜同出和裴迪登新津寺寄王侍郎老夫貪佛日貪佛較佞佛新甚敬簡王明府神仙才有數頂葉縣流落意無窮頂周南建都十二韻蒼生未蘇息四句先從萬國將翻國恥未雪說起恐失東人望婉至雖倚三階正質直三階句深罪宰相非人將復至覆國牽􅅂恨不死以下因國論之非而深悲不得身與雲臺之議也遙憐湘水魂即公自謂隨事有田園匹夫羇旅隨處可立田園有國者一敗塗地别無奔竄之方也願枉長安日枉注作駐駐字尤有力枉回也與後篇未枉周王駕亦兩義或謂追憶房琯分鎮之䇿非也此詩直謂肅宗不當議遷若不能雪恥自强則胡馬半天下江陵豈能免乎落句又言五陵北原祖宗陵寢在彼不可輕棄為晉元帝也和裴迪登蜀州東亭送客逄早梅相憶見寄淡然初不著題的是早梅後人何由可到寄贈王十將軍承俊似呉叔庠賔客滿堂上二句兼以自歎暮登四安寺鐘樓寄裴十僧來不語自鳴鐘含下閴寂獨愁孤城返照紅將斂頂暮字知君苦思縁詩瘦二句言我病不能徃君何慵乃爾豈縁詩瘦耶然亦當念交遊如此閴寂即一可語之僧亦無處覓也近觧作思我縁詩而瘦者非散愁二首欲散而愁愈結也百萬傳深入一連不知有對屬第二首老魂招不得收久客客至喜崔明府相過舍南舍北皆春水二句反打開去惟公能之賔至起相似風雨則思友况經春積水繞舍日惟鷗鷺羣乎極寫不至則喜字溢發紙上矣花徑不曾縁客掃反㸃客字盤飱市逺無兼味一連市逺家貧惟恐我喜之無以將也肯與鄰翁相對飲一連留之不聽其去以應至之難也呼取對飲令共此喜也遣意二首方云二詩雨後作一晝一夜分别觀之始見其妙上六句逐層頂接囀枝黄鳥近含花落泛渚白鷗輕含水生漸喜交遊絶二句收遣字第二首簷影㣲㣲落夜景宿雁聚圓沙草堂即事詩宿鷺起圓沙見火而起此處若作起字尤飛動并與野船細火相應鄰人有美酒二句收遣字賖酒與前篇催釀呼應漫成二首眼邊無俗物二句妙語春夜喜雨及時之雨而又無所不遍所以為可喜也野徑江船錦城以見雨之霑足都非漫下好雨知時節喜字潤物細無聲好雨野徑雲俱黑此句暗江船火獨明此句明二句皆剔夜字曉看紅濕處二句細潤故重而不落結春字工妙春水已添無數鳥二句方云一夜水起便有衆鳥爭浴惟久居水上者知之春水生二絶山谷只法此種江亭雲在意俱遲一在字人更不能到邨夜邨舂雨外急指水碓也早起帖石防隤岸頂春字童僕來城市二句除却沽酒無復一事與城市相闗政足幽字可惜生前酒身後名吾自兼之然少壯雖可惜何嘗不可同陶潛之任逹也落日芳菲縁岸圃一連便覺有風月無邊意徐歩花繠上蜂鬚花繠注作繠粉佳把酒從衣濕一連正寫徐歩髙柟江邊一葢青破髙字妙遊脩覺寺馮云以遊字結搆禪枝宿衆鳥二句仍映𢃄花竹後遊寺憶新遊處新字生動客愁全為減二句是後遊結後遊皆寫寺外題新津北橋樓望極春城上惟樓故所望彌逺寫髙處正做逺字做逺字又是襯近郊幻甚白花簷外朶一連頂近鳥巢朶字有居髙俯下之景池水觀為政一連指近郊江上值水如海勢聊短述水如海勢驚人之景乃止短述漫興云爾新添水檻供垂釣一連略捻值字赴青城縣出成都寄陶王二少尹老恥妻孥笑宜從注作老被樊籠役東郭滄江合與樊籠反文章差底病應詩態句注引匡謬正俗云云按今江隂人猶有此音正作都禮反古音之存于今者在所不同不必以匡謬正俗之說為疑野望因過常少仙隨筆云唐人稱縣尉為少府此少仙用梅仙事名更新竹覆青城合一連惟見碧竹清江是秋望也入村樵徑引是因字妙嘗果栗皺開是過字奉簡髙三十五使君此篇當是髙為蜀州時詩送韓十四江東覲省黄牛峽静灘聲轉四句一路俱有水聲樹影兵戈之後幾無子遺正見尋訪之難然不可不努力也各努力者必欲尋訪同歸補人間之缺陷而後已也弟妹必欲其見况吾親乎上二句是送各字雙收我字君字酬髙使君相贈如話草堂即事獨樹老夫家草堂雪裏江船渡四句即事極冩風雪嚴寒偪出須酒來徐九少尹見過發端飄飄絶塵賞静憐雲竹一連頂晚景何當看花繠二句為新字餘韻照字妙的是梅花又與晚景反映范二員外邈呉十侍御郁特枉駕闕展待聊寄此如話暫徃比鄰去去注作至至字佳言急至而已成空歸也不為複齊梁句法多如此幽棲誠簡略闕展待衰白己光輝特枉駕己光輝三字頓挫得妙野外貧家逺難其重來村中好客稀望其重來論文或不媿二句則直邀之王十七侍御掄許携酒至草堂奉寄此詩便請邀髙三十五使君同到如此事何足便為賦詩特為逃空虛者聞人足音而喜也前四句開濶有意白屋寒多暖始開白屋寒多仍先破出草堂寒多二字已寓正宜有酒詩律之細也江鸛巧當幽徑浴一聨反映許而不至繡衣屢許携家醖指侍御皂蓋能忘折野梅指使君戲假霜威促山簡請邀同到須成一醉習池廻至草堂幽栖無侣白首忘形前半閒淡寫來自促携酒便請邀賔正覺無所不可也王竟擕酒髙亦同過共用寒字卧病荒郊逺二句竟字神味故人能領客先出同過陪李七司馬皂江上觀造竹橋即日成徃來之人免冬寒入水聊題短作簡李公二首褰裳不渉徃來通徃來之人免入水也天寒白鶴歸華表即日成日落青龍見水中竹橋青龍是用竹杖化龍與青龍卧橋上無與註說非合歡却笑千年事合歡言萬人鼓舞不獨我與司馬也驅石何時到海東驅石對竹橋何時對即日野人送朱櫻野人相贈滿筠籠贈對賜筠籠對金盤玉箸野人對官省數廻細冩愁仍破寫去聲此日嘗新任轉蓬曰轉蓬則又將不止居蜀也即事成都詩贈花卿刺其僭也觀李固請司馬弟山水圖三首第一首山水出得不平縁是碧海圖也第二首方丈渾連水一連超妙至此人間長見畫一連接得竒變范蠡舟偏小一連妙就畫上指㸃生動八句中離合斷續不可捉摸第三首起二句頂掛圖題桃樹因桃樹而傷今思舊也五株桃樹亦從遮鮑明逺行路難中庭五株桃一株先作花今人熟用五栁未有用五株桃者從韋二明府續處覓綿竹元白小律多類此贈别鄭鍊赴襄陽把君詩過日但把其詩則不見其人矣轉出别字最妙試覓姓龎人龎公不肯為劉荆州屈者殆以此勉鄭耶奉和嚴中丞西城晚眺十韻詩清立意新入奉和層城臨暇景一連艱難之際身當分閫重寄寸隂可惜遊覧賦詩非所先也立言重中丞不可粘晚眺曰暇景曰餘春皆有體要天濶樹浮秦暗入望京意接出帝念征南多興緒應詩清嚴中丞枉駕見過地分南北任浮萍二泉云自蜀望長安為北扁舟不獨如張翰頂浮萍何人道有少㣲星二泉云歎知己之少若自謙而實自負也按何人二字鬆得妙言㣲嚴公誰復知之廣州段功曹到得楊五長史譚書功曹却歸聊寄此詩衛青開幕府廣州于五管為大府故曰開幕府漢節梅花外一連嶺外樓邊㸃化工妙絶句漫興第四首莫辭身外無窮事莫辭言無得辭也此元白所本曲而有直體第六首呼兒日在掩柴門日未落而掩門方頂得出懶惰俗本將日字作自字妄作如此第七首白氊青錢元白最好寫仿其流遂有放翁江畔獨歩尋花七絶句走覓南鄰愛酒伴二句馮云南鄰已出洗題中獨字獨空床三字見其醉卧時多頂出愛酒妙絶第七首此等詩即在老杜亦非佳語三絶句不如醉裏風吹盡二句老見亂離不若太平先逝詩人所謂知我如此不如無生也第三首㑹須上番㸔成竹馮云上番猶言頭潑凡二三潑筍多蛀折不能成竹戲為六絶句第三首龍文虎脊皆君馭龍文疑作龍媒麗春非近體也編者以類相從耳鸂鶒與下花鴨皆在嚴公幕中作王人失路托身使府自畫小影花鴨階前每緩行是鴨黒白太分明花字熨貼畏人前半虛含畏人即所謂心㣲傍魚鳥肉瘦怯豺狼也不斥薄俗而遜詞于褊性其益厚且慎歟然非我之輕絶故人萬里三峯曽不我顧其實待之無可待耳起四語空濶渾淪三年落日低年字從注作峯三峯落日所居者西郊也野望西山白雪三城戍望字南浦清江萬里橋野字海内風塵諸弟隔伏人事蕭條惟將遲暮供多病二句不言家國之棄才而惟以病不能報致此四郊多壘自責不以身不在朝歸咎于愛莫助之也跨馬出郊時極目收望字不堪人事日蕭條願須臾無死早見興復何堪日甚一日耶按松維沒于吐蕃但見西山白雪三城戍守曽無藩籬之固蜀中殷富徴調既繁但見南浦清江橋名萬里東道阻絶故曰人事日蕭條也官池春雁二首依嚴于成都時作未入幕也第一首且休悵望看春水二句言所憂不但無歳恐亂離阻絶歸期無日也水檻遣心二首第一首中二連皆一髙一下對城中十萬户應去郭此地兩三家應無村第二首後半篇是遣心屏迹三首用拙存吾道伏心字幽居近物情伏迹字心迹喜雙清謝詩心迹雙寂寞第二首晚起家何事倒喝勢宕竹光團野色一連上句暗下句明上句聚下句散一月不梳頭應晚起無營言無營則迹屏而心與之俱㝠矣承上雙清來但得醉己足而不少為妻孥計所謂拙也第三首衰顔甘屏迹㸃題幽事供髙卧承晚起猶酌甘泉歌對家何事至此則其貧益甚然信道彌篤寧為其拙而屏迹以終也奉酬嚴公寄題野亭之作懶性從來水竹居本非野人然懶性適得所便也奉引濫騎沙苑馬頂拾遺謝安不倦登臨費起旌麾阮籍焉知禮法疎應懶性草茅無徑欲敎鋤收野字注引孔毅父續世說云云按鵕䴊侍中所冠嚴詩自言杜二曽作拾遺何以自名野亭豈得如禰處士徒以能賦為滎觀乎故公酬之云雖常奏書而濫騎官馬野性本其從來之素也謝安以下酬其末句興發使君灘之語言猶能如阮公之對晉文脫略禮法罄一日之歡耳續世說妄有穿穴附㑹可以一笑嚴公仲夏枉駕草堂兼攜酒饌竹裏行厨洗玉盤酒饌花邊立馬簇金鞍枉駕二句言方治酒饌中丞已至必欲作竟日之歡也非闗使者徴求急使者即謂攜酒饌之人徴求急謂急于烹調陳設也百年地闢柴門迥草堂五月江深草閣寒仲夏看弄漁舟移白日終上禮數寛老農何有罄交歡對攜酒饌嚴公㕔宴同詠蜀道畫圖日臨公館靜嚴公㕔劍閣星橋北一連大手筆腹聫展拓更濶逺所謂居然有萬里之勢興與烟霞㑹二句綰入宴奉送嚴公入朝十韻句句筋兩字字精神鼎湖瞻望逺舊恩象闕憲章新新寵四海猶多難時危中原憶舊臣衆望自昔有經綸生平從容靜塞塵機㑹南圖廻羽翮二句入朝漏鼓還思晝四句先位置蜀民一靣成都曾作南京故有宫鶯之句玉帳術乃兵家厭勝之方位主將于其方置帳則敵不得犯其法出黄帝遁甲以月建前三位取之江潭隠白蘋方入本身此生那老蜀四句亦欲入朝不徒送公也收轉前半詞髙意足送嚴侍郎到綿州同登杜使君江樓野興每難盡先為惜字作勢稍稍烟集渚二句承落景層次洗發惜字不勞朱户閉二句惜字淋漓以河沉對映落景九日奉寄嚴大夫不眠持漢節二句是時徐知道反以兵守劍閣武不得出故云黄草時公在梓閬黄鶴注最當懐舊悲來望白雲望雲事朋友亦可用不見近無李白消息飄零酒一盃言致此飄零豈不由酒不過佯狂縱酒遂致世人欲殺觸此駭機真可哀也然鴻飛㝠㝠弋者何慕但拂衣歸山吾詩自足不朽今者不見又安之乎深諷其自愛也題元武禪師屋壁錫飛常近鶴禪師壁似得廬山路二句鈍吟云若大歴以還决以畫結此詩亦同結到畫却瀟洒擺脫不可及按非為擺脫也無末二句題者伊誰凡詩中無自己乃大病也客夜卷簾殘月影一連輾轉不寐遂見月殘明日求睡又聞江聲無限曲折頂得何曾着三字出後四句都從客字貫注應悉未歸情時公家在成都故以成都為歸即并州故鄉之意客亭秋窗猶曙色亭字起江流宿霧中此句曉光也日出則霧消矣飄零似轉蓬客字結秋盡籬邊老却陶潛菊一連王室㣲諸侯横無白衣送酒之王宏為伏地行酒之康成懐抱可知矣不辭萬里長為客二句懐抱之惡豈獨為一身逺客公詩所以深逺聞官軍收河南河北如龍二泉云後半喜之極故言之詳却看妻子愁何在愁何在言妻子皆非復向時之愁歎也涪江泛舟送韋班歸京花逺重重樹一連羡字出望之何異登仙天涯故人少𦂳宻春日梓州登樓二首雙雙新燕子二句從春風轉下言無家之人不如營巢之燕也郪城西原送李判官兄武判官弟赴成都府憑髙送所親西原野花隨處發二句惜芳辰泛江送魏十八倉曹還京因寄岑中允參范郎中季明若逄岑與范岑公孝與范孟博齊名無一字無來處為報各衰年各字妙古人所謂不可知無可奈何者皆在其中然則君方得路我方流落如之何不急相援也送路六侍御入朝四十年睽隔一見即又言别故不暇喜而但有悲也然路乃入朝返命義不顧私則愁緒千端獨我留滯劍南者而已結句得體有味更為後㑹知何地先起别字屈折有力上牛頭寺何處鶯啼切二句結得變化正與意不盡暗應望牛頭寺春色浮山外望字傳燈無白日無白日不以白日而火不傳也上兜率寺馮云以上字結搆江山有巴蜀頂知名數陪李梓州泛江有女樂在諸舫戲為艶曲二首贈李第一首上客廻空騎泛江故騎廻也佳人滿近船在諸舫第二首立馬千山暮應上客句廻舟一水香應佳人句使君自有婦二句戲贈登牛頭山亭子春谷逺含風春和景麗嘗若悲風颯至真深谷也陪季梓州王閬州蘇遂州李果州四使君登惠義寺鶯花隨世界一聫一倒轉便不凡送何侍御歸朝次連是比體春日垂霜鬂一連無對屬㾗通篇淡而有味涪城縣香積寺官閣方云次連句中有三層景寺下春江深不流上下二字呼應起連先說寺下涪江含風翠壁孤雲細一連說寺上石壁夾出山腰意二句是上小院廻廊清寂寂正叙官閣又起下之鳬鷺上之藤蘿通篇無一句不切山腰也浴鳬飛鷺晚悠悠此句是下晚字既承背日又起昏黒戲題寄上漢中王三首時王在梓州初至斷酒不飲篇有戲述曰戲皆責望之詞也第一首忍斷盃中物二句戲述斷酒用晉元帝事座右銘只斷章人短已長二句自醉逐浮萍落句從第六句轉下言非王之不已思也已所短在躭酒姑且萍梗飄飄自適已事遂不能追逐昔遊耳第二首言一别五秋旦暮入地王猶視其萍梗不我許留乎下四句又言成都取醉固有餘樂然終不如依王于梓州也已知嗟不起一連出之以戲故無迹第三首言王雖斷酒今何可遂不已思乎羣盗無歸路二句言已豈真沉􅒬者哉姑以此陶寫耳歸路謂歸朝也猶記酒顛狂猶記者王猶以酒狂為嫌也妙在是戲魯衛彌尊重四句當肅宗朝故曰魯衛交分不淺久要難負魯衛親賢當為朝廷惜才自徐陳徂謝人物益稀如我者萬一天子詔徴之如漢武之安車召枚乗而乗死可不亟拯其窮老乎陪章留後侍御宴南樓冦盗狂歌外一連謂狂歌痛飲庻幾冦盗之憂虞形骸之拘忌皆可忘也起結句出號江城黒出號二字未詳此身醒復醉二句朝命不通冦盗充斥雖逄髙宴食不下咽真窮途也曰不儗者㣲詞婉諷耳臺上何須把官燭應月光送王十五判官扶侍還黔中扶侍南還孝子之恩不可奪然艱危中不得資其幹濟惜别又何能已兩靣俱到青青竹筍迎船出二句猶似用事耶倦夜顧陶類編題云倦秋夜空悲清夜徂此詩前三句上半夜下三句後半夜以徂字結裹以見徹夜不寐悲且倦也悲秋此篇妙在淡凉風動萬里二句函葢無限國家事在内愁窺高鳥過頂為客倒裝句超妙變動老逐衆人行方云老至居人下更快然不如此句之渾厚始欲投三峽二句以家逺結收足悲字對雨首連領得起直籠罩到繩橋雪嶺西戎甥舅禮二句言恃其不背恩而不薄我於險則兵與將皆不足用矣因雨而危遽可知警急時高公適領西川節度才名舊楚將二句言人與地違非所以弭邊警詞與而實不與也適自淮南移西川故云舊楚將玉壘雖傳檄六句玉壘傳檄况望窮討青海西戎飽飛去來自如中國將帥非人誠無如之何耳松州危急擁兵不救所恃西戎或飽欲自去耳逹夫故舊公不得已而隱躍致譏彼固深於詩冀幸可以一悟玉壘羽書其少紓乎王命漢北豺狼滿二句漢北巴西賊氣充斥則蜀中之亂可知也前半歎蜀中連亂不即王誅牢落新燒棧言職貢不入蒼茫舊築壇言將帥自立如此使事意味乃長深懐喻蜀意此句斷章取自擅不討之義耳有感五首首篇言將帥不思報主次篇以下則言主上制御六合當以不能弭亂自責不可獨諉之下也先責諸將而後探本言之可謂盡其體要矣第一首乗槎斷消息二句言吐蕃孔熾求將帥之中有一如張騫之開西域者絶不可得而徒以賊遺君父䝉恩澤而不思報為可感也第二首諸侯春不貢二聫諸侯不貢由失制馭之方乃使者徴求往來屑屑略無大體又何以服其心哉即起下不行儉徳意兵分則威削五六論平亂當有序姑先其所急即欲從事於内師老氣竭亦復難用不如息戰務農養威伺釁也第三首欲平河北當駐洛陽宏衛文大布之衣以收小民之心以厲將士之氣何有深拱關中泄泄奢怠日復一日洛下之峙儲且盡河北逆亂蟠結遂忘上下之分豈復能有為乎公詩與汾陽所論形勢㣲異長令宇宙新如下所云行儉徳以與宇宙更新也第四首言分封費重不可猝辦豈知但取係屬逺人卑宫示儉何不可也但言强幹而至枝葉盡凋則朝廷勢弱何以彈壓不臣者哉親賢受鉞空成往事卑宫出鎮遥遥不聞豈封建果不可復耶丹桂風霜急二句用襯出方是縁情之體注以丹桂言王室青梧言宗籓者得之終依古封建二句方云反言見意得諷諭體第五首諸侯不朝不貢由朝廷有以致其猜阻然不可以質言之也故但以登壇絶假解諸將之疑而責以臣節有所未盡也諸將得以要脇天子由朝廷無恤民之政從亂者相繼若實心存撫以起瘡痍彼欲為亂將誰與哉領郡一連是諸侯所以莫朝之故弱者則懼鄰道并吞不敢離其地黠者則借多事為辭諸侯理非皆畔故借二者言之也此篇直繳應發端四句願聞哀痛詔則終上以行儉徳為本也送元二適江左亂後今相見二句數折晉室丹楊尹四句温太真自河北奉表江左言元如温尹之乃心王室蜀將如子陽之井蛙自大順逆異趣使露詞色則殆矣故以莫論兵戒之章梓州水亭時漢中王兼道士席謙在㑹同用荷字韻城晚通雲霧一連引起水亭妙近屬淮王至漢中王高門薊子過席道士荆州愛山簡章梓州仍以習池暗㸃水亭翫月呈漢中王夜深露氣清玩字逺致浮客轉危坐方云浮客出康樂詩正貼玩字歸舟應獨行起下驚字欲得淮王術收王風吹暈已生收玩登高逺客悲秋又以老病止酒其無聊可知千緒萬端無首無尾使人無處捉摸此等詩如何可學風急天高猿嘯哀發端已藏獨字艱難苦恨繁霜鬂頂萬里作客潦倒新停濁酒盃頂百年多病結凄壯止益登高之悲不見九日之樂也前半先冩登高所見第五插出萬里作客呼起艱難然後㸃出登臺在第六句中見排奡縱横遣憤雷霆可振威三句言當自强以定難勿復乞師小夷致宫臣有鞭血之辱也薄暮高秋心苦悲嵗暮鬂髪白成絲以齒暮結悲痛西山三首第一首言老師費財與賊相望直書其事而庸懦無能可知矣築城依白帝白帝謂金天也第二首腹連酷冩畏縮不前之狀第三首前四句言人疲粟盡無尺寸之功子弟自往元戎自歸關城自圍凱歌自奏將帥非人以敗為功乞和飾勝脱身危疆而已口舌和親不如力戰决勝今乃踵和親之謬飽胡人之欲幸其自退乃奏凱冐功侈然若伸威萬里者此將誰欺乎城上春動水茫茫名句羣臣從武皇若將第六句稍稍穿鑿則為子盗父兵矣論詩正不得爾舍弟占歸草堂檢校聊示此詩鵝鴨應長數二句是檢校處公有四弟惟占相隨入蜀此日又從公於梓遣其歸成都草堂檢校故有此囑傷春五首第一首天下兵雖滿二句是倒装法言春光雖日濃天下兵方滿故可傷也御宿且誰供御宿不供禁旅離散從吾君者誰乎意者鬼神呵䕶如雲之從龍也并含末句意殷復前王道一連望其為武丁之撻伐莫如平王之避狄蓬萊足雲氣二句責左右之臣不能輔主修徳致此播遷誰執其咎也第二首天青風卷幔風卷幔疑兄弟之來也草碧水通池暗用池塘春草事牢落官軍速言日望官軍速為定亂而何其轉牢落也第三首不成誅執法二句此歎元振不誅人無奮志也晉書天文志執法廷尉御史大夫之象所以舉刺凶奸者也大角纒兵氣一連陸士衡詩在漢之末皇綱幅裂大辰匿輝金虎習質宫闕没於吐蕃天子出走内敗不書假天象以言之賢多隠屠釣二句斥其用宦官以致播屯也天子七尺之輿當與天下賢者共之同子驂乗袁絲變色奈何惟元振一刑餘是佐乎求賢及於釣屠况在朝之賢必無反見斥逺者親之信之則可以服武夫悍卒之心惟我役使成收復之功矣一曰郭子儀為尚父此借文王後車事瘦詞見志言幸而憗遺一老何不悉以收復寄之也第四首復道使通秦曰使通秦則京師未復可知此句法也奪馬悲公主當時用高歡奪爾朱榮妻北鄉公主馬事注家未及蕭關迷北上言不得歸秦也滄海欲東廵言復不得安處洛陽也豈無嵇紹血二句自傷在逺不得以死衛主也豈無者傷其無也第五首孤兒却走多羽林孤兒天子親軍亦棄之而散况四方誰為守乎王公出御河御河宜用爾朱榮河隂事得無中夜舞一連聞鷄起舞者收而用之即為忠臣當如漢祖之大度以得猛士耳春色生烽燧萬物發生之時不見其他但見烽燧已屬可傷况烽燧不知何時始平方有與春俱生之勢則尤可傷也此句總結傷春送梓州李使君之任故陳拾遺射洪人也篇末有云籍甚黄丞相二句從前籍甚能名却忘此舉不免猶是俗吏故此行尤急也近看除刺史指再任老思卭竹杖六句言所望於使君者非卭杖錦衾恤其窮老惟最先一舉為執熱中一酌甘泉沉着中極變化生動火雲二句襯出先字接得變化此我所思所要也若誤㑹自注於山驛句不劃斷即了無意味矣遇害陳公殞四句天地之英靈斯民之耳目此之不念何以為政言死者之可惜則生者之宜留意益可知也遇害下言陳公殞於酷吏李如欲為循良則此行未有先於此也一篇非為陳公篇末乃㸃明射洪在梓州耳注引舊書及雲溪友議云云按子昻事當据盧藏用别傳舊書亦多失實别傳云子昻以父老乞歸歸而為後史記綱條粗立筆削未終㑹丁父憂則亦非一嵗矣安得先有父為段簡所辱之事又章仇兼瓊鎮蜀去子昻已逺安得為之雪獄此皆無足取也王閬州筵奉酬十一舅惜别之作沙頭暮黄鵠二句結用比有餘味奉待嚴大夫八句無一句非待字意常怪偏裨終日待用他人待作襯一生襟抱向誰開收喜字奉寄高常侍汶上相逢年頗多二句位日崇詩日妙其如今日所責望於髙者非復汶上相逢故意必有大節壯猷乃不負飛騰無悔遲暮也今日朝廷須汲黯謂歸朝中原將帥憶亷頗望其復出别淚遥添錦水波公自謂將赴荆南寄别李劍州天入滄浪一釣舟言老而為客仍無家也奉寄别馬巴州南國浮雲水上多言但見湖光待馬則杳然也難隨鳥翼一相過寄别知君未愛春湖色只云不愛湖色責之愈深而語愈婉也陪王使君晦日泛江就黄家亭子二首首篇泛江次篇就黄家亭子首篇花鳥二字暗渡亭子次篇結句所以終上歡娛恨白頭之意春逺春逺獨柴荆始出題上言春下言逺又一法何曽劍外清變換妙地入亞夫營亞夫營是反言以託諷言天子尚無如之何我安得歸也暮寒起二句寒意透骨戍鼓猶長擊暮字林鶯遂不歌寒字忽思高宴㑹反寒字朱袖拂雲和又與腹聯相映百舌重重祗報春祗字便含下過時發口詩律之妙如此知音兼衆語百字花宻藏難見已起過時遊子似不經意咀詠轉自深長吳門巴蜀廻環轉接一絲不亂九江春草外頂出杳然厭就成都卜應誰語休為吏部眠只是言不復卜鄰於此蓬莱如可到言更杳然也末見誰語歸夢偷生惟一老言天下生民將盡也雨急青楓暮一連暗入魂招不得黒水葢指梁益言之滕王亭子在玉臺觀内王調露年中任閬州刺史春日鶯啼修竹裏一連使事無迹楊用修云第三用梁孝王事第四用淮南王事獨怪修竹本無鶯啼後見孫綽蘭亭詩鶯語吟修竹乃知老杜用此來遊此地不知還謂滕王當日滕王亭子中二連極言其寂寞鳥雀荒村暮對鼓吹雲霞過客情對霓旌尚思鼓吹入二句以牧閬州結收轉行春反對寂寞玉臺館滕王造二篇猶有王楊氣味渡江宋人止能極其材力摹儗前四句却更不解作後四句渚花兼素錦一連是將到岸時戲問垂綸客二句是已渡後喜雨發端是喜字逺勢巢燕高飛盡一連久旱逢雨云何不喜不須更破明題字此連見飛潛動植皆含喜意也晚來聲不絶二句喜字餘音夜字應朝字按鳥雨作則歸巢久旱又思隂雨而銜泥花雨打則辭樹久旱又頼霑潤而發色真徐庾神妙處也篇中纔字已字不絶字為朝晚夜深淺映帶上五句皆是即目結用聲聞二字反對律細無比送韋郎司直歸成都天下兵戈滿頂竄身江邊嵗月長頂同病别筵花欲暮帶起春字為問南溪竹二句從春日帶出成都時鄭公再鎮公將復歸故有落句復期之往來草堂也將赴成都草堂途中有作先寄嚴鄭公五首第一首直為文翁再剖符文翁事非浪使奴僕旄旌詩書墻壁鄭公世胄名士再領節鎮望之以息兵氛興禮教如文翁之舊蜀民庶得休息不惟窮老故人䝉其庇䕃而已逐逐魚鳥之陣非所望於鄭公也魚知丙穴由來美二句言成都可居舊所深悉然所以復來故非為此正呼起落句也五馬舊曾諳小徑收再字第二首此篇承還揖讓句意處處青江帶白蘋途中故園猶得見殘春自閬州而言成都為故園也猶得與上待字呼應况復荆州賞更新荆州即謂山簡時以征南將軍都督荆襄交廣四州鎮襄陽也第三首此篇承久荒蕪句意書籖藥裏封蛛網室内如此荒蕪可知也野店山橋送馬啼𢃄途中豈藉荒庭春草色二句言雖則已荒思行路之難則藉草一飲已有餘樂矣第四首以下二篇又反覆洗發總為文翁再剖符之意新松恨不髙千尺一連言松三年而不髙竹三年而不斬也生理祗憑黄閤老寄嚴意在此句㸃嚴以黄門侍郎再鎮衰顔欲付紫金丹即下奔走三年所以遽衰也三年奔走空皮骨𢃄起第五首醒出途中有作第五首烏皮几在還思歸應得歸側身天地更懐古一連收歸字天矯不直致於途中二字非常精神不妨遊子芰荷衣是潛夫野服别房太尉墓閬州把劍覓徐君貼墓惟見林花落二句有風颯然却㸃化不覺讀者徒以為凄凉之景而已若用松柏呼風不惟太露太熟房是藁𦵏暫寄亦不合也自閬州領妻子却赴蜀山行三首第一首方云似沈宋不成向南國二句是却赴第三首真供一笑樂二句反結注一笑引賈大夫事得之山館起連便覺山鬼欲出鷄鳴問前館移居倚杖鹽亭縣作遊吳興便知此詩之佳舟前小鵝兒鵝兒黄似酒破小字超引頸嗔船逼一連更不可移掇登樓可憐後主還祠廟徒為武侯立廟也春歸此似復歸成都草堂之作倐忽又春華倐忽注作歸到又字應上頻字下文多梗有涯無不籠罩訛為倐忽了無意味矣逺鷗浮水静一連鷗之任水燕之隨風即落句所謂乗興即為家也贈王二十四侍御契四十韻自閬州再至成都作敗亡非赤壁病句錦里殘丹竈一連叙再至沉痛王室方亂明知不可依而别無安土也伏柱聞周史侍御乗槎有漢臣客成都浪跡同生死同生死言生猶死也偶然存䉀芋䉀當亦蜀物可資生者寄董卿嘉榮十韻筆不停寄李十四員外布十二韻新除司議郎兼萬州别駕雖尚伏枕已聞理裝逺行無自苦領起内熱比何如内熱用莊子沈諸梁事正是炎天濶一連言病後不可復行濶字妙黄牛平駕浪二連言舟行亦湏水落也悶能過小徑一連轉接無痕江清心可瑩廻抱内熱秋㠶發敝廬應盤渦歇通首如話愈讀愈有神歸來起句非作客不知其悲洗杓開新醖一連所以明已之潔雖未得長給終難共爾啄腐吞腥耳慿誰給麴糵憑誰者自見不輕為人衣食也寄卭州崔録事終朝有底忙底字今靖江人猶有此音浩蕩風塵外塵注作烟按浩蕩是江野風烟是荒逺不當作風塵過故斛斯校書莊二首第一首竟無宣室召是没後授官立秋雨院中有作與遣悶呈嚴公篇同意禮寛心有適二句上句反言之言所頼節爽病瘳也主將歸調鼎二句直言欲去則主將亦屬相知者故仍望其功成内擢庶幾稍效長者謀而引身也院中晚晴懐西郭茅舍幕府秋風日夜清院中起淡雲疎雨過高城過高城三字即打着西郭葉心朱實堪時落六句青苔先生朱實時落積雨思歸歴計何日出院乃風清雲淡暮景西銜復拘吏職故懐隠彌切也第四句是倒装見望晴之切下陡接復字極變化復有樓臺銜暮景二句言西日猶為樓臺所銜况髙城隔限即欲從院中一望西郭豈可得乎如此則新晴况味何殊積雨故不勞晚衙鐘鼓為報也二句透出懐西郭言外之巧浣花溪裏花含笑西郭茅舍結肯信吾兼吏隠名言吏隠不得兼行且謀舍院中而歸茅舍矣到村老去參戎幕二句公與武並在兩省比肩事主老而為客屈居幕府其思返故林如痿人之願起非今人謬語恬退也宿府不得於中甚矣故下編遣悶一篇永夜角聲悲自語一連二泉云自聞之自言之自見之自賞之皆無人相和也獨宿之况如此按三四言但聞角聲之可悲不知月色之為好起後四句不如卲説也已忍伶俜十年事二句言非遯操不堅直為無路可歸耳然十年忍窮今來豈肯懐安方决去也遣悶奉呈嚴公二十韻黄卷真如律黄卷似同今日黄冊老妻憂坐痺一連言妻女先覺其悶分曹失異同言在院幕者各自分曹相待之禮亦可稍示異同而今失之也疇昔論詩早二句言以文章則師友以名位偶仗鉞耳寛容存性拙二句即所謂異同露裛思藤架二句㝷别業信然龜觸網二句悶字束縳酬知已悶字會希全物色言亦須使我不失故態也時放倚梧桐兼以􅃫棲自比以遣字收送舍弟頻赴齊州三首第一首繼先祚收兄弟都在腹聨十字中如此乃暫見即去於情理為不可解故曰意都迷也徐關東海西左傳遂自徐關入第二首反覆申前意以留之無如客意常在東北也安在哉三字收起二句渾成第三首代為之解言於我似恝能覓諸姑兩弟復聚亦豈不善但恐徒去耳莫作俱流落代為諱其不去也甚恨其去而終不忍傷弟之情措詞無不深穩三首俱高妙齊州二字首篇發端暗破次篇結句明㸃破用順㸃用反以送起以望其復來收嚴鄭公階下新松弱質豈自負新松移根方爾瞻鄭公疎翠近珠簾階下虛䝉清露霑深穩語何當一百丈二句醒階下更妙句句藏得一諸侯老賔客在内嚴鄭公宅同咏竹緑竹半含籜伏下新字新梢纔出墻宅中竹色侵書帙晚一連晚字凉字妙但令無剪伐二句反應新梢又結到鄭公奉觀嚴鄭公㕔事岷山沲江畫圖十韻沲水流中座四句㕔事直訝杉松冷二句入觀字雪雲虛㸃綴兩連畫上着精神秋成元圃外一連又将岷山沲江一拓開幽襟興激昻以下鄭公學杜者從此等入便有仰窺之路晚秋陪嚴鄭公摩訶池泛舟髙城秋自落未詳意謂秋水落愈覺城之髙也初冬時在嚴公幕府同為遊宴獨有寒色此日多愁南八所謂雖食不下咽也至後青袍白馬有何意在幕府金谷銅駞非故鄉思洛陽正月三日歸溪上有作簡院内諸公野外堂依竹溪上蟻浮仍臘味正月三日白頭趨幕府院内春日江村五首第一首農務村村急江村起乾坤萬里眼一連方云萬里百年本王子安用意在心眼二字分貼江村春日第二首迢逓來三蜀頂上飄泊蹉跎又六年頂上到如今客身逢故舊謂裴冕也下乃指嚴武發興自林泉以下言所處雖窮亦非遽因故人求禄不戚戚貧賤也後半極寫興字亦暗寓蹉跎第三首種竹交加翠二句言所歴非一春也經心石鏡月二句月經心風到面又将自秋而冬自冬回春也暗寓蹉跎之意赤管隨王命以下言林泉之興可得而奪者以屈居幕府猶服王官豈以生理艱難昩所從乎薦者嚴公隨者王命隨字與自字呼應第四首前四句言本依故舊苦遭輕薄仍以林泉為適志耳本勉起以謀王室何有一腐䑕羣兒乃相嚇也存晚計猶云保晚節故隠其詞耳問我數能來寓蹉跎意來字反呼懐去第五首羣盗哀王粲二句言雖存晚計要非終焉之地如王賈已屬不幸猶愈今所處也登樓初有作二句百年心驚萬里眼枯惟在長安今登樓空賦覺前席真榮也異時懐二子異時含蹉跎言二子終顯於朝不淪没處士中也春日復含情以春日收絶句四首第三首言鳥猶飛鳴得所蜀中乆亂何可復戀俟雪消水生便思放船下峽也義門讀書記卷五十四

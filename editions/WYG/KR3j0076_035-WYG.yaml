body:
  text: 義門讀書記卷三十五翰林院侍讀學士何焯撰河東集獻平淮夷雅表一首表與韓相當平淮夷雅二篇柳雅不如韓碑晉陽武第一故在繆襲王粲間惟退之有周漢意也貞符以徳為符其論偉矣然亦本末不該柳子持論徃徃皆據一面如封建則直舍本而齊末者所以不逮韓子乃始陳大電大虹元鳥巨跡白狼白魚流火之烏元鳥巨跡著于雅頌不得而并議之也謂之封禪柳子獨排封禪斷以六藝為考信莽述承效英華作莽述成効是王莽祖述漢家之成効不謂公孫述也註引公孫述非鄉為義廩義倉事柳子書之貞符􅘺炎以澣􅘺與沸同咨爾皇靈二句蘇子美之論尤為平正當叅觀之佩韋賦桑宏和而却武兮按困學紀聞吳子曰承桑氏之君修德廢武以滅其國桑謂承桑氏也一本改桑為乗誤設任柔而自處兮任柔其事未詳或云鱄設諸恐非瓶賦子雲酒箴正言若反也牛賦東坡書此亦以譏切當世用事者不獨喻嶺表也愈膏肓疾賦其詞氣似柳少作未謹潔奥峭耳封建論荀卿子之文也其中節制甚謹嚴李云文章古雅精健過秦之匹封建非聖人意也李云未必便得聖人意如是則興滅國繼絶世皆聖人違心之事也初吾謂韓柳者遷固之群耳今觀其才識相亢若韓氏之學之識則非班馬所及也至子厚者崛起曠代之下力追西漢之文氣稍不如子長之疏宕而堅宻不亞孟堅其學其識疑亦無所讓也逮讀封建論與孟堅諸侯王表等參差誦之固知子厚所學所識不如孟堅逺矣夫論事而但據其一偏則孰不有利害之數可陳有成敗之軌可指如孟堅所云中外殫微本末俱弱權奸不出廟堂而運天下者又何如枝葉相持之為得也至言聖人不廢封建私其力于已私其衛于子孫柳子之言何其悖乎若曰國與天地有與立焉蓋雖欲易之而時未可不猶愈乎是故有里胥而後有縣大夫至勢也李云既知是如此又何以云封建須廢其下既無所承藉其上又如何孤懸也然而降于夷王至其在乎此矣降于夷王以下與後私其衛于子孫矛盾相陷不知柳子何以云也時則有畔將而無畔州畔將即是大諸侯矣不在繼世與否也或者曰封建者必私其土云云以上論封建之逼上以下論封建之病民失在于制不在于政世得云幽厲之不由道而曰失不在政有興必有廢其興也以仁其廢也以不仁柳子于周則曰失在于制于秦則曰失在于政是其語之最無徴者安溪批不在于政旁云此論亦有病雖亂不可變也雖亂上添侯王二字及夫大逆不道大逆句帶上一層魏之承漢也至不聞延祚魏豈可謂之封建晉之八王既逾其制又亂自内起然琅邪猶存渡江之祚延促之效睹矣或者又以為殷周聖王也而不革其制至末上一叚言因之無益革之無損此一叚又言勢不可革聖人亦姑因之今非復聖人所處之勢則革者適得聖人之意也蓋以諸侯歸殷者至湯武之所不得已也李云此等便是流遁無理之譚亦非當日事實也聖賢生于其時亦無以立于天下李云未見三代以後之聖賢用也世得云自天地果無初乎至州縣之設固不可革也為一意以利害言自或者曰封建必私其土至善制兵謹擇守則理平矣為一意以義理言自夏商周封建而延至何繫于諸侯哉又以利害言自殷周聖王也至末又以義理言四維論四維者非管子之言也質之以經則難為言也固宜天爵論明與志而已矣明與志者所以修也明與誠對而志為之基明不可與志並言柳子殆强為髙論以求駕乎前人未之有得者也庸非天爵之有級哉性無等級氣質殊分漢唐先儒讀孟不詳疑性之有二反以修為屬之天爵本末舛矣曰明曰志不如其曰誠曰明也忠信即仁義之無不誠焉耳誠未有不明者柳子蓋不究心乎思孟之傳妄駕其説也守道論清勁時令論上合牛馬三字上加季春舉阿黨月令作察阿黨柳子祖諱察躬故為舉然非二名不偏諱臨文不諱之義也斷刑論下非常之罪不時可以殺至人之經也斯言善矣柳子則徒為詞費也至云古之言天蓋以愚蚩蚩者尤悖戾而不知反焉果以為仁必知經仁下叠一仁字智必知權上補果以為智四字辨侵伐論迂晦六逆論胡亥任趙髙而族李斯乃滅舊不足恃也李斯不可謂之新晉文公問守原議先軫將中軍問原守在僖二十五年至二十八年二月先軫始將中軍時軫并未為下軍佐也以附春秋許世子止趙盾之義所附不類駮復讐議駮陳有餘若折典法之中則必待韓議而後定也李云兩下相殺及以上誅下韓辨别分明柳則質為一條而已合此兩篇義與詞觀之便定韓柳優劣或言柳議過韓者不知文者也蓋聖人之制至又何旌焉李云議論在韓範圍之中猶不若韓之渾涵蓋聖人制法所難明著者今固不得而明著之也春秋公羊傳至則合于禮矣公羊之說蓋謂父以非罪見殺于君者也安得並引以斷兩下相殺哉此柳子少年之作于治經尚疎至復讐不除害五字不加裁剪乃小失耳桐葉封弟辨王以桐葉戲婦寺二句李云設以桐葉戲婦寺則將易賀為諫矣設王曰戲也則亦將曰天子無戲言云爾庸何悖乎辨列子是嵗周安王三年當是四年秦惠王韓列侯趙武侯二年惠王當是惠公然其書亦多增竄非其實二句李云又轉一意言雖非孔子前要是莊周以前人也其楊朱力命至不可信楊朱力命列子篇名此數句發明增竄也李云諸辨皆極簡嚴有法論語辨上篇收處甚宻下篇欲張孔子之道而所見不足以發之辨鬼谷子後出而險盭峭薄後出上叠鬼谷子三字辨晏子春秋墨好儉晏子以儉名于世至為已術者李云精覈非晏子為墨也二句精到辨鶡冠子至長沙始得其書讀之李云便是長沙人為之耳何以知其然耶曰不類厚齋云博選篇用國䇿郭隗之言王鈇篇用齊語管子之言箕子碑此貞元間文詞理淳雅集中亦不多得進死以併命至故不忍微子遯於荒野非若紀季入齊委身而與亡吾國尚考經不詳出大法于改命之後則非與亡吾國廣殷祀于朝鮮之封則非無益殷祀晦是謩範伏下之根推道訓俗承上之緒當其周時未至至其有志于斯乎孔子仁之尤在明夷故收處獨歸重正蒙難一節法授聖者非所期也化及民者其緒餘也按軌範録此三行是其宋亡未遽死之微逸前後則斷斷不事北之節也嗚呼謝氏其仁矣哉是固人事之或然下有者也二字則先生隠忍而為此則字上有然字唐某年作廟汲郡後漢書郡國志陳留郡考城縣下劉昭注陳留志有箕子祠不知何以移之汲郡也冲讓居禮二語似贅設道州文宣王廟碑曾不及浮圖外説二句何必以是相形公又曰夫子稱門弟子至豈夫子志哉宋祁唐書曰觀七十子之賢未有加于十人坐而祀之始于開元非特牽于一時之稱號記曰有其舉之莫敢廢也伯髙之語必有辨其妄者惟公探夫子之志十五句序與銘皆但言伯髙改作新廟之事於此自疏其立言指趣然似不如韓子南海神廟碑之恰好柳州新修文宣王廟碑切柳州卜日之吉於王靈之吉下有䖍告二字終南山祠堂碑修整非我后敬神重穀六句此唐格碑詞用秦碑體太白山祠堂碑其地恒寒三句著太白之所以名碑隂文志此於碑隂視南海神廟碑為尤謹於法饒娥碑龜鱉黿下有一鼉字見怪異形作見怪形異碑詞用韵甚古睢陽廟碑當時睢陽死守李翰既為之傳南八事首尾韓氏又書之矣此碑用南朝文體蓋相避也鬱龎眉之都尉挫􅆐臂之將軍柱厲不知而死難狼瞫見黜而奔師柳子方為僇人假以發其憤慨四六使事復不覺其訐露耳聞義能徙所謂欲以有為公有言雲敢不死也於戲睢陽之事至或未之思歟此叚議論求與人異其于當日事勢實疎蓋力保江淮則租賦無壅可以天下全力摧翦一隅之賊韓公謂天下不亡其誰之力乃為可據柳子則徒計算時日慿虛懸揣耳大鑒禪師碑大鑒始以能勞苦服役能即耐字取其言以為心術其説具在以世教言之則謬舉也即崇信其說亦有為法也何取而牽率附會侈其盛哉不植乎根二句二乎當作胡字碑詞必欲附會而張大之故少味南嶽彌陀和尚碑尊之甚故其名因佛語而見授公以衡山授公上有真公二字上注云惟唐公真公及衡山承逺未詳按承逺即般舟注家可謂昩于文義銘詞末幼曰宏願惟孝㳟宏願于銘中補書亦一體無姓和尚碑逝如浮雲如字作水字爰有大智謂天台爰授樂國謂極樂碑隂記紀之碑隂以塞衆意則文不喧奪亦一法也南嶽雲峰寺和尚碑銘詞如嶽之不崩收南岳銘佳南嶽般舟和尚第二碑凡南方顓念佛三昧者南方下有一入字潘云大藏有般舟三昧經云一心念佛若一日晝夜若七日七夜又云經行不得休息不得坐三月速得是三昧今釋氏有依此教修行者揣食不味揣字合作搏范文穆驂鸞録云此碑子厚自書亦有楷法大明寺律和尚碑起四語名言柳固深通其説者此文尤峻整大律師塔銘若石廪瓚公瓚僧名也號懶殘蘭若真公唐會要元和二年平奏請賜中條山蘭若額為太和寺蓋官賜額者為寺私造者為招提蘭若段太尉逸事狀深謹至晞門下至其與存者幾何其精神正在次第婉轉深穏頓挫處神閒氣定筆墨如生凡史漢文字最綿宻與左氏異者特周漢文質以時變耳今人以疎率貎之所以逺也散還火伍中從軍及作役者十人為火先是太尉在涇州至一昔自恨死又詳在涇州事見太尉不徒以剛勇取勝一時及太尉自涇州以司農徵至末言又有先識見微明非一時意氣所成也柳渾行狀不為細家之迫束細字下有故字家作加柳渾諡議由當時之體而鍜鍊有加陳京行狀五代祖某陳宜都王某作叔明夫忠烈之褒也二句忠烈上有其字下句有也字宗元故集賢吏也應告於嘗吏於公者是狀後於惟深行狀者又五六年故尤知所裁房公徳銘之隂起首何用此詞費楚之為縣者若葉公白公楚之為縣勝計乎人不忘公之道人字上有袁字王公嘗以機宻匡天子於禁中至末特為廣津作也甚卑宜削陽城遺愛碣帝尤嘉異四句城為司業乃下遷嘉異旌優語非實録特以為逐臣立碑不得不有所囘互耳陸文通先生墓表李云子厚亦學春秋有得者故有味乎其言之後之學者至前世多有之不可以通於後世甚矣聖人之難知也不足以文聖人之書與其師友天水啖助啖氏姓符氏臣有啖鐵先生字某陸先生字伯冲得制作之本而獲其師友上句起後下句顧前於是合古今至微指二篇是文之為春秋集注十篇新唐書助卒質與其子異褒録助所為春秋集注總例請匡損益質纂會之號纂例蓋今所傳纂例者即集注之異名也明章大中至不過乎物數語發明聖人之㫖特精神所謂得制作之本者也既成以授世之聰明之士三句是通之道之存也以書四句所以但表其著述而畧乎他為碣以明能副文通之實也楊君墓碣其子姪洎家老上有既葬二字趺螭首上有龜字毗贊元侯于漢之隂式徙荆州凝大歴三年進士興元元年樊澤節度山南東道式用也墾鑿嶢鹵嶢與磽同若某者以姻舊獲愛子厚乃凝兄楊慿之壻惟車馬幣玉三句于時文價已自許如此故御史周君碣則漢祖不曰安得猛士引猛士不類豈縁子諒言牛仙客應圖䜟故耶衡州吕君誄故潔其儀故作胡逋租匿役役作税葬非舊陌衡州已得量移非若凌凖之不得歸葬者乃以貧故難致先墓也故詩中亦有五畝九原一聨時中之奥二句和叔自是一時負才用而未究設施之人時中希聖則已僭矣子厚文精彩處必過于抑揚不能恰好此所學不粹之由耳尚擁良圖擁作壅魏府君墓誌唐格少生氣拜度支員外下有郎字君嘗三娶而卒無主婦三娶而無主婦豈亦如裴評事之未娶嫡妻耶抑以卒為讀也當仍如裴之未娶嫡妻也若嫡妻先卒未有不書夫人某氏後夫人某氏某氏者凡十有餘祀祀作事謂所事者十餘人也由是處約以終其其字下有世字居又同閈以同閈居得銘崔公墓誌乙未作己未元宗南廵當時謂幸蜀曰南廵家有禳􅠹􅠹字諸韵並無疑是梗字周禮女祝掌以時招梗禬禳之事世有顯懿上有白葉流根四字崔君權厝誌以權厝故畧其實誌崔君如是足矣文中亦緻宻無一罅可議讀者未之玩耳志所畧者見於銘裴府君墓碣隨事㸃染耆股肱立部伎役喉喙坐部伎告其叔舅宗元子厚無他兄弟歸於裴者其女兄故稱叔舅銘詞銘中以事大小稍錯綜合叙張公墓誌銘句會敏給句音構周限荆衡二句詩曰于疆于理至於南海則五嶺之外至東遷之後不復通爾鄧君墓誌銘皇建州普城令作連州浦城令則亭擬閱實擬作疑以循官刑循作修内專平淮淮作凖有子四人至哀禮具焉童幼如禮得附書吕侍御㳟墓誌實惟吕氏宗子敬叔為宗子知化光非嫡出馬君墓誌可書者少故撮舉其凡志忘其子之去志作至曾祖某某官下補祖某某官來拜來附附作祔凌君權厝誌為忠孝禮信而事固大謬固作故今而寓乎戊作今之遇乎戍為浙東廉使判官廉字下有訪字遂入為尚書郎作遂入尚書姦吏衰止吏作利銘詞富天禄富疑作副稱也銘不及五言詩李侍御墓誌附屬于寧岐禮大傳君有合族之道族人不得以其戚戚君位也故附屬于寧岐而不敢言天子寧岐謂寧王岐王大理評事裴君墓誌未果娶唐時門第既髙未得官位不娶主婦有先畜婢妾者此文可引為据薛㢲妻崔氏誌亦云恩其故他姬子通兩經通兩經得書蓋非徒口誦之也膳飲不違慰其孝也姜君墓誌不煩濫好遊嗜音綰結前後獨孤君墓碣今王父營陵于其側父作后今記其知君者于墓此即記先友之意推是以錫其類播州請代蓋其生平之誠非一時意氣激昂也當合祭獨孤文母文觀趙君墓誌兩漢金石之文南有貴臣作貴神始矜由明經為舞陽主簿旌來章之孝故追表矜之節以見其有本也韓君墓誌特以弟故得名張先生墓誌生卒及先墓于遺命中叙致不詞費先友也畧短取長繫論于後有關世教不失文體此變例之宜採者也聚經籍圖史二句亦以聚書得書虞鳴鸖誄一作鶴鳴爰宅上陽漢書地理志河東郡大陽吳山在西上有吳城周武王封泰伯後於此是為虞公上陽大陽之誤洽主記室洽當作狎愉乎其和指虞確爾其堅柳自謂故處士裴君墓誌無事可書又不能拒中丞之請故多舉先世傳緒之美然曰以中丞故而不克並無乃為佞非古也不弃于君弃作并覃季子墓銘追銘季子蓋自悼也詞約義微故銘止六言續滎澤尉崔君墓誌喪焉不果行䘮其貨也移信中作移信州中此誌亦一體改葬者亦可用之重為之志者謬先侍御史府君神道表曾伯祖奭祖下有諱字作避暑賦以下叙所著述以成章抑有當我哉暗渡石表隂先友記例創於柳子水經注云郢城中有趙臺卿冡岐生平自所營也冡圖賔主之容用存情好敘其宿尚柳本諸此鄭利用二鄭以互文見意魯直為尚書郎黄庭堅字出此路泌只四三語何其凄婉柳登其父芳下補善文史三字吕牧下補東平人三字蘇弁武功人好聚書好聚書亦得書本史遷賈嘉與余通書之例也柳公墓表用當時體而稍節其靡弱二月庚寅上增十字符君墓版文貞元十二年嵗在景子唐諱丙字以景字代輟哭紀事哀不能文古人于期䘮亦不為有韵之文此其據也先太夫人河東縣太君歸祔誌嘗逮事伯舅至無遺者述為女與為婦徵以舅與先人之言示信也是嵗之初至禮無違者敘此事于中斷續變化左氏法也不悼徃事亦自白其非以其不慎貽親患也喪主子婦七嵗婦字上有宗字李夫人墓誌銘精宻我先府君每得仕至然後議焉李夫人之殁不于柳氏而在諸壻之所故表其先人迎養擇壻之勞及道路遇疾乃從所便非不䘏族而致然固文章得體要之苟非實録則姻黨唾而嗤之矣故欲為古之文必先由古之道也諸姑合以為斯志合作令令字下補宗元二字陳君夫人權厝誌無子即于遺言中敘明崔氏夫人墓誌蓋石文補志文所未偹又一例用敢附碑隂之義蓋石附碑隂之義告教罕至告教作教告父之家書稱教告以志終天之哀姊亦得稱終天之哀裴君夫人墓誌以配于裴氏配作女睦姻任恤之行甚偹任雖非婦人之事然統之以聽順則雞鳴詩人之意也始夫人之疾也至相及也及此者以見前之所書皆信非可强而致也余不知天之忍也余字下增一字先夫人八月而殞殞作殯亡妻宏農楊氏誌􅇶惕之義義作儀王君先太夫人河間劉氏誌文兵曹未及贈官夫人亦未受封而子爵已顯遂冠於誌文之首乃變例其實失禮也夫人無事可書乃生頌其子佞也祔於兵曹君之墓作兵曹府君有惑不疑有惑作有戒韋夫人墳記已遷祔而未合葬但書其故及日月與有志而遷葬者同例設漁者對智伯不喻其所以作似非為藩鎮也若魚幾何魚作漁中今漁於海今字衍魚之大者上有嚮之從三字嚮之以為食者以字衍若欒氏郤氏羊舌氏欒氏下增祁氏四氏故相間而錯舉之臣韓魏懼其將及也臣字下有見字愚溪對中間頗指斥舉錯倒謬則後之所謂已之愚者無非所遭之不幸非其罪也然稍乖敦厚篇中所引惡溪比養小人弱水比抑君子濁涇不法知人黒水賦質昬昧予聞閩有水唐書地理志處州麗水縣東十里有惡溪多水怪大字本注孫曰惡溪在潮州界誤也處州乃漢甌閩地弱惡六極也不美濁黑賤名也不清且汝不見貪泉乎舉一因人以累其名者為敷佐夫明王之時暗取王之不明豈足福哉之意汝欲為智乎至使一經于汝無須臾忘報復宜人之畏而擯也詞旨亦激迫少味吾盪而趨至卒不自克此見險不能止又深一層對賀者筆語自妙姑以戚戚下增為無益乎道故若是而已耳吾之罪大會主上方以寛理人用和天下故吾得在此凡吾之貶斥幸矣而又戚戚嘻笑之怒四句太盡反少味天對定逺云柳州作天對其文亦幾于三閭也題曰天對似是未安天尊不可問故不曰問天柳子之文自擬于天斯罔矣宜曰對天問也馮翼惟象二句下補明明闇闇惟時何為輻旋南畫二句柳子亦主蓋天之説惡有谷汜次汜為韵度引久窮久作無曜靈安在在作藏盗堙息壤八句屈子本意大都以禹之幹蠱少康之中興望頃襄王余聞之師云汙塗而蕖夫蕖夫疑作夫渠宜儀形九疇形作刑問地方九州州作則爰處爰都處一作穴增城之髙髙一作里日安所到所作不而僭謂不死僭作潛休居以康食姑不失大字本注重校康作倉絶句無食字作休居以康倉姑不失幽陽潛㸑作陽潛而㸑登立為帝二句當在二女何親之下師以首之書所謂師錫也問干協時舞二句註言少康非朱云舜懐有苖而丕號以之之作瑞寒民於烹所謂救民於水火之中也中譖不列不列不自明也萃回偶昌萃回下大字本有禍字胡若之狠狠作很晉問太行掎之山首陽起之西黄河迤之河大陸靡之東景霍汾澮景霍小山汾澮支河為為鍭為下蓋脱一字馬之所生是不一姓註引左傳按傳作無興國焉是不一姓屬九州之險吳子曰魏綘之言曰魏絳當為韓厥此本水經注澮水下誤以為魏獻子也文公之伯也援秦破楚援秦未詳疑作挾秦㝠有庭實㝠作宴今主上方致太平動以堯為准唐起晉陽因始封之國為有天下之號高祖内禪神堯是崇以作歸宿似更宻枚馬同時無所與讓曹張於是失歩矣答問客曰何取取作敢而僕乃緘鉗黙塞黙塞作塞黙而鹽逐於鄉里鹽字上有無字達㫖釋誨之間起廢答色元不厖厖作黄無異枝枝作伎天説發端處李云二子皆有激乎其言之而拾莊生之餘者也雖然亦見其止于此若以草木喻之人則果窳也以果窳喻之人則其中之子實也烏得以蟲螢喻蟲生之上有亦字今夫人舉不能知天至以吾言為何如隠然見天視自我民視天聽自我民聽時主已日在危亡之中大可憂懼也柳子曰以下韓子之説蓋嘆夫回天跖夀之不讐也柳子則曰夫天亦何所為哉吾則自盡其為我而已然韓之説正言若反為殘斯人者非吾所得指斥故迂謬其説猶有半焉引而不發耳柳子則直以天為無心矣則古聖人曰天位曰天禄曰天職者豈其誣歟天既無心人之仁義又何能自信歟言之似正而實昧其本于韓之廋詞亦有所不察也附劉禹錫天論上今以一已之窮通至惑矣韓之説非為一已言也懼唐祚之將替而故謬其説也天論中求䕃乎華欀欀作榱問曰天果以有形問字下有者字天論下植類曰生按尚書傳云海隅蒼生謂草木也鶻説今夫梟鵂至喣喣者耶此又所謂柔惡也捕蛇者説永之人爭奔走焉此句伏下悍吏之來吾鄉至又安敢毒耶雖無竒特亦自雋快此篇削去其三之一何如䄍説蓋于人也以其誕漫􅐞恍至其㫖大矣柳子疾當時有司無狀不舉其罰故假此致嘆幽明理一也其有報者必亦有責先王于山川鬼神鳥獸魚鱉無不治也豈名立于此教存乎彼哉非神之為耶耶當作也北方讀此二字音相近則十年九潦八年七旱者獨何如人哉人未嘗以此病聖人而聖人必引以自儆自責仍不可委之誕漫若氣數方否而人事不修無以返而之泰則極不威福不嚮帝黜其命矣乘桴説文無取而明復之難耳復下有者字吾何敢以廣異聞以上有吾字揵焉而已矣揵拒也説車贈楊誨之詞勝理以為車說則偹矣視叱齊侯類蓄狗李云柳文不雅馴若此此言藺相如猶不可也方之中矣之作其謫龍說吾復且害若衆恐而退暗用夏侯泰初事復且害若淺丈夫之言也羆說總領三句甚健觀八駿圖說絺而凊凊作清慕聖人者不求之人作不求之於人宋清傳為此說以冀人之拯已陋矣然而居朝廷居官府至末益陋此賈䜿女子詬其曹耳柳子其未逺於鄙悖哉漢武所嘆於汲生之無學也種樹郭槖駞傳此文王荆公對症之藥也李云文不甚髙而論有可存者童區寄傳不足則取他室取字上有盗字童寄者彬州蕘牧兒也留其氏於後留為小吏吏作史是兒少秦武陽二嵗與發端暗配而討殺二豪討作計通體敘致分明梓人傳凡執用之工不在列工作功為鄉師里胥至以就役焉世得云周官鄉師職尊不應與里胥對舉郡守以下又以秦漢官制混之而意義復與上文不殊為多而已又其下皆有嗇夫版尹版尹果里魁之職否猶梓人畵宫於堵而績於成也績作潰悠爾而去悠作攸李云上半截論梓人處悉無漏義矣便以末意作收塲而曰梓之道類乎相豈非引而不發意味深長文之極佳者也中間詳釋翻成贅剩蝜蝂傳頗峭潔而無甚髙之論乞巧文為送窮所壓識殊詞亦不能追也挿竹􅂷綏綏與緌同乃纓弁絍弁下有束字泯焉直透透作遂罵尸蟲文侵人肌膚四字與恙心穴胃不切從英華本作食人肥膏憎王孫文然後食衎衎焉無食字衎衎卽飲食也好踐稼下有蔬字輒齕齩捉注捉作投逐畢方文夜不燭夜作暝汝雖赤其文上有大陰施威兮元㝠行事九字急急如律令潘云李濟翁資暇録云令讀作為零律令雷邊捷鬼善走與雷相疾速故云如此鬼之疾速也辨伏神文休嘉訢合兮訢虛其切烝也禮記云天地訢合注云讀曰熹一音欣招海賈文閎壯子厚之先晉人上黨易野安以舒其托海賈以招魂歟蜿首狶鬛虎豹皮蜿作蛇弔萇宏文以萇叔自比敬余忠甫作敬弔忠甫弔屈原文冀陳詞而有光光作明犴獄之不知避兮犴作岸娛娛笑舞娛娛作俁俁滔大故而不貳滔作蹈伊尹五就桀贊趙云伊尹為湯見貢于桀不用而歸湯湯復貢之如是者五思濟民冀得施行其道也必合此論于君臣之義乃為無敝漢注之最精者抑子但欲贊尹之大然君臣之分旣定亦安得若此憧憧者哉按此篇疑他人文不簡健或欲示當時庸人自解與伾文相結之失耶梁邱據贊梁邱之不毁是亦景公之明也晏子春秋備之愛其不飽愛作憂霹靂琴贊引妙在不濫龍馬圖贊百樂陳兮作百禮慕水濵兮慕作渭師友箴吾何以成成作承懼吾不似作懼不吾以敵戒而不知為益之尤尤作由臨江之麋稍使與之戲使下有麋字麋至死不悟作麋至死終不寤永某氏之鼠犬禁僮勿擊鼠犬作又悉以恣鼠不問恣作資義門讀書記卷三十五

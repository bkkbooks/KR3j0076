body:
  text: 義門讀書記卷五翰林院侍讀學士何焯撰孟子上梁恵王篇孟子見梁恵王章首節史記襄王元年與諸侯㑹徐州相王也追尊父恵王為王是其生也未嘗僭稱第四節曰利則不本於理而動於欲一動於欲則凡有血氣必争上下不安民志不定圜視而起矣安溪先生書汪青湖萬取千焉二句題文云畿方千里出車萬乗是也曰采地百里出車千乗采地十里出車百乗則謬矣采地十里只一成耳一成之地除去溝洫道路只六十四井為一甸之數出兵車一乗安得有百乗采地百里只當出兵車百乗所謂千乗之國者盖方三百餘里在周禮侯伯之封是也春秋時僭制踰限故列國多千乗大夫多百乗前輩多不理會鄭康成筭四井為邑四邑為邱四邱為甸魯作邱甲亦不過甸出四乗耳百乗之家一同之地天子三公王子母弟之采邑百乗千乗漢書刑法志甚分明第五節朱子於注中既下仁義未嘗不利句而又恐人誤以仁義為求利之資故或問中又云仁義天理之自然也居仁由義循天理而不敢不然者也然仁義得於此則君臣父子之間以至于天下之事自無一物不得其所者而初非有求利之心也一有求利之心則利不可得而其害至矣然愚意孟子雖非教恵王以仁義求利而下二節自當更移下一層㸔葢王何必曰利節乃正答以義理之本然下二節又推極事勢而論之使之必無他岐之惑故末節復繳轉云云亦猶大學孟獻子曰二節上節就義理以明王者用心之公下節復舉利害以明王者擇術之審也寡人之於國也章首節周禮廪人若食不能人二鬴則令邦移民就穀詔王殺邦用大司徒大荒大札則令邦國移民通財注移民避災就賤其有守不可移者則輸之榖第四節謹庠序之教二句庠序皆鄉學教之樹畜以養其老便是孝弟根本庠序之教又所以申之也申字合如此解則并下不負戴句皆一串矣葢此章雖與齊宣是心足王章皆令舉王政而此章對上移民移粟自謂盡心言之尤重在養一邊七十者衣帛食肉二句不是總束乃王道之成效注二畆半在田按即割公田二十畆八家分之未五十者不得衣也未七十者不得食也按此即品節末節注則必能自反二句按自反即本文我字也益修其政由荒政而王政晉國天下莫强焉章首節楊无咎云死者即長子也五節不忍其䧟溺故徃而正彼之罪非修怨也齊桓晉文之事章重保民而王句推不忍之心以行不忍之政所以保民也故推恩足以保四海正是照應保字先説得推不忍之心一半自反其本以下又破齊王不能推之由然後告以行不忍之政一半章末然而不王者二句直繳保民而王首二節齊王以桓文之事為問其意中即是下文所謂大欲也特以難於發問姑托之於取威定覇耳其事必出於興兵搆怨與保民正相反故孟子一句截斷徐發其不忍而導之不得泛作貴王賤覇門面語㸔注中羞稱詐力意不可泥項羽自立為西楚覇王戰國時主所謂覇功大率類此桓文不過借他名目第五節有是事則必有是心心之發最為肫切可以保民則足以致王矣然百姓但習見王之行事而不察王之用心皆以王之以羊易牛為愛也臣固知王不忍其觳觫之言由衷而發非若百姓之言也是心足王句壇長云題是𦂳接有之直承王曰何由知吾可第八節周禮夏官羊人凡釁積共其羊牲而地官牛人無釁積之事是釁鐘本不當用牛以羊易之適得其當既得全吾不忍之心而亦不至暴殄天物乃應事之曲當者也故謂之仁術第十二節善推其所為而已矣鶴灘文云明於此而暗於彼則為之而不能推忽其易而先其難則推之而不善第十七節齊集有其一趙注集㑹齊地可方千里譬一州耳今欲以一州服八州猶鄒欲敵楚也第十九節輔吾志須從夫子言之於我心有戚戚焉來第二十節注士嘗學問知義理按此只照下奚暇治禮義哉淺淺説第二十一節明字對上惛字能知其輕重長短而善推者也末節老者衣帛食肉二句是老吾老㓜吾㓜四句究竟莊暴見孟子曰章第三節甚則今樂猶古樂矣第四節此節不過引起同字推好樂之心以行仁政方是甚處只是甚字的影子甚之實則行仁政也注亦人之常情也按雖人之常情然齊王意中所謂人與衆者亦諧臣媚子耳孟子則借以引之於與百姓同也第六節𦂳要在行仁政上但題面所無不可辭費耳百姓至于父子離兄弟妻子散雖鐘鼓管籥日聞于耳徒使其疾首相告可謂之與人樂與衆樂乎管籥之音詩云籥舞笙歌正義云籥雖吹噐舞時與羽並執故得舞名又公羊傳云其言萬入去籥者何去其有聲者廢其無聲者吾家邵公注籥所以節舞廢置也置不去也此解尤明故凡言羽籥言籥舞皆舞則吹籥以為節非無音而但執之也第七節庶㡬無疾病言幸不至為萬民憂勞成疾方與同樂相應總注二説皆未竟其㫖或問中折􅇆精盡楊氏説流而為王學文王之囿章首節周都岐山之下大約七十里之内皆岡嶺林麓為多故四時之田在其中因而名之曰囿非規其地以養禽獸恣游觀也若靈囿則在辟雍之傍不過一射圃耳與齊之囿固名同而實異矣交隣國有道乎章首節注仁人之心至尤不敢廢按數語字字精細明義理識時勢合兩層方是智齊宣王見孟子於雪宫章第二節民自有當得者若雪宫之樂不得遽至非上非也第五節注而又廵行郊野按近郊君所自行野外都鄙則司稼為之人皆謂我毁明堂章首節明堂只是壇當據覲禮公玉帶以下紛紜之説皆非是第三節文王發政施仁五句要㸔發字是政教號令對上王者所居以出號令之所説引詩又收歸心上實實以不忍人之心行此不忍人之政也如此方界限分明不複不贅注世祿者先王之世按先王是文王以上先世第四節思戢用光聿來胥宇此兩句是王業弓矢干戈是行者之衛非好貨之主能人人有備乎行者有裹糧是平時出行末節無怨曠只是室家相保之意王之臣章末節四境之内不治趙注孟子以此動王心令戒懼王顧左右而言他趙注王慙而左右顧視道他事無以答此言也為巨室章賢才大而反小之國家重而反輕之慢賢則徒以病國此相因之理也第二節趙注至於治國家而令從我是為教玉人治玉也教人治玉不得其道則玉不得美好教人治國不以其道則何能治乎注鎰二十兩也王滹南辨疑云國語以二十四兩為鎰脱一四字然此句本用趙注齊人伐燕勝之章第三節當時畿内之民尤親被紂之毒虐文王取之固順民心事然六七王徳澤入人者深茍非人人棄絶則亦事過追思難免其不悦也故堅守臣節至於匡救無所施乃聽其惡稔而自斃耳末節以迎王師破上人力不至於此齊人伐燕取之章第二節自葛始葛嬴姓之國若大旱之望雲霓也趙氏注云雨則虹見故大旱而思見之葢至于有霓則人被雨澤旱已解矣望字總貫雲霓兼将雨及既雨言之也最為得之辨疑中引朝隮于西崇朝其雨云虹亦雨徵尚解得不分明如蒙引謂若望雲者仰其來也若望霓者又恐其不來也願其雨又恐其不雨故只管望㸔是雲是霓則於經文多添曲折仍有難通矣後來其蘇辨疑云注中蘇字既曰復生又曰蘇息兩義雜出從後為長第三節子噲子之不聞别有虐政然名不正必致民無所措其手足虐孰有甚於此者乎民生有欲無主乃亂下文置君而去亦惟為整頓此事便足救民水火耳第四節老者因兵入而播遷則招而反之小者為吾所俘畧則送而反之非特不貪其土而并安輯其民非特不毁其廟貎而并勿移其噐鄒與魯鬨章首節穀梁子曰韓之戰晉侯失民矣以其民未敗而君獲也義與此章類魯平公将出章末節君為來見也為字與是以字對即所謂使之尼之也公孫丑篇夫子當路於齊章第八節注祖乙疑祖甲之譌但祖甲又在武丁後耳疏有祖乙趙注無凡七世元板七作九第十二節管仲功烈之卑政以無文王之徳耳徳字不可説得狹小了孟子必要從心性做出事業故非堯舜之道不陳然姑舎女所學而從我則寧卷懐而去但值此時勢則事半功倍不若文王之難也末節故事半古之人故字下須補有古人之徳一層夫子加齊之卿相章首節注亦有所恐懼疑惑按疑對知言懼對養氣第七節私箋云大勇只末二句見之按當總說下文行有不慊於心則餒矣以至行一不義殺一不辜得天下不為皆根於此此説聞之衛先生第八節下文説無暴其氣若因守氣句将氣字貶壊便節節俱礙守溪文云理主乎氣氣輔乎理二者相須而曽子尤得其要便節節俱貫通照應第九節故曰持其志儒門持志為敬以直内之功注中所謂敬守也告子强制其心亦有似乎持志者故孟子因而為之剖析注中先補力制其心四字正為持志句生根萬厯中求其説而不得遂以持志屬知言一邊謬矣第十二節此難字正與是不難相對注中心所獨得不是空話浩氣生於集義集義本於知義心者氣之宰理又心之宰也工夫來脈至逺所以難言直與上不得于言勿求於心心字反照第十三節直養只是事皆合義故自反常直然先奪下文集義則急遽無序經文反前後冗複矣故本注且但從上文説來無害據後注氣得其養而無所害矣似與下而又害之害字相應又本注云無所作為以害之後注云不可作為以助其長助之長者正之不得而妄有作為者也字面皆同時解遂攙説助長細尋經文脈絡助之長者乃指告子不能集義養氣而速求不動心之效故强制其心使人之神明具衆理應萬事者如死灰之枯槁則無以立天下之大本其害有甚於舎之不芸心不慊而日餒失其本體之充者所害在心若此處無害不過行之不能皆直害吾浩然之本體兩害字及作為字相似而各有所指注則欿然而餒知其小也知其二字元板作却甚四書通中亦作却甚語類中引此作却甚不知何時始譌然元板亦有作知其者第十四節配道義正塞乎天地之實落處第十五節或問孟子深闢義外而曰集義又似有取乎彼而集之於此者何曰義者心之所以制事而合宜之謂也事物之來無不以義裁之而必合其宜焉是則所謂集義者也豈曰取於彼而集於此哉先生云此辨一正一反即是集義二句釋文義者本性之固有而具於心為氣之主宰者也不能集義則不能滿所性本然之量而心且流於虛無枯槁又安能生出浩然之氣來天地生人是氣然必有理在内為主宰此理即義之根源告子不得於言勿求於心不得於心勿求於氣其病根皆因外義惟以義理為外而非内則理有不逹遂不反求諸心既無由集義以生此浩然之氣即下文所謂不芸苖也及其氣有不充此心将不免於疑懼乃又强制以必其不動則下文所謂揠苖助長反害其心淪於枯槁寂滅之域者也非義襲而取句朱子初不指告子説注中總上云告子不知此理然後轉云乃曰仁内義外文義甚明大全誤取胡饒二氏語雲峯以義襲而取即是有所作為以害之雙峯以正而助長是義襲而取則告子自云勿求於心矣豈復求一二之偶合於義自云勿求於氣豈復求襲取此氣於外乃舎不能集義强制其心之正條實犯而旁摭義襲而取以攻之試思揠苖之取象與襲取此氣者似焉否耶注自反常直按此應上直養第十六節以為無益而舍之者舎之者即助之長者惟其見得那邊有益所以不耘耳不可作兩種人説故上文以不助長者寡矣句貫下非徒無益而又害之此害之是害其心非害氣也與無害之害不同注正預期也按古注正解作望字故曰預期第十七節生心害政等語正對前當大任説第十九節上蔡語錄或以知言養氣為一道事先生曰知言是智養氣是仁浩然之氣須於心得其正時識取按此説可以為上下闗通證佐第二十節敢問所安安對上惡字口氣不可但捻居字以力假仁者覇章以徳行仁朱子云所謂徳者非止謂有救民於水火之誠心這徳字又説得濶是自己身上事都做得是無一不備了所以行出去便是仁按以徳為誠乃周益公説也引書恭儉惟徳無載爾偽為證亦儘自好得此説乃知伊洛議論非尋常悟入者可及仁則榮章第二節貴徳尊士則知修身立政之本變化氣質可以大有為下文在位在職則賢能樂為之用而又各當其任也閒暇亦是賢能為他支撑一番外侮稍息粗得寧静非僥倖撞著好機會便及時大振頓一番如政便兼養民教民交隣固圉無所不包刑則小者刀鋸大者甲兵皆得其當自然大邦畏小邦懐可以為政於天下矣後半説到配命可知第一句全是修身尊賢事尊賢使能章此與發政施仁下次第不同者葢以行於國之規模逺近為序前朝後市則國中也以次而郊闗則為路以次而都鄙則為野非農之緩于商旅也第五節乃閒民故别而最後言之又見無一人之不得其所也首節俊傑在位衛云此在位謂未仕者舉而立之於位第五節獨言天下之民葢閒民也若作新附之民㸔更稳當以許行願受一㕓而為氓之語叅觀適與願為之氓句呼應㕓字不必定指市宅説文所謂一畆半一家之居也布錢也閭師職曰凡無職者出夫布是有里布有夫布守載師之單證則不能與題句肖矣人皆有不忍人之心章章首只説不忍之心者程子所謂四徳猶五常之仁偏言則一事專言則包四者也然第四節注中固云因惻隐而悉數之言無此則不得謂之人故以四端四體對舉為言首節注各得夫天地生物之心以為心按此句便是性情之根第二節下三句見不忍人之心不可忽注故不能察識是知推之政事是擴全體此心是充第六節須将先王跌出人字入自謂不能方有根張子曰害仁曰賊末節知皆擴而充之矣語類伊川常説如今人説力行是淺近事惟知為上知最為要𦂳又云不能擴充者正為不知都只是冷過了按此知字極重注中尚説得輕然如淳所錄一條云南軒把知做重文勢未有此意知字只帶擴充説此句與茍能充之句相應上句是方知去充下句是真能恁地充按注中正如此解當斟酌叅㸔矢人豈不仁於函人哉章末節正已似對擇字説子路人告之以有過則喜章第一節須著眼人字方得總注初無彼此之間意思注其勇於自修如此按補出遷善一層方與下二節闗通第三節注而舎己從人按元板己作以第四節羣輔錄舜有七友並為厯山雷澤之遊本戰國䇿顔歜語伯夷章末節只是不肯至誠惻怛便是不恭注中弊字直斷其如此非指其流天時不如地利章第三節私箋云古者甲以革為之故函人為攻皮之工後世始用金曰鎧按古人亦以革為兵左傳吳用木也我用革也孟子将朝王章首節注孟子本将朝王按玩一本字方不是輕世肆志第四節陳堯舜之道實以大有為望之即輔世長民之術也第五節注在官不俟屨按宋元板官俱作宫然此語本出玉􅇨鄭注云官謂朝廷治事處則作官為是末節且猶句只可翻云管仲似乎可召不得云桓公似可召仲方與故将以下口氣不背注處賔師之位按閻若璩曰范氏云處賔師之位非也孟子為卿於齊孟子致為臣而歸烏有所謂賔師之位哉古有可召之臣有不可召之臣孟子葢就以不可召之臣自處非真師也若果師則吾聞天子不召師而况諸侯乎齊王自不敢來召又不待其召而後不徃也齊王於其将歸乃就見之其不足與有為可知孟子所以終去也此闗聖賢出處大者不可以不辨非當仕有官職按此句總論大㫖若不為管仲自指生平所學言之兼此兩層説方完孟子之平陸章末節語錄王之為都又恐是周禮都鄙之都周禮四縣為都孟子謂蚳鼃曰章首節注得以諫刑罰之不中者按此兼官守第五節進退只作去留解承上無官守言責也閻若璩云田敬仲世家云宣王喜文學游説之士自如騶衍淳于髠之徒七十六人皆賜列第為上大夫不治而議論故孟子時為客卿而曰無官守言責孟子為卿於齊章第二節注王驩葢攝卿以行按書葢大夫故知是攝不惡而嚴如此按不惡謂其始不以輔行非人而辭出弔之命在途雖不假以詞色亦未始凌傲之也孟子自齊葬於魯章首節木通謂棺槨言之第二節非直句破以美以下又明慎終之誠愛第三節注不得謂法制所不當得按法制所不當得非逹第四節注快然無所恨對盡字説沈同以其私問曰章首節天下可禪國不可禪三代以上之天子皆推有徳者迭為之及以天下與人子孫退守百里以承祖宗之祀未有并棄其國者也子噲則自斬召公之血食矣故孟子尤惡之第二節燕人干天之命齊人干天之討厥罪惟鈞故曰以燕伐燕趙注今齊國之政猶燕政也不能相踰又非天吏也我何為勸齊伐燕國乎孟子致為臣而歸章第五節欲富正對道不行説不行其道而虛拘以祿是貨之也第六節又使其子弟為卿子弟與前弟子對説使者營求之方非使令之謂以上使已例之自見末節字書買賣二字皆从网賤則買貴則賣皆罔之謂也孟子去齊宿於晝章第二節坐危坐也第三節曰坐並坐也與前不同孟子去齊尹士語人曰章第四節姑舎女所學而從我此孟子望王改之者也孟子去齊充虞路問曰章第三節此節述徃事思來者不得但為伊吕鋪張滕文公篇滕文公為世子章第二節言必稱堯舜即人皆可以為堯舜之意不可説得廓落末節此節推説到善國亦不外此以足上不當復求他説之意滕定公薨章第三節東萊解大傳公子有宗道云假如國君有兄弟四人三庶而一嫡嫡者君之同母弟公子既不敢宗君君則命同母弟為之宗使庻兄弟宗焉滕謂魯為宗國亦如此末節周禮疏倚廬謂於路門之外東壁倚木為廬滕文公問為國章第六節徹者徹也二句就上文次序言之當先解助後解徹此倒言之者正為徹中已具助法規模但計畆均分不如助之只藉其力為尤善耳須通下節㸔計畆均分便有公田不足取盈於私田流弊故孟子不直取徹法而曰請野九一而助注此以下乃言制民常產二句按制民句承上恒產節取之之制承上恭儉節周時一夫授田百畆按一夫二字是眼目方見均平之制其實皆什一也至是亦不過什一也按辨疑云三代田制已無明文可考但當合經文什一之數而已南軒云夏商周皆以什一葢五十畆者以五畆為貢七十畆者以七畆為助百畆者以十畆為徹此説本分明据詩中田有廬上入執宫功孟子自言五畆之宅推之以二十畆為廬舎八家各得二畆半以十四畆為廬舎八家各得一畆七分半第七節又稱貸而益之稱周禮疏云謂舉責生子彼此俱為稱意第十五節語類鄉遂用貢法然司稼廵野觀稼以年之上中下出歛法則亦未嘗拘也第十六節禮記王制夫圭田無征鄭注既引孟子又云此則周禮之士田以任近郊之地葢引周禮載師之文也士讀為仕既近郊之地故禮記孔疏云畿内無公田故有圭田後來孟子疏及陳用之禮書皆仍之此鶴灘文有或予之鄉遂之田一説也然載師之士田乃謂士大夫之子所耕有問朱子以圭田必有耕之者豈亦有耕屬可耕乎朱子答以恐只是給公田之在民者大抵古者田祿皆是助法之公田充而八家因為之屬此説不泥舊聞而於古人立制之意尤為近之此鶴灘文有或予之都鄙之田一説也第十七節餘夫二十五畆對世祿㸔亦以澤及野人之子弟也第十九節方里而井三句九一之形體以下又從分田中繳足制祿八家二句明九一之為助法申結前分田制祿可坐而定公事畢三句又推九一而助所以立制申結前無君子莫治野人無野人莫養君子八家句中須補出以公田二十畆為廬舎家得二畆半同養公田趙注養其苖稼注此詳言井田形體之制也按金仁山曰以方田法計之方十里者為方一里者百則是百井九百夫矣方五十里者為方十里者二十五則是二千五百井二萬一千五百夫矣有為神農之言者許行章第四節許子衣褐見無庸於織以逃孟子之駁奚冠句因遁而之褐故問奚冠第七節草木禽獸妨害五穀故五穀不登則人類益稀而禽獸偪人决汝漢排淮泗而注之江世得云江之受水與海同量但懐襄之日水地無分孟子葢謂决排以後南水入江而江以北之地可耕如北水歸海而河兩岸之患悉平故綜其大勢言之初未嘗屑屑然計汝漢淮泗之盡入於江也按朱子但疑記者之誤耳非謂後人於經文便不當復致思也前説最精施功之多者四水而字以下畧讀斷謂其他小水大抵皆注之江則於解經極包括而水道自渾然無滯礙矣又書言禹平水土治水皆所以治地也如此解則下文然後二字亦可直接然後中國可得而食也由是水土既平而稼穡有地然後中國可得而食可得只有可粒食之期葢尚有待於后稷之教也第八節后稷教民稼穡三句當從教字確實指陳降播種殖嘉穀規模育字當對鮮食艱食見非聖人能厚民生無以致此若就氣化上論便似複講然後可得而食矣人之有道也四句人備五倫即完五性此則貴于物者也茍不能復性以盡倫則違禽獸不逺矣父子有親五句仁智若循環有夫婦然後有父子文理宻察足以有别也既曰有别則為所性之智明矣北溪字義曰夫婦有别便是禮長㓜有序便是智然程子謂禮只是一箇序既曰有序亦當為所性之禮也故瓊山程以智字貼有别説較舊説推勘愈諦勞之來之匡之直之輔之翼之勞來是資禀之近乎中者匡直是資禀之過乎中者輔翼是資禀之不及乎中者三者皆使之自得其性而已聖人之憂民如此當雙承堯獨憂之聖人有憂之兩層總束近日講章謂獨承教民者讀大全陳定宇之説而未詳也注言水土平然後得以教稼穡四句按兩然後即而暇耕乎暇字不使其放逸怠惰而或失之按放逸怠惰從上逸居來第九節舜有五人而天下治錯引臯陶以終得人之盛也第十節以天下與人句最難安放守溪文云以天下與人此堯舜之所易也為天下得人此堯舜之所難也何等直截第十一節堯之大哉以其無名也舜之君哉以其不與也二聖之不營心細務如此曰無名曰不與若無所用心者然此是斷章不容摭實十三節子貢反築室於場趙注場冢上祭祀壇場也秋陽以暴之趙注秋陽周之秋夏之五六月盛陽也注道徳明著二句道徳明著對言行光輝潔白對氣象十七節同價者其道無偽則從其道之效也陳代曰章第三節以利言也利字專頂直字周霄問曰章第三節諸侯耕助四句祭義中語惟士無田二句王制中語無田謂無圭田宋小國也章第三節富天下正與宋事對第五節紹我周王見休私箋云昔事紂而今繼事乎武王也孟子謂戴不勝曰章第二節長㓜謂同姓之人卑尊謂異姓之人猶言父兄百官不見諸侯何義章第三節玉藻云酒食之賜弗再拜若受於其家則不當復徃拜矣趙注豚非大牲故用熟饋第四節脅肩謟笑未同而言皆初見時事曾子子路皆剛毅無所屈撓之人稍有失色失容已深戒而亟逺之須對下文所養句㸔趙注夏畦於仲夏之月治畦灌園之人也按治畦是先築土為行水之道灌園則桔槔俯仰引水注之北方夏月惟此為勞非若田作其旱澇猶任之天也莊子天地篇叙漢隂丈人方為圃畦鑿隧而入井抱甕而出灌子貢告以鑿木為機後重前輕挈水若抽其名為槔日浸百畦即其事也鑿隧是先治行水之道疏云治畦曰灌園乃南宋邵武人不至北方故誤作一層解外人皆稱夫子好辯章首節注氣化盛衰二句按氣化盛天心復也人事得人心正也須有個根在第二節下巢避龍蛇上窟避鳥獸第三節掘地而注之海是大水治所謂予决九川距四海也水由地中行是小水皆治所謂濬畎澮距川也蛇龍恃水為患故先驅之鳥獸因水患而偪人故水治而其害漸消各有次第第四節私箋謂自禹而後治亂不一桀之亂湯之治亦不及而直言及紂之身者葢舉亂之尤大而撥亂之功甚勞者言之公羊傳注云草棘曰沛漸洳曰澤第五節咸以正無缺無一事不出於中正無一事不出於周宻第八節政在大夫者春秋既治之矣此又與庻人不議相反弑逆之禍隂竄於學術之中者也春秋之作亂臣賊子始知所懼而邪説誣民者并取愛敬之根而壊之則自此将視君父猶路人與禽獸之無知者一矣孔子討亂賊之道安得而著哉亂賊悖倫者也楊墨賊性者也第十二節仁義充塞而人心不正故使人知有仁義者所以治其本也然充塞仁義者實自為我兼愛之邪説為之而行亦以詖辭益以滛故息之距之放之所以治其末也或問中甚分曉匡章曰陳仲子章第四節此節言即不為蚓㢘操豈猶有未充故下文孟子又以母兄相提而論隐然見大倫既亂則於人道有虧所傷者大非繩之以蚓不可固非責人無已也何傷是指不為蚓何傷非謂居食何傷也第五節此節是不能充之案已頻顣曰病其所從來也辨疑已當作已已惡之而他日偶食其肉故聞兄言而即哇之也義門讀書記卷五

body:
  text: 義門讀書記卷九翰林院侍讀學士何焯撰左氏春秋隱公春秋之作曷為不托始於惠公而始於隱公曰春秋誅亂臣賊子之書也隱公被弑之君也三年將立州吁乃定之矣桓公亦非適子故云四年石碏使告于陳拒守之策必具六年往嵗鄭伯請成于陳陳侯不許周鄭交惡而陳桓公方有寵於王故不許鄭成鄭伯如周始朝桓王也鄭既結怨於陳又懼王之將討之也故朝周陳及鄭平陳既不失王寵又得鄭援七年鄭公子忽在王所至乃成昏鄭既朝周陳遂復與鄭為好且結昏以固其交與忽為昏忽在王所使王知昔之惡今之好皆為王也八年鄭伯以齊人朝王禮也猶守卿士之舊職十年鄭師入郊注以郊為逺郊吾疑之郊周邑也昭二十三年晉人圍郊意鄭既伐宋復命于王且將請討蔡衛陳故身自入見駐師于郊也十一年潁考叔取鄭伯之旗蝥弧以先登子都自下射之顛子都殺潁考叔而鄭莊不能討何也豈惜其材耶後之詛也其特以安靜軍心耶乃與鄭人鄭師先登故與鄭人蘇忿生之田溫原絺樊隰郕櫕茅向盟州陘隤懐其田去鄭逺甚鄭即力足以服之亦不能越國以鄙逺也為其少故也吾將授之矣幾事不密則害成授則授之何為漏言羽父懼反譖公于桓公而請弑之隱之攝政已踰十年桓公不為少矣貪權懐寵不早歸政于是啟羽父之邪謀又不能明告于國執而戮之進退無據身死人手非不幸也桓三年惡芮伯之多寵人也似隋之獨孤后五年王奪鄭伯政至是并奪其在卿士之職鄭子元請為左拒以當蔡人衛人為右拒以當陳人所謂攻瑕則堅者亦瑕也季梁亦曰偏敗衆乃擕矣鄢陵之役晉之勝楚者亦然祝聃射王中肩射王中肩而不書王師敗績于某不忍言也北戎伐齊齊侯使乞師于鄭以鄭嘗大敗戎師故六年鄭忽以其有功也怒棄禮而驕宜其不終也八年所以怒我而怠宼也田單以是破燕十一年君次于郊郢以禦四邑我以銳師宵加于鄖唐太中分麾下竟擒夏王十二年楚人坐其北門而覆諸山下南門楚軍所在絞人既敗必走北門故移軍斷其路孤之罪也皆免之莫敖既死羣帥自可宥十三年十五年許叔入于許因鄭亂將納厲公也同盟故莊六年請殺楚子殺亦何益八年姑務修徳以待時乎喪心十三年齊人滅遂而戍之遂虞後也陳胡公遂之小宗齊人滅遂故簒齊者即為陳氏十四年諸侯伐宋齊請師于周討背盟而挾天子以臨之厲公入遂殺傅瑕懲祭仲也晉惠公亦殺里丕十八年虢公晉侯鄭伯使原莊公逆王后于陳至實惠后亦鄭武公娶于申曰武姜之例公追戎于濟西不言其來諱之也魯自隱公二年即與戎為潛之㑹及齊桓始伯之明年經即書追戎濟西此五伯攘夷之明效戎以好來莊恃中國之大援絶不與通復追而蹙之故傳曰不言其來諱之也十九年蘇子奉子頽以奔衛衛師燕師伐周衛惠公之復入也王人子突救衛以佐黔牟衛方怨王故子頽以衛師伐周二十年冬齊人伐戎戎居北方議齊之後不先翦之未可以及逺也故自是年書齊人伐戎至三十年冬書齊人伐山戎明年六月書齊人來獻戎㨗經營十年始成斬孤竹刜令支之績書齊人偉其伐也夏書齊大災而冬興伐戎之師于是知管仲之治國能寛民力矣王子頽享五大夫樂及徧舞有生之樂無死之心何得不敗二十五年晉侯圍聚盡殺羣公子獻公之子九人唯存重耳豈非天道賂外嬖梁五與東闗嬖五賂外嬖與東闗嬖素非居内公既不疑為姬所得使且與三公子之徒非日相接謀不得洩也二十八年三十二年成季奔陳觀其如陳𦵏原仲則陳之于季友可知閔二年齊侯使公子無虧帥車三百乗甲士三千人以戍曹使無虧戍曹與衛同禍福也僖四年齊侯以諸侯之師侵蔡蔡潰遂伐楚齊以伐楚召諸侯楚必預為備預為備必戰戰則勝負未可知也今因伐蔡而猝移師臨楚楚無備必震震而後可服也此齊之得也齊以伐楚召諸侯楚素強陵暴中夏諸侯懐兩端必有至有不至前此一再謀伐楚而不果可騐惟率之伐蔡則諸侯無所顧忌而畢至因而劫其衆以伐楚諸侯在其術巾有不唯命者乎雖然非素約也心與力之不一其何以戰屈完來即與之盟而退唯用其虚聲焉耳又齊之得也先君之好是繼見衆之與已者固五年王使周公召鄭伯曰吾撫女以從楚輔之以晉可以少安楚方僭王猾夏而惠王反欲撫鄭以從楚牽于私故也有父子然後有君臣父子之倫不正則夷夏上下之防裂焉輔之以晉者晉侯前年方殺其世子從君于昏者也六年楚子圍許以救鄭楚人圍許惠王啟之也齊桓有志于尊周攘夷而王自沮敗之于是乎周之不可復振也定矣七年鄭伯使太子華聽命于㑹至齊侯辭焉齊因子華足以破鄭然鄭與齊非接壤破之而不能有也徒足為楚宋之資且勤諸侯以自封于名為不順辭子華敬仲之善相時勢也又獲令名焉若總其罪人以臨之鄭有辭矣齊始為首止之㑹本以正父子之倫今總其罪人以臨之則前後名義自相違反故曰鄭有辭鄭之叛以王故也總其罪人以臨之豈惟鄭有辭亦豈能定王太子哉八年鄭伯乞盟請服也亦以襄王新立故九年王使宰孔賜齊侯胙賜齊侯胙者報其首止之功也齊桓承之以恭所以為霸者之極盛宰孔先歸遇晉侯曰可無㑹也首止之盟鄭伯逃歸惠王實使周公命之且曰輔之以晉皆不與桓同心者也故晉侯來㑹周公沮之十五年征繕以輔孺子隂飴甥征繕以輔孺子有種蠡之才王城對秦伯之詞才智縱横卒脫其君可謂能矣惜乎所見不逺惠公之入不能輔以正誼至于内外交怨身為敵禽使其先如外傳所載狐偃之教重耳者焉至是哉故處事當先經後權用人當先仁後智也小人慼謂之不免君子恕以為必歸呂甥之言近于縱横獨四語深溫惻惻動人十八年鄭伯始朝于楚齊桓冬死而鄭伯春朝楚矣悲夫邢人狄人伐衛邢人不念狄之非族類巳之嘗見迫盟主新亡背徳即讎與伐同姓其取滅也宜二十二年楚人伐宋以救鄭此楚子也稱人者何不與夷狄之勝中國也二十四年得罪于母弟之寵子帶宋本無弟字二十五年衛侯燬滅邢同姓也故名滅同姓者不惟衛侯于譏貶之中獨名焉者甚之也齊桓公存三亡國創伯之功于是為大衛邢均為桓公所建盟主死而遂倍之使齊狄共謀其難衛侯于是曾狄人之不若矣二十八年少長有禮蒍賈曰子玉剛而無禮晉侯觀師曰少長有禮其可用也勝敗決矣二十八年原軫將中軍胥臣佐下軍上徳也晉侯舉賢任人若此何可當也子犯曰子玉無禮哉至既戰而後圖之子犯長于治國先軫長於用兵于此可見胥臣䝉馬以虎皮至子玉收其卒而止故不敗先犯陳蔡盖偏敗則衆擕又知特為楚人所脅莫有鬭心也然楚人慓疾難與爭鋒故上軍急麾下軍使退勿乗勝即攻其堅欒枝偽遁下軍望見其斾整衆而退也恐楚人知之曵柴揚塵則真若不能支楚者而後楚之二師盡銳馳之原卻以中軍横擊楚之中軍左師斷而為二子玉見二師不能相救乃收其卒以自完而左師遂為晉之上下二軍悉力夾攻子西僅以身免矣楚師背􅈶而舍先據形勝故必俟其動而後擊之所謂致人而不致于人也是糞土也而可以濟師楚人信鬼故曰可以濟師大夫若入其若申息之老何楚起蠻夷其與中國戰亦用中國攻中國而楚人不以當敵如是役則以陳蔡為右申息為左陳蔡其所役也申息其所滅也陳蔡先潰申息為晉兩軍夾攻中軍横擊復潰子玉即收其卒而止中軍皆王族未嘗肯使罹于鋒鏑也及成王之罪狀子玉止曰若申息之老何盖申息久為楚地猶所惜也陳蔡之人􅑒焉則不問矣晉侯作三行以禦狄不許請隧而私作三行其後遂沿之為新軍晉文公所謂自踰短垣者私家勢盛卒至分晉孔子謂均無貧和無寡安無傾諒哉文六年宣子于是乎始為國政至使行諸晉國以為常法趙宣子之治晉可謂能矣然當襄公既殁遂不免于舉棋不定之患復結秦晉數世搆兵之禍趙氏亦幾滅其族吾於是而歎田文之論相雖聖人不能以易也十四年有星孛入于北斗周内史叔服曰不出七年宋齊晉之君皆將死亂是時政在諸侯三國適皆伯主之後天變之大者非三國當之孰應其占哉十八年公命與之邑曰今日必授季文子使司宼出諸竟曰今日必達借莒僕以脅宣公文子之私也辭則嚴矣君方授之邑臣乃出諸竟于是始政在大夫宣元年公子遂如齊逆女書公子遂者惡其殺嫡立庶以其國外市也曰先君之母弟也而所為若是哉夏季文子如齊納賂以請㑹納賂不使遂而使行父行父為政遂與之共其功也且姜氏歸我矣其無變矣晉人討不用命者放胥甲父于衛放胥甲而不問趙穿桃園之械兆矣侵崇無功宣子若為不聞也者所以深結穿之心也又㑹諸侯于扈將為魯討齊皆取賂而還天方授楚晉君又不君也而林父惟賂之求失伯宜矣是故邲之敗猶罪之小者也取賂而崇二國弑君之賊使三綱淪而九法斁有王者作林父其服上刑哉二年亡不越竟反不討賊亡不越境盖有待也不惟不討賊而反俾賊逆新君盾之與于弑也其何所逃哉乃宦卿之適而為之田以為公族至晉于是有公族餘子公行無公族之實而徒滋他族以逼君六卿分晉始兆矣抑趙盾之謀多樹黨以自衛也此說子癸亥所記後見朱子語類已云然正卿出走側室在内猶能為變况公族成縣餘子公行皆强家乎趙盾請以括為公族盾以中軍帥兼領公行則左右之士皆歸掌握伏甲嗾獒無自發矣人知其不敢以貴加宗子而不知實據親近之地以逼君也四年襄公將去穆氏欲去穆氏懲子公也八年襄仲卒而繹襄仲卒而猶繹逐東門之漸也盟吳越而還吳越盟而莊王得以入陳鄭圍宋敗晉諸戎和而悼公得以三駕爭鄭未有邉鄙多故可以圖伯者也反而行之則夫差方敗齊長晉而勾踐已入吳矣九年春王使來徴聘夏孟獻子聘于周王以為有禮厚賄之徴聘而厚賄其使明年之秋王人復報聘盖自晉襄既亡雖秉禮如魯亦不復翌戴天子矣此孔子所以進桓文歟十年公如齊奔喪徳恵公之定其位故奔喪諸侯之師戍鄭宋本無此六字十一年晉卻成子求成于衆狄至遂服于晉衆狄服晉而潞與甲氏留吁之勢孤矣中行范氏之武功成子之餘澤也故書曰楚子入陳納公孫寧儀行父于陳莊王入陳而縣之固不可以令于諸侯乃聞申叔時之言遂并納孔儀則亦未盡乎討罪之道也夫宣滛于朝專戮直臣使國亡主滅者宜與徴舒比而誅之而乃使得返其國以從政何以懲惡而謝陳之宗社哉十二年韓獻子謂桓子曰彘子以偏師陷至師遂濟厥為司馬師律其所司也先縠專命厥不能請于林父以戮之乃明知必敗而唯欲分其罪于羣帥趣之使濟其誤林父以敗國殄民者豈不尤重于縠哉後世當國之臣由厥之邪謀求其惡有所分而禍獨被于宗社者多矣嗚呼悲夫十四年楚子使申舟聘于齊曰無假道于宋亦使公子馮聘于晉不假道于鄭求諸侯而待以無禮其誰堪之鄭之不殺馮力不贍也且邲之役欺晉而失大援故也孫叔其既亡乎楚莊之志盈矣十五年使解揚如宋使無降楚曰晉師悉起將至矣晉既畏楚而棄宋又使解揚詐以誤之無威而失信諸侯其誰不解體十七年郤子至請伐齊楚莊未死而遽謀報齊先睚眦之忿後社稷之憂卻氏之無後于晉也宜哉十八年公薨季文子言于朝曰使我殺適立庶以失大援者仲也夫投䑕忌器故宣公薨而季文子乃敢逐東門氏義門讀書記卷九

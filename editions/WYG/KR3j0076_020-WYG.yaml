body:
  text: 義門讀書記卷二十翰林院侍讀學士何焯撰前漢書揚雄傳正皇天之清則兮度后土之方貞師古注此乃雄自論已心所履行取法天地耳非也盖謂遭漢之隆天清地寜非若原之天軌不辟也鳳皇翔於蓬陼兮豈鴐鵝之能㨗蓬陼蓬藋雜生之洲渚言不能㨗於鴐鵝也㨗速也當以上下語脉例之徒恐鷤䳏之將鳴兮顧先百草為不芳師古注言終以自沉何惜芳草而憂鷤䳏非也言何為畏其將鳴先自隕吾芳耶昔仲尼之去魯兮至何必湘淵與濤瀬言進退去就自有中道孔子不用於季桓子則去及康子召之則歸屈子亦可去可歸不當必期自沉也與前折衷重華之語相應孝成帝時客有薦雄文似相如者至奏甘泉賦以風客謂王音据文選注此客字指蜀人楊莊但雄所與劉歆書疑非真耳按成帝紀永始二年春正月王音薨三年冬十月皇太后詔有司復甘泉秦畤汾隂后土諸祠則雄雖嘗為音門下史及薦之待詔又别一人故自序曰客贊誤相與齊乎陽靈之宫齊當作側加切故遂推而隆之至黨鬼神可也賦家之心當以子雲此言思之無非六義之風非苟為夸飾也其或本頌功徳而反事侈靡淫而非則是司馬班揚之罪人矣參天地而獨立兮廓盪盪其亡雙此状登華之峻非如師古注所云合徳蒙公先驅文選注如淳曰蒙公髦頭也晉灼曰此多説天子事如説是則此注中孟説為長及至獲夷之徒二劉以為烏獲夷羿説勝服䖍但此下更有羿氏控弦之文入洞穴洞穴即具區之洞庭穴潛行地底無所不通謂之地脉李善引郭璞山海經注得之炎炎者滅至自守者身全此言丁傳董賢方將顛仆何足慕也贊以為經莫大於易至作四賦觀此可知方言非子雲作雄素不與事四字可以核子雲之真矣年七十一天鳳五年卒自莽居攝至此凡十三年子雲之節有慙龔生然夷之劉歆則失其平矣宋賢抑揚之論幾於夷跖要不若孟堅此贊真實錄也若使遭遇時君更閱賢知為所稱善則必度越諸子矣安溪師云至韓文公司馬温公曾王諸公之論出而譚之言果騐矣按推重始於張平子儒林傳所聞令相長丞上屬所二千石顔注以所聞令相長丞為句今按史記聞下有一者字自當屬上出入不悖為句也而請諸能稱者史記作而請諸不稱者罰是謂罷其受業太常又請行不帥敎之罰也若僅為弟子則太常自擇二千石令與計偕何奏請之有施讎魯伯授太山毛莫如少路厚齋云宋景文公引蕭該音義按風俗通姓氏篇混沌氏太昊之良佐漢有屯莫如為常山太守則此莫如姓非毛應作屯字音徒本反伏生伏生敎濟南張生及歐陽生伏生既以敎張生歐陽生歐陽生又授兒寛則鼂大夫所不知者雖十二三其弟子固有明之者今文難通非以女子傳言故失之也歐陽生寛又受業孔安國倪寛受今文于安國古文之學自授都尉朝也孔氏有古文尚書孔安國以今文字讀之因以起其家逸書起其家似謂别起家法司馬貞云起者謂起發以出也則當屬下逸書讀孟卿由是禮有大戴小戴慶氏之學此所傳戴氏禮皆謂儀禮十七篇循吏傳漢興之初至稱中興焉紀吏治行推本君相識其本矣文翁數歲蜀生皆成就還歸至比齊魯焉假使文翁未久輙罷蜀生學成而歸孰奨勸之乎吏非久任無以責成功也王成或對言前膠東相成偽自增加以䝉顯賞是後俗吏多為虛名云宣帝褎成即燕昭事隗之意史家并書此語以窒元始以後上下相蒙之弊黄霸篇詳著張敞奏無非此指務在可否相濟足為後法也黄霸馮翊以霸入財為官不署右職霸天材自當絶人然為良吏受尚書未必不自不署右職激發成就之也遂遵武帝法度以刑罰痛繩其下武帝承文景之餘澤故天之報虐也在戾太子史皇孫之凶終光怨異已而因峻刑身歿而族赤人其可多殺哉京兆尹張敞舍鶡雀至如敞指意為相而復以興化致瑞自予不亦偪君耶此非若郡守逺且卑無所嫌也故敞言一入即使侍中臨飭計吏不為丞相地耳霸徒知昔者以是襃賞乃欲屢試亦愚而不學哉又樂陵侯史髙至以霸為首霸為相功名固損於治郡時然宣帝所以任之者不越治郡之務其見待不如丙魏亦逺矣明察之主既久於位事無不習胥欲自攬威權大臣又皆後出新進豈復能虚已以聼哉舉太尉非越職丞相事無不統也此宣帝失言但髙非其人霸受責而人不之恨耳霸死後樂陵侯髙竟為大司馬史著此者見宣帝必欲恩自己出故霸死始用髙以實将相之官朕之任焉之語顔注謂其適事宜知其一也龔遂王生曰天子即問君何以治渤海至天子說其有譲說其有讓者宣帝之器淺也然厲精圖治與良二千石共致於政平訟理元成以下能之乎是雖謂皆聖主之徳奚愧哉召信臣奏請上林諸離逺宫館稀幸御者勿復繕治共張成帝建始元年秋罷上林宫館希御幸者二十五所此用信臣所請非貢公事也信臣年老以官卒按百官表徙中少府酷吏傳郅都至則誅瞷氏首惡餘皆股栗僅誅首惡法之正也史記誅字作族滅此都所以為酷耳本文首惡乃謂一郡之首惡非指一家匈奴患之乃中都以漢法史記云竇太后乃竟中都以漢法今去四字似都為匈奴所間矣周陽由汲黯為忮至而由棄市汲君子司馬巧宦皆度外畜由使稔其驕恣終遇申屠凶徳相挺為二子笑矣趙禹亦不覆案求官屬隂罪至以夀卒於家不覆案求陰罪晚節獨以緩名為平此禹獨以夀卒也景帝時賊深者至武帝中為平感歎於民生之不幸深矣義縱楊可方受告緡縱以為此亂民部吏捕其為可使者捕其為可使者即以氣陵之敗壊其功之智非能為民也王温舒擇郡中豪至亦滅宗此張子髙朱子元尹子心所祖然此可施之一郡發起耳目王莽當天下土崩乃欲竊用此術責效原渉使渉亦何所施其技哉其時兩弟及兩婚家至而王温舒罪至同時而五族乎此史家之以敘為斷也楊僕敕責楊僕書此自當在東越傳中雜此非史法也咸宣諸部都尉部都尉史記作輔百官表有左右京輔都尉屬中尉當從史記田廣明上封不害為當塗侯徳轑陽侯昌蒲侯按魏不害封當塗侯表云以捕反者淮陽胡倩侯與此互異蘇昌以捕反者故越王子鄒起侯亦必公孫勇之黨而此略也田延年子賓以墨敗雖任刑罰以入酷吏則過嚴延年昔韓盧之取莵也上觀下獲不甚多殺此謂宣帝雖尚法律然欲民無歎息愁恨之心非以多殺為能者也尹賞紅陽長仲兄弟元后傳紅陽侯立父子臧匿姦猾亡命賓客為羣盗成帝使尚書責問司隸校尉京兆尹阿縱則師古注中後一說是也安所求子死桓東少年塲古詩結客少年塲本此蓋所以為戒也贊雖酷稱其位矣稱其位者歸咎於任之者也本馬遷之微辭貨殖傳師史雒陽街居在齊秦楚趙之中街居當如孟說作街巷居民在中則小顔注居在諸國之中為優然以為要衝之所若大街衢疎矣任氏善富者數世善字當從史記屬上為讀下文然字乃可結上更起顔注非也司馬貞曰謂買物必取貴而善者不爭賤價也故秦楊以田農而甲一州田宅隃制六條所取漢法嚴安得容此孟康注非也史記曰田農拙業而秦楊以蓋一州不過言其因力田而致富甲一州耳以下數句例之自明又况掘冡搏掩史記曰博戲惡業也而桓發用之富則搏字當為博如師古後説也游俠傳自與殺身成名若季路仇牧死而不悔也此言游俠謬託季路仇牧非班生以季路仇牧為可少也華嶠失其本意譏以不敘殺身成仁之為羙疎矣哉唯成帝時外家王氏賓客為盛王氏用其謀議卒以代漢然則孝武切齒不亦宜乎萭章石君家破至萭氏反當以為福耶此亦所以避禍也樓䕶䕶假貸至一日散百金之費此即樓䕶先假貸将以遺宗族耳顔注稍紆回陳遵初遵為河南太守至臣請皆免遵以雄才處莽代酒亦有托而逃者也然此奏不以崇廢如遵者不亟彈治嵇阮之禍豈待晉哉原渉天下殷富至以定產業容其受亦所以勸亷渉自以為前讓南陽賻送至周閣重門巨先能知守身之為孝則無此得已不已之舉佞幸傳淳於長其愛幸不及富平侯張放放常與上臥起俱為微行出入放事附見張湯傳後不入佞幸者以張純復顯於建武中也然不掩其惡所以不失為良史董賢初丞相孔光為御史大夫至立拜光兩兄子為諫大夫常侍寧為王嘉死毋為孔光生何堪經史家如此描畵貽笑千載乎即日賢與妻皆自殺家惶恐夜葬周禮司烜氏注司烜掌明竁則罪人夜葬歟疏云以司烜主明火掌夜事既令掌之則罪人夜葬可知故曾子問云見星而行者惟罪人是夜葬之事也翼姦以獲封侯翼姦謂輔翼孫寵息夫躬也賢所厚吏沛朱詡至以它罪擊殺詡朱詡可配云敞惜乎所事非人漢人尚氣而不知義者多也匈奴傳自代竝陰山下至髙闕為塞而置雲中鴈門代郡自代至陰山慿嶮為塞故趙獨不築長城秋馬肥大㑹蹛林師古注鮮卑之俗自古相傳秋天之祭無林木者尚竪柳枝衆騎馳繞三周乃止此其遺法按金源有射柳但不於秋而於夏五月小者軋軋之義似當從如淳説於是冒頓陽敗走至見其羸弱即上所謂善為誘兵以包敵此蓋冒頓所長也廼為書使使遺髙后曰至以奉常駕嫚書報書詳載此傳中固不為失體然不若史記直削去之也其三年夏匈奴右賢王入居河南地為㓂前此匈奴復得陽山北假地至是乃入居河南地故十四年單于合十四萬衆大入遂至彭陽也於是文帝以中尉周舍至以備胡㓂此専以備右賢王也及置朔方開河西四郡則無事此矣於是漢使三将軍軍屯北地至漢兵亦罷文帝大發兵者再終不逺追出塞其明年衛青復出雲中以西至築朔方大軍擊其西出匈奴不意漢都長安既取河南地則隔絶天險安有㷭火通甘泉之患哉其明年春漢遣衛青將六將軍十餘萬人出朔方髙闕再西衛青傳云大行李息岸頭侯張次公為將軍俱出右北平以牽綴其東也其明年春漢復遣大將軍衛青將六將軍十餘萬騎仍再出定襄數百里擊匈奴復遣大軍直單于庭北出信敎單于益北絶幕以誘罷漢兵徼極而取之此後匈奴計不出此明年春漢使票騎將軍去病將萬騎出隴西過焉耆山千餘里遣票騎擊其西春小嘗之夏大發兵漢使博望侯及李將軍廣出右北平擊匈奴左賢王兩將軍擊其東漢使票騎將軍迎之昆邪王殺休屠王并將其衆降漢凡四萬餘人票騎再西前斬三萬級此復降四萬人右王不能軍矣後出代攻左王得首虜亦七萬餘人左王不能軍矣冒頓之盛控弦之士三十餘萬於是幾耗其種之半偉矣哉令大将軍青票騎将軍去病中分軍大将軍出定襄票騎將軍出代咸約絶幕擊匈奴昆邪來降則西方無復匃奴故兩軍皆東大将軍遇單于票騎直左賢王也北至寘顔山趙信城而還直北票騎之出代二千餘里與左王接戰漢兵得胡首虜凡七萬餘人左王将皆遁走迤而東先解右肩復斷左臂皆票騎之為也而單于終不肯為㓂於漢邊休養士馬習射獵匈奴猶休養士馬漢計顧出其下乎使漢武當衛霍大舉之後即有輪臺之悔復修文景之政則六月之雅繼羙三代矣其明年漢使貳師将軍將三萬騎出酒泉至不利引歸匈奴益遠徙則漢兵先疲極於寒苦無水草之地兵食亦不能盡達不致人而致於人宜乎其無功也廼更謀歸漢使不降者蘇武馬宏等馬宏姓名頼此傳不沒明年匈奴發左右部二萬騎為四隊至漢無所失亡自馬邑啟釁以來漢之得䇿未有如此役者右賢王犁汙王四千騎分三隊至大破之二萬騎分四隊猶以勢分力弱為漢所敗况分四千騎為三隊乎匈奴既數困國中亦無一知兵者宜其漸為漢所臣服也使長其衆居右地右地疑作左地郎中侯應論邉事状十條一字不可遺忘侯應材未減朝錯也莽将嚴尤諫曰至且以創艾胡虜賈讓治河嚴尤禦胡所陳三䇿皆百代之龜鑑五難字字洞見兵勢與侯應論邉備不可罷足以匹敵合之趙充國金城留屯便宜十二事略盡制禦外夷要務矣蔡邕議鮮卑事云守邊之術李牧善其略保塞之論嚴尤申其要前賢重之如此贊該本末見表裏立論如此真良史矣夫賦歛行賂不足以當三軍之費後世議和議欵不出此一語是以聖王禽獸畜之至蓋聖王制御蠻夷之常道也嚴尤三䇿皆包於數語之中兩粤傳趙佗其衆半羸史記作其西甌駱祼國則羸者臝之譌也顔注非且先王言事天子至亡國之勢也錢俶恨不早聞斯言然天子其肯但已乎故曰日月出爝火息無諸揺姓騶氏史記注徐廣曰騶一作駱然則甌駱之名其以此乎王閩中故地都冶按朱育傳漢滅東越以為冶冶之為縣在國滅之後又其民盡徙故領於會稽之東部都尉史因後日之名書之朝鮮傳自始燕時嘗略屬眞番朝鮮為置吏築障箕子之後已滅於燕矣使馭刺殺送何者朝鮮禆王長渉何多事誤邊計當以為戒贊三方之開皆自好事之臣此已為隋煬帝唐太宗窒其流矣西域傳西夜國王號子合王後書云西夜國一名漂沙漢書中誤云西夜子合是一國今各自有王烏孫國遣使者至烏孫先迎取聘先迎取聘則是貪得其馬驘矣此舉辱國莫大焉舍上林中學烏孫言先是細君以語言不通而悲愁故學烏孫言而後遣嫁也遣使者案行表溝洫志令齊人水工徐伯表注謂表記之今之竪標是雖不指為漢合於討賊奏以為堅守都尉因而旌之則恩威皆歸於漢自烏孫分立兩昆彌後漢用憂勞且無寧歳烏孫之事以蕭望之議為當史家終書此語為誡深矣贊通西域城郭諸國與收河南地置朔方郡及開河西酒泉之地不同乃聽一時浮說勞敝中國而無實效者也此贊亦洞悉備邊長計當與匈奴傳贊竝書御屏唐太宗不熟復之耳是以末年遂棄輪臺之地而下哀痛之詔豈非仁聖之所悔哉其去隋煬帝蓋一間耳特飬民五世徳澤深厚非楊氏簒盜得國以峻刑强刧天下可比武帝天資尚異煬帝之愚愎頼有晚節之悔故漢存而隋亡然史家備書之亦足以為萬世烱鍳矣雖屬匈奴不相親附至亦何以尚兹起處乃敘當時廟筭之誤至此孟堅始斷以已意而言光武所以得異於孝武所以失示後人當謹守此意勿復蹈前漢覆轍也外戚傳孝惠張皇后以公主女配帝為皇后楚成無别是以不沒漢承秦後有夷風焉妻其自出少帝恒山淮南濟川王皆以非孝惠子誅獨置孝惠皇后按前所立者自吕后時已幽死此云少帝恒山即恒山王一人吕祿女亦竝誅故云獨置孝惠皇后孝武衛皇后帝起更衣子夫侍尚衣軒中得幸師古曰軒謂軒車按長廊有窗而周廻者曰軒此軒中盖屋也豈有帝方宴飲時上車更衣者乎孝武李夫人大将軍霍光縁上雅意以李夫人配食何不用鉤弋乃使倡祔廟乎漢大臣寡學至此飾新宫以延貯兮新宫即設帷帳也孝昭上官皇后有詔外人侍長主詔使侍主故燕王旦得為請爵號此霍光不學失之始也后年十四五云至立孝宣帝觀廢昌邑時言動后亦明智夙成信昭帝之匹也宣帝即位為太皇太后元訛為宣當如劉原父說孝宣霍皇后上亦寵之至昌成君者為平恩侯宣帝深沉如此孝元王皇后家凡十侯按元后傳云後又封太后姊子淳于長為定陵侯王氏親屬侯者凡十人則師古注中後說是孝成趙皇后封御史中丞印御史中丞在殿中蘭臺周禮小宰掌建邦之宫刑以治王宫之政令凡宫之紏禁鄭氏曰若今御史中丞蓋漢宫中事皆御史中丞所掌故用其印封事不當時固爭至此臣所深痛也但當申明數語如王尊之劾匡衡耳尊號已定謂趙氏已稱太后孝元馮昭儀數禱祠解解禳而解之也師古音懈非張由以先告至徙合浦云平帝初立但罪張由史立不聞追復宜鄉爵邑及孝王后中山太后之號蓋以王氏自鳳廢野王與馮氏亦有怨故也使宜鄉侯平帝時尚在必為莽所深畏亦夷滅之不能一刻緩矣中山衛姬莽欲顓國權懲丁傅行事懲丁傅者太后之意假以顓國權者莽之私其後莽不惜一宇益堅太后委仗盡夷衛氏而孝平遂在莽股掌之内無所忌矣又令共王祭祀絶廢謂徙定陶王景為信都王也元后傳孝元皇后王莽之姑也獨提王莽起筆力髙以太后崩後十年漢兵誅莽為全傳首尾闗鍵時太后從弟長樂衛尉宏子侍中音獨側聼具知章言以語鳳音語鳳此人之情也勸之以退而不貪副相之寵則庶乎君子矣初譚倨不肯事鳳而音敬鳳卑恭如子鳳宗子也音可以傲乎譚本庻孽縁恩澤得封倨不事長内行先衰使得秉政必凌侮同列結怨天下先丁傅而敗矣史家之言固不可徒知其一也雖然音敬鳳不為非若音子舜之於莽則又昧弑父與君亦不從也之義諫大夫楊宣上封事楊宣之言固屬婦人之仁然使哀帝不任董賢倉卒之際王氏無以乗時竊柄則留一二人以娯東宫何嘗非厚道哉協於新室故交代之際室字疑衍宋祁曰熙寧監本作協於新淳化本作新室按此黄氏麻沙本所載然宋景文公卒於仁宗時遺奏請擇宗室為匕鬯之主安得見熙寧監本耶姑存此說以見宋本固有與予意同者矣立少子丹為中山太守後書王丹别是一人王莽傳後漢張衡以為王莽本傳但應載簒事而已至於編年月紀災祥宜為元后本紀此說非也居攝以後莽不復禀承元后非産祿當吕后之時可比若元始五年以内雖曰元后臨朝政由莽出然平帝非子宏等可比遽以元后著紀又奪漢太速唯云更始居位人無異望光武初為其将然後即真宜以更始之號建於光武之初斯則為編年之史者當參取焉孟堅於律歴志大書更始帝於光武之前固已不没其實矣然更始倉猝本因伯升光武之資光武非假更始之爵位士馬以立基本昆陽既摧百萬之衆三輔響應誅莽而迎更始更始不克負荷以致赤睂復亂故都焚蕩園陵殘毁光武綏輯河北辭不赴徵卒能興復炎祚為克家之子以髙文為重則不得不貳於更始可以告諸皇天后土無慚徳也使迎中山王奉成帝後是為孝平皇帝莽輙敢不為哀帝置後而以孝平上繼成帝羣公於此時無能折奸臣之萌者何怪其馴至於攝位即真廢漢為新也安後復徵召之安後謂國家少安之後師古注安猶徐也恐非其令公奉舍人賞賜皆倍故百姓家給人足内使上自羣公下而舍人皆知附莽為利乃復益樹黨使四海皆頌慕之上尊宗廟至無所不施上尊宗廟謂奏尊元帝廟為髙宗以謟惑太后下施恩澤以明自言願須百姓家給非空言飾讓示信衆庻也莽欲以虛名說太后至愛身為國太后亦與莽俱化共相為偽莽復自白宜博選衆女與前受安漢公號同術藉假遺詔至其不難矣八句又虛設丁傅董賢不然之罪以張大莽功遂誣往寃者言平帝必因馮太后故不得立也晏平仲不受輔齊之封左氏春秋傳襄二十八年齊慶氏亡與晏子􅆁殿其鄙六十不受使者廹守皆自殺死者以百數海内震焉先以恩結復以威震平作二旬書庻殷平作字當為㔻也元始五年五月庚寅九命之鍚策潘朂九鍚文合竦奏與此䇿為之子午道從杜陵直絶南山徑漢中通梁漢道者即莽所為顔前說是也第不當竝舉在宜慶二州界者耳劉奉世盡非之又誤泉陵侯劉慶上書至宜如慶言居攝之請發於平帝當陽之日然則帝雖幼而常年被疾其見鴆於莽無可疑者莽徵明禮者宗伯鳳等與定天下吏六百石以上皆服喪三年雖曰欺偽然臣為君服喪三年唯元始後嘗議行之矣太保舜謂太后事已如此無可奈何沮之力不能止至此遂明目張膽扼孤兒寡婦之吭而奪之以武功縣為安漢公采地武功縣曰漢光邑光武皇帝受命中興之祥三月己丑立宣帝元孫嬰為皇太子號曰孺子先為攝皇帝而後立嬰不復令有君臣之分也又止立為皇太子不正其君之名則予奪惟莽也安衆侯劉崇與相張紹謀曰至海内必和創舉大義者自長沙之後卒歸舂陵天命之矣遣王邑孫建等八將軍擊義分屯諸闗守阸塞不遽與戰竊用蓨侯制呉楚之䇿也莽母功顯君死意不在哀令太后詔議其服自古權奸貪位奪情自王莽始前朝羅彛正趙汝師之流不知曾引以為戒否漏刻以百二十為度亦用夏賀良偽書也莽至髙廟拜受金匱神嬗莽欲即真亦何事此蓋亂賊之尤鄙晻者後又求興盛以實之致豐歆羞與等列腹心先敗不待於地皇四年董忠王渉之謀也以十二月朔癸酉為建國元年正月之朔魏曹叡景初元年改用建丑之月為正凡三年而子芳嗣魏位改元正始復用建寅之月為正雖以叡忌日在正月為辭其亦以莽嘗自謂代漢得地統中覺而改耶莽策羣司曰凡誦莽及莽䇿命羣下之辭皆可從刋削固不免於記緐志寡也徳祥發於漢三七九世之後孝惠孝文為一世哀平為一世蘇林注謂九天子非也五威將乗乾文車至服飾甚偉莽侈然逺追唐虞而五威服飾稱名則三苖之妖誕矣拜爵王庭謝恩私門者祿去公室政從亡矣莽深畏備其下故有第六條初設六筦之令至乗傳督酒利莽即真一年後當四方無虞而桑孔壹切茍且丐奪之政已無所不用其何以久初甄豐劉歆王舜為莽腹心至皆驛車載其屍傳致云諸人之始止以不能得之太后故借附莽以速化一時利合耳實亦何甘為莽北面不知大權既盡入莽手諸人安能禁其簒奪一朝隙開還自相屠生為叛賊死為愚鬼始不以正何望有終哉先是莽恐河決至故遂不堤塞莽事事期以利已故百姓不附以新為心後又改心為信此古音信與新同之證予以二月建寅之節行廵狩之禮至行廵狩之禮莽至明堂猶横摉五日况肯出行萬里耶皆虛為此文以示墜典無所不舉又借臣下之言輟行仍言天鳳七年當出上下相䝉益彰姦偽而乃有愚蔽之甚私喜其術者此南北五代所以多故也州長各一人州長凖周官與前州牧凖虞書者不同劉奉世以為衍州字者誤也故下文亦稱六州誠恐一旦不保中室中室即前王路堂後閤更衣中室也時臨出在外第故云不保中室舊說則李竒猶近之夫三皇象春五帝象夏三王象秋五伯象冬四語蓋古有是言而莽引之不謂宋人復從而祖述不已也更始將軍史諶將度渭橋皆散走諶空還史諶其後妻之父故莽信而使將不明其能戰與否也時莽紺袀服袀是戎服與均同杜預云戎事上下同服按地皇元年莽令郎從官皆衣絳當嫌漢家尚赤故其服獨止為紺也敘傳楚人謂虎班其子以為號師古曰子文之子鬭班亦為楚令尹按春秋傳作般與班同非殺令尹子元之申公鬬班也沈湎於酒微子所以告去也式號式謼大雅所以流連也沈􅊺二語對引滿舉白式號二語對談笑大噱慶未得其云已師古注慶發語辭又云人之餘慶資以積善三行之内前後異解若𦙍彭而偕老兮訴來哲以通情謂死而不朽不啻彭老之夀可以俟百世後之人也注非賓戲此文更簡十之三使不徒以詞勝則起人意矣時闇而久章者君子之真也此本禮記中庸篇闇然而日章也注非述髙紀罔漏於楚謂陳勝項梁首難遂竝起亡秦也師古注謂髙祖漏楚之罔迂謬甚矣項氏畔換注中孟說是述惠紀髙后紀罔顧天顯謂殺三趙王及燕王也述元紀優繇亮直師古曰亮直謂朱雲也按朱雲事在成帝時注誤述成紀孝成煌煌至如圭如璋徒稱其儀貎則爽徳可知也述溝洫志商竭周移至北亡八支此敘獨謂九河之亡在秦漢之間其說近之述酈陸朱婁叔孫傳禮義是創義疑作儀述景十三王傳承文之慶長沙之後光武中興中山之後昭烈分鼎皆文之慶也述趙充國辛慶忌傳營平皤皤立功立論言其言并可為萬古法也述魏相丙吉傳天誘其衷慶流苖裔言吉之保全宣帝天啓之也述蓋諸葛劉鄭母將孫何傳寳曲定陵竝有立志有立志謂不撓於鍾廷尉鍾威不入關卒收之非若寳之言及杜穉季而氣索也述蕭望之傳見躓石許見躓於石顯史高耳許字乃不經校勘之過或本史字傳寫訛述宣元六王傳楚孝惡疾馮昭儀傳注中言平帝幼被眚病不謂楚王囂也注非昭而不穆謂哀平皆後成帝不相傳世述西域傳總督城郭總督二字本此故前代惟邊境乃稱之義門讀書記卷二十

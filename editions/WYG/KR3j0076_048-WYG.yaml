body:
  text: 義門讀書記卷四十八翰林院侍讀學士何焯撰文選騷屈平離騷經賈生曰屈原被讒放逐作離騷賦若用此語去經之名則無呉楚僭王之疑矣恐年歲之不吾與此恐字謂身之修朝搴阰之木蘭兮二句朝夕即若將不及之意恐羙人之遲暮此恐字謂君之正既遵道而得路緣上先路来夫唯㨗徑以窘歩三句道之者非故至于㨗徑窘歩也恐皇輿之敗績此恐字謂國之安忽奔走以先後兮緣上馳騁来傷靈修之數化化與訛同數訛屢訛其路也余既滋蘭之九畹四句此即上文注中衆芳喻羣賢也故有九畹百畝之多注頗兩意紛錯各興心而嫉妬恐其復用也忽馳騖以追逐兮緣上不難離别来長太息以掩涕兮四句以涕替首尾相叶即申上一節言之終不察夫人心萬民好善惡惡之心鷙鳥之不羣兮至及行迷之未逺言吾自行吾之義豈可以讒謗之来遽自引去故復屈心抑志忍尤攘詬悔向之不難離别者相道之不察也忍尤而攘詬攘取也固前聖之所厚厚重也遲㢠廻鄭重不遽引决也進不入以離尤兮二句欲處身於進退之間已不虧其節國亦猶有人也女嬃之嬋媛兮四句身雖在野而節愈髙望愈歸則忌者必不能釋女嬃所以復以鮌死羽野戒之也就重華而陳詞所謂依前聖以折其中節也周論道而莫差可証論道經邦是古書之詞跪敷祍以陳辭兮四句可以告於神明豈不可感格其主故復幡然上征欲少留靈𤨏也鸞皇為余先戒兮至好蔽羙而嫉妬多方以遇主而小人多方以敗之史記所謂冀幸君之一悟俗之一改而無如懐王之終不悟也正此叚之意朝吾將濟於白水兮至余焉能忍與此終古此辭難通處無如求女三節然寄情屬望之懇到全在此叚歴来注家莫有得其説者王逸注稍近而指未明惟吾師安溪先生云楚辭所謂求女者非求君也欲其君之得賢臣焉爾始也哀髙邱之無女則髙位者無人矣繼而相下女之可貽猶望其有處于下位而備進用者也乃求女如宓妃者而不可得相與驕傲滛遊而已上下相習大小成風亂國之朝其勢固然於是思遺佚之士曰庶幾其登進乎乃為媒者鴆已毒矣鳩猶巧焉隠逸之賢安能以自通鳳凰既受他人之詒而不為吾國媒則有娀之佚女必為髙辛之有而非髙陽之有矣雖然望未絶也使少康而有賢配倘所謂祀夏配天不失舊物者乎奈何媒理之妬蔽無異於前則事既可知而原之望於是絶矣葢是時懐昬而不悟襄滛而失道原固灼見之而惓惓之誠不能自已焉他日天問之作反復於鮌禹啟少康之事夫亦此志也按此宓妃貴女以喻貴臣佚女以喻遺佚之賢少康以喻嗣君二姚以喻嗣君左右之臣也孟子曰親之過大而不怨是愈疏也若至决上下之無人將違棄而逺去是豈忍以明言者原之滑稽其不忍明言之心乎彼以求女為失喻幽昬為無禮者葢未窺尋及此耳吾師此論實有以䆒難言之隠發前賢所未發當與作者共千古矣雖信羙而無禮兮無禮猶言不恭也余猶惡其佻巧拙如鳩者猶惡其巧言佞人之多也欲自適而不可鴆鳩既蔽賢已又無力進賢故云理弱而媒拙兮至好蔽羙而稱惡庸碌不能進賢至嫉蔽則又其甚也閨中既以䆳逺兮閨中女所處也余焉能忍與此終古終古言没世不可待也求矩矱之所同則無不量鑿而正枘之患也蘭芷變而不芳兮四句此所謂衆芳之蕪穢也本為同類而信道不篤隨俗遷貿不忍斥言故託為巫咸告我若是也余以蘭為可恃兮注蘭懐王少弟司馬子蘭也按此即承上来何必求其人以實之芳菲菲而難虧兮二句緣上昭貭未虧芳菲彌章来何離心之可同兮二句言不同他焉者可離吾將者仿徨瞻顧之詞猶前猶豫狐疑也朝發軔於天津兮二句發軔天津扶桑析木之津也夕至西極以比日西方暮也陟升皇之赫戲兮四句陟升猶言升遐此終言至死不能或忘楚國反應前焉能忍與此終古之辭也屈平九歌越人鬼而楚人禨其俗固然漢書郊祀志載谷永之言云楚懐王隆祭祀事鬼神欲以邀福助却秦軍而兵挫地削身辱國危則屈子葢因事以納忠故寓諷諭之詞異乎尋常史巫所陳也東皇太一蕙肴蒸兮蘭藉蒸當作烝進也疏緩節兮安歌二句安歌升歌也浩唱間歌也五音紛兮繁㑹合樂也雲中君與日月兮齊光太史公雖與日月齊光之語本屈子之詞湘君望涔陽兮極浦涔陽者漢之陽也史記沱涔既道斵氷兮積雪氷雪塞道比小人當路不可復行也將以遺兮下女不敢言以遺湘君故托之下女猶言君之下執事也湘夫人帝子降兮北渚四句渚與下為叶少司命與汝遊兮九河二句猶言江漢以濯之也竦長劔兮擁㓜艾二句㓜艾嗣君也革其舊而新是圖庶可易亡為存耳卜居卜居漁父九辯招隠王注皆有韻可讀用君之心三句雖悟主不可期而臣道無可變不疑何卜哉漁父子非三閭大夫歟稱故官者明與世推移之道非己所獨昧顧宗臣非若漁父避世之士可比耳宋玉九辯皇天平分四時首去白日之昭昭兮二句驚心動魄實是開闢以来羙句何時俗之工巧首故駒跳而逺去駒跳楚詞俱作跼跳據朱子云作駒跳者非招魂麈史云楚詞招魂大招其末盛稱洞房翠帷之飾羙顔秀領之列瓊漿胾羮之烹新歌鄭舞之娯日夜沉湎與象牙六博之樂夫所以訾楚者深矣其卒云魂兮歸来正始昆只言徃者既不可正尚或以解其後耳又曰賞罰當只尚賢士只國家為只尚三王只皆思其来而反其政者也後五語皆大招之文讀此篇者亦當以此意求之一夫九首至其身若牛些然則如後世夜义之説古已有之魂兮歸来入修門些頂上樂字天地四方多賊姦些帶上一句魂兮歸来何逺為些帶此一句勢乃不直歸来歸来反故室又一頓渉江采菱發揚荷些注喻屈原背去朝堂隠伏草澤按此非喻也前言容飾此言歌舞戲劇前是平居此是宴㑹菎蔽象棊揳梓瑟些歌舞之中忽間以戲劇縂不令文勢直也劉安招隠士注閔傷屈原身雖沈没名德顯聞與隠處山澤無異按招隠之作與原何與義門讀書記卷四十八

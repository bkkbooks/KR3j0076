body:
  text: 義門讀書記卷五十八翰林院侍讀學士何焯撰李義山詩集題漢祖廟宅八荒者可以自起新豐戀池隍者終不能故鄉晝錦相形最妙東阿王詩之指未詳吳喬云此義山自悔其婚于王茂元因而見擯彭陽終身淪落也從吳説亦得聖女祠前二連分明如畫過景陵似亦刺學仙之無益野菊湘衡以此篇與九日詩同㫖細讀之近是紫雲新苑移花處二句收野字銀河吹笙未詳楚宫二首第二首一刻水天閒話舊事按此篇賦當年貴主之事而不可攷矣和友人戲贈二首第二首明珠可貫須為佩韓詩外傳曾子曰君子有三言可貫而佩之題二首後重有戲贈任秀才落句見往還既乆烏龍亦不復作妬媒也有感二首上篇深斥訓注下篇則哀涯餗元輿等重有感一篇并懼文宗將有望夷之禍而望籓鎮協力以救之第二首古有清君側以下古有清君側之義本為國家今多老成之人宜為平反豈可以涯等本非素心而聽閹人誣罔族誅之如今日者無名之舉乎末句不特譏開讌用樂盖深嘆文宗明知其寃而刑賞下移不能出聲也重有感第六用見無禮於君者如鷹鸇之逐鳥雀也第七幽謂王涯等十一族顯謂士大夫不附宦官者也末句星關二字未詳中元作五六承上金條脱句結句承上玉鏡臺句楚宫宫疑作厲按開成元年三月左僕射令狐楚從容奏王涯等既伏誅其家夷滅遺骸棄捐請官為收瘞以順陽和之氣上慘然乆之命京兆收葬涯等十一人於城西仇士良潛使人發之棄骨於渭水此詩盖傷其事而托言屈子沉湘困於腥臊也渭水至清故曰色漻漻涯等被族無後故以泰厲為比落句所謂人之云亡邦國殄瘁也宿晉昌亭聞驚禽楚園吟雜橘村砧園作猿明禪師院酬從兄見寄腹聫言嵗月不居也崇讓宅東亭醉後沔然有作即王茂元宅晚晴倂添高閣逈句微晦言晴後憑髙所見愈逺也越鳥巢乾後切晴歸飛體更輕切晚迎寄韓魯州同年次連悲凉古直覊旅中偶一吟諷便爾即目皆驚心也一片本是連城光價况又良工雕琢乃偏不值錢豈能無慨於中乎鄭州獻從叔舍人褎三四是從叔入道五六是舍人入道第三從祖父説到今日叔姪分誼落句根脉在此安定城樓第二言滿地江湖欲歸即得五六言所以垂淚與逺遊者豈為此腐䑕而不能捨然哉吾誠永憶江河欲歸而優游白髪但俟廻旋天地功成却入扁舟耳此二句亦是荆公一生心事故酷愛之隋宫守嵗落句既脱守嵗又非隋事定翁云隋宫用金蓮事可戒也利州江潭作武氏見駱賔王檄文猶以為斯人淪落宰相之罪義山為令狐綯所擯白首使府天子曾不知其姓名有不獲與后同時之恨故因過其所生之地停舟賦詩落句盖言已之漂泊西南曾不如羅子春之獻燕脯於龍女猶得乗龍載珠而還也茂陵八句中包括貫穿極工整而不牽率漢家天馬出蒲梢梢作捎定逺云蒲梢馬名已蒼云首句亦有病苜蓿榴花遍近郊㸃化工妙起二句指用兵内苑只知含鳳觜指畋獵屬車無復插鷄翹指微行玉桃偷得憐方朔指神仙金屋修成貯阿嬌指聲色誰料蘓卿老歸國二句落句只借子卿一襯風刺自見於言外此詩始不甚愛之後觀西崑酬唱集求如此者絶不可得乃嘆義山筆力之高鏡楹陳無已謂昌黎以文為詩妄也吾獨謂義山是以文為詩者觀其使事全得徐孝穆庾子山門法待烏燕太子待烏謂烏棲也駐馬魏東阿洛神賦日既西傾車殆馬煩洞庭魚下半好三四足可拾之意驪山有感末句太露别智元法師言不能隨智元住山反致所向泣岐學楊朱之道也日日日日春光鬥日光驚心動魄之句過楚宫㣲生盡戀人間樂微作浮淚定逺云句句是淚不是哭出關宿盤豆館對叢蘆有感次連言昔客江南黄蘆徧地然年壯氣盛自視立致要津曾無揺落之感此日流落而為關外之人不覺悽兮其悲因蘆葉之梢梢而百端交集也腹聫皆是所感末句指叢蘆清聲不逺行人去逺作逐一世荒城伴夜砧世作任和韓録事送宫人入道觀項斯於鵠之寒窘乃嘆義山才情過人落句用韓憑事七月二十九日崇讓宅讌作前半自是變體月過廻塘萬竹悲一句月字西溪叢話作風二十九日安得有月耶豈到白頭長只耳二句猶言庶幾有時衰莊􅇲猶可擊贈從兄閬之中四句畫出絶人逃世落句一歸字收盡歸者歸於荻花村裏石蘚庭中及幽徑寒塘内也寄蜀客第二聫翻案以無情誚金徽殊妙若説文君無情便同嚼蠟矣深樹見一顆櫻桃尚在矮墮緑雲髻矮作倭越鳥誇香荔二句似桂林幕中所作末句蓋有謂也魏侯第東北樓堂郢叔言别聊用書所見成篇周賀送耿山人腹聫云夜濤鳴柵鎖寒草露船燈似本落句白雲夫舊居義山之平生誤識白雲夫致光之若是有情爭不哭皆是言外巧妙墻外萬株人絶跡外作栁同學彭道士參寥亦寓自傷之意小桃園第六似桞無愁果有愁曲北齊歌此真鬼詩大似長吉手筆房中曲最古汴上送李郢之蘇州起二句是汴上第三是之蘓州第四仍説汴上贈鄭讜處士寒歸山觀隨碁局一連此身反隨逐碁局釣輪乃真似浮雲浪迹也越桂留烹張翰鱠一連伏下故人復至裴明府所居求之流輩豈易得一連此等要非佳處覽古未詳空糊赬壤真何益一連言金湯不可恃子初郊墅起連中便籠罩得子孫世世相好在買舍耕耘却從腹連生下更無起承轉合之迹第五所以息機第六所以發興曲盡郊居之樂中四句一片烟波孟德所謂以泥水自蔽也亦擬村南買烟舍村南作城南方是郊外漢南書事此指討黨項事第三責宰相也用汲長孺刀筆吏不可為公卿語當句有對每句中有對所謂當句對格也此遊戲之筆井絡第一句便破盡全蜀第二是門户第三是東川第四是西川四句中包括後人數紙三四一聫若不㸃出東西二字只是成都詩耳堪嘆一聫言以世守因餘猶歸於冺滅况么麽草竊耶喝起落句有力此篇若作於元和初劉闢據蜀之後更有關係在義山之世止當賦杜元穎悉怛謀兩事也觀西崑成都三篇何其瑣屑補綴如此工緻却非補紉義山佳處在議論感慨専以對仗求之只是崑體諸公面目耳陣圖東聚燕江口燕作䕫寫意燕鴈迢迢隔上林伏思鄉人間路有潼江險二句正披寫其不思鄉而不可得之故日向花間留晚照朱晦翁云西北邉多隂盖日到彼方午則彼已甚晚不乆則西落故西邉不甚見日元稹通州酬白居易詩有州斜日易晡未酉即桑榆之句三年已制思鄉淚二句一路逼出此二句宋玉此題下缺一宅字此作者自謂落句澹澹收住自有無窮感慨韓同年新居餞韓西迎家室戲贈義山與畏之俱為茂元之壻玩前後詞意似乎義山悼亡之後王氏待之差異往日故云新縁貴壻起朱樓切新居即帶戲一名我漫居先甲戲也雲路招邀廻彩鳳二句西迎家室南朝禁臠無人近戲也瘦盡瓊枝詠四愁按畏之有四樂茂元愛之一也仕宦通顯二也新居三也迎家室四也義山皆反是安得不痩盡瓊枝乎賈生末二句即詩人召彼故老訊之占夢意鈞天昔人因夢到青㝠庸才貴仕皆所謂因夢到青㝠者也却為知音不得聽何嘗知音偏忽梦到是真可痛耳王昭君忍為黄金不顧人顧一作為舊將軍此似為石雄而發所居霜日曝衣輕輕字豈可代單字用高松落句自傷留滯也玩無雪句必在桂林所作訪秋中四句疏上望字昭州虎當官道鬥道英華作路為是哭劉司户蕡起句言行道為之傷嗟也空聞遷賈誼一連精切公孫宏再舉賢良乃遭遇人主而至相位而去華不及待第四尤精切江濶惟廻首二句是哭春雪滿黃陵長沙地暖而方春雨雪非君子道消隂氣盛長乎落句深痛去華之寃也陸發荆南始至商洛青辭木奴橘切荆南紫見地仙芝切商洛陳後宫已蒼云叅法駕者為渚蓮犯勾陳者為沙鳥宿臨春者為江令君臣滛湎之狀極意形容定翁云次聫妙又云如此詠史不媿盛譽小園獨酌句句生動與小桃園詩皆是宫體獻寄舊府開封公五六逐臣讀之定皆雨泣商於新開路﨑嶇古共聞反映新路路向泉間辨是新路更誰開捷徑是新路夜飲如此學杜亦似不病而呻凉思起聫寫水亭秋夜讀之亦覺凉氣侵肌鸞鳳此亦悼亡之詩即日第三未詳漫成五章第一首嘆世之宗仰三十六體者僅以對屬為能事而莫窺其風刺之妙也第二首此嘆已之不遇時主如李杜也第三首身既錮廢生子又劣所以深悲所遇之竒蹇也第四首此言反不如武夫猶得㧞用於草萊也第五首此嘆貧賤以終又將并失清平之適也射魚曲自射魚曲至景陽宫井雙桐皆仿長吉雜長吉集中幾不能辨秋日晚思蝶去螢銷止剰寒冷只是頂上雨餘寂寥即此已足興感不必又苦穿鑿平生有遊舊二句對寂寥春宵自遣陶然恃琴酒二句是自遣幽居冬暮曉鷄驚樹雪一聫工於比興過姚孝子廬偶書拱木臨周道過字魚因感姜出一聫切廬頂得出永樂縣所居一草一木無非自栽今春悉已芳茂因書即事一章栁飛彭澤雪六句寫悉已芳茂學植功雖倍寫自栽南潭上亭讌集以疾後至因而抒情次第如畵偶題二首第二首落句風刺隱秀夜冷樹遶池寛月影多含下敗荷正月崇讓宅此悼亡之詩情深一往不覺猶歌起夜來楊文公詩云風細傳疎漏猶歌起夜來正用其語撰彭陽公誌文畢有感待得生金後二句恩門非㝷常可報惟此文使托以不朽而已落句意微㫖逺非細讀無由知欲收到碑文却與彭陽公無關然梁陳詩體亦多有之北青蘿獨敲初夜磬寫孤字初夜頂殘陽來而路幾層亦透落句不惟廻顧孤字兼使初夜深山迷離如覩戲贈張書記心知兩愁絶廻顧起處幽人樵歸説逢虎正見塵迹隔絶星斗同秦分二句秦分漢陵含下衰興東流清渭苦二句言恒人屢閲興亡幽人不知代謝秦分漢陵不以宻邇而妨其獨善斯真高尚其事者也念逺床空鄂君被一聫對仗工曲江此亦感憤文宗之禍而作注所引甚當特未盡作者之意葢此篇句句與少陵哀江頭相對而言也若比陽春意未多陽作傷為是咏雲河秋壓鴈聲句更新栁勝飛卿作九日於東逢雪粒輕還自亂是秋雪僧院牡丹僧院於中間一㸃起結止賦牡丹不可以大歴後常體論之贈司勲杜十三員外牧之以氣節自負故有第五落句言朝廷著述推渠手筆比之於已未為不遇也羊祐韋丹盡有碑祐作祜送豐都李尉固難㝷綺季一聨頂泣歧二句用筆之妙百讀乃知山晚更參差參差二字收歧字足天平公座中呈令狐公云云第七自謂賦得􅊝李無言得意揺風態似栁登霍山驛樓弱栁千條露一連弱桞衰荷以興劉稹之易取題小松此篇不似義山手筆落句殆有夢得不得看花之感耶行次昭應縣道上送户部李郎中充昭義攻討頗似夢得相門才子稱華簮篇落句尤有開寳風氣然恨其少言外逺致水齋一病忽忽疑已入秋及見飛燕拂水暗蟲打牕始覺猶是夏令寫病後真入神更閲已披之書仍斟昨夜之酒水齋之中病夫所以遣日者頼此如此寂寞無聊不能出户惟望故交時時書至以當披寫亦字字是多病人心情也前四句或作多病之後日想秋爽而恨其猶然夏令亦復佳落句或地主病中疎濶相接故云爾捲簾飛燕還拂水一聫簾已捲而飛燕拂水不入户已開而暗蟲打牕不休是多病晏起即目事奉同諸公題河中任中丞新創河亭之作次連只可施之新創移掇泛題河亭不得所以尤佳唐六典造舟之梁四河三洛一蒲津浮梁河之一也故有第六句獨留巧思傳千古新創長與蒲津作勝遊河中過故府中武威公交城舊莊感事中字衍贈田叟荷蓧衰翁似有情蓧作莜贈别前蔚州契苾使君本自功臣之後材又足以威逺懐外奈何少恩至此一路逼出末句第四用霸陵夜獵收前字通鑑㑹昌二年秋以蔚州刺史契苾通將兵詣振武通何力五世孫即其人也注契苾種帳太和中附於振武故有鸊鵜泉畔之句典麗極矣但少題中一别字夜掩牙旗千帳雪掩作捲人日即事楊劉只學此種齊梁中本有此體今變為七言耳文王喻復今朝是此句是破題舜格有苖旬太逺二句襯出日字春日寄懐未知何路到龍津陳後主詩岸草發青龍和馬郎中移白菊見示郢曲先傳白雪英和字見示字素色不同籬下發二句移字偏稱含香五字客切馬郎中從兹得地始芳榮移字喜聞太原同院崔侍御臺拜兼寄在臺三二同年之什極似夢得燕臺四首四首實絶竒之作何减昌谷惟夏一首思致太幽㝷味不出絮亂絲繁天亦迷竒句河内詩二首湖中首結句從王孫遊兮不歸芳草生化出贈送前劉五經映三十四韵洋洋大篇仍自一氣呵成莫能㝷其段落之迹送千年李將軍赴闕五十韵空拳轉鬥地拳作弮為是數板不沈城沈作壇上揖韓彭揖作挹此時惟短劍此句轉和鄭愚汝陽王孫家筝妓二十韵碧嶂愁不行二句用遏雲意殘雪勝前作大鹵平後移家到永樂縣居書懐十韵云云依然五桞在二句使夢得子厚為之便無此風致不憂懸磬乏二句是大鹵平後送從翁從東川宏農尚書幕高安翡翠巢巢字出韵戲題樞言草閣三十二韵氣味逼古後幅純乎漢魏樂府君時臥掁觸入本題榆莢亂不整四句以比小人之得君多援偶成轉韵七十二句贈四同舍迴看屈宋由年輩年疑作平此時聞有燕昭臺以下指盧宏正五言述德抒情詩一首四十韵獻上杜七兄僕射相公驚人肯再鳴㑹昌四年七月杜悰自淮南節度使入為同平章事帝以其不肯選揚州倡女得大臣體也一鳴驚人蓋指此事後飲曹參酒二句如此使事西崐所未窺即伏下爭澤潞窮兵事言不為蕭曹之畫一而為鹽梅之相濟也此長詩中提挈細讀乃知之叩額慮興兵時方討澤潞劉稹將郭誼殺稹以降李德裕以為稹阻兵拒命皆誼為謀主力屈又賣稹以求賞不誅何以懲惡帝然之詔石雄以七千人入潞州誅誼杜悰以饋運不給謂誼等可赦帝熟視不應所謂叩額慮興兵也五年五月悰遂罷相出為劍南東川節度使後徙西川事詳通鑑及唐書本傳感念殽屍露至公意本無爭惡草似謂贊皇門下諸人錢龍愓誤以殽屍趙卒之語指大和中不受維州之降戮悉怛謀於界上以悰為西川節度使收復維州當非執政所喜非也悰本牛黨時執政者白敏中馬植魏扶皆與悰善廟堂之上方以克復河湟請上尊號何人言之可畏哉寄詞收的博一聫乃指悰收復維州事上杜僕射寳瑟和神農農字出韵安禪合北宗宗字出韵轉覺季心恭恭字出韵驕兒詩爺昔好讀書以下若無此段此詩便無謂行次西郊作及門還具陳此下皆述具陳至末方自發議論章法絶佳晉公忌此事唐之亂源開自李林甫常恐值荒迥二句灾荒之時兵即為盗千古一轍我聽此言罷終具陳此下寄慨作收得法此等傑作可稱詩史當與少陵北征並傳井泥四十韵後半與牧之杜秋詩極相似集外詩夜思消瘦滯非鄉非當作他思賢頓詠明皇天寳之事次連借舞馬鬭鷄二實事暗寓重兵在邉宿衛單薄之意漢官儀宫中不畜鷄汝南出長鳴鷄衛士候朱雀門外專傳鷄唱無題此篇未詳有懐在䝉飛卿哀同庾開府頂索居瘦極沈尚書頂移疾五月十五夜憶往嵗秋與徹師同宿十五夜當作十六日朱槿花二首第二首題當作晉昌晚歸馬上贈按戊籖次首刻云勇多侵露去恨有碍燈還嗅自微微白看成㳫㳫殷坐忘疑物外歸去有簾閑君問傷春句千詞不可刪寓懐義山有極似庾子山處不可以白公之清流繩之星機呈宻緒呈作抛囘中牡丹為雨所敗二首囘中為安定地則此詩作於依王茂元於涇原之時詳味二篇領句似皆有所思而托物起興者其亦為甘露罹禍者而發耶舒元輿以牡丹賦知名於諸相中最為早逹下苑莫追榴花浪笑雖不敢强為之説世有知言之君子必將有以解予之惑也庚午夏日後細讀牡丹賦無一語與此詩相涉則非為甘露罹禍者發也下苑句乃自言未得曲江看花耳庚午十一月又記謝徃桂林至彤庭竊咏禁城將開晚詩眼燒香曲長吉詩雖竒然指趣故自分明若義山則徒令人循誦而莫喻其賦何事耳送從翁東川宏農尚書幕振溺休規步文選永明十一年䇿秀士文拯溺無待於規行宇宙昨還淳以上叙唐業之興纘祖功宜急二句轉晉昌晚歸馬上贈此篇戊籖刻西北朝天路勇多侵露去云云乃朱槿花次首也哭䖍州楊侍郎虞卿齊民困未蘓民作人旋踵戮城􅈢楊虞卿之貶發難於李訓鍛錬者舒元輿也義門讀書記卷五十八

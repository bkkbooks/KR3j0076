body:
  text: 義門讀書記卷五十六翰林院侍讀學士何焯撰杜工部集宗武生日自從都邑語二句宗武當日亦應有小杜之目人傳世上情傳誦止屬世情不足自恃須勤苦以求古作者精意乃不負堂構也熟精文選理文選篇篇有理温柔敦厚作詩故具有深藴妄人自不求精也又示宗武覓句知新律伏文章試吟靑玉案二句李善文選注玉案君所憑倚喻大臣亦為天子所恃紫羅囊用謝安事注蔓引假日從時飲二句慈嚴具備應須飽經術起下已似愛文章綰上十五男兒志二句許身比稷契立志躋㳺夏熟食日示宗文宗武熟食即寒食消渇遊江漢老病逺客也羈栖尚甲兵逢亂松柏邙山路祖禰汝曹催我老子孫邙山注子羙先塋在洛按便下襄陽向洛陽自注田園在洛社日兩篇第二首歡娛看絶塞言看峽中之人自歡娛也九日五首闕一首第一首抱病起登江上臺伏衰謝殊方日落元猿哭伏干戈第二首但愧菊花開即所謂潦倒新停濁酒盃暗出更妙茱萸賜朝士收舊字第三首野樹欹還倚無花秋砧醒却聞無酒九日諸人集於林舊采黄花賸非老翁所宜故黄花俱成贅賸也大歴二年九月三十日為客無時了起句掀得起悲秋向夕終三十日瘴餘䕫子國四句不與故園同也下二句言無秋意北人逺客豈堪此風土乎所以尤可悲也年年小揺落年年收轉無時了秋盡而小作揺落也應悲秋不與故園同應為客十月一日有瘴非全歇二句望冬甚難瘴仍未歇舊俗自相歡藏獨不歡一靣在内孟冬破甘霜落爪二句頂多事暫喜息蛟螭以暫喜反見無歡也小至刺繡五紋添弱線二句頂陽生岸容待臘將舒栁二句頂春又來覽物白詩之祖憶在潼關詩興多伏高歌巫峽忽如瞻華岳二句伏形勝舟中得病移衾枕二句伏風上愁强戲為吳體江草日日喚愁生言草又生而終不得歸也興渭水巫峽泠泠非世情興秦山盤渦鷺浴底心性二句乃樂子之無知意書夢亦吳體桃花氣暖眼自醉二句頂晝分眠故鄉門巷荆棘底二句遇此只有愁眠但求一好夢亦不可得耳卽所謂不獨為夜短也覽鏡呈柏中丞渭水流關内身墮豺虎窟不能隨之而去也終南在日邉帝都淪於犬羊徒望終南切日而吾君不在也即含下一連起晚堪從事起晚謂不能晨入夜歸堪正自謂弗堪也言雖故人萬一憐我而我為䘮亂所摧衰謝如此難以相助矣此自以身本王臣中丞戎帥崛起不肯輕就幕府故託詞豫却之也婉約無㾗可以言矣行遲更學仙正足上意言除是學仙乃堪從事决言其不能也鏡中衰謝色倒裝句即事江中風浪雨㝠㝠風雨指小人為亂者亦水深雪雰之意悶起句浮字起暗字卷簾惟白水一連伏滯字猿㨗長難見一連與滯反有鏡巧催顔此偏不滯所以悶也戲作俳諧體遣悶二首第一首舊識能為態能字有味第二首畬田費火聲畬田今浙中即有之其人皆蠻種謂之畬客得舍弟觀書自中都已逹江陵颯颯開啼眼啼眼畏風喜望却開也喜觀即到復題短篇二首第一首巫峽千山暗暗字反映即字有力病中吾見弟是意外驚喜之詞猶及病中是即到也來經戰伐新代解其遲反醒喜其即到也第二首待爾嗔烏鵲以嗔襯喜應論十年事二句愈見即到之可喜舍弟觀歸藍田迎新婦送示兩篇第二首後四句一氣流出第五弟豐獨在江左近三四載絶無消息覓使寄此二首第二首影著啼猿樹承淹江漢魂飄結蜃樓思杭越舍弟觀赴藍田取妻子到江陵喜寄三首第一首消息真傳解我憂但傳消息已解我憂况其逹也朱紱即當隨彩鷁言我方當就汝也第二首廵簷索共梅花笑方云梅花笑三字隋煬帝詩冷橤疎枝半不禁半不禁言似知人意不待春而發也第三首真切濃至䕫州詩之極筆卜築因同蔣詡徑二句言但兄弟團圞便與故國不異也江雨有懐鄭典設早晚來自楚王宫以雨來映鄭之不來亂波分披已打岸覆裝風字在内寵光蕙葉與多碧切春雨寵光本光風轉蕙王十五前閣㑹更無難狀之景不化之事陪柏中丞觀宴將士二首第一首極樂三軍士二句言厚士如此士忘其死雖百戰不知為難也醉客霑鸚鵡陪字鸚武杯也佳人指鳳凰指鳳凰言相對而引之使前也幾時來翠節指中丞幾時來言向者所未有也第二首繡段裝簷額排塲金花貼鼔腰樂器方云庾信詩細􅀢纒鐘格園花釘鼓床杜祖此一夫先舞劍二句奏技以上四句層次冩出觀字江樹城孤逺二句此惜中丞在逺朝廷未及知也漢朝頻選將二句言頻聞選將不及中丞豈所用者乃不恤將士如霍去病之徒歟反應上極樂三軍士用意甚深七月一日題終明府水樓二首第一首高棟層軒已自凉水樓秋風此日灑衣裳七月絶壁過雲開錦繡二句雲過松鳴皆從秋風句生來下句暗用陶隱居事㸃水字又切樓看君宜着王喬履從仙人好樓居帶下第二首宓子彈琴邑宰日承攝令以彈琴興奕棋承家節操尚不冺承次句為政風流今在兹應首句楚江巫峽半雲雨半雲雨言外亦見欲去不得也淸簟疎簾看奕棋又恰是七月即目二句只略帶水樓便如畫圖此為高手舉座無一舊知一老莫為酬和黙坐觀棋情味可知妙在寫來仍不見其敗興意季秋蘓五弟纓江樓夜宴崔十三評事韋少府姪三首第一首老夫因酒病二句言雖酒病不飲然猶堅坐竟夕者重其有故鄉之情也第二首高隨海上查起下瞻字百過落烏紗仰瞻不已至於落㡌者屢也九月一日過孟十二倉曹十四主簿兄弟秋覺追隨盡起忘年經秋追隨九過其六故覺將盡也過客相㝷君望晚嵗刻酷學此律中陶令窮老真無事二句含問吾廬地幽忘盥櫛四句逼真僻居客至時時聞繫舟楫收過字及此問吾廬㝷字簡吳郎司法雲石熒熒高葉曙二句頂疎豁又呈吳郎二泉云公堂前有棗鄰婦得取以為食及吳郎來居則婦不敢至而吳又編籬以斷往來故公賦此囑之祗縁恐懼轉須親二泉云此婦心懐畏怯非反親之彼安得安心取之耶即妨逺客雖多事二句言原此婦之意因吳郎逺客恐其見阻不來撲􅀥雖為多事緣吳郎之意編籬以别嫌疑其意甚真真正也視公所處則欠委曲矣下句放吳郎一步已訴徴求貧到骨二句言婦前日嘗訴官府徴求貧已極矣時我正思天下兵戈若婦之困窮者甚衆為之墮淚欲兼濟而不可得况此一人可不少濟之乎此二句亦倒用法覃山人隠居南極老人自有星山人非其人也予見亂離不得已四句我厭亂離而思處子未悟傾覆而求出然何不問之已經歴者徒效周子之僕僕也第六句委婉曲折盖其人亦非碌碌乾没也伹惜其不量時耳柏學士茅屋寫巖居深靜清曠更無塵雜經心到眼也題柏大兄弟山居屋壁二首第一首後四句言我滯留江漢方為爾曹口講指畫庶幾後生復窺風騷㫖格拔出朱門流俗之外也第二首個個五花文指兄弟别崔潩因寄薛據孟雲卿内弟潩赴湖南幕職不害其為議論為報欲論詩謂干戈息而詩書復盛正濟時之成效也送李八秘書赴杜相公幕石出倒聼楓葉下㸃染秋字舟行石下葉墜石上故倒聽也櫓揺背指菊花開菊為石蔽舟過乃見故背指也巫峽敝廬奉贈侍御四舅别之灃朗行李淹吾舅二句行李誅茅猶飲子懐君對法靑眼只途窮生世不諧雖所向降心仍無恤其饑寒者傳語桃源客指朗州送覃二判官遲遲戀屈宋肅宗於公雖一斥不復然録用之恩思報之其子迹似屈宋之事頃襄王也肺肝若稍愈應病字亦上赤霄行應謁字季夏送鄉弟韶陪黄門從叔朝謁比來相國兼安蜀鄉字出早聞黄閤畫麒麟言黄其閤而又畫像麒麟也送田四弟將軍將䕫州柏中丞命起居江陵節度陽城郡王衛公幕燕辭楓樹日發寒塘雁度麥城霜至江陵遥憐似葛强田將軍送王十六判官次連蒂與頭借對送鮮于萬州遷巴州接近與名藩自萬而巴故曰接近他日有殊恩應注意奉送韋中丞之晉赴湖南寵渥徴黄漸一連以腹連觀之乃非熟俗湖南安背水言中丞能安於外不以棄逺為嫌也王室仍多故四句言朝廷正當乏才不得已而有借冦之舉落句望其求賢自輔共􅅄王室濟此多難天下事非一人所能獨任也憑孟倉曹將書覓土婁舊莊方云土婁在今偃師四十里平居䘮亂後伏十載為歴雲山問憑覓十載江湖客二句收足無辭意見憑仗不淺也别蘓傒赴湖南幕五年前逰荆揚則贈詩誡以䝉養此赴知己之招則勸以論事公於蘓盖無所不盡也他日憐才命他日已為命屈况十年後乎消渇今如在故人也數論封内事二句言雖棄擲屈迹幕僚然孰非王臣當禆贊府朝以分主憂若但竊食而已則局促卑下亦非所以顯親也贈爾秦人策二句此老夫所望於故人有子也存没口號二首第一首席謙不見近彈棊没畢耀仍傳舊小詩存第二首鄭公粉繪隨長夜没曹覇丹青已白頭存奉漢中王手札報韋侍御蕭尊師亡少年疑柱史少年對下白頭多術怪仙公多術對下疾病即是自傷也祗應吾道窮先位置道窮句體勢變化生動哭王彭州掄曠望渥洼道一連妻亡子逺乃爾藴藉巫峽長雲雨地逺秦城近斗杓天高馮唐毛髪白二句既痛逝者行自念也見螢火寫得歴亂飛揚又句句是見字巫山秋夜螢火飛對下滄江白髪忽驚屋裏琴書冷冷字與火字關應得妙復亂簷邊星宿稀謂火星已西流滄江白髪愁看汝收出見字楊云滄江白髪又因螢火照出映帶絶妙來嵗如今歸未歸東山之篇不歸者感熠燿宵行故有此句吹笛風飄律吕相和切一連𦂳頂起句作風月為是後半不覺為用事孤雁此篇亦自喻差池流落逺去王室也鳴噪自紛紛應孤字鷗却思翻玉羽一連陡將春暖之戲翻轉作襯感慨起伏極妙若作結意即减價雪暗還須浴一連承寒字幾羣滄海上對江浦拓開鷄此刺素附君子而以䘮亂敗其度者玉腕騮江陵節度衛公馬也頓驂飄赤汗言其駿跼蹐顧長楸言其馴舉鞭如有問荆南欲伴習池遊寓銷兵歸馬之意非閒語也見王監兵馬使説近山有白黑二鷹羅者乆取竟未能得王以為毛骨有異他鷹恐臘後春生鶱飛避暖勁翮思秋之甚眇不可見請余賦詩方云二篇各㸃羅者乆取未能得之意上首以第三句下首以第五句第一首雪飛玉立盡清秋此首白者雪飛玉立指毛一生自獵知無敵指骨第二首春生避暖於第二首總見此首黑者明㸃正翮摶風超紫塞指毛金眸玉爪不凡材指骨逺懐舍弟穎觀等江漢春風起一連猶似對屬耶續得觀書迎就當陽居止正月中旬定出三峽舟楫因人動言其貧形骸用杖扶言其病俗薄江山好刺籓屛時危草木蘓悲民生將别巫峽贈南卿兄瀼西果園四十畝無句不妙無限起伏正月喧鶯末末無也雪籬梅可折雪字梅之色風榭栁㣲舒風字桞之態人日兩篇第一首雲隨白水落二句日被埋照白者惟水雲復蔽之二語寫出凄凉引起白頭蓬鬢稀疎乆二句稀已不堪况加白乎無勞比語妙第二首佩劍衝星聊暫拔一連設為將有用我之詞引興無憂直道無憂行路難言無憂者正有憂也且直如此道耳江梅以梅起以江結庭草舊低收葉舉萎則四垂氣至復立收字誰人能下大歴三年春白帝城放船出瞿唐峽久居䕫府將適江陵漂泊有詩凡四十韻解纜獨長吁放船死地脱斯須出峽前聞辨陶牧江陵縣郭南畿好時方以江陵為南畿衰迷賢與愚起下甲卒書生邱壑曾忘返四句言本不求仕但文章當作為雅頌薦之郊廟雖躭邱壑未儗窮途深婉有意味四句無窮起伏卧疾淹為客四句所為出塵歴塊之根也灔澦險相廹亦自比也喜近天皇寺四句兩連扇對長詩當如此變法沈詩中已有之也先披古畫圖對上灔澦二連同泣舜蒼梧對上卧疾二連朝士兼戎服四句亦扇對也兼字對初字出塵皆野鶴對樸直句歴塊匪轅駒對廷諍句二句頂書生伊吕終難將刑法志伊吕之將作降者非韓彭不易呼呼用如呼小兒之語二句頂甲卒山林托疲薾二句反應勞心依憩息二句巫山縣汾州唐使君十八弟宴别兼諸公擕酒樂相送率題小詩留於屋壁接宴身兼杖承乆病來春夜峽州田侍御長史津亭留宴白髪煩多酒煩注作須須言何須也行次古城店汎江作不揆鄙拙奉呈江陵幕府諸公以今朝行色可卜相合以老人多病又恐不宜然業已渡江無暇復為擇審故聊以此詩試觀其相待之意落句深婉之至春鷗懶避船下水而復得風船至鷗不及避却用懶字妙行色兼多病二句有説不出寫不盡情事在内讀之不禁涕零乗雨入行軍六弟宅巢燕得泥忙對萍漂書堂飲既夜復邀李尚書下馬月下賦絶句久􅂸野鶴如霜髩若說霜髩如野鶴即凡俗語暮春江陵送馬大卿公恩命追赴闕下收得深渾有餘味奉送蜀州柏二别駕將中丞命赴江陵起居衛尚書太夫人因示從弟行軍司馬佐愛弟傳書彩鷁新指别駕將命遷轉五州防禦使遷轉即謂問俗而出楚宫臘送荆門水二句頂彩鷁報與惠連詩不惜從弟佐夏日楊長寜宅送崔侍御常正字入京星辰北斗深指入京深字稳愜烏臺俯麟閣烏臺指侍御麟閣指正字長夏白頭吟以夏日收和江陵宋大少府暮春雨後同諸公及舍弟宴書齋此老下峽後詩每淡乎寡味亦才氣衰退之騐矣託末契於後生游宴則厭其老耄又强求其詩句以為名高後半亦自有無窮感歎在言外多病執熱奉懐李尚書之芳竒峯硉兀火雲升所謂夏雲多竒峯也山隂野雪興難乘反結執熱水宿遣興奉呈羣公弱纜且長隄水宿童稚頻書札二句暮年久客屈意童稚而無一人應其緩急者公抱負何如而到此安得不悲憤耶二語當哭水宿伴鳬鷖出題同人惜解擕羣公巨海能無釣以下皆姑以自遣也江陵望幸諱避狄而曰望幸先明此都之可仗而終之曰起涸鱗若真待其幸者不露㾗迹地利西通蜀一連言收復之便風烟含越鳥指南舟楫控吳人指東二句言儲備之易未枉周王駕一連醒望幸江邊星月二首第一首金波耿玉繩金波言月玉繩言星天河元自白一連元自向來承明雨後以天河襯出江邉氣脉承接一線江浦切邉字映物連珠斷星縁空一鏡升月餘光隱更漏二句包下半夜又暗藏一客舟露華兼收到清秋第二首起二句上總破此分破上逆此順解纜别船暗醒邉字又為客字藏針客愁殊未已二句收應辭别二字舟月對驛近寺金刹青楓外近寺朱樓白水邉對驛舟中此湖南詩遣悶遣悶者不可遣也哀箏猶凭几一連言欲遣不得氣衝看劍匣一連反呼跼字妖孽關東臭桓温所謂遺臭江陵節度陽城郡王新樓成王請嚴侍御判官賦七字句同作碧窗宿霧濛濛濕一連頂出氷雪生杖鉞褰帷瞻具羙包府使判官自公多暇延參佐二句承有餘清收綰又作此奉衛王前詩與嚴同作故再賦逺開山岳散江湖頂出雄字升高曠望羣峯但見其尖故下開字衆流歴分其境故下散字真意外驚人語推轂幾年惟鎮靜二句奉衛王舟出江陵南浦奉寄鄭少尹飄然去此都舟出江陵百年同棄物二句悲凉雨洗平沙靜南浦南征問懸榻二句南征東逝不知所適俱從更欲投何處生下江南逢李龜年方云開元盛時今已久矣不意江南復與龜年相逢故興感焉四句渾渾説去而世運之盛衰年華之遲暮兩人之流落俱在言表秋日荆南述懐三十韻艱危袞職陪此袞職即指房琯始為琯所推奬及琯被讒與之同貶共其艱危也罪戾寛猶活領起通篇伏枕因超忽結上超忽即上所謂催變也扁舟任往來生下九鑚巴噀火用欒巴事與下楚祠借對望帝傳應實二句分頂蜀楚望帝四句借蜀楚事見岳牧之僣横所在皆無君也秋雨漫湘水水深雪雰比小人隂風過嶺梅言此日湖南羣小自擅兵氛且徧嶺外也苦揺求食尾含飢愁常曝報恩腮頂名業飢藉家家米二句家家處處藏一衆字任受衆人咍即指下羣公也得䘮初難識二句咍我者以榮枯劃分然得䘮在榮枯之外非衆人之識所該也差池分組冕四句頂得字漢庭和異域二句暗指李揆使吐蕃元載死東市頂䘮事霸業㝷常體㝷常似用左傳爭㝷常以盡其民略取武夫為腹心爪牙聖慮窅徘徊言不知所倚仗也數見銘鐘鼎以下言當任賢相固宗子且寛其文法勿加操切以期羣賢畢登共致太平不可專倚武夫悍卒也此十句一氣湧出所謂詩看子建親者此類是也祝網但恢恢言罪廢者亦當收用勿以一𤯝永棄則自有什伯於羣公者出戢干戈而銘鐘鼎以慰聖慮矣赤雀翻然至一連即指賢才軰出賢非夢傅野四句言我斯言豈自為哉内顧非傅說挺生之材難為中興輔佐心若死灰乆已擺脱浮名矣所以惓惓不忘者徒念肅宗寛不即誅之恩思效忠其子如屈宋之於頃襄耳自古江湖客收荆南㝠心若死灰言無餘望也收述懐秋日荆南送石首薛明府辭滿告别奉寄薛尚書頌徳叙懐斐然之作三十韻南征為客久荆南西候别君初秋日嵗滿歸鳬舄明府聞道和親入尚書往者胡星孛入頌德材非一范睢秦昭王臨朝歎息曰物不素具不可以應卒今武安君既死而鄭安平等畔内無良將而外多敵國吾是以憂欲以激厲應侯應侯懼不知所為公意盖指此名將猶在可以收用非若止餘一范雎也曾是接應徐起新文侍臣䨇宋玉已暗渡新文鍳激勞懸鏡一連對屬如丸跋涉體何如叙懐休煩獨起予從見新文結後半轉接如龍哭李尚書之芳喉舌罷天朝尚書王孫若個邉并切李重題哭君余白頭余注作餘非工拙懸絶暮歸客子入門月皎皎恨無酒誰家搗練風凄凄恨無衣二句含下不稱意明日看雲還杖藜方云且預寫明日無聊按杖藜看雲庶幾可以散愁不是説無聊暮字反收忽然拓開筆力與胸襟相副移居公安敬贈衛大郎雅量涵高逺自負不易知也清襟照等夷等夷自謙也平生感意氣雅量河海由來合清襟水烟通徑草二句切移居頂流年白頭供宴語即成佳話真可悲也公安送韋二少府匡賛逍遥公後世多賢韋二少府時危甲兵黄塵裏二句悲壯古往今來皆涕淚二句如此對結何曽費力公安縣懐古寒天促日短二句先含維舟曲折變化洒落君臣契二句承上風雲二字忽然接下公安送李二十九弟晉肅入蜀余下沔鄂正解柴桑䌫從下沔鄂起仍看蜀道行入蜀南紀連銅柱下沔鄂西江接錦城入蜀憑將百錢卜二句以送入蜀結宴王使君宅題二首第一首世事各艱難言亦無下手處自合漂泊難比二子也不才甘朽質二句謙詞也第二首戎馬今何地言一身莫保鄉園獨舊山言無家可歸舊山注作在山言無鄉園只在三峽中矣作在山更勝酩酊任扶還安得不以酒自寛耶曉發公安數月憩息此縣北城擊柝復欲罷曉字起舟楫眇然自此去轉到發字泊岳陽城下殊不肯放下然賢於夢得者懐忠思效故也山城僅百層僅餘也纜船苦風戯題四韻奉簡鄭十三判官泛楚岸朔風疾岸字藏纜舟天寒鶬鴰孤寒字起覓酒維舟日日孤出纜船因聲置驛外鄭判官為覓酒家壚反醒苦風登岳陽樓定逺云破題筆力千鈞岳陽樓因洞庭湖而有先㸃洞庭後破登字迎刃之勢自公安至湖南詩此為至矣洞庭天下壯觀此樓誠不可負故有前四句然我何縁至此哉故後四句又不禁仲宣之感也詩至此乃面面到矣上下各四句直似不相照顧仍復渾成一氣非公筆力天縱鮮不顧此失彼第五含下北字第六顧上東南陪裴使君登岳陽樓湖濶兼雲霧一句括數紙樓孤屬晚晴孤字移掇不動岳陽樓是城西門樓故恰使晚晴二字詩接謝宣城宣城有謝朓北樓此句亦非泛引過南岳入洞庭湖衡山引舳艫過岳壤童犁雨雪二句言中路無可留者欹側風帆滿入湖才淑隨厮養比賢者失所非内人紅袖泣之意召平元入漢不忠張翰後歸吳不智召平入漢事二姓也張翰後歸不見幾也此等既難復用在野者又未知名然則吾君誰與共天下乎此時而老病萍梗所以下憂國之淚也宿青草湖結超忽宿白沙驛一起神筆湘夫人祠此詩作於代宗即位之後落句公自謂也晚泊登汀樹是即目語人却做不到結䌫排魚網亦其類也祠南夕望孤舟汎日斜夕字目斷更雲沙望字山鬼迷春竹二句祠南寫得杳㝠恍忽是夕望神致登白馬潭水生春䌫没妙語叢花笑不來對句竒莫道新知要方云樂莫樂兮新相知要字疑為樂字歸雁起二句要是紀異野望納納乾坤大望字納納二字出楚詞野樹侵江濶二句雪消江濶是倒裝句恰收上野望起下扁舟也入喬口長沙北界賈生骨已朽二句言賈生在長沙不過二載而我遲遲已及黄髪故悽惻也銅官渚守風水耕先浸草二句連日守風所歴早泊雲物晦將風逆行波浪慳已風飛來䨇白鶴二句守風之悶自在言外白字仍與上晦字不碍鶴自飛來又醒出鬥風也奉送王信州崟北歸下詔選郎署非牧養之防其為盗而始重斯選痛哉其言之也天子嚮時憂有體有味遣騎覓扁舟遣騎散遣車騎也覓扁舟似用劉尹傳教覓張孝亷船事江閣卧病走筆寄呈崔盧兩侍御長夏想為情衰羸之人豈堪日長忍飢想為情三字欲兩侍御念我也誰復致盃甖言誰復更望得酒乎潭州送韋員外牧韶州杜詩如此種淡處最有味江閣對雨有懐行營裴二端公野流行地日一連句中有三層景頂出壯字層閣憑雷殷江閣長空靣水文對雨雨來銅柱北二句行營酬韋韶州見寄白髪絲難理承起連新詩錦不如承次連千秋節有感二首天寳七年七月羣臣上表請改千秋節為天長節從之仍云千秋節者紀其太平最盛之時也吳本編二詩於潭州諸詩中盖作於大歴紀元之後按代宗於開元十四年十月十三日生於東都上陽宫永泰二年十月降誕日諸道節度使進獻珍玩名馬衣服二十餘萬計以陳上壽自是嵗以為常大歴二年十月降誕日宰臣及常參官率錢修齋度僧尼道士凡數百人三年十月降誕日諸道節度使上壽各獻衣服名馬及綾絹凡百餘萬夫千秋為節宴賜臣民雖曰泰侈未傷國體所進止於金鏡綬節士庶結承露囊相遺餉聊紀風俗節序今乃不聞宴賜取貨無藝假天子生日之名以為利不亦鄙乎思先代亦以諷今王也第二首御氣雲樓敞貼八月聖主他年貴二句人主聚斂必藉口時艱他年此日㣲詞中疾矣注中内樂一條按開元二十四年千秋節帝御廣逹樓宴羣臣奏九部樂内出舞人繩伎頒賜有差又召京兆父老等宴賜注引明皇雜録事謬矣金覊句則兼指舞馬也張燕公有舞馬千秋萬嵗樂府詞長沙送李十一末二句周匝悲壯重送劉十弟判官稱十弟亦如唐十八使君得稱族弟之義奉贈盧五丈參謀琚恭惟同自出公祖母盧氏藻翰惟牽率二句不復有對屬㾗天子多恩澤二句十字可歎可味暮秋將歸秦留别湖南幕府親友途窮那免哭所謂哭不盡也北歸衝雪雨亂離乏絶聊以病告與貶節請乞於無事時者不同送盧十四弟侍御䕶韋尚書靈櫬歸上都二十韻素幕渡江逺叙事直起長路更執紼禮此心猶倒衣恩墓待龍驤詔綰尚書臺迎獬豸威送侍御深􅇆見士則以下因其盡心所事能有終始故以致君之績期之然侍御乆於戎幕頗見兵勢尚未知今日所患不在畔臣煽誘戎狄内侵在朝廷無以服籓鎮之心順地節將皆不用命方日􅂇賊為聲勢平復無期民生益困則邦本有不可保者此則所當力規切諌乃盡對揚之道耳宦䜿之竊柄未有不始於人主之怠者故曰但促銅壺箭也他日掃除非掃除非謂用程元振今猶有魚朝恩是遂非也動詢黄閤老謂郭尚父肯慮白登圍謂永泰元年事儉約前王體方鎮之厚歛未有不始於人主之貪者故曰儉約前王體也斯真稷契自許語朝廷光輝則衰朽芳菲矣抱被宿何依切表弟眼冷看征葢廻抱朱幡登陸哭韋大夫之晉叙致入神公在䕫州有送韋中丞赴湖南八韻觀此篇則當日乃遥送也故曰峽内憶行人貢喜音容間大夫馮招病疾纒馮公豈不偉白首不見招南過駭倉卒六句公南行依韋至則適韋已没似踐巨卿之約永無再見之望犀牛蜀郡憐言化為異物也韋經亞相傳大夫帟幕疑風鷰風鷰即石鷰此句亦喻已之無所托也喧卑俗事牽追恨至之不早誰繼方隅理健兒擁旌相望如之晉者間以一二衣冠分閫故有誰繼之歎舟中夜雪有懐盧十四侍御弟朔雪夜紛紛㸃夜雪不識山隂道舟中夜雪又暗用夢中不識路聽雞更憶君懐字暮冬送蘓四郎徯兵曹適桂州盧綰須征日謂懐恩樓蘭要斬時謂吐蕃嵗陽初盛動暮冬王化乆磷緇從王化磷緇收出適桂州何等家數風疾舟中伏枕書懐三十六韻奉呈湖南親友鼓迎非祭鬼謂多淫祀也疑惑尊中弩入伏枕瘞夭追潘岳二句潘鄧岳林借對奉贈蕭二十使君蕭二十惜失其名以詩中所陳觀之其誼士矣蕭之與公非獨久故其義烈亦有過人者歴叙其事正見已之不輕受人惠也嵇康有故人謂存嚴氏之孤也食恩慚鹵莽二句乃分自謂奉送二十三舅録事之攝彬州崔偉彬州逺惡非髙門清流所宜屈故先慰其勞末復勉以所至必當盡其職也泥塗豈珠玉應知名衰老悲人世應盛族舟鷁排風影舅林烏反哺聲甥勾漏且南征彬猶未逺彬州頗凉冷况頗宜人送魏二十四司直充嶺南掌選崔郎中判官兼寄韋韶州此掌選乃土人首領送趙十七明府之縣連城為寳重趙茂宰得才新之縣燕子來舟中作如今社日逺看人來字情味可憐處處巢君室一連是設為燕語與上湖南為客相應歸雁二首第一首今年又北歸又字暗藏久客在内雙雙瞻客上一連反從雁上𢃄出自己用筆敏妙小寒食舟中作老年花似霧中看此句貼寒食清明二首次篇尾句與起句接對作章法發潭州賈傅才未有一連賈傅褚公猶然流落豈特我遭薄俗止有岸花檣燕如相識哉髙明前後事後字自謂也如賈褚者置其大節即文章翰墨亦一代光華然放逐流落曾無過而問之者此前後有同慨也廻棹前賢身係天下安危故皇皇不已若我散材或者猶繫一物是以向者亦嘗畏天憫人勞勞為客今多無成類荆湘之放逐無魯連之排觧則吾命可知自當息心廻棹不待如宿昔之嘗試矣葢前此泊岳陽城下猶有圖南未可料變化有鵾鵬之語至是乃無意於用世也為客費多年不廻也强飯蓴添滑下滑字妙與强字相應清思漢水上轉入廻棹几杖將衰齒以下皆自私以取閒適歸於安命矣篙師煩爾送廻棹收朱夏及寒泉自私處寒泉即上漢水峴山贈韋七賛善湖南詩所謂同病相憐也北走闗山開雨雪指韋言當歸之時也南遊花栁塞雲烟杜自謂洞庭春色悲公子指韋公子即所謂秦川貴公子也蝦菜忘歸范蠡船范蠡船杜自謂蝦菜亦何足以儗陸海乃至以此忘歸則秦川之饑饉荒亂可知矣言韋而杜之自悲在其中酬郭十五判官藥裹關心詩總廢頂卧病束上花枝照眼句還成頂春生起下按郭詩序云杜員外兄垂示詩因作此寄上句還成指前所示郭詩也自得隋珠覺夜明酬字衡州送李大夫七丈勉赴廣州斧鉞下青㝠大夫北風隨爽氣下青㝠日月籠中鳥二句自傷垂老飄零却翻作壯語真怪怪竒竒也日月不居長似籠中之鳥乾坤至大還同水上之萍下三字皆喻公之身世遭亂流離雖欲歸朝不能奮飛也若解成籠中鳥比日月水萍比乾坤成何文義耶王孫大人行指李垂老見飄零結句更不須多語言如此顯位加以故舊而忍視其窮老耶長吟江飛競渡日江疑作虹瞿唐懐古西南萬壑注水勍敵兩崖開山地與山根裂下江從月窟來上削成當白帝首空曲隱陽臺尾空曲對削成不弱送司馬入京曾沗從臣猶以為恥况兩省之長久侍丹墀曾無獻納使賊遺君父往日憂時之態將以誰期欲其匡君國而畏友朋也乆客羡歸秦羡歸秦非懐安為致君耳與嚴二郎奉禮别商歌還入夜伏旅人遥聞盛禮新指奉禮巴西驛亭觀江漲呈竇使君二首第一首朝來减半愁半注作片按半字有味遣憂前後一片說憂只領連見遣字意臨危憶故人憶古人自咎不能如古人之納諌按顧陶本作故臣第七句留作營則是指明皇也然此篇云亂離又甚自屬代宗幸陜之事可憂甚矣所可遣者受栁抗之諌起郭子儀於閑廢或不至遂為隋氏差可遣懐耳從顧本為是注家誤以故臣為曲江不知凡故舊之臣皆是傳所謂今急而求子也向之所以致此變者原於拒諌諍棄元臣亂至覺悟亦已晚矣此聫其懲而毖後患也紛紛乗白馬番將反者非一也攘攘著黄巾民皆畔矣早花此等氣脉雖不易學亦何可不知盈盈當雪杏一連杏當似雪梅待香飄也用兩虛字貼出早意欲活正與上未字呼應盈盈艶艶與暗字對巴山巴山遇中使二句中使猶自竄巴山則外廷皆不及扈從可知天寒邵伯樹二句注引海録云云按舍鄭箋而引海録好僻者為之也望仙臺亦當引神仙傳河上公事羣臣安在哉羣臣不審所在則乗輿亦幾乎危矣安在言職司何事使人主至此落句不敢斥言之詞也收京衣冠却扈從二句車駕還而後有扈從之臣明前此已不顧其君也剋復成如此倒裝句言成如此剋復也如此剋復去亡國一間若非竭力扶持京邑仍危於累卵焉耳犬戎内侵患猶在外衣冠悉畔則偶然變作即京城不守矣此深有望於數公而謂幸不可屢邀也花底確是花底體勢莫作委泥沙底字亦足栁邉定翁云似庾信妙在起句只道梅花發二句破邉字入神漢南應老盡二句為邉字縱言之也奉送崔都水翁下峽鳴橈總發時下白狗黄牛峽峽朝雲暮雨祠既下遣悶戲呈路十九曹長前四句叙不能相過以見悶之難遣也隨章留後新亭㑹送諸君因題零雨詩零雨切㑹送孫子荆詩云傾城逺追送也東津送韋諷攝閬州録事雖曰偶然推薦亦必克舉其職但威嚴又不可概施後四句凡三層意聞説江山好閬州憐君吏隱兼隱字承江山寵行舟逺汎東津怯别酒頻添送推薦非承乏攝操持必去嫌録事他時如接縣二句結歸錄事上㸃化得風雅韋杜名駒豈容以鄉里小兒靣向人也客舊館此非公無此曲折風幔何時卷初秋尚有寒砧昨夜聲重來始聞無由出江漢舊館愁坐終日憂奔走反映坐字陪鄭公秋晚北池臨眺刺詩此篇疑非公語異方初艶菊以下又就秋晚致慨歡娛銷日功業陵遲此公所為無補自責者也去蜀五載客蜀郡伏已黄髪如何關塞阻伏安危轉作瀟湘遊伏隨鷗世事已黄髪伏淚流安危大臣在二句正言若反前四句即所謂小臣議論絶老病客殊方也放船收㠶下急水二句誰能如此突然而起卷幔逐囘灘卷幔起第三暗字已泊城樓底二句地險人絶驚懼萬端遇城即泊何待晚耶夜色句與暗字反應哭台州鄭司户蘓少監起二句言平生故舊惟二君最憐我今誰復可得也夜臺當北斗蘓泉路著東吳鄭得罪台州去鄭移官蓬閣後蘓榖貴没潛夫八哀詩長安米萬錢凋䘮盡餘喘道消詩興廢應文章句心息酒為徒應豪俊句許與才雖薄天寳中决勝風塵際收京後慘淡閟隂符蘓擺落嫌疑乆鄭天地日榛蕪應誰憐我惠義寺送王少尹赴成都衣冠起晚鐘晚鐘動衣冠皆起也避地詩書遂墻壁遂言豈遂以此終耶奴僕且旌旄且言且待其後也與下會見二字呼應神堯舊天下二句謂成都復為吐蕃所䧟當是永泰元年詩趙本云至徳二載疑誤朝享太廟賦桐花未吐孫枝之鸞鳳相鮮雲氣何多宫井之蛟龍亂上四語又是大明以後格調有事於南郊賦三賦中此篇為多然未能粹然及於古也賦料揚雄敵不乃夸乎雕賦通篇自寓得晉宋作者風力唐興縣客館記亦有志於復古特力之而不至義門讀書記卷五十六

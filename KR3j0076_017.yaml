body:
  text: 義門讀書記卷十七翰林院侍讀學士何焯撰前漢書陳勝傳趙王將相相與謀曰至可以得志於天下趙王將相與宋義之屬皆戰國之餘謀初無逺略所以皆敗死無成韓廣王燕又效尤武臣者也今假王驕至因相與矯陳王令以誅吳廣田臧誅吳廣而敗項籍誅宋義而勝材固殊也項籍傳乃教以兵法至又不肯竟藝文志兵法形勢中有項王一篇而黥布置陳如項籍軍髙祖望而惡之蓋治兵置陳是其所長故能力戰摧鋒而不足於權謀故其後往來奔命卒為人乘其罷而踣之所謂略知其意而不竟者也乃遣當陽君蒲將軍將卒二萬人度河救巨鹿至擊秦軍汙水上巨鹿之役與昆陽不同昆陽衆而不整天人交助致死一戰莽師奔潰巨鹿則秦將習兵長圍先合當陽君蒲將軍雖小挫其鋒未有所損也苦戰至九絶其甬道而後南北不能相救章邯畏縮王離偏敗始解巨鹿之圍楚益進秦益却復大破之汙水乃降其二十萬衆克敵之難蓋亦古今僅見也蘇角當是章邯禆將此役當合陳餘傳觀之楚人既連勝并破章邯於是諸侯亦皆縱兵擊秦乃虜王離也羽隂使九江王布殺義帝殺義帝豫漢以東兵之端於是田榮弟橫收得亡卒數萬人反城陽田榮首難且連彭越橫又繼之為髙祖驅除功莫先於齊也羽聞之即令諸將擊齊至南從魯出胡陵羽不急爭關中者以漢去彭城逺齊梁逼處也故擊田榮則留久而漢入彭城擊彭越則再行而漢破滎陽東騖西馳使漢得乘其敝不知輕重先後故耳乃為髙爼置太公其上至羽從之此事獨見之羽傳得體漢王乃以魯公號葬羽於榖城羽受命懷王救趙時以魯公為次將被以魯公號正以正楚君臣之分終擊楚之弒義帝者之實也陳餘傳皆徙其民河內夷其城郭徙民夷城恐兵去而還復為趙守也趙相貫髙趙午年六十餘故耳客也怒曰吾王孱王也髙祖嘗從耳遊髙午故等夷客也是以怒田儋傳還攻殺濟北王安項羽傳云彭越擊殺濟北王安誤也此云榮還攻殺安與異姓諸侯王表同案越傳亦止云下濟隂以擊楚韓王信傳楚漢春秋韓王本名信都見史通按信都之信與申同然則當讀為平聲與淮隂侯名異也小顔功臣表留侯下亦引之增世貴至不能有所建明處平世事英主大抵用此術蓋又張安世之次也韓信傳請言項王為人也至三秦可傳檄而定也韓信用兵古今無及者然不過知彼己耳不聼廣武君策至乃敢引兵遂下或問使陳餘果用廣武君策信必不敢遂下將如何曰留張耳以牽綴之東兵取燕繞出其左信所出竒兵二千騎者至立漢赤幟二千此即廣武君兵法用之於對陳者也足下所以得須臾至今者以項王在項王即亡次取足下古今不出此語彭越傳乃拜越為魏相國擅將兵略定梁地擅將兵者雖拜越為魏相國不使受魏豹節度得自主兵也黥布傳臣請與大王杖劍而歸漢王布兵既破乃間行歸漢今方全有淮南南面稱孤安得預要之杖劍歸漢劉氏寓言之疑為不徒也吳王濞傳方今為將軍計至破吳必矣鄧都尉之謀即師髙祖破黥布之餘智唯以梁委吳則因乎當日之事勢也楚元王交傳常為穆生設醴師古曰醴甘酒也少麴多米一宿而熟不齊之按醴在周禮六飲中黍粥也與酒異不用麴也德德數責以公主起居無狀至承指劾德誹謗詔獄起居無狀即丁外人私侍蓋主事中冓之醜故御史劾以誹謗向吏劾更生鑄偽黃金繫當死鑄作黃金不成與鑄偽金者殊科吏誤當之也徴堪向欲以為諫大夫此向字當作更生史駮文下太傅韋玄成至更生坐免為庶人貢公共劾更生亦平生之纍易曰飛龍在天大人聚也飛龍以喻賢人師古以為聖王正位臨馭四方則賢人君子皆來見此後儒釋經之固亦非向引易本意歆在漢朝之儒唯賈生而已儒林傳漢興梁太傅賈誼修左氏春秋傳為左氏傳訓故授趙人貫公歆欲建立左氏春秋是以推賈生外內相應內謂陳發祕藏外謂民間桓公貫公庸生遺學以陷於文吏之議脅以吏議則反淺矣初歆以建平元年改名秀至後事皆在莽傳載其改名於哀帝之時所以見歆樂禍非望素不能乃心王室卒為王莽所殺不得以佯愚忍垢志存匡復為解也贊劉氏鴻範論至古之益友與多聞指上鴻範論七略三統歷譜言山陵之戒指明梓柱則加以直諒也於今察之謂赤眉之亂無不被發七略三統并子歆所著連類舉之而獨申言向之直諒則褒貶亦具其中矣季布傳布果大怒待曹邱至布乃大説既為俠則其交必雜此曹邱所以卒容於季布也布弟季心至聞關中漢初遊俠之盛季布袁盎扇之也自田竇既敗公卿不敢致賔客遂多閭里之魁矣欒布傳於是嘗有德厚報之至號曰欒公社至於燕齊之間皆為立社則其為政必有過人者不忘恩怨乃小疵也田叔傳叔為漢中守十餘年欒布再為燕相田叔守漢中孟舒守雲中皆十餘年此漢初所以吏盡其職得與民休息也贊及至困厄至其畫無俚之至耳季布能死則君臣之義震耀於千載之下區區為一時名將何足以方之槩以婢妾賤人者是讀論語而未明孔子之本意者也蕭何傳秦御史監郡者與從事辨之何乃給泗水卒史以乃字觀之則何因事辨乃得由縣主吏掾給郡卒史也何進韓信至使給軍食進韓信是謂致賢填撫該飬民之事諭告使給軍食則收用之事也而發縱指示獸處者人也史記作發蹤洪景伯𨽻釋引漢碑多以縱為蹤辨顔注為非曹參傳治道貴清淨而民自定居敬而行簡儒者何嘗不清淨乎擇郡國吏至即召除為丞相史謹厚長者其為治乃能務與秦吏相反年又長大非唯歷事多其人親受秦法酷烈之害必事事思順民情與之休息也贊何以信謹守管籥鄼文終侯以信謹武鄉忠武侯以謹慎一代宗臣之家法也張良傳東見倉海君注中晉灼以為海神可備詩料乃因老父為黃石復訛倉海君是海神也臣聞其將屠者子賈豎易動以利沛公後以陳豨將為易與猶良故智也漢王下馬踞案而問曰至楚可破也固陵之議權輿於下邑矣因舉燕代齊趙代宋大字本亦誤作伐此顯誤非班馬異同處當刋正酈生曰昔湯伐桀至楚必斂衽而朝此項羽之所以敗者所謂老生之常談也自齊桓晉文以來已四百年豈有拘守此轍有混一之規反紛紛樹兵乎周勃傳上廢栗太子亞父固爭之至即何以責人臣不守節乎亞父非唯真將軍乃真宰相也樊噲傳從擊秦車騎壤東此秦字當為雍史駮文酈商傳沛公為漢王賜商爵信成君此復云賜商爵信成君當即樊噲傳所謂賜重封也寄欲取平原君姊為夫人蘇林曰景帝王皇后母臧兒也按外戚傳武帝即位尊太后母臧兒為平原君則當如監本汪本無姊字為與注合寄欲取之蓋臧兒更嫁田氏而復寡之時時武帝立為皇太子已三年矣周昌傳初趙堯既代周昌為御史大夫至乃抵堯罪趙堯擠昌而代之位自以至巧不知其禍乃伏於此所以為刀筆吏之智哉酈食其傳臣聞其下乃有臧粟甚多聞之中州人云秦人因土山窖粟其下不與今他處倉廪等故曰聞其下乃有藏粟杜太行之道距飛狐之口此似後人依托之語杜太行之道乃秦人規取韓趙舊意當時漢已虜魏王豹禽趙歇河東河內河北皆歸漢何庸復杜太行之道以示諸侯形勢乎燕趙已定即代郡飛狐亦非楚人所能北窺無事距守壺關近太行之道何庸杜此兼距彼乎與當時事實濶逺婁敬傳乃營成周都雒至令後世驕奢以虐民也周公營洛止以為朝會諸侯之區非遂居之也則道里均之説長無德易亡不欲阻險乃後世儒生推測聖人之過周公本意夫豈然哉然言此於髙帝之前著都洛之非便則易以入耳矣因言胸奴河南白羊樓煩王至輕騎一日一夕可以至至武帝乃使衛青奪取其地為朔方郡叔孫通傳號稷嗣君稷嗣君當謂如六國時稷下也注中張晏説非髙紀載孟康注以為邑名者亦非獨徐廣注史記得之臣願頗采古禮與秦儀雜就之此言亦未可盡非淮南厲王傳大王欲屬國為布衣屬國當謂傳國於子息夫躬傳方今丞相王嘉至何益禍敗之至哉此真妖言橫議非所謂憂盛世而危明主者比遊曠逈兮反亡期師古曰言一死不可復生非也乃髙舉逺遊不復反顧之意觀上撫神龍之文可見班史所謂如其文者指上寃頸折翼若為其萌兆耳萬石君石奮傳諸子孫為小吏至二千石者十三人至上史記有更字若一時有十三人為二千石慶安得全周仁傳溺袴期為不潔清為郎中令侍中不敢溺乃為小袴以藉慎之至也賈誼傳股紛紛其離此郵兮至何必懷此都也但以自譬則皆追傷屈子之辭耳當從李注顔説贅矣史記故作辜文義尤明􅶤者盤桓不去謂未能逺乎濁世即下懷此都也當從蘇音作槃病非徒瘇也至疏者或制大權以逼天子如此則數傳之後文帝子孫亦日疏矣又將發憤於跖戾乎數言似昧大體惠王當作哀王文帝元年齊哀王薨子文王則嗣故曰今之王者兄子之子若惠王乃文帝親兄也前人皆不覺其誤通鑑惠王下有之子二字正與前親兄之子句相應刋本脫誤耳爰盎傳陛下居代時至故病死盎之所言縱橫抑揚雌黃在口所謂佞人亂義者也郎署長布席郎署長亦從幸上林職司布席耳未必天子幸署也如淳注恐非亡何猶言亡問也對上刻治句吳楚反聞至宜知其計謀是時不直錯者必已多矣及反聞既至錯不亟亟籌兵食進賢智乃先事私仇此固舉朝之所切齒也太史公曰諸侯發難不急匡救欲報私仇反以亡軀可謂切而中矣公幸有親吾不足纍公盎艱嶮中有此語人所以爭為死乃之棓生所問占秦時棓生景帝時猶以術自食鼂錯傳一曰得地形二曰卒服習三曰器用利為將者必先使卒服習器用利而後其兵可用今反先言得地形者蓋當文帝之時去創業未逺沿邉之郡士皆習戰特不知險易異備故中國長技雖多而不能以長制短皆昧於地形使之然耳得地形則險易異備者可講盡中國士卒器用之長胸奴惟我所制矣此巧拙之門所以首論之臣聞秦時北攻胡貉至有背畔之心恐文帝懲秦戍卒創亂不敢徙民實塞下故先將秦所以致亂之故分疏明白然後議者不得而撓之也以計為之也計為之言自計亦為利而願為之也時賈誼已死對策者百餘人唯錯為髙第孟堅蓋亦不滿斯對言誼已死者所謂無豪易髙也錯乃穿門南出鑿廟堧垣錯此舉亢而踈其不敗幸矣學刑名而不先自律於無過耶誠令吳得豪傑至故相誘以亂當文景澤被海內之時而反誠豪傑所必不為盎言知大計非徒一時為諛以投主意鄧公曰吳為反數十嵗矣至臣竊為陛下不取也即敘鄧公語為斷案公卿言鄧先張恢生史記作張恢先則師古以鄧先為先生者是也汲黯傳至如見黯至其見敬禮如此自為太子洗馬即以莊見憚帝固已信之於素矣非精誠無以得此於君臣之際也公為正卿至而公以此無種矣紛更髙帝寬大之約束而以嚴急苛細繩天下使民犯刑不已迫而為盜故罵為當門誅無種也大將軍青既益尊至遇黯加於平日武帝元舅猶為揖客况大將軍以后弟暴貴乎此亦非如袁盎之徒色莊以取名一朝故衛青敬信之也上以為淮陽楚地之郊也召黯拜為淮陽太守懼梁楚之間有變以黯鎮定之耳此固重寄也賈山傳又為阿房之殿阿房注中後一説近是然史記始皇本紀云阿房宫未成成欲更擇令名名之作宫阿房故天下謂之阿房宫則阿房乃地名并近也之解為贅其地在渭南上林苑中東方朔傳所謂阿城其遺址也鄒陽傳懸衡天下注中如淳説正與下句詞義相屬宜從之然則軻湛七族監本亦無荆字以注尋之是也不必以史記添補齊人公孫玃謂濟北王曰至徙封於淄川公孫玃事與鄒陽相似牽連書之枚乘傳禍生有胎至先其未形也時吳王初怨望故以禍生有胎言之漸靡使然若所欲為而長禍胎者也據其未生先其未形變所欲為而絶禍胎者也石稱丈量則深計得失之全言諸侯反天子從逆必凶不可區區較量形勢利鈍當舉其全以論之乃其間轉禍為福之道也枚乘復説吳王至願大王孰察焉前篇儒者之文此作逈别髙下劉攽以為後人以吳事寓言是也臯奏賦以戒終臯為賦善於朔也奏賦戒終有詩人之則非徒俳倡嫚戲也故云善於朔路溫舒傳廷尉光以治詔獄按百官公卿表元鳯六年廷尉李光注云解光誤也解光成哀間人仕至司𨽻校尉亦非廷尉也臣聞秦有十失其一尚存治獄之吏是也霍光既摧上官之後頗峻刑罰廷尉王平坐縱不道下獄棄市所謂宜改前世之失者溫舒不敢斥言故以秦失尚存立論深者獲公名平者多後患皆隱以譏切昭帝時事也當以杜延年黃霸傳中語參觀之唯陛下除誹謗以招切言霍山言諸儒生喜狂説妄言不避忌諱大將軍常仇之則所謂除誹謗以招切言者亦反霍氏之政也溫舒子及孫皆至牧守大官建武永平吏事深刻故班生有味長君之言著其後福後又於贊辭致意也田蚡傳御史大夫趙綰請毋奏事東宫至而免丞相嬰持之太迫往往難作此亦沾沾自喜之效也而嬰失竇太后至諸公稍自引而怠驁一念所激相驅致禍此自喜多易不知時變而妄動之鑒也灌夫傳夫不好文學至橫頴川以夫所行雖廉潔無玷猶將不免况自蹈於法所必取乎兩人相為引重至恨相知之晚嬰與夫以氣合亦勢交也雖無田蚡二人他日或偕復得志轉以爭權利相傾軋耳夫愈益怒至語侵之不以服解前何恭遽怒且侵之後何倨進退無據欲為好而反致郤與魏其之強夫往賀一也魏其子嘗殺人至由此大怒嘗讓相位又活其子田於何有不饜其欲耶當此時魏其特恥於以勢奪之乃其身固未能超然於勢利之外則因所處盛衰以為屈伸者所以自保而待彼之衰也惜其慕儒術之粗不學黃老耳與長孺共一秃翁何為首鼠兩端安國行五百金於蚡得進故蚡責其不専助已劾繫都司空嬰外家故繫宗正屬乃劾嬰矯先帝詔害史記無害字此衍文鄭注迂鑿五年十月悉論灌夫支屬至欲殺之竟死史記注徐廣曰疑非五年亦非十月司馬貞曰按武帝四年三月蚡薨竇嬰死在前今云五年故疑非也按是時雖以十月為正月然未嘗改時故紀書四年冬魏其侯竇嬰有罪棄市續書云春三月乙卯丞相蚡薨是此傳但誤以四年為五年其云十月十二月皆是也司馬貞之勘校審矣迎安霸上謂安曰至厚遺金錢財物蚡為太尉多受諸侯王金私與交通其罪大矣然安之入朝在建元二年武帝即位之初雖未有太子而春秋鼎盛康強無疾身又外戚非王誰立之言狂惑所不應有疑惡蚡者從而加之韓安國傳從行則迫脅至人馬乏食此老謀而深見兵勢之語安國為人多大略至皆廉士賢於己者唯其素貪故捐廉恥而以五百金遺田蚡也其能舉廉士殆亦因當世所取舍耳安國既斥疏至會其病卒安國將相而顛墜壺遂亦將相而病卒事適符合故於安國傳末終言之亦悲其命也深中謂存心深厚贊然嬰不知時變至待時而發太史公既云皆以外戚重復申之曰魏其之舉以吳楚武安之貴在日月之際其區分兩人賢不肖尤核景十三王傳河間獻王德實事求是四字是讀書窮理之要其學舉六藝立毛氏詩左氏春秋博士凡經獻王皆立博士此二者以王朝未立其學故特著之也博士謂毛公貫公王身端行治至宜諡曰獻王獻王策諡之辭褒崇若此五宗世家注中杜業之語知其無稽後元怒少史留貴少史即少使外戚傳有長使少使主供使者中山靖王勝臣聞悲者不可為絫欷一篇此對疑亦文士寓言非當日辭令也李廣傳典屬國公孫昆邪為上泣曰至恐亡之昆邪乃可謂愛材矣按公孫賀傳北地義渠人賀其孫也廣請霸陵尉與俱至軍而斬之以此事觀之廣之器量固不過終於偏禆矣故怒形則千里竦至數嵗不入界怒形則千里竦言當使敵國畏之如是報忿除害報盜邉之忿而大創以除民害責其立功自贖毋徒謝罪非謂素有嫌怨者不妨殺之以快忿也及胸奴數年不入右北平則功亦多矣故武帝遂不復問斬尉事廣出獵至終不能入矣吕覽精通篇云養由基射虎中石矢乃飲羽誠乎虎也與此相類豈世因廣之善射而造為此事以加之歟段成式亦已疑之以為李廣數竒孟康曰竒隻不耦也師古是孟説仍音所角反則讀數為本字者非青欲上書報天子失軍曲折按廣失道非喪師也軍曲折上衍失字史記無後見白廷玉湛淵靜語與豫意同李蔡以丞相至當下獄自殺先敘李蔡而後終李敢事李陵傳出居延北行三十日至浚稽山止營舉圗所過山川地形使麾下騎陳步樂還以聞以圖為信也浚稽山出居延行三十日始至程大昌北邉備對引應劭云在武威塞北踈矣軍居兩山間上云東西浚稽故云居兩山間期至遮虜鄣者相待遮虜鄣在居延言李陵教單于為兵以備漢軍至母弟妻子皆伏誅史記云胸奴單于以其女妻陵而貴之漢聞族陵與此先後不同蘇武傳其冬丁令盜武牛羊衛律為丁令王使人盜之以困武冀其終降以分謗也王必欲降武時陵為右校王故因其稱武所得賞賜盡以施豫昆弟故人士未有不廉而能著節者也乃圖畫其人於麒麟閣至列於方叔召虎仲山甫焉陵之降則書隴西士大夫以李氏為愧武傳末則係以圖畫形貌列於方叔召虎其為勸懲也至矣自丞相黃霸至以此知其選矣極淋漓之趣衛青傳青至籠城至惟青賜爵關內侯以深入故首虜不多得賜爵明年青復出雲中至遂取河南地為朔方郡出雲中則若向單于庭者忽西至隴西攻其無備所以遂取河南地也劉敬傳云胸奴河南白羊樓煩王去長安近者七百里輕騎一日一夕可至攻瑕紓患是役為得勝算矣令青將三萬騎出髙闕至即軍中拜青為大將軍胸奴右賢王怨漢兵侵奪其河南地數侵擾朔方此出専以擊走右賢王終前功也前出雲中而忽西焉知不出朔方而忽東乎亦令兩將軍出右北平者綴單于疑右賢王也不著兩將軍功罪未嘗使深入故蘇建趙信并軍三千餘騎至奔降單于趙信為前行雖與右將軍并兵後繼未至故衆寡不敵而敗閎安曰不然至不當斬閎安議是青幸得以肺附待罪行間至不亦可乎青語固保身之法於將略則非也將但當明功罪所歸使建果當斬何嫌於専戮乎霍去病傳直棄大將軍數百里赴利將字衍史記無之是嵗失兩將軍至青賜千金於此傳中終青與蘇建事去病與合騎侯敖俱出北地至所殺亦過當兵勢分則易敗是役票騎西出北地幸士馬精故得無敗然詔書稱其能舍服知成而止則不過疾略遄反非能有力戰之功也東出者為左賢王所圍雖名將幾沒胸奴中矣去病乃馳入至盡將其衆度河此舉實有膽智生平之功最大去病始為出定襄至令青出定襄代郡雲中皆直單于庭大將軍出定襄反遇單于者時單于度幕逺徙非故所居地李廣傳云大將軍出塞捕虜知單于所居乃自以精兵走之故與始時捕虜所傳者不同是役若二將合兵票騎率力戰深入之士窮追則單于敗散之餘幾可獲矣而縱五千騎往當胸奴此五千騎乃遊軍也漢益縱左右翼繞單于至西北馳去時單于止以精兵待幕北與漢兵多少不相當漢又未罷戰必不利漢已縱左右翼繞之不去必為所取故冒圍走也得胸奴積粟食軍軍留一日而還云得胸奴積粟食軍明所齎糧亦已盡故留一日即還此不能深入久留之驗也下詔書言票騎之功亦云取食於敵卓行殊逺而糧不絶蓋絶幕深入車重必不相及輕齎有幾其得敵糧乃所謂天幸不困絶耳後之行師者慎無自犯此敗危之道哉出代右北平二千餘里青出塞千餘里追單于又二百餘里而歸而去病出塞二千餘里由力戰深入之士皆屬之也兩軍之出塞至不滿三萬匹票騎太深入則東軍馬死且盡也書馬死之多所亡士衆可以意求此史家隱顯互見之辭也上文固云殺傷大當然於天下未有稱也大將軍將略以伍被所答淮南王問參觀乃備不可獨據於天下未有稱之語此即出太史公淮南衡山列傳也起冡象廬山云廬山當作盧山胸奴傳楊雄上書曰運府庫之財填盧山之壑而不悔注盧山胸奴中山也以上文象祁連山例之自明趙破奴傳征和中戾太子敗衛氏遂滅戾太子傳太子未斬江充衛伉先坐巫蠱死贊自魏其武安之厚賔客至何與招士此言得之其言主父偃滅宣於上乃在名位未盛之時也武帝雄猜拔擢一人必欲恩自己出丞相猶不敢薦士况為將握兵者乎董仲舒傳下帷講誦至非禮不行可謂博學於文約之以禮有漢一代醇儒矣永惟萬事之統統紀也總也注釋為緒者非此處本意觀第三策中統紀不終之語可見春秋深探其本至而王道終矣治亂興廢在已而德教之被又必有序得其本而善推之則災異息而受命之符自至先王所由以適於治盡乎此也設誠於內而致行之不誠無物內多欲而外施仁義必無冀也當與汲直之語參觀選郎吏又以冨訾漢初訾十算以上乃得官景帝後二年更令訾算四得官詳見景紀各擇其吏民之賢者至可得而官使也上所謂英俊乃能明王道輔世長民者也養之不可不素此吏民之賢者以儲郡守縣令之材承流宣化者也求之不可不廣蓋聞善言天者至必有驗於今四語荀卿性惡篇之文明於天性知自貴於物至然後謂之君子此數語於致知立志居敬力行無所不包故孔子曰不知命無以為君子此之謂也董子所謂知命以天命之性言之故盡小者大慎微者著昭烈遺戒其子曰勿以惡小而為之勿以善小而不為其天資之美合乎此矣若宜少損周之文致文致謂文敝之極也然致字屬下句讀貢父希元之説並同似宜從之夫天亦有所分豫至大夫之所當循以為行也上之人去其好利之心以為立教之本所謂正心以正朝廷當世之務孰先於此此武帝所當虗心以改去其多欲而後仁義可施者也其止言正百官以正萬民猶孔子對哀公言在下位之意窮急愁苦而上不救至安能避罪平凖書酷吏傳相為表裏始終數語該之矣今師異道至民知所從矣謂放黜黃老申韓之説而専以仁誼教化為治也揚子法言反覆數千言不出此數句公孫𢎞治春秋不如仲舒公孫𢎞傳少為獄吏年四十餘乃學春秋雜説贊至向曽孫龔篤論君子也以歆之言為然劉歆末路披猖班氏恐言以人廢故復以龔所論定者佐之義門讀書記卷十七

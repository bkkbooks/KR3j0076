body:
  text: 義門讀書記卷三十六翰林院侍讀學士何焯撰河東集沛國漢原廟銘三銘皆當時體昔在帝堯云云發端本典引來在後人若此牽合尤無謂又俾九臣之後九作元且夫以斷蛇之威以下言今日亦非遂無功德羣蛇輔龍四語倒敘變換有義意以翊天門翊作羾較勝塗山銘如此文豈可並存以為大圭之玷天地之道尚德而右功至商周讓德焉論至卑淺不根是以周穆遐追遺法周穆即可以比禹乎夀州安豐縣孝門銘似蔡伯喈其體則表忠觀碑文所由也武岡銘御史中丞柳公綽練立將校兵素不練又無先聲而偏師别屯未有不往遺之禽者也凶渠同惡革面向化嚴綬攘公綽之功而史仍之賴此文而後世猶有考也以退之與公綽書觀之非私其族人而為者以示我子孫億萬年億上有彌字井銘古直舜禹之事嚮者丕若曰至其事則信亦小巧堯知其道不可退而自忘四句文法頗晦理有所短也三載遏密其果忘堯乎以鄙語侈為新竒而反謂經言非實録亦可憫笑而堯隤然聾其聰至加少矣此直小兒語也宦董袁陶之賊生人盈矣宦董袁陶成一語乎謗譽此二篇頗可觀乃法韓李者其不出栁子决也故可寵可富而人猶謗之猶字不如作彌字然而世之人聞而大惑至在上而必彰也似可已咸宜爽朗鞭賈其賈宜五十宜作直其節朽黑而無文文下有材字以求賈技于朝朝下有者字此文何味之有不作也可吏商此文與謗譽二篇亦相類或非柳所作以故貶吏相逐于道貶作敗何以利為也利下有教字東海若是其永州擬莊之作毛頴傳後題而學者得之勵其有益于世歟之字作以裴瑾崇豐二陵集禮後序起五行甚有筆力與文物以受方國與字未詳昔韋孟以詩禮傳楚至咸以為榮因其書而并及其祖宗兄弟之美此古人作序正體瑾字封叔此下太煩柳宗直西漢文類序發端本荀仲豫合而為史史下有記字欲采比義㑹年長疾作李于義字為讀森然炳然若開羣玉之府六句㸃染類字然似少味殷周之前其文簡而野文莫盛于周降而諸子屈宋其變盡矣漢氏得其緒耳何謂野乎貞元間文章特甚至末李云一結即得孟堅筆意序後復系一序文之變體從史書中來楊評事文集後序後序故起處但述其制作所詣此篇多法藝文志以為詞然稍濬彥和而清之爾未及于古也濮陽吳君文集序武陵又論次志傳至末已有此故可與王文憲集序之體異王氏伯仲唱和詩序雖古猶今也今作乏此作無所取送崔羣序稟至和之至者作稟和氣今將寧覲東周告寧漢分吉凶寧覲二字後人不可襲用送邠寧獨孤書記赴辟命序為壯夫捧腹捧腹句是當時語未刮磨者此篇似符載得意文送幸南容歸使聨句詩序當時體送苑論登第後歸覲詩序如此作宜從削略矣送蕭鍊登第後南歸序早嵗文之最雅潔者送班孝廉序相國馮翊王公送嚴公貺下第序但云馮翊公則王字衍此序宜削送獨孤申叔侍親往河東序溫清奉引之隟清與凊古字通用此序即步趨梁補闕之徒所以淺薄柳子少年不先沉浸于經而遽為幅尺所限永州以後始開廣矣送豆盧膺序而恆以幼孤幼孤疑作孤幼送趙大秀才序辭㫖淺鄙吾豈丐夫𨽻人哉同吳武陵贈李睦州詩序徑拔而未淳古送薛存義之任序今我受其直我字衍以今天下多類此至勢不同也此言豈可公傳道歟此序詞稍偏激孟子雖發露猶自得其平也送李渭赴京師序豫嫉其不為是久矣嫉字不穩凡有此者皆氣質之偏也送嚴公貺下第歸興元覲省詩序而子之伯仲至如少習然稱之者亦有分寸于是文行之達達下有者字送辛殆庶下第遊南鄭序如此文宜悉削去夢得編集更少百篇則柳之道益光四貢鄉里而後獲焉昌黎再舉河東四貢懷有美餌餌下有者字神文章神作袖吾欲抑而不歎二句乃有此疲薾之句此序皆流俗人之見顧視曹偶則遂以為可矣若退之輩何送崔子符罷舉詩序文學移而從之文學作又舉仕將晚矣仕一作任觀下崔子之仕又何晚乎句究當作仕而戚其幼孤幼孤作孤幼再嵗不就選至其可厚而理乎柳猶有激而云蘇議事若此彌乖疏矣是且不見隆是字上有如字按蘇子瞻議學校貢舉狀本此雖然易其科隆其實則俗加美焉道加廣焉君子之論豈可限于一偏也送蔡秀才下第歸覲序未克决而忘之也决是决去之意彼莫莫者其有宰于人乎二句無可疑者理也不足信者數也其言進退無據故君子之居易俟命果哉末之難矣不為居易俟命者歎也此篇可削送韋七秀才下第求益友序所謂先聲後實者至是豈拙于為聲者歟故謬其詞使有司無解于失士實之不辨則是驅天下而趨于聲也巧于聲而拙于實豈士端使然哉有司乃自致之穀梁子曰五句直斤其無目而託為自反之辭賴引穀梁子數句粗存牆仞此篇詼啁之作要之輕薄作者不尚發端亦太尖送辛生下第序略發端見其過不在士中多平心之論絶私請而惟文之甲乙焉則二者之患去斯能為無私為守正焉耳郢乃不學而惟已之名是邀者也吾甚憤焉憤字過矣使辛生如是猶當有以平其心也憤不若惜字之穩送從兄稱罷選歸江淮詩序當時體殊凡近遂命從姪立從姪稱亦與經不合送從弟謀歸江陵序從伏波將軍念從弟少游哀吾志大之語拓為大章意味甚雋永獨見謀在衆少言下智字從少言生下後以智免歸智免對不智觸罪求其道之至者以相勵也伏後不謀道而道顯道可以不謀而顯乎抑又聞聖人之道至其可度哉應道之至者仍望其不以是終而相與振其祖宗之緒不誇不激情話可愛送表弟吕讓將仕進序勤而不忘斯可也四句繳可不可陪永州崔使君遊宴南池序連山倒埀至可謂無負矣此等摹寫是唐人常語愚溪詩序詞意殊怨憤不遜然不露一迹愚溪之上買小邱至為愚島詩有八題先詳敘于此皆山水之竒者伏後案夫水智者樂也愚字對面寧武子邦無道則愚五句愚字側面溪雖莫利于世六句轉出敘詩以愚詞歌愚溪至莫我知也愚字翻身出脫婁秀才花下對酒唱和詩序文甚秀拔而發端有不自貴重之病所學然也法華寺西亭夜飲賦詩序此永州文猶未能脫棄凡近序飲貟小邱貟作買衆皆據石注視二句間此二句在中間得情序棊晏元獻公題云此二篇古本或有或無如其第書之第字生波通篇少味凌助教蓬屋題詩序為當時體而不犯俗句惟求仁而得四字尚嫌奢濶不倫送韓豐羣公詩後序宗元常與韓安平遇于上京韓豐弟泰字安平通篇嚼蠟送婁圖秀才遊淮南將入道序無事為閒不死為生閒以心不以事生以道不以形送易師楊君序宜求專而通新而一者以為胄子師此專為仲子陵施士丐之徒加砭送徐從事北遊序抑處于逺至而至于是歟從北遊起論然則餘二者為之决矣纍纍如貫珠茍聞傳必得位至末掉尾生色振起全篇之勢遂拔出俗下所見之外李云起訖間架其源派亦與韓同而稍變其音節送詩人廖有方序皆竒怪上有其産二字為唐詩有大雅之道當時目沈宋所變為唐詩送元十八山人南遊序李云此篇即退之所病者黃鵠一去以下結尾傷格送文暢上人登五臺遂遊河朔序休上人休上人豈得復在髙僧之列人謂柳子于彼法最深密者彼蓋感其張已而許之也與竺乾鷲嶺角立相望而往解脫者角立相望謂清凉山形似鷲嶺也然摩滕法蘭所對明帝文殊自佛法未入中國以前即于此山攝化之語乃屬後人附會故作者不取潘云圓覺經云聲聞人具六通得入解脫凡有所傳皆是妄想得脫其由名之解脫去偉長德璉之述作稱引不逾選學于唐格亦凡語也此早年文不出唐格送巽上人赴中丞叔父召序不于其書而求之至况其意乎斯言也吾取以為陸王氏之徒砭焉其土汪汪也汪汪疑作汪衍一汪字求道者多半天下者字下有之字此篇奧㫖括于送琛上人敘中送僧浩初序而賤季札由余乎季札由余用夏變夷者也吾之所取者與易論語合不暇逺引與易之乾坤論語之本立道生猶有合否也無夫婦父子至不知韞玉也此遁詞耳天下豈有外倫而能盡性者乎且凡為其道者四句所長止此何至去人倫無君父以狥之哉然則柳子可謂昧于輕重者矣此篇柳子極用意之作送元皓師序劉禹錫引不足以發之故重有此敘送琛上人南遊序彼教之金隄底柱送文郁師序與送從弟謀文同趣借族兄弟以自抒胸臆送元舉歸幽泉寺序永州初變文體時刻削而不免局束送濬上人歸淮南覲省序語頗多凡俗古之贈禮必以輕先重以輕先重施之作序是佳語但于釋子殊無涉耳監察使壁記謹潔永州以前文之至者非必神之也蓋亦附之教焉謂非必神之者是其識有所偏于附之一言亦自相違反其失與䄍說同也洎執役而衛者役一作殳言衛則作殳為是四門助教㕔壁記後魏太和中太和元魏孝文帝時也貞元中王化既成王化既成四字太無歸宿余故為之記而由夫三子者始賀與歸則既見于文矣他不足稱由三子者始非文人清官則可以無書也武功縣丞㕔壁記凡以戰得爵至末德宗以後神策軍士倚中官為暴橫于畿赤結語微及之前路官之有丞何必煩引諸使兼御史中丞壁記亦無敗句嶺南節度饗軍堂記更簡百餘字則筆力益髙起處先敘軍府所領之大所寄之重乃記改作是堂緣起以執秩拱稽指軍以譯言贄寶指賔合二使之重二使豈可並論鳥獸睢盱亦不足以言賔也但欲對舉使文整贍亦嘗即押舶之名思其義乎增德以來逺人指賔申威以修戎政指軍問工焉取十句太承襲前規羽鱗貍牙之物二句韓子引經惟在義理器數名物則古今異制不茍務博華元名大夫也四句何乃引此願訪于金石訪一作勒此等文不可與送鄭權序比猶是燕許之拔出者邠寧進奏院記燕許舊規亦閎壯可喜以奉王制以下鋪揚皆太煩惟忠惟敬以院至耶既至矣後又云他政之末何也此篇其半可削興州江運記在唐人中已足髙步永州以後則超羣絶倫矣尚覺拘局使中謁者來錫公命平淮碑書監軍者不得已而存其實若中人錫命既乖典禮又無關係何以書為公固不許而相與怨咨而字上有退字盛秋水潦窮冬雨雪注一作水潦于秋雨雪于冬句法較堅硬疑公後所改西門遺利四句非溉田非塞决也所引二事未當全義縣復北門記由道廢邪注一作由是道以廢邪上用推是此用由是文法相犯短幅不應有此潭州楊中丞作東池戴氏堂記無味此當時輕浮套數桂州裴中丞作訾家洲亭記柳州諸記是真美故皆如畫出此是粧㸃虛景苦乏生氣雍州柳中丞作馬退山茆亭記英華作獨孤常州文者近之嵗在辛卯辛卯為元和六年柳子既振拔當時文體矣何當有是前此辛卯為天寶十載至之有初晴抱琴登馬退山對酒望逺醉後作一篇詩中有王旅方伐叛虎臣皆被堅魯人著儒服甘就南山田之語于時方討南詔則此文亦出于至之有可徵也于是手揮絲桐六句語雜氣輕永州韋使君新堂記公之居髙以望逺并收外之一層永州崔中丞萬石亭記怒者虎鬭企者鳥厲兩者字並作若字環行卒愕行作顧其上青壁斗絶六句寫萬字有餘韻敢頌休聲祝于明神推開借父老輿頌見之始不俗零陵三亭記一有薛令作三字使繼是者咸有薛之志三句不偏枯按桂訾家洲永新堂零陵三亭皆為說以發其端唐語林言淮西事當直起者非柳子之論也零陵郡復乳穴記自韻吾聞之曰吾字作士字道州毁鼻亭神記除穢革邪四句從薛之治道州為政大體發端已涵蓋下兩層君有鼻而天子之吏實理二句領下兩層為二教興起本上句又見非有功德于此上文謹嚴但亦是常語永州龍興寺息壤記甘茂盟息壤息當為滋息之意永州龍興寺東邱記今所謂東邱者也者字下有奧之宜者四字懼翦伐之及也收上竹木永州法華寺新作西亭記其照也逾寂二句從覺照起論却似收不轉柳州復大雲寺記董之禮則頑束之刑則逃先王為治百家皆所用是或一道也讀西域傳其效可見柳子至此信奉佛氏似少衰矣蓋讀書久而少有悟也永州龍興寺修淨土院記文不髙釋氏取與東海若篇表裏永州鐵爐步志凡舟可縻而上下者曰步任昉云吳楚間謂浦為步語之訛耳則求位與德于彼數語筆亦膠繞不圓快大者桀冒禹云云此文直斥在上者徒建空名㫖趣既已偏宕求其警䇿則又無有何以存諸集中按此文似為以門地論相而發遊黃溪記發端既涉模擬又未必果然也刪此而直以黃溪距永州治七十里起何如有魚數尾數字下有百字有鳥赤者烏翼者作首始得西山宴遊記中多寓言不惟寫物之工傾壺而醉帶出宴字而未始知西山之怪特反呼始字始指異之虛領始字然後知是山之特出下有不與培塿為類六字蒼然暮色三句始字神理心凝神釋破惴栗然後知向之未始遊二句上句帶前一假下句正收始字李云羈憂中一得曠豁寫情景俱真鈷鉧潭記蕩擊益暴四句寫出鈷鉧形貌李云記文只是情景字句均適最忌餘剩鈷鉧潭西小邱記唐氏之棄地棄地比遷客則清泠之狀與目謀四句四與謀字為遭字起本心神二句寓已之可貴爭買愈不可得爭買下有者日增千金而六字所以賀兹邱之遭也兹邱猶有遭逐客所以羡而賀也言表殊不自得耳至小邱西小石潭記聞水聲如鳴佩環水激石而成聲一句中將下兩層都暗領全石以為底敘明石字先寫四面竹樹潭中魚可百許頭六句透出清冽怡然不動怡作佁其岸勢犬牙差互二句石岸差互故水流皆作斗折蛇行之勢為岸所蔽雖明滅可見莫窮其源也袁家渴記皆永州幽麗其處也其近刻作竒然恐均誤或是異字謂水之支流者為渴支一作反為是每風自四山而下至大都如此發明反流襯筆尤狀出幽麗李云末段言風處亦以興已石渠記視之既靜其聽始逺李云名理逺者虛谷相應故此貌已靜彼聲轉逺也石澗記道狹不可窮也李云可窮便非佳山水柳州東亭記甚古乃取館之北宇右至復其號似古明堂制則朝復其號朝字下有夕字柳州山水近治可遊者記在薄水南山石間薄作潯有右川東流入于潯水右作支北流潯水瀨下流作沉其上有穴至如器物甚衆先敘山之所有黑肌而赤脉三句始敘山之所由名在多秭歸在疑作尤此篇多擬山經寄許京兆孟容書很忤貴近謂中官加以素卑賤至更造怨讟此亦事理所有但素無善行則異同之口得以實之人遂莫加憐耳外連强暴失職者謂韋臯此皆丈人所見見字上有聞字消息于亡于亡作存亡不知辛酸節過節過作節適自古賢人才士以下二段太叢散太模擬范座騎危座作痤今以恇怯淟涊至愈疏濶矣暗綰前後假令萬一除刑部囚籍三句是所以息謗讟者之猜擺落撫慰收恤尚置人數一面專以宗祀祈哀既為力差易亦人人所必動心也但以存通家宗祀為念先提起此一層雖不敢望歸掃塋域顧先墓退託先人之廬顧田宅就婚娶求胤嗣顧子息與楊京兆慿書而其忠誠者而字下有激字忠作中才如王景略以尹緯為令史符堅謂尹緯宰相才王景略之儔非王猛抑緯為令史也近世尤好此類二句李云柳子自言得號為輕薄人觀其謫後仍是此等議論据要津時可知不益于世用益字上有盡字彼不足我而惎我哉注引說文惎毒也按左傳楚人惎之脫扄杜注惎教也言而有是患二句李云省筆茍知之雖無有司至其必有施矣安溪師云此皆子厚之所以敗而終始拳拳若此故知其為有心人也今之世言士者先文章三段自為聨絡希王褒劉向之徒者二句柳子置子政于第二流文人以文律通流當世文人作丈人理不一斷以古書老生自韓柳所見皆頗脫略先儒章句矣今復得好官猶不辭讓上云無有是念而此云云然豈謂量移善地為好官耶以人望人尚足自進四句李云四句詞甚晦大略言已自處且未能自免于常情之中如下歸鄉閭立家室託嗣續之類是也以義度人則難為人以人望人則賢者可知已矣語本表記使有世嗣使作所李云世嗣謂已也此篇敘情欵不如與許書而所答薦舉文章二者卓犖可用之言為多與蕭翰林俯書乃岌岌而造其門哉若作造其門則岌岌當為汲汲若作岌岌則又當云操其間伏自思念過大恩甚過大收前一段恩甚收不能塞衆人之怒以下一段居蠻夷中久一段其氣韻兼屈馬而有之身被之目睹之至又非道也筆筆旋折朝夕歌謠使成文章李云首言困卦處自命甚重終之以作為歌謠文章蓋其本領只如此也然文采精麗之極與李翰林建書與致思謙書略同而稍碎與顧十郎書以非乎人而售乎已非乎人今所謂刺也不意璅璅者復以病執事似十郎又坐劉柳纍者與韓愈論史官書按退之以是年撰進順宗實録舊史謂其說禁中事頗切直內官惡之往往于上前言其不實然則與劉秀才書遜詞自晦其識逺矣當其下筆則詞直事核而仍不敢以褒貶自任召閙致憎雖謂之中道可也設使退之為御史中丞大夫至利其祿者也文法從賈生假設陛下居齊桓之處兩難化來决必不沉沒大字本作决必沉沒注重校一本必下有不字按韓與劉書云决不沉沒故反其詞耳今考異載栁書作决必沉沒朱子當日所見之本為無誤也李云詞氣逼直以極其辨是子厚本色與史官韓愈致假秀實太尉逸事書竊自冠好遊邊上三句以下致太尉逸事皆破疑不得實之意宜不茍過日時顧力字連遭瘴羸頓瘴下有癘字苐不能竟其業至末答書當有規其志太鋭而取困于世者以下言雖知其病終惟不得已又即從史遷句生下波折皆有源春秋傳所謂傳信傳著傳信傳著以終得其實當即籍之之意與劉禹錫論周易九六說書李云所言者􅀢數一端然摘出學者讀書不謹而輕于立論之病可以推類警省則是取其過揲四分而九也世得云孔疏云九過揲六過揲過猶遍也言揲之九遍六遍耳節用過揲二字未妥孔頴達等作正義論云不遺等字何等謹細君子之學五句李云極得讀書之法答元饒州論春秋書李云于與夢得及此兩書見盡心經學若此後之綴文者動擬韓柳其于聖賢經傳蓋無一卷成熟者根本蹶矣知春秋之道久隱上增嘗諷習之又聞韓宣英及亡友吕和叔輩言他義十九字盡得宗指辨疑集注等一通今但有微指亦不知復有宗指也集注豈纂例之異名耶于紀侯大去其國此條竊于微指尚有疑焉太王之避狄猶可以立國也紀侯之義固當效死勿去耳然而春秋不責紀侯者其亦傷天下之無王乎見聖人褒貶與奪三句杜牧之曾襲此語其言書荀息此條今檢陸氏書不得頃嘗怪荀息奉君之邪心以立嬖子申生之死荀息立于朝而不能爭是其失耳若立奚齊不可責以奉君之邪心也至于立卓子則謬甚卓非奚齊之母弟均之庶孽息不從奚齊以死則立君者將以定國也舍舉國屬望之重耳而奉童昏以臨之以啓再亂身亦不免焉經權兩謬聖人安得不貶之乎其與仇孔同辭者仇孔固亦有貶也為正卿執國命亂臣無所顧忌而無禮于君身預其禍若一匹夫謂聖人之猶有取焉然非歟柳子謂進荀息以甚茍免之惡夫君弒賊不討者不書葬聖人于茍免者固不許其改得為人臣子履后土而戴皇天矣庸待進息以甚之哉立齊君命也立卓非君命也可以行權而不能計安國家息雖欲辭其罪不可得矣今凡言貶息凡作兄答吳武陵論非國語書清古二書皆柳子得意者雖無所有然極反覆馳驟之態也與吕恭論墓中石書又得部中廬墓父者作父墓又二十年來三句多閲則識真怪而掘其土而字上有擢字况廬而居者其足尚之哉李云刲股廬墓韓柳交譏之然廬墓與刲股又自别聖人有制度以下不減左氏內外傳之文若然者勿與知焉可也二句李云極是慮善善之過而莫之省三句李云何其篤厚意本漢書王成僞自增加以蒙顯賞及張敞論神爵事所云務自增加澆浮散朴諸語之意李云一小事而能見其大者訓辭尤深厚與友人論為文書非謂比興之不足六句世得云此文所云得之蓋老蘇所云天之所與者其云比興恢拓四語則人工雖至而非天之所與者也得之難者天也知之難者人也則彼卓然自得以奮其間者二句帶上一層况乎未甚聞者哉聞字下有著字李云盡歷代文章作者傳者之弊而隱寓其所為卓然自信者答元饒州論政理書管子亦不欲以民産為征二句管子說見海王篇與崔饒州論石鍾乳書饒州作連州則油然而清二句言其粹其竅滑以夷二句言其美凡為此也以下若即接是故經中云云斯最善矣必若土之出無不可者以下兩假乃因其徵引之多而極其辨以折之不知其為羡言侈論有傷文格豈其踔厲風發之故習不能以自制歟則不必服則字上有連字姑務人而夸辨博務字下有勝字答周君巢餌藥久夀書行則若帶纆索八句亦何至此汲汲無歡宜不永年矣然由未嘗肯道鬼神等事由作猶獲是而中中作終視人之害若利言不以動于心非因人之害以為已利昧昧而趨至髙明之圖哉為韻語甚古與李睦州服氣書貌加老而心少歡諭諭作愈若古之强大諸侯然至進决于城下若此張皇則是借以發其文非為睦州效忠也今使號于天下曰至固小子之所懍懍也與前幅一一回環呼應但不應徒爾詞費使人厭其寡效爾古文與詞賦派别判焉柳子所以馳驟縱橫若是反減其工者蔽在必合屈馬而一之詞勝氣溢乖自然之節也與楊誨之第二書多有不足縷縷致辨者而亦毛舉不已所謂道不足而强有言也不過其勤讀書過字下有欲字今將申告子以古聖人之道世得云自此至為僞乎為佞乎是一假稱古昔聖賢以諍楊之失然細分之又有兩層自書之言至不為也非不能也為首層對楊欲任性率真而不能勉强立論自凡吾之致書為說車至如是而心反不愧耶為次層對楊以已之失為非聖道立論而結之曰僞乎佞乎僞結首層佞結次層若果以聖與我異類至聖人不足重也此一層從孟子中來非無實之辨今子又以行險為車之罪世得云自此至此甚未可也是一段言涉世之道以諍楊之失車不得不行險譬人不能不涉世也然細分之亦有二層上層辨甘羅終軍是一種入世法下層引嵇康阮籍又是一種入世法要之均非中道也吾意足下所以云云者世得云自此至而惡之也一段又就楊身上寬一步說收前二段意楊之所惡在佞前言僞乎佞乎其㫖亦歸於辨佞也故此單收佞非特于可進也四句又云可進可退顧上出世一段意吾年十七求進士自此至幸甚一段又就自已身上說法狂疏輕薄兩意又分照上二段日思摧其形暗照縱心意旦暮走謁于大官堂下暗照出世意益知出于世者之難自任也總收今因道人行此道人當是道州人非浮屠答貢士沈起書幾于萬一用以萬報也下萬字作為此早年最卑淺之作宜削賀進士王參元失火書一出口則蚩蚩者以為得重賂此即上所謂羣小之慍轉因水火之孽而得光明也宥而彰之宥猶助也顏曾之養三句收得密與太學諸生喜詣闕留陽城司業書乃知欲煩陽公四句婉轉始僕少時嘗有意遊太學至可無愧矣此段應陶醇煦懿熙然大洽二句言外亦見化百數人不為功坐一人即致纍恐失平也陽公有博厚恢宏之德以下皆所自欲論列者借與諸生書發之先明其無罪下則所謂大體此以解德宗胸中之惑下又見詔命雖優無以解于棄賢也故少佐筆端耳諸生之留陽公意誠善而不長于措詞柳子蓋出此以佐之俾為史者有以紀述也顧元禮叔夜事此文削其半則及于古矣答韋中立論師道書僕自卜固無取五句筆善折故常語皆遒峻然不應若是之費墨也吾以為柳子之未逺于六代者以此然雪與日豈有過哉二句李云詞無涵蓄至此平居望外遭齒舌不少二句此等語亦何味但覺其尖薄耳古者重冠禮至大類此李云繁稱瑣引子家修詞之一纍惟昌黎能免是矣故吾每為文章至而以為之文也李云文章根本之病作文精微之要盡于此矣抑之欲其奧二句對輕疏之欲其通二句對怠激而發之欲其清對昏固而存之欲其重對矜本之書以求其質言實事也質者道德之本言其大體本之詩以求其恆言常理也恆者性情之常言其細微本之禮以求其宜節文之中本之春秋以求其斷是非之辨本之易以求其動變通之道按未嘗敢以輕心掉之八句以心氣言之此存乎文之先者也下六句乃即臨文言之抑揚二句謂命意也疏廉二句謂布勢也發存二句謂鍊格也此于逐句反復先後尤當彼此相成斯為意不浮為勢不窘為格不澀也有徐以告焉徐作餘無招越蜀吠怪此等收法亦有迹答貢士元公瑾論仕進書少作殊無條理古之道至子皮是也所引濶誕無當是誠難矣非其難也事至微淺故美不歸答嚴厚輿論師道書仲尼可學不可為也不可為言不可以居之不疑馬融鄭元者至僕幸非其人如馬鄭者恐終唐之代不可見柳子謂其不少亦非也乃云幸非其人語尤浮薄此作自然古雅報袁君陳秀才避師名其教也雖若是上三字誤以注入行前已畢秀才可為成人畢作必次論語孟軻書皆經言子厚亦斷然以孟子為經異日討也討字下有可字道茍成則慤然爾六句似揚子答韋珩示韓愈相推以文墨事書若退之之才過僕數等過僕數等即謂下子雲之徒也如太元法言及四愁賦作四賦事以固當無以字李云柳子于文用力深故善品題古人及當世髙下答貢士廖有方論文書秀折答貢士蕭纂欲相師書少作上門下李夷簡相公陳情書是時不可遇時疑作特人居相位人作入此篇前仿國䇿結參漢體李云此文格調似韓子固知當日切䃺相資同工異曲也按此與應科目日與人書貌似而命意殊不如韓之工用筆亦煩簡紆徑差異韓作于少年柳作于晚嵗以一文論則韓果數倍矣求諸全集可也義門讀書記卷三十六

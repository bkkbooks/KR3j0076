body:
  text: 義門讀書記卷二十四翰林院侍讀學士何焯撰後漢書循吏傳任延延治三郡皆隨所宜急不以一律王渙每食輒絃歌而薦之歌詞全篇見宋書劉寵山谷鄙生未嘗識郡朝吳志注中引續漢書作山谷鄙老生未嘗至郡則此鄙字下脫一老字仇覽叔度幾於中行覽其狷乎季漢之士斯真鳯麟矣勸人生業至賑恤窮寡古政教推之則子産之治鄭也贊注引沈約宋書載曄與其姪及甥書論撰書之意云云按整理之云後史亦無及者論贊則自許太髙酷吏傳成其不撓之威不撓謂權強難以屈其法注指同官相陵誤張儉剖曹節之墓以黨錮宦官二傳參考乃侯覽壽冢非曹節也所當刋正且未葬但可言壞不可言剖董宣董宣何並之流不當列之酷吏李章亦惟在千乘時誅斬盜賊過濫非任喜怒多誅滅也而范首及此三人蓋以建武吏事刻深上好下甚則必有入于酷者明中興之美坐是未盡耳然竊謂東京酷吏傳可以不立文叔為白衣時臧亡匿死謹厚者亦復為之蓋漢人尤尚氣俠不獨伯升也樊曄大笑期必死忿怒或見置此二語則其情貌真酷矣周紆每赦令到郡至乃出詔書先決刑罪乃出詔書後之大賢有與之同或偶以不得已用權僅擲一二渠魁消一方之隱憂非明恕之常道也紆之酷在每字盡字太傅鄧彪奏紆在任過酷不宜典司京輦鄧彪之奏竇氏指也故紆自謂無全黃昌縣人彭氏舊豪縱至按殺之昌則過矣然豪家不可以不戒陽球萌乃罵曰爾前事吾父子如奴至妻子皆徙比景陽球方為程璜子壻宜萌之抉其瑕也球本宦官氣類一時自相吞噬其得行于王甫者勃海宋后得請于帝鬼神假手速之斃耳球何力之能為天又假手于節以斃球矣語諸常侍今且俱入勿過里舍也節懲王甫以休沐被收故使悉入則可以先發即使帝或不聽所白無後憂矣宦者傳董賢負乘莽得竊柄故西京佞幸關係存亡東都則黃巾蟻聚羣雄龍戰皆由宦者流毒廢馬班佞幸前例獨著宦官庶乎識變易曰天垂象至亦偹其數發端不類閽者守中門之禁閽人本使墨者為之此以為寺人據詩昏椓靡共鄭箋云皆奄人也注未悉其云刖者則據左傳若吾以韓起為閽杜注刖足使守門之語仍與宦官無預也王之正內者五人衍者字注中引周禮衍掌字月令伸冬命閽尹審門閭謹房室月令吕不韋作故鄭注云於周則為內宰此注中禮字不學者所增文選注中尚無禮字其能者則勃貂管蘇勃貂當作勃鞮因齊寺人貂而訛鄭衆養子閎嗣宦者傳國之始孫程詔宦官養子悉聽得為後襲封爵定著乎令鄭衆已養子襲封至是又十九人皆然此衰亡之本曹氏基以代漢者也宜書于紀單超唐兩墮兩通鑑從雨考異云雨墯者謂其性急暴如雨之墮無有常處也曹節時連有災異郎中梁人審忠以為朱瑀等罪惡所感乃上書當此時而審忠尚敢訟言及此甚矣天下之有人宦官亦不能即殺忠又可信人之有命節遂領尚書令尚書令可領駸駸為宰相矣不愛他官獨領尚書者欲言者無由得至帝前如有陳竇之謀亦不待竊發視其章也吕強而今中尚方斂諸郡之寶至費多獻少數語略盡當時殖貨之實巡以為諸博士試甲乙科至爭者用息喜平石經之立發于李巡可以嘳息經典序録爾雅李巡注三卷張讓皆免冠徒跣頓首至輒寢不報以家財餌帝即無能間之者矣刺史太守復增私調至多受賕賂此黃巾所以平而復起皆責助軍修宫錢三國志公孫瓚傳注中載劉虞事作治宫錢此緣避髙宗名云修宫錢儒林傳天子始冠通天衣日月漢承秦故郊祀皆服袀元至顯宗而革故統貫曰始詳輿服志試明經下第補弟子明制會試不中式者選入國子監蓋仿此意自辟雍東觀蘭臺石室宣明鴻都至莫不泯盡焉斯文將喪故天生康成稍為羅其散軼易劉昆王莽以昆多聚徒衆至乃繫昆及家屬於外黃獄莽本好名以昆劉氏故忌而收之任安欲知仲桓問任安仲桓楊厚字也任安之門人杜微杜瓊蜀志有傳此蜀中內學派别也又何宗見楊戲贊中楊政為人嗜酒不拘小節至皆如此也政經生而碌碌下同遊俠此戮民也雖能屈馬武之氣何足竒哉學者當法鄭衆之無染尚書牟長皆本之歐陽氏俗號為牟氏章句不足以自名家故云俗號為牟氏也尹敏讖書非聖人所作其中多近鄙别字如以劉為卯金刀貨泉為白水真人皆别字之徴也周防父揚少孤微周協傳云自協曾祖父揚至協孫恂六世知名則揚亦常顯名史略之耳非終于孤微也孔僖作六代之樂按前書秦時唯餘韶武安得經新莽之亂尚偹此樂云六代者史仍一時之夸飾也詩景鸞少隨師學經至凡所著述五十餘萬言此等雜學又不傳業不應濫入召馴稍遷騎都尉侍講肅宗拜左中郎將入授諸王侍講入授各異其文則後世講官欲以師氏之尊自重誠過矣然賜之坐亦人主所以優崇儒術也坐而仍侍何嘗疑與詔無北面者同乎楊仁太常上仁經中博士仁自以年未五十不應舊科上府讓選博士限年五十以上學校之官宜悉仿其制七十則致仕而去仁對以寬和任賢至皆當世急務寬和二語在明帝時真知先務之急推之十二事可信時諸馬貴盛至莫敢輕進者此舉亦趙熹之亞楊仁公卿材也用之不盡趙曄少嘗為縣吏至究竟其術周燮傳載南陽馮良事與此相類而所從皆杜撫必一事而傳者異耳蔡雍至會稽讀詩細而嘆息以為長於論衡詩細長于論衡此雜學不如窮經也衛宏初九江謝曼卿善毛詩乃為其訓謝曼卿為其訓明毛詩雖傳無序傳也後馬融作毛詩傳鄭元作毛詩箋范氏世有經學其言多有根柢後儒但據此傳言詩序之出于宏而不悟毛傳之出于融何也或疑馬融别有詩傳亦非范氏明與鄭箋連類言之矣注箋薦也薦成毛義也又引博物志毛公嘗為北海相元是郡人故以為敬按康成親受經季長以箋為致敬亦得禮前書魯髙堂生注髙堂生名隆按前書注中亦無髙堂生名此言隆者因三國志髙堂隆而誤董鈞後馬融作周官傳授鄭元至通為三禮焉本習小戴禮謂儀禮十七篇也故與下小戴所傳禮記四十九篇通周官為三禮春秋鍾興以授皇太子又使宗室諸侯從興受章句曰以授曰從興受語亦有輕重興自以無功不敢受爵至而興遂固辭不受爵此等舉動激勸者逺興之處此亦兩得矣何休又注訓孝經論語邵公亦注訓論語而平叔作集解獨未之及豈失亡于漢季之亂歟五經許慎又作説文解字十四篇按説文解字載其子召陵公乘沖所上書稱慎官太尉南閣祭酒嘗以詔書校東觀教小黃門而此皆不載文苑傳杜篤徒垂意於持平守實務在愛育元元二語經國之要此漢人辭頌猶足為古詩之流也所著賦誄弔書讚七言女誡及雜文凡十八篇又著明世論十五篇後書不立藝文志故著述皆具載篇數王隆沛國史岑子孝注岑一字孝山著出師頌按作出師頌及和熹鄧后頌者又一史岑李善文選注得之此注誤也傳已著明所著四篇夏恭恭宜在儒林黃香議者譏其過幸政歸臺閣不任三公故有過幸之譏黃香傳當冠于子瓊之前列左雄周舉之上于例乃合田令商者不農田令未詳農九家不録其書崔琦冀行多不軌至乃作外戚針前書外戚傳即載后妃故此針皆指后妃言之獨于番惟司徒一節致意然琦自拙于為文欲以針冀當但據吕霍上官丁傅王氏禍敗言之也番為司徒為乃惟字之誤北人音同故也蕭何佐漢乃設書過之吏蕭何設書過之吏不知出何書邊韶寐與周公通夢韶為太中大夫時與胡廣羊溥祝恬等稱梁冀勳德宜比周公錫之山川土田附庸與西京頌莽者無異其所通夢殆梁冀耶趙一一以公卿中非陟無足以託名者至因舉聲哭茍賤狂易敗常亂俗此戮民也禰衡沿習其風遂殺身于庸夫之手可不戒哉邊讓作章華賦詳此賦旨趣蓋刺桓帝酈炎抱玉乘龍驥至為世陳四科言不得志于當世庶幾顔之附孔以傳也髙彪先公髙節越可永遵第五倫京兆長陵人永蓋其後故以先公髙節期之後遷內黃令內黃令墓碑作外黃令與申屠蟠傳合當以碑為正張超河間鄚人也留侯良之後犍為張氏既自謂留侯之後此河間鄚人又何别也禰衡臺牧者之所貪注諸本並作臺牧未詳其義融集作掌牧按今文選作掌伎近之獨行傳又云狂者進取狷者有所不為也注云此是録論語者因夫子之言而釋狂狷之人也注語不知何所本譙元皇太子多橫夭按文當作皇子衍一太字時亦有犍為費貽至仕至合浦太守費貽當附儒林傳中貽無著𫐠傳末善説易者元子瑛耳李善光武詔拜善及續並為太子舍人勸忠宜止于善并續亦拜舍人則善不敢逃賞而事續尤為有終非聖主無此合宜也張武者吳郡由拳人也下云太守第五倫嘉其行按第五公為會稽太守乃建武時吳郡至順帝時始分立此吳郡由拳當作會稽戴封其年大旱封禱請無獲至於是逺近嘆服請禱而至自焚此不學無術以巫尫自待矣豈惟歡虞之極弊哉李充太守魯丕請署功曹不就按魯丕傳丕以永元三年拜陳留太守視事三期但丕傳不云為博士或是並為侍中也丕刻作平誤范冉與漢中李固河內王奐親善下文王子炳即奐字也與注所引謝書互異至于李公名輩已髙不得與史雲為友李公被難在桓帝建和元年去史雲殁時凡三十九年何始云今皆不在制之在爾也王奐為考城令以仇覽傳參校亦桓帝時事疑史雲之友别有一李子堅史家因氏與字偶同遂舉李公以實之大書于前爾向栩此直清狂不慧之徒如何以匹獨行當為其有時侃然正色耶方術傳方術立傳所以譏切時主崇信小數此史家之主文譎諫也從馬之日者龜䇿及前書眭宏兩夏侯京翼李傳變而通之但恨其過于瑣雜不若合蘇竟楊厚郎顗襄楷于此傳削去王喬及冷壽光以下諸人且著明其流為張角張衡之屬斯有繫于勸戒耳箕子之術以箕疇為術可謂不知致逺任文公時暴風卒至至文公獨得免方有警而暴風卒至自當戒行此不待明曉風角也五月一日當有大水至所害數千人文公預刻五月一日固由占術山城春夏之交久旱宜防大水涌溢則又常理也郭憲忽回向東北含酒三潠至與郊同日神仙傳兼採郭憲及樊英二事歸之欒巴王喬每月朔望至則四年中所賜尚書官屬履也此事尤不經不應志怪謝夷吾為壽張令注引謝承書縣人女子張雨宜載列女論夫煥乎文章時或乖用本乎禮樂適末或疏英厚之徒其文章禮樂安在其中無物而欲為髙論此晉宋之文所以歸于無用也然置英于方術中却於史法最得宜許曼時人方之前世京房至所著易林至今行於世今世所傳焦氏易林疑即峻所著焦氏不聞有書也華他又有一郡守篤病久至吐黑血數升而愈郡守事依託吕氏春秋文摯齊王語為之漢世異術之士甚衆至列于篇末宜以蘇竟楊厚郎顗襄楷欒巴李郃樊英謝夷吾單揚董扶為一傳用此文法附任文公以下於後諸神怪事獨取章帝時壽光侯而撮曹氏兄弟論左慈甘始之語存其略可耳徐登閩人也注閩中地今泉州也按唐以上所謂泉州今福州也薊子訓與一老翁共摩挲銅人注引酈元水經注云魏文帝黃初元年按國志注作明帝景初元年逸民傳至乃抗憤而不顧多失其中行焉言王莽篡位違患逺引斯為得中此則稍過也野王二老並舉手西指至大王勿往也似勸光武且固根本勿與赤眉急爭關中嚴光字子陵一名遵遵君平名也史家誤仍會稽典録朱育對濮陽興之語不以前書核之耳懷仁輔義天下悅阿諛順旨要領絶霸得書封奏之此建武三公所愧且足開廣帝心子陵自髙出一時霸之封奏殆不敢自言假以諷上耶井丹吾聞桀駕人車豈此耶雜記云士喪有與天子同者三其終夜燎及乘人專道而行乘人謂以人引車不用馬也然則井丹以桀為諷亦惡其僭歟後世習用簷子遂相與忘之矣戴良禮所以制情佚也至食之可也已有晉人風龎公後世何以遺子孫乎觀注所引襄陽記子山民遂仕魏則遺安之意有不能得之其子者矣列女傳故自中興以後綜其成事述為列女篇列女之作夲于子政斷自中興以後上繼劉書又于本書為合太原王霸妻而我兒曹蓬髮歷齒未知禮則未知禮則恐是失于修學君子退而隱處詩禮之教子孫所以立身不容己也扶風曹世叔妻其八表及天文志至後又詔融兄續繼昭成之司馬彪云馬續述天文志續字季則見馬援傳末河南樂羊子之妻一而纍以至於寸雍本作絲按説文織絹從糸貫杼也從絲省丱聲古還切作絲非孝女曹娥遂投江而死按碑云經五日抱父尸出與叔先雄事略同此語亦不可削作者蓋專採典録也非抱父尸出度尚亦何從改葬乎酒泉龎淯母者趙氏之女也字娥父為同縣人所殺娥魏志注中引皇甫謐列女傳作娥親父曰趙安讐曰李壽沛劉長卿妻縣邑有祀必膰焉此禮宜修安定皇甫規妻者不知何氏女也唐張懷瓘書斷云扶風馬夫人大司農皇甫規之妻也陳留董祀妻後感傷亂離追懷悲憤作詩二章此詩自陳思而外邈難方駕按董卓傳卓以牛輔子壻素所親信使以兵屯陜輔分遣其校尉李傕郭泛張濟將步騎數萬擊破河南尹朱俊於中牟因略陳留潁川諸縣殺掠男女所過無復遺類文姬流離在此時也又按蔡雍傳雍在長安與從弟谷謀東奔兖州又欲遁逃山東則未必以家自隨蘇氏以董卓既誅雍乃隨坐不應文姬先罹禍亂疑詩為後人作考之不詳也春渚記聞載東坡手帖云史載文姬兩詩特為俊偉非獨為婦人之竒乃伯喈所不逮當是公晚年語耳東夷傳夫餘國以臘月祭天臘月魏志作殷正月又言在國衣尚白蓋其善者皆箕子之遺化也韓又立蘇塗注中刪去魏志不還句下好作賊三字浮屠句下所行善惡有異六字不分明倭又有夷洲及澶洲至遂止此洲今人以倭國為即徐福止而自王者謬矣南蠻西南夷傳乃命方叔南伐蠻方詩人所謂蠻荆來威者也蠻荆直謂楚人豈得以武陵蠻當之乎兖豫之人卒被徴發兖豫去嶺南尤逺前代未嘗發以踰嶺故獨言卒被可一切徙其吏民北依交址事靜之後乃命歸本棄地內徙光武用之北邊李公亦議行于嶺外板楯蠻夷天性徑勇初為漢前鋒數陷陳劉備置張飛于閬中蓋將用其人也昔永初中羌入漢川至太守李顒亦以板楯討而平之治蜀者能撫蠻則足以制羌於此對可得大略滇王以廣漢文齊為太守至甚得其和太守能撫定滇益地者文齊王追李顒景毅四人皆巴蜀人永昌太守鄭純越嶲太守張翕馮皓亦其産以地近頗習土俗但律己以正威信易孚耳卭都夷者至無幾而地陷為汙澤都者瀦水之名恐其地本有汙澤西羌傳滇良昔桓公伐戎而無仁惠故春秋貶曰齊人中國尊貴侯伯髙爵不欲以當微者故經諱而書人公羊疑為貶者固也尚見前人纍征不克至復寇金城塞順逆不分顧招之使還踞故巢豫以地利益無所憚矣此豈可謂文德乎能以威信懷服諸種使其不能嘯呼羣聚然後開諭利害申明誓約必其不敢入犯可耳越騎校尉趙代副趙代當從和紀作趙世此唐人避太宗諱所改而後人追改未盡之文又有西海魚鹽之利通鑑注西海有允谷鹽池恃其權勇權通鑑作拳東號子麻奴遣車騎將軍鄧隲至食邑三百戶以軍敗寇盛反得進爵封賞和熹臨朝謬政無踰此者羌遂入寇河東至河內至朝廷從之徙郡亦一策但光武時以人少地虛故徙并其人易為偹衛今羌種蟻附非若胸奴多馬習戰兵力稍分則不能禦遏也乃無故棄地驅民長賊聲勢萬一流移不堪輕與羌合凶狡乘之而起則腹心內擾安集無時矣如杜琦王信幸其非梟雄之才耳不如即募邊人以擊羌寇用其豪傑授為將領所得生口畜産即盡以與之可不煩朝廷别發大衆捕逐難自弭也任尚與遵爭功至沒入田廬奴婢財物任尚前副鄧隲敗而獲封後與鄧遵爭功則破平零昌杜季貢徴還棄市賞罰如此宜乎羌患之滋蔓也論於是諸將鄧隲任尚馬賢皇甫規張奐之徒至是養疾痾於心腹也三明事在桓帝之時安得與鄧昭伯等混而言之中興以後羌戎為患永初永和最甚永初之始但選亷平有武略刺史太守數人可以應時討定乃輕發大衆付之不知兵之鄧隲望風奔北寇勢遂張又不加罰無所沮勸由是敗者相繼豈羌之暴猛哉用人失也永和復叛則馬賢等本非良將加以刻剝軍資賂遺權門士卒解體安望殄寇其壞亂相尋之實偹于威明求乞自劾疏中不能次第别白言其得失徒申紀明一將之論追咎前人斥逺之不早而不悟隨時弭患各在其人之駕馭撫綏事變豈有極乎諸種勝兵者且二十餘萬人亦非人力得以誅盡紀明百八十戰僅一創之未必能盡敵而返也亦何取彼此妬功之口盛相嗤鄙哉諸論此篇尤下不分前後之事勢不别諸將之賢愚前則復舉陵斥徒為辭費後則承襲餘論初無特識不作可也西域傳安息國海中善使人思土戀慕數經危險則思土之念自倍非海中氣候如是也大秦國漢書云從條支西行二百餘日近日所入則與今書異矣北史西域大秦國傳亦云於彼國觀日月星辰無異中國而前史云云失之逺矣天竺國土出象犀玳瑁金銀銅鐵鉛錫至遂於中國圖畫形像焉書此者以見其通中國者非一獨不聞所謂精文善法即明帝之夢傅毅之對記注無聞僅出牟子不根之書也莎車國敦煌太守裴遵上言至賢由是始恨遵言是然迫奪則又失懷逺之宜光武此舉未盡善賴賢以佳兵自滅耳天子報曰今使者大兵未能得出如諸國力不從心東西南北自在也堅忍論論是微辭非助而張之也然結語猶未免于兩是其説其後甘英乃抵條支而歷安息至靡不周盡焉甘英之迹窮于安息明帝在二班之前皆不載遣使天竺事足明為後人假托也若其境俗性智之優薄至審求根實皆指前書及安帝末班勇所記注贅引法顯語南胸奴傳九年遣大司馬吳漢等擊之經歲無功吳漢擊胸奴經歲無功名將行邊自古猶有利鈍於是漸徙幽并邊人於常山關居庸關已東徙民而空其地使無所掠亦古人治邊之一策也然必也以漸則不至驚擾昭君字嬙至遂復為後單于閼氏焉王嬙前事復詳于此真記繁志寡也使者曰單于當伏拜受詔至願使者衆中無相屈折也其伏拜不足為重輕而足以使其衆悼心而蓄忿故蕭望之之議為逺猷也於是復詔單于徙居西河美稷按前書地理志屬國都尉治美稷則其地本有降夷故因而處之南單于既居西河至為郡縣偵羅耳目至是南胸奴之衆遂布滿列郡成不可徙還故庭之勢矣司徒掾班彪奏曰至遣驛以聞得體要而質健西域國屬胸奴與屬漢何異見非漢之力所不能臣以征西大將軍耿秉行度遼將軍劉攽云案秉傳不為大將軍又真為度遼此多一大字乂行當作為也按下云鄧遵始真為度遼則耿秉耿夔傳言拜者皆行度遼事行不當作為崇諷西河太守令斷單于章無由自聞此舉幾壞邊事崇罪大矣乃遣黎陽營兵出屯中山北界此禦鮮卑故屯中山北界注憒憒論袁安之議見從于後王若從袁安議不惟異代無胸奴之鯁當時亦不致鮮卑轉徙竊據其地收胸奴餘種為邊患矣而竇憲矜三捷之效至反其故庭竇憲既失于前曹操加謬于後然憲當國力有餘漠北可徙之會尤當執其咎也並恩兩護後之為患者南庭耳並恩兩護以下承接未亮烏桓傳其性悍塞至父兄無相讐報故也知母之有族類巳身顧非父兄之族類耶所謂塞也其俗妻後母報寡嫂死則歸其故夫報字解與左傳異歸其故夫謂同葬鮮卑前書胸奴傳注犀毗亦曰鮮卑亦謂師比總一物語有輕重耳是則鮮音如犀也檀石槐乃立庭於彈汗山啜仇水上至網羅山川水澤鹽池檀石槐勃興漠北再世而衰不能為中國大患然則永嘉喪亂豈非天實為之乎從右北平以東至遼東至為西部皆仿胸奴故迹一冬二春必能禽滅兵難遙度而育自詭以二春滅方張之寇一勝遂驕喪敗必矣議郎蔡雍議曰至臣曰可矣伯喈文此篇最善然鋪陳前代事少剪裁又虛計二載自許有成處亦未能確以事勢成敗相質才識為不逮班氏也自檀石槐後諸大人遂世相傳襲烏桓傳云無世業相繼鮮卑習俗本與之同至檀石槐後乃世傳襲有慕容氏也義門讀書記卷二十四

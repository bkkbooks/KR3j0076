body:
  text: 義門讀書記卷二十三翰林院侍讀學士何焯撰後漢書明八王傳樂成靖王黨和帝立崇兄修侯巡為樂成王注修縣及條縣皆屬勃海條字或作修按修讀為條非有兩縣注誤也李恂傳會鴻卒至持喪三年送鴻喪可也留起冢墳持喪三年不又過乎陳禪傳故詩云以雅以南韎任朱離注毛詩無韎任朱離之文蓋見齊魯之詩也今亡按以雅以南之下蓋有脫文今獨存四字耳非韎任朱離齊魯别有此句龎參陳龜傳二傳特多長語所載文皆當痛削也橋元傳七世祖仁至成帝時為大鴻臚前書百官公卿表無仁名崔駰傳此傳大抵本安平之譜牒殊過于煩冗上有老母至遂稱疾去欲潔已而不危所生仰藥可也否則稱篤疾可也胡為受偽命哉篆嘗勸其友孔子建仕莽逡巡稱疾特見莽將敗巧於脫免非真明于義者著周易林六十四篇即今所傳之易林否更考之又許峻亦著易林見方術傳駰擬揚雄解嘲作達旨以答焉此文無一語攄寫胸臆脫槧而已寫載真為無識帝曰公愛班固而忽崔駰此葉公之好龍也帝其葉公乎達旨一篇尚不足為賔戲之輿臺况固自有一代著述耶憲以重戚出內詔命駰獻書誡之曰至慶流無窮矣崔琦外戚針逺不逮此篇實論當世便事數十條名曰政論此文華而不實雖意在救弊然殊不若王符謂不當數赦贖者為得其要且桓靈以後非失之寬失在寬縱權戚姦閹嚴于清流耳今不討究用法之謬但勸其糾之以猛積衰之後重以威虐徒促祚速禍而已見東萊先生論與鄙趣同量力度德以上宜大加刪剪以此言之文帝乃重刑非輕之也以嚴致平非以寬致平也此又曲為之説以申己意以下則縱橫之士遺唾也歷位邊郡而愈貧薄至無以殯殮觀實以歷邊郡而貧薄見稱則由來邊吏多貪此國事所以易敗也公卿州郡至别自通達因常侍阿保别自通達者公卿也故靈紀云私令左右賣公卿若州縣至黃綬則公賣不諱貧者到官倍輸方有左騶四出督收所負矣民安得不困窮黃巾安得不三十六方同日反乎徐稚傳設雞酒薄祭至何為栖栖不遑寧處通鑑所採徐孺子此事參取袁記其敘致優于范書大樹將顛之語作以書戒之亦非此時語茅容申屠蟠傳太學生爭慕其風至今之謂矣明季清流何以竟不戒前車楊震傳宏農華陰人也八世祖喜髙祖時有功封赤泉侯髙祖敞昭帝時為丞相前書楊敞不云是楊喜之後安得據附托之譜學大書于史功臣表赤泉之後居茂陵受歐陽尚書於太常桓郁伯起受經桓郁疑楊寶乃是其祖書奏不省伯起可以去矣帝不省騰竟伏尸都市至有恚恨之心趙騰死伯起猶不去方急攻羣小速其致死于我可謂忠有餘而智不足矣秉傳曰禍福無門唯人自召注誤以閔子馬為閔子騫此傳寫致然文選注中亦如之秉因奏覽及中常侍具瑗以理以勢不容舍覽矣奏中無具瑗恐有脫文書奏尚書召對秉掾屬政歸臺閣橫妄如此漢世故事至竟免覽官而削瑗國秉言得行桓差勝靈恨復用覽耳然對語真知大臣之職者矣章八王傳千乘貞王伉悝自殺至悉伏誅冤酷至此豈有不請于帝者段熲附甫罪通于天豈惟夷滅蘇氏之報哉清河孝王慶帝移幸北宫章德殿至慶出居邸和帝舍慶無可寄腹心者故假講於白虎移慶自近觀憲誅後即出居邸可見其微帝時年十四慶年十五決策定亂如取一鼠亦英異哉張晧傳犍為武陽人也六世祖良髙帝時為太子少傅封留侯功臣表元康四年良元孫之子陽陵公乘千秋詔復家是子孫居陽陵無緣徙蜀也千秋當宣帝時已為良六世孫不應自元康四年至世祖建武之元又八十七年晧猶為六世孫也譜牒之學淆于六朝輕信無稽傅託之説于是張魯子孫皆冒留侯之後班氏不信馮商言張湯與留侯同祖何其卓也又蜀志張翼傳晧作浩翼之髙祖亦不言其出于留侯如孔明之于豐鄧芝之于禹來敏之于歙也陽嘉元年復為廷尉其年卒官時年八十三自順帝陽嘉元年壬申上溯世祖建武二十六年庚戍為年八十有三晧之生去千秋復家時一百十有二年王龔傳山陽髙平人也世為豪族曹子建王仲宣誄言王氏畢萬之後則浚儀之王也暢以明府上智之才至不在用刑敞之論得為政大體李元禮輩惜不聞也杜根傳父安字伯夷至時人貴之安事亦略見樂恢傳注中年十三具此逺識真竒童也時和熹鄧后臨朝至拜侍御史按此皆採潁川先賢行狀以積十五年之語觀之則事有違反和熹之崩在永寧二年三月至五月而鄧隲等以譖自殺計下詔求根等即在是年考和熹既立安帝久不歸政至是凡十五年遂稱制終身誠過于持權若永初初年帝尚未加元服不得謂之年長根等何緣輒進諫哉欒巴傳以宦者給事掖庭補黃門令此宦者乃所謂五種黃門非割勢之人徴拜尚書注所引神仙傳乃依仿樊英事上書極諫理陳竇之寃至巴自殺欒巴以此不入方技然附見他人傳後可也劉陶傳耳不聞檀車之聲通鑑注大明之詩曰牧野洋洋檀車煌煌陶蓋用此檀車言桀紂亡國之事武旅有鳬藻之士武旅乃詩泮宫矯矯虎臣之義必避諱作武耳詩有薄采其茆則毛傳云鳬葵也注謂周武王之旅鳬得水藻謬甚帝殊不悟方詔陶次苐春秋條例宋人不管防秋但管春秋類此李雲傳乃露布上書移副三府黃精代見此語豈可露上帝欲不諦又指斥無忌寬饒眭孟合而一之曉人不當如是當有黃精代見注黃精謂魏氏將興也按雲所言者但據讖緯不指魏氏蓋勳傳涼州刺史梁鵠畏懼貴戚梁鵠出于鴻都素與貴戚宦官相表裏者也臧洪傳袁紹憚其能徙為東郡太守都東武陽洪之失在不早見袁紹之不可與尊奬王室後事則曲在紹范議其偏忿者非也洪答曰至夫復何言范節此書比三國志為優豈悟本州被侵至收淚告絶洪不直紹尤在不聽其獨赴故主之急故還為敵讐也足下當見久圍不解句上三國志有足下欲使我輕本破家數語其分析分義輕重甚明不當節去獨不念黃巾之合從耶句下三國志有加飛燕之屬悉以受王命矣二語不當節去夫仁義豈有常所至不與將軍同日生也千載生氣士不可以成敗論也張衡傳祖父堪蜀郡太守此又一張堪非張君遊君遊宛人後為漁陽太守復造候風地動儀風盛則地從而動於儀可徴初光武善讖至儒者爭學圖緯讖傅於緯緯亦非為讖設自漢取秦用兵力戰至成哀之後乃始聞之按賈誼鵩賦已有讖言其度之文傅會五經以髙逺其所自來則諸陋儒以漸潤飾哀平之際如賀良輩又妄造異説私相竄改彌益誣偽其實自漢而上非無讖也燕人盧生奏録圖書曰亡秦者胡也又在賈生之前矣淮南説山訓云畜生多耳目者不祥讖書著記之尚書堯使鯀理洪水理當作堙因下共工理水致誤而春秋讖云共工理水共工防川事在鯀前四嶽佐禹則又共工從孫也事見太子晉諫壅榖水外傳中平子博極羣書殆偶有遺忘耳衡乃詭對而出閹豎恐終為其患遂共讒之詭對而出猶為所讒衡蓋不知命者也又條上司馬遷班固所敘與典籍不合者十餘事注衡集其略曰易稱宓犧氏王天下宓犧氏沒神農氏作神農氏沒黃帝堯舜氏作史遷獨載五帝不記三皇今宜并録按不記三皇者書缺有間也世次不可得而詳矣後小司馬因之補作不知量也至于編年月紀災祥至建于光武之初少帝非劉氏子不作吕后本紀則事無所繫若作元后本紀則元始之時不當反退平帝不著于紀居攝之時政出自莽后不預焉可謂進退無所據也以更始之號建于光武之初今范氏用之然班氏律歷志固未嘗沒其實張之説蓋出于班耳馬融傳察淫侈之華譽至宗重淵之潛龍此兼諷不當委政于舅族故頌奏而忤鄧氏蔡雍傳六世祖勳至授以厭戎連率歷官與蔡雍所作祖攜碑不合此云平帝時碑作哀帝此云為郿令碑作邰長騁駑駘於修路至髙受滅家之誅伯喈晚為董氏所縻正與釋誨之旨違反故范氏載之其文則東方曼倩揚子雲之輿臺也雍乃自書册于碑册當從水經注作丹往來依太山羊氏按羊祜為蔡雍外孫蓋以婚姻依之雍在司徒王允坐殊不意言之而歎裴松之以為伯喈不應發嘆于子師之坐此謝承妄記黃瓊傳初瓊隨父在臺閣至莫能抗奪黃公練達守正亦非有過人才識病篤乃奏諫書又不能極言宦官不可擅權僅優于胡廣而已冀可比鄧禹至同於霍光冀遂可比鄧禹同霍光乎此議雖不載可也順帝始以童弱反政至可為恨哉必欲一一規仿前書彌見凡固東萊因其語遂謂東京人材莫盛于順帝之時斯耳學也荀爽傳拜郎中對䇿陳便宜對䇿無一語及外戚宦官豈不使谷子雲胡盧九原哉漢為火德火生于木木盛于火故其德為孝以火德為孝則孝非達禮喪制可以改易矣迂曲不通漢儒之蔽如此王姬嫁齊使魯主之不以天子之尊加於諸侯也慈明之語比邵公于義長矣及逢卒爽制服三年為舉主制服三年為君當如何又私諡其君父及諸名士此所謂君指太守令長言之悅又言尚主之制非古至違人不義此即荀爽對策中語何事復採陳實傳倫謂衆人言曰至過則稱已者也如髙倫者亦真長者不以一眚掩李固傳李之器識在楊震以上使清河得立可以致主文宣天不祚漢爾其駁議發荆揚兖豫四州兵援日南事在南蠻傳中亦深悉邊計盧植傳宜依古禮置諸子之官諸子周禮夏官司馬之屬掌國子之倅申宥回枉回屈也注訓邪誤侯王之家至以防未然侯王以減削賦稅思亂如明之中葉以後宗藩無祿以給屢至譁訴此其徴也古今之變兩漢二書中備矣趙岐傳今海內分崩至前後不絶此亦漢室存亡之機若表能盡用岐言先迎天子未遽為魏也著孟子章句儒林傳程曾作孟子章句在邠卿之前今曾書不傳皇甫規傳及黨事大起至恥不得豫若皆坐黨被錮誰與事君恥不得豫賢者之過張奐傳而召主簿於諸羌前按水經注此主簿為張祁段熲傳朝廷知熲為郭閎所誣至稱為長者非熲之厚閎乃宦豎私人不敢言耳記事者當以其人其時裁之煎當亂邊馬援遷之三輔按徙滇吾餘種七千口於三輔者乃永平初馬武事陳蕃傳帝得奏愈怒竟無所納蕃言不用天命去漢故桓帝下愚不移以為一時君子激切太過者是小人諧媚設淫詞而比逆亂者耳論彼非不能潔情志至數公之力也天下一君四海一國雖異姓之臣既當鼎鉉固當禍福共之竭力致死無所辭避事之不濟則天也王允傳士孫瑞字君策至為亂兵所殺瑞事亦見董卓傳注中宜移之於此黨錮傳李膺尋轉蜀郡太守以母老乞不之官按注所引謝承書則固之官矣膺等頗引宦官子弟頗引宦官子弟猶以智免何不于黨禍未作稍濟以寬宏使不致死于我乎無事則摧破其支黨以立名有急則連引其子弟以脫免又安能服奄寺之心哉此牢修之獄發之自外朱並之章授之自內也杜密後密去官還家至無所干及不在其位不謀其政周甫非功曹督郵何事多所陳托侵預太守刑賞乎學季林者不失為刻鵠也范滂投版棄官而去注云版笏也按版非笏乃署其職官氏名于版持以上謁者也張儉儉舉劾覽及其母罪惡請誅之苑康傳云殺常侍侯覽母以宦官傳參考之不過追論覽母生時罪惡此云及者得其實外黃令毛欽操兵到門至欽嘆息而去黨錮者遊俠之變其行有清濁而以意氣相死則同歸也岑晊晊與牧勸瑨收捕泛等至終于江夏山中云所殺至二百餘人疾惡而傷于嚴酷矣况又遇赦乎又翟超之獄事由張儉成瑨之死禍起岑晊府朝被難不聞奔問與之同命而徒竄身自免揆之臣人之義亦有愧焉宜乎公孝見拒於偉節也賈彪吾不西行大禍不解至於是咸服其裁正偉節亦遊俠之魁然能知輕重故可與權郭太傳性明知人好奬訓士類奬而不訓則徒合虛譽何補于世然知人之明或不至則不可與言而強聒者有矣竇武傳武召侍御史河間劉倏至是為靈帝劉倏未必賢智其所稱何可信也時武出宿歸府方舉大事而反出宿歸府可謂疏矣何進傳詔使進弟河南尹苖出擊之苖朱氏子與皇后同母異父冒何氏五行傳作后異父兄朱苗前竇武欲誅內寵至而五營百官服畏中人故也魏志注引九州春秋云但坐言語漏泄以五營士為兵故耳五營士生長京師服畏中人而竇氏反用其鋒遂果叛走歸黃門是以自取破滅事勢分曉袁紹勸進便於此決之至使捕案中官親屬紹為司隸校尉假節擊斷當進未決直盡收中官付一獄吏可了此之不圖而詐宣進教捕案親族不亦不知要乎孔融傳初女年七歲至遂盡殺之井誅幼弱此司馬懿滅七族之權輿也荀彧傳乃為彧娶中常侍唐衡女裴松之三國志注云按漢記云唐衡以桓帝延熹七年死計彧于時年始二歲則彧婚之日衡死久矣夫事固有棄彼取此以權一時之勢棄彼二句宜并刪去今失文若本意矣雖回易彼此二字然兗州本所固有不得云取此也以魏志參考乃知作史之難各懼不得保其土宇至責王貢之不入保其土宇守其兵衆之下刪去人多説關右諸將以閉關之計一語則此段遂無要領矣一旦生變之下刪去袁尚得寬其死袁談懷二劉表遂保江漢之間三語亦不見天下未可圖之實下先定河北四語指陳得失不見其反覆透切矣陳范敘事其髙下難以數計也一旦生變指馬超韓遂而言堅營固守徼其軍實操表出荀别傳今載裴注中無堅營固守徼其軍實二語按烏巢之謀許攸來奔而後定非文若素籌及此今并歸之為失其實會南征孫權表請彧勞軍于譙因表留彧復存此表徒使紙費皇甫嵩傳故信都令漢陽閻忠干説嵩曰至何以求安乎張元説張溫以誅宦官清君側此則直教義真以反耳然用元之言必至如忠之計騎虎豈得中下其歸于逆亂一也其後王國之亂忠亦卒為逆魁見中常侍趙忠舍宅踰制至嵩不與此威明家法東漢士習初平元年乃徴嵩為城門校尉至將遂誅之徴嵩乃卓之意非天子之命也放兵入朝則一匹夫矣梁衍之計異乎閻忠不從者為暗于義矣朱雋傳令過本郡簡募家兵雋擊却黑山猶賴家兵徴調之卒非素拊循倉卒難用更封錢唐侯錢唐自秦時有此名以唐為塘乃俗字耳注家謬信水經注故引之贊亦弭于越注謂平許昭也按傳斬梁龍非平許昭注誤平許昭乃臧旻事在其子洪傳董卓傳尋而何進及弟苖先所領部曲至卓兵士大盛魏志云時進苖部曲無所屬皆詣卓卓又使吕布殺執金吾丁原并其衆故京都兵權獨在卓數字異同事勢分曉卓乃與司徒黃琬司空楊彪至擢用子孫此事當書之竇武傳末越騎校尉汝南伍孚至言未畢而斃瓊與孚疑是一人因其被害時人造此事以歸之耳裴注中採謝承書亦致疑及此論然猶折意縉紳遲疑陵奪至於焉而極山東鼎沸蜂起卓奔敗不暇非遲疑也盜亦有道操為近之卓徒為操驅除耳傕泛即卓之餘殃何事抑揚稱量哉但當追本何進輕於召寇王允暗于應變致斯禍敗耳劉虞傳魏志公孫瓚傳注中頗有虞事宜採之入注以虞宗室長者欲立為主東海恭王光武之子虞於宗室為最親故諸人欲奉之公孫瓚傳瓚具豚酒於北芒上祭辭先人瓚遼西人安得先墓在北芒論自帝室王公之胄皆生長脂腴至或未聞焉按魏志瓚傳注引吳書云虞遭世衰亂又與時主疏逺仕縣為戶曹吏以能治身奉職召為郡吏以孝亷為郎則生長脂腴不知稼穡之論於伯安為濶逺矣陶宴傳大起浮屠寺至且萬餘人民間起寺自笮融始而融後被殺廣陵太守趙昱待以賔禮融利廣陵資貨遂乘酒酣殺昱按魏志注引謝承書云賊笮融從臨淮見討迸入郡界昱將兵拒戰敗績見害與此互異袁紹傳紹壯健好交結此指紹父成言之衍紹字紹勃然曰勃然與上詭對相違反雖小處亦以承祚為優義兵伏楯下一時同發以步當騎非楯不濟此戰必觀魏志紹傳注中所引英雄記乃分曉此太略斬毒及其衆萬餘級英雄記斬毒下有及長安所署冀州牧壺壽一語則收復鄴城乃為分曉潁川郭圖淳于瓊曰至非計之善者也魏志云天子在河東紹使郭圖使焉圖還説紹迎天子都鄴紹不從此用裴注所引獻帝傳語互異今迎朝廷於義為得至於是以中子熙為幽州刺史紹所以終于無成者在不先迎天子所以身沒一敗塗地者在繼嗣不定故並敘立案此承祚作傳綱領而范因之乃下詔書於紹至而但擅相討伐先下詔責紹所謂名其為賊也然操以紹恥班在其下遽讓大將軍于紹則仍蓄力俟時不先動以挑強寇故能從容取布破備無後憂耳紹既并四州之地衆數十萬而驕心轉盛貢御希簡紹雖失計不迎天子然既已據有四州若能外修職貢內撫其民以待事機縱曹氏難圖猶足宰制大河以北未至一敗塗地也若不得通至漸營河南師曲為老欲其出有名也監軍之計在於將軍三國志注中載獻帝傳作監軍之計在持牢將軍二字傳寫之誤父嵩乞丐擕養注引曹瞞傳及郭頒世語並云嵩夏侯氏子惇之叔父魏太祖於惇為從父兄弟也按惇淵之子皆與魏室締姻有以知曹瞞傳及郭頒世語之妄配等恐談立而評等為害遂矯紹遺命奉尚為嗣袁氏傾覆以紀配立少促之配後雖抗節不足多也尚逆擊破操操軍還許小失利而遽還者緩之使自相圖則取之易也故後度河救談尚既還鄴仍復引還俟尚再出攻談乃乘虛攻鄴城初交殊族卒成同盟二語文義難曉疑有脫誤昔三王五伯至而徼富強於一世也數語詞理悖謬宜從削略劉表傳時江南宗賊大甚宗恐與巴賨之賨同義南蠻號也在荆州幾二十年家無餘積盡費于養士亦不厚斂于民故能保境殁身也蒯越等侯者十五人封列侯者十五人此子布等所以望風勸權迎操也然琮本凡才不失為保族之計傅巽譙周亦難同論在人所審處贊窺圖訊鼎禋天類社窺圖謂紹以耿包白事示僚屬也劉表郊祀天地事在孔融傳既云天工亦資人亮天工范直指天命言劉焉傳州任之重自此而始州任重而土地分裂卒成鼎足之運焉遣叟兵五千助之注漢世謂蜀為叟孔安國注尚書云蜀叟也按孔頴達尚書疏云叟者蜀夷之别名漢世不即謂蜀為叟也光武紀注中引常璩華陽國志云武帝元封二年叟夷反將軍郭昌討平之因開為益州郡是蜀人謂其西南勞深靡莫諸夷為叟乃今雲南地也時人有地中得玉印者今米道之後云自陵傳有玉印豈因魯嘗得之猶假以欺人耶吕布傳袁術待之甚厚至復去從張楊於河內魏志云術惡其反覆拒而不受與此互異義門讀書記卷二十三

body:
  text: 義門讀書記雜家類二雜考之屬提要臣等謹案義門讀書記五十八卷國朝蔣維鈞輯録何焯校正諸書之文也焯字屺瞻長洲人康熙四十一年用直𨽻巡撫李光地薦以拔貢生入直內廷尋特賜進士出身改庶吉士授編修後坐事禠職仍校書武英殿康熙六十一年復原官贈侍讀學士焯文章負盛名而無所著作傳於世沒後其從子堂始裒其㸃校諸書之語為六卷維鈞益加搜輯編為此書凡四書六卷詩二卷左傳二卷公羊穀梁各一卷史記二卷漢書六卷後漢書五卷三國志二卷五代史一卷韓愈集五卷栁宗元集三卷歐陽修集二卷曽鞏集五卷蕭統文選五卷陶潛詩一卷杜甫集六卷李商隱集二卷考證皆極精審其兩漢書及三國志乾隆五年廷臣奉詔校刋經史頗采用其說焉乾隆四十三年九月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:5970adfb5dc8ecd82116bd80d291be6ae5841db8ecc78a20a54b46738f07ebaf

body:
  text: 義門讀書記卷三十七翰林院侍讀學士何焯撰河東集上西川武元衡相公謝撫問啓再召而復擠之特以劉遇其長尤無狀故賀趙江陵宗儒辟符載啓伏聞以武都符載為記室蜀才自子昻之後當數符厚之王吏部以清議自任吏部當是王仲舒宏中上權德輿補闕溫卷决進退啓叠足榻翼榻作搨是以有前日之拜是以有今兹之問按雲麓漫鈔云唐之舉人先籍當世顯人以姓名達之主試然後以所業投獻踰數日又投謂之溫卷所謂前日之拜今兹之問指是也上嚴東川寄劍門銘啓庶幾其文猶或傳于世自知之明上裴行立中丞撰訾家洲記啓纍奉游宴四句略見為文苦心并知韓子于滕王閣所以但記新修歐公作有美堂記不得已而出于蹈虛也禮部賀冊尊號表理歷凝命以下此賀尊號凖格禮部賀立皇太子表此皆宗社啓祐皇心宗社下有垂祉二字代韋中丞賀元和大赦表中間歷敘赦條為賀御史臺賀嘉禾表靈嶽不愆于贊祐切幽州禮部賀甘露表本色正佳畏景轉炎二句見降未止意禮部賀白龍等表叠瑞重祥二句以西內為主敷彼青光青作清逺通邊徼總束知人之溥洽人字下有和字禮部賀白鵲表伏奉進㫖㫖作止賀親自祈雨有應表五字字體要玩諷彌佳柳州賀破東平表五兵永戢二句束上生下代裴中丞賀分淄青為三道節度使表山川備臨制之形二句有骨為樊左丞讓官表儻蒙垂收紫渙紫渙乃不成語應作紫泥代裴中丞謝討黃少卿賊表志慕孟公二句孟之側軍敗而殿何以引用為劉同州謝上表不似公文亦殊質健代裴行立謝移鎮表故材舊壤材疑作村代韋永州謝上表此應用文字兼備論事之體謝除柳州刺史表無一字不妙深婉悽壯可謂兼之早以文律二句言屈之久臣以不慎交遊二句言過之輕為楊河南謝設表宴飲斯及飲作飫為武中丞謝賜櫻桃表句句佳王詩柳表足以相當謝賜時服表荏苒星紀貼時服不循彝典下疑脫一句為廣南鄭相公奏百姓産三男狀得體在質按今制但米五石布十匹折銀八兩為薛中丞浙東奏五色雲狀紛紛郁郁四字上有遂使二字讓監察御史狀此狀可為李賀當舉進士之一證以幼年逮事王父曲禮逮事父母則諱王父母不逮事父母則不諱王父母准禮二名不偏諱廖氏九經總例云舊杭本作不遍諱偏當作遍柳州上本府狀則伏望此狀便令廢格又申此語明已非用邀名動之以必從輕賜塵黷賜作肆為裴中丞伐黃賊轉牒猶並盧王還師已期于席上王言解明王之道其征也則必還師祍席之上纎縞當强弩之初翻新用事賀平淄青後肆赦狀當伊尹無恥之辰無字未穩賀分淄青諸州為三道節度狀鼠無夜動二句恰分貼齊魯所以獨工為裴中丞上裴相乞討黃賊狀合莝脆以為强潘云莝當作遳七戈切選稟質遳脆廣雅曰遳亦脆也為桂州崔中丞上中書門下乞朝覲狀一本作上宰相狀未遂執圭之願執圭用曹王語為南承嗣上中書門下乞兩河效用狀勝奏狀為長安等縣耆夀詣相府乞奏復尊號狀此等一字不遺有所未喻祭楊慿詹事文莫成子姓楊氏無子故云祭穆質給事文起四句涵蓋穆之兄弟及其先公與子厚所遭言之其廢自久自作日祭吕衡州溫文二事相期期作勘豈為鳯為麟二句柳子亦自道云爾寓其神栖其魄則今所傳之文章也祭李中丞文王播等八人者惟馮邈無聞焉可謂極一時之妙選矣所云慎擇寮吏必薪之楚者真無愧詞惜乎失其名也為韋京兆祭杜河中文可削為韋京兆祭太常崔少卿文可削為安南楊侍御祭張都護文可削南州斗酒南州用徐孺子祭黃瓊事哭張後餘詞然而不顯而作猶吾謂善與惡至無取喜怒於其中仍是天說之意然較渾融道之出者多重較本作道之出其離焉者固多然後餘不與諂冒者同貴諂與惂同後系以詞纒綿激壯舜廟祈晴文未見大手然非俗韻祭井文似過于工妙然未易與俗人道也禜門文敬用瓢齊齊音咨祭六伯母文懿彼賢女懿作粲臨卭令三女作粲早嵗文情詞兼爾欵至祭獨孤氏丈母文友之母稱丈母祭崔氏外甥女文甥于我氏甥一作生雖云惟性惟性作性善敷暢浩通浩作洽賞期振耀賞作實宜福其遭遭作豐祭外甥崔駢文惟俎及壺謂身不得俱也以下詩同劉二十八院長述舊言懷感時書事奉寄澧州云云發端三聨統謂與張劉投分之切故下云繼讎天祿文許後生誇子厚弱冠升名遽呼未遇者為後生母乃器識之淺歟殊音辨馬撾馬撾疑亦蠻中事當更考之同病憂能老同病謂劉宏農公以碩德偉材屈于誣枉云云比前詩尤工字字鎔冶經史無半㸃草料璧非真盜客一聨夷簡奏慿前在江西日贓罪故先著此一聨獨棄傖人國以下子厚自述酬婁秀才將之淮南見贈之什發端直貫注銷魂弔影一聨酬婁秀才寓居開元寺早秋月夜病中見寄夢繞羽人邱謂婁將入道初秋夜坐贈吳武陵起二句暗藏風字積霧杳難及一聨起逺字晨詣超師院讀禪經妄迹世所逐妄跡其達摩所謂有為法乎日出霧露餘一聨日來霧去青松如沐即去妄迹而取真源也故下云淡然有悟贈江華長老風窗疏竹響二句借竹風松露喻老僧之真寂也古東門行赤丸夜語飛電光赤丸暗寓武氏魏王臥內藏兵符言元衡既主用兵又不能驅駕諸將師老于外變作于內懷慙入地深笑其智小謀大也子西掩袂真無辜真無辜言豈真無辜耶敵國舟中非所擬非所擬謂非平生排斥之人忽出所備之外也絶䑋斷骨郍下補下一作可然下字較勝言如何下手也重校下一作暇奉和楊尚書郴州追和云云閒同遲客心謝康樂南樓中望所遲客詩見文選中其詩乃孟夏作此句用事最深密朗州竇常員外寄劉二十八詩見促行騎走筆酬贈重校吕本有因以奉呈四字按四字當有末二句乃呈劉也善謔驛和劉夢得酹淳于先生發端自比當日逺貶之久忽遇詔追也同劉二十八哭吕衡州兼寄江陵李元二侍御元微之有哭吕衡州詩六首九原猶寄若堂封杜哭王彭州掄之官方玉折寄葬與萍漂同此意也衡陽與夢得分路贈别翁仲遺墟草樹平沈佺期渡南海入龍編詩尉他曾馭國翁仲久遊泉亦以翁仲為嶺外事但檢之不得其原皇甫録近峰聞略云阮翁仲安南人身長三丈二尺氣質端勇事秦始皇守臨洮聲振胸奴秦範其像置司馬門外胸奴使來見之猶以為生惜不載所出何書出桂陽下湟水正連州地題云分路則翁仲句乃適柳之路也登柳州城樓寄漳汀封連四州吳喬云中四句皆寓比意驚風密雨喻小人芙蓉薜荔喻君子亂颭斜侵則傾倒中傷之狀嶺樹句喻君門之逺江流句喻臣心之苦皆逐臣憂思煩亂之詞得盧衡州書因以詩寄蒹葭淅瀝含秋霧一聨霧鼓吹作雨秋雨即蒹葭之聲夕陽即橘柚之色也細按之作霧為是乃嶺外風景遇霧多見日晚也非是白蘋洲畔客二句注中當并引洞庭有歸客瀟湘逄故人二句落句乃顯嶺南江行山腹雨晴添象迹近峯聞略廣西象州雨後山中遍成象迹而實非有象也柳州峒氓後四句言歷嵗踰時漸安夷俗竊衣食以全性命顧終已不召亦將老為峒氓無復結綬彈冠之望也欲投章甫作文身言吾當遂以居夷老矣豈復計其不可親乎首尾反覆呼應語不多而哀怨已至别舍弟宗一一身去國六千里通典柳州龍城郡去西京五千四百七里欲知此後相思夢二句韓非子張敏與髙惠二人為友每相思不得相見敏便于夢中往尋但行至半路即迷落句正用其意承五六來言柳州夢亦不能到也注指荆郢為宗一將遊之處非殷賢戲批書後寄劉連州并示孟崙二童臨池尋已厭家雞盧攜言劉柳並學書於皇甫閲柳為升堂劉為及門宜有家雞之戲附劉夢得酬家雞之贈柳家新樣元和腳注言元和間有書名元和腳者指公權也按趙璘因話録云元和中柳柳州書後生多師效就中尤長于章草為時所珍湖湘以南童稚悉學其書頗有能者長慶以來柳尚書公權又以博聞彊識工書不離近侍柳氏言書者近世有此二人是子厚先擅書名于元和之證且未有乞書于子厚而反稱公權者也注非柳州城西北隅種甘樹滋味還堪養老夫結句正見北歸無復望矣悲咽以諧傳之遊朝陽岩遂登西亭二十韵羈貫去江介天寶之亂柳氏舉族如吳柳子之父為宣城令者四年湘口館瀟湘二水所㑹升髙欲自館館作舒南澗中題秋氣集南澗萬感俱集忽不自禁發端有力羈禽響幽谷一聨似緣上風字直書即目其實乃興中之比也羈禽哀鳴者友聲不可求而斷遷喬之望也起下懷人句寒藻獨舞者潛魚不能依而乖得性之樂也起下去國句遊石角過小嶺至長烏村釋志東臯耕釋土解也詩云其耕釋釋箋云耕之則釋釋然解散與崔䇿登西山鶴鳴楚山靜鶴夜半而警露此句是不眠待曉即隱憂倦永夜之意尤不露骨也覺衰是時春向暮至商頌有遺音㫖趣在此蓋感十年不召也遊南亭夜還敘志七十韻神明固浩浩神明謂君心也暮景回西岑轉出夜還木落寒山靜一聨大謝詩野曠沙岸淨天髙秋月明入門守拘縶以下敘志五辟咸肆宥五作三所懼齊焄藨藨與蒿同義禮記祭義注蒿或作藨韋道安淮水秋風生秋風生暗用風從虎哭連州凌員外司馬不減陳思贈白馬之作世義安可支義作議韋使君黃溪祈雨見召從行至祠下口號遙駐野人居遙駐二字已暗括見召從行肸蠁巫言報選注肸蠁蚊類言大福之興如此蟲群飛而多此詩天然自工政使極意雕飾竟莫加也從崔中丞過盧少府郊居蒔藥閒庭延國老國老比中丞開尊虛室值賢人賢人則謙言已非清流也法華寺西亭夜飲三四工在次第如畫戲題石門長老東軒花開日日雉背飛戲之也公暗以長老自比茆簷下始栽竹日逺棄幽期棄作契種仙靈毗門有野田吏吏疑更列子有田更商邱開之文即叟字分書也幸及兒女奔結少味種白蘘荷庶氏有嘉草庶讀如藥煮之煮攻禬事久泯禬讀如潰癰之潰並見鄭康成說戲題階前芍藥願致溱洧贈二句陳思王詩南國有佳人華容若桃李結句雖戲亦楚詞以美人為君子之㫖也自衡陽移桂十餘本植零陵所住精舍路逺清凉宫路逺一作逺植一雨悟無學雨悟一作悟雨淨土堂淪溺窮苦源淪溺一作論極華堂開淨域華堂一作龍華零陵早春邵武本作春懷故園田家盡輸助徭役徭役一作淫侈此不知詩意之婉者也聊就空自眠自一作舍東鄉後租期四句車陷泥澤非敢後期而遽遭鞭朴故曰少推恕也古道饒蒺䔧二語即含迷去住三字行路難披霄決漢出沆漭決疑抉啾啾飲食滴與粒啾啾作啾嘍工命採斫杙與椽杙與作戕為桃笙葵扇安可當當合作常讀書詩亦無窮起伏感遇鴻鵠去不返二句鴻鵠髙飛一舉千里髙祖楚歌之詞句吳則泰伯也丸鼓騖竒音丸鼓謂元帝材定陶也東海久搖蕩謂東海王彊南風已駸駸南風烈烈吹黃沙賈妃謡也居貨捐千金居貨用子楚事咏史誰顧蠢蠕群此句怨而怒矣樂生報書自溫厚也此詩以燕惠王比憲宗然以此稱樂生自為工也下三良篇亦有指斥詠荆軻長虹吐白日用事變換秦皇本詐力以下又即荆軻必欲生劫之以報太子之意與上臨事竟趦趄一層反覆呼應言所患不在無勇而反失太子燕秦不兩立之本謀則短於計而失諸愚也省試觀慶雲圖詩設色初成象在天成象破圖字即含卿雲髙標連汗漫二句空濶裂素榮光發圖字不略以下非國語不藉篇然而存其禮之為勸乎農也至不勸而勸矣若曰存其禮而又能推行是政則誠善矣藉田猶不能躬親則時使節用者其又何望焉柳子立論大抵欲快一時之見伸一夫之說而不究其源流者也穀洛門篇天將毁王宫而勿壅四句恐懼修省以圖其本而無廢水土之政焉則庶乎不墜于一偏矣問戰長勺之役篇此條乃非一偏之論先儒譏之者略于知戰之本一語耳卜獻公卜伐驪戎篇卜者世之餘伎也道之所無用也易洪範之言柳子固嘗誦之矣何立論之易也狐突篇以親則外王父也據左傳晉獻公蒸于齊姜生秦穆夫人及太子申生大戎狐姬生重耳文公謂狐偃為舅氏特以母之同姓故耳若狐姬固非突之女也栁子乃以突為申生之外王父何所本耶荀息篇吾言春秋之情而子徵其文不亦外乎春秋之情不外乎文也逐欒盈篇陽畢以其父弒君而罪其宗其王父非其父也新聲篇茍說新味亦將卑乎新味之云淺陋不足陳外集披沙揀金賦合觀迎長日記里鼓三賦皆當時格其中警句尚勝香山也幽以即明上增將去二字既堅且好作實既堅而且好翻混混之濁質混混作渾渾粲葬星繁葬是若字之訛而歧昌即詠歧昌作祈招迎長日賦期廢疾而匪徐廢疾作匪疾故可以知上下之際際字上有分字浮光于俎豆光字上有晨字則無為者委照將久無為作無違記里鼓賦宋書禮志記里車未詳所由來亦髙祖定三秦所獲制如指南其上有鼓車行一里木人輒擊一槌大駕鹵簿以次指南舊書憲宗紀元和十年十二月庚申新造指南車記里鼓河間傳可使奚官先壁道壁道宜作辟道河間命邑臣告其夫召鬼祝詛漢書皇太后皇后公主所食曰邑此云邑臣豈其公主耶箏郭師墓志此文夢得遺書稱嘆不知何以在外集中運掌掔潘云掔烏貫切與腕同玉篇作掔屈折愈繹屈一作抑學者無能知知作如曰猶鼓音四五行曰作日趙秀才群墓志嬰臼死信孤乃立伏追初嗟然秀才何汲汲伏憫夭太府李卿外婦馬淑志文為遷客發不為馬作也為文武百官請復尊號表第二表兼前代之軌模軌作規第三表祝融讀三皇讀作續今者君臣周德周作同廢而不續續作纘第四表以廢先君之典則若專焉則作刑必惟思而內省惟作懼以要天地祖宗要字不當義理第五表固以遇三代之文遇作寓以陛下之詔以字下有違字第六表陛下教遵道備遵作尊昔漢宣帝謂元帝曰四句雖據祖宗舊典然出之臣下似倨矣何以知宗廟之復復字上有興字恨恨而不自安恨當作悢為裴令公舉栁冕表伏見澧州刺史裴冕忠肅或作忠肅明允或作明允忠肅為裴中丞賀破東平表不自妖孽自作有恃東秦十二之險二句承作威竊據一方二句承專祿朝宗之地二句承海封祀之山二句承嶽餘孽滔天承父祖遂使云亭有主二句承封祀遼海無虞二句承朝宗縱捨有感心之化包括劉悟事與衛淮南石琴薦啓一作狀在前集答鄭員外賀啓似非全篇收處重校一本有伏惟同增慰慶六字答諸州賀啓重校有勞致書問悚息增深八字康熙丙戍新秋假外弟吳子誠所收宋槧大字本栁先生文集粗校一過緣失序文目録不知出于何人其字畫乃乾淳以前書也此本合非國語上下二卷共編為四十五卷而外集二卷附焉疑祖四明本箏郭師墓志注中已載胥山沈氏則非沈晦本矣雖闕十之二然近代所祖刋本皆莫及也毛斧季云宋本李杜韓栁集李栁兩家最少豫亦幸而偶見之耳香案小吏何焯記陳氏書録曰姑蘇鄭定刋于嘉興以諸家所注輯為一編曰章曰孫曰張曰董氏而皆不注其名其曰重校曰添注則其所附益也此本疑即鄭所刋云焯又記跋明刻小字板癸巳八月借義門師明刻小字本栁集校過下注一刻云云即此本所異同也其本無龍城録師云此是後人僞作并無集傳等篇其注簡而當與此大異故注中錯字尚未及改惟詩得先生所藏宋刻殘本校過是刻即翻此本而注中某曰某曰都削去幾使文理不順矣右附石湖張進跋義門讀書記卷三十七

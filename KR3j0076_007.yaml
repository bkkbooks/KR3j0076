body:
  text: 義門讀書記卷七翰林院侍讀學士何焯撰詩經詩譜唐於時殺禮以救艱厄古之聖人不以天下奉一人豈獨殺禮哉豳豳者后稷之曾孫也公劉者自邰而出也字者字疑衍小大雅班固古今人表於懿王堅下注云穆王子詩作小顔釋之云政道既衰怨刺之詩始作也是必魯詩相傳之語蓋不始於厲王矣天子諸侯燕羣臣乃聘問之賔乃作及小雅之臣何也獨無刺厲王也作以師移其第耳然則常棣亦或移其第耳朱傳得之商頌則受命代夏桀代作伐自從政衰從作後國風周南關雎序然則關雎麟趾之化至諸侯之風也王者之風諸侯之風與周禮天官地官之分相似故程子謂二南猶易之乾坤首章關關雎鳩傳云無不和諧又不淫其色按上句承摯字下句承有别傳若關雎之有别焉關雎作雎鳩窈窕淑女二句此淑女指后妃鄭箋逑字與傳殊者起下左右之意二章窈窕淑女二句此淑女指三夫人以下箋云欲與之共已職按此起下服字葛覃序敬姜曰勞則善心生婦之不淫以少而勤也故曰后妃之本首章箋云葛延蔓于谷中云云按例以次章不如鄭說鄭曲解興字耳此詩朱氏以為皆賦者近之毛鄭之意以為葛所有事不應并賦黃鳥故定為興卷耳此與召南草蟲之詩相似皆君子行役其室家思念之耳二章我馬虺隤虺作􅳐與仲虺之虺不同維以不永懷上章云嗟我懷人此云維以不永懷是設為君子遙慰其室家之語三章永傷答上嗟字三章箋云觥罰爵也云云按酌彼兕觥正是不醉無歸之意四章云何吁矣言此臣方自云此何足煩君之憂念故君尤當念之也吁爾雅注作盱為勝樛木首章福履綏之即鬼神福謙之意螽斯二章傳云繩繩戒慎也按曰戒慎則又有禮法以持之子孫既材美而更能教也桃夭首章箋云興者踰時婦人按此踰者是喻字因下文傳有無踰時之語而訛宜其室家此言其相匹也二章宜其家室變文言家室者見其能相成也二章其葉蓁蓁又謂其枝條之盛興家人也罝序以罝為后妃之化成何文義首章言肅肅則武夫莫不禮讓矣與豈曰無衣之詩不有王霸之辨乎二章逵非罝之所未詳其㫖箋云此罝之人罝作罝下同三章箋云使之慮事事作無汝墳此二詩朱傳甚分明首章伐枚并肄以比虐之日甚亦得麟之趾觀序意直謂周之既衰鄭則以衰世為指紂首章公子嫡子也于嗟麟兮復歸美于所自來也二章公姓同母弟也姓與生同朱傳云公孫也則用鄭氏解特牲饋食禮子姓兄弟如主人之服云所祭之子孫言子姓者子之所生之義召南鵲巢首章箋云猶國君夫人來嫁居君子之室德亦然按德亦然者能容其下也故迎送有百兩之盛而成宗廟社稷之王也又云車皆百乘象有百官之盛按內官九御凖外官九品采蘩序不失職猶周南之寤寐思服也草蟲首章亦既見止三句思之甚則望之切不惟以得見為慰即一遇亦足以解憂也鄭箋殊迂鑿蓋欲與上鵲巢相配而視傳之失為有加也箋引易釋覯為已昏之據采蘋首章箋云教成之祭牲用魚芼用蘋藻善據此祭女所出祖也女上叠一祭字婦人之行尚柔順自潔清申明成婦順三章箋云祭事主婦設羔事作禮甘棠首章箋云召伯聽男女之訟按訟凡諍訟皆是不必泥下篇而獨指男女即下篇亦不必指為召伯所聽之訟也朱傳得之行露三章獄則獨召之訟則互質也殷其靁序其室家能閔其勤勞勸以義也所謂公義私情兩兼之也首章雷之所聞不過百里今我大夫乃甚逺也摽有梅三章逮其謂之朱傳謂之則但相告語而約可定矣按此釋為近但有媒妁之言而不􅊀禮也小星序箋云命謂禮命貴賤按能安于禮命之貴賤則不違于天所賦之分自在其中首章三五在東三五以春言參昴以秋言夙夜在公箋云凡妾御於君不當夕據夙夜江有汜序勤而無怨但云不我以則無怨也首章箋云然得並流得作而三章不我過過猶及也野有死麕三章昭元年左氏傳趙孟曰吾兄弟比以安尨也可使無吠則春秋解詩者兩無字皆自無也何彼穠矣首章曷不肅雍曷不言何所不敬且和也二章箋云正王者德能正天下之王上王字衍三章箋云以絲之為綸之為作為之騶虞五豝五豵止於一發猶三驅失前禽之意所以為仁之至朱新仲云射畢十二箭方為一發一發五豝非一箭射五豕也十二箭乃能射五豕耳朱傳釋吁嗟句得之邶柏舟序以離騷例之則此詩作仁人不遇者似為有味二章兄弟當指僚友言之不以其戚戚君也若以同姓臣解不能奮飛則尚有義理可味緑衣三章朱傳以女為君子最難通以絲為妾之少艾以治為君子嬖之欲與下章相對而甚乖疏箋云先染絲後製衣製作制燕燕首章燕必雙飛今我留而之子去異於是也涕泣如雨涕泣作泣涕四章定變討賊以寧宗祏君母當為內主所謂先君之思也日月首章箋云日月喻國君與夫人也按朱傳日居月諸呼而訴之也然鄭箋之說則自本于昏義不為迂僻四章父兮母兮二句鄭說微曲當如朱傳終風朱傳作莊公者近之擊鼓三章緣上不得歸而言之四章此與下章朱傳以為從役者念其室家者近之凱風序成其志謂成其志節不復嫁也疏得之雄雉此與下篇朱傳不從刺宣公者近之然猶用序說之半恐亦不然左傳論語雖曰斷章竊謂其大意當由此而推也四章始見君子之耿介决去自疑懷安致患既而自念但不忮求其德行固足容於亂世又何必如君子之逺引哉匏有苦葉前詩言去就此詩言出處首章此章言必視其時次章則嘆他人之昧其道也三章末二章設為問答之辭此章諷其及時也四章上有明君乃可以出不敢斥言故但云須同志之友也谷風二章行道二句當如朱傳作賦箋云徘徊也云下脫一違字五章既生既育治生之生本此式微黎為衛之屏蔽今為狄人迫逐而衛不加存恤此他日狄難所由及也西伯戡黎而祖伊恐詩人録之其以是夫中露泥中自是無所覆庇辱在泥塗之意作二邑者無據當從朱傳君亦當指衛君泉水四章我思肥泉二句言終不可奈何付之永嘆也靜女序此所謂援古以見今之不然當於言外得之者也首章愛而不見愛說文作僾仿佛也傳言志往而行正正作止下同二章傳云古者后夫人必有女史彤管之法云云按此傳與周禮女史之職不相應然必古者御見之法如是也鄘君子偕老首章末二句言必無不淑之事蓋反言以諷非直斥之也傳得之如箋云與下二章違反矣傳何為不善乎何作可桑中三章庸與鄘同孟姜孟弋猶他國之女或係母族曰孟庸則吾國之世族固若是焉不亦甚乎庸者以國為姓不言孟姬而言孟庸則猶諱之也定之方中序始建城市而營宮室建國必有門關為宮室則左祖右社前朝後市并度地居民之制備矣首章作於楚室言作室則廄庫該焉樹之榛栗二句榛栗可以備籩豆之實椅桐備樂梓漆成以養生而送死爰伐琴瑟方建國作室而即計及于爰伐琴瑟則規模宏逺蓋將富而教之此亡國之餘所以復盛也歟二章降觀于桑宜蠶則帛有所出三章靈雨既零靈者感應之速對下秉心塞淵匪直也人不但民事修也對下騋牝三千蝃蝀二章嚴氏能暢鄭箋之指載馳劉向新序曰齊桓公求婚于衛衛不與而嫁于許衛為狄所伐桓公不救至于國滅身死可為說此詩廣異聞襄七云考其時狄入衛在閔公二年冬此詩之四章曰我行其野芃芃其麥殆背冬涉春麥秋將至矣夫閲數月而救援不至則與國之充耳可知其與黎臣之言葛之誕節者何以異左氏于許穆夫人賦載馳之下即係以齊侯使公子無虧帥師戍漕云云則是詩有以激之耳衛考槃首章永矢弗諼如箋之云過于怨懟恐與上碩人之寬句不類竹竿二章逺兄弟父母言既逺其兄弟父母而來所恃者夫子之見答今乃不然所以可悲也伯兮四章焉得諼草諼忘也借以托意非此草果能忘憂木瓜序此詩托意于言外如齊桓之施豈復吾國所能報惟要之以子孫不忘而已木瓜瓊琚以為當時之實事則反啓讀者之疑矣抑孔子次諸王風之前其亦見周室既東諸侯不可無霸哉首章匪報也二句箋似疏二章三章木桃木李則為物益微矣王君子陽陽首章箋云其自樂此而已自作且爰二章傳造僞也僞作為鄭羔裘首章洵直且侯傳侯君也按若以侯為君即不得復云彼其之子且云邦之司直邦之彥也女曰雞鳴二章與子宜之箋云子謂賔客也按以子為賔客語不順溱洧首章傳渙渙盛也盛上脫春水二字士曰既且且本徂字通作且洧之外逺之洧外蕩而不返也伊其相謔箋云因相與戲謔行夫婦之事按士女至於相謔此即淫風流行也鄭之說詩則過矣舉國往觀萬目睽睽即至無良寧有是耶齊東方之日首章傳人君明盛無不照察也照察二字本此亦未宜施之同儕南山序作詩而去之去之即謂作詩之大夫去齊國爾箋似疏三章四章箋云又非魯桓按非魯桓所以甚齊襄之惡甫田三章箋云人君內善其身外修其德德當作政敝笱首章其從如雲箋之所云是文外重㫖猗嗟三章以禦亂兮言但知禦外侮而不念內亂之當間也魏汾沮洳首章殊異乎公路不敢斥言其君故以左右親近者言之公路公行公族皆晉官名魏滅于晉猶弼鄘之風皆衛事也蘇氏亦云園有桃不知我者知我作我知下章同陟岵晉獻公之時數有征役魏既為所滅其遺民不堪其徴發而作是詩十畝之間首章箋云古者一夫百畝云云按若作削小則十畝之外復何說哉正義謂是地傍徑路蓋強為之說碩鼠伐檀則無臣碩鼠則無民魏安得而不亂且亡乎唐蟋蟀序此晉也而謂之唐至乃有堯之遺風焉成王滅唐而封弟叔虞為唐侯至子燮改為晉曰唐者本其始封不獨為其風俗也此篇當從朱傳不得為刺詩首章嵗聿其莫言嵗暮者夏之九月周十一月也山有樞序刺晉昭公也此所刺者蓋以身發財者也揚之水首章箋激流湍疾激作波椒聊二章實大且篤實作碩杕杜序晉自獻公去桓莊之族其後公族公行之官皆以卿之餘子庶子為之蓋懲曲沃之不兩大而忘其將移而滋他族也此詩其作於成公之後乎首章傳杕特貌特下脫一生字采苓首章采苓采苓二句古人苓與蓮通用以澤草而求之山巔豈可信哉枚乘七發蔓草芳苓曹植七啓寒芳苓之巢龜李善注並云古蓮字史記龜策傳龜千嵗乃遊蓮葉之上徐廣云蓮一作領秦黃鳥首章彼蒼者天天國人目其君也晨風首章􅀈彼晨風􅀈作鴥下同二章隰有六駮陸璣以六駮為梓榆非獸者得之朱傳從陸無衣首章王于興師秦人猶知從王征伐不當自擅風其君以待王命而興師豈非先王之教入人者深乎渭陽序康公即位晉文公之殁久矣蓋以三帥被俘兵連禍結令狐之役重見欺于趙盾不能復修先君之好故追思當日送衛反國而傷晉人之少恩也二章瓊瑰玉佩路車所以安其身玉佩則又親于體思之益甚如與舅氏相逐為一而不離也權輿序三良從死亂命亟行又忘其舊臣夫孰為用而繼霸乎陳衡門首章安溪先生云栖遲自樂誰其不願顧所以或不能常安者有物敗之惟無求于世者為能得之下二句與上二句是反覆相應之詞按此說極得詩意觀下二章即申樂飢意可見二章三章河魴宋子豈惟命有限制一有妄求之節不肯自安于栖遲或得之而髙明鬼瞰反顧望衡門而悔不可追矣墓門首章夫也不良夫指陳他言之謂是夫也誰昔然矣誰昔言誰為之養成其惡也此指無良師傅二章箋云梅之樹善惡自有有作耳性因惡矣性作樹防有鵲巢首章卭有㫖苕卭作􅀈下同株林乘我乘駒傳大夫乘駒按此謂孔寧儀行父也檜羔裘三章此章不復言朝則檜君久而唯荒于遊燕可知也曹下泉序曹人疾共公侵刻侵作寖一本浸首章冽彼下泉冽作洌安溪云寒泉當溉嘉榖而所浸潤者蕭稂以比貪殘得志者無功而徒為民病也夫惟明王興于上則車服以庸如隂雨之膏黍苗焉承流宣化皆得其人斯惟周京最盛之治歟豳七月二章殆及公子同歸從傳則公子者女公子也四章為公子裘此以為裘包為褐言之七章亟其乘屋箋云七月定星將中七作十按定星中在小雪時八章十月滌場傳滌場功畢入也滌下脫掃也二字鴟梟此詩朱傳為合三章與多方文法相似東山序序其情而閔其勞朱子語録方其盛時則作之于上東山是也及其衰世則作之于下伯兮是也首章制彼裳衣軍容不入國故歸者别製裳衣四章倉庚六句朱傳以為東征之歸士未有室家者及時而婚姻此較得之序固云樂男女之得及時也義門讀書記卷七

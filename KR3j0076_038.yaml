body:
  text: 義門讀書記卷三十八翰林院侍讀學士何焯撰歐文凖詔言事上書漢王尋等以百萬之兵至少則勝之明驗也三事亦未審其實如王尋之事亦所謂偏敗衆攜耳其四曰禦戎之䇿兵將財用皆不具雖有禦戎之䇿將安所施哉公言真紙上空談也自四路分帥今已半年訓練恩信兵已可用半年安得遂可用耶論臺諫官言事未蒙聽允書其意之曲折似陸相氣之清潔似李侍郎五代史記宦者傳論與此文略相近論包拯除三司使上書可以裁去其半不必乃爾辭費臣聞治天下者在知用人之先後而已至而人君者亦常全名節以養成善士冒頭太冗論選皇子疏得進言之法有體有味臣聞言天下之難言者至其可默而不言工于發端其優遊宴樂也三句陪説處婉而不迫居外則無一人可親三句凄婉動聽論美人張氏恩寵宜加裁損劄子切而不激論賈昌朝除樞密使劄子是則陛下雖斷自聖心至積漸稱譽之力也透骨此英主所不免况仁柔之主乎論臺諫官唐介等宜早牽復劄子辨析條暢字字皆合情理如此論事方能開悟人主陛下自臨御已來至中外驚疑張長史云從聽言有異上起疑一層臣雖不知臺諫所言是非至不宜有此張云從進言有異上起疑一層臣竊以謂自古人臣之進諫于其君者至此不可不察也若泛言當優容臺諫不别白其言之無他與剖破人主疑臺諫挾私妄言之根未有能動聽者也張云論聽言者之異一層自古人主之聽言也至則聽言易也張云論進言者之異一層伏惟陛下仁聖寬慈至則可知其用心矣張云明聽言之所以有異一層昨所罷黜臺諫五人至固謂未可以此疑言事之臣也張云明進言之未嘗有異一層議者或謂言事之臣至以作威勢所謂左右之助者此等是也論杜衍范仲淹等罷政事狀明辨懇款慶歷五年乙酉公時為河東轉運使論修河第三狀指陳利害鑿鑿言西邊事宜第一狀其言慶歷之失策亦後來籌邊者之龜鑑也故吾兵雖衆至不得不敗也要語表啓歐公四六對屬流轉變化有如彈丸而矯枉已過學之太枯不若子瞻尚多風致蔡州乞致仕第二表此篇更有情味謝賜漢書表方經衡石之程此句不類謝襄州燕龍圖肅惠詩啓變調佳在不作長句謝進士及第啓少作風逸既不如唐又未變新體槩録真憒憒也上范司諫書歐公上范司諫書與王炎午生祭文丞相文皆所謂君子愛人以德者文勢如雲之出岫愈轉愈妙故士學古懷道者至與宰相等議論崢嶸可以振作諫官之氣宰相尊行其道至言行道亦行也足賀字正以起責字懼字九卿百司郡縣之吏至亦任天下之責逐層逼入束上二段夫七品之官至非材且賢者不能為也又作一束轉到希文身上長史云拖一句接下幸而城為諫官七年至何所取哉又將已五年二句翻覆説透以見有待之不然又曰彼非我職帶前一句與髙司諫書而足下厠其間三句此何庸牽綴及之昔漢殺蕭望之與王章至况今之人未可欺也此一段頗失之冗况王章事尤比類失當上杜中丞書且中丞為天子司直之臣至中丞之舉動也此段申明不可隨以為非與陳員外書太辭費與郭秀才書雖勉其進而不已然未嘗示以所當進者何業異于韓之直道也與石推官第二書語太煩與荆南樂秀才書天聖中天子下詔書至是直齊肩于兩漢之士也長史云言昔之時文浮華而已今古文之學既行而學之又足以致名兩得之計非特為卑論已也答陜西安撫使范龍圖辭辟命書其自負既隱然有在而求士之道亦宜然公文之最近韓者言外多諷切亦忠告之遺意此一端也拖起下意士雖貧賤至士不為用長史云此是歐公本意顧用之如何爾仍紆餘不迫若修者恨無他才二句兜裹前幅仍不訐露非敢效庸人茍且樂安佚也憤恥等語俱有照應答祖擇之書更鍛錬則尤髙古夫世無師矣學者當師經名言讀書則得古聖賢人以為師矣答李大臨學士書儘曲折今足下在滁而事陳君與居事字張改得代人上王樞密求先集序書模擬而無自得此公早嵗文爾大抵歐自夷陵蘇自黃州以後皆以謫處窮僻有餘間致力於經史乃彌深厚也荆川謂架空纍層之文按須問其纍層所發明者何語荆川論文亦止于皮相也漢之盛時有賈誼董仲舒司馬相如揚雄歐公始稱仲舒正統論上古今論正統者當以公為第一特下篇稍有冗語未盡削耳居正者實也一統者名也二者不可得兼以居正為治世之本一統為傳世之號分而言之可也既冠之以正而蘇子又曰正統者猶曰有天下云爾則又失之偏矣傳曰君子大居正至所以合天下之不一也以經為案長史云先原正統二字來歷由是學者疑焉而是非又多不公長史云發明論者之失此二句一篇之總秦親得周而一天下至其可疑者三也長史云數語櫽括後篇之旨正統論下天下大亂至則大且強者謂之正統長史云此段即是申明晉隋之為正統然則有不幸而丁其時至而正統明不易之論亦語有斷制長史云以上伸已論之是以下辨諸論之非其惡秦而黜之以為閏者誰乎至則始皇未可廢秦也以下更有翦截筆力便髙看子厚封建論是如何春秋之説君弒而賊不討至况欲干天下之統哉賊在國而不能討則謂之無臣子若東晉但不能報讐與討賊又不同類也七世至于孝文而去夷即華至而其為功何異王者之興魏非真能修文德也不過以江左文物所在人艷稱之亦改革法制以自文代北之陋爾然行之未久而國亂非如三代王者創制立法使數百年民被其澤也論其志亦曰彼善于此云爾功則未也今特以其不能并晉宋之一方孝文不當晉宋之代春秋之時齊桓晉文至聖人有所不取也直以其不能一天下而黜之是也若援桓文吳楚為比則斯時之為周者誰歟及契丹之北也至漢乃殺之而後入許王者唐明宗之子又豈可以存晉乎八句亦可削鹿門評云統之在天下未嘗絶也按正統有時而絶歐公千古特出之見而朱子所謂三國南北五代皆無統之時實因之也以統與蜀與晉又因南軒之例而不絶因餘之統雖有為為之而較之歐公所論則尤密矣鹿門不通古今妄欲判此大公案真可笑不自量也朱子雖有正統之餘亦豫之統一例然魏吳皆漢臣子漢中王既承漢緒魏吳不得而抗也晉之琅琊雖不能仗義討賊如諸葛之屢耀其武然劉石皆常伏屬于晉晉祀不絶彼雖桀大名不容假也若宋之與金則本為敵國畫淮為界又不得以遼事為比凖之南北並書乃為至公不知後世有朱子者作又何如耳長史録王子充正統論于此篇之後亦以歐公之説為斷建炎南渡亦不豫之以統為君難論上能燭理則可以知人矣能知人則可以用人矣文遇對曰臣聞作舍道邊至何必更問羣臣文子曰是而行之謂之斷非而行之謂之亂清泰帝之徙太原所以異于憲宗之平淮西也本論上然一遇水旱如明道景祐之間明道景祐之水旱豈天地之氣獨鍾于人而生大賢乎本論中文章漸嫌皮肉太厚人言曾文沓拖我謂曾視歐為健也王政修明禮義之教充于天下氣實其慮民之意甚精至又奚暇夫外慕哉説三代法制教化之妙亹亹可味然則禮義者勝佛之本也至末不如韓云明先王之道以道之矜寡孤獨廢疾者有養也二語表裏兼備春秋論上徑健有家法公文之至者春秋論中兩意淺深反覆析理明暢其于是非善惡難明之際聖人所盡心也長史云難明二字又進一層其不為正君者幾何至則何從而知其攝也長史云此言是非難明則正名尤急其生也志不克伸至亦何望于春秋乎長史云此言善惡難明則求情實尤重隱實為攝至則隱決非攝以公遇弒而祔于廟安得不以公書不可以此而難非攝也秦誓論明辨不冗朋黨論自是會做文章然久讀反覺其虛誇寡味此歐文之近蘇者無誠意少和氣宋仁宗資性寬厚愛人所病者多疑爾故公可以此論進若雄察之主方以朝士植黨為疑驟聞是説必謂其敢為黨比又巧為異説以自飾自炫言者乘之其不以誣罔不敬受禍者鮮矣有朋而不黨乃顛撲不破之論不必新説而後可悚聽也惟幸人君辨其君子小人而已能辨是本大凡君子與君子以同道為朋以下指陳君子小人之情狀然臣謂小人無朋惟君子則有之此轉又透上一層翻説惟君子為有朋尤足破人主之惑長史云孟子賢者而後樂此不賢者雖有此不樂也此文全是摹倣堯之時小人共工歡兜等四人為一朋以下舉自古人主能辨不能辨之得失治亂以證之自古為朋之多且大莫如周跌宕夫興亡治亂之迹為人君者可以鑒矣上已極透快故只用淡淡一句收結縱囚論然安知夫縱之去也至所以復來乎此段終是刻深但言其不可為法則得之矣不然太宗施德于天下至此又不通之論也此却責備得是即使其誠亦不過意氣之相感何如禮義之化使人不入于惡乎唐書兵志論及其末也至曰禁軍禁軍自唐之盛已有之不待末年唐書藝文志論四類平起方是唐書藝文志論蓋于是始分為四也帝王世次圖序更簡徑尤佳以孔子之學至宜其失之多也數語可謂通人之論蘇子由不知此而復為古史其亦謬矣而舜禹皆夀百世添毫外制集序用筆極有頓挫言外亦感慨無窮學者文章見用于世鮮矣又申歎上兩層蓋王者之訓在焉二句語重收煞得住蘇氏文集序子美固杜公之壻然當時借以起事尤在范文正公故事甚微而斥逐不少貸前輩論此文都不甚分曉禍作于李定而張方平王拱辰之徒皆承吕許公之風旨者歐公于序文緣有所避不曾盡情説破而集録之以為十卷今作十五卷者又非歐公所編之舊矣豈公于子美之詩别為編故志中首敘集録遺稿之事後又稱其詩也其材雖髙而人亦不甚嫉忌至末不惟不加愛惜并見廢亦非其罪及他人得路而子美獨前死此尤可悲悼者瀠迥反覆言盡而意不止江鄰幾文集序既銘其墓又序其文公于故交亦止三人耳故此文以蘇梅陪説而其間又有不幸罹憂患三句對蘇與夫仕宦連蹇二句對梅江獨其文章尚見于世者轉入文集故余于聖俞子美之殁至其言尤感切而殷勤者以此也蘇梅二序妙處公已自發其藴仲氏文集序此文殊少佳處後半亦不謹嚴梅聖俞詩集序得意之作然則非詩之能窮人二句跌宕輒抑于有司窮久年今五十提出將老不求茍説于世至樂于詩而發之一句一折雖知之深亦不果薦也跌宕其妻之兄子謝景初景初之詩頗工蓋其淵源有自魯直謂從婦翁得句法則亦本于此也景初名師厚其後十五年以下又公他日所續書謝氏詩序此等文韓柳不為昔衛莊薑許穆夫人至其不泯沒矣太大太逺南宋後爛套實基于此釋惟儼文集序曼卿嘗曰至則賢者安肯顧我哉前後客主相酌成章然嘗竊怪平生所交至尚安能酣豢于富貴而無為哉下云以此誚其坐人若無此數語則難從不交妄人一段轉接耳釋祕演詩集序穆伯長尹師魯皆與演善見于師魯文集亦謂其好論天下事衣冠而振起之必犖犖取竒節云豫少以進士遊京師長史云從自家起老少盛衰四字作關鍵豫疑所謂伏而不見者四句長史云又入自已豫亦時至其室長史云又入自已嗟夫二人者豫乃見其盛衰二句跌宕章望之字序亦學韓然太直送徐無黨南歸序用立德立功立言之語而稍變之其意蓋在言不能以徒立必附于德與功而後能必其不朽然轉至要處却不能説出師古聖賢之實于此見歐之本領規橅去韓甚逺也豫欲摧其盛氣摧字收全篇有力送楊置序此似學送王秀才序而不如者不獨筆力簡古為難韓乃簡古中旨趣深逺送梅聖俞歸河陽序長史云歐公論梅聖俞詩詳于書聖俞稿後一篇與此序同時所作其後序其詩集十卷所謂詩乃窮而後工而最後作墓志即書此數語曰聖俞以為知言也作詩序惜無人能薦聖俞作墓志又悲聖俞之屢薦而終不見用也送曾鞏秀才序况若曾生之業至可怪也駭其文思廣其學而堅其守壯其志而有司又失之帶前使知生者可以弔有司之失而賀余之獨得也二句總結所以許生者悠揚不盡送田畫秀才寧親萬州序長史云極似昌黎送王秀才序本其先世立説也又云大抵歐公文從修五代史處極有得力其中無味與昌黎絶逺發端語亦太冗及建隆之際或滅或微從萬州發端先著此句方不散漫用兵不過萬人欲誇功德之盛而語非實録文字必歸無用乃書生之陋也未有師少于三萬人而能攻一國者巴峽之險至此地始平夷即紐皆王師嚮所用武處至末雙綰傳易圖序易之傳注以下又論傳注及師承詩譜補亡後序雖少深旨而文頗醇潔夫不盡見其書至其能使之必服乎善論刪正黃庭經序明白條暢又有以謂此外物不足恃而反求諸內者轉到黃庭若大雅君子則豈取于此收歸無仙本意韻總序發端迂逺諱其所不能而姑為大言以張之此作者之大病故儒者莫暇精之非儒者之莫暇也近世小學廢矣禮部唱和詩序此等文未能喻其佳處蓋絶不通人者五十日宋時試期之寬如此故校閲宜精且有餘力唱和也集古録目序使子瞻為之必不若此費力自不逮寶繪諸記或譏豫曰物多則其勢難聚上既有聚多必散之語此轉似贅豫對曰足吾所好至末回抱前半亦不見筆力桑懌傳以免短使送三班免短未詳若欲避名則善皆不可為也已名言仁宗御飛白記較東坡文為深厚公事仁宗久自然尤言之沉摰也蓋以遭時清明至亦朝廷一時之盛事也長史云從髙一層説來余曰仁宗之德澤至登金門而上玉堂者乎長史云從低一層説來御書閣記晦翁以此為公文第一開元以老子為祖且有道舉而太宗未始崇信其説特以前代帝王嘗賜御書因而賜之此可見祖宗好尚之正而彼得之尤為光寵絶盛之事以此立論轉到興復上亦可作一篇文字而道家非遭人主之好尚不能獨興挽上開元相州晝錦堂記題無深意特髙一層起論施諸魏公獨不為夸荆川云前一段依題説起後乃歸之於正此反題格也按反題却愈切題所以佳閻云為時名卿謂父國華官右諌議大夫有列傳歐公為作真贊臨大事六句宋史取以為列傳論此一介之士得志當時此志字淺昔人比之衣錦之榮者也提過本意此公之志而士亦以此望于公也長史云言公少時之志便如此其言以快恩讐矜名譽為可薄有此證佐則前半方不涉客氣若不量輕重只要髙處立濶處坐便成亂道矣有美堂記通篇以虛景成文峴山亭記長史云前半篇俱是後半篇影子言外有規史君好名意蓋叔子是賓光祿堂却是主也史君非其人而尤汲汲於名公蓋心非之妙在微諷中有引而進之之意仍歸於敦厚也峴山臨漢上望之隱然起句用襄陽耆舊傳見世説注是知陵谷有變而不知石有時而磨滅也後人針砭亦是為後人放寬將自待者厚而所思者逺歟為後其為人與志之所存伏脈無自待者厚二句便義理不圓足文章亦徑露少味矣歐公此等處尚得韓法也因以君之官至並傳於久逺據事直書諷刺自見君皆不能止也諷余謂君知慕叔子之風而襲其遺迹至則君之為政於襄者又可知矣長史云有諷有頌立意好而文法太卑熟李秀才東園亭記本不足記故但書其不能忘情于園亭者修友李公佐至命修志之下方詳敘隨之風土先點出為亭作記方不散漫然亦嫌其語太煩也隨雖陋非吾鄉六字收束前二段泗州先春亭記有用文章筆亦峻健泗之民曰至以食役者長史云以出米助役為民之意説得有體且推其美于前人而志邦人之思也長史云此却説是張侯之意尤妙前司封員外郎張侯夏守是州至末補明因其舊蓋前政亦知所先者不欲沒其人因可歸重堤上也真州東園記園之廣百畝至闢其後以為射賔之圃先撮記園之大略芙渠芰荷之的歷至鼪鼯鳥獸之嘷音也細記園之景物就廢興上相形逐段裁剪文字始不平衍又得當時即圖指點神貌水光日景動搖而上下襯筆生動嘉時令節州人士女嘯歌而管絃來遊不記三人但記士女并為結處無辛苦愁怨之聲伏脈若乃升于髙以望江山之逺近至吾亦不能言也補寫圖外之景趣是文章染法彌有餘情其為我書其大概焉落到作記此虛後實此正後反皆有層次變換真天下之衝也應起處當東南之水會句又轉出一層然而池臺日益以新草樹日益以茂即總收前文所載而又協于其職從相得二字中結到園之可記而非徒以其眷眷于是也然後休其餘間又與四方之賢士大夫共樂于此包括首尾結處故非溢美此園之所以可記也乃為之書記字結海陵許氏南園記長史云南園者許君之鄉園也故本其居家之孝友以風示其鄉之人亦在鄉言鄉之義也海陵去真州密邇以發運使還臨本州為小園于郊居既不足鋪揚且有桑梓之敬又不可泛入與民同樂議論故從許氏世有孝德能化其鄉意推而論之非漫然翻案破壞記事文體夫以制置七十六州之有餘至亦不足書將園字撇開從海陵許氏四字著意凡海陵之人至登其臺榭于記園仍善抱不脫使許氏之子孫世久而愈篤從上文世字生下將見其園間之草木至不擇子而哺也張云似昌黎董生詩又作此一層文勢方不單薄于園上亦有餘味叢翠亭記早嵗學唐之文似栁蓋其名在祀典以下此處尚少煩見山之連者至若鬭若倚寫出叢字菱溪石記刺史李濆為荇溪記李濆荇溪新亭記見文苑英華此句疑脫新亭二字豫感夫人物之興廢一句結上生下亭負城而近荇溪新亭記云得古溪于郡之東北十里桴槎山水記前後意不相屬浮槎之水安知非前人所未親歷而龍池或至宋而壞也乃遽發怒于又新何哉以吾郡言之虎邱石井唐人品為第三今不可食天平山白雲泉發自范文正公今水味亦減矣使歐公為文又作何語耶遊鯈亭記翻得好吉州學記意思氣象俱勝句句切慶歷吉州之學其中照應極綿密長史批分三段看前言宋之學久而後立而歸美于天子次言吉州之學不久遂成而歸美于李侯後言學之道又必久而後成以深致責望後人之意尤覺神理警動學校王政之本也至須其久而後至于大備歟長史云此于立學遲久之故特作一段回護事方上請而詔已下學遂以成長史云李侯治吉在未舉詔書之時此作者著意處見其賢于他人吉之士率其私錢一百五十萬以助至而來學者常三百餘人長史云此是記事正面進不能贊揚天子之盛美退不能與諸生揖讓乎其中長史云上句逺應下句近接善教者以不倦之意須遲久之功公于本論下篇亦云然以詩頌天子太平之功長史云收起處刻辭于石而立諸其廡以俟作記只一句結出襄州穀城縣夫子廟記長史云是廟記不是學記釋奠釋菜至獨春秋行事而已長史云廟以祭而設故從祭祀説起是議論有原本處而後之人不推所謂釋奠者至何其謬論者歟此層議論徒欲駕韓之上不知乃犯駁題之病行文亦少撿局矣而州縣幸有社稷釋奠至可勝歎哉長史云有此一段方見廟之不可不修方見修廟者之功豐樂亭記和平深雅余嘗過清流關者其嶺甚卑不為絶嶮特以介南北之衝取滁之所必爭故耳修既治滁之明年夏至闢地以為亭此一段先記亭曰明年則既在嵗物豐成之後矣而與滁人往遊其間虛含共樂滁于五代干戈之際用武之地也本其山川以下記豐樂之所以名自唐失其政海內分裂至何可勝數此段意思甚好但下字亦寬緩須如東坡表忠觀碑才得精神必説到殺人盈野殺人盈城著在百姓身上乃見今日休養生息朝廷功德之深漠然徒見山髙而水清插入山與泉一筆今滁介于江淮之間道其風俗之美舟車商賈四方賔客之所不至地僻民生不見外事事簡而安于畎畝衣食以樂生送死俗之安間而孰知上之功德宣上功德乃日與滁人共樂風霜冰雪刻露清秀南山逼冬轉清瘦刻露圭角出崖窽公二語從韓詩出也樂其嵗物之豐成破題使民知所以安其豐年之樂者其字從東坡書此記反應五代之際二句反覆以宣上恩德意刺史之事也應治滁遂書以名其亭焉結句是記事之體醉翁亭記長史云通篇命意在醉翁之意四句下分兩大段摹寫昭明太子陶淵明集序云有疑淵明詩篇篇有酒吾觀其意不在酒亦寄酒為迹者也公此篇中用其語獨孤至之琅琊溪述云公登山樂山者爭同無小無大乘興從公又云時時醉止與夕鳥俱明月滿山朱轓徐驅亦採用而變化出之環滁皆山也起句是法陽山天下之窮處也若夫日出而林霏開以下第二層又寫瑣屑事臨溪而漁至太守醉也還題中醉字泉冽而酒香泊宅編云東坡書此文改泉冽而酒香作泉香而酒冽按倒轉則句響亦本月令水泉必香也樹林隂翳三句無此一層即意味索然然而禽鳥知山林之樂至末逐層帶轉兼取濠上之意畫舫齋記善于洗發後來如戴帥初輩專效此種豈真樂于舟居者耶樂字即反起下一段峽州至喜亭記江出峽始漫為平流按漢書地理志夷陵下注應劭云夷陵山在西北是夷陵之所以名也歐公乃云峽口之嶮至此而始平夷無乃未之考歟故舟人至此者出至字相賀以為更生起喜字夷陵縣至喜堂記前段極言始來而不樂之由皆為下文既至而後喜之地中間因朱君待公厚而堂又為公作也故插敘能變陋俗以致歸美之意末仍以此作收文字照應處得大體所記雖止一堂仍非獨為吾一人之私也夷陵者楚之西境至而詩人亦曰蠻荆上皆敘細碎事著此三四語點染乃質而不俚義門讀書記卷三十八

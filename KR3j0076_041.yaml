body:
  text: 義門讀書記卷四十一翰林院侍讀學士何焯撰元豐類稿文唐論峻潔此寺議論自曽王以前無人道來成康沒而民生不見先王之治起句中即伏後意有天下之志者文帝而已然而天下之材不足文帝有一賈生而不能用然則所患者非材之不足而帝之志誠卑也文帝所長者能休養天下之民而已而其治莫盛於太宗之為君也而字衍可謂有治天下之效效作效後仿此又有治天下之效又字上有而字然而不得與先王並者六句其不得與先王並者非為制之猶有不備而德之不能建其有極也由唐虞之治五百餘年追遡成康以前而未遇極治之時也時作世為人後議此等文後惟子朱子能之文鑑録溫公之議而不載此文者失之為之後者為所後服斬衰三年而降其父母期汪云將言為人後者不絶其父母之名故先言禮之所以降其父母之服與後世崇本親以位號之非禮以見禮之於為人後者至恩大義已極其至而不可以更有加也以諸人之所知者近諸作謂則尤恐未足以所眀後者之重也尤作猶所眀作眀所禮為人後者以下言考於禮而父母之名不可易為所後者之祖父母父母父母下增妻字妻字從近刻增祖父母三字成文父母二字不可少也宋本同亦少一妻字此其服為所後者而非其為已也下其字衍服則為已名為所後者名字下增則字若當從所後者為屬至親非變則名固不得而易矣此一段最眀辨若但据為其父母報句則未有以解劉子翊其者因彼之辭之說而趙瞻所謂辭窮直書之論為是固當從所後者為屬矣豈有製服之重如此製作制且支子所以後大宗者至而先王教天下之意哉至論夫人道之於大宗至未有可廢其一者收得精神或以謂欲絶其名者蓋惡其為二以下言易父母之名而從所後之屬為非知不以惡其為二而強使之為一不字下增可字使為人後者於其所後至而為人後之道盡矣昌黎廬陵亦必不能發揮至此為人後者為其父母服服一作報漢祭義以謂宣帝親祭作蔡故非漢宣加悼考以皇考下考字作號字而革變其父母之名革變作變革不從經文于前世數千載之議論于作與懷二于所後二作二然則加考以皇號與禮及士之稱皇考者有異乎士作世禮曰考廟作禮曰曰考廟然則以為父沒之通稱者此句中疑尚有脫誤以為父沒之通稱當作以為事考之尊稱若漢哀帝之親四句此仍是加皇號以為事考之尊稱者豈獨失為人後奉祀正統祀作承然施于禮者有朝廷典冊之文至顧言之不可不順而已一段反不分眀似乎可已蓋此但問其于禮之可與否而不在施于事與否也公族議此為荆公裁減宗室恩例而作其推言親愛之心可謂至矣然公族之人要當教之有法使其材皆可用而後與之祿傳曰武王之母弟八人五叔無官豈可使之坐困天下之民而漫無功德以報之如眀之宗室乎五叔無官但不任以尊位非無祿也其自袒免而下則宜裁之以義矣記曰親親之殺以服屬為等差固先王之道也昔周公兼制天下立七十四國四作一夫豈以服為斷乎不以服為斷者必以德為賢也是豈可拘于常見可字下增以字其在異代尚特顯之在異代特顯者以德以功也實國家慶家下增之字而姬姓獨居者五十三人人下增也字務立異論而不顧其可言而不可行此宋人之病也講官議吕獻可彈王介甫十事其三云人主延對經術之士講解先王之道設侍講侍讀常員執經在前乃進讀非傳道也安石居是職遂請坐而講說將屈萬乘之重自取師氏之尊真不識上下之儀君臣之分况眀道德以輔益聰眀者乎但要君取名而已此議似亦為介甫發後漢書儒林傳中侍講與入授不同則講官遽以師道自處者誠過但人君賜之坐以優之亦崇儒之盛事雖賜坐而坐仍其侍之次與詔于天子無北靣者區以别矣亦議禮所當詳也文甚緊潔乃不自知其強聒而欲以師自任何其妄也此職業然耳不可與強聒並抑揚太過所以忘其勢也忘字上增自字故坐未嘗以為尊師之禮也坐雖未嘗為尊師之禮然挾書而講于禁中者顧獨不得比于燕皆坐之禮乎未果有師道也果有作有果結處與發端不合如此則侍講之職舉當廢矣救灾議有實用文字合漢唐而一之劣者人日一升劣作幼是直以餓殍之養養之而已二句論事眀析如此乃非空言則百姓何以贍其後此句上增不久行三字雖有頽墻壞屋之尚可完者七句遵岩云不但文字好于事情亦深切漢時之文亦不過如此如是不可止是字衍失戰鬭之民此句上叠空近塞之地五字萬一或出于無俚之計俚作聊今被灾之州為十萬户今作令平日未及有此者也及有作有及與專意以待一升之廩于上一作二足以振其艱乏振作賑脫于流亡轉死之禍流亡轉死作流轉死亡然後玉輅徐動輅作路就陽而逺郊作就陽而郊古人有曰作古人有言曰剪瓜宜及膚剪瓜作翦爪今有司于糴粟常價今作令以荼荈香藥之類荼作茶洪範傳曽氏生平得力于經在是其言平正通達有非漢以來俚儒之所及者故蔡氏所采亦多原其說之所以如此者以非其耳目之所習見也此歐陽子之說五者行乎三材萬物之間間下增也字念用庶徵徵作證下同故又以考已之得失于民也以下增此字其信不可雜信作言潤下作醎醎作鹹於是稼穡而不及其他者是字舊刻皆作之下同此當從蔡傳也宋本之瀦之則聚瀦作瀦或從革之從字衍可以從革從字衍有一從字文理不順或言其用四字衍皆養人之所最大者者字下增也字又增非養人之所最大者八字然後接則不言三字自內言之內字下增而字蓋思之人人也如此人人作于人其至皆足以動容周旋中禮其字上增及字亦未嘗不思思字下增也字聽作聰作聼曰聰故不能集蔽于大且逺也集作無所以養其聰也聰字下增眀字上恭天恭作參其惟不言言乃雍禮檀弓作言乃歡喜說也書無逸作言乃雍和也言之不可違如此作言之不可以違如此也貌之不可慢如此也可字下增以字故堯之德曰欽眀文思欽作聰欽字不知者妄改為王道始王道下增之字古之欲眀眀德于天下者至然後國家天下治處處遺却格物蓋欽眀文思欽作聰堯之得于心者也于字下增其字所謂效之也效作效不若我政人之有罪矣若作于之字衍則有曰勿庸殺之有作又故先王之刑刑也疑有訛字天下之人四罪而已四罪者著舜攝位之始誅討之大者也豈有百年之間斷刑止于四哉伐不悛也悛作憓則六極之事也極字下增弱字惟皇六極六作之則五福攸好德之事事字下增也字則是人斯其若辜矣若字衍無所背無所反也下所字衍由無偏以至無側至字下增于字歸者之所反歸作往所操者彌約所字上增而字然充人之材以至于其極者四語乃曾子所讀經而自得于心者也曰王者尊之辭也尊作往凡此者以治己與人也以字上增所字曰貞曰晦晦作悔所謂五者也五字上增卜字乃立是人使作筮之事筮字上增卜字參謀鬼神也謀作諸則皆不可以有作也也作者所謂各以其敘也所字上增則字則至于庶草莫不蕃蕪蕪作廡而知已之所以致之者也上之字衍其道未嘗不同者此句上增其道未嘗不同六字進太祖皇帝總序狀將無以使列聖之偉跡偉作韙此臣之所以惴惴也以字衍以覺悟萬世悟作寤大懼智不足以窺測髙逺窺作究太祖皇帝總序自天寶以後以作已紀綱寢壞寢作寖以生民為任起數語中尚宜眀㸃生民之困一語則以生民為任句承得有根而結處户口之多少一段亦愈有力矣憂吏民之不良也民字衍其羣臣有恩舊其字下增于字常振助之振作賑蓋太祖篤于孝友荆川云又細敘一遍以奢侈為戒侈字衍粵蜀吳越歐閩之君歐作甌傳子及孫及作若啚衆以智二句啚作圖世以謂太祖不世出之主以下尤可已太祖征伐必克四段皆強為附益開寶之初南海先下一段是不量時勢之語此一段尤為兒戲如此則其言反不足徵信矣太祖不用兵兵字下增革字三代盛矣以下又推一層文武之後三世傳作文武之後世三四傳總評此本紀贊也其煩如此則本紀又當何如南豐非昧于史法者直過欲稱誦功德耳昌黎避而不為蓋慮及此矣此文不古不今大失體要宜乎神宗緣此罷其史職也新序目録序可與王子直文集序參觀所守者一道所傳者一說而已此論正與蘇氏譏王氏好使人同己之說相反蓋當辨是非不可分異同也揚雄氏或可耳或可作而止漢文士豈無眀先王之道以一之者哉文作之豈字下增特字亦足以知臣之攻其失失字下增者字梁書目録序王云序梁書以佛法立論可見其用意而在梁尤甚因梁之事二句乃斡入題目之法按此篇立論原本中庸皆有次序條理可觀下語時或未瑩則不能如周程之浹洽故也故不可絀絀宋本作詘書曰思曰睿至與天地參矣不知夫天命之謂性率性之謂道貫內外而一之者則其言豈足以折夫佛氏之徒哉此歐曽之徒雖好辨而終不能見道之大原也書曰思曰睿即從內說起未有不能眀之者也眀善對佛之眀心故加之誠心以好之此強為之說故加之至意以樂之眀誠之外又增加至意一層恐無所本即至誠之至語未瑩耳安能纍我耶耶作哉能盡其性則誠矣誠身對佛之見性既誠矣必充之使可大焉形著眀既大矣必推之使可化焉至誠能化能化矣則含智之民肖翹之物上句盡人性下句盡物性而吾之用與天地參矣參贊德如此其至也此句是一段中樞紐德如此其至也四句由窮理而盡性而至命亦是由其德以及其道莫不一出乎人情內外合與之所處者所字衍既聖矣則無思也應思曰睿無為也其動者應物而已應應乎外可不謂神矣乎至誠如神神也者至妙而不息者也無息李云神即是聖之至妙不息者故其所以為失也故作固夫得于內者未有不可行于外也合外內之道以下始說得分眀眀道云敬以直內義以方外合外內之道也釋氏內外之道不備者也南豐己見及此及佛之所以失以傳之者傳作傅庶不以此而易彼也庶作知列女傳目録序三代以後少此議論詞醇氣潔無一冗長之字此宋文之不愧匡劉者也離其七篇為十四與頌義凡十五篇頌義自為一篇猶漢書有敘傳耳揚子法言總以十三篇之敘列于卷末至宋咸析而升之章首古書次序為庸人汨亂多矣而隋書以頌義為劉歆作考隋書列女傳頌一卷劉歆撰與曹植頌一卷繆襲讚一卷録于向書十五卷之後或歆亦自有頌至宋亡之未可知也劉歆不間詞賦頌義非其所作决也而成帝後宫趙衛之屬尤自放班偼妤侍者李平大幸賜姓衛謂之衛偼妤趙衛即趙李也向以謂王政必自內始先就列傳所載眀其為書之本趣其言太任之娠文王也獨提出一事發端皆大人之事皆作此然古之君子未嘗不以身化也又從劉書欲以戒天子而未言者推其本言之二南之業本于文王子朱子云說二南處好而不知所以然者知字下增其字故內則后妃有關雎之行至故家國天下治者也大暢王政必自內始之說外則羣臣有二南之美二句自家而國其推而及逺五句自國而天下故國家天下治者也國家作家國後世自學問之士學問作問學其家室既不見可法家室作室家士之茍于自恕三句反覆精盡往往以家自纍故也又綰入家况于南鄉天下之主哉打轉蓋不可考西京詩師齊魯韓若毛傳固未行也以曽氏之精核何亦有不可考之疑耶禮閣新儀目録序韋書所記者變禮故序發眀制禮者當隨時變易以宜民不容泥古而反致不可行但求可以養人之性而使視聼言動之一于禮而已古今之變不同數句乃一篇大㫖去其十之四則健而厚矣子固之文多冗由道不足而強欲張之也厚齊謂此文指新法非是蓋徒見有拂天下之勢駭天下之情二語故耳則法制度數度數作數度乃為設其器為作謂或不宜于人不合于用此即子政敢于殺人而不敢于養人之意以為人之所既病者為作謂以謂人情之所好好下增者字能為之節而不能變也下字細密何必一二以追先王之迹哉一二作一一未嘗異也未字上增亦字民未嘗得接于耳目于字下增其字故為之定著故作因荆川云此文一意翻作兩層說戰國䇿目録序二子乃獨眀先王先王下增之道二字豈將強天下之主以後世之不可為哉不字上增所字此與荆公上仁宗書中立說同二帝三王之治六句此處文氣稍嫌其碎而俗猶莫之寤也打著惑于流俗則此書之不泯作不泯泯二百四十五年之間作二百四五十年之間今存者十篇十篇下有云字髙誘注存者十篇陳書目録序諸序中獨此篇回顧起處復作波瀾察因以所論載載字疑有訛而文帝亦遣虞世基就秦求其書秦作察髙帝以自魏至宋至宋作以來遂詔論撰于祕書內省內字衍與宋魏梁等書魏字下增齊字亦罕得而詳之也之字衍其書亦以罕傳其字上增而字其疑者亦不敢稍損益稍字衍爭奪詐僞爭字上增自字若此人乎一作若此人者文鑑同今改正戰國策如是人者鬻王以為資者也句法本此若此人者至其可廢乎此數句似有風神却稍嫌不健蓋此書成之既難二句括前豈非遭遇固自有時也哉下云臣恂臣穆臣藻臣覺臣彥若臣洙臣鞏謹敘目録昧死上南齊書目録序以經正史之失獨舉史遷言之斥子顯處只數句此春秋治桓文之法故雖殊功韙德非常之迹雖字下有有字古之所謂良者良字下有史字其眀必足以周萬事之理四句對上四句何以知其然也也作耶知之者不能名知字上增能字而為至典者至作二所記者豈獨其迹也也作耶小大精粗二句眀理本末先後二句適用使誦其說者二句通意求其指者二句發情文不足以通難顯之情者乎通作發然顧以謂明不足以周萬事之理至何哉此處亦稍嫌不甚俊健遷固不能純達其情而見之于後者矣矣作以連下讀至于宋齊梁陳後魏後周之書二句諸史中後周尤拙而其文事迹曖昧而其文下增益下夫豈材固不可以強而有耶數世之史既然故其草一字悖禮反義之人禮作理豈非所託不得其人故也也作耶結處增臣恂等同前此乃進書之體當存之唐令目録序千鈞筆該貫無遺使能推其類盡其道令之所載者皆道也若曰使能立其本善其推則太宗之所未至者可見矣而惜不復行也惜字下增其字徐幹中論目録序李善文選注引文章志云太祖召幹以為軍謀祭酒轉太子文學以道德見稱則與文帝箕山之云不合當以先賢行狀為正見文帝稱幹著中論一十餘篇一當作二語見文帝與吳質書魏太祖時旌命之時作特而不牽于俗俗字下增儒之說三字文能信而充之文作又蓋迹其行之所至而以世俗好惡觀之三句收得有力行字上增言字好字上增之字說苑目録序中間緊要處說來不透劉向所著說苑二十篇著作序然其所取往往有不當于理有字衍則取之左右逢其原此句上增自得之三字鮑溶詩集目録序又防之雜感詩最顯而此集無之鮑防雜感今所存一篇而已杼情思而已杼作抒然古人多用杼字蓋取杼軸豫懷之意李白詩集後序文甚嚴潔為考白詩之先後而次第之故于白始終所更涉特詳而并辨新舊二書之誤或以為變調者謬也舊七百若干篇若干作七十六今九百若干篇者作今千有一篇雜著六十篇者居徂徠山竹溪徠作來西抵岐邠抵作涉上秋浦潯陽潯作尋下同皆不合白之自敘合字下增于字然其詞閎肆雋偉雋作俊志氣宏逺逺作放先大夫集後序遵岩云先生之文如此篇之委曲感慨而氣不迫晦者亦不多有故治久未治下治字作洽而公常激方切論大臣激作日此句必有訛今本直去日方二字恐未妥當時皆不恱故不果用屢不合而出五日又為揚州日作月而公于是時又上書語斥大臣尤切所言益切公之盡忠至何其盛也荆川云言先大夫之忠讜而歸之天子此所以為儒者老成之論也非淺學所及其于名實之論可核矣名一作虛王深父文集序深父于是奮然獨起是字下增時字然觀其所考者所字下增可字豈非孟子所謂名世者歟名世本漢書董仲舒傳贊天子嘗以某軍節度推官某一作忠武王子直文集序至秦魯之際謂魯頌秦誓也少已著文數萬言少字上增自字其不當于理亦少矣理字下增者字而又未知孰先孰後也知字下增其字王容季文集序前半議論可為讀書法測日星星作晷至舜又察之璣衡之字下增以字曰宅者宅作七無不任焉任作在深父尤深父字下增為字此篇收處似少關鍵范貫之奏議集序子朱子謂此文氣脉渾厚說得仁宗好不溢美文之謹嚴亦金玉其相矣遵岩云沉著頓挫光采自露且序人奏議發眀其切直而能形容聖朝之氣象真大家數如蘇公序田鍚奏議亦有此意然其文詞過于俊爽而氣輕味促按范之言得行故歸美于主雖立言得體然必實録也若作尊堯集序亦豈可以此為大家數乎凡論古文不當徒求之貌眀人不知也蓋自至和以後此段伏下時字或矯拂情欲情作嗜卒從聽用從作皆仁宗在位嵗久仁宗初年母后臨朝其繼有廢郭后逐言者之失及西北事起召用賢俊而亦為羣小沮敗不能有為惟晚年定繼嗣托付韓琦使四十餘年太平克有其終斯優于漢唐享國久長之主耳方以仁厚清靜伏下盛德不曲從茍止伏下見其志而朝政無大闕失斟酌仁宗之所以其仁如天自用則小惟天為大二語正是反對後世得公之遺文而論其世世作本世字雖出孟子與下其時難得相應然不若本字直貫先帝之盛德句更為有力故從文鑑公為人溫良慈恕一段又因奏議而略及平生見貫之之言真出于忠愛非劘上以邀名惜其早卒見仁宗之誠于聼用非隂棄其身也數語亦皆文章用意處凡同時與公有言責者照應與公同時之士王平甫文集序深婉可以為法古詩尤多也古作故平甫居家孝友一段平甫之詩文不得薦郊廟施朝廷者介甫有責焉此著其孝友與待人之直而和為天下所同惜而奈何不容于家乎欲千載而下讀者自得之言外也強幾聖文集序其子浚眀浚作浚材拔出輩類輩字上增其字通四方之好通字上增以字則簡古典則典宋本作而其所長兼人如此如作以在魏公幕府者最為多最為作為最故序亦反復見之亦字下增特字思軒詩序將石本校益疏其寢北之地地作池後池之北涯後作厚而謂君之世世作勢不遺于理遺作違九月日序作九月十五日序序越州鑑湖圖曰藁口斗門藁作蒿而奸民浸起浸作寖自樵風涇至于桐塢塢作塢橋水深四尺有五寸橋字衍又以謂宜益理隄防斗門斗門二字一作計字而溢隄使髙一丈溢作益其竹木費作之費又以謂宜修吳奎之議修作從著之于法著字上增而字刑有杖百作刑有自杖百而錢鏐之法最詳作遺法在位者重舉事而樂因循激昻痛快今謂湖不必復者以下似韓子禘祫議而衆人之所未睹者者作也然後問圖于兩縣結出圖字收束上意亦毫髮不漏故為論次作為之類要序此公通俗酬應之作尤長于詩但許其詩為學者宗四字未當而不知公之得于內者深也深作何此不可謂之得于內求深而腐啓南宋濶逺之習而于三材萬物材作才相國寺維摩院聼琴序習其干戈于樂戈疑戚而非其故其作有下同若夫三才萬物之理至夫豈非難哉不知聖人之學本末一貫灑掃應對即是精義入神處故此處將內外說作二事于文章前後關鍵亦不緻密齊戒以守之齊字上增而字以持其心養其性者心作身孔子曰興于詩以下專就樂上轉到聼琴又能其意者也能字下有通字故道豫之所慕古人者作故道豫之所慕于古者館閣送錢純老知婺州詩序而欲其久于外久字上增無字齊州雜詩序或長軒繞榭繞作嶢從舟上下從作縱順濟王敕書祝文刻石序謹嚴簡而能贍蓋龍之為祥祥字下增異字敘盜令圖之所見者令作今其名氏稅等械器稅等二字疑訛又别之以待待作朱日暮持錢暮作昃况于躡所素困之人乎所作短以自託于壤隄毁垾之上壤作壞士有飢餓之迫士字衍亦情狀之可哀者也可字上增有字康誥曰至而未有知其所始者也頂可嫉皆百王之所同皆作此然而孔子曰以下頂可哀有待教而誅誅字下增者字贈黎安二生序地步髙然不曽道著實地處故不精彩荆川云議論謹密欲為古之文者當志乎古之道道不至則文蓋未也曽公本欲規而進之正言若反使自求諸言外此文最善學韓結處暗用范滂語翻案文勢抑揚反覆可謂圓健送周屯田序士大夫登朝廷夫字下增仕字安居几杖居作車不于庠序于朝廷序字下增則字為無為而尊榮也而作以送江任序注選不當出五百里外此文能言其情如此能專慮致職事作如此能專慮致勞營職事又有聰眀敏急之材急作給送李材叔知柳州州下有序字憂且勤之心憂字上增無字其習俗從古而爾不然俗作殆然作者意亦其民之不幸也已意作噫彼不知繇京師而之越頂不欲久居古之人為一鄉一縣頂小其官為越人滌其陋俗而驅其治其作於材叔久與其兄公翊久作又送趙宏序峻潔論亦當致平者在太守身耳眀也耳作也下也字作矣為前之守者不能此也此作故往時潭吏與旁近郡靳力靳作蘄暴骸者者字訛疑作骨愚言尚可以平平作乎言尚可用也然大中咸通之間三句謂因安南而致黃巢之亂送王希序碎沙之涯為漳水漳作章獨其情旦而作作作游王無咎字序用孟子之㫖趣而變其音節補之妹壻故其詞直不若于名字乎勿求勝焉四句文氣頗澀古禮之不行甚矣行字下增也字送蔡元振序此文反近李習之淡古不惟其同守之同上同字宋本無汀誠為州治也也作邪誠未治也也作邪惟其義而已矣義作誼送丁琰序過此數人人下有者字擇廷臣使各舉所知擇字疑訛不偕循嵗月而授偕作皆今也庠序師父賞罰之法非古也李云合于周子所謂師道立則善人多丁君之佐我我下有也字而豫樂道其所嘗論者以送之一句括前文謝司理字序君子之于德澤誼行誼行當作行誼泊然莫能顯其所以發而至者顯作質易曰知微知彰六句此所謂道不足而強有言者而字曰通微字下增之字義門讀書記卷四十一

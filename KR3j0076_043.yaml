body:
  text: 義門讀書記卷四十三翰林院侍讀學士何焯撰元豐類稿文左僕射門下侍即王圭追封三代并制并下有妻字祖母邱氏追封魏國太夫人質厥所原原作元父準追封漢國公承裕爾家承作永中大夫尚書左丞蒲宗孟追封三代并進封妻制曽祖母鮮于氏追封大寧郡太夫人與夫朝制朝作廟母陳氏追封潁川郡太夫人錫羡流祉羡作美妻陳氏封河東郡夫人敕朕援用天下之材援作拔改擇加郡加作嘉陸佃兼侍講蔡卞兼崇政殿説書制敕朕于書無所不學二句亦尚非體以懋厥職懋下有于字徐禧給事中制敕有殿內之臣有字下當增事字具官某以財進拔財作材惟忠實不撓實字是英宗藩邸舊名故制誥皆作實蔡燡河南運判制燡作􅏎待制王堯臣知單州制皆以疾苦苦作告杜常兵部即即下當增中制二字陳景等尚書省主事令史史下增制字李憲武勝軍節度觀察留後制李憲昨熙河路出界討賊收復境土皆有功捷此原注宋本有今本缺朕敢忘哉敢作豈李憲中官也李靖臣王存趙彥若曽肇轉官制靖作清三人修仁宗英宗兩朝正史書成此亦原注吳居厚京東轉運副使吕孝亷轉運判官制用是兹土東部兹土作分兹使德流澤通流澤作澤流可字下原注吕孝亷制改屬以使事作俾參使事交州進奉使副梁用律洛菀副使阮陪太常博士制菀作苑賈昌衡知鄧州州下增制字知泉州陳稱梓州吳幾復湖州唐淑問並任制並字下增再字勑則具官某則字衍上下相安作則上下相安吳安特太僕少卿制特作持奉議郎景思誼授東上閣門使鄜延第一副將制閣作閣有陳戰之功者陳作一梅福封夀春真人制此等制詞求新則易失體而家居讀書養性而字上增既字卒遺俗髙蹈卒字下增于字世傳為仙據漢書本傳非方志小書語怪不根者比卓順之直翰林醫官局等制內降劄子治七公主疾有勞亦原注成卓閣門祗候制令再任亦原注溪氊本族副都軍主等制氊字下增可字來獻闕庭庭作廷景青宜黨令支團練使阿星刺史制可下原注阿星改兵團之任作刺臨州郡法當瓢進瓢作甄往其祗服作往勵壯圖論氊巴柯族軍主結厮雞柯族副軍主制兩柯字俱可本二字之訛王瑛楊宗三班借職制宗字下增立字往惟祗飾飾作飭吕升卿館閣校勘通判鄆州制于柬為極郡極作劇中行知無為軍制中字上增滿字其忿窺之私窺作鬩兼榮職秩疑有訛蔡京起居即制朕恩若此失體封曹諭母制以光幽窆窆作穸張知均州制張字下增頡字巨可屬非其人巨作詎自于邦憲于作千處爾偏州爾作以册將旄王組旄作旌神示所毗示作示王制一俾人預懷榮之慶懷榮作榮懷王制三式是南郊郊作邦以祗厥服服作辟常棣之澤常字上有使字相制一天有保命保作寶以距衆善距作拒相制二而世蔽滋久蔽作敝而紀綱浸微而字衍而便文自營者兹出兹作滋伊欲黜漢唐之淺陋伊作朕節相制雖亦四六體然非唐人所及愛啓爾宇愛作爰侍中制為司徒之定制徒作存門下侍即制見于續用續作績給事中制朕董治正官之始治正作正治左右常侍即制即字衍夫豈輕受受作授勤烈在時勤作勳皆以耆名名作眀左右諫議大夫制諌議大夫掌議論舊矣上議字衍在汝能任其任上任字作稱門下中書侍即尚書左右丞制夫綱轄之地夫字下有居字知制誥制一為左右之臣為字下有朕字制誥宋本制誥下有擬詞二字吏部尚書制定勳須爵須作頒謹循科條四字不當其務將眀二句仲山甫將之眀之不獨于令可行令作今吏部侍即制使歸其名分者者字衍侍即實二其長二作二兵禮尚書制禮作部時汝稱職汝作謂兵部侍即制皆知古之宜法法作復刑部尚書制此古之聖聖下有王字斫雕為秩秩作朴之輔台德之作以工部侍即制故共工之事事作二禮部制朕正郡司之名郡作羣惟悉心以祗厥服惟字上有其字主客制列于門曹門作右維時右人右作聞庫部部下有制字都官制以稱敷求敷宋本作柬疑是簡字屯田制服畎畝之事畎作畎虞部制所以遂羣生羣作嘉知制誥授中書制更幾內外幾作踐御史遷即官制命有司奏爾之課命作今御史知雜制唐宋知雜猶今之掌河南道以充公論充作允祕書監制令問惟舊問作聞太常丞制祠祝之義義作儀太理卿制太作大某明吏治眀字下增習字以率厥屬下原注少云參典之官位兹九列大宗正丞制服兹是訓是作辭開封府獄空轉官制時惟汝加加作嘉樞密遷官加殿學士知州制彌綸疆域之事域作場某忠加惠和加作嘉可以為有恩矣每自云可以為有恩尚非王言之體殿前都指揮使制填附方夏附作拊非造刑而後定計刑作形使相制屏毗而則均作而屏毗則均休有功烈功作勞其代天工四句是唐人體節度使制以作股肱之良作字下增朕字後皆唐人體節度加宣徽制維昔牧伯長師之官師作帥朕既無忘爾勞爾字下有之字後皆唐人體軍帥制俾供厥服供作共其尚敘承敘作欽將軍制將以致謀致作智都虞侯制某忠勇有勞有勞一作勞閲一作勞實都知制烏可處斯任哉可字下有以字內臣制祿爾之勞祿作録責帥制然後威可勵而士可用也勵作厲廣西轉運制惟柔逺則能邇惟作夫蜀轉運判官制延袤萬餘里萬餘作數千故屬部為四屬作蜀陜西轉運使制自陜以右右一作西具于寄屬具作其通判制以欲助其長欲作佽賞功制一王師西封封作討磨勘轉官制一吏之在位者在下有其字軍功制二羌能靖縱縱作綏正長各舉屬官誥誥作詔因羣臣之巨僉曰巨字衍則周穆王命伯景為太僕正景作冏釋文云一作煛史記作瞁此篇直舉唐虞有周不推本祖宗用人失體賜髙麗詔謙厚蓋聞在昔夏后在昔作昔在欵誠內附欵作𣢾朕實寵加加作嘉奬勸良厚勸作歎爾乃自祖以來乃自作自乃䇿問一起處語太近夸如此何由得直言之士曽蘇相去逺矣不徵實事但問大義失䇿試之本䇿問二廣漢之女廣漢作漢廣䇿問三不能輔任歟任作朕後二道䇿則今之容頭過身者所擬尚不能然謝中書舍人表褒加特異于常倫加作嘉齊州謝到任表己今月十六日己字下有于字襄州到任表今者或就安間或作獲此作工于自訴福州謝到任表輒奉冒聞奉作用致思冒處思作斯眀州謝到任表果紓及逺之仁紓作紆了無黨助了作孑亳州謝到任表取材以漢京為斷蟄階嫗伏之類階作潛此作從昌黎潮州謝上表中來雖非本色然極有偉句賀熙寧四年眀堂禮畢大赦表永懷一聨獨合本色賀熙寧十年南郊禮畢大赦表撫臨邦國者者字衍關通和鈎之利鈎作鈞協氣所召句轉鈎陳太微四句后山以此四句配韓以為世莫能輕重也龍媒納于間廄間作間遂及于蚑蠕蚑作跂第從臣之加頌加作嘉此作從昌黎幽州平請上尊號表來其古直處兼有班揚之風非南宋經句偽體賀元豐三年眀堂禮畢大赦表躬夙夜之聖質夜作成賀克伏交址表實均慶于中外均慶作慶均謝熙寧七年歷日表尤重預正預作頒存于垂憲存作在謝熙寧八年歷日表進奏院遞到宣頭一道頭字衍謝熙寧十年歷日表念闕庭之方逺庭作廷謝元豐元年歷日表惟體在民之意奉己而已不在民矣當用此語進奉熙寧八年同天節功德疏表皆永思于戴燾戴作載英宗實録院謝賜御筵表寵異郡司郡作羣俾特封于燕豆封作豐代皇太子免延安郡王第一表太字衍君臣之際每徇公言君字上有在字代皇子免延安郡王第二表顧兹沖昧沖作沖伏遇皇帝陛下遇作况其于眀信賞罰之科罰字衍代皇子延安郡王謝表仍繼來章者繼作斷垂其爵列垂作殊代皇太子延安郡王謝皇后箋謹奉稱謝以聞奉字下有箋字代宋敏求知綘州謝到任表屬在秦常秦作奉實務全之有自務作矜代翰林侍讀學士錢藻遺表進以諛材諛作謏熙寧轉對疏都無可以開悟人主之要豈所謂道不足而有言者耶空架文法亦絮何其言之無物也恐言足采言字下有不字則天下之以事物接于我者以字衍心所欲之不踰矩所欲二字衍自福州召判太常寺上殿劄子則念慮先于兆朕朕作眹故揚子曰云云多引揚子之語于聖學閫奧了無所見不如荆公逺矣乃筌蹄而已筌蹄句不類移滄州過闕上殿劄子此文蓋欲以歌誦功德自任其後五朝大典獨付一人所由來也以視典引文雖不及然不事雕飾自然質雅宋文中不多得朱子云曽南豐初亦耿耿後連典數郡欲入而不得故在福建亦進荔子後得滄州過闕上殿劄子力為諛説謂本朝之盛自三代以下所無後靣略略説要戒懼等語所謂勸百而諷一也然其文極妙按荔子究未進也立論宜考其實朱文公極熟于南豐文何以云爾此文仿漢書禮樂志為之然亦太詞費矣作則乘憲乘作垂未有髙焉者也未字上增德字所以為帝者宗者作真為宋仁宗宋作帝為宋英宗宋作帝率皆不能獨見于衆人之表率皆二字衍推而大之可謂至矣以上較論主德以下又論立國之道無一不盛于前世以或二十而稅一以作田而時轉嵗送轉作輸相與祗服而戲豫祗作袨蓋逺莫懿于三代至未有如大宋之隆也總上一段一束竊觀于詩至惟陛下之所使此作者知朝廷將任以史事故致意于論撰功德聖人之所以列于經列字下增之字以通神眀昭法戒者戒作式至若周之積仁纍善以下又推一層有頌者必有規也然即上文防其怠廢戒字一靣生出故但用庶幾詩人之義一句并上文皆已收束競競業業競作兢下同而奉之寅畏寅字上有以字請令長二自舉屬官言既可用文亦雅而朴此古今之通議也議應作義以避太宗諱故書議尤不可暇非其人暇作假請令州縣特舉士然此特于三畿之內三作王所聞令相長丞所聞小顔注謂聞其部屬有此也補文學掌故故宋本作固按史記漢書作掌故然神宗方行周官宋本作掌固是也不必以史漢為疑下同其可為即中者其字衍及縣令丞即即作即即字貫下讀風俗既成之德德作後請西北擇將東南益兵中時弊以中數之數字下增率字非鰌之以刑鰌字未詳不過數千人而已不字上增各字議經費誠至惻怛誠至疑作至誠請減五路城堡名言文法率用雙行謂西北之兵已多謂字上有蓋字元豐二年七十有四年作百則城不必多則字下有立字則北邊之備故故作胡未有稱其任者者字下有也字守邊之臣守字上有今字再議經費皆三萬餘員宋本三下注一作二請改官制前預選官習行逐司事務或未盡之所趨之作知自立敘分名作自位敘名分惟陛下之所裁幸裁作財史館申請三道此三道大略前後皆相仍不改止依司馬遷以下編年體式以司馬為編年未詳或增有名位增作曽請訪問髙麗世次雅潔極淡却自文髙麗世次子莫來立注漢武帝元封四年四年當作三年建武死弟之子藏立注建武為蓋蘇文所斃斃作殺乾豐三年豐作封髙麗國王王建立通鑑據十國紀年云初唐滅髙麗天祐初髙麗石窟寺眇僧躬乂聚衆處開州稱王號大封國梁均王龍德二年海軍統帥王建殺之自立復稱髙麗王以開州為東京平壤為西京與諸書所紀建得國于髙氏後者不同誦死弟詢立詢死子欽立欽死弟亨立亨死弟徽立徽死子運立運死子昱立遜位于運弟顯顯死子俁立俁死子楷立楷死子晛立晛被廢弟晧立晧被廢弟晫立晫死子韺立韺被廢晧子祦立祦死子㬚立㬚死子德立德死子昛立昛死子璋立璋死子燾立燾死子正立正死子昕立昕死正庶子㫝立㫝被廢燾子祺立祺之十七年為眀洪武元年祺死子禑立麗人以禑非王氏子辛肫所生也禑立當洪武八年李成桂廢禑子昌立年九嵗成桂盡誅大臣之不附已者乃廢昌而迎立晫七世孫瑶而殺禑昌瑶立當洪武二十二年三年而遜國于李成桂自王建以梁貞眀四年戊寅即位至瑤以洪武二十五年壬申為李氏所奪傳三十二主凡四百七十五年宋元二史所載皆不詳核賴有東國史略得考見云論中書録黃畫黃舍人不書檢而侍即押字此句下增恐于理未安自後舍人遂不書檢惟書録黃畫黃而已然草二字况録黃侍郎舍人録黃下增畫黃二字請給中書舍人印及合與不合通簽中書外省事有申眀下項有字下增合字應申門下外文字外字下有省字中書舍人判省雜務務下疑尚有脫文宋本同議邊防給賜士卒只支頭子曹燦尋問皆曰尋問下增諸軍二字申眀保甲巡警盜賊臣伏以周禮五家為比禮字下增以字此人陳之法所由出也人作八此師旅之法由出也法字下增所字或一家有素無賴之人素字下增來字不責其顔情蓋芘芘作庇畫時告報本保長本作大如入别保追補六字衍存恤外國人請著為令恐朝廷矜恤之恩恐字下增于字代曽侍中辭轉官劄子于執政之內于字上增又字俯憐悃迫迫作愊代曽侍中乞退劄子周盡聖心集勞集作焦况應天人作况應天感人英宗實録院申請尤在廣傳傳作博今取到修撰仁宗皇帝實録録字下增院字及正在刺史在作任據實録院所關宣敕關作闕自嘉祐年四月作八年四月一工部水監宋本作一部水監無工字疑是都水監之誤所奉修撰官李維等奉作奏竊慮差去分手分手作手分下同亦奏合依中書樞密院依作于樞密修時政記主事樞密下增院字各令應副檢文字檢字下增尋字改除麻制文字照會改除作除改進奉熙寧七年南郊銀絹狀干冒宸扆宸作旒奏乞回避吕升卿狀充江南西路兵馬都鈴轄鈴作鈐奏乞與潘興嗣子推恩狀因興嗣而并及侔為侔在興嗣前恐異議者指為不必推恩之例也亦得録其後録作祿寵録之所以勵世録作祿辭直龍圖閣知福州狀以次官員以字上增與字福州奏乞在京主判間慢曹局或近京一便郡狀溫厚忳懇不在呌號尋奉聖旨不允聖作朝各已白頭頭作首移眀州乞至京迎侍赴任狀既無驅馳之事無字下增可字聞臣而來而作之許臣徑馬徑馬未詳疑是僕字迎侍母赴任母字上增老字眀州奏乞回避朱明之狀即老母多病即字下增今字臣不任母子區區激切之情母子作臣子乞賜唐六典狀以今僕射侍中今作令又分二十有四分字下增為字不知僭越越作妄授滄州乞朝見狀孰不自願為能能字衍乞登對狀為國家眀著制度勒為一經固曽氏所優也無衒玉之一言玉作鬻故在夏書稱政典曰何必引其文乞出知潁州狀收憐附慰附作拊顧潁可以沿流顧作惟而顧子母之恩顧字下增迫字當伏斧鎖鎖作鑕以須罪戾戾作矣再乞登對狀有深忌積毁之莫測二語似可已顧備驅馳顧作願臣雖草茆之漏漏作陋以謂西北之宜在擇將帥不敢宣露簡汰冗兵之語故但以擇將帥言之申中書乞不看詳會要狀又復于纍己于國史疑有脫誤緣五朝典章五作纍辭中書舍人狀而謀謨訪門門作問刻之為經刻疑作列豈獨彛倫粃斁粃作秕福州擬貢荔枝狀荔枝徒以供口體之養雖其品不佳與少失其時未為害也今乃欲以盛夏入貢而又詳録其品以進萬一人主生其侈心而亦為驛致之事吾不識將何以解于君子之譏哉得已而不已此齊人之敬王也君謨之團茶子固之荔子雖未足纍其生平然徒貽好議論者以口實不謂之有童心不可也比巴屬南海屬作蜀然貢蓋為常品蓋為作槩以然顧常品顧字下增以字此三句蓋託以自比老于外服及新則甘滋未盡過時而滓苴特存不勝臣精銷亡之懼焉狀既曰擬則終未嘗以請于上特遊戲之作也使勞人費財如此可也疑有脫誤此臣之所以不敢安也以字衍荔枝録録仿歐公洛陽牡丹記釋名篇陳紫出興化軍陳紫至今猶在閩人得五六顆即相饋遺為珍而香味蓋為次也為字下增其字嵗生一二百顆而已記朱文公語録云方紅所生極多子固為其所謾又記一書云自著録後所生遂止于此亦一竒也丁香荔枝皆旁蒂大而下鋭蒂作蒂龍牙長可三四寸龍牙最大真珠最小中元紅實時最晚中元紅最晚火山最早在福州報國寺寺作院眀州擬辭髙麗送遺狀有體有要西漢之文並無答謝書無作先右謹如前謹字下增具字竊以髙麗為蠻夷中為作於自天勝以後勝作聖陛下即祚祚作阼蓋古者相聘以下引經諦擬辭免修五朝國史狀仰尊聖訓尊作遵此又臣之大懼也之字下有所字出自聖慈出字上增伏望二字自進荔枝至此篇皆擬作而未曽上者應舉啓豈適通變之用通變作變通回傅侍講啓以推行于民上以作已與劉沆龍圖啓更增墓志墓志作慕戀謝解啓以虹霓之光而披飾披作被二語偉句回李清臣范百祿謝中賢良啓是惟髙選惟作維如常引大體如作而苐集感銘之深集作積回人謝館職啓利架鼇之祕局局作扄利疑訛與北京韓侍中啓覺形勞之少暇之作而其二神眀所依眀作民鬱郡望者五年郡作羣回許安世謝館職啓蔚為首選首選作選首賀韓相公啓遂長生于百姓長作常襄州與交代孫頎啓已出吏部之後部作師頒條多預預作豫洪州到任謝兩府啓曽乏一毫之補補作助坐户祿廪之優户作尸賀東府啓一氣賀蹇周輔授館職啓敦協僉言敦作用眀州到任謝兩府啓而衆論騁馳之際騁馳作馳騁何嘗駛預于半辭駛作輒冒應寄屬應作膺賀趙大資致政啓門開祖帳四句皆儲寀事所以獨工鞏密荷陶鈞密作蚤亳州到任謝兩府啓以出于埏鎔以作已回陸佃謝館職啓伏惟慶慰惟作以英辟華國辟作辭多名大義名作眀與定州韓相公啓前半與張宣徽啓略同停還鈞軸停作佇賀韓相公赴許州啓比較廟堂之任較作輟便易鄉邦之便上便字作就字鞗革金厄一聨勝定州啓授中書舍人謝啓竊以贊為眀命眀作名况策名于近要近要作要近彌綸庶務庶作世庶達知人之遇達作答太平州與本路轉運狀飛馳精思精作積賀杭州趙資政冬狀壯京國之大猷京作經儕格天之盛業儕作濟回亳州知府諌議狀而參動之勤動作候回運使即中狀戀勢之殊勢字疑誤到任謝職司諸官員狀竊鞏才不逮人竊字下有念字福州回曽侍中狀素推仁傑仁作人回人賀授史館修撰狀垂列聖之洪名洪作鴻矧奬飭之踰涯飭作飾回人賀授舍人狀惟清切之近班一聨微近盈溢祭歐陽少師文絶去刀尺四語讀歐公文者當以此求之華夷召畢華作等兩忘猜狔狔作昵還幹鼎軸幹作斡皆淚盈溢皆作眥祭張唐公文實殽于豆殽作肴祭孔長源文匪矜匪飾飾作飾祭王平甫文熙寧十年十月二十一日此係原注計皎皎而猶疑計作訃祭宋龍圖文公之于古今之字衍然而蚤蹈厲于儒官官作館祭亡妻朝氏文治平元年五月三十日亦原注姑亡孝始始作婦誰為我人為作謂館中祭丁元珍文哀烏之秩哀作元朝中祭錢純老文寓馬在庭木寓車馬見漢書郊祀志古文寓偶通祭李太尉文簡重從昌黎王用碑來祭致仕湛即中文治績維于朝廷績作迹維作紀代人祭李白文發揚儔偉儔作俊祭王都官文辭貧事偉偉作韙祭袁大監文冕辨入里四句呼起下文六句就而公尤作孰如公尤戴德莫疇疇作酬祭黃君文君獨于求于作無皇妣仙源縣太君周氏焚黃文遣弟布肇遣上有謹字奉告第黃第下有焚字泰山祈雨文自四月已訖于兹已作以粟將禍死禍作稿宜見哀矜見作蒙夫民之生夫作天田間之民間作閭泰山謝雨文謝雨而及己身之不遇失體此與東坡海市詩體裁不同心􅞕恍而潛驚􅞕作惝齊州到任謁舜廟文題注宜有以稱民望宜有下宋本闕二字齊州謁夫子廟文二文簡質得體但無警拔語泰山祈雨文澤施八紌紌作紘嶽廟祈雨文惟民何事事作辜襄州嶽廟祈雨文民室憂于病癘病作疾未惟責任未作永祈寒失序祈作祁義門讀書記卷四十三

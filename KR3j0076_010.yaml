body:
  text: 義門讀書記卷十翰林院侍讀學士何焯撰左氏春秋成元年為齊難故作邱甲五伯衰而諸侯無所統壹強凌弱衆暴寡患始及民矣書作邱甲傷天下之無伯也銳司徒免乎婦人内夫家何以反不問辟司徒二年不可則聽客之所為曰聽客之所為是役也非惟國佐善辭齊之廟謨亦素定矣富弼以死爭獻納二字于遼宰相反不難徇敵國之欲則如之何哉國佐本以賂求成而晉人反為其正議所屈侮人者還自侮也其自為謀也則過矣至何勞錮焉共王是時十二嵗耳而其語何明且盡也使復有若子文孫叔敖者輔之豈其有鄢陵之失哉共王之言如此而子重子反殺巫臣之族而分其室致巫臣怨二子而謀害楚國不能禁之何哉盖明者必貴濟之以斷使漢昭帝能辨上書者之詐而不能去盖主上官桀則亦無救于國家之禍也已三年以君之靈至所以報也其為言也文而有禮忠而能力一句一字皆有義理次第次及于事文公之伯也先軫自下軍佐為中軍帥惟尚徳也靈公以後從政者不尚徳而以次及焉宜乎其不競矣此行也君為婦人之笑辱也寡君未之敢任卻克人臣也猶必報其一笑之辱今當兩君相見而反其惡聲以辱與國之君其能堪乎且又蔑己之君也至于錡而亡焉幸矣六年說欲襲衛衛有一卿一大夫同在行間而說乃欲襲之不惟棄信亦多見其不智矣晉人謀去故綘晉因梁山崩而懼故遷都以厭之七年吳伐郯郯成通吳本欲以敝楚而中國先被其害矣伐郯者黄池之漸也爾以讒慝貪惏事君讒慝貪惏有一于此皆足以亡人之國况兼之乎是故楚任子重子反而失伯任子常無極而亡郢十四年宣伯如齊逆女稱族尊君命也僑如以夫人婦姜氏至自齊舍族尊夫人也凡大夫有事于境外皆稱族所以尊君命固不在此僑如以夫人婦姜氏至自齊非舍族也䝉上逆女之文也所以尊夫人亦不在此十五年㑹于戚討曹成公也執而歸諸京師負芻殺太子而自立弑君之賊也晉侯率諸侯以討之何患罪人之不得乃同盟于戚使得列于㑹而誘執之晉侯于是乎失政刑矣書晉侯咎其昧討賊之義而惟逞一己之威福也十六年其行速過險而不整其行速魏武帝之追漢昭烈也過險而不整夏王之救東都也六月晉楚遇于鄢陵楚欲及東師之未至而戰其行速故晉師方臨鄭而相遇楚晨壓晉軍而陳至陳于軍中而疏行首邲之役楚乗晉之不備而晉潰晨壓其軍而陳亦掩其不備使之欲進不可爭退必亂也邲之戰中軍下軍皆潰欒書下軍帥也楚人狃而易之其謀若曰如此書又不知所為也已成陳以當之楚先為奪氣矣文子執戈逐之觀後欒書怨卻至則文子之逐宣子其識逺矣不在其位而露才揚已無補于國而咎怨及身可矣乎楚子登巢車以望晉軍壓壘故可望且彼此聞囂聲陳而不整軍而不陳皆在目也子以君免我請止乃死楚師薄于險鄭敗而其君先遁楚人顧之遂莫有鬭心而退故薄于險而反為晉所乗也季梁有言偏敗衆乃擕矣王曰天敗楚也夫余不可以待乃宵遁楚師猶未其敗而王遽遁者二卿相惡子重因子反之醉與王俱遁以幸其敗也王及令尹既遁而師有不胥潰者乎十八年孤始願不及此至神之所福也悼公初入其氣象極似漢文帝朱子謂數語便有操有縱齊為慶氏之難至使嗣國氏禮也齊之有慶克猶魯之有僑如也僑如搆季孟于晉有卻犫為之主而魯卒出而盟之齊則國佐被殺髙無咎鮑牽則且逐慶克雖死慶封反因以得政其右滛人也若是豈非魯猶重禮教而齊風俗大壊不之恥耶襄三年孟獻子相公稽首仲孫不能守周公之典以尊其君而稽首于大國又不能以禮拒大國之求而請屬鄫以供命其不逮鄭子産逺矣其平日之言行時合于道而謂之社稷臣則未也與之禮食禮食盖儀禮所謂公食大夫禮也四年魏綘曰諸侯新服至無乃不可乎晉方有事于中原而無終逺在東北若用師焉楚爭陳鄭鞭長不及也故姑事羈縻盖莊子一時之權計而後王㢲懦者乃用為口實何哉况戎先納賂以請和亦與屈中國以事外夷者異矣五年王使王叔陳生愬戎于晉至言王叔之貳于戎也晉新和諸戎將與楚爭陳鄭又無以謝王之愬故以貳于戎誣使人使王慙而自止且堅諸戎之心也六年司武而梏於朝難以勝矣至亦逐子蕩勝字當讀平聲以為不勝任而逐之也亦逐子蕩子罕之言謂亦宜逐也九年吾聞之宋災於是乎知有天道晉侯所聞盖相傳之恒言姜曰亡是於周易當以亡是絶句言無是理也我實不徳至何恃于鄭武子之言宏逺不迫猶有王臣氣象輸積聚以貸晉饑故各輸其積以貸十年晉荀偃士匄請伐偪陽而封宋向戍焉㑹吳者欲分楚之力以爭鄭也乃無故而興得已之役以徇中行偃范匄之請晉君親在行間曾不以勤而無所為懼何哉盖悼公之為君也量有餘而略不足以濟之乗厲公之後于世臣大族欲以徳禮柔而服焉而不知過于寛假則上下之分不肅久將專命而無所忌威權日以下移矣初子駟為田洫子産為政田有封洫亦因子駟之故而修之欒黶曰逃楚晉之恥也至我將獨進欒黶違帥先進而晉君不問棫林之役棄命先歸以辱社稷彼固以為恒矣黶之汰悼公成之也十一年鄭人賂晉侯以師悝至女樂二八晉楚爭鄭三駕乃定諸侯道敝悼公乃不深惟招擕懐逺之道茍焉私享其重賂是勤諸侯以黷貨也至是而悼公之志荒矣子教寡人和諸戎狄以正諸華惟欲正諸華故和戎以壹其力而豈竭諸華之有以媚戎狄哉十二年莒人伐我東鄙圍台季武子救台遂入鄆莒圍台武子乗其虛以入鄆即圍魏救趙之智也十四年晉侯舍新軍禮也至故舍之晉侯之舍新軍以二子之弱也非知其僣而革之也盖其入國之初修舉廢墜政令雖若可觀而權之下移者不能復收之以歸于上故限于世及之例寧廢新軍而不敢選于大夫之中舉其賢者以使為卿至此則六卿之勢一定而不可變矣觀其嘉魏莊子之功賞以金石之樂而緜上之蒐僅從新軍以次佐下軍而已亦不能如文公之用原軫也夫撥亂反治茍無非常之才其力固難以及逺也晉侯問衛故於中行獻子至謀定衛也孫林父甚善晉大夫而荀偃親嘗弑君者也其不欲伐衛固宜吾異乎悼公欲繼文襄之烈身為盟主同姓之國有出其君者不以為己恥乃偷一時之安納邪臣之說墮冠履之義身殁而公室遂卑有以開其漸矣范宣子假羽毛於齊而弗歸齊人始貳楚之不能與晉爭成於子卒之侵欲也而士匄復蹈之及為政而又重諸侯之幣晉雖欲不失伯得乎十六年以寡君之未禘祀時晉亦僣用禘祀之禮十九年范宣子言于晉侯以其善於伐秦也錄子蟜伐秦之善所以彰欒黶先歸之惡也于是士匄將逐盈矣士子孔亦相親也士石經宋本皆作二二十三年晉將嫁女于吳晉侯内有四姬而已亦嫁女于吳其違禽獸不逺矣初臧宣叔娶于鑄至乃立臧為臧紇以少凌長為臧氏後及欲成季孫之邪心廢長立少遂失守宗祧豈非君以此始亦必以終乎二十五年趙文子為政令薄諸侯之幣而重其禮范滅趙興基于此矣自今以往兵其少弭矣弭兵則威削于外晉所以有黄池之羞民附于内趙所以能興晉陽之甲晉人問陳之罪鄭伯之請伐陳在范宣子為政之日今新易趙武故復詰問陳以何罪見伐故不書其族言違命也不書其族䝉上㑹諸大夫之文也二十七年伯有賦鶉之賁賁至非使人之所得聞也伯有憤于晉執衛侯鄭伯為請而不獲命必待納衛姬而後釋之故賦鶉賁以刺趙武言誰執晉政而不辨姓也趙武恥之故若不知其刺晉而謂伯有自誣其上崔之薄慶之厚也及期而厚者亦亡矣殆天討弑君之賊而使自相殘也遂滅崔氏崔氏滅于九月慶氏即滅于明年之十一月二十九年公在楚釋不朝正于廟也書公在楚傷天下之無伯也三十年無欲實難至邑將焉往趙子直不知此義子産是以惡其為人也使次己位使次己位滿其欲也泰侈者因而斃之法不嚴則制度徒為文具而不得行也子産請其田里三年而復之三年而復之但欲其勿撓己政不為己甚所以安巨室也三十一年滕成公來會𦵏魯既留楚㑹𦵏復尤而效之時無伯主則小大轉相役而已繕完葺墻繕完李涪刋誤云當作繕宇不立是二王之命也至雖有國不立觀狐庸之言則夷昧將背前約而以位私其子如宋趙普豈容再誤之情矣僚之立非衆所戴也宜其啟光之爭以揖讓始之而以簒弑終之歟昭四年鄭子産作邱賦並從晉楚國用不足子産賢者豈得已乎六年士匄相士鞅逆諸河士匄董遇王肅本皆作王正疏云不當取士鞅之父同姓名而為之介七年夢周公祖而行周公祖以道之雖鬼神亦無如蠻夷之横矣然則有能攘之以安中國者豈非文武周公所式慿乎是故夫子未嘗不偉桓文之績也十三年乃並徴㑹告于吳楚圍既死乃敢徴㑹于諸侯盖政在私門志不在于修伯業也告于吳謀因楚國未定而弱之子産爭承貢之無藝不得已而取諸邱賦爭承庶乎得以寛民力焉而竟不及改也故制國用者必先正君而善俗魯事晉何以不如夷之小國至吾豈無大國自昭以前其辭命猶皆有三代禮義之風至此則惟以利害相哃喝流而為戰國縱横之術矣十五年忘經而多言舉典將焉用之多言舉典而樂憂習儀已亟而不慼末盛本撥適長亂亡而已十六年昔我先君桓公至敢私布之昔我桓公一段借商人之質誓以諷晉卿不當匄奪于小國十七年天子失官學在四夷石經作天子失官官學在四夷十九年若大城城父而寘太子焉至故太子建居于城父二五之出三公子也動以啟土無極之出太子動以得天下小人之言如一轍二十一年而不能送亡君孫毓以送亡絶句二十三年胡沈之君幼而狂至楚必大奔即鄭子元所以敗王師吳太子諸樊入􅀈諸樊二字當誤二十五年吾聞文武之世文武宋大字本作文成二十六年王子朝使告于諸侯曰至亦唯伯仲叔季圖之周之典籍皆歸子朝故其辭有承平之風其爾雅勝于呂相之絶秦也攜王奸命至則是兄弟之能率先王之命也歴舉攜王頽帶以指斥敬王二十八年吾懲舅氏矣懲舅氏言其種之不宜子也古者妾媵皆其姪娣注以為嫌母氏性不曠盖因不使叔虎之母之文定元年春王未踰年而改元不正之大者是以經文定無正月五年子西問髙厚焉石經髙厚下有大小二字六年君將以文之舒鼎成之昭兆定之鞶鑑衛為狄滅大路少帛掃地無遺故言宗器自文公始鄭于是乎伐馮滑胥靡負黍狐人闕外子太叔始卒而鄭遽為不道至此九年陽虎欲勤齊師也至已于是奮其詐謀田常以此智代齊十年公㑹齊侯于祝其實夾谷此篇叙事于孔子皆稱名君在㑹故也使公若為郈宰至齊人乃致郈費屢叛至是郈亦叛矣墮費墮郈皆因勢利導之也二子所謂遊其術中而不悟者羅氏既盡殺其牙兵而悔亦猶是也朱子語類論此事亦爾亦引羅紹威事為詞十三年使師伐晉將濟河至乃伐河内孟逹以此亡盖司馬懿之師在外與此固懸殊也哀七年以吳為無能為也以吳為無能為句為伐邾起本十二年盟所以周信也至亦可寒也吳本蠻夷太宰又小人也不可喻以禮教故子貢景伯皆詭其辭以止之若對季札伍員當改命矣十五年成叛于齊至是而成亦叛所謂五世希不失於是乎有朝聘而終以尸將事之禮至無乃不可乎吳人不欲以尸入惡其凶也故以不許奉尸將命則是吳人先以凶禮自處折之二十二年越滅吳闔廬之殪力已竭于入楚也夫差之亡力已斃于勝齊也越適乗之耳天下未有能以獨力拔一國者也義門讀書記卷十

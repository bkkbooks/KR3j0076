body:
  text: 義門讀書記卷五十五翰林院侍讀學士何焯撰杜工部集哭嚴僕射歸櫬老親如宿昔慰之也部曲異平生弔之也公在嚴幕府多規切之詞釋悶諸篇亦似恨知已不盡及公薨而代之者乃至不復可與共事故有遺後追慟及諸將八哀等詩也宴戎州楊使君東樓起句竒絶重碧拈春酒一連方云妙絶今古山谷八句詩皆出於此按黃山谷在戎州有廖致平送緑荔枝詩誰能同此絶勝味惟有老杜東樓詩正謂此也渝州候嚴六侍御不到先下峽船經一柱觀先下峽留眼共登臨仍收轉待字撥悶才傾一盞即醺人已呼起霑脣乘舟取醉非難事一連但使酒能解憂即三峽驚濤犯險往來可以不計視此非難則悶之難撥可知也無窮鬱結偏似興㑹飛騰公詩作用所以微也已辦青錢防雇直防猶備也言或以備撥悶之一法耳聞高常侍亡忠州作此詩有痛有刺生不能致君死亦但修文地下耳詩名獨步别無功業可紀故曰虛歷也致君丹檻折言已因救房相而貶於外遂不復與高相見也金華瞬失祗益吾悲惟獨步詩名長在天地間高之不死或在於此痛惜而兼以慰之也宴忠州使君姪宅通篇言汝雖貧富不相恤吾自以同姓故自須聊一過汝倘汝謂區區一飽便可牽率老夫則殊不然也落句須合題龍興寺所居院壁一篇觀之禹廟雲氣生虛壁一連疏鑿三巴萬古如在腹聯寫得神靈颯至題忠州龍興寺所居院壁七句皆寺居之由忠州使君乃公從子而莫能為南道主人題詩以深責之淹泊仍愁虎兼刺其無善政深居賴獨園指龍興寺旅夜書懷細草微風岸已領獨字星垂平野濶頂獨字岸字月湧大江流顧檣字二句只是汗漫黏天寫來雄渾生動乃爾劉孝綽月半夜泊鵲尾詩月光隨浪動山影逐波流官應老病休許身稷契曾犯龍鱗豈等浮華未應漂蕩然非君之恩禮獨遺元從之外自緣老病合就屛退耳天地一沙鷗應獨字此又似揚子所云譬若江湖之雀勃解之鳥乘雁集不為之多雙鳬飛不為之少也别常徴君忠州詩此别淚相忘淚相忘猶言至哀無淚欲其細作行者知終不得相見但望悉其起居動靜也十二月一日三首第三首即看燕子入山扉二句發端反對親知見靣贈崔十三評事公輔此乃夔州詩頗不拘常格其實近體也或編古詩中非是黠吏因封已一連謂掊剋在位賢者屛棄氷壺動瑶碧起渴字還思霧一披以下所謂宗族交逰光寵也長江二首第一首衆水會涪萬江之源歸心異波浪二句言歸路為所梗徒若江水之飛翻用反筆最妙江間波浪兼天湧當即用此二句箋之第二首浩浩終不息江之委合源委觀之恰醒出長字品彚只選此篇便屬不解詩也結句接上二字不可曉承聞故房相公靈櫬自閬州啓殯歸葬東都有作二首第一首一德興王後歎歸葬不出肅宗哀榮之典至代宗始下也後謂興王之後人落句謂前在閬州别房墓也第二首風塵終不解一連房相一生志在興復今旅櫬所經但見江漢之朝宗未解風塵之澒洞其有沒而猶視者乎盡哀知有處二句言已不能返東都也將曉二首第二首落月去清波去字百錬曉色既啓波中月影漸微若作失字便味短歸朝日簪笏以早朝暗收曉字懷錦水居止二首第一首猶聞蜀父老一連驚懼子弟憂患父老蜀民亦不堪命而煽亂所恃上皇西幸時稍稍遺澤足係屬其心或不至遂畔其子耳逺逗錦江波逗字改投字爾止嘗與豫論詩中逗字今人有作動字用者非此本逗留之逗逗止也但此處逗字未知何義按韻㑹引集韻逗或作投合也第二首錦城曛日黃言烟火之多也子規后山云此等語蓋不從筆墨畦徑中來其所鎔裁殆有造化也眇眇春風見含傍人蕭蕭夜色凄含愁聽南楚正月蜂相見一連頂異字切早早篔谷云相見共聞起下離羣杖藜妨躍馬覆裝字寄岑嘉州州據蜀江外夔州詩不見故人十餘年二句岑之為補闕公所舉也公流落西南不一言之於朝出守又不遣人迎致此篇蓋微諷之泊船秋夜經春草二句見其留之久也眼前所寄選何物二句言若我窮者但能致書以伸十年意見之誠而已岑則豈宜徒爾乎移居䕫州郭中二連方是清新生動一别一就若送若迎農事聞人說伏土平山光見鳥情伏石斷飛鳥亦投山豁處也且就土微平就字對上别字若送若答船下夔州郭宿雨濕不得上岸别王十二判官無對屬㾗石瀨月娟娟先作上岸之勢勝地石堂烟望王所居烟字含濕意柔櫓輕鷗外補出下字崔評事弟許相迎不到應慮老夫見泥雨怯出必愆佳期走筆戲簡午時起坐自天明言坐而復起起而復坐自天明待至午時也浮雲不負青春色一連見愆期在崔身過花間霑濕好何但不怯而已宿江邉閣用仲言句夜宿西閣曉呈元二十一曹長城暗更籌急一連役夫苦寒則促其更籌冀其將旦而得息而雲氣濃厚轉益隂晦起句妙得神理稍通綃幕霽一連頂微字西閣口號三四清新西閣雨望徑添沙靣出一連言始得水落可通往來不憶又值滂沱也不離西閣二首第一首地偏應有瘴頂非時臘近已含春頂冷色月令臘在孟冬即俗所謂小春失學從愚子一連一開一合自難自解生出落句第二首既無計離此因而稍以西閣之勝遣心人今已成故亭勝事經目方自此始也江雲飄素練一連妙在一氣滄海先迎日西字銀河倒列星閣字西閣三度期大昌嚴明府同宿不到言問子肯來乃期同宿不到則負在嚴也起五字曲折之至今疑索故要言今夕宜可取必故約也匣琴虛夜夜切三度金吼霜鐘徹朝朝花催蠟炬銷夜夜二句寫負約入神早鳬江檻底早鳬切明府江檻切西閣雙影漫飄颻仍望其到閣夜西閣夜也窮隂稍開又見兵象急景相催復起惡聲此詩言孑遺有幾復聞戰伐大兵仍嵗農桑盡廢冬無儲粟僅有存者不受徴發之夷獠以漁樵取給世運若此夜何時旦然天心厭亂則雖正順如卧龍雄武如躍馬亦空歸黃土但未知國家連續天命者人事如何徒使我憑閣注望依依不能自已竟寂寥無足聳人觀聽猶然兵象充塞宇宙也西閣夜楊云首二句將夜第三初夜第四已夜第五夜深逺聞行夜時危既已驚心靜聽號寒民窮又恐煽變盜賊猶存赤子無告故不免百憂交集遂為展轉申旦矣恍惚寒山暮二句蒼然暮色自逺而至非髙閣則不見也山虛風落石興起所聞守禦之苦擊柝可憐子二句擊柝禦暴處處戒嚴也村曰何處遙聞有此村也無衣之悲則又從寒字埋根時危關百慮二句言從前驅民而為盜後復假盜以剝民蓋有難以斥言者故不得已仍致憤於盜也瀼西寒望朝光切太虛自西望瞿塘春欲至醒寒字入宅三首第一首花亞欲移竹一連拈初入生動第二首水生魚復浦一連水生雲暖頂春歸復注音腹與臍暗對半頂梳頭白半頂妙言頭已秃也相看多使者二句應亂後未還第三首吾人淹老病一連老病淹留乃不得已非卜居貿名附才人之故蹟也赤甲吳體笑接郎中評事飲二句言致主無路聊用杜康解憂故非率真自放忘其可以增疾也落句反言之卜居言豈惟此生欲歸將待化鶴正恐子孫長流落三峽似桃源中人矣故吟望尤切也莫春題瀼西新賃草堂五首第一首哀傷不在兹哀傷為戰伐不定不在無家久客第二首畏人旅食竄身窮僻起連言非求安擇地也全生麋鹿羣雖友麋鹿尚見干戈畏人江北草草比小人旅食瀼西雲石為雲根言石田不可耕也萬里巴渝曲二句巴渝曲言峽中三年之內無日不聞徴發也第三首起連是暮景乾坤一草亭草堂在此篇㸃出已蒼云言乾坤之大止有一草堂非以天地為圍幕按草堂尚屬新賃所謂世亂一身多也細雨荷鋤立暮春江猿吟翠屛與哀歌相答落句山谷多效之冉冉老至身世飄零幾將為農沒世故因暮春興感也第四首起連言我自無能非我君少恩而致我躬耕力食也王臣未一家共屬王臣尚為敵國故尤可憤歎耳所悲者亂靡有定未為一家若我生有涯非所深悲也應哀傷不在兹句第五首欲陳濟世䇿二句濟世䇿須北歸而陳於天子之前今淹留使府且以尚書郎老矣即下所謂風逆羽毛傷也但嘗陪鴛鷺猶搆豺虎不覺躑躅感憤耳落日悲江漢自歎朝宗無期也園清新豎子至樝梨且綴碧襯熟字山風猶滿把神來此等句後人更不能到野露及新嘗嘗字即呼起欲寄提攜日月長日月二字妙與風露映帶長字又妙與猶字及字呼應示獠奴阿段起句山木蒼蒼伏虎豹羣落日曛起入夜第二句竹竿裊裊伏餘瀝細泉分伏爭字傳聲一注濕青雲顧源字怪爾常穿虎豹羣顧尋字秋野五首第五首大江秋昜盛傑句徑隱千重石一連說留滯寫得乃爾新麗溪上幽秀古苔生迮地地濶故迮處生苔秋竹隱疏花人稀故隱處藏花西江使船至二句自道所以不願深居必在溪上之故樹間六句間寫得妙交柯低几杖間字妙滿嵗如松碧柯字同時待菊黃實字幾回霑葉露二句收婆娑又即從上待字打轉課小豎鉏斫舍北果林枝蔓荒穢淨訖移床三首第一首背堂資僻逺舍北泄雲髙不去惟泄雲不去則下皆淨訖也第二首前四句妙是鉏斫後語全身學馬蹄莊子馬蹄篇也吟詩坐回首移床第三首日斜魚更食一連是眼前無俗物魚鳥皆來親人也日斜客散互文見意寒水光難定為風多也與第六一穿非死對也寒雨朝行視園樹清霜殺氣得憂虞收足寒雨衰顔更覓藜床坐行視季秋江村逺遊雖寂寞二句坡翁九死南荒吾不恨兹遊竒絶冠平生分明學此却覺㾗迹少味逺遊只已事投荒不恨是以君命為戲也小園問俗營寒事應本是楚人家自瀼西荆扉且移居東屯茅屋四首第三首柴荆即有焉亦押語助以四首成章得用長詩中句法解纜不知年應見一川東屯月夜題是月夜然非玩月乃徹夜不寢見其升復見其落耳不寢由於愁然觸於風㸃愁字在中間以風字襯托兜裏細巧無匹抱疾漂萍老二句從東屯起伏愁字之根青女霜楓重領天寒黃牛峽水喧入風字泥留虎鬬迹中藏風字風從虎迹則因月皎而見也喬木澄虛影月中帶風數驚聞雀噪二句上句風中見月數驚暫睡起下不成寢日轉東方白收月字風來北斗昏出風字無夢寄歸魂收足漂萍魂亦難寄則此身漂萍愁苦不言可知舉夜以見日也從驛次草堂復至東屯二首第一首非尋戴安道以船襯馬峽險風烟僻二句既避峽險又看橘柚是所以借馬之故築場看斂積收轉歸田第二首山家蒸粟暖一連義興風景頗相似刈稻了咏懷草堂本此篇編於自瀼西荆扉移居東屯茅屋四首之後後四句即以終前移居之意非與前四句了不相關也寒風疏落木刈稻之時旭日散雞豚刈了之景野哭初聞戰起無家句樵歌稍出村抱落木作客信乾坤信乾坤與空雲水對此詩上四句刈稻了下四句咏懷上白帝城江流思夏后比祖宗開創之功風至憶襄王比明皇淫荒之釁老去聞悲角一連真有不見太平之痛公孫初恃險二句却又轉言公孫躍馬意雖長而甚蹶促吾又何為而不見賊平哉上白帝城二首第一首天欲今朝雨頂變字山歸萬古春頂新字八陳圖遺恨失吞吳遺恨謂不能制先主之東伐謁先主廟䕫州詩以此種為極山谷不能至也可配謝元暉武昌故城詩乘時各有人各有人三字直呼後半孰字力侔分社稷起復漢一連志屈偃經綸起雜耕一連雜耕心未已伏雄圖屯錦江元過楚頂伯氣歇虛簷交鳥道頂空山枯木半龍鱗頂舊俗竹送清溪月二句含換字新字孰與關張並一連反覆咏歎非先主天授雖有諸葛亦孰能任之不二以共濟大業使乘時立功乎應天才不小一連言外見我既風塵搖落不知當世亦有才如武侯之人堪憂國之寄者乎遲暮堪帷幄一連堪字乃公自謙語與且字對堪猶言恐不堪也其謙也正其任也曰且者且以待時㑹也向來憂國淚二句又言此區區效忠之心終不能忘惜乎寂寞至今耳寂寞二字結束搖落風塵飄零遲暮白鹽山破題已暗起白字刻畫竟誰傳略㸃鹽字却不纎巧灔澦堆巨積水中央積注作石當如吳本作積為是亦沙堆也江寒出水長公詩善押長字灔澦江天漠漠鳥雙去一連除是鳥飛得過况又風雨蛟龍雜然助其險阻耶白帝高江急峽雷霆鬬頂雨翻翠木蒼藤日月昏頂雲出白帝城最高樓城當雲頂日漾江中慘淡變幻弱水無力猶隨江流朝宗歎息我老獨不能出峽也扶桑西枝封斷石切最高二泉云以西言東封斷石亦壅塞之意弱水東影隨長流二泉云以東言西泣血迸空回白頭迸空藏最高白帝樓樓光去日逺覆裝句峽隘每思飛去而苦道梗不得已而謬歸咎於峽路之險隘也聞說江陵府即注望字水有逺湖樹含望字諸葛廟看其㸃綴斷續之妙久逰巴子國二句流落無成彌有感於劉葛之一心一德發端渾涵有味賢聖亦同時晏嬰聖相此聖字所本也欻憶吟梁父二句打轉久逰俊健之甚峽口二首峽口即西陵荆門虎牙二山之間楚之西塞也瞿唐兩崖乘此險者何如落句凄愴不言自深䕫州歌十絶句第八首何意流落直到此地第十首言除是崑崙蓬萊耳天下更無匹也偶題前輩飛騰入二句詩體態法自儒家有二句儒家疑作傳家謂乃祖審言也騄驥斫輪等語皆承此聨來分書傳與儒相似漢書相如傳列仙之儒有作傳者二字蓋昜誤也詩工夫永懷江左逸二句詩源流江左謂徐庾隂何鄴下謂建安也多病猶言僕病未能非疵病之謂病注一作謝亦可通按韻㑹拜賜曰謝言已之詩體源自鄴中若拜其賜也存備一說騄驥皆良馬六句言古之良馬多帶好兒何已之先人斫輪有自而不克負荷致愧前賢因思展轉浮名非不傳其著作特有才無命不禁羈愁耳抱疾屢遷移詩境地聖朝兼盜賊二句兼懷也謂不能討而欲以恩綏之先生云兼字仍虛言聖朝兼有盜賊之憂異俗更就喧卑之陋也鬱鬱星辰劍有深埋蒼蒼雲雨池無騰化兩都開幕府謂成都江陵三公皆武勳兼領故曰開幕府音書恨喜鵲報喜多虛反以為恨號怒怪熊羆爪牙莫用深以為怪不除盜賊惟恣暴怒故以為怪也稼穡分詩興無佳句柴荆學土宜有離憂不敢要佳句要猶取必也秋興八首賈開宗曰少陵之詩以文選為宗故秋興八首其題原於盧子諒其筆取之劉太尉文詞幾於亂絲而頭緒井然一絲不紊又本於左太冲之詠史八首熟精文選理者當自知之按左之詠史昭明所採者適八首耳此自以八首為章法賈言本此者非古今詩體不同謂其筆取之劉太尉亦附㑹之謬者也第一首題曰秋興此章乃後七章之興中四句虛實蹉對玉露凋傷楓樹林秋字起江間波浪兼天湧二句虛含第二首望字叢菊兩開他日淚二句虛含望之久也他日淚不始於今秋也二年逢菊眼穿落日矣故園引起望京華孤舟浮浪都無止泊乃心則維繫於故園也第二首䕫府孤城落日斜承上白帝城來落日斜又緣上暮字每依北斗望京華後此皆望京華之事三字所謂詩眼也南斗當作北斗京華不見惟瞻依北斗而已聽猿實下三聲淚二連以䕫府京華蹉對奉使句用小庾星漢非乘槎可上八月槎言京華難返猶天上不可至也五六二句言豈以病留兵實阻之悲笳起而粉堞隱上承日斜下起月映忽晦忽明曲折變化請看石上藤蘿月二句上句言悵望不已不覺夜深所謂依北斗也蘆荻花收到秋字月映則又依斗望京之候也仲言日夕望江詩洛汭何悠悠起望登西樓的的帆向浦團團月映洲結處㸃化其語以應望字第三首千家山郭靜朝暉二句一日依注作百處暮望不已朝暉復望江樓百處望之至也信宿漁人還泛泛二句似漁人之萍梗異燕子之知歸也匡衡抗疏功名薄二句少而早識尾大之徴欲痛哭而無路晚而追原外戚之咎抱忠藎而莫奏也時肅宗復偏聽張氏故公欲以劉向洪範五行傳論為諌書同學少年多不賤二句言際此喪亂之時一斥不復流落劍外同學少年猶不容我名挂朝籍拯此多難乎五陵起下長安第四首奕碁但指置君不定非咎謀國者之無定算此詩乃追述祿山陷長安之事下二章則追述天寶以後馴至喪亂之由第宅皆新衣冠異昔皆謂陷賊之時無容穿鑿直北西征未詳意者謂喪亂以後河北陷於賊臣隴右淪於安史而恢復無期也若舊注以為䕫府之直北上句直指隴右關輔為言則不可通矣聞道長安似奕碁二句接五陵來文武衣冠異昔時衣冠指門第征西車馬羽書遲安史繼亂蜀中多故朝廷不暇致討求一安身之地而不可得故云悲失望也魚龍寂寞秋江冷二句魚龍公自比猶七歌言龍正蟄也秋江冷顧䕫府有所思亂極而思治也第五首方云因提故國平居想到長安全盛之日此言天寶政衰外惑於神仙內蠱於女謁雖知其將有土崩瓦解之禍然方在下位又未久而去不能有所匡救也蓬萊宫闕對南山此故國平居之盛一卧滄江驚嵗晚顧䕫府第六首此言盜發幽陵倉皇西幸平時歌舞佚樂自謂無虞而不知金城湯池古號帝王州者曾無籓籬之固也瞿唐峽口曲江頭二句倒起變化言我凝望之久雖萬里而遙不啻與京華風烟相接亦從一卧滄江來瞿唐峽口即上所謂䕫府孤城蓋公自言所處之地也明皇幸蜀乃至成都與瞿唐無與後見董易農說亦與余同花蕚夾城通御氣天寶以後明皇移仗於南內聽政故曰通御氣也回首可憐歌舞地二句言惜哉自古帝王之都所謂周以龍興秦以虎視者乃為歌舞佚樂之故忽焉喪之即承上珠簾二句來所以示戒也第七首此因上秦中自古而因及其景物之盛後半又自傷僻逺不得復見向日秦中景物也凡老杜之詩雖有為而發者為多然亦不必每首穿穴太過昆明池水漢時功接上歌舞地織女機絲虛夜月二句澤州云遙想昆明之秋色也下二句鋪張菰蓮寂寞可悲關塞極天惟鳥道顧䕫府江湖滿地一漁翁言已漂泊江湖遂成一漁翁即所謂倚薄似漁樵也或云即信宿泛泛之漁人何其固也第八首七八二首相連說皆昔遊之地也紅豆啄餘鸚鵡粒六句言豈但功名不得施即文彩亦未遑表見於世獻賦蓬萊遂為終身榮遇求其分紅豆之餘粒借碧梧之殘枝亦白頭不可俟所以追昔而至於低垂也天步未夷棄置蠻徼所用反皆少年裘馬之徒識昔年之事蓋歎晚嵗之流落也曰望京華曰吟望八篇之首尾也安溪云稻餘鸚粒而梧無鳳栖佳人拾翠仙侣移棹皆因當年景物起興隱寓寵祿之多而賢士逺去妖幸之盛而高人遁跡也末聨入已事宛與此意湊泊按師說更渾融亦表裏俱徹也詠懷古跡五首竒才如庾宋國色如明妃英雄如劉葛皆不得志於當時五篇假以自喻也第一首哀江南賦云誅茅宋玉之宅開徑臨江之府公誤以為子山亦嘗居此故詠古跡及之恐漂泊羈旅同子山之身世也宅字於次篇總見與後二首相對為章法羯胡事主終無賴祿山作逆更有思明懷恩內畔勾致吐蕃總言之故曰終無賴也第二首賢放色荒千古同欲楚宫泯滅故宅長存然則何必以遲暮不用為悲也第三首羣山萬壑赴荆門二句生之難一去紫臺連朔漠一連棄之易盡圖省識春風靣一連請行雖得識靣長信僅可魂歸何等凄緊千載琵琶作胡語石季倫王昭君詞序云云特因烏孫公主以意推之非實有琵琶也公蓋承襲用之第四首蜀主窺吳幸三峽二句先主失計莫過窺吳喪敗塗地崩殂隨之漢室不可復興遂以蜀主終矣所賴託孤諸葛心神不二猶得支數十年之祚耳此篇叙中有斷言婉而辨非公不能第五首宗臣遺像肅清高帶跡字三分割據紆籌䇿一連言其業則限於三分其人則為法萬古不可以成敗論也一羽毛陳李二師引漸卦其羽可用為儀得之伯仲之間見伊吕一連直判定千年大公案不特無一字無來處諸將五首首篇言吐蕃次篇則言回鶻知中國空虛其憂亦不在吐蕃下也第一首陵墓殘毁臣子之至痛故託言漢事第二句又逗出千秋二字見赤眉之禍又見於今日也入關謂自蕭入關也昨日玉魚䝉葬地一連經祿山之亂園陵甫得修塞可堪吐蕃復發乎此昨日早時相仍而言之義也䝉葬地是既葬者䝉掩之也見愁汗馬西戎逼汗馬指石馬流汗事言方復憂此也曾閃朱旗北斗殷朱旗絳天此之謂殷也顧注引東觀漢記朱旗騎馬殷天蔽日更考之多少材官守涇渭言雖有材官騎士曾不能制也多少猶言無幾涇渭指涇源將軍且莫破愁顔責其善後之備第二首俯仰感慨無限曲折劇言借助回紇之非當時祿山已死安慶緒本庸奴負弒父之罪茍以計間其下未有肯為之用者也朔方諸軍以順討逆滅賊固在旦夕何必借助回紇乎香積之勝李嗣業等血戰之力也新店之戰即乘香積之餘威也回紇但利中國子女玉帛何嘗肯與賊血戰乎新書謂太宗能用突厥者謂但用其虛聲且使之不擾汾晉可無內顧之憂是為得䇿肅宗之於回紇用之協力以翦同羅叛胡使阿史那從禮不能擾朔方軍之後足矣乃聽其傾國而至竭中國膏血以奉之異於曩日之用突厥矣新書正謂假回紇之助以復兩京為非注家自失其㫖也汾陽勳塞天地然其得失各不相掩注家謂但當惜之訟之不應復譏議短長陋哉斯言汾陽有知不將胡盧九原乎怙恩肆掠雖庸人亦逆知之當時蓋急欲資以就目前之功耳他日回紇為史朝義所誘起兵內侵至三城見州縣皆為邱墟遂有輕唐之志賴僕固懷恩為之彌縫始復助順義朝既平登里可汗歸國所過鈔掠中國之兵為之重困及僕固懷恩叛復誘回紇至涇陽雖聼子儀之言擊吐蕃以自贖而唐之被侮亦極矣假使不幸有叛人逃死於其國者教之乘亂盜我邉鄙則朔方軍豈復為唐有哉原其厲階莫非肅宗不善用之令得窺見中國虛實遂肆然如行無人之地無所忌憚借助之舉唐之不亡於回紇者幸也少陵留花門之詩注家豈未之讀乎第三首洛陽宫殿化為烽九廟為燼但舉其半言之休道秦關百二重此言秦關難恃隱顯見意滄海未全歸禹貢滄海指淄青薊門何處盡堯封薊門則通指三鎮也天下軍儲不自供三句諸侯不貢而畿內賦斂益急根本方撥何暇收復薊門屯田積榖農戰兼修則府兵可復居重馭輕安史餘孽削平可待矣第四首注家謂以楊思朂吕太一為用李輔國魚朝恩之前鑒真善據也殊錫曾為大司馬一連大司馬句謂李郭皆元勛不相統也並為大司馬詳漢書中侍中貂句但指朝恩炎風朔雪天王地二句用忠臣則炎風朔雪盡入版圖任小人則兩京廟社皆不可保何謂忠臣不求明珠翡翠以蠱君焚身者而已末句言當憂根夲也五嶺不臣事同癬疥內任忠臣先取巨憝則聞風清蕩矣第五首明皇出走賴蜀以為後圖豈可付之非人敗亂相仍乎錦江春色逐人者自公之離成都亂者數四無復往時春色也前後持節皆倚主恩燕享中使杯巡有數何嘗如後人剝軍實以交近習致非才當重任乎此詩固譏代武者之非其人然遂字比較附會以實之則非矣秋日䕫府咏懷奉寄鄭監李賔客一百韻何必定以百韻為限元白為遺山所譏亦有由也絶塞烏蠻北䕫府起登臨多物色轉岩排石樹圓圓字工拂雲霾楚氣承樹來朝海蹴吳天承江來喚起搔頭急二句轉胸懷抑塞終非詩篇所能陶冶故云喚起搔頭急扶行幾屐穿此一聨正轉入咏懷秋風灑靜便出秋日弔影䕫州僻轉奴僕何知禮當指懷恩父子熊羆載吕望二句蓋謂代宗起郭子儀於閒廢幸而復長安也側聽中興主轉收上長吟不世賢起下置驛常如此二句插入自已定交之事羽翼商山起賔客蓬萊漢閣連監每欲孤飛去轉徒為百年牽詠懷生涯已寥落起下國步乃迍邅顧上露菊班酆鎬一連公本杜陵人有宅在洛陽雕蟲䝉記憶轉求飽或三鱣言除是從空墜也借問頻朝謁轉困學違從衆插入自已行路難何有轉以下言我亦將由夷陵而行或與鄭李道故雖為百慮所牽不獲就二君於南湖東郡之間然雙峯七祖其真詮妙教已决招尋之興自䕫之蘄途中終當與二君少欵也風期破浪至結極言其依皈迦葉之勇猛以終詠懷之事所謂喚起搔頭急扶行幾屐穿者庶幾賴佛法以掃除之如金箆之刮眼耳蓋士無學問以養其性情則憂傷之極徒有歸放曠而已屈子之逺遊其著焉者也身許雙峯寺二句雙峯寺注既謂應指蘄之雙峯則子美非南宋明矣北宗立神秀之弟子普寂為七祖而南宗至德宗時荷澤始有七祖之號子美今云七祖禪則欲從度門明矣豈得以曾救房琯而謂必偕出於頓門也哉以佛氏言之頓門固優於度門然譬如舜自言瞽瞍之子而人必曰堯也烏乎可哉注又謂七祖之禪門系之以求則知李華諸人所叙大照七葉者固未可剋定為宗子矣按謂從七祖以求禪非欲為禪門求可為七祖之人也明人注大抵多以臆說穿鑿附㑹至浮屠之書尤以人所不讀得恣為欺罔豈知詩人立言本自明白易曉後人自非有目無覩要得據以折之贈李八祕書别三十韻喜異賞朱虛李是宗室而官不進故云麒麟滯玉除玉除注作石渠是謂祕書也飄泊哀相見二句轉接處溫厚藴藉對揚抗士卒以下贈之以言勢藉兵須用一連上未喻下屬纍句去斾依顔色以下識别鈔詩聽小胥盧德水刻杜詩胥鈔蓋本諸此寄劉峽州伯華使君四十韻逺山朝白帝此是西深水謁彛陵此是東哀猿更起坐為客伏枕思瓊樹一連句法最生動青松寒不落得朋雕刻初誰料料猶賦料揚雄敵之料黃霸璽書增重押增字前謂聲價此指品秩但求椿壽永六句三層相頂但猶言何但也莫猶言莫非也江湖多白鳥即白鷗沒浩蕩之意天地有青蠅即虞翻之以青蠅為弔客也䕫府書懷四十韻扈聖崆峒日倒裝句病隔君臣議二句上句起下下句束上先帝嚴靈寢蓋雖含猶視之意注非宗臣切受遺注指李輔國按此最穿鑿可笑飛龍廄小兒而謂之宗臣詩人不若是其傎也盍以上下文義求之總戎存大體一連僕固懷恩為河北副元帥故曰總戎史朝義既平降將薛嵩田承嗣李懷仙等迎懷恩拜於馬首乞行間自效懷恩恐賊平寵衰奏留嵩等及李寶臣分帥河北自為黨援朝廷茍幸無事因而授之諸將各擁徑兵自署將吏不供貢賦二句蓋紀其事也東萊以總戎為代宗大謬公以大歷元年始居䕫而復謂代宗為總戎乎長吁翻北冦二句主辱也北冦西夷其指懷恩誘回紇吐蕃入冦之事乎不必陪元圃一連君臣議也殆譏代宗倉猝出幸陜州乎凶兵鑄農器一連即下所謂以貞觀為元龜者而惜乎廟算之不然也先是租庸使元載以江淮雖經兵荒其民比諸道猶有資産乃按籍舉八年租調之違負及逋逃者計其大數而徴之擇豪吏為縣令而督之不問負之有無資之高下察民有粟帛者發徒圍之中分其所有甚或十取八九謂之白著民相聚山谷為羣盜州縣不能制台州賊帥袁朝攻陷浙東諸州改元寶勝聚衆近二十萬故下云恐乖均賦斂又云緑林寧小患也形容真潦倒年衰也雲夢欲難追注指來瑱之事為是議堂猶集鳳一連傷答效之無日而致望於在朝之君子也凡百慎交綏雖叛逆如懷恩亦始於觀望持兩端遂貽國家無窮之禍耳故末以交綏戒之解悶十二首第三首每見秋瓜憶故邱故邱公自謂也注牽率何人為覓鄭瓜州似當依注作袁為長復愁十二首第三首如此說轉自悲凉偏留餘味復字亦醒第六首此言中國習於逆亂人心不靖乃更可憂第九首藩鎮勢重禁兵復單寡本先撥矣此詩固自濶於事情也第十二首數詩之中多感慨時事所謂意有餘也落句自謂嘗從大夫之後視國家傾危不敢以身在事外而置不問也承聞河北諸道節度入朝歡喜口號絶句十二首第一首退之宣喻王廷凑之語蓋本此詩第十首此言降將當收之環衛縻以富貴不當復使據土地領兵馬也第十一首嚴云光弼不朝此詩反以諸將入朝之功歸之容有溢美不知正以刺之按光弼因來瑱之死懼讒不敢入朝事在鎮徐州時嚴說未諦喜聞盜賊蕃冦總退口號五首第一首此紀吐蕃之新退第二首此言開元盛時本為恭順壞於誤國之將橫挑邉釁也第三首此言吐蕃乘亂陷我河湟之地今為中國所破庶幾其逺徙也第四首此言開元盛時安西諸蕃各貢方物今天下太平宜復畢來也注於上二句附㑹可笑注杜詩乃作西域記證疏耶注下二句謂輕禮重貨亦支離按千堆寶而僅少答之以萬匹羅蓋以志國家威靈及逺非刺勃律堅昆之輕禮重貨也第五首此所謂遂開明堂坐以治之洞房方云洞房八首公在巫江舟中見新月聞清漏因懷長安而作也此第一首故有今夜往時之句其餘則直述往事矣洞房環珮冷環珮指奉陵之人秦地應新月一連言月露凛秋風號陵樹影曲龍蛇也宿昔花嬌迎雜樹一連花興王母少兒龍興留之倚之者落月留王母衆妾不敢當夕月落尚留言專寵也少有外人知本是人無不知語妙能畫弄臣滿側倡優歌舞政之所由衰然若倚任有姚崇之徒則主昏於上政清於下如齊桓至於負婦人而朝管仲得君行政猶不害伯其如倚仗者又為林甫國忠何由不風塵澒洞乎時時用抵戲二句角抵本西域胡舞是故風塵之徴也鬥雞首二句接上角抵來豈知遂以此為事乎樓前御曲長指霓裳羽衣女樂久無香三事獨歸重女樂言之寂寞驪山道次連暗接至此㸃明鸚鵡此詩注引明皇雜録微似附㑹不若他本以洞房至提封八首同編此作另編之為得也紅觜漫多知頂聰明未有開籠日頂别離歷歷歷歷分明又言無端者為尊者諱也起二句結束前四首末句數字與歷歷對照洛陽天子初愁思犯潼關而始知愁諷刺深矣龍髯幸再攀言意外之事也驪山驪山南苑嵗晚政荒萬騎羽林手平內難功過不掩可戒可思起結包括一卷元宗本紀也羽林舊注殊憒憒地下無朝燭奉陵之薄人間有賜金待臣之厚提封萬國尚同心戴之者以祖宗舊德兼懷開元初政也不急行儉德以新恩係結之則人困而斂益急方且不戢自焚將轉而屬之他人矣豈止安史草竊能使所在失守乎覆舟第二首落句借乘槎事反收垂白多難身何補一連言我今身何所補但冀匡此多難無家而病固所不辭也未許七哀詩七哀詩成目終不瞑少睡非關江喧登樓日憂王路白首不移徒以此也草閣此䕫州詩久露淸初濕久晴之露故下久而初沾濕淸當從注作晴泛舟慚小婦二句䕫俗女當門户泛舟其常族父省齊謂是公之小婦蓋泥於慚字耳江月起句光於水三字便切江月第二句舊引沈約高樓切思婦即與結處呼應江漢乾坤一腐儒謂世人以腐儒見待若乾坤之內有不加多無不加少此一老真無復當世之用也直呼起後四句落日心猶壯四句言所以思歸者非懷安也廟堂勿因其老以安用腐儒棄猶可以端委而折衝也孟氏第四句暗用茅容事有歎言所歎非為羈窮壯心零落不得致主重見武德開元之治使蒼生各有家耳月圓江潮夜月光彩相鮮第二句神妙襯出圓字又與故園反對照席綺逾依逾依恐不如上句不定二字中宵中宵步綺疏用魯靈光殿賦懸棟結阿天窗綺疏張孟陽注天窗高窗也承上百尋來落月動沙虛虛字不穩并逹曙矣親朋滿天地二句書猶不得况可因依耶雖謀去此而未能也茫茫天地不知所從雖欲深潛熟擇其可得乎所以中宵輾轉也秋清此等詩太嫌其頽然自放傷秋發端籠罩無歸南極古城疏落木以下一路逼到愁字歲月蛇常見二句言非人所居况又值亂離乎近身皆鳥道言山之衆也二句先透愁字睥睨登哀柝古城矛弧照夕曛荒戍二句轉出亂離搖落起二句言身方卧病不如江水能朝宗也鵝費羲之墨食也一句虛換鵝用得變貂餘季子裘衣也一句實二句總是說金盡長懷報明主二句承上言衣食不給非所憂但恐衰年卧病終負主恩是以長懷深念耳耳聾無復歎世獨有憂生則吾衰久矣後半乃非癡狀頑聾黃落驚山樹映上眼字獨坐第一首雙崖洗更靑但對雙崖則是獨坐也暖老須燕玉一連老至而待種玉飢虛乃憶得萍皆言其不可必也逺遊江濶浮高棟一連是逺塵沙連越嶲一連伏歷國雁矯銜蘆內四句是遊夜第四顧驚字雙杵鳴謂聞砧聲也非月中搗藥之杵七句收足旅魂暮春二泉云久雨長風使人鬱悶不舒如草閣野池之景聊可遣悶而風雨又阻之其壅塞何如耶瀟湘洞庭虛映空言安得一覩瀟湘洞庭豁此壅塞耶沙上草閣桞新暗一連是暮春暮春鴛鷺立洲渚反對卧病壅塞晴二首碧知湖外草一連頂錦繡野花乾更落二句收晴字細麗超脫第二首下食遭泥去一連遭泥去而下食恨久隂而高飛波瀾曲折劉辰翁謂其拙蓋不解其文義也二句皆倒裝句法日氣射江深竒句深字妙是雨後回首周南客二句收晴字濶逺又與起語相關月三首第一首不粘不脫筆力殊健天河此夜新天河露晴猶以為喜况皎月乎若無靑嶂月一連反接妙靑嶂緊抱巫山魍魎移深樹一連刻畫雨後魍魎水怪是初晴語只動半輪已移深樹二句倒裝故園當北斗二句申明愁字第二首並照巫山出照注作㸃亦有味羣峰歷歷故曰並㸃此句月之升下句月之沉新字承首篇首句來二十四回明總言兩年不違銀漢落二句上句頂退字下句頂進字言月照西秦身獨留滯巴蠻不能進退皆依朝廷也第三首春來六上弦獨言此嵗爽合風襟靜貼久雨對前二篇高當淚臉懸三句無家之淚妙用暗收晚晴結句將晚字又一染色更題更題夜雨也與上篇語意相承歸落句言只以詩篇自娛悅也與吟詩解歎嗟意同返照起二句用倒裝更錯綜可喜歸雲擁𣗳失山村解上黃昏二字熱三首第一首起二句諺云雷聲大雨㸃小第三首十年可解甲言可曾解甲也日暮北征賦日暗暗其將暮兮覩牛羊之下來悟怨曠之傷情兮哀詩人之歎時此不題曰日夕而曰日暮也起二句破日暮即籠起非故園詩於役鄭箋云言畜産出入尚有期節至於行役者乃反否也石泉流暗壁一連作倒裝句流水對看更有意八月十五夜月二首詠月四篇中皆有䕫州在第一首上半夜歸心折大刀破十五夜水路疑霜雪明鏡此時瞻白滿目第二首下半夜刁斗皆催曉二句將曉猶清方是八月望夜月張弓倚殘魄二句收歸心兩首如一自謂思歸之情無異從軍之士十六夜玩月下語皆切玩字十六夜與十五夜月無大異故自破題後只平平說去舊挹金波爽切十六夜皆傳玉露秋切玩月並起夜半關山隨地濶當空正圓高下深阻一片皆明故曰隨地濶谷口樵歸唱二句甲夜巴童渾不寢二句丙夜玩月不寢却借巴童㸃出又照顧䕫州十七夜對月將月之光彩在後半細寫不惟避前三篇亦是十七夜夜久漸上神理也後四句著意寫半夜是十七夜秋月仍圓夜十七夜月江村獨老身反破對字卷簾還照客對字出光射潛虬動句中有眼潛虬顧江村清切露華新有眼晚晴吳郎見過北舍題中字字出柴扉隔徑開北舍欲棲羣鳥亂二句晚過貧家客過不能設食顧視日影無以為情此連寫生入妙明日重陽酒二句應愧字俚俗語轉多雅韻淸坐相看暗藏一愧字中以明日繳出作用之妙獨為藴藉雲上六句都是憑高下視之雲氣非身在千巖萬壑中㸃綴不出龍似瞿唐㑹雲之所起收穫辭霜渚承終年句分明在夕岑承每夜句五六轉將無雲時反襯上連終字每字更覺精神月發端二字山字樓字兩句中照應得妙斟酌姮娥寡二句以奔月自比竄身在逺雨四首每首皆切微雨第三首落句深渾風雨思友朋也夜獨坐親雄劍一連親字起壯字歎字起違字哀歌承獨坐短衣承雄劍如此氣脉王李何曾夢見烟塵繞閶闔從風字生來晨雨談友夏云俗傳晨雨易晴詩中皆易晴妙景不曾說出而氣象浮動其內小雨晨光內光字含後四句句句是晨句句是小亭午未全分收晨字反照三四一承半無來一承半有來荻岸如秋水荻花映日一片水明此句明處似無松門似畫圖松門浮光相錯金翠此句暗處似有向夕深山催短景向字妙雷龍蛇不成蟄承十月却碾空山過二句承巫峽動何須妬雲雨二句言中宵驚覺不成夢也山谷專學此種所以偏枯雨直覺巫山暮收冥冥兼催宋玉愁收次連朝二首第二首前四句都是雨後結句收出以昨夜反醒朝字雲晴欲半回本庾子山山晴雲倒回昨夜有奔雷藏過暴雨只說奔雷變化夜二首第一首後四句不眠妄想姑以撥遣旅懷蠻歌觸耳忽又百端交集凡有三層轉折義門讀書記卷五十五

body:
  text: 義門讀書記卷三十四翰林院侍讀學士何焯撰昌黎集外集明水賦題注公貞元八年登第云云按今文苑英華尚存賈稜陳羽歐陽詹李觀馮宿劉遵古六人詩觀同時栁白集中所載及前後塲屋諸賦乃見韓公此作格超韵穏亦冠絶當代也旣齊芳於酒醴周禮注明水以為𤣥酒疏云鬱鬯五齊以明水配三酒以􅏏酒配􅏏酒井水也􅏏酒與明水别而云明水以為􅏏酒者對則異㪚文通謂之􅏏酒是以禮運云􅏏酒在堂亦謂明水為􅏏酒也如得其宜宜苑本作情此正與前主忠敬意相應豈不以徳恊于坎至氣應則通二韵促之使𦂳公文必有隨手之變也宋賦必一韵十二句則拙矣形藏之藏苑作昭得之足以驗聖賢之無黨至末不着迹海水詩意謂其才未足以勝大任則當退而求志以待其成也注謬海水非愛廣至末此下言與身世兩相棄者不同請遷􅏏宗廟議謹潔似經尚書咸有一徳至可以觀徳注十六字舊史闕按此十六字乃祖功宗徳不在其數之據何可闕也祖功宗徳不在其數劉歆議只以二語括之為高祖太宗起本上賈滑州書雅潔古節昭融古之典義至保任皇極猶有塗塈經典之迹上考功崔虞部書前半嫌於自暴而訐人者故正集無之是知其文之或可四句上人之莫可者非今之人也下人之或可者志古之人也又歎執事所守異於人與下愚之所守對人廢耳任目至故有所退廢耳任目而時所尚者華則所進者必華而所退必實也兩故字即上異字意華實不兼注不疑當作必按不兼即下所云實與華違也若作必字則公已不在三人之列矣然愚之所守竟非偶然故不可變以下言其人寜為莫可者其所志有在不容變而為時之所可也夫古之人四十而仕至而又之死不倦日以進夫今之人務利而遺道至而役役於持權者之門日以退行之以不息六句終上所守之不可以變其信然否也應前疑字斯文未䘮四句惟乖於時乃與天通此公生平所自信知命不惑者也終上信字必有以見知爾應知其人知其文兩知字與少室李拾遺清挺勁直不同常玩小大之事皆出宰相樂善言如不得聞觀太平之運者在此三語必望審察而逺思之審察收加秩逺思收善類答劉秀才論史書史書記人善惡傳信於萬世若褒貶失當後人猶可駁而正之茍記録失實輕據傳聞撰立事跡甚則牽顧他人之諱忌恣慿已意之愛憎不公不直為阿為誣使來世蒙其欺誑永無别白其取怒于鬼神不亦宜哉至於易代之後人跡久陳每見修撰之家猶多瞻狥不免私曲然則為實録者何得容易也退之一作平淮西碑不詳李愬之功果致發憤於正夫其不肯作史豈非明哲之論乎在據事跡實録二句本揚子雲然此尚非淺陋偷惰者所能就伏後僕年志已就衰退至行且謀引去此段應非淺陋偷惰者所能就且傳聞之不同至令傳萬世乎此段又見實録之難此是主意誠不可以率爾為也若無鬼神二句收住當畏懼與大顛書題注其後書吏部侍郎潮州刺史則非也云云按即此亦可證其偽矣要之公與大顛始末盡於孟尚書書中數語何必為緇流所欺取此謬妄之迹歟考異云皆非可與實事而求是者也云云按必欲反復文致三書為出於韓亦可以見朱子用心之隘而私矣使其無他亦可謂絶不知文識見凡下徒貽後人之笑耳久聞道徳尚是未見顛時語切思見顔成何文理朱子乃謂决為公文非他人所能作乎送汴州監軍俱文珍序屯兵十萬至舟車所同數筆有班馬風力送浮屠令縱西游序於是乎吾忘令縱之為釋氏子也收異同不知其不可也應可與河南府同官記筆無㸃塵盧公去河南為右補闕至自工部尚書至吏部尚書上一層只㸃明得河南同時得五將相此層又將中間轉遷敘清畧一裁翦不令板直我公愿潔而沈宻二句世得云愿潔沈宻以沈潜言開亮卓偉以高明言愿潔言其行沈宻言其識開亮言其識卓偉言其行登槐賛元二句均後以宰相出藩此特伏案非䛕佞語有若將同其後二句結住一倒轉便不凡除崔羣戸部侍郎制朱子語録退之除崔羣侍郎制最好於今雖重當作於今為盛為惟音訛又訛作雖潮州請置鄉校牒體格氣味純乎西漢質雅中意味深長此真充於中溢乎外而不自知者不如以徳禮為先而輔以政刑也政刑不可廢但不可獨任耳此句變得好夫欲用徳禮未有不由學校師弟子者論本董子夫十室之邑必有忠信古注必有忠信一讀如邱者焉不如一讀邱之好學也一讀言我不如此人方願學之也刺史縣令不躬為之師所謂三王四代惟其師順宗實録第一景申上即位太極殿册曰至無沗我高祖太宗之休命凡册文詔書但削去繁縟即簡質近古脩唐書者不知此法本紀中至一字不存宋景文列傳遇章疏輒竄易以就竒澁皆與公背馳者也宋元諸史畧無翦裁亦其失維均登伉皆上在東宫時侍讀以師傅恩拜書以師傅恩所以别於伾文之黨也實録第二貞元末五坊小兒張捕鳥雀於閭里南部新書聖厯二年勅雕鶻鷹鷂狗為五坊二十四年各置使追故相忠州刺史陸贄直自貶所召還者時謂之追刺史二字當作别駕縁上蘇弁之文傳冩致誤丁酉吏部尚書平章事鄭珣瑜稱疾去位至遂不起此事敘致尤不减班孟堅實録第三元和三年以修實録功追贈工部尚書附書實録第四贄令吏部分内外官員為三分計闕集人以為常今截闕之法所始城字亢宗北平人代為官族陽騖顯於慕容氏由此遂為非平望族有懐刺造城而問者至不能聴客語敘事至千載下讀之猶聲音笑貌顯顯在目馬班而下可復見乎朝廷有直臣天下必太平矣元和之治此舉貽之也萬福知言哉實録第五永貞二年正月景戍朔注戍史作寅按當作寅所謂永貞二年者止於此一日耳翌日丁夘即下制改元元和詳見舊唐書及通鑑也同竇牟韋執中尋劉尊師不遇竇詩止三四佳不及公逺甚韋甚凡鄙公此詩直當與沈宋抗行也發端得尋字神味院閉青霞入二句含下隠形又不寂寞但用馭風二字即已暗藏不遇矣筆墨之敏妙至此猶疑隠形坐二句結不遇變化桃字又與仙源暗應嘲鼾睡此篇多用佛經因其浮屠而戲之晝月觀此則知玉川月蝕體貌蝕字處公皆刪去葢不以為難能也辭唱歌近東野知音者誠希下二句只似惜别却暗寓知希深妙答侯生問論語書愈昔注觧其書而不敢過求其意不敢過求則本意可得而歸穏當矣穏當二字觧經之極則也此篇當以文采不耀故正集遺之長安慈恩塔題名石洪至長安當在元和六年徴拜昭應尉校理集賢御書時石洪歿於元和七年而子厚十年始自永州例召至京師安得同登慈恩也東野之歿亦在九年時年六十四其齒長于退之不啻一終不應題名於習之下福先塔寺題名王仲舒神道碑云元和初徴拜吏部員外郎未㡬為職方郎中知制誥安得三年尚為吏部員外仲舒以直楊慿之寃出為硤州刺史慿貶在四年則三年亦不得在洛也仲舒貞元中已入南宫名軰尊矣又安得以石洪加其上乎其偽無疑歐公不之審耳趙德文録序文録疑好事者依托義門讀書記卷三十四

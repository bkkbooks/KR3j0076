body:
  text: 義門讀書記卷四十翰林院侍讀學士何焯撰元豐類稿詩冬望學韓亦兼有似太白處入見奧作何雄魁作作阼宿尊勝院蔽衣蓋苦短蔽作敝向來雪雲端葉下百仞隍一本作向來雲端葉下飛百仞隍苦雨應有白鬢添數莖鬢作鬚此句收苦字南源莊發端獨妙論交孫仲益云此詩指吕惠卿恐不然兵間孫云此詩指徐禧寄孫之翰甫嘗因地震極論後宫又劾宰相陳執中豪傑詩若此復何味黃金道旁白日忽再去去作出不是九鼎輸西鄰西作諸山檻小飲造句極似韓上翁嶺時見崖下雨多從衣上雲十字王孟不過也濯足行上側上作尚雜詩四首第二首似指王元澤冬暮感懷奈至一嵗除至作此寄舍弟我意生側側側側作惻惻已期采芝藥藥作樂至荷湖二首林林路南山路作露猶疑拔山秋拔作沃秋作湫送徐竑著作知康州竑作紘衍裕咄唶令人謀人作心寫懷二首第二首言身雖局促意則空濶也茅亭閒坐鳥語遍喬林遍作變豈誰智所拙誰作惟靖安幽谷亭靖安下有縣字地氣方以潔方作芳愔愔謀謨消汨汨氣象孱二語可痛青雲亭閒坐坐作望趨榮衆所便榮作營寄子進弟一本作牟弟牟子進名也頗測隱與微隱作幽常若去左右若作苦我眼日以眯眯作睎喜寒此等詩正嫌其有造作之勞歐陽公謂孟韓文雖佳不必效之取其自然耳學詩何獨不然此是閩中所作但發端不醒乾離力還恲恲作併憒憒若酣醟醟於命切酗也凶酒曰􅀈醟詠史二首子龍獨幽逺申屠蟠字子龍用心豈必殊此語好理固如此不專為子雲護短論人惟平乃允也江湖論迹異驚衆論作淪詠雪蛟龍岌起抱巒岡江海橫奔控阡陌語竒而意微暗自駕疲牛理燒塉燒作墝答裴煜二首相期在􅒑誨􅒑作規相持非鬱盎持作遲寄王介甫宜興本作介卿荆公舊字也甫字謬改元板已作甫甫仍宜作卿如醖冒炎暑醖作酲每進意愈塞塞作寂亦可洗珠壁壁作璧遇愜每同蟄同蟄未詳疑作赥笑聲也宋本赥更得蟾蜍昃得作待昧者尊惡石石宋本作砳檢集韻不見此字萬竅動謞僥僥作激燁燁多吏從吏作𨽻良已饋藜齸饋作匱栗密縷機織栗作粟卷書勞來翰翰作幹幹僕也寸懷良士懌士作自金縚引柳荑縚作縮上人昌黎足三及宰相之門南豐亦有此等詩在集中可歎坐上一言寒口暖口作可初夏有感愁勤未老鬢先白愁勤作窮愁送人移知賀州擬送區宏兼用其韻風露氣嚴花草緋緋作腓南豐道上寄介甫雨露施土慳土作尚一作何謝章伯益惠硯太迂逺始獨俯仰吾坤乾吾作模送劉醫博馬蹄所至病歷屈歷作魔委曲衰旺肺與脾旺作王始免未老為枯骸骸作胔真人四難真可患真人作貴人去此足以為時規去此作去去送陳商學士生新之語雜子瞻集中不能辨其為兩手送錢生叩言忽言歸叩言作叩門雪詠亦終不出前人範圍誰能比衆作小去筆墨畦誰作薛按薛太拙有閒居新雪八韻禁體之祖也或溺久宛轉溺作弱屋角初漸班班作斑坳一已滿作窪厨烟或中鑱里表仍孤擎極搜剔陽春謝􅌙箏􅌙作秦蒼蒼不可問轉筆好萬物去復冒四句極似韓復作覆送僧晚容晚作曉飛光無停芳嵗間間作䦨送叔延判官物物當前若圖屏物物作物色山茶花終是沒意思欲攀更惜長依依攀作搴五月霧露空芳菲露作雨丁亥三月十五日丁作辛按丁亥乃慶歷七年是時公尚少恐筆力未能至是若大觀元年之丁亥則公沒已久矣玩末二句似指熙寧用事之人意者作于熙寧四年辛亥訛辛為丁也又按王介甫曽易占墓志易占以慶歷丁亥卒於南京時公方侍疾而詩中云臨川城中三月雨則丁亥之為誤尤明矣此詩前半亦水深雪氛之意舍弟南源刈稻新堂置嵓幽嵓作岩餘滋折丹榴折作析夜工督舂揄揄作牏送子固自起固作因奉和滁州九詠九首并序此九首及逰麻姑山諸詩其中兼有近體琅琊泉石篆初流泉涯俗誰顧流作留逰琅琊山後半無味殷勤羞甕醅一作勤修甕中醅琅琊溪可忍開時不出逰開疑作閒庶子亭亭作泉風翻日炎夏潦盡炎作炙慧覺方丈惡詩逰麻姑山九首䆉稏百頃黃參差參差作差參天風冷冷吹我襟冷冷作泠泠半山亭半臺亭榭午猶寒臺作崖顔碑碑意少缺誰能鐫少作小觀此句則此碑自公時已斷缺秋懷太訐直我有愁輪行我觴觴作腸一晝千萬思故人逺為縣海邊句踐州此必介甫在鄞縣時作安能望髙邱髙作嵩菊花孤淡答石秀才月下結處意弱更送城笳夜聲起聲作深冬曉書懷今日病减真無蠅真下疑脫一行宋本同代書寄趙宏日倚東風愁同調愁作想局西眀月過簾白局作屋東津歸催吳秀才寄酒若洗新妝竟妖臉竟作競已冷灑屋鋪風簟冷作令髙松􅟠􅟠倚翠纛􅟠􅟠作偃偃青青間青青草蓐隂可藉蓐作縟尹師魯一本上有哭字觀此則師魯尚當在歐公之右南豐先生固不妄許與人也發松門寄介甫况聞肥遁須山在句疑有訛庭木此篇所指豈陳執中之流歟篇中頗有似昌黎病鴟詩降龍文幡列㦸照私第幡宋本作幡槖針朴艾恬以愈朴作襆湘寇傖人操兵快如鶻快宋本作決月費空已逾千金月作日捷如馬援不得志捷作健邊將何減永貞豐陵多雨霖傾潦雨那復止雨作洶山水屏塵氛見荒林林作村圖屏特自慰特作持寤寐心思逐作心逐逐以上三字從聲畫集本改正盤石空原暗用吕傅事無迹即為溪岩耕釣伏脉追租試起望遺材材作村桐樹泫擢亂繁條泫作低九月九日句句可人但只有一層耳醜怪薦修螷螷蛤屬此句亦暗用爵入大水為蛤聼鵲寄家人秋風粲粲正可愛風作花春風千樹變顔色風作楓讀書亦云辛卯嵗讀書是嵗仁宗皇祐三年荏苒嵗云暮暮作幾雜詩五首第二首貧士任固小士作仕第三首韓公綴文辭公宋本作於按唐文粹多有不録全篇者此録至未負風義厚可也第四首相去幾年今與古按宋本此首在少年一首後二子引身高不起作二子引身蒿下起送宣州杜都官篇什髙吟鳳凰下此句乃用牧之天外鳳皇誰得髓也麻姑山送南城尉羅君不減廬山髙空槎枵然卧道邊所謂老樹半空腹東軒小飲呈坐中氣酣落日解醉鐶醉作帶眀妃曲二首二篇却參以齊梁風調此擬老杜負薪最能大抵南豐詩不能細潤祗緣直以李杜韓三家為法六朝略不留意故耳皎皎丹心欲語誰句不類一句之壞尤在丹字黃雲塞路鄉國逺二句十八拍中所少幾成新曲無人聼幾作度蛾眉絶世不可尋首直自比久棄外郡耳按曽子固詩過於古直此篇乃殊委婉曲折七月十四日韓持國直廬同觀山海經此篇亦簡兮詩人之意而尤藴藉秋聲喬柯與長谷長谷人不解用秋夜露坐偶作白雪飛向低雪作雲韓玉汝使歸光華友原隰友作及宋本又作反過介甫歸偶成熙寧初合醬作觀此篇即今之所謂醬與禮異矣膾食句亦是相沿用之蓋食魚膾用芥醬恐非此醬也大約古人所謂鹽豉即今之食醬調澆遵古書澆作撓送章婺州幽尋足豁山豁作溪逰金山寺作逺挹蜀浪來四語四靣做倒方是金山南湖行二首變調芙蓉臺尖新之句直似李長吉秋懷一首復示倉箱盈示作爾送李撰赴舉堂昨夜讀書客作華風鋩拂塵見飛影風作鋒送韓玉汝名園分雜英分作紛送豐稷之君飄泊動歸思之作夫髙陽池公之逺謗如此逰鹿門不果鹿門最發秀發秀作秀發漢廣亭北城最頻髙髙作登局促皆曠逸皆作諧劉景升祠此歎時相不知收公為助也蔡州州作洲萬山縹眇出烟雲雲疑作霄上已有氛靄句也題張伯常漢上茅屋屋作堂移守江西先寄潘延之節推我繫一官尚局促尚作常早衰瞻氣自然薄瞻作膽舊學搶攘期反覆覆作復酬王正仲登嶽麓寺閣見寄王正仲下補太常學士四字曉出衛青異日須天幸天幸本王摩詰詩非誤使也和貢甫送元考不至不至上叠元考二字一時驚豪健健作捷按公古詩止第五卷此卷中五言頓有優柔之韻蓋初年止於學韓至此頗窺小謝之藩也郊祀慶成詩欲知精意答此句轉浮陽上綺􅂒􅂒作闉送陳郎中還京兼過九江新宅􅋈舟金碧照溪沙􅋈作鷁楚澤經綸空建與誰論建作健盜賊恐多從此始經綸空健與誰論二語言民方救死不贍奈何又紛然其擾也照影亭不欺毫髮公雖有二語得比興之意晚望鄭袖風流今已盡二語歎神宗不邇聲色勵精圖治而所任非賢身遭放棄也簡翁都官况得君賔同壯節未詳胡太傅挽詞二首前篇雖劉白何以過第二首逺路參基命逺路疑作逺略閒行風出青山送水聲佳句送覺祖眀上人覺祖下有院字豐堂環殿起崔嵬環作瓌鍾隨秋勢金聲壯隨作乘送撫州錢即中名即元是足風流名即作賢侯是作自得郡東南地更幽幽作優應與謝公資健筆應作只送玉汝使兩浙作韓玉汝丁元珍挽詞二首神情玉氣溫情作清送李莘太傅傅作博冰雪映征車映宋本缺逰天章寺寺即王右軍舊宅監輿朝出踏輕塵監作籃南湖空解照人行人行作行人送關逺赴江西作關彥逺西園席上海嶠經寒酒熟遲嶠作聚里聚也滿足塵埃更有詩足作靣送鄭州邵資政咳唾落瓊瑰此句宜㸃勘㑹稽絶句三首送趙資政宋本無送趙資政四字為是此知越州時寄興之作也成化以前刻皆無送任達度支監嵩山崇福宫達作逵長篇詩穩切有氣后山輩正不能到地絶分琳館地絶作北絶碧落見鷗馴落作洛反席正逢辰反作仄送趙資政青􅒑遇更隆􅒑作規開幕斗牛中指䖍階庭訟缿空缿音項吏治連城肅指河北轉運錦官清鎮俗指成都鈞衡求俊望指參政股肱康事力或疑事作帝非也庶事康哉兼用左傳臣力晝錦過江東指杭保民追吕尚指青豈獨是倥侗倥侗作崆峒送沈諌議九霄應已夢儀形形作刑酬王徽之汴中見寄徽作微寄鄆州邵資政題下原注蒙鄆州知府安撫資政書言入秋以來甚有逰觀之興而少行樂之地因問敝邑山水之景見索新詩某荒廢文字久矣惟重意之辱不能自已謹吟二百字上寄俗本刪節不完今依宋本改正和孔教授敢將顔色在蜚鴻雖切孔君然亦太腐喜雪第二首英華傾月窟光氣瀉天潢名句郡齊即事第一首􅗎氏宿奸投海外伏生新學始山東恰使濟南兩故事上句注云時大奸月髙投海島一本作周髙為是第二首總是濟南為郡樂濟南作疏頑寄致仕歐陽少師作寄致政觀文歐陽少師原注有固辭寵祿歸就休閒進退之宜四方所仰十六字樂善意諄諄諄諄作循循龍卧傾時望四句語有體通幅似劉白冬夜即事月淡千門霿凇寒霿音夢凇音送此句非親見不知其佳豫在保陽蓋屢見之土人謂之樹挂其樹稼之訛乎西湖二首第二首眀河槎上更微芒芒作茫席上一本下有舞六么三字兩衙散雪夜深時作散後雪深時和陳即中眀月幾人非按劍直率無味雪後五六指吉甫與介甫舜泉更應此水無休歇此水作如此餘澤人間世世傳作流澤長令後世傳閲武堂方是太平之閲武詩意極髙漢家常𨽻羽林兵𨽻作肄環波亭不減元九芍藥㕔空逐風飛飾室仙疑有訛仁風㕔此種今人苦不能到朱絃鼓舞逢千載絃作弦二句切仁風閲武堂下新渠不憂待月供詩筆供一作乾乾字佳方是新渠詩也二語似張文昌凝香齊三四仍帶感慨而無迹沉烟細細臨黃卷一作兩衙放罷閒鈴索北渚亭常碣風連草木薰此密州之常山百花臺第四醒出夾岸皆花自妙次道子中書問歸期竊食東州嵗未期一作疏懶為州嵗未期霿凇霿凇花開處處同花開宋本作開花為是蓋惟真花方可云花開也詠柳此必指熙寧少年喜事之徒喜雨㑹見甌窶果滿篝篝宋本作㝤次李秀才得魚字韻十年方喜夢維魚十作卜孔教授張法曹以曽論薦特示長箋三四一切孔一切張髙臺閒燕屬佳篇臺作齊酬強幾聖寄聲裴令樽前客強在魏公幕府人情此亦為介甫而發戲書次連僅勝農夫背上書軍號賈客船頭插戰旗矣收處語太質宋本此下有水西亭書事一首一番雨熟林間杏四靣風開水上花岸盡龍鱗蟠翠篠溪深鼇背露晴沙隴頭刈麥催行饁桑下繅絲急轉車總是白頭官長事莫嫌粗俗向人夸一結妙送趙資政此再知成都府趵突泉曽城齊魯封疆㑹城作成句拙金線泉雲依美藻爭成縷線字刻畫界破冰霜一片天霜作綃北池小會銀簧相合鳥聲新合作答答字勝送韓廷評一作延年寄孫莘老墨妙亭壯字碑豐亦易忘碑豐作豐碑忘作亡鵲山第三用上池水注華不注山注青峯嶺望㸃黛按宋本作青崖翠嶺望同㸃黛虎牙千仞立儳儳儳儳作巉巉靈巖寺兼柬重元長老二劉居士此是長清靈巖寺和孔仲平作平仲鮑山山中那得叔牙城中作前庭檜呈蔣頴叔蔣堂所植其姪蔣之竒復為轉運乞此詩甘露寺多景樓三四語自佳彭城道中彭越未嘗至彭城項羽既破灌嬰攻下之耳韓彭遺壁冠荒墟吕梁洪上有雲夢梁王二城其旁之人以為雲夢即韓信城梁王即彭越城是也原注送程殿丞還朝次連未為佳句而當年喜之康定軍使髙祕丞自襄陽司農勾業寺丞自光化相繼云云業作葉更有南陽坐嘯名更作便雨中王駕部席上鳩鳴連日始成隂鳴作呼贈張伯常之郢云云更味陽春白雪篇語切故不嫌陳和鄭微之地秀偏宜竹秀宜二字可作亭子名和張伯常自郢中云云三四平語自佳峴山亭置酒春歸野路梅初白初作爭韓魏公挽歌詞第二首御筆新詩在新隴新詩作豐碑酬吳仲庶龍圖嵗春感懷春作暮陳君式恭軒次連不如腹連佳以白山茶寄吳仲庶見貺佳篇依韻和酬筠籠封題摘尚新摘作色玉蕊蕭條迹更塵塵作陳欲分芳種更無因更作恨落句用梅事須㸃破為佳酬江西運使蔣頴叔頴叔亦嘉祐三年進士故歐公有未乾薦禰之墨已彎射羿之弓云云刁景純挽歌詞文章十秩更傳誰秩作帙一㸃青燈照蕙帷蕙作繐逰東山示客柳黃微破日邊風日邊風三字有化工升山靈巖寺獨窺金版驚人語一作獨窺金版公作逰佛寺詩皆以仙山事發之非獨不信奉其法亦緣本謂之金仙不是杜撰作此語也上元人近朱䦨送目勞近律髓作倚子固亦為是語耶自笑玄心逐年少玄作低酬柳國博須知别後山城寺寺作守閏正月十一日吕殿丞寄新茶千金一跨過溪來跨作胯新舊書報京師盛聞治聲新作親蹇磻翁寄新茶二首肯分方跨醒衰思跨作胯城南二首第二首自訴窮途也夜出過利涉門紅紗籠竹過斜橋竹作燭過作照王虞部惠佳篇敘述云云更悟知他友最賢知作之似用孟子尹公他取友語可謂拙矣北歸三首頗似夢得過靈壁張氏園三首靈當作零宋史地理志云元祐元年始割虹之零壁鎮為縣其改為靈璧則在政和七年曽之作詩蘇之作記皆在未為縣之時不但零之為靈未改也雪亳州有為言之水深雪氛為小人故韓曽皆作風刺體繁英飛靣旋靣疑便然前古詩中已有用靣旋者逺氷落澗泉逺作還集賢殿春燕呈諸同舍賢作英上已日瑞聖園錫燕呈諸同舍流者浮金鑿落作流渚酒浮金鑿落失一酒字誤一渚字池上即席送况之赴宣城况字上有梁字趣駕追鎽自有期鎽作鋒義門讀書記卷四十

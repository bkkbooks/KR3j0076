body:
  text: 義門讀書記卷五十三翰林院侍讀學士何焯撰杜工部集冬日洛城北謁􅏏元皇帝廟廟有吳道子畫五聖圖發端四連直書即目葢有譏其不類之意不解其何故忽如此追崇也配極􅏏都閟城北碧瓦初寒外冬日仙李盤根大一連又叙明國家追崇之故猗蘭注謂以漢武比􅏏宗者非世家遺舊史一連言史家以為老聃或以為老萊子且不能定其人何所據而祖之道德付今王暗渡五聖或以為開元二十年置􅏏學之事亦非畫手看前軰一連先接吳生從容次第入今人手必即接五聖則吳生便無處安頓惟歎息畫手之妙則此舉之無取可以見矣翠柏深留景兩連又㸃綴冬日前半只有初寒二字一見也養拙更何鄉落句就洛陽推開一語作結注家以為有所刺者謬也以為有所刺亦得但如注則非言老子之道清浄無為當師其意徒侈其奉則吾知老子有靈方深潛逺引不之饗耳于體則黷于義則誣祖宗之失不能有改又加侈焉不顧天下之譏是唐之佞媚不如漢之善用其術逺矣鋪陳其事所以刺也贈韋左丞丈濟懇懇欵欵流轉如彈丸左轄頻虛位方云今布政司稱左轄非也楊鐵崖有送吕左轄詩保障東南第一功必元末詩人如此用起按元設行省平章則鐵崖未嘗誤用明之布政承元之制相沿稱之亦未有大謬家人憂几杖一連以卦名對干支投贈哥舒開府翰二十韻軒墀曽寵鶴一連軒鶴畋熊皆指翰言之只叙寵眷非有所譏六朝用事皆然注鑿策行遺戰伐一連方束得住勲業青𡨕上結上述德交親氣槩中起下陳情軍事留孫楚二句謂文武惟所驅策耳上韋左相二十韻見素沙汰江河濁四句望其稍稍改紀前政傳經固絶倫至風俗盡還淳非謂其子乃追叙其前所厯也聰明過管輅誠有如注家之說豈是池中物國忠訪于中書舍人竇華宋昱等華昱言見素方雅柔而易制故公以此語激其有為耳舊唐書言見素既為國忠引用無所是非署字而已才傑俱登用結上愚蒙但隱淪生下巫咸不可問公此詩中亦用巫咸字奉贈太常張卿二十韻均伶官詩必誦太常適越空顛躓以下自叙處如彈丸幾許曲折敬贈鄭諫議十韻起二語知名以詩不以官叙致敏妙築居仙縹緲言無定居也奉贈鮮于京兆二十韻侯伯知何等注等吳本刋作算言自以文章致身五等作筭者避下連等級字也義聲紛感激轉計疎疑翰墨轉二語婉約陰謀獨秉鈞謂李林甫贈特進汝陽王二十韻朝退若無憑猶言如失左右手精理通談笑結上忘形向友朋轉下何知對李膺言龍門不足言也鄭駙馬宅宴洞中長安志蓮花洞在神禾原即鄭駙馬之居所謂主家陰洞者也自是秦樓壓鄭谷言今日秦樓居然兼有隱居之勝當家舊事為之壓倒也重題鄭氏東亭在新安界通首暗藏一風字蒼隼䕶巢歸起晚字向晚尋征路收入翠微題張氏隱居二首張氏隱居在今兗州記其地多紫石英或後人因黄鶴注而附㑹更攷之春山無伴獨相求含下乘興伐木丁丁山更幽似用鳥啼山更幽澗道餘寒厯冰雪二句春猶冰雪幽深可知此二句獨相求也第二首霽潭鱣發發一聨物之得所如此真能隱者杜酒偏勞勸一連用兩當家事與首連對起相應淡朴中詩律精整前村山路險二句收留字毎字并對時字天寶初南曹小司宼舅于我太夫人堂下累土為山一匱盈尺云云方云員外郎為尚書侍郎之貳故稱小今郎署云分司亦其義也按員外郎乃散郎安得即貳尚書侍郎乎小司㓂乃比部郎中之類望中疑在野一連題中塵外數致惟南將獻壽顧太夫人與任城許主簿遊南池真如畫菱熟經時雨頂水盛蒲荒八月天頂候凉菱熟當八月天蒲荒為經時雨兩句互文見意對法奇變晨朝降白露從上句帶下正收足南池之遊爽氣沁人肌骨也遥憶舊青氊公父為兗州任城屬兗落句兼寓兒童舊遊意登兗州城樓突過乃祖登襄陽城作東郡趨庭日隋煬帝大業二年以東郡為兗州即故滑縣乃在白馬今之滑縣也唐改郡為州而州下復係郡名地理志書兗州魯郡即今之兗州府起句于先後沿革兩無所据南樓縱目初先破樓字留登字作結浮雲連海岱一連縱目也平野入青徐按魯郡于禹貢為徐州之域非古兗州地此句亦詩人一時假借耳孤嶂秦碑在一連含下古意中四句先逺後近毎一連又上句山川下句都邑從來多古意二句思以述作繼之也秦碑嘉頌未厠從臣之列魯殿諷賦適當省覲之時所為懐古躊躇者乎劉九法曹鄭瑕邱石門宴集掾曹乘逸興指劉能吏逢聨璧指鄭對雨書懐走邀許十一簿公驟雨落河魚方云雨細則魚在水面雨驟則沉對細雨魚兒出看方知其妙已上人茅齋枕簟入林僻一連是北方夏日真景天棘夢青絲夢當作蔓葉石林引佛書以為夢字之證雖有據而不成文理空忝許詢軰二句馮云六朝結法房兵曹胡馬詩鋒稜瘦骨成相士失之貧相馬失之瘦所向無空濶言瞬息萬里不更有空濶也含下可字真堪託死生楊云無空濶馬之力託死生馬之德驍騰有如此二句方云末句歸美兵曹言有此馬可横行萬里矣畫鷹側目似愁胡方云孫楚鷹賦為言不知狀似愁胡按魯靈光賦胡人遥集于上楹仡欺􅓥以雕􅀈狀若悲愁于危處注欺􅓥大首也雕􅀈如雕之視也何當擊凡鳥二句反醒畫字兜裹超脫臨邑舍弟書至苦雨黄河泛溢隄防之患簿領所憂因寄此詩用寛其意倚頼天涯釣二句結是寛其意夜宴左氏莊月落露滋夜轉深矣星殘燭炧將達曙矣鳴琹檢書說劍賦詩所以終夜引盃賔主不厭倦也舊遊因此不忘况茲夕有不往來于懐者乎暗水流花徑入夜羣動俱息乃聞暗水此句最妙看劍引盃長題是夜宴故以引盃總上言之詩罷聞吳詠二句翻疑柁樓厎晚飯越中行詩罷聞吳詠扁舟意不忘皆壯遊詩之明證也送蔡希曽都尉還隴右因寄髙三十五書記時哥舒入奏勒蔡子先歸上公猶寵錫指翰留突將且前驅指蔡行因君問消息寄髙也春日憶李白清新庾開府一聨承無敵渭北春天樹四句春日憶贈陳二補闕自到青𡨕裏言自然不汨沒也寄髙三十五書記適自然不可移掇他人歎息髙生老二句達夫五十稱詩主將收才子二句從軍感激詩境日新自足佳句也聞君已朱紱二句縁此老得一官雖居幕府未能發抒其雄心猛氣然視我猶粗慰也送裴二虬作尉永嘉以江中孤嶼詩發端即起第六故人官就此含吏隱絶境興誰同開後三句吏隱同梅福裴二遊山憶謝公永嘉通首轉掣如龍城西陂泛舟此篇似齊梁體春風自信牙檣動往也遲日徐看錦䌫牽來也不有小舟能盪漿并收足逺字意并無輕風生浪水影揺扇細似魚吹亦非風飄萬㸃花片綴筵飛隨燕蹴極寫熈春媚景澄波綺席之趣結句却借小舟反映樓舩補寫一叚餘興逺天遲日不醉無歸妙用反筆更揺曳多姿也贈田九判官梁邱崆峒使節上青霄先叙迎虜得體河隴降王欵聖朝時吐渾谷欵塞詔遣哥舒翰迎之宛馬總肥春苜蓿一聨言雜虜方盛非翰一人所辦次聨是危詞非叠發端致頌也如俗人解則屬死句更逼不起後半矣陳留阮瑀誰争長一連虛實對麾下頼君才並入二句言梁邱早在幕府當招合羣策致之麾下未容以漁樵遺我也贈獻納使起居田舍人澄中二聨極寫地分清切見其得以薦士進賢以興至治使其主可以追踪帝王也白雲篇謂御製詩賦末二句收到自己言如揚雄所云乃不負獻納臣也送韋書記赴安西白頭無籍在名不挂朝籍也陪鄭廣文遊何將軍山林十首不識南塘路二句反對舊字已藏陪鄭并含遥字名園依緑水寫其曠野竹上青霄寫其奥一望水竹便可經夏忘暑二句牢籠中八首方云馬上望中大略濠梁同見招陪字第二首初至絶境百頃風潭上頂依緑水卑枝低結子一連頂夏木卑枝接葉叠韻對叠韻鮮鯽銀絲鱠一連頂風潭翻疑柁樓厎二句是初至恍惚意象所謂濠濮間想也第三首復見異花萬里戎王子六句無所不有真名園矣異花開絶域初入則夏木千重注視復異花獨發露翻兼雨打㸃夏意絶域異花視若凡卉任其露翻雨打則此園無一非嘉花珍樹可見矣注謂寵任蕃將迂鑿不倫第四首旁舍連髙竹旁舍含東家髙竹顧第一首疎籬帶晚花晚花顧第二首旁舍疎籬迤行所漸見也藤蔓曲藏蛇藏一作垂按垂字佳乃借對也山林跡未賒雖托旁舍猶堪投老則山林之勝可知也第五首剰水滄江破一連殘山剰水厯覽所細賞也言不惟全景即拳石勺水亦居然有萬里之勢緑垂風折笋一連園中時物漸變也銀甲彈筝用一連好洽而佳伎出酒盡而金魚典始縁陪鄭今漸相得矣興移無洒掃二句遊迹無不到也竹林果園興到即移列坐竟醉矣第六首風磴吹陰雪一連飛瀑奔流自髙來㑹此風潭百頃之源也雪者瀑之狀倒裝句并已起次連醒字冷字酒醒思卧簟一連因冷而醒又倒裝也只疑淳朴處二句因其氣象淳朴不覺流連轉深開出下二首此篇反醒夏字此下三篇興極而步屐山林之外與前詩疎籬旁舍復相映帶第七首石林蟠水府二句定昆下赴蟠曲百里山林居其内宛在中坻也窮源逺覽自髙臨下則得此境矣幾于人踪所不到故上有野鶴山精之句清晨出者求食逺也楊云名園依緑水自外逺望也石林蟠水府自内縱覽也第八首憶過楊栁渚二句瀑泉怒吼石林矗立固定昆之委也昔年走馬詎知此中更有佳處耶醉把青荷葉所謂碧筒也坐對秦山晚二句二句與翻疑柁樓厎晚飯越中行因山林而觸撥平生幽興也第九首此獨專寫夜牀上書連屋先起三四階前樹拂雲起風字仍不脫山林將軍不好武一連非賢主人則嘯咏徑出矣不止游覧兼道文章所以不覺其久留也醒酒微風入起凉字已起感秋之意絺衣挂蘿薜二句凉月紛紛絺衣將換經夏涉秋故迫于歸期也第十首人或與爾止書云幽意云云兩句突兀而起即兩句截斷云出門云云此一轉勢也次一轉云自笑云云又一轉云祗應云云八句之内勢變多端尺寸之間移形換步所謂波瀾獨老成也此老不容易放筆如此幽意忽不愜四句幽意應幽期自為歸期所迫而將軍之愛客可以相過百遍故出門迴首戀戀為後期也須溪云水自無住但出何氏山林便覺景别如此最是妙意祗應與朋好二句收陪字重過何氏五首問訊東橋竹第五橋野竹也花妥鸎捎蜨一連乃自室中遥望逺聞之景第二首犬迎曽宿客頂上榻鴉䕶落巢兒頂上雨雲薄翠微寺四句翠微寺黄子陂猶嘗過東籬而極幽興况此地肯為風雨阻乎向來二字與仍在未移呼應步屣注一作屐屐字佳方透得極字出第三首翡翠鳴衣桁衣桁之上鳴鳥狎至極狀幽意自今幽興熟向來自今呼應又轉一層來往亦無期顧問訊報書第四首頗怪朝參懶二句從休沐生下總不直下手自移蒲栁一聨句中有躭字長字移蒲栁言一草一木皆其胸次邱壑足稻粱賦其不貪言外則羡其無所求于世也與下買田相對第五首到此應常宿二句與前吾廬句瀠抱蹉跎暮容色以下前遊已去而低徊後遊未别而惆悵至于歎羡無計則追憶不置無待言矣此變化淺深之妙也何路霑微禄四句將軍猶躭野趣而懶朝老我反違斯遊而求禄買田不遂羡之真如在羲皇以上也求禄無路豈但買田計未成飢來驅人即斯遊詎可常得來往無期不易有此閒嵗月故為之茫然三歎也杜位宅守嵗盍簪喧櫪馬虞翻豫九四注云盍聚也簪舊讀作攢作宗公正用之義取宗族聚㑹耳紀聞云云恐未必然四十明朝過一連虛谷云四與十對飛與騰對飛騰暮景斜言即使飛騰已暮景也阿戎或引南史齊王思逺小字此胡儼語通鑑注云六朝人多呼從弟為阿戎與鄠縣源大少府宴渼陂飯抄雲子白馮云佛經以稻為雲子九日楊奉先㑹白水崔明府今日潘懐縣指楊同時陸浚儀指崔此篇了無意咮不知補之何意取之贈翰林張四學士賦詩拾翠殿拾與十杜白詩中平聲讀陪諸貴公子丈八溝携伎納凉晚際遇雨二首發端便已激射遇雨片雲頭上黒并藏風字應是雨催詩携伎納凉忽遇風雨大裂風景矣却云催詩興㑹轉勝第二首䌫侵隄栁繫反映放字幔宛浪花浮宛一作卷有死生之判歸路翻蕭颯二句言處處生凉何待丈八溝逺汎非敗意語也魏文帝詩秋風蕭颯天氣凉白水明府舅宅喜雨曲折包括碧山晴又濕又字暗包從前已雨接出偏字反對旱甚使上下兩連喜字無不有力白水雨偏多借白水二字妙今日醉弦歌收政如此久旱因明府至禱而得雨故弦歌美政古人莫過喜其行動神明也贈比部蕭郎中十兄甫從姑子也後半勝漂蕩雲天濶兩連激昻頓挫九日曲江綴席茱萸好九日浮舟菡萏衰曲江荆門此路疑荆門未詳承沈八丈東美除膳部員外阻雨未遂馳賀奉寄此詩公自注府掾四人同日拜郎儒門舊史長東美佺期之子佺期世推史庫注家不之及奉留贈集賢院崔于二學士氣衝星象表二句三賦儒術誠難起一連曲折激昻欲整還鄉斾以下結甚𦂳不恨其平稍冗便弱通篇一氣屈注極為豪宕故武衛將軍挽歌三首三篇惜不知所挽為誰殆當開元之初乎第二首鳴弓射獸能射獸用李廣事避唐諱耳赤羽千夫膳倒裝句横行沙漠外二句乘冰深入士不齎糧射獵以給故曰横行神速也次篇言人但見其晚年屏棄環衛格猛獸射入石相與稱歎不知其當年横行深入足稱飛將至今名動四夷也第三首部曲精仍銳部曲將校經其訓練猶足以制四夷况將軍之材武豈非人百其身者乎九日藍田崔氏莊前半跌宕曲折體勢最佳此在賊中作故尤悲凉非獨歎老而已羞將短髪還吹㡌一連㸃化九日故事仍雙闗悲歡非公無此神氣今人若一意扯作兩句索然無味矣古人命意髙愈覺䧺厚笑倩句頂盡歡藍水遠從千澗落一連陳先生云非但寫景以山水常在起人之常健也明年此㑹知誰健收老去醉把茱茰子細㸔收盡歡言茱茰猶恐不復重把手未肯釋安得不盡君一日之歡乎歡之盡正悲之深也崔氏東山草堂此篇自是一體有時自發鐘磬響一連從動處形容出静來猶云鳥鳴山更幽也盤剥白鴉谷口栗一連不食賊禄也柴門空閉好松筠松筠二字好諷刺見幾不先自墮嵗寒之節也落句謂有如王者有地可辟所惜去不早耳對雪此篇沒賊時作愁吟獨老翁獨老翁則所對無非盗賊小人矣瓢棄樽無緑一聨樽無酒爐無火對句變換巧妙愁坐正書空慘淡風雲㑹乘時各有人獨此老翁棄置不燃使衰亂之後小人縱其殘虐耶所書空者即此也月夜遥憐小兒女一連憶長安不正說却借兒女未解㸃出甚藴藉香霧雲鬟濕一連襯拓獨字逼起落句精神百倍轉變更竒雙照淚痕乾亂離方甚兒女尚小深閨間隔淚痕所以不乾也元日寄韋氏妺郎伯殊方鎮郎伯猶言兄公春望起連筆力千鈞國破山河在望字城春草木深㸃春字感時花濺淚收上恨别鳥驚心起下白頭搔更短二句感時心長恨别意短落句故置家言國也匡復無期趨朝望斷不知此身得睹司𨽻章服否只以不勝簪終之凄凉含蓄憶幼子字驥子時隔絶在鄜州驥子春猶隔猶字對後四句言之一冬愁憶不謂春深節換相隔如故故鶯歌正繁其愁不減于對空山老樹熈春日暖只如炙背愁睡也公詩多用倒叙尤覺曲折深苦一百五日夜對月與閨中獨看篇同趣皆没賊時作也牛女有期而我無期安得不淚如金波乎金波半為仙槎我則渾是淚耳仳離放紅繠二句是家中景牛女漫愁思合收喜達行在所三首從在路發端入達字始𦂳第二首始追叙墮賊中出喜字亦更有力西憶岐陽信行在所無人遂却回無人繼至遂復自行也眼穿當落日一連眼穿起下連望字心死終上連憶字為喜達作逺勢蓮峯望忽開入達字所親驚老痩反喜字辛苦賊中來辛苦二字上包眼穿心死下含愁思凄凉第二首愁思胡笳夕接上賊中來忽賊中忽行在筆勢出没無端生還今日事喜達間道暫時人含倒極司𨽻章初覩含中興南陽氣已新對凄凉喜心翻倒極出喜字第三首死去憑誰報二句接生還今日事來前此憶信不得何竟竟生達耶間道辛苦忽睹中興宜乎其喜有倍也猶瞻太白雪捻岐陽承蓮峯影静干官裏應眼穿心蘇七校前應心死司𨽻二句是喜行在之中興影静二句是喜身際中興次第賔主今朝漢社稷二句喜字足反覆頓挫喜字在中篇㸃出却仍不即正落留在第三篇作結得家書去憑遊客寄得字來厯來為附家書得字正面凉風新過雁映家書奉贈嚴八閣老王明清云蛟龍一連見晉書載記奉送郭中丞兼太僕卿充隴右節度使三十韻英乂舊注英乂𤓰州長樂人英乂父知運嘗鎮隴右鵰鶚乘時去安邊驊騮顧主鳴扈從艱難須上策包含後半篇意容易即前程先言隴右可無須郭之亟去斜日當軒蓋二句是送燕薊奔封豕八韻發艱難一連意幾時迴節鉞一連錢夕公曰細玩全詩之意蓋以英乂果决老成不用之畿輔之地而乃置之秦隴故曰幾時迴云云官雖尊用非其地也立言婉而有直體恥非齊說客至忍淚獨含情言不能如􅐱生之掉舌而下齊城故甘于在下如叔孫通之但進羣盜少年而後諸生也如我之腐儒衰晚則反可依公逺去耳送楊六判官使西蕃絶域遥懐怒言吐蕃來請討賊敕書憐贊普言天子許其和親子雲清自守一連雲日假對九萬一朝摶秋風海氣恰相映發月人但知望月憶家及期思代無必死之志亦念天子蒙塵于外宗廟宫室皆為賊據乎故干戈滿地而獨深悲于國西結壘之士也天上秋期近二句互文入河蟾不沒一連楊云承天上上句月之外下句月之内只益丹心苦一連楊云承人間上句内下句外秋期方近當行肅殺使干戈不再見深恐國西戰士但望月憶家故對月之時心益苦髪添白也明字人不能下與清字相關留别賈嚴二閣老兩院補闕一秋常苦雨顧須往山路時吹角顧戎馬晚行口號三川不可到起晚字落雁浮寒水一連興起䘮亂失所市朝遷變之意其言則直書即目也獨酌成詩酒渌正相親破獨字妙醉裏從為客兵戈逺客惟醉裏可度第三最妙兵戈猶在眼無可喜也儒術豈謀身言豈為身謀乎有可愧也共被微官縛二句既為官縛仍兵戈不能稍弭徒以髙歌深酌學野人之所為强用陶寫所以無可喜而獨居思愧也行次昭陵時公以廷争推問放還鄜州故有感于開國之納諫然而非為一身也明皇法神堯之内禪而肅宗不如太宗之幹蠱將何以復安率土使蒼生獲息此孤臣所以流恨于行邁之日耳䜟歸龍鳳質一連史記秦虎狼之國易一都字龍鳳之姿易一質字妙在各換一字此翦裁法天屬尊堯典謂内禪神功協禹謨謂頼太宗之克家也文物多師古四句非獨頌美太宗乃魏相之條故事肅宗非此不足以致中興故收處有寂寥流恨之歎往者灾猶降四句安溪先生云唐雖受命而武德之間亂猶未弭貞觀之初始致太平故曰灾猶降而喘未蘇承上疲庸主一叚說至于指揮盪滌則承上叚為用賢納諫之效也按此解最得本趣鐵馬汗常趨或引禄山事蹟云云為鐵當作石按馬汗猶朝享大明賦云弓劍皆鳴汗鑄金之風馬耳與上句皆是虚用見神靈常如在也必欲紐合附㑹胸中更著不得一故事矣松柏瞻虛殿行次塵沙立暝途言徘徊而不能去也重經昭陵此篇反覆感歎盪滌之功不能速奏無太宗之善繼也聖圖以下即北征結句之意太平可望惟恃此耳皆援開國以規切今日之聽陵寢盤空曲或引㑹要云云按自魏以後陵不立寢殿不造園邑此云寢因習俗之語連類及之再窺松柏路二句收重經喜聞官軍已臨賊㓂二十韻穴蟻欲何逃喜字五原空壁壘一連言垂克而敗今日看天意二句言偶爾失利非天之未定失利只虛影者内諱敗也元帥歸龍種廣平王司空握豹韜郭子儀前軍蘇武節二句蘇武節有必死之心吕䖍刀成破竹之勢蘇武為典屬國即唐之鴻臚士兼蕃漢也王濬為龍驤將軍治水軍師備兼水陸也戈鋋開雪色一連軍容益整天步艱方盡以下言方乘時進軍决勝也睿想丹墀近指元帥神行羽衛牢指諸將花門騰絶漠一連回鶻尤為賊所畏故獨提出言之喜覺都城動一連官軍初至清渠失利士女為之悲憤而奪氣已而回鶻空國助順賊欲奔亡人皆歌舞悲喜二字一賔一主包括前後只待獻春醪春字兼紀其時前半乃因官軍初至京師不利元帥以下又厯厯决其必滅收復之效功在漏刻以誌喜也當分兩層看收京三首聊飛燕將書燕將書似謂招諸畔將也若指哥舒翰以書招李光弼諸將恐非依然七廟略二句依然七廟者言明皇固在也孰謂暫爾西幸肅宗已自取之更與萬方初乎第二首天涯正寂寥承上萬方來羽翼懐商老二句父父子子而後君君臣臣此連言改紀從前亂政當以是為先也當時廣平王方收兩京而建寜王已為張良娣李輔國所讒而歸死李泌來獻捷即引黄臺之詞以為前戒羽翼句葢指此也叨逢罪已日二句上皇在蜀先脩青宫羽翼之功則兩宫相見如韋妃前事者殊足黙傷乃父隱衷况罪已當出上皇之誥今肅宗為之是暴父之失明已之功此詔豈所以示萬古乎第三首汗馬收宫闕二句末首始破出收京刺僅保宫闕更無逺略收京即志滿政怠闗門之外更不問也賞應歌杖杜出車以勞還率杖杜以勞還役言當遍圖士卒之功也萬方頻送喜言不止收京無乃聖躬勞即大夫夙退無使君勞之意前四句言當念收京之難以從前七廟灰燼為鍳後四句言收京之後回鶻之欲無厭功臣皆有生之樂無死之心隱憂方大平吳之後更勞聖慮不謂已君臣泄泄如後世所謂恐聖人心困也紫宸殿退朝口號如畫宣政是正衙紫宸是便殿故二詩不同戸外昭容紫袖垂二句惟御便殿故有宫人垂帛引百僚之事花覆千官淑景移已起退字宫中毎出歸東省退朝曲江二首一片花飛減却春四句方云先追說花飛一句初飛二句亂飛三句飛將盡已飛一片旋飄萬㸃俄而欲盡所謂暫時相賞也自初飛以至欲盡無不經眼所謂日盡醉莫相違也江上小堂巢翡翠二句言但見翡翠成巢一春易過不思麒麟列塜一生復易過乎然則何為不亟行樂乎曲江南苑夾城綵仗所在轉眼而將相之華屋野鳥巢其中苑旁之宫堧髙塜起其側國家盛衰變幻不常如此况區區浮名何為受其絆繫不及時為樂耶細推物理須行樂物理即江上二句第二首酒債尋常行處有二句必為浮名所絆待七十致仕則行樂終無時矣尋常七十以度數借對穿花蛺蜨深深見方云殘春花已殘故用深深㸃水蜻蜓欵欵飛方云初夏水已滿故用欵欵傳語風光共流轉二句蛺蝶戀花蜻蜓帖水我于風光亦復然也却反傳語風光勸其共我流轉杜語妙多如此上篇前四句下篇後四句總極言流轉之速嵗月不可絆行樂乃為浮名絆則是與風光交臂失之也曲江對酒苑外江頭坐不歸虛含對酒水晶春殿轉霏微苑外也顧云宫殿本如水晶映徹而公久坐于此酒意漸迷望之皆霏微莫辨矣桃花細逐楊花落一連逐字兼字亦有霏微莫辨之意黄鳥句切江頭縱飲久判人共棄始出題嬾朝真與世相違方云頂坐不歸吏情更覺滄洲逺反映曲江老大悲傷未拂衣更縱言之曲江對雨江亭晚色静年芳起風雨龍武新軍深駐輦四句歎其非復太平之舊且不必遽謂其父子間有所嫌猜也奉和賈至舍人早朝大明宫舍人先世嘗掌絲綸五夜漏聲催曉箭早字九重春色醉仙桃襯出早字唐時宫殿皆植花栁此句以比主恩優厚近臣皆欣欣向榮也旌旗日暖龍蛇動二句日暖二字又不脫春日以旌旗起宫殿亦本言觀其旂也以上四句將早朝打叠後半詳叙和賈較之王岑綽有餘裕此筆力之髙朝罷香烟擕滿袖舍人立朝班欲知世掌絲綸美二句他人但切舍人此更切賈宣政殿退朝晚出左掖方云全首趨到晚出予謂前半自寫退朝也第五失粘春殿晴曛赤羽旗宣政侍臣緩步歸青𤨏左掖退食從容出每遲退字晚字一句結出題省中院壁腹聨的是禁署春宿左省花隱掖垣暮花隱切春掖垣切左省星臨萬戸動一連因左省所見景物興起言不容緩之意星動者國亂而民勞也月多者陽微而陰盛也皆當急思補袞職之闕矣不寢聽金鑰含夜如何因風想玉珂金鑰自内出玉珂自外入數問夜如何夜如何者王有鷄人之官凡國事為期則告之以時我為兩省近臣以言為責豈可視王之自勤而不知所從乎問夜而興庶幾致主中興居周宣庭燎之右也送翰林張司馬南海勒碑相國製文文章落上台指相國不知滄海上二句落句㸃化乘槎事切張司馬晚出左掖晝刻傳呼淺淺字未喻傳呼謂喚仗由閤門而入春旗簇仗齊紫宸奏事也退朝花底散頂春字歸院栁邊迷切左掖樓雪融城濕切春字宫雲去殿低切晚字呼應迷字騎馬欲鷄棲拈出字足晚字曲江陪鄭八丈南史飲自知白髪非春事一聨與九日藍田詩意同而彼作首連更有力送賈閤老出汝州兩省自此無人矣起句藴藉西掖梧桐樹二句惜之也梧桐在而鳳去矣破出字髙妙去住損春心去者賈住者我也宫殿青門隔閤老青門青瑣門也雲山紫邏深汝州九域圖汝州有紫邏山人生五馬貴二句寛之也鄭駙馬池臺喜遇鄭廣文同飲不謂生戎馬謂當此戎馬而猶得生存也重對秦簫發二句指鄭駙馬池臺送鄭十八䖍貶台州司戸傷其臨老陷賊之故闕為面别情見于詩鄭公樗散髩成絲二句發端見與曽受國家曠恩美仕者異端午日賜衣宫衣亦有名有名即所謂自天題處濕衣有賜杜甫字也細葛含風軟一連藏一清字意内稱長短二句稱字本用去聲義古人通押法也長短恰稱聖情乃如臣意恩榮自天真無涯也贈畢四飢寒奴僕賤一連飢寒卑賤迫促成翁所謂惟憂用老也流傳江鮑體二句上句應詩伯言或後人有得志者若吾生固長貧苦卑矣贈畢葢以自歎只用相顧二字結出更無痕迹奉贈王中允維心雖可原迹固難解後四句諷刺嗟惜俱備因許八奉寄江寧旻上人碁局動隨尋澗竹一連上句杜尋旻下句旻尋杜二句即三十年舊來好事光景也聞君話我為官在因許三十年相隔只訪死生存没耳一在字收轉淚潺湲意足頭白昏昏只醉眠頭白切三十年與老去對照誰與傳又與因許八對照只醉眠言不復能好事如舊矣此淚與俱也至德二載甫自京金光門出問道歸鳳翔乾元初從左拾遺移華州椽與親故别因出此門有悲往事不無少望然淡淡直叙怨而不怒諷刺體之聖也此道昔歸順金光門近得歸京邑四句一句一層轉折事不可解惟有自傷而已末則仍歸于不忍忘君所以為公歟寄髙三十五詹事適安稳髙詹事時髙以被讒分司故云兵戈久索居久字起嵗晚直貫注過半百嵗晚莫情疎莫字作或字解兵戈年長非頻仍寄書何由知其存没為爾憒憒安穩否耶抑宦途轗軻不暇及此而相疎耶前四句皆驚疑不定之詞天上多鴻雁一連言不可謂兵戈之故乏信將命也路逢襄陽楊少府入城戲呈楊員外綰寄語楊員外不屬意少府故寄語句直起兼將老藤杖二句更轉一層反映少字題鄭縣亭子更欲題詩滿青竹二句㸃題字别轉一層憑髙愈收得足望岳方云無一句移得岱宗嵩衡安得仙人九節杖望中已含尋字車箱入谷無歸路一連頂諸峯自髙而下從逺望之歸路反為岩崖塞斷也無歸路有一門一重一掩或暗或明方是處下窺髙真景上承到字下起尋字亦非常生動方云五六即將望中作一轉髙尋白帝問真源髙字竦字既相應尊字亦對白帝字至日遣興奉寄北省舊閤老兩院故人二首尚書省謂之北省題曰遣興句句是不能遣腸一日而九廻愁與日而俱永因令節而觸撥尤甚耳欲知趨走傷心地不能遣處正想氛氲滿眼香寒雲白滿山非是物也無路從容陪笑語指兩院故人有時顛倒着衣裳用三百篇體于律詩中何人錯認窮愁日二句錯認即下雲氣雖欲錯認得乎言我如此望帝闕而思故人不知故人亦有錯憶及我否我真愁隨日長不可掇也第二首上篇曰入鵷行未視朝時也下篇班齊之候曰侍龍顔則君在也去年今日侍龍顔重言之所謂趨走傷心地也玉几由來天北極一連此中獨少孤臣也孤臣此日堪腸斷不能遣愁對寒雲雪滿山前虛含此㸃破雲氣爐烟互映作收得弟消息二首血淚所結寫倣其面即鈍賊矣第二首生理何顔面一連至于顔面不顧而仍未必可延嵗時甚矣可悲也且嵗時與招得幾時魂應得舍弟消息此等詩自不可規橅前半三折亂後誰歸得二句起是倒裝他鄉豈勝故鄉只亂後無一人能歸耳舊犬知愁恨二句言汝妾乃不如犬秦州雜詩二十首遲廻度隴怯遲廻伏淹留度隴伏烽火水落魚龍夜一連茫茫奔竄如魚龍之失所碌碌因人等鳥䑕之同穴借山川㸃化尚書春言日秋言夜夜亦秋也變文屬對見滿目無非兵象起下烽火句言秦州仍不可久留耳注家引水經注魚龍以秋日為夜非詩人本意以此證用字之穩則得之第二首清渭無情極言一身不能隨渭水而東故反怨其無情也第三首胡舞白題斜白題從舊注引南史裴子野語然作蹄亦得詩有豕白蹢箋四蹄皆白曰駭白蹄尤其躁疾者喻荆舒之人勇悍捷敏其君猶白蹄之豕也正與駭字相類暗用馬與豕對也第四首抱葉寒蟬静一聨寒蟬静不敢言也獨鳥遲不敢息也故下有何之句腹連自比第五首聞說真龍種一連此歎時危市駿獨在所遺老棄遐荒也第六首旌疎鳥獸稀注旌一作林按旌謂使旌也旌疎有搜抉之迹然自屬佳句自齊梁出林疎鳥獸稀言不但轉餉艱難即行圍亦鮮所得起下往來者將何堪也那聞往來戍二句言河隴已没抽兵防河不復往來番戍所畏内憂方急僅以解鄴縣之圍并無暇東赴滄海郡也第七首此歎吐蕃日迫秦州方陷没為憂使車由此者徒貽張勝之累莫奏義陽之績烟塵何計可息也莽莽萬重山含獨長望第八首此言昔人尚能鑿空逺略今㓂在門庭腹心未有平定之期為可歎耳第九首思返近郊而不得無聊反言也今日明人眼妙起臨池好驛亭此起若施之内地即一字不通人第十一首蕭蕭古塞冷起變第十二首清渠一邑傳傳流傳也傳送也秋花危石底一連予嘗入泉林壽聖寺親見此景乃歎為工第十三首傳道東柯谷伏相報痩地翻宜粟一連張籍賈島宗祖也第十六首東柯好崖谷至採藥吾將老言若得居東柯便遂疎嬾之性吾將老焉何須鑷髩毛斑乎落日邀雙鳥一聨落日歸翼方擬迅飛崖谷迴碍若邀留不遣也一作谷中易暗日纔落而鳥已栖若邀之也晴天無雲而養片雲于谷中則崖谷之深峻可知矣山澤多藏蓄山川出雲皆合養字之義似新實穩兒童未遣聞兒童不知亂靡有定日夜思返聞此則舉室悲歎徒亂人意也第十七首鸕鷀窺淺井西邊土厚水深陰久井溢反若其淺矣窺淺井井中皆生魚也第十八首塞雲多斷續一連貼秋又形容得髙字出邊日少光輝驚人語警急烽常報四句所謂聞烽火而此淹留也第十九首故老思飛將二句國家得復經略安西則河北之平可知矣第二十首曬藥能無婦二句應發端悲生事為報鴛行舊二句應此淹留歎當時同在兩省者竟任一老之播棄也月夜憶舍弟秦州作時公之三弟在許徐二州戍鼔斷人行興未休兵秋邊一雁聲興寄書月是故鄉明㸃化隔千里兮共明月家人皆不在側獨月色與故鄉同耳有弟皆分散二句正捻憶弟宿贊公房京中大雲寺主謫此安置湘靈刪當以其無據隴月向人圓應來此東樓師徒撓敗鼔角戰塵内侵日偪無他方略但厚遇其使如奉驕子耳雨晴天水秋雲薄從注洪氏隨筆作天永勝水字逺矣寓目秦州詩山寺秦州詩麝香眠石竹一連頂山園麝以香賊鸚鵡以言囚自非遥岑絶磴人迹不到之地安得眠食遂性耶此亦所謂意外之巧也次連寫凄寂之景如此細麗真小庾嗣音也亂石通人過頂細路懸崖置屋牢顧髙字上方重閣晚就髙字收轉百里見秋毫并收野字上六句皆細寫結忽拓開然云見愁毫仍歸于細先着晚字然後折出見秋毫更不直即事和親事却非和親本冀以紓國難豈知公主復歸羣凶猶熾至是始悟其非不已徒貽社稷之恥乎人憐漢公主二句不追論和親之非仍以公主生還為已功大臣無恥誤國可戒可怒故反覆責之遣懐厯亂無端全似風騷豈得以起承轉合求之夜來歸鳥盡夜來即謂此日之夜玩全篇曰霜露自春而秋也曰日斜自朝至暮也無時不悲無計可遣失栖之鴉無家之客悲啼清淚那得不盈睫乎天河句句比興偏字字着題常時任顯晦二句一起便是天河暗寓亂世識忠臣也縱被浮雲掩一連是河不是星月含星動雙闕一連頂出永夜中四句有一老杜小影在内牛女年年渡二句刺先據要津之人不已容也初月微升古塞外一聨頂影斜河漢不改色頂光細闗山空自寒用闗山月與河漢屬對新庭前有白露二句本詩零露團兮後四句承隱字皆以甲夜即無月反襯初字歸春色豈相訪方云預望其來所謂社日逺看人是相訪也春色句是生生世世反對霜雪衆雛還識機衆雛句是子子孫孫反對儔侣稀篇中豈字還字儻字㑹字愈活愈醒擣衣如泣如訢前四語俱在題前落脉一寄塞垣深深字能與不返二字呼應促織草根吟不穩頂哀音兼微細久客得無淚頂動人故妻難及晨猶言秋天不肯明也悲絲與急管二句亦顧起二句螢火刺詩仍帶憫惜故味長起四句四折幸因腐草出楊云起句暗㸃螢敢近太陽飛次句反㸃火未足臨書卷實事翻用隨風隔幔小一連先寫出一層飄零十月清霜重二句結更轉得有力何處歸與上㸃衣隔幔傍林層層呼應蒹葭體弱春甲早古人入聲字收入平上去三聲如甲字自可作平聲讀也道昇先生之論如此然亦有上去作平者苦竹味苦夏蟲避頂守字叢卑春鳥疑頂弱字除架公自注𤓰架也束薪已零落自稀以至于除寒事今牢落二句落句直言曽不如秋蟲暮雀猶知懐舊也因除架悟人生消息之理有初必終不必說盡秋笛後四句忽然轉折非此老筆力其誰敢為送逺定翁云末二句未喻按江淹詩送君如昨日簷前露已團觀兵李泌請命郭子儀並塞北出直搗范陽公持論與之暗合落句即李愬取蔡之策天末懐李白悃欵落句疑白已死地下當與三閭相贈答也魑魅喜人過嵇叔夜恥與魑魅争光此句指與白争進者言之鬼神忌才喜伺過失古人四聲多轉借用之非過從之過也此解出安溪先生最有意味葢以比惡俊異訾文雅之徒獨立水鳥猶慮搏擊微蟲尚有網羅况人事有甚于此者乎空囊翠柏苦猶食古人有食柏而體生毛羽者翠柏句與下無衣對吾道屬艱難謂必擇所依也蕃劍又非珠玉裝妙在此句呼得氣字身字起虎氣必騰上一連夕公云虎邱嘗有劍氣狀如虎延平津劍躍化為龍銅瓶容齋極稱其曲折宛轉細讀果是異人百丈有哀音從深字生來無中生有更入神也側想美人意此句追想走向活路便空濶詩須如此脫化猶得折黄金得失二字照應井廢殿摧人往銅瓶反因失水幸在治亂得失意外相反重㫖隱躍觀安西兵過赴闗中待命二首用意始如神謂因材駕馭老馬不遺知道之能飢鷹不成飽颺之患則人人可以臨危授命風塵不足静也安溪先生云老馬夜知道者經多而熟也蒼鷹秋著人者時至而厲也臨危即用蒼鷹意久戰則用老馬意兼此二者用意始能如神葢練事明而决機速兵家之要盡于此矣第二首心肝奉至尊語不可學竟日留歡樂二句待命此即之子于征有聞無聲之意送人從軍秦州詩野望葉已稀而風更勁則望中彌曠日沉而山勢加長則層層陰晦中四句皆承發端二句而又次第相生自逺而近也葉稀風更落含林字山迥日初沉含晚字示姪佐佐草堂在東柯谷滿谷山雲起一連承茆屋趣谷中雲滿澗瀑忽懸深山絶壑陰晴互異句法為有神也從人覔小胡孫許寄如何措筆乃爾藴藉人說南州路覓字已藏許字為寄小如拳逐字位置童稚捧應癲反駭字并應小字秋日阮隱居致薤三十束字字精到畦蔬繞舍秋先位置此句妙即帶出秋日盈筐承露薤盈筐三十束也承露藏秋字不待致書求致字從對面反出束比青蒭色出束字衰年闗鬲冷二句并及情味楊明逺作扁豆五言古詩長篇予謂當檢本草并以性味之良作一連或頗嗤之試看老杜于八句内尚不遺漏也秦州見勅目薛三據授司議郎畢四曜除監察與二子有故逺喜遷官兼述索居凡三十韻此篇叚落尚未詳獨慙投漢閣一連公之自責如此于摩詰廣文有恕詞焉可謂忠厚之至宫臣仍㸃染指司議柱史正零丁指監察喚人看騕褭方于上句上分謂喚人以下乃公自喻今從之旅泊窮清渭指索居隴俗輕鸚鵡自謂原情類鶺鴒指二子秋風動闗塞指索居髙卧想儀形喜遷寄彭州髙三十五使君適虢州岑二十七長史參三十韻時患瘧病前賢命可傷此句以寓今我獨凄凉也諸侯非棄擲指髙使君半刺已翺翔岑為長史故曰半刺客子鬥身强注鬥一作問當是聞字之誤白詩中用之最熟羇旅推賢聖用仲尼旅人有靦屢新粧有靦句似指避鬼而復屢至即上所謂不銷亡也趙與時賔退録所謂不惟避之而且塗抺其面盡室在邊疆秦州荆玉簪頭冷指岑巴牋染翰光指髙更得清新否可見清新二字詩家最上一乘法具此矣寄岳州賈司馬六丈巴州嚴八使君兩閣老五十韻元白代書百韻之祖討胡愁李廣謂老將數奇無功也奉使待張騫謂未有囬鶻之助也虛修水戰船謂昆明池落賊中也蒼茫城七十謂君出走流落劍三千謂陵被發用魚腸之劍三千畫角吹秦晉晉注一作塞秦塞謂桃林之塞賊自潼闗入也諱兩都連破但舉近郊言之花動朱樓雪二句含下霽景衣冠心慘愴二句含下悲風四句言雖宇宙重開然收京非可賀之事如此立言乃為得體宫莎軟勝綿注莎刋作花按宫莎出入所踐也花字不通舊好腸堪斷一連綰上起下翠乾危棧竹指巴紅膩小湖蓮指岳朱絲有斷絃此用直如弦死道邊也地僻昏炎瘴指岳山稠隘石泉指巴典郡終微眇指嚴使君治中實棄捐指賈司馬去去才難得一連轉接渾化他鄉饒夢寐一連綰合寄張十二山人彪三十韻曹植休前軰頂上詩興張芝更後身頂上草書世祖修髙廟一連按此借漢晉以為喻而宗廟之焚燬闕廷之匡復盡于十字中矣叙事簡妙若此真攢簇五行手也商山猶入楚一連招隱亦何藴藉存想青龍秘三韻當天翻地覆之時畊岩結草想青龍而騎白鶴静者之妙如此此數句隱顯映帶其妙處未易名言亦可以悟作律之法鼔角凌天籟分外清新闗山信月輪方與山人相闗寄李十二白二十韻筆落驚風雨一連非此頂仙人不出未負幽棲志一連闗照前後事蘇武先還漢句未詳莫怪恩波隔二句落句反用天不可問之意此篇不獨惜其才且為白其節古人厚於友朋如此義門讀書記卷五十三

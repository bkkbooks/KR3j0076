body:
  text: 義門讀書記卷三十二翰林院侍讀學士何焯撰昌黎集書序重答張籍書其原出于孟子此是初識張籍時時年三十許耳此時盛尊揚雄其後謂其大醇小疵則退之之學進矣末年乃謂軻之死不得其傳及答孟簡書中不數况雄諸子又一詣也昔者聖人之作春秋也至書於吾何有此段言著書闢佛恐有患害吾豈敢昌言排之哉一層不敢為書下乃公卿輔相句法夫子聖人也至故余所以不敢也二段言著書之難向使獨言之而獨書之二句二層言書非獨為所能傳非所以朝令而夕禁也三層言不可以易為及乎夫子未久也對六百餘年其為也易三句即帶轉上三層然觀古人得其時至而行乎後世者也此轉筆力尤曲折馳騁今吾之得吾志至吾子何戚戚于吾所為哉此段言書可以不必著俟五六十為之未失也四層即為書亦不必遽其行道其為書其化今其傳後必有在矣激昂末後二段俱穿入道字應前可至于道句答竇秀才書其誠有志于道者耶抑其名也故姑為是言以謝之上李尚書書促促少味賀徐州張僕射白兔狀唐人好言祥瑞類表中若此者多不足為公稱也答尉遲生書固非公不能言體不備四句兼及其外若獨有愛於是至末結得淡宕至鄧州北寄上襄陽于相公書苻載寄于尚書書云恭覩製作約數十篇高格侔山嶽迅勢擬波濤邁氣薄雲霄逺思躡鴛鴻當世翰墨都無此手臟腑恍恍至今悸動斯可謂煥乎文章也其造語去公逺矣孰謂少有慚者遂非越俗耶然且云爾者至不為僭越也言外有裁之之意贊王公之能以下兜轉前半仍渾然不露上宰相書為宰相者各宜書一通於座右未可以後進求知常語視之也須具絶大心胸讀之此中真有海涵地負之勢其文溫醇有涵養深粹之功樂育材也此樂字下之所以為心君子之于人也既長育之至而于其才無所遺焉總收上數章詩意樂得天下英才而教育之此樂字上之所以為心此皆聖人賢士之所極言至論古今之所宜法者也總收詩孟子然則孰能長育天下之人材四句又總承詩孟子兩段引已意秦漢以來廟堂久不聞此高言錢榖甲兵之問不至於廟堂不似德宗時論道經邦之暇二句援經術陳世事自然正大剴切今有人生二十八年矣至教育之使成材其亦可矣此層應上長育抑邪與正二句抑邪承楊墨釋老與正承聖人之道妖淫諛佞譸張之説妖淫對怪竒諛佞對感激譸張對怨懟四舉于禮部乃一得子厚亦自云四進而後獲九品之位其可望二句轉移無迹一夫不獲其所對微草洪範曰凡厥庶民至是皆與善之辭也此層應爵命寵貴之即長育之實也從諸經相表裏處推明職分當為之實乃非徒攀援求進也抑又聞古之人有自進者四句此一引更密自進對往告不逆對長育抑又聞上之設官制祿至以濟其不足者耳將往告一靣義理説得光明俊偉惟公可以無慙此言已之所餘本上積二十年之所學然則上之于求人二句求人是樂得英才求位是樂育才不必讓其自舉也讓責讓也抑又聞上之化下得其道至于于焉而來矣此應浮沉皆載于才無所遺焉乃長育之所施及也以沉者况遺逸之士固自以其身不能與時從順俯仰故甘心自絶而不悔焉朱子亦謂隱者皆帶性負氣之人而方聞國家之仕進者至然後得從下士之列即鎖第一段雖有化俗之方安邊之畫推有餘濟不足之意今若聞有以書進宰相而求仕者宰相不辱焉而薦之天子而爵命之即鎖第二段必且洋洋焉動其心是心美之考古君子相其君之道收上之道庶天下之行道者知所歸焉收下之道併推有餘濟不足等語後十九日復上書文勢如奔湍激箭所謂情隘詞蹙也與第一書氣貌迥異故是神竒以求畢其説就前書不獲其所意更切望之十有九日不得命則宰相之不能及逺可見故不復及山林遺逸之云也其勢誠急二句上句束求者下句束救者愈之強學力行有年矣愚不惟道之險夷行且不息上句本前書積二十年下句本前書行道句有來言于閣下者至閣下且以為仁人乎哉到難轉身處忽用反照收上二句瀠洄反復又變出一層愈婉愈迫有可救之道本前書中古君子之道如時不可何時字對前書中古字固在上位者之為耳先深一層與今豈異時哉非無時况在宰相吾君所尊敬者又未嘗不可或取于盜二句復自顧才能句情隘辭蹙果然後草九日復上書就前書自進而不逆意更顯責焉末段言其不唯無望于浮沉皆載方且驅自進而歸山林豈不重失天下士之心也此書自古之士以下非常人所見察其所以而去就之并非若第二書中猶謂其必舉特責其待命四十餘日直置之不聞而已故末段中皆申明所由自進之亟有不得已者其不逆以否則固聽之豈屑屑蘄得一官哉天下之賢才皆已舉用從賢才已用打頭説起下一語亦必有賔主不唯不賢於周公而已四句一路頓跌而下如怒濤出峽不得于天下之心小頓對前天下之心美之意維其如是三句著此氣愈足勢愈重無此一勒文勢便有剽而不留之患今閣下為輔相亦近耳跌落有力長史云先安放此句下靣便儘暢説人可不恨今雖不能如周公吐哺握髮頌周公更深一層責時相反寬一步激切頓挫古之士三月不仕則相弔前是已所得為者不當與古異下是已所不得為者不可與古同以明更無所辭其責也然所以重於自進者自留地步舍乎此則夷狄矣至足數及門而不知止焉言至此則第二書之情隘辭蹙亦不為過矣與第一書行道者知所歸焉反對第二書恐懼不敢逃遁與前昏愚不知逃遁皆指山林言之如有憂天下之心則不能矣是故孟子韓子同道也寧獨如此而已三句復有周公之説蓋猶終不絶之故寧往告焉耳收此三句辭氣仍歸於和平非空為罵譏而已惴惴是懼者憂天下之心所迫也答崔立之書題注唐進士禮部既登第後云云按吏部乃宏詞試耳未即得仕非不許其入仕也公迄不預宏詞選遂從董晉於藩幕來書蓋有戒其崛強惜其冷落之意其為不知公也甚矣前後作兩段分析却將崔書點在中間文勢妙有斷續自覺激昻磊落僕始年十六七時至余亦無甚愧焉此段先敘失所操持辱至再三以為人之仕者皆為人耳為人致君澤民也夫所謂博學者至而為之憂樂哉此一段先辨明必俟工人之剖然後見知于天下二句明已之道非可決得失于一夫之目斯立不當勸之自卑故凡僕之汲汲於進者至足下無為為我戚戚也此一段辨兩刖不為病二句明已宏詞再試特逰戲以求祿若其道甚大不可遽謂其再獻再刖待之甚淺蓋欲以同吾之所樂於人耳為人今足下乃復比之獻玉者至且無使勍者再尅將來書敘在中間文勢便不直此昔人所謂斷續也又所謂勍者果誰哉勍者句只輕帶無以發吾之狂言應發余句答李翊書書中前後兩段分明便有知言飬氣二事在韓子於斯文其原過他賢逺矣安溪云蘄至于古之立言是立志戞戞其難汨汨然來兩段如孟子所云知言而根却帶立志故中云非聖人之志不敢存浩乎沛然至高下咸宜如孟子所云養氣而根又却帶著知言故云懼其雜也平心而察之要之韓子所云養氣亦同歸于立言故又云氣盛則言與聲皆宜然皆非無志者所能也故仍收到立志上而朂之以當志乎古又嘉其不志乎利也按此一段非凡所見仁義之人其言藹如也仁義是茂沃藹如是遂曄不自知其至猶未也欲言已用力之艱而先作謙詞學之二十餘年矣無望其速成始者非三漢兩代之書不敢觀膏沃伏下書詩非聖人之志不敢存根茂伏下仁義此是工夫故漸進惟陳言之務去先去其甚駁者然後識古書之正偽此真字宋人避諱改之也而務去之又去其未醇者其觀于人也笑之則以喜四句無誘于勢利吾又懼其雜也并去其小疵揚子或曰玄何為曰為仁義曰孰不為仁孰不為義曰勿雜也而已矣其皆醇也然後肆焉揚子聖人肆筆而成書不可以不養也養其根加其膏行之乎仁義之途二句上句貼根下句貼膏終吾身而已矣此是原本故終身以之氣盛則言之短長與聲之髙下者皆宜氣盛者茂遂也言與聲皆宜者沃曄也其敢自謂幾于成乎此句掉轉至猶未也結過自己其用于人也奚取焉又應取于人非古之道以堅其志處心有道五句此即所謂道德之歸而不徒外之文者如是者其亦足樂乎其無足樂也婉轉有深味有志乎古希矣應生之志亟稱其人所以勸之恐其以遺乎今見沮故亟稱以勸之不志乎利此利字不過對取于人説若以自用于人也奚取焉以下為應無誘于勢利而以學之二十餘年以下為無望其速成則意脈反不融貫矣不可用幾于成成字闕志於利二字粘定作照應上二句也幾於成亦不過前至猶未也之意代張籍與李浙東書李浙東英華作李遜亦乞食之文然頗寫得激昻頓挫頗擬戰國䇿就盲不盲兩層翻出無限起伏惟閣下心事犖犖與其心能别是非句相對無所能人六句先以道自明當惜心中平生所知見即古人之道也嫌于夸毗故反以中丞言之浙水東七州至不當計其盲與不盲也此段從不盲者反襯當今盲心者皆是又變出一層籍又善于古詩復以藝動之憐古詩則又古道之末也夫盲者業專于藝必故樂工皆盲注諸本專字在必字下今從文苑必字下缺一字疑是精字按從諸本亦得此段從盲者襯出與李翺書習之當責之以失其所從故以無所資為解且言雖之京師亦安得知已者而從以深悲已之不遇且并以悲李也挫頓往復兼有李之文態持僕所守至其安能有以合乎徐府固非相知京師亦安得知已所謂不酌時人待我之情也今而思之四句先言京城亦無可樂與後一段對照非旅食久不知其悲內無所資外無所從終安所為乎將無所資穿入無知已中帶上總束今天下之人有如子者乎至無也所謂以子待我之意望時人公之寄身從事幕府不入京師徒以德宗昏惑信用讒慝諛佞之人無可為者然難以顯言故但言不相忌者少偏以不能下達見意自堯舜以來二句正見當待明天子也深得聖經微而顯之妙子獨安能使我潔淸不汚二句帶起下一段僕于此豈以為大相知乎非真為得所從將亦有所病而求息于此也徒以舍之不可挈之不可聊資其祿耳及之而後知履之而後難耳知此者讀此文未有不涕下矣孔子稱顔回一簞食至其不亦難乎又解潔淸二句顔子雖上無明天子與公同而獨能潔淸不汚處其所可樂則與公異子之聞我言亦悲矣收悲我子亦慎其所之哉收自責自悲故專使馳此候足下意候其意并以自解解其言上張僕射書寅而入盡辰而退申而入中酉而退此古者朝夕之義仍非越分以自高也與于襄陽書兩存地步不失輕重乞索書之最出拔者未嘗干之四句結上生下豈愈所謂其人哉不説煞方起得未聞二字愈今者惟朝夕芻米僕賃之資是急二句只此正説如曰吾志存乎立功五句都用反跌不陋世之齪齪者二句顧未嘗敢以聞于人磊落竒偉之人三句此一轉仍未嘗乞哀更妙于放開亦足以知其志之所存又收到不肯後于恆人與崔羣書公在張徐州幕下頗不得志故假崔而報此僕愚陋無所知曉至于吾崔君無所損益也已非無黑白崔君亦不待明其好惡兩段相承説自古賢者少至不知造物意竟如何打轉宜在上位一段為樂天知命四字下落無乃所好惡與人異心哉至况又時有兼得者耶身當窮悴彌有此慨然卒不蹈于狷忿此公之所以為高明歸之于正為前無入不自得樂天知命二句歸宿僕不樂江南官滿便終老嵩下公之于徐也蓋屢形于歎與馮宿論文章下筆令人慚及示人則人以為好矣此不可謂之知其時桓談亦以為雄書勝老子此尚不可謂之知子雲豈止與老子爭強而已乎激昻直百世以俟聖人而不惑二句此則文之至知之極也一二年業之庶幾乎至也昔人之少也于經史無所不通又得如公者而從之故可業之一二年而至未可為今之少致力遽自足者藉口也然閔其棄俗尚三句此䇿其退而誘其進之詞非感憤也與祠部陸員外書題注貞元十八年中書舍人權德輿典貢舉云云按以退之之賢所薦十人而僅舉其四侯雲長則又陸所自知也然則謂陸歙州之果能好賢樂善歟抑權文公之于陸非相知深歟吾未解也末云宜當是時皆爭為韓門弟子也按然則韓門弟子皆慕勢而來者耶何言之陋也其斯為廖瑩中歟韓門弟子語本李肇國史補與鳯翔邢尚書書論卑而文無向背往來之勢何故不刋去之亦學孟子而所得尚淺功業逐日以新八句此等是學王褒愈見天下之竹帛四句稍陋前古之興亡四句對功業聲名一邊説此皆為文本根常以天下之安危在邊當觀其所處之時為人求薦書靣目似戰國策命意則左氏之善為説詞者也公文真難為狀前伯樂匠石雙起後却只説伯樂古人文字不拘如此及至匠石遇之而不睨二句影過從前不知一靣是結句始字之根以某在公之宇下非一日伏始字是生於匠石之園五句本是親厚之人反不能知已却如此宛轉説入柔而不犯絞而婉矣于是而不得句應前又變若某等比咸得以薦聞見其無愧是以冒進其説以纍於執事結句終字之根亦不自量已在不知己之前不得不自謙一語為之地應科目時與人書應科目是已舉進士及第人非布衣隱逸仕進無階者比故謂已在池之濵江之濆但未及水耳世得云怪物者士也得水不得水者窮達也有力者援引也劈頭便分三柱以下復應三段哀之命也結庸詎知數句不哀之命也結熟視無覩數句知其在命而且鳴號又回護寧樂泥沙而不乞憐意要之亦命也見已之出處制之于天仍自負是怪物之意難于致詞則托物為喻此詩人比興之道也直道正意醜不可耐晚唐四六啓是已天池之濱三句開口即切應科目時龍為水之怪見國語蓋尋常尺寸之間耳三句即起運轉之易從上濱字濆字生下然是物也至非我之志也此一段若引咎若歎息公卿之不先下人將從前安頓得好搖尾乞憐此常鱗凡介也能其死其生固不可知也起下以鳴號卜興廢聊試仰首一鳴號焉此句斟酌雖告以窮仍與搖尾者異其不哀之命也生平之志固在知其在命而且鳴號者亦命也所以觀吾道廢興之機故曰亦命也愈今者實有類于是今者謂應科目類是謂在濱濆答劉正夫書題注豈正夫即嵒夫耶按正夫疑即端夫未及文章深旨要且教之自為安溪云唯其是則真所謂布帛之華菽粟之味矣又曰必有以異于物而非常物者然後為異而可珍愛前後義理未免有幾微抵牾之處若孔孟之言必無此病而愈獨不幸有接後輩名謂其抗顔為師惟其是爾其皆醇也而後肆所謂是也非固開其為此二句以下反復辨此夫百物朝夕所見者至夫文豈異于是乎此段言求其是不得不異于今不異乎今必無以幾于是所謂異者其是者也所謂是者師古聖賢人之意者也古聖賢用功不深其何以得之韓子于答李翊書也蓋語焉而詳若皆與世浮沉四句雖非禁其為彼然不得不異乎時尚矣然其所珍愛者二句又一瀠洄正喻皆一意翻作兩層今後進之為文至必其能者也即上一段中兩層意反復申言之雖未必能即是亦必自異于今始要之其卒至于是者必歸之異于今者與孟尚書書安溪云佛骨表其所言于廷者耳此是欲流傳學者之書故拔本塞源爭辨千古道術之歸反復剴切無復餘恨自江都河汾之書鮮足以比擬者何况諸子理明氣暢此文真是如潮非崇信其法二句因孟簡之言故云孔子云邱之禱久矣至以求福利也進無所據詩不云乎至不為利疚求福不回句結上不為威惕句起下假如釋氏能與人為禍祟至作威福于其間哉退無所據且愈不助釋氏而排之者其亦有説以上辨與大顛往來非求福以下申已不信奉釋氏素所自任者重夫楊墨行正道廢至以為功不在禹下者為此也此段正為于斯時起夲始除挾書之律惠帝四年已除挾書之律此句從上文順勢説下不及照顧耳二帝三王羣聖人之道于是大壞對上聖人之道不明句其禍出于楊墨肆行而莫之禁故也呌得醒應轉楊墨交亂空言無施應能言距楊墨其大經大法三句應倫斁道壞則皆服左衽而言侏離矣應上夷狄禽獸故愈常推尊孟子呌得醒以為功不在禹下者為此也應上聖人之徒漢氏已來至以從于邪也此段發明已之于釋氏不得不排之故釋老之害四句紐得緊孟子不能救之于未亡之前至莫之救以死也筆筆折説得極孤危轉有光焰天地鬼神六句信奉釋氏則反得罪于天地鬼神矣併反照到福利一靣極密回抱到近少信奉釋氏前後紐得緊與鄂州栁中丞書又一首字字著實觀昌黎議禮制談兵農刑律等文稽古而不迂適時而不詭經術純明非諸子修詞者所及送陸歙州詩序先一州而後天下二句此處不説盡留天子有詔句在詩中結出天子有詔時宰吾無望焉庶幾悟而追者天子乎按權文公送陸公佐序當日似以直道不為時宰所容者此言豈吾君吾相之心哉反言之也末言天子有詔以見非德宗本意欲棄之外而仍望其獨斷于心耳送孟東野序只説文章如何關係便有酸氣旁見側出突兀崢嶸鳴字句法雖學考工然波瀾要似莊子其在唐虞咎陶禹其善鳴者也在上夔弗能以文辭鳴又自為波瀾周之衰孔子之徒鳴之在下其他浸淫乎漢氏矣其他蓋以雜文言之李翺張籍其尤也又入二子前半千波萬嶂不容此處太平也三子者之鳴信善矣結過前半抑不知天將和其聲而使鳴國家之盛耶以下始因其不釋然而解之其在上也奚以喜二句一賓一主三子之上下繫國家之盛衰却説得蘊藉不流于夸毗又藏過棄才則國家之盛可卜極得體但吾終疑不得其平四字與聖賢之善鳴及鳴國家之盛處終不能包含此韓子之文尚未與經為一耳送許郢州序忠告善道亦六經孔氏之詞諷刺之辭却語語平恕藹如也變化如龍味亦炙之愈出善為説辭長于諷諭本是不恤民命却只諷他不通下情妙甚愈嘗以書自通於于公至足下之言是也一方連率不容率爾獻規從平昔相知發端乃得進言之體是非忠乎君而樂乎善二句引入情已至而事不從二句動之以誠信為刺史者恆私于其民妙于語言從刺史説起善為于公地繇是刺史不安其官至其不去為盜也亦幸矣數語側重觀察以致意長史云不安其官是重民命而輕位若不得政則為害無窮矣用筆極有輕重誠使刺史不私于其民至未之有也復兩平賓主雙行方是道刺史之事以為于公贈説得刺史與有責焉為之分謗則道之易入其前之言者四句紐合縣之于州猶州之于府也紐合有以事乎上至其誰能信之此一段又就刺史本分言之不失文章賔主諷諭又不覺長史云正是敲擊于公戒許公無效尤也併規郢州乃不使連帥無施靣目不以頌而以規規字扯于公在內送竇從事序連山隔其陰巨海敵其陽注一作歊按隔是嶺之勢歊是海之氣對既工而句尤有力若敵字何味之有方説引橫擲者亦非瀕海之饒固加于初風氣正則生齒盛生齒盛則地力可盡故其饒有加上巳日燕太學聽彈琴詩序與衆樂之之為樂上已樂而不失其正彈琴皆充然若有得也收足聽字送齊曍下第序題注暭或作曎按暭與曎乃一字也嵩卿不通小學其陋至此又苑本亦注云一作曎非周益公亦不講小學也左國之文最為雄直有內愧之名世得云謂雖得公忠之名而可愧也為人嚮道者注以方從閣苑以人為仁殊無文理按作為仁本自文從字順若以通榜為嚮道此何理哉生于私其親四句私其親植黨者也私其身避嫌者也以已之不直通上下言非百年必世不可得而化也此責之在上者非知命不惑不可得而改也此責之在下者公無私者也將此句位置中間一索皆穿送李願歸盤谷序其中稍有六朝餘習者少作故也化議為序歸字送字渾然融釋其中創變一體太行之陽有盤谷至隱者之所盤旋先敘盤谷願之言曰以兩或曰願之言曰為之歌曰作章法吾非惡此而逃之此句中反帶歸盤谷勢方不懈不可幸而致也幸而致并起後一段窮居而野處至孰若無憂于其心總只無不足兮奚所望意我則行之正落歸字伺候于公卿之門至老死而後止者此不遇而求遇者加此一段見不歸不可徼幸于萬一對有命句其于為人賢不肖何如也有非逃之則行之二句故只如此虛結可以稼應土肥可濯可沿濯古與棹通漢書水衡有輯濯丞音直孝反應泉甘誰爭子所應居民鮮少窈而深是谷繚而曲是盤無不足兮奚所望中一段膏吾車兮秣吾馬送字餘音從子于盤兮二句收出送字透過一步送董邵南序無限曲折忠厚之至視爭臣論德加進矣南部新書貞元中仕進道塞奏請難行東省數月閉門南臺惟一御史令狐楚為桂府白身判官七八年奏官不下由是兩河競辟才雋抱器之士往往歸之用為謀主日以恣橫元和以來始進用有序公此文正從事汴徐二府時作董生之去遊河北蓋有以也隋書地理志冀幽俗重氣俠好結朋黨其相赴生死亦出于仁義故班志述其土俗悲歌慷慨椎剽掘冡亦自古之所患焉發端議論亦從此出茍慕義強仁者皆愛惜焉此句見中朝未必終無知已矧燕趙之士出乎其性者哉性下當有情字猶今諺云脾胃也然吾嘗聞風俗與化移易暗伏明天子吾惡知其今不異于古所云耶不亦翻然能慕義強仁耶為我弔望諸君之墓此句勉董生恐其怨朝廷而為藩鎮用故諷以望諸君不敢謀燕之語而觀于其市至末此五句勉燕趙之士燕趙之士猶欲招之使出况董生耶能化其俗則可不然亦可以無往諷而止之即在言外有無窮之味樂毅卒于趙冡在邯鄲西弔墓觀市分應燕趙意既深婉于文章復點綴有情所以為國能也贈張童子序題注唐制有童子科按張自以明經舉非童子科如劉晏李泌故事也天下之以明二經舉于禮部者每一大經兼一小經慕回路二子之相請贈與處也嫌于不請而教故引贈言之義送浮屠文暢師序橫空而入推排衆説又不覺為遠於人情非宋人所及以浮屠之説瀆告浮屠此即陳言也公此文淺言之亦務去陳言而已此文會須味其忠厚誠慤不是虛憍之氣在門墻則揮之此句并對子厚諸人浮屠師文暢喜文章佛學不立語言文字而喜文章此則其志將有以異乎彼也惜其無以聖人之道告之者翻案夫文暢浮屠也至故樂聞其説而請之此段打入得妙方不覺為武斷立説似孟子道莫大乎仁義二句上言二帝三王之道云云而此不逐句疏釋者蓋仁義禮樂刑政即其所以行著幽蕃流者也施之于天下四句非無用之虛器又皆為已之實功四語庶乎知道矣書之于册關著文字今浮屠者孰為而孰傳之耶只一語含蓄有體若贈以言而詈其師何如不作耶夫不知者非其人之罪也就不知二字瞥然掉轉悅乎故不能即乎新者弱也破前拘其法而未能入知而不以告人者至不信也有此二句誠懇有味不是強以大言彈壓仁義之人其言藹如可從此二句觀之送楊支使序愈在京師時伏下天朝其來而鎮兹土也注鎮或作領按湖南非節鎮作領為是證以荆潭唱和序可見以輔其質此句綰結密惟知道者有之而流聲實于天朝也關合在京師時送何堅序何於韓同姓為近注何氏出周成王母弟唐叔虞後云云按注本姓苑晉字當作音江淮下云江淮間音以韓為何字隨音變遂為何氏送廖道士序必蜿蟺扶輿扶輿字義未詳疑傳寫或誤注引子虛賦非也張揖注謂扶持王之車輿顔注則謂或扶或輿而行耳送王秀才序深厚安溪云韓詩云名士例須憐麴蘖今其立論如此固知韓子遠矣吾既悲醉鄉之文辭伏下文字而又嘉良臣之烈伏下行字惜乎吾力不能振之無以使之平其心姑與之飲酒一半在言外送王秀才序安溪云語皆的確公不云乎學古者非其文辭之謂好其道焉耳因王生為文好舉孟子故以孟子之學所自出者告之不泝其源孟子之文辭不可得而為也荀卿之書至子弓受易于商瞿上順敘下倒敘故求觀聖人之道二句許而堅之如又得其船與楫二句因而進之其可量哉引而不發荆潭唱和詩序非公文之至者然梁權輩不能到也送幽州李端公序空中結撰及郊一段儀禮也幽州從事非李相國之子端公或佐他鎮作序者非公皆不可移用一字故歸熙甫謂不切者為陳言曰某前年被詔至坐必東向述相國李公言使者持節南向故東向坐也國家失太平至如開元時乎自述答相國之言元年之言殆合矣收前半段其為人佐甚忠序端公只一筆請以愈言為使歸之獻收後半段來壽相國歸佐司徒絶不粘題却句句緊密送高間上人序語甚竒特而意都不可曉或以間既未能忘乎名而又從業于無用之法故戲而諷之不得其心而逐其迹二句名言為旭有道道字術字相對解外膠膠當從苑本作繆若作膠恐于前不膠于心相犯則其于書得無象之然乎注引東坡送參寥詩云云而謂正謂此一段文意也按坡詩豪猛下云細思乃不然真巧非幻影欲令詩語妙無厭空且靜靜故了羣動空故納萬境正翻此案也送殷員外序右庶子韓愈執盞言曰殷大夫注或作殷侯按唐人唯呼副相曰大夫當作殷侯苑本同送楊少尹序反復詠歎言婉思深于時公卿設供張至赫赫若前日事詳敘為設影地世常説古今人不相及下文從此句生出遇病不能出下文從此句生出虛景不知楊侯去時至而畫與不畫固不論也此段乃謂恐世之知其美者少也然絶無痕迹不善作文則此等皆平實直敘無復意味道旁觀者二句兼諷難退者當因乞身者而有動于中也白以為其都少尹注白或作署按作署為是唐時宰相得自除人也古今人同不同未可知也仍放活楊侯始冠三句反將始仕翻轉相形波瀾更妙指其樹曰四句亦有一段虛景妙有此餘波與前相配以楊侯不去其鄉為法主意在此歸亦何所苦哉此一段又歆動之其在斯人歟二句所見唯一老而已矣送石處士序送石處士與贈石處士不同序已詩與序衆人詩又不同無限議論都化在敘事中此篇命意蓋因處士之行望重胤盡力轉輸使朝廷克成討王承宗之功不可復若盧從史陰與之通而位置有體藏諷諭于不覺先生居嵩邙瀍榖之間至左右圖書此一層明石洪非圖利便私之人與之語道理至燭照數計而龜卜也此一層明重胤能敬信其言而後可以保其祿位當否成敗即為後祝規伏脈人之髙下亦視此而已其肯為某來耶頓挫吾所處地歸輸之塗眼目在此有執爵而言者至而私便其身議論妙有裁翦于送行上更有生色不寂寞也宋人便一片寫去了無風神側重大夫却藏在中間與許郢州序法同無務富其家而飢其師切歸輸無甘受佞人而外敬正士如盧從史之于孔戡此重胤前車之鑒送溫處士赴河陽軍序空際結撰伯樂一過冀北之野而馬羣遂空是第二人發端東都固士大夫之冀北也此句中并暗藏自已自居守河南尹至無所禮于其廬空羣意洗發得淋漓從詩叔于田來此推明鄭詩之意言之無所禮于其廬此句恰好脫缷出處士之廬句來而東都處士之廬無人焉上統云士大夫之冀北此句剔清處士之廬方好接出下段惟相與將耳此相字其文則謂留守其意則斥西京政事堂中人也愈縻于茲至其何能無介然于懷耶言重胤起率任猶能拔二士于數月之中如公之才宰相乃置之冗散冉冉且老為可感耳為吾致私怨于盡取也只如此收仍不露顧起處緊甚送鄭尚書序前半盛稱其任之重以戒勉之而以兩語反復微諷使知所自處知其為諷愈覺有味猶詩之有楚茨篇也宋人自歐公而外無復得其意矣大府始至至咨而後行發明獨嶺南為大府先敘四府之事大府文有賔主𨽻州之府至舶交海中言任之重于他鎮故常薄其征入下皆控御之術然必以薄其征入為無怨變之本正鄭權對症之藥也若嶺南帥得其人五句承𨽻府之州一段外國之貨日至至不可勝用承海外雜國一段故選帥常重于他鎮五句束得嚴重有力載得前半起勒得住世得云為羣帥首則須文蠻夷多變則須武逺聞海外則須威風知大體承文可畏承武不但可畏而又可信方有威風而後可以來逺人也送鄭十校理詩親交誰不羡注或作交親按作交親為是指分司吏與留守從事也韋侍講盛山十二詩序十二詩今元白二集皆無之傳者唯韋相及張文昌張蓋慕而為者也石鼎聯句詩序長頸而高結考異云道士之首加冠不作椎結云云按此詩中上為孤髻撑為譏道士語此又以加冠致疑何也子為我書祭侯主簿文云我或為文筆俾子持豕腹漲彭亨毛傳炮烋猶彭亨也詩末考異云彌字之義又與愈字相類按王肅易賁六五注云失位無應隱處邱園蓋蒙暗之人道德彌明必有束帛之聘也文中謂隱君子彌明本此義門讀書記卷三十二

body:
  text: 義門讀書記卷二十五翰林院侍讀學士何焯撰後漢書八志司馬紹統之作本漢末諸儒所傳而述于晉初劉昭注補别有總敘緣諸本或失刋劉敘故孫北海䕨陰劄記亦誤出蔚宗志律歴之文律歴權土灰此灰字因下文葭莩之灰而誤史漢與淮南中皆作炭各家術皆當有効於其當時通人之言議亦詳核禮儀上陵東都之儀至周徧如禮明帝誠為凟禮然旣相沿有此議廢則難惟不得過侈如西京園寢之制耳魏文始毁髙陵祭殿注中魚豢之論習見近事不復深惟本意耳按古者大事皆於祖廟行之若移上陵之禮於廟則禮不凟而愛敬不替矣髙禖立髙禖祠于城南注中盧植注即鄭說而言之不悉束說疎矣養老皆祀聖師周公孔子周孔並祭至唐始革其制五更亦如之注引月令章句曰五更庶老也按五更旣庶老則更字為分書叟字無疑矣請雨郡國上雨澤今雨澤章所始也拜王公注所引夏勤策文此漢三公策文舊式又注引建寧四年七月立宋皇后文云今使太尉襲使持節奉璽綬按范氏靈帝紀于是年三月書太尉聞人襲免太僕李咸為太尉此是詔書不應有誤紀所書拜罷未審也桃印至立秋如故事是日浚井改水今人不知有改水事改火則漢惟冬至行之當為以火徳故不欲如周之數改耶大儺先臘一日大儺月令季春仲秋皆儺恐陰陽之氣或有所過其害及人而物或憑焉也漢所存者止于季冬大儺而已設桃梗鬱儡葦茭畢注中所引度朔山一條今山海經無此文大喪或大赦天下大赦上有或字則偶當大赦之後雖即位亦可無數赦祭祀封禪語在漢書郊祀志上皆追述武帝事注東觀書云云宜在下文上至奉髙下六宗注中諸家之釋惟紹統之說得其通矣迎春三時不迎不迎三時自漢始論然而未有金玉銀銅之器也此玉專指印璽劉昭之難非也天文注中所引張衡靈憲以為溟涬為根龎鴻為幹太元為實周子太極圖蓋權輿于此文五行雞禍靈帝光和元年南宫侍中寺雌雞欲化雄條在侍中寺者兆宫省臣將有雌化為雄者曹氏之祥也莽后族操閹孽其占同頭冠未變者至子丕乃簒盗也青𤯝七寸二分商數也五寸四分徴數也曲說屋自壞獻帝初平二年三月長安宣平城門外屋無故自壞條占在王允不在卓也注所引袁書是李傕傳允奉天子保宣平城門樓上窮蹙乃下災火安帝永初二年四月甲寅條此視天文志所載為詳然勝實痼疾鄧后固不輕以天下與從子也延熹四年先是亳后因賤人得幸后紀云帝惡梁氏改姓為薄中平二年二月己酉南宫靈臺災靈紀注云時燒靈臺殿樂成殿此條下云周家之所造似當為靈臺騶騎電激謂左騶督促賣官錢者也事見羊續及宦官傳龍蛇孽永康元年八月桓帝時政治衰缺至則為妖孽此語過歐陽子司天考論逺矣人化七年越嶲有男化為女子條明萬歴中陜西李良雨事其占果同郡國謂之郡國反不能該司𨽻矣所以前史諸志之名不容輕改河南尹有函谷闗函谷在穀城者非秦之函谷故于宏農下以故秦函谷闗别之有氾水注引左傳周襄王處鄭地氾按襄王所處者氾也此注與潁川襄城下注相亂河内郡溫蘇子所都濟水出王莽時大旱遂枯絶按酈善長曰濟水當王莽之世川瀆枯竭其後水流逕通津渠勢改尋梁脈水不與昔同然則枯絶者河内濟源也河東郡汾陰注引博物記曰古之綸少康邑按梁國虞縣下馬注有綸城少康邑與此錯出若馬誤則劉書當證明之有董池陂古董澤注引左傳曰改蒐于董董澤之蒲按上臨汾董亭下細注旣引改蒐于董則此當專主董澤宏農郡華陰注晉地道記曰潼闗是也按水經注云河在闗内南流潼激闗山因謂之潼闗歴北出東崤通謂之函谷闗也邃㟁天髙空谷幽深澗道之狹車不方䡄號曰天險是直以潼闗函谷為一地二名也左馮翊魏略李義傳建安初闗中始開詔分馮翊西數縣為左内史郡治髙陵以東數縣為本郡治臨晉蓋一時權制旋復故故司馬氏不載然劉注當補見也右扶風漆有漆水注皇覧曰有師曠冢名師曠山按師曠晉人無緣得葬于此疑皇覧誤梁國有魚門注引邾人縣曺誤魚門自邾城門名也碭山當作碭不當作碭山前志可攷薄注杜預曰蒙縣西北有薄城中有湯冢按劉向云殷湯無葬處此何以云沛國虹魯之大蒐恐不當在此注所引地道記誤也且與奉髙下注相亂魯國有闕里孔子所居注引漢晉春秋及意别傳注地里何取于此有牛首亭注左傳桓十四年宋伐鄭取牛首按旣取鄭地則非此牛首明矣六國時曰徐州俆音舒左傳正作舒史記索隱齊世家下注云其字從人說文作䣄則今與九州之徐同一字者乃傳寫誤也特正之常山國欒城注云在縣西北四十里疑當在上有塞下九門注云碣石山戰國策云在縣界按此碣石非禹貢冀州貢道所由入河蓋又一山清河國貝邱舊刻貝字皆作具惟以中二畫與具字别濟北國有光里京相璠謂光里即左傳所謂廣里與此書合山陽郡湖陸注引地道記縣西有費亭城魏武帝初所封按費亭仍曹騰故封注謬引琅邪國西海疑前書海曲之誤齊國臨菑本齊刺史治注引皇覧曰吕尙冢在縣城南按太公封齊五世葬周安得有冢在臨菑九江郡壽春注漢官云刺史治去雒陽千三百里與志不同按志據中興以後漢官所據末年也阜陵晉書地理志云阜陵漢明帝時淪為麻湖會稽郡鄞章安故治閩越地光武更名注引晉元康記曰本鄞縣南之囘浦鄉章帝章和元年立未詳按前書有囘浦縣南部都尉治注家不就前書核其沿革而泛引地記以為鄉名何也通鑑注引𨽻釋云當云章安故囘浦章帝更名東候官故治閩越地光武更名于文乃足此郡之末有東部侯國四字却是衍文侯與候相近而南部所治故文有錯亂呉郡呉郡圖經續記曰漢順帝永建四年分會稽為呉郡以浙江中流為界故餘杭富春皆屬呉郡但前書有錢唐靈帝時朱雋封錢唐侯而今志無之按戴就傳揚州刺史歐陽參收就于錢唐獄明當時未嘗并省蓋闕文也烏程注引左傳衡山當如或說在丹陽縣若至烏程則過呉郡矣廣漢郡雒州前志廣漢郡但作雒此州字疑衍揵為郡荷節前志符莽曰符信此荷節疑符節越嶲郡臺登應劭云今曰臺髙武都郡下辨武都道隷續據武都丞吕國十二人題名有下辨道長任詩謂志闕一道字按前志正作下辨道洪說是前志武都無道字則上下誤寫耳安定郡出薄落谷四字乃側注當衍出字而在烏水出下三水注中有左谷三字乃正文當連三水下太原郡上郡五原郡雲中郡朔方郡定襄郡五郡注中皆脫雒陽北里數鴈門郡原平故屬太原注引古史考曰趙衰居原今原平縣按趙衰所居當是温原譙叟誤上谷郡寗廣寗按前書寧莽曰博康廣寧莽曰廣康則為寧不為寗審矣遼東郡候城按候城旣屬元菟郡不當仍列于此遼東屬國昌遼故天遼屬遼西按前書遼東無天遼無慮上遼東十一城中已列無慮此處何以複出按鮮卑傳中中攻扶黎營注云縣屬遼東屬國恐扶黎之誤交趾郡洪适𨽻續云漢武帝置交趾刺史在十三州數中東都因之杜佑通典云獻帝時以交趾刺史張津交趾太守士燮有請改刺史為州牧至建安十八年復禹貢九州省交趾入荆益帝紀自靈帝以前屢書交趾刺史事迹傳中載交趾事却多作交州蓋是要其終而言之但郡國志自中興以來直云交州不載廢置本末可謂闕文百官司徒注中干寳之說是以時制附㑹古禮謬甚博士注本紀桓帝延熹二年置秘書監按置秘書監典領中書之不列于學官乃諸子百氏皆在焉與博士傳經者異矣注以無所附故見于此其官亦六百石遂比諸博士不知當屬少府在御史中丞之後如蘭臺令史亦六百石乃其比也光祿勲注引漢官有官醫一人按宿衞在内恐倉卒遇疾故有官醫五官中郞將條當時侍郞乃中郞之副郞中則列于郞之中而已羽林左監注引漢官謂二監官屬史吏皆自出羽林中今武官不别置府史本此右屬光祿勲舊有左右曹秩以二千石上殿中主受尙書奏事平省之世祖省使小黄門郞受事左右曹省而尙書之權歸宦寺矣太僕注引漢官有官醫其獸醫也耶若後廷尉之醫則為罪人設鴻臚之醫為逺人設衛尉之醫為宿衛設也右屬太僕條中興之初邊陲蕭條靡有孑遺芻牧無所出故皆省之國馬之政不可以廢中興矯前失之過乘輿六廐節之可也然和帝紀永元五年詔省减凉州諸苑馬則中興止設漢陽流馬苑而其後仍置之矣安帝永初六年又于越嶲置長利髙望始昌三苑益州置萬歲苑犍為置漢平苑宗正條西京枝屬其後衰者猶皆可考跨連荆益不失舊物蓋頼此制也注引漢官有官醫重枝屬故也後司農事劇故亦置醫大司農條四時上簿如今之季報册損多益寡如今之撥餉有不同平準令一人靈紀熹平四年改平準為中準使宦者為令列于内署則曾屬少府至獻帝初復故太醫令一人六百石本注曰掌諸醫注引漢官曰員醫二百九十三人按二百九十三人當兼在諸曹者言之侍中贊導衆事顧問應對法駕出多識者一人參乘侍中得人則宦者之權自然抑損黄門侍郞注引衛權注呉都賦按衛權字伯輿見三國志注中諸本皆誤瓘宋本亦誤小黄門掌侍左右受尙書事後漢樊安碑云為小黄門右史右史今不見于志豈以其侍左右而得此名歟祠祀令一人本注曰下典中上疑脫宦者二字御史中丞一人魏志鮑勛傳黄初四年為宫正宫正即御史中丞也是亦沿周官小宰之意特大夫不領名實乖耳西京屬副相猶得周官遺法至東京轉屬少府則三公不得聞天子左右之人事任輕而體統䙝矣蘭臺令史前書百官公卿表御史中丞在殿中蘭臺掌圖籍秘書桓紀延熹二年初置秘書監官注引漢官儀秘書監一人秩六百石其官當列中丞下屬於少府而此志遺之劉氏注補于太常博士之下則非也太子庶子如三署中郞觀此制則庶子乃武臣後中庶子如侍中則偹顧問與此不同右屬太子少傅本注曰凡初即位未有太子官屬皆罷唯舎人不省領屬少府前書儒林傳博士弟子歲課一科二十人為太子舎人蓋愼選文學之士也雖未有太子而舎人不省以其成材實難非可求之倉卒領屬少府亦以天子私財儲而養之右屬北軍中候注大駕鹵薄五校在前各有鼔吹一部按五校之有鼓吹以在大駕之前也然則鼓吹惟天子得有之故大將軍曰賜司𨽻校尉一人比二千石本注曰孝武帝初置劉注曰周無司𨽻按秋官司𨽻掌五𨽻之法何謂無之但所掌不同耳州郡邊郡置農都尉主屯田殖榖若邊郡素不置農都尉則充國不能行之倉卒建武六年省諸郡都尉并職太守無都試之役無都試之役亦所以匽武也然於古者務農講武之意偏有所廢矣至王荆公行保甲法十年始成元祐始罷之當以其無實而徒擾民故耶注每有劇賊郡臨時置都尉事訖罷之按此如桓紀初置太山瑯琊都尉官其後次第皆罷是也袁紹傳中有上洛都尉亦此類王國省御史大夫廷尉少府宗正博士官博士官不當省闗内侯注所引劉劭爵制此條宜補前書下然自五爵以上即不得其說矣以其猶近漢姑以為攷古之助可耳輿服長冠此冠髙祖所造故以為祭服祖宗所造服之以祭如其存也武冠貂尾為飾注引徐廣又曰意謂北方寒凉本以貂皮煖額附施於冠因遂變成首飾今朝㑹髙麗使臣所冠近煖額之說義門讀書記卷二十五

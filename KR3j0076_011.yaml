body:
  text: 義門讀書記卷十一翰林院侍讀學士何焯撰榖梁春秋隱元年春王正月所紀者魯侯之年春秋魯史也所奉者周王之朔子為正春始於子月皆從周制春秋天子之事也緩追逸賊親親之道也建文帝不欲負殺叔父名斯言為之母以子氏至賵人之妾則不可由此説乃與僖公成風一例啖氏亦云然祭伯來善親親也凡蔣邢茅胙祭周公之允也二年會戎危公也會戎於潛傷天下之無王也東方禮義之國出與之會非桓文之作周制日替矣秋八月庚辰公及戎盟于唐春會秋盟何其親也三年求之為言得不得未可知之辭也交譏之曰交譏者得經意周則失矣魯何以致此也四年大夫弒其君以國氏者嫌也晉趙盾弒其君可謂以國氏乎曰祝吁者未命之辭也于濮者譏失賊也于濮紀實也弒君之賊當窮討焉耳立者不宜立者也晉未見其不宜立也其曰立者雖不命于先君而國不可以無主為衆之所豫則入而承其統焉可也蓋異乎不待迎而入國者矣豫之也五年仲子者惠公之母此仲子自當為桓公之母伐不踰時至斬樹木壞宮室曰伐唯其重故不踰時七年滕侯卒滕侯卒當與後宿男卒同史闕文耳左氏以為未同盟則宿男卒又相違反矣若曰宿男不赴以名又理之難通者也未同盟而猶赴以名者多矣齊侯使其弟年來聘國君無子則當立母弟故必殊之于庶孽也諸侯之尊弟兄不得以屬通公弟叔肸又何以云哉下不敢以屬通上則未嘗不以是親親也燕則與族齒九年聘諸侯非正也天王下聘不發例于七年之凡伯來聘者凡伯未及致命也十一年隱十年無正隱不自正也隱既濡滯不決有以啓羽父之邪謀至于十年亦已久也故無正桓二年何以知其先殺孔父也至字諡也然則字其臣子者乃豫凶事也以成宋亂書以成宋亂見公生平之為亂人也六年時曰同乎人也同乎人也謂他日忘乎不與共戴天之讎遽接齊人也八年祭公來遂逆王后于紀此注言天子亦親迎據禮甚核但以文王為天子之證則謬也九年為之中者歸之也為之中謂魯十四年無冰無冰獨書于春明其為周正也夫嘗必有兼甸之事焉釋文兼甸一本作旬趙匡云此旬事爾言祭事當久辦非一旬所了傳寫者見前有甸字遂改爾十七年葬蔡桓侯諸侯本當稱侯曰公者不得已而從其臣子之辭也是時蔡人獨不違舊典因而存其實注非莊元年王使榮叔來錫桓公命此注范駁何公羊注甚失輕重不知而作三年不志崩失天下也經于桓十五年三月書天王崩而傳云不志崩所未喻范注亦不加契勘十三年桓非受命之伯也將以事授之者也上左將軍為大司馬惜未引此其不日微國也不日者史失其文十五年婦人既嫁不踰竟踰竟非禮也父母終乃不得歸寧此傳未詳二十七年兵車之會四未嘗有大戰也愛民也齊桓雖有侵蔡伐楚之事然所以致此者非兵車也二十八年其以衛及之何也以其微之可以言及也衛人不服罪以自取敗以衛及之罪衛也閔二年不以討母葬子也不必得經意然思之精矣閔二年不以齊侯使髙子也不以齊侯者嫌以齊臨魯若縣鄙也僖元年齊人以歸先言薨于夷而後言齊人以歸為內諱而仍不沒其實其不言薑以其殺二子貶之也我猶以夫人之禮迎其喪齊人則不復以為女故不言薑也二年衛未遷也故與城邢異辭五年尊王世子于首戴乃所以尊天王之命也所以優于文者此也然必合左氏而後本事始見九年今背殯而出會以宋子為無哀矣襄公圖霸之不終於是見之矣葵邱之會于五伯為盛而列宋子其無政教亦從可知其君之子云者國人不子也公羊得之此亦備一説十年晉獻公伐虢得麗姬以為伐虢得之者異聞十二年若伐而不能救則無以宗諸侯矣蕭望之不臣胸奴之議本此十七年其不正前見矣至故稱嫌焉耳所謂惡惡疾其始十八年宋公曹伯衛人邾人伐齊夏師救齊宋公書爵善討亂也師不稱率之者諱助亂也魯其為狄矣二十二年伐齊之喪執滕子圍曹為雩之會不當并伐齊喪數之二十六年乞重辭也至非所乞也曰乞示譏中國而乞師于夷公之不忍小忿失其所向背也然天下之無伯至于投命非所其亦重可傷矣不日微國也以歸猶愈乎執也不日地逺而告者不詳也既滅同姓又擅以其君歸楚之橫暴甚矣二十七年公會諸侯盟于宋言諸侯者諱即夷二十八年諱會天王也諱之者正名謹微也天王守于河陽先書會然後言王守謹微者至矣主善以內故獨曰公三十二年鄭伯捷卒鄭伯捷不書葬畏晉也鄭來赴而魯不會三十三年癸巳葬晉文公殽之戰書日葬文公即以是月不日則疑二事皆在辛巳故重書日也文二年內大夫可以會外諸侯內小惡不諱非謂其可會也人不得無禮于我我可無禮于人乎著其實以示譏爾三年叔服也此不卒者也此非叔服傳誤也六年猶之為言可以已也閏月猶朝于廟則凡月當告朔可見書此者以見後此不告朔之非以為可以已者殆失本意九年葬襄王襄王獨書葬蓋自是魯始會葬焉爾踐土之盟河陽之朝惡可少之哉十四年同者有同也同外楚也書同者傷大夫會諸侯抗然若等夷無所忌也自此政在大夫矣政在大夫此夷狄之所以得肆而楚遂入主夏盟也十五年諸侯盟于扈諸侯既來徵會盟又來告公雖以有齊難不與猶因其來告而書之既不與盟則不復悉知盟者之為某國故略舉其槩也宣元年遂之挈由上致之也由上謂緣上公子遂之文宋公陳侯衛侯曹伯會晉師于棐林伐鄭本欲救陳畏楚不敢往伐鄭以牽制之言晉師者緣上之辭亦諱政在大夫不使諸侯與之齊也十一年楚子入陳復書入者幾不以義終故著其伯討之不光也十二年葬陳靈公楚子入陳陳幾不祀書葬靈公嘉楚子之悔過陳得以復延也晉人宋人衛人曹人同盟于清邱書同盟者同懼楚也十五年公孫歸父會楚子于宋諱附夷狄以虐王者之後故不言帥師會圍宋成二年季孫行父臧孫許叔孫僑如公孫嬰齊帥師會晉郤克衛孫良夫曹公子手及齊侯戰于鞍書四卿者著政逮大夫不相稟承嬰齊亢也嬰齊亢而書公不與髙傒處父同辭者恥在中國無伯蠻夷之臣得亢列國之君不在公也唐趙氏則云與他國卿盟則恥之會則不恥故澶淵亦書公會鄭良霄十五年此公孫也其曰仲何也子由父疏之也於時更有公孫嬰齊故稱仲以别之爾疑非疏之秋八月庚辰葬宋共公日葬宋亂故危之也十七年同盟于柯陵會有尹單既不可以王人槩之又緣上文故不復出諸侯也襄三年曰袁僑異之也言大夫當刺而袁僑不當刺故異之也十八年晉人執衛行人石買書執行人譏其不能申伯討釋逐君之賊而但執其使也非大而足同焉此傳文義殊晦後考石經乃知焉字誤本與字耳宋本亦與二十七年溴梁之會至晉趙武為之會也中有寧喜事又至者非一時為重敘文繁故經以諸侯之大夫該之不如傳所云也豹去氏義同左氏亦鑿二十九年其名成尊於上也賢者不名然對吳子而言則不得不名矣故曰成尊於上也昭四年慶封封乎吳鍾離言封鍾離異聞十一年何為名之也至故謹而名之也楚虔躬為弒君之賊而又行詐故不與其討此注與傳違反其論亦當十三年弒君者日不日比不弒也虔死于外不得其日不日者從其實也十九年日卒時葬不使止為弒父也止未踰年而死則悼公之葬或在止既死之後與賊在而不能討者異故書葬歟定十二年何以致危之也何危爾邉乎齊也下年齊侯次于垂葭蓋救成也陪臣結外援以抗君命故以圍言之如二國也義門讀書記卷十一

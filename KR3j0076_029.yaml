body:
  text: 義門讀書記卷二十九翰林院侍讀學士何焯撰五代史歐公作五代史亦多取小説蓋蹈宋氏新唐書之弊雖五代事多闕軼然説家所記未必實録焉可悉取馮定逺云歐公文人又生于太平不知武事每敘戰之際則使人思巨鹿垓下每壯夾寨之戰不使左邱太史公執筆也然三矢告廟之際亦極筆也按歐公敘髙平之戰獨勝想周人猶有紀載可據沙陀不知金匱石室為何事也史闕其文雖左邱司馬亦如之何哉若憑臆編撰則違孔子其所不知之訓正後代史家大失也五代史第一薛居正書名曰五代史歐陽氏書名五代史記卷首去記字近刻之訛也梁太祖紀上注中數語是作本紀法紀下開平元年渤海契丹使者來逺夷使來係中國利害當書前此未通而始至者當書若泛使則見于附録可矣春秋以一經該二百四十年之事若後之為史者其事可以分見何必紛繁書于本紀中也改樞密院為崇政院太府卿敬翔為使樞密使唐本宦者為之溫懲其禍故改為崇政院而首以敬翔為使由此相沿至宋遂與宰相埒號為兩府三年告謝於南郊注不曰有事於南郊亦從其本語蓋比南郊禮差簡按是時親郊必有賞賚不能嵗嵗行之故但告謝而已乾化二年六月疾革郢王友圭反全忠弒昭宗於洛陽亦身如西京而有子禍戊寅皇帝崩注以不得其死故不書葬按為賊所葬故不書非為不得其死末帝紀龍德三年五月庚申宣義軍節度使王彥章為北面行營招討使取德勝南城下脫取德勝南城秋八月段凝為北面行營招討使十八字按書取德勝南城見彥章方立功而反見罷梁主賞罰倒置所以速亡唐本紀上賜姓名李國昌字德興見墓碑國昌子克用至克用乃殺大同軍防禦使段文楚克用是國昌小男唐三朝見聞録謂之李九郎薛居正五代史克用殺段文楚事在僖宗乾符三年者得之唐本紀下伶人奏百年歌唐懿宗與郭淑妃思同昌公主不已樂工李可及作嘆百年曲其聲悽惋蓋當時所尚非陸機所賦也同光二年二月己巳朔有事于南郊梁與唐郊天皆以春左熊威軍將趙暉妻一産三男子注後世以此為善祥故於亂世書以見不然按亂世未嘗無此可以見天心之仁愛而嗜殺之君悖德而失職也然注乃歐公本意三年夏四月及皇后幸郭崇韜朱漢賔第幸大臣第而書及皇后其失自見夏四月丁亥朔皇帝崩莊宗弒于門高而首惡則嗣源也為賊所葬故不書明宗紀長興元年契丹東丹王突欲來奔注夷狄不可以禮義責故不曰叛于契丹按突欲恐兄弟不相容而出奔非外叛故不以叛書注誤廢帝紀平山人也至明宗飬以為子通鑑考異張昭於國初修唐廢帝實録云廢帝諱從珂明宗皇帝之元子也母曰貞憲皇后魏氏鎮州平山人中和末明宗徇地山東留戍平山得魏后帝以光啓元年正月二十三日生於外舍屬趙人負盟用兵不息音問阻絶帝甫十嵗方得歸宗薛史末帝諱從珂本姓王氏鎮州人也母魏氏以光啓元年生帝于平山景福中明宗為武皇騎將略地至平山遇魏氏虜之帝時年十餘嵗明宗飬為己子劉恕取廢帝録按張昭仕明宗為史官異代修廢帝録無所諱避而不言飬子事似可信然李克用光啓以前未嘗徇地山東又從珂若果是明宗子必不捨之而立從榮從珂亦當不服今從薛史附識以廣異聞清泰三年十一月丁酉契丹立晉衛人立晉則其名也此殊不成文晉髙祖紀天福三年冬十月戊寅契丹使中書令韓熲來奉册曰英武明義帝梁唐皆郊見後受尊號石晉則以契丹為天矣五年春正月丁卯朔德音除公私債容齋隨筆天福六年八月赦云私下債負取利及一倍者並放則此所除者想與之同世方尚武四民失業稱貸之際必有不能堪命者故不得已而屢下蠲除之令也出帝紀八年十二月契丹于越使令骨支來石晉為契丹所册立故其于越皆得遣使開運三年河決魚池至河決原武晉之事勢至此即非德光不去亦必亡矣張彥澤犯京師殺開封尹桑惟翰契丹滅晉書殺桑惟翰於契丹滅晉之上所以深著起事不正為後世戒前於唐廢帝紀書立晉此書契丹滅晉以此始亦以此終二語相為呼應漢髙祖紀四年磁州賊首梁暉取相州來歸注變降曰來歸是時天下無主與乎叛于彼而來于此者異矣按來歸者內外之辭隱帝紀乾祐二年注帝名承祐年名乾祐莫大之失本紀無譏按承天之祜禮運語也隱帝名當是祜字五代雖不知禮何至并此昧之祐字傳寫誤耳周世宗紀六年夏四月辛丑取益津關以為霸州癸卯取瓦橋關以為雄州注世宗下三關瓦橋益津以建州乃見淤口關上置寨故舊史實録皆闕不書遂不見其取時日今信安軍是也按宋信安軍亦今霸州地朝説之嵩山集云周以數千之師伐契丹不血而取益津關繼取瓦橋又繼取髙陽關與無黨此注不同考之遼史穆宗紀亦曰周拔益津瓦橋淤口三關故小學紺珠採此注論可謂亂世也歟至誠非史氏之所及也公之意蓋謂亂極當治賴世宗之挺生也然周以子弱宋因其資故隱躍以致意而不敢盡言焉公之論有出于薛氏舊史之表者故于末復略為辨正其失評也梁家人廣王全昱傳而陳俗好淫祠左道陳俗巫風至五代未革唐家人太祖子傳如不幸物故者預言物故則示意殺之矣莊宗劉皇后傳是時大雪至乃投水而死曾鞏政要策云初太宗嘗問唐莊宗享國不久何也飛龍使李重進對曰莊宗好畋而將士驕縱姑息每出近郊衛士必控馬首曰兒郎輩寒必望敕賜莊宗即隨所欲給之如此非一末年之禍蓋令不行而賞賚無節也太宗撫手嘆曰二十年夾河爭取天下而不能以軍法約束此輩縱其無厭之求誠為兒戲我今飬士卒誠不吝爵賞但犯法者惟有劍耳當合此所載並為世監不恤而怨姑息而驕皆足以召亂也魏博效節軍雖數賜豫而驕縱無厭常懷怨望劫趙在禮入魏事詳房知溫傳中當參觀晉家人傳論此論有為言之稍于史體為煩周家人傳太祖聖穆皇后柴氏邢州堯山人也談叢云家人傳后邢州龍岡人世宗紀為堯山人則此作堯山者其後人所改耶梁臣楊師厚王景仁賀瓌王檀王虔裕謝彥章傳此卷始以師厚見梁所由失河北將折而入於晉終以彥章則莫能復為之禦敵而因以速亡也唐臣郭崇韜安重誨傳二人皆任樞密使其生平得失已具論斷于傳中而官失其職則當代之所沿也故獨為説以究切之重誨傳撮敘頗似論體周德威傳德威佯走至奮撾擊之事與擒陳野義同而敘致尤生動符存審傳使梁軍知吾利於速戰至可以取勝存審此謀可謂識變孔謙傳遂罷租庸使額分鹽鐡度支戶部為三司三司始此李仁矩毛璋傳二傳何必立康思立傳亦可不立康思誠傳論此因太祖由殿前點檢代周懼其以此始終故微言之何瓚傳此傳可不立晉臣景延廣傳延廣所進器服鞍馬茶牀椅榻椅字始見於此漢臣蘇逢吉傳觀蘇史楊王所由速及而漢祚之促亦可以推而見矣楊邠傳知史傳有用乃課吏傳寫其用王文伯之言邪死事張源德傳源德既堅守至得赦而後釋之通鑑考異莊宗實録賊將張源德固守貝州既聞河北皆平而有翻然之志詢謀于衆群賊皆河南人懼其歸罪不從因殺源德歐陽史云云按源德若以不降而死其衆當即降于晉豈得猶拒守與晉要約而後出哉孫晟傳收晟下獄及其從者二百餘人皆殺之殺行人已非况其從者二百餘人乎宜乎世宗之不永也唐六臣傳論范吕相攻廟堂始有朋黨之論公蓋借此以發其呼憤故意味終不親切如論宦者亦當載之於唐書若五代史只言世主與唐時宦者之禍耳目相接而復信用之為可愚也張文潛與大蘇書云六人者為唐大臣挈國而輸之賊北面而事之為史者曰汝無臣梁之理從而正其罪何所不可但其書謂之五代史記而中有一卷忽謂之唐唐非五代也標卷為唐於史之名似不順耳雖不云爾尚可以貶辱也班固書有後漢事范曄書亦有前漢事耒以謂若因及之雖上越數代猶為無害但立名標卷事似難行按此論頗當唯宋史書周三臣則得闡幽之道又當通其例之變也宦者傳論夫女色之惑至捽而去之可也如武氏既得志髙宗欲與宰相謀廢之而不可得矣其能捽而去之哉凡議論彼此抑揚處極須斟酌也雜傳趙匡凝是時唐衰藩鎮不復奉朝廷獨匡凝兄弟貢賦不絶匡凝之貢賦不絶亦張子布勸迎曹操之為見耳氏叔琮太祖遣叔琮與李彥威等弒昭宗已而殺之殺之者以其老也賀德倫傳乃分相澶衛三州至以德倫為節度使失河北為梁亡之始由末帝措置非宜而失閻寶傳莊宗欲引兵退保臨濮至此不可失之時也胡柳復振閻寶贊成康延孝傳延孝具言末帝懦弱至不旬日天下定矣梁之虛實形勢悉于延孝丁會傳會畏梁太祖雄猜至會乃降晉劉知俊與會皆梁之名將咸以懼疑降敵張全義傳二人有隙至晉軍解去與罕之隙末詳罕之傳梁救悉丁會傳但會傳作葛從周此作牛存節考從周存節傳從周實主帥而存節以知間道為先鋒會建渡河之謀而存節亦有以椹濟軍之益二事各具本傳而從周傳但云敗晉沇河而已王晏球傳契丹又遣惕隱以七千騎益都惕隱乃官名本紀及附録皆作惕隱無赫也相里金傳字奉金金墓碑云字國寶贈太師墓碑云贈太子太師按金上將軍未得贈太師也張廷蘊傳明宗以廷蘊破潞之隙終恨之故終不秉旄節明宗直如此展拓不開王進傳論視在上者如進等至可勝道哉其在下者亦中人為多爾若賢人君子輩出則世將亨矣即其不遇亦將為説以垂後撥亂返治由其開先也范延光傳制動當以靜天下名言也大臣言彥珣殺母當誅髙祖以謂赦令已行不可失信耶律德光殺楊承勛而敬塘赦李彥珣不如其君父逺矣張彥澤傳偏將藥元福獨留至契丹遁去元福之策固善亦惟諸將皆百戰之餘所以能然傳戎王宣語戎王宣言舊史文也彥澤遣控鶴指揮使李筠以兵監守此又一李筠非周三臣之李筠也與其逃於溝竇而不免不若往見之何如死國難耶王景崇趙思綰傳二人不必立傳但附守貞傳後可矣馮道傳馮定逺云歐公作馮道傳平敘而人品自具無溢美亦無溢惡古人不過也此文勝於唐六臣傳按六臣傳許裴樞或過此六人之無恥何所逃也陳壽序漢魏之際緣在晉故稍遜其詞耳君臣之義賴史筆扶持放過不得道為人能自刻苦至道殊不以為德道為人自屬長者惜其天資可庶幾於一行傳乃以愛官職而墮大節遂為百世所嗤也道方自號長樂老至蓋其自述如此初疑急就篇云長樂無極老復丁道之自號蓋本于此非也長樂乃馮氏之望封長樂者不一人歐公亦微誤蓋以其有老而自樂何樂如之之語遂以為自號爾鄭珏傳此傳可已司空頲亦可無立劉昫傳門下侍郎監修國史監修國史即唐書也莊宗繼昭宗故謂之國史馬縞傳博士王丕議至而立廟應州因王丕一人之不學而失禮之中又失禮焉其愈于近代者則立廟應州耳李懌傳如懌但當附見他傳和凝傳是時進士多浮薄至稱為得人今人用徹棘事多誤而又誤圍作闈也何澤傳而內實邪佞至聞者哂之此事不可遽加以邪佞蓋并私于趙鳯請立秦王為太子言之也王松傳不必立傳司天職方考序但存司天職方者蓋謂五十三年之間蕃將與盜賊乘時之亂非所據而暗干之綱紀文章掃滅無餘所不毁者惟天地而已司天考上而使一藝之士至而未始不本於此元人不用歷元蓋微自歐公發之不然曹士蒍馬重績之法未有肯信而仍之也司天考下本紀所述人君行事詳矣至以備司天之所考災祥者人君之庶徵所以自反其極之建不建者也當如兩漢書之本紀歐公必欲離而二之又非也吳世家楊渥水中出火可以燃水中有隂火伏焉又因濬江相激而發耳南唐世家李忭尊號非古也不許李忭不受尊號在宋神宗事前景盟于忭柩前約兄弟世世繼立此盟有先宋太祖兄弟而為之者矣前蜀世家王建莊見素之孫唐書宰相世系表莊待價之後出逍遙公房見素自出南皮公房非同系書俱出歐公手而互異若此論以一隅之地而云祥瑞畢至或者諛佞之臣偽為以蠱主心否則設詐以炫耀他國愚主所自為爾今并以麟為非祥豈不過甚而與河圖洛書怪妄之尤繫詞非孔子作連類歟吳越世家錢鏐封鏐吳越王兼淮南節度使兼淮南者擕錢楊之交也南平世家髙從誨敏以印本五經遺從誨經之成在周顯德中此時則五經已具也繼沖繼沖大將李景威曰至封府庫以待景威光憲無妨兩是區區三州固宜效順以全宗祀非若劉禪有漢家四百餘年統緒之責也東漢世家劉旻旻乃遣宰相鄭珙致書兀欲稱姪皇帝以叔父事之而已宋之南渡所保者李煜錢鏐故地其事金則劉旻之故事也戰於髙平至軍威大振是役與唐莊宗夾寨之戰略相似馮道謂世宗未可比太宗顧獨不得比莊宗乎四夷附録契丹阿保機遣使者解里隨頃至克用聞之大恨阿保機欲邀朱溫封册而尚難之然則宣和海上之盟烏得不納侮於金源也册曰咨爾子晉王至爾視豫猶父册文止載三語以著其實足矣而阿鉢本無姓氏至於是始姓蕭遼史蕭翰本名小漢蓋對音字也論嶠歸録以為陷虜記范質亦有石晉陷蕃記見朝公武讀書志云少主初遷于黃龍府後居於建州凡十八年而卒按契丹丙午入汴順數至甲子嵗為十八年實國朝太祖乾德二年也髙麗昭進别敘孝經一卷至皆不經之説凡書不經前賢論定者往往不足觀採求異書不如求亡書也義門讀書記卷二十九

body:
  text: 義門讀書記卷十九翰林院侍讀學士何焯撰前漢書趙充國傳充國常以逺斥候為務至先計而後戰此所謂先為不可勝以待敵之可勝也虜以畜産為命至虜必震壊明之邉帥但知有此策留弛刑應募漢已有應募從軍之人但如能使絶域之比不在尋常調發之數所善浩星賜迎說充國曰至卒以其意對如張安世當此必從浩星賜之言矣營平乃真社稷臣雖託孤寄命可也初破羗將軍武賢在軍中至下吏自殺中郎將雖為武賢所䧟然大將當重任宜以壯侯為法卬之得禍自坐不慎非徇衆而不為國家圗萬全遂可以智免也辛慶忌傳然性好輿馬號為鮮明唯是為奢唯是為奢非奢於衆人也在慶忌則此之為已奢矣傅介子傳公卿將軍議者咸嘉其功光所遣也故無異議常恵傳烏孫皆自取鹵獲至烏孫人盗恵印綬節烏孫一有功則鹵獲皆自取并校尉之印綬節使盗竊之以去其不足信仗明矣大將軍霍光風恵以便宜從事大將軍前遣介子又風常恵時去武帝未乆猶慕逺略不深計萬一生事起釁也鄭吉傳鄭吉㑹稽人也謝承後漢書鄭宏㑹稽山隂人其曽祖父本齊國臨淄人官至蜀郡屬國都尉武帝時徙强宗大姓不得族居將三子移居山隂因遂家焉長子吉雲中都尉西域都䕶按吉出自卒伍未必有官閥但為宏之從祖居在山隂或可信也陳湯傳吉上書言中國與夷狄至竟殺吉等吉書辭頗壯漢自張騫通西域之後應募使絶域者率不顧死亡邀功生事必不可聴許也兵來道逺至願單于與大臣審計策示弱以堅之使毋走下郅支所云不如堅守漢兵逺來不能乆攻為此語所紿也諸鹵獲以畀得者此云諸鹵獲以畀得者則湯無私焉下云湯素貪所鹵獲財物入塞多不法豈丞相御史固誣枉之歟石顯匡衡以為延夀湯匡衡之上冠以石顯史家之辭嚴矣揚威昆山之西昆山當指崐崘而言贊陳湯儻􅛅至故備列云陳湯為劉向所稱又自能屬文其誅郅支單于事紀載必詳故此傳亦如生在焉雋不疑傳諸君何患於衛太子至遂送詔獄定大事非此不可此權也豈必果應經意于定國傳于公以為此婦養姑十餘年以孝聞必不殺也十餘年則安於孝節矣故知殺姑為必無也定國乃迎師學春秋身執經北面備弟子禮黄霸于定國皆晚嚮經術故起獄吏致宰相而無曹人維鵜之刺如丙吉則尤能施於有政者也冬月請治讞冬月請讞似今之秋審薛廣徳傳縣其安車傳子孫公羊家說縣輿與此異義見仍叔之子來聘䟽中平當傳周公既成文武之業至孝之至也此臨川新安廟議所本然后稷始封之君有粒民之功太王肇基王迹王季其勤王家太上皇未可援此為比孟子但言以天下養非文王之聖周公亦不敢以配天也言勃海鹽池可且勿禁以救民急弛鹽禁亦救荒一法不假轉饋賑濟之勞勃海亦可謂之鹽池今人獨以稱解鹽子晏以明經歴位大司徒再世皆明經故至宰相彭宣傳朕唯將軍任漢將之重至非國之制此亦宣之踈謬也贊薛廣徳保縣車之榮至異乎茍患失之者矣師古注贊言當宣二人立操有異於此按贊并廣徳言之讀序傳可見王貢兩龔鮑傳漢興有園公綺里季夏黄公甪里先生至不亦寳乎以諸人事迹不備故總序之於傳首盖亦傳也以此為論者未讀序傳耳體與後牽連薛方郭蔣諸人例同有邪惡非正之問至各因勢導之以善易不可以占險斯正理也王吉傳臣聞古者師日行三十里篇其言凛乎可畏復藹然可親真醇儒心聲非所以全夀命之宗也宗本也皇帝仁聖至未有所幸孝昭天資之美如此其不克夀者得氣薄也臣聞聖王宣徳流化至夀何以不若髙宗可與伊訓說命相表裏漢廷書䟽未有能過之者也復遣使者弔祠云弔祠即後兩龔傳中韓福故事初吉兼通五經能為騶氏春秋騶氏春秋至班史時已成絶學有錄無書故於兼通五經之下復特著之駿子崇以父任為郎王吉請除任子之令而王駿任其子為郎此駿之失也貢禹傳今大夫僭諸侯至在於陛下天子過天道非經生無此言又皆以後宮女置於園陵宮人奉陵自孝武茂陵始昭宣循之遂為故事陛下烏有所言謂諒闇不言也審察後宮擇其賢者留二十人餘悉歸之僅留二十人則不足以給使令如昏義之數可也獨杜陵宮人數百誠可哀憐也獨杜陵一處已有數百矣茂陵平陵不言者已多老死也自城西南至山西至鄠皆復其田以與貧民即武帝所起上林苑地民産子三嵗則出口錢故民重困至於生子輙殺甚可悲痛是殺人子多矣宜乎戾園之敗也孝文皇帝時貴㢘潔至海内大化孝文寛而有制所以異於仁柔自見功大威行至誅不行之所致也自秦為無道風俗大壊昔者賈生所痛哭也文景相繼導以忠厚武帝復壊之至是盖又一秦矣讀貢公之書吾亦為之痛哭兩龔傳漢兄子曼容曼容名丹見儒林傳勝自知不見聴至積十四日死勝已謝事歸老漢亡可以無死故五威存問外仍安之即講學之徴亦僅稱疾不應及使者再至印綬加身要以必行五日起居守之不去然後明語門人餓死報漢可謂從容中道不辱其身者也朝服對使以愚老遜辭下無累及子孫善哉鮑宣傳奏宣舉錯煩苛至為衆所非此賢者之過欽言是也始隃麋郭欽至平帝時遷南郡太守郭欽能奏董賢又不仕莽雖與鮑宣同異何害為君子也贊守死善道勝實蹈焉言見㡬先去為莽所廹卒又死之合於孔子之經也韋賢傳夢我瀆上立於王朝易曰再三瀆言夢中猶諫之也上謂王時賢七十餘至丞相致仕自賢始父知恥故子亦能讓然當其自少府入相已宜引年乞身矣元成父賢以宏當為嗣故敇令自免宏懐謙不去官宏先有讓徳宜韋氏之熾以昌也與宗家計議漢去古未逺韋氏世傳經業宜有宗法則宗家者其宗子也非師古所云同族之謂而東海太守宏子賞至列為三公韋氏餘子復以明經列於三公然則世祿之家欲為子孫計奈何不務傳經反蹈䟽傅損志益過之戒哉又園中各有寢便殿後書祭祀志云古不墓祭漢諸陵皆有園寢承秦所為也古宗廟前制廟後制寢秦始出寢起於墓側漢因而弗改盖聞王者祖有功而宗有徳至其正禮儀此詔獨取許嘉尹更始二議得之於義一體言不得復顧私親以皇考廟上序於昭穆又以為孝莫大於嚴父至尊祖嚴父之義也此指孝文太后孝昭太后言而孝武廟親未盡故未毁至唯郡國廟遂廢云孝武㡬亂天下豈得復居不祧之列夏侯長公始議廟樂者韙矣建昭詔書乃病困不擇音也於是光祿勲彭宣至不宜毁彭宣等五十三人議是舜歆伸尹忠之議為元帝誅斬郅支單于得稱髙宗之地耳一方有急三靣救之非當時實事以奪其肥饒之地此指朔方及開河西四郡功業既定至其規橅可見以輪臺晚盖一節盡冺其虚耗中國之迹禮記王制及春秋穀梁傳天子七廟至與太祖之廟而五匡衡五廟之說似尤深然合隂陽五行數之則可以七為斷矣以七廟言之至則不可謂無功徳但以七廟言之斯可矣聖人於其祖至失禮意矣遷則不必復毁此亦近情至平帝元始中大司馬王莽奏至罷南陵雲陵為縣此奏合禮雖王莽為丁傅衛氏發難然不以人廢與東京之末董卓蔡邕議和帝以下不應為宗奏同贊考觀諸儒之議劉歆博而篤矣歆議廟制可謂深博武帝稱宗則非篤論固當區别觀之也魏相傳大將軍用武庫令事遂下相廷尉獄責過之是也下之獄則喜怒之偏鄰於作威矣遂為子孫他日之憂可不慎哉相因平恩侯許伯奏封事因許伯乃得直至帝前也御史大夫已列三公位舉大事猶慎密如此其不因王史而因許者専欲發其弑許后之謀也子復為大將軍大將軍當作右將軍又故事諸上書者皆為二封至宣帝善之此一時制霍山之權計後遂行之則失虞廷命納言之意矣間者匈奴嘗有善意至臣愚不知此兵何名者也史遷作匈奴傳深疾徼權納讇以便偏指人主因以决策建功不深而歸本於擇任將相假使馬邑始禍之時丞相即能為弱翁之納諫何為有三十餘年兵連不解之患哉今郡國守相至而在蕭墻之内也此伊周之用心非徒治黄老者所能知漢相識治體無逾弱翁此奏宋李文靖頗得此奏遺意臣愚以為隂陽者王事之本至而觀於先聖在天為隂陽在人為仁義此深探治本之言但前後所陳却别是一種漢學中謁者趙尭舉春李舜舉夏兒湯舉秋貢禹舉冬師古曰髙帝時自有一貢禹也按此趙堯亦非髙帝時為御史大夫者也丙吉傳吉奏記光曰將軍事孝武皇帝至天下幸甚丙公不以文采自曜奏記所言皆合體要真能學詩禮者也掾史有罪臧不稱職至公府不案吏自吉始因以為故事則姦吏遂無所懲艾矣丙公當宣帝之朝方練羣臣核名實不妨時有寛舍可否相濟耳西曹主吏白欲斥之續志西曹主府史署用召東曹案邉長吏續志東曹主二千石長吏遷除及軍吏夏侯勝傳長信少府勝獨曰至不宜為立廟樂勝此議不愧經生為勝素服五日以報師傅之恩太后猶素服五日則後之為師服者士庶當服小功亦因時而以義起者歟京房傳得除用它郡人欲上下相伺故除用他郡人也拜上封事曰辛酉以來至令不得乗傳奏事者房封事率如囈語其不足以回主意也决矣初淮陽憲王舅張博至皆持東與淮陽王庸鄙之人不可因親昵而漏言如此徐立中官也故後獨得免房本姓李推律自定為京氏任臆誣祖以術亡身其始兆矣翼奉傳二隂並行是以王者忌子夘也二陽並行是以王者吉午酉也忌子卯吉午酉相對而言翼氏專主二隂二陽與賈氏所云夏殷興亡異義張氏相刑之說亦失本意虚静以待物至蘇子瞻赴定州狀本其意臣奉竊學齊詩至適所習耳此語實非謙也臣又聞未央建章甘泉宫才人各以百數至出其過制者貢禹以前翼奉先言之以太皇太后誥放先帝園宫人處置亦得體按成帝紀永始四年京師火災屢降出杜陵諸未嘗御者歸家去奉奏封事時初元二年已三十五年矣國家之費當數代之用當數代之用即此可以明國祚脩短之數矣功徳薄而福饗已泰未有不敗者也李尋傳五經六緯尊術顯士言緯者始見於此故張衡謂䜟始哀平徳列王道泰誓孔子取之故云徳列王道乆汙玉堂之署漢時待詔於玉堂殿唐時待詔於翰林院至宋以後翰林遂幷蒙玉堂之號故日將旦至有常節此亦古書相傳之語讀之皆有韻大司空師丹執政諫争政當作正執守也夫過而不改至皆蠲除之哀帝此等語尚非亡國之主故獲保令終贊此贊在當時與桓譚諫光武不當聴納䜟記之言相發趙廣漢傳又教吏為缿筩孟康曰如今官受密事筩也按孟康曹魏時人已有受密事筩則廣漢此法歴代施用不至於武后始行廣漢亦祖王温舒廣漢為二千石至即時伏辜廣漢以㢘潔通敏下士為名其天資大抵與張湯相近郡中盗賊至皆知之知其根株窟穴所在則可以不煩而理然破柱捜轑非明主在上安可盡行其意耶廣漢奏請令長安游徼獄吏秩百石其後百石吏皆差自好不敢枉法妄繋留人此事特可法初大將軍霍光秉政至廣漢由是侵犯貴戚大臣所居廣漢始欲以此自逺於霍氏耳因帝善之而遂以為務則謬矣司直蕭望之劾奏廣漢摧辱大臣至下廣漢廷尉獄此廣漢應得之罪威制豪强小民得職為京兆止此八字訣但勿效趙君私論榮畜詐脅魏相即無患耳非貴戚大臣不可侵犯舉天討皆不行於豪强也尹翁歸傳縣縣各有記籍自聴其政必皆自聴此能吏欲為名髙非政體也豪强有論罪至扶風大治此威嚴之過後陳咸效之而加甚焉韓延夀傳乃歴召郡中長老至為吏民行喪嫁娶禮此亦非能吏不可若徒襲偽迹則王莽之治天下矣又置正五長至吏輙聞知置正五長即今保甲之法此賢於尹扶風之以名籍推迹所過抵逺矣故為政不可無法度也按後書百官志里有里魁民有什伍善惡以告其互相檢察本漢制也豈必得如長公者為之乃有實效歟在東郡三嵗令行禁止斷獄大減為天下最扶風以盗賊課為三輔最東郡以斷獄大減為天下最能吏將何從延夀不得已行縣至髙陵至不敢犯惟不輕出偶㑹此事推誠動之足為表勸若屢屢嘗試即兒戲矣此亦兵法中之田單火牛也嚴詡之為潁川可鑒戒延夀代蕭望之為左馮翊至廪犧官錢放散百餘萬廣漢犯魏禍由已作韓則直為蕭公所䧟矣然胡不少忍之閉閤思過能施之吏民獨不可使曲盡歸他人乎移殿門禁止望之嚴延年傳注張晏曰故事有所劾奏並移宫門禁止不得入張敞傳其治京兆至天子數從之參趙京兆韓馮翊之意用之處大議時似雋不疑則本治春秋之力也敞聞舜語至冬月已盡延命乎收之是也殺之過矣必反其語則兒戲矣漢人尚氣不學率如此敞孫竦王莽時至郡守封侯竦事詳莽傳及游俠傳杜鄴傳王尊傳春正月美陽女子告假子不孝至吏民驚駭非常之變故於春正月殺之後上行幸雍過虢劉原父曰自長安上雍不過虢過美陽虢字是史氏誤按劉說是也尊已轉守槐里不為虢令矣毋持布鼓過雷門㑹稽擊鼓聲聞洛陽乎此流俗妄談不當引以注史况西漢㑹稽治吳與越何與又正月行幸曲䑓至皆不敬此二事不當并言之失輕重矣故御史丞得目為飾成小過也尊曰治所公正師古曰謂司𨽻官屬為治所者尊之也若今謂使人為尚書矣按治所即謂司𨽻治所非使人尊稱尊撥劇整亂至名將所不及趙子都威制豪强小民得職王子贛撥劇整亂誅暴禁邪孫寳為京兆尹三嵗京師稱之然橈於定陵不敢取杜穉季故不得列諸公後也王章傳章曰非女子所知也毁石顯撃王鳯皆為國家扞禦大慝巨奸即免官誅死復何所避果非女子所知也假使徒以巧宦自肥則仲卿亦一朝廷尊貴人矣盖寛饒傳方今聖道寖廢至則不居其位四語自切中當時之弊惜其非信而後諫也稱引易傳不類遂如王生所揣上無許史之屬屬當讀之欲反謂屬托也應說是以下文直道而行多讐少與之語求之自見諸葛豐傳使尚書令堯賜臣豐書曰至順經術意元帝若行許章之罰而後以此書賜豐則得之矣今以禁門為邪臣逋藪而空以中和戒奉公之吏是後世所謂和事天子也上不許是後所言益不用豐復上書去其節而不用其言豐當去矣何以復上書為鄭崇傳逆隂者厥極凶短折逆隂之論惜乎不詳尚書令趙昌佞讇至請治大族尤易為人誣構得禍有甚於子游者矣亦賴崇遂死禍止及一家小人欲傾人以自固何所不至建武中錄舊徳臣以寳孫伉為諸長寳橈定陵是其㣲過然不附王氏始終一節亦何武鮑宣之儔故建武中錄其後也母將隆傳莽秉政使大司徒孔光至但與隆連名奏事隆失於不能争耳乃莽以私怨并中之然此大事豈可輕署名其間但以事非由己為苟容乎何竝傳先是林卿殺婢壻殺其壻而納以為婢非如師古所云外人與其婢姦者也罪在弟身與君律廷尉典法之官三尺是掌故曰君律死雖當得法賻勿受法賻猶不受則豈肯賦歛送𦵏為妻子産業計觀原渉傳讓賻顯名志節彌堅矣贊然母將汙於冀州母將之事本非其罪然名則難解也故止曰汙蕭望之傳望之以為烏孫絶域信其美言萬里結婚非長策也望之所論邉事皆守文時長筭逺計不可忽之為迂望之以為單于非正朔所加至天子采之觀王莽以易璽啓釁自知望之所見之深長非宣帝天資絶出不能采用春秋榖梁傳曰貫之盟管仲曰江黄逺齊而近楚楚為利之國也若伐而不能救則無以宗諸侯矣事雖殊意則同盖聞五帝三王至贊謁稱臣而不名大哉此詔以五帝三王為師而不惟乃曽祖之法可謂謙而彌光矣望之以為中書政本至白欲更置士人此誠急務然發之太驟人主未能真見其失持疑不斷小人廹而合以謀我反為所擠而事終不成矣故孟子欲定國必先格君心也出劉更生為宗正望之堪數薦名儒茂才以備諫官㑹稽鄭朋隂欲附望之人不易知遽求推賢進士之名不深察歴試則必有小人雜出其間内相攻矣一更生人得出之於外亦何暇於數薦哉雲者好節士勸望之自裁至竟飲鴆自殺如使不死就獄㳟顯其遂已乎徒舉生平而盡棄之耳朱雲之勸未可云非望之之失在主意未堅教子上書自速羣小致死於我也馮奉世傳少府蕭望之獨以奉世奉使有指至奉世不宜受封望之之議正論也但奉世因莎車攻刼南道發兵攻㧞之以解危難非要功生事可比封之足為後法不可以不權其事勢也若莎車不㧞則鄯善以西皆絶不通所送大宛諸國客何以得達是矯制發兵正以全使指也奉世似當與傅鄭諸人合傳以諸子皆有名迹野王又不可附之外戚傳中故特立此傳也野王在位多舉野王至以昭儀兄故也野王為石顯所間故不得為三公當以佞幸傳叅觀之帝之引嫌顯所教也參字叔平學通尚書至甚可觀也馮氏父子兄弟各通一經獨少禮耳而叔平復恂恂可觀得禮意矣宣元六王傳楚孝王囂子紆嗣王莽時絶至立為天子紆子般後書有傳范氏稱自囂至般積累仁義世有名節而紆尤慈篤般子愷復以讓爵顯盖宣帝有功徳於民而元帝以後國統三絶其餘慶在楚矣中山哀王竟無子絶太后歸居外家戎氏既立為國君則不當殤矣乃不為置後使其母歸居外家失禮甚矣豈當時謬引子卒夫人姜氏歸於齊之文耶定陶共王康上以太子奉大宗後不得顧私親至徙定陶王景為信都王云楊廷和不知先為興王立後故啟異日紛紜若成帝已有此舉哀帝復蔑大宗而顧私親且徙景封其悖甚矣宜享國之不永也中山孝王興御史大夫孔光以為尚書有殷及王兄終弟及師古注謂兄死以弟代立非父子相繼故言及按公羊曰臣子一例也及謂次第及之然未嘗不如父子相繼之禮三綱五常三代相因周如是則殷亦如是顔注惑於後儒之說耳太皇太后以帝為成帝後故立東平思王孫桃鄉頃侯子成都為中山王奉孝王後此孔光知太后王氏追怨哀帝遂不復主及王之議使哀帝絶嗣也匡衡傳臣聞治亂安危之機至正家而天下定矣衡為少傅數年乃遷光祿勲時建昭元年也則上此疏時在初元三四年間按宣帝不好儒術任用法律而中書宦者用事元帝初立蕭望之周堪以師傅受遺輔政選白劉更生金敞拾遺左右四人同心謀議勸道以古制多所欲匡正以中書政本欲更置士人中書令宏㳟石顯與車騎將軍史髙表裏常獨持故事不從望之等初元二年十二月遂譖望之令自殺堪更生等皆廢衡本因史髙進此疏所謂遵制揚功者盖與髙顯等隂為唱和務堅帝以率由宣帝故事所謂釋樂成之業虛為紛紛巧偽之徒不敢比周而望進皆以杜塞堪更生復進之路如得其情雖夷之誦六藝以文姦言可也後條言慎妃后别適長則以身為師傅禍福共之石顯又常擁佑太子髙子丹帝命䕶太子家故衡敢以為言且兩事並陳聴者尤不之疑耳孔光傳莽以光為舊相名儒至令上之細尋莽傳當元始初政非光為言則莽猶不能必得之於元后也踰耆之叟甥舅相與雷同以助成莽之聲勢死何面目見先聖乎光常稱疾至固稱疾辭位莽之即真王舜劉歆未嘗不内懼甄豐不恱覺而見誅失之於始即憂懼孰可解免輸人宗社之罪哉馬宫傳本姓馬矢宫仕學稱馬氏云宫與平晏事莽尤儒之賤者著此以别於他馬如執金吾馬適建奉使馬宏之屬馬適亦兩字姓王莽傳有鉅鹿男子馬適求贊彼以古人之迹見繩古人之迹謂以道事君不可則止薛宣傳大率咎在部刺史至未必不由此也五舅封侯黄霧四塞而宣懐王鳳一薦之徳輙以部刺史舉錯煩苛當嘉氣尚凝之咎雖所言似在職任所總實姦之大者罪在谷永杜欽先也初宣有兩弟明脩至皆是廷尉中丞議是也朱博傳常令屬縣各用其豪桀為大吏至以是豪强慹服此於今齊俗尤宜然非徤吏惡能利其銜策哉部掾以下亦可用漸盡其餘矣以未獲三人責部掾以下也今法獲賊過半即免處分王卿之負可以釋矣三尺律令人事出其中二語得律意矣議者多以為古今異制至無益於治亂王莽蘇綽宋神宗皆昧此理然吾家汜鄉君公謂不可以丞相獨兼三公之事則可採也常有野烏數千棲宿其上按顔氏家訓文章篇野烏當作野鳥臣請罷刺史更置州牧以應古制至置刺史如故罷刺史而置州牧東漢遂以此亡非特功效陵夷也子元議是當合後書百官志注中劉昭語觀之故事居部九嵗至咸勸功樂進每嵗盡詣京都奏事則天下之情上通居部九嵗則所部利病周知中興以後但因計吏不復自詣京師與天子隔逺權寄輕矣翟方進傳為朔方刺史再三奏事遷為丞相司直是有異材功效著者輙登擢不必滿九嵗限也吾家汜鄉侯為揚州刺史五嵗入為丞相司直前此則黄霸為揚州刺史三嵗遷潁川太守然好樂士大夫至然終用敗子元快吏趙京兆尹扶風之亞少而與蕭陳結交慕用為侠未有不致敗者况位逾其量乎博曰已許孔鄉侯有指至請皆免為庶人子元為相猶行匹夫然諾又不審其事之邪正并奏汜鄉武詭譎罔上哀哉為大臣可不聞聖人道耶彼徒内計上順東朝之指撃排放廢之臣可以萬全必得豈知哀帝亦欲自攬威福之權一朝見疑凡彼所謂利者即所以為害者也是故不恤身後之名者常速及身之禍哀哉贊又見孝成之世至博亦然哉贊得其隱如王鳳之䧟王商廢馮野王是也翟方進傳竊聞政令甚明至其後少㢮威嚴此即丙吉所以戒魏相者然居官則死其職使豪强不戢小民無告雖致宰相何取焉况亦有命耶及後母終至不敢踰國家之制後書安帝紀元初三年初聴大臣二千石㓨史行三年䘮注云文帝遺詔以日易月於後大臣遂以為常至此復遵古制方進之事是其徴也方進知能有餘至以固其位翟子威心術亦朱子元儔也儒雅過之吏事不及居相位九嵗挾私報復剝䘮元氣足以感召災變卒坐自殺非不幸也奏請一切増賦至變更無常此又其禍之及民者為詔書中已詳故史家不重敘上祕之至禮賜異於他相故事以方進塞變故秘之而加殊禮也攝皇帝若曰大誥道應劭曰言以大道告於諸侯以下也按道書作猷當訓為言非大道之謂天亦惟勞我民師古注言天欲撫勞我衆勞音来到反按勞當讀如字書曰天亦惟用勤毖我民也信父故東平王雲至後雲竟坐大逆誅死莽以義等傳檄郡國言其鴆弑孝平皇帝故反以此言誣信父雲莽於是自謂大得天人之助至其年十二月遂即真矣史家書此以終義之事其予義至矣谷永傳帥舉直言作師舉為是絶郤不享之義義當作儀誠敕正左右齊栗之臣齊當讀側加反百官盤互師古注互字或作牙按互古字作㸦與牙不同顔後觧頗乖小學是則車騎将軍秉政雍容於内而至戚賢舅執管籥於外也此語直構㑹平阿宜車騎之終身不平也抑損椒房玉堂之盛寵時嬖幸小人亦有參錯於玉堂待詔之中者故竝舉椒房玉堂言之杜鄴傳吉子竦又幼孤從鄴學問亦著於世尤長小學按郊祀志吉父敞好古文字辨羙陽鼎所刻欵識吉盖傅其家學也何武傳遷揚州刺史至州中清平敬待二千石之效王嘉傳中詳之西京部刺史莫如君公之莅揚州者此後世監郡所當法也莽從弟成都侯王邑為侍中至太后竟自用莽為大司馬莽之矯偽自哀帝時已發露矣而舉朝猶承順元后之指同聲舉之君公為令免歸王音實舉方正為守免歸王根復薦得徵至安危之際獨守親疏相錯之議不肯為王氏用所以為貞臣也不宜令異姓大臣持權師古注異姓謂非宗室及外戚按非宗室及外戚則泛指異姓下文禄與君公不當互相舉矣周禮司儀注異姓婚姻也庶姓無親者也南陽彭偉杜公子彭杜亦頼不附莽而傳稱至今王嘉傳加食邑千一百户按朱博傳云故事封丞相不滿千户此千一百户故云加於是嘉與御史大夫賈延上封事言至思報厚恩也按哀帝使晏先持詔書示嘉延正欲丞相御史分封賢之謗耳二人不正言其不可而教以延問公卿大夫博士議郎則是又欲諉過於下賢猶在可封之數特大臣不肯為天子任其咎也其何以卒奪之哉是公卿股肱莫能悉心務聰明以銷厭未萌之故嘉當以此時被責乞骸骨去矣制詔免相等皆為庶人至臣竊為朝廷惜此三人此三人當俟事稍白乃徐為言師丹傳丹議獨曰聖王制禮至非所以尊厚共皇也此議真天理人情之至附之經可也太皇太后詔大司徒大司空曰夫褎有徳至封丹為義陽侯此詔文自當理不以莽廢義門讀書記卷十九

body:
  text: 義門讀書記卷四十五翰林院侍讀學士何焯撰文選賦此書於詩賦已總其要賦祖楚詞别有專集故騷列詩後僅標舉大畧郊祀樂府自為一體事關制作難復限以文章遂從闕如鮑謝採録不遺陶令獨為隱逸之宗則具諸本集至於衆製則嬴劉二代聊示椎輪當求諸史集建安以降大同以前衆論之所推服時士之所鑽仰蓋無遺憾焉班孟堅兩都賦序此賦蓋因杜篤論都而作篤謂存不忘亡安不忘危雖有仁義猶設城池蓋以都洛尚非永圖特以葭萌不柔未遑論都國家不忘西都也故特作後賦折以法度前賦兼戒後王勿效西京末造之侈又包平子兩京之㫖也詞藻不如相如其體製自足冠代以備制度即制為法度也以極衆人之所眩曜謂西都折以今之法度謂東都法度與陋字反對西都賦前篇極其眩曜主於諷刺所謂抒下情而通諷諭也後篇折以法度主於揄揚所謂宣上德而盡忠孝也二賦猶雅之正變五詩則兼乎頌體矣若乃能諷斯麗者皆則徒勸斯麗者為淫祝氏古賦辨體謂先正而後葩詩之所以為詩先麗而後則此賦之所以為賦蓋不過尋行數墨之見耳嘗有意乎都河洛矣陋洛邑左據函谷二崤之阻至則天地之隩區焉此後篇之所謂保界河山也及至大漢受命而都之也應其故挾灃覇水經注云覇水古曰兹水秦穆覇世更名此水為覇水以顯覇功然則覇水不當加水旁也按酈此語本之漢書地理志故覇陵覇橋皆不加水圖皇基於億載見後王所當睠顧故窮㤗而極侈以下應其制窮㤗極侈四字一篇眼目以下皆發明此句所以極其眩曜也遊士擬於公侯列肆侈於姬姜總不出乎眩曜蓋以强幹弱枝隆上都而觀萬國也收此一叚有勢有力封畿之内至號為近蜀此叙畿内之沃飫其宫室也體象乎天地至惟所息宴此後篇之所謂矜夸館室也隋侯明月宋本作隨為是史記雖本有隋字但此處宋本及後漢書皆作隨不獨隋文帝始去辵也又有天禄石渠至校理秘文當日處文士於禁中以便咨訪不專奄寺也掍建章而連外屬俞犀月云此特以建章言之以見武宣之盛按俞説非也此特言建章猶後宫特言昭陽但以眩曜西都曩日所有耳故下文即言臺言樓言地以繼之建章是武帝所作亦與宣帝無與也爾乃盛娛游之壯觀奮㤗武乎上囿以上極言宫闕之侈至此則及武事因兹以威戎夸狄耀威靈而講武事得此二句非盤游非黷武招白鷴鷴後漢書作閒注云招猶舉也弩有黄間之名此言白閒蓋弓弩之屬今以揄文竿句例之當以後漢書為正國藉十世之基至各得其所此等語非孟堅不能下東都賦功有横而當天計有逆而順民功有横計有逆皆言其不得已後漢書注引逆取順守之説非是一作攻討往者王莾作逆至乃致命乎聖皇氣質雄健體元立制注杜預左氏傳注曰凡人君即位欲其體元以居正按如體元字乃杜注用班語不當引後注前更造夫婦至人倫實始法度至于永平之際至總八方而為之極以下言永平修禮崇樂廵狩之事正予樂五臣本作雅非是當依王厚齋説改正躬覽萬國之有無至總八方而為極復覽萬國之有無然後修治京邑營立宫室於是皇城之内至誼合乎靈囿明帝宫室之麗苑沼之作並合前制則必臨之以王制至乗輿乃出鋪陳處皆言其法度乘時龍後漢書注云馬八尺以上為龍月令春駕蒼龍各隨四時之色故曰時也李注引易非是萬樂備百禮暨收上禮樂乃申舊章至沈珠於淵法度昭節儉至損乘輿之服御躬行以率之頌曰盛哉乎斯世頌字起下五篇之詩子徒習秦阿房之造天二句應矜夸館室識函谷之可關二句應保界河山四語應起處子實秦人今將授子以五篇之詩波瀾富甚明堂詩五詩仿封禪文賦本古詩之流故以頌系之明堂即以光武配故不更及建武之治靈臺詩明堂辟雍靈臺三詩皆興滅繼絶潤色鴻業之事後寳鼎白雉二詩則皆衆庶悦豫福應尤盛之事妙在此詩中爰考休徴以下即上下相銜聫絡血脈仍不離望祲氛觀雲物本事所以自然張平子西京賦平子工於換字東京中雜陳衆事亦無卓識蔚宗不載于本傳斯得之矣當時疑其勝孟堅謬妄莫可追也薛綜注此注謂出於薛綜疑其假托綜是赤烏六年卒安得見王肅易注而引用之耶綜傳有述二京解之語恐亦不謂此賦也又孫叔然始造反切未必遂行于吳三階重軒鏤檻文㮰注引西都賦及王褒甘泉頌按班張相去未逺如何引以為注况王叔師更在張後耶坻崿鱗眴棧齴巉嶮襄岸夷塗修路陖險觀此嶮與險蓋兩字仰福帝居顔氏匡謬正俗云副貳之字本為福從衣畐聲西京賦云仰福帝居傳寫舛訛轉衣為示讀者便呼為福禄之福失之逺矣於是采少君之端信二句端信貞固皆㣲詞下乃反言也想升龍於鼎湖漢武作鼎湖宫於藍田見揚雄羽獵賦注建元弋杜牧詩已建元戈收相土應迴翠㡌過離宫疑即用此今刻元弋者恐非史記天官書杓端有兩星一内為矛招揺一外為盾天鋒晉灼曰外逺北斗也一名元戈虞人掌焉至載獫􅀈獢亡友程湘蘅云賦京都而獨於遊獵處太詳其體皆自子虛上林來較之立言之體要為無當不免承襲之陋耳班賦亦然然筆力壯偉殆不覺也三都則彌甚矣按上賦其靜此賦其動農隙講武既自三代以来漢承秦後車鄰四鐵田狩園囿是先異乎承襲無當也匪唯翫好至實俟實儲𢃄叙小說疎宻相間頓挫即具其中是時後宫嬖人至其樂只且又帶叙作一間上無逸飛至遑恤我後都為下篇張本華嶽峩峩亦以物象之使若列仙所居也徒以地沃野豐至馨烈彌茂諷刺即在鋪揚之内東京賦七雄並爭競相髙以奢麗此句是作家手叚彼云同宅西秦豈不詭哉却説六王皆以奢麗自亡則據雍自強不攻自破趙建叢臺於後趙世家無武靈王起叢臺故事漢書鄒陽傳注以為趙幽王友所建注誤守位以仁注綜作人按觀下民志不諒句從薛為是萇宏魏舒是廓是極喪亂補苴可謂是廓是極也乎經始勿亟至居之者逸對西京中惟帝王之神麗懼尊卑之弗殊四句發京倉京倉二字出此以禁財對舉蓋指京師之倉也注未明賚皇寮皇寮猶言大寮注亦未明聘邱園之耿潔注周易賁於邱園束帛戔戔王肅云失位無應隱處邱園蓋蒙暗之人道德彌明必有束帛之聘按昌黎隱君子彌明之語出此爾乃卒歲大儺至㒺有不韙大儺一段對前角觝百戲言雖戲亦祖宗之舊儀先王之典禮也西京尚武功好逺畧故鋪陳角觝東京宧者專權故寓㫖於侲童皆有為言之也於是陰陽交和至膺多福以安悆此段對前㣲行是以論其遷邑易京至則齊德乎黄軒此稱帝之作為同於數聖却走馬以糞車文子曰夫召逺者使無為焉親近者言無事焉惟夜行者有之故却走馬以糞車軌不接於逺方之外是謂坐馳陸沉李注偶未及今公子苟好勦民以媮樂至忽下叛而生憂也此皆托以諷諌之㫖臣濟奓以陵君忘經國之長基此指王侯以下莫不隃奓托西京以規切目前也乃知大漢之德馨咸在於此對西京中窮㤗肆侈馨烈彌茂南都賦陪京之南明人稱金陵為陪金亦失本義耕父揚光於清冷之淵山海經耕父之神見則其國為敗非佳事也賦家夸飾漫用之耳章陵鬱以青葱即所謂氣佳哉鬱鬱葱葱然皇祖止焉皇祖即上所謂考侯思故者也注謂髙祖非也真人南廵覩舊里焉末句謂天子將復南廵左太冲三都賦序揚雄賦甘泉而陳玉樹青葱李上交近事㑹元云唐傳紀云雲陽界多漢離宫故地至唐有樹似槐而葉細土人謂之玉樹玉樹青葱左思賦中有之或非其語過蓋不知此樹也按上交又誤記此序乃太冲譏子雲語蜀都賦逐層倒叙其間則有琥珀丹青江珠瑕英注博物志琥珀一名江珠按琥珀江珠似非一物江珠之名於義一無所取也山圖采而得道赤斧服而不朽叙山圖赤斧亦相間之法指渠口以為雲門注鄭康成周禮注曰黄帝樂曰雲門言黄帝之德如雲之出門也然此惟取雲門之名不取樂也按杜詩白帝城中雲出門本此注與今周禮小異匪葛匪姜疇能是恤觀此當時亦重姜維焉獨三川為世朝市三川謂魏都曩疑此與吳客言之安得遽及魏事然三都以魏為主此先逗漏一句乃文章賔主呼應所必然故下文又云諸夏未若兹都也吳都賦此儗上林而尤為寡要太涉橅儗似有冗長散緩之失然採其數語便可成一賦如子山枯樹是其徴也烏聞梁岷有陟方之館行宫之基歟伏後舜禹則以為世濟陽九注引易无妄曰災氣有九陽阨五陰阨四合為九一元之中四千六百一十七歲各以數至陽阨故云百六之㑹按此一叚頗勝諸本未知何据公孫國之而破諸葛家之而滅公孫諸葛非徒屬對之工隱乎漢之亡正得春秋王師敗績于某之意婺女寄其曜至目龍川而帶坰四句皆吳都之所包寄寓指帶四字妙百川派别歸海而㑹二句皆賦家夸飾之詞不可實指鸑鷟食其實鵷鶵擾其閒二句無乃亦玉樹海若之流其果則丹橘餘甘荔支之林橘柚見經餘甘去疾故離支不能先焉餘甘實小核大不至吳中余辛巳夏始獲甞其鹽漬者桞子厚與捠榔並言之問之閩人亦不敢多食也龍眼橄欖注龍眼如荔枝而小圓如彈丸味甘勝荔枝按此龍眼名價與後人異重城結隅注大城中有小城按唐宋吳郡猶有子城至明初破淮張始廢起寢廟於武昌作離宫於建業起廟事無所考注孫權自㑹稽徙丹陽建業人皆不樂徙按不樂徙乃孫皓時事虞魏之昆注虞虞文繡魏魏榮按虞魏吳志無傳文繡則仲翔之父也俞騎騁路亦非南土所有指包山以為期王逸謂包山在秣陵東湖中李善引周處風土記謂陽羡太湖中有包山按觀下文隨接幸乎館娃句則包山當從善注中夏比焉至翫其竒麗也魏都賦中便不得亦作個語舜禹游焉至翫其竒麗也使事當如此魏都賦劉淵林注前注云孟陽為注魏都而今並題淵林何也鍾簴夾陳注文昌殿前有鍾簴其銘曰維魏四年歲在丙申龍次大火五月丙寅作蕤賔鍾又作無射鍾建安二十一年七月始設鍾簴于文昌殿前所以朝㑹四方也按魏四年者操為魏公之四年於漢則獻帝之建安二十一年是年五月進操爵為王故設之以備朝㑹營客館以周坊至起建安而首立注鄴城北有大邸起樓門臨道建安中所立也古者重客館故舉年號也按重客館故舉年號此注可為故實讐校篆籀一人刋誤為校二人對校為讐後人嫌讐字易其名為校對對即讐也優賢著於揚歴注尚書盤庚曰優賢揚歴歴試也按三國志注云謂揚其歴試也然今盤庚篇中無優賢揚歴之文傳業禪祚高謝萬邦上文方叙開基此即接叙魏晉禪受蓋著其德淺祚促自謂可以比隆舜禹而其實萬萬相遼也雖自以為道洪化以為隆至奚遽不能與之踵武而齊其風暗寓不然言諧語滑細詳文義參考五臣所注下以為二字傳寫誤加蓋比物以錯亂至本前修以作系言徒數物産則彌下矣不得已其請言前修乎本前修以作系者蓋緣三國莫能相尚魏亦偶屬中土耳庶幾前修可以折服二客也太冲之於魏氏文與而實不與可謂得主文譎諫之遺矣先引司馬遷春秋推見至隱易本隱以至顯二句欲千載而下讀者黙識其隱義注家以系與繫紛紜致辨又何異於占夢哉張儀張禄亦足云也前修而及於二張其鄙夷當時之人物也甚矣權假日以餘榮至可作謡於呉㑹四句以呉後亡言呉雖假日餘榮終於黍離麥秀也歴執古之醇聽執古謂為前修所折服也揚子雲甘泉賦須看漢書中自叙方知鋪陳處皆諷諫也注桓譚新論曰雄作甘泉賦一首始成夢腸出收而納之明日遂卒甘泉作於成帝時安得有腸出遂卒之事揚子雲桓君山同時人不應作此語然則為妄人附益者多矣非新論本書然也正月從上甘泉還奏甘泉賦以風注漢書曰永始四年正月行幸甘泉七畧曰甘泉賦永始四年正月待詔臣雄上漢書三年無幸甘泉之文疑七畧誤也按子雲之生在宣帝甘露元年戊辰至成帝永始三年丁未為四十歲班書贊中言年四十餘自蜀來遊京師王音薦之待詔此賦為四年所上無疑也然長楊事在延元二年庚戌曵紅采之流離兮颺翠氣之宛延此文章頓挫處廼搜逑索偶雙關互映子子孫孫長無極矣有事甘泉以求繼嗣故如此結潘安仁藉田賦祝氏云臧榮緒晉書以為藉田頌文選以為藉田賦要之篇末雖是頌篇中純是賦賦多頌少當為賦也馬揚之賦終以諷潘班之賦終以頌非異也田獵禱祀渉於滛殺故不可以不諷奠都藉田國家大事不可不頌所施各有當也按祝説非也古人賦頌通為一名馬融廣成所言田獵然何嘗不題曰頌耶陳思與楊書豈以辭賦為君子蓋應上文辭賦小道之語强生區别即杜撰也若云風頌異施揚之羽獵固亦有遂作頌曰之文不歌而頌謂之賦故亦名頌王褒洞簫漢書亦謂之頌文不高然頌述典禮當自為法式其體源亦出于東都伊晉之四年正月丁未注晉書曰丁亥藉田今為丁未誤也按禮記月令疏云耕用亥日以陰陽式法正月亥為火倉又王氏云正月建寅月日㑹辰在亥故耕用亥然則丁未之誤明矣青壇蔚其嶽立漢晉皆耕于東故云儀刑孚于萬國此句帶上端本司馬長卿子虛賦祝氏云此賦雖兩篇實則一篇賦之問答體其源自卜居漁父篇来厥後宋玉輩述之至漢而盛此兩賦及兩都二京三都等作皆然首尾是文中間是賦世傳既久變而又變其中間之賦以鋪張為靡而専于詞者則流為齊梁唐初之俳體其首尾之文以議論為便而専于理者則流為唐末及宋之文體性情益逺六義澌盡體製遂失矣按首尾雖以議論問答然車駕千乘等句即以賦齊王之獵後半齊東陼巨海等句即是賦齊國遊獵之地則亦未嘗非賦也後人無鋪張之才純以議論為便於是乖體物之本矣於是楚王乃弭節徘徊翺翔容與俱與終日馳騁曾不下輿對於是鄭女曼姬至若神仙之髣髴此是夸齊以所無此叚揷在中間叙畋事便不直凡左史行文皆然襞襀褰縐紆徐委曲鬱橈谿谷纎中藏大景怠而後發游於清池又變怕乎無為至勺藥之和具而後御之與脟割輪焠對無而言之是害足下之信也此轉收出子虛二字之義史漢並有有而言之是彰君之惡二句然細尋則無此二句為優且齊東陼巨海陼猶都也如大野既陼之義上林賦天子芒然而思至遂徃而不返使之自悟故云譎諌若夫終日馳騁至則仁者不繇也苦言至誡繫于天子自知悔悟之後故曰言之者無罪揚子雲羽獵賦雖頗割其三垂以贍齊民此三垂即指上林之三垂而言注謂西南東武帝侵三垂以置郡非也元帝初元二年詔以水衡禁囿宜春下苑少府佽飛外池嚴籞池田假與貧民五年罷上林宫館希御幸者成帝建始元年亦罷上林宫館希御幸者二十五所即其事也羣公常伯至上猶謙讓而未俞也羣公常伯左右小臣豈有逺見楊朱墨翟異端曲學不知聖賢之業者也方將已下乃自申作賦以諷之意宏仁惠之虞虞字對上囿字乃虞人之虞顔李皆云通娛非也長楊賦羽獵儗上林長楊擬難蜀父老子雲本祖述相如其奇則相如所不能籠罩麗處似天才不逮也明年上將大誇胡人以多禽獸注七畧曰羽獵賦永始三年十二月上然永始三年去校獵之前首尾四載謂之明年疑班固誤也按此明年者班史因子雲自叙之詞七畧誤也亦頗擾于農人至本非人主之急務也長楊之事尤為荒逸故其詞切鑿齒之徒謂陳項也注云六國者非於是上帝眷顧髙祖至永亡邉城之災金革之患言祖功宗德之盛如此為子孫者乃僅以多獲夸逺人耶皆述古以諷今也東夷横畔謂髙句麗也注云東越者非使農不輟耰至帥與之同苦樂解上亦頗擾于農人矣豈徒欲淫覽浮觀至多麋鹿之獲哉全是諷潘安仁射雉賦極體物之妙雖長卿為之亦不過爾恐吾游之宴起至分倦目以寓視頓挫屏發布而累息徒心煩而伎懩頓挫無此二句義鳥應機句便接得不生動擬青顱而㸃項用左傳吾志其目也意出不交戰帶媒若乃耽槃流遁至末以下是諷班叔皮北征賦注流别論曰避難凉州時作又漢書曰彪年二十遭王莾敗劉聖公立未定乃去京師徃天水郡歸隗囂按陸機二十作文賦何如叔皮於聖學已造其堂慕公劉之遺德及行葦之不傷以行葦為公劉之遺徳必出齊魯之經師注家已不能詳矣不勞師而幣加此句指和親即上所謂耀徳也曹大家東征賦知性命之在天至精誠通於明神儒者之言不愧母師女士矣敬慎無怠至末以此書紳亦庶乎寡過矣潘安仁西征賦刺取史事為賦故主於人物稍以征途所歴山川羅絡其中筆力遒壯不累於繁釀拓宇班氏父子文辭不妨代興所學則非矣子山哀江南賦體源於此庾賦今事故尤有關係能動人此善變者也嵗次元枵注岳傷弱子序曰元康二年五月余之長安以歴推之嵗在壬子爾雅曰太嵗在子曰困敦左氏傳梓慎曰嵗在星紀而淫於元枵杜預曰嵗嵗星也元枵在子虛危之次也然元枵嵗星所歴困敦太嵗所次今論太嵗而曰元枵疑誤也按至今云嵗次者誤自安仁此文始然困敦乃嵗名非十二辰亦不容目之為次眷鞏洛而掩涕思纒綿於墳塋以上自叙西征之由值庸主之矜愎殆肆叔於朝市肆叔市朝從五臣注作蹇叔者為得升曲沃而惆悵至徒利開而義閉注水經注曰春秋晉侯使詹嘉守桃林之塞處此以偹秦時以曲沃之官守之故有曲沃之名然此曲沃在西因彼曲沃而得名今因名而説彼按漢書髙紀顔注中嗤作者以陜之曲沃為成師所居寶鷄前鳴甘泉後湧如此㸃化甚妙南有元覇素滻覇水本名兹水蓋以色得名或著顯績而嬰時戮至曾不得與夫十餘公之徒𨽻齒安仁再遭斥免既無貴仕幾嬰時戮故發憤喟息於數公也扞矢言而不納矢言直言也注引書非健子嬰之果决太史公秦本紀於子嬰之車裂趙髙未嘗不健其决憐其志造長山而慷慨注三秦記曰秦名天子冢曰長山漢曰陵故通名山陵又漢書曰髙祖𦵏長陵按長山當是山之本名因山為陵耳如三秦之説自覇陵以下將何取耶廢園邑以崇儉賦專指初陵勿置縣邑事注贅爾乃端策拂茵至莫二其一此段起下治長安之事王仲宣登樓賦雖信美而非吾土兮吾土謂長安平原逺而極目兮蔽荆山之髙岑四海之内各擅疆域王路不通故託於荆山蔽隔也白日忽其將匿比漢祚將盡也孫興公遊天台賦序優於賦諸賦此篇最下雖一冐於垂堂垂堂之語恐為不類鮑明逺蕪城賦注四言集云登廣陵故城作按宋世祖孝建三年竟陵王誕㨿廣陵反沈慶之討平之命悉誅城内男丁以女口為軍賞昭蓋感事而賦也虞炎文集序云孝武初除海虞令澤葵依井至心傷已摧極形容其蕪寒䲭嚇雛莊子䲭得腐䑕鵷雛過之仰而視之曰嚇注中誤引爾雅若夫藻扄黼帳歌堂舞閣之基至離宫之苦辛哉所賦者城宫館只用畧補以寓當時之事為蕪城之歌收出蕪字王文考魯靈光殿賦文考名延夀一字子山後漢書東海恭王彊傳初魯恭王好宫室起靈光殿甚壯麗是時猶存故詔彊都魯蓋中興以来特為美譚而未有賦者故文考補作也賦出而盛傳於代自西京未央建章之殿皆見墮壊下文所為感物而作觀藝於魯注藝六經也按博物志云王子山與父叔師到泰山從鮑子貞學算到魯賦靈光殿則觀藝者小言之乃學筭數也爾乃縣棟結阿至若鬼神之髣髴此段雕刻圖畫天地至善以示後此段圖畫何平叔景福殿賦此賦似儗東都亦是諷刺故不取韋卞而取平叔感乎溽暑之伊鬱而慮性命之所平先慮燥濕寒暑而及吳蜀則無譎諌之迹惟岷越之不靜至夫何宫室之勿營岷越不寧大營宫室可以待其亡乎固知平叔此賦亦所以為諷也以辛佐治傳攷之實與明帝之語陰相搘拄矣爰有遐狄至彰聖主之威神魏畧曰大發銅鑄作銅人二號曰翁仲列坐于司馬門外其祜伊何宜爾孫子時繼嗣未廣故有斯祝爾乃建凌雲之層盤浚虞淵之靈沼注凌雲層盤名也為之以承甘露按此則凌雲臺即承露臺耳魏畧董尋諫曰作無益之物九龍承露盤土山淵池其功三倍于殿舍若乃虬龍灌注宫殿中螭頭吐水即謂此也公輸荒其規矩匠石不知其所斵夸飾處皆諷也是以六合元亨至固可翹足而待之是以二字與上殊不相屬吳蜀湮滅乃即所謂翹足而待其言若近乎戲者愈明其為譎諫矣慕咎繇之典謨注謂康哉之歌也按咎繇典謨指無教逸欲有邦也今文雖至康哉之歌為一篇然取義不在此木元虛海賦竒之又竒相如子雲無以復加其為廣也三句起得突兀若乃霾曀潛銷至碨磊山壟反襯上一段北灑天墟爾雅北陸虛也即北方虛危之宿注誤宏徃納来四句收得渾淪郭景純江賦與海賦才力懸絶潘安仁秋興賦高閣連雲至此焉遊處只此四語而不堪當世之想已見乎詞矣且斂袵以歸来兮歸來亦有秋興故實不獨淵明也澡秋水之涓涓兮至末髙閣連雲陽景罕曜視此何如謝惠連雪賦北戸墐扉北戸謂日南迴散榮積之勢飛聚凝曜之竒二句括盡鄒陽聞之至於是乃作而賦積雪之歌少變不欲其直也歌卒至起而為亂又變謝希逸月賦委照而吳業昌既假托于仲宣不應用吳事亦失于㸃勘也若夫氣霽地表至周除冰凈數語是賦中警策處曩時尤賞㑹後段蓋一時偶有寄托耳歌響未終至迴遑如失又頓挫賈誼鵩鳥賦此特借鵩鳥以造端非從而賦之也昭明類編入鳥獸何哉宜與幽通思元同編萬物變化兮以下應予去何之禍兮福所倚以下應吉乎告我二句水激則旱兮以下應淹速之度二句且夫天地為罏兮以下推而言之以自廣忽然為人兮何足控摶言所患非夀不得長也寥廓忽荒與道翺翔謂獨觀天地之始禰正平鸚鵡賦羡西都之沃壤至故毎言而稱斯西京之衰可以再興傷時不復故以寓其意也顔延年赭白馬賦體製似班揚驥不稱力至文駟列乎華廐先從馬起不泛𦂳入宋祖不蕪妙簡帝心至有惻上仁體要淳雅畜怒未洩此句即起下一段妍變之態既畢至望朔雲而蹀足跌宕頓挫將使紫燕駢衡至敬備乎所未防此處不可直接馬斃故作此一段虛景兼寓頌美國家之㫖得體而有情天情周皇恩畢只用六字收住不冗鮑明逺舞鶴賦叠霜毛而弄影振玉羽而臨霞虛引舞字舞飛容于金閣入舞字將興中止至遷延遲暮頓挫巾拂兩亭丸劍雙止舞字畧襯班孟堅幽通賦此文不減賈誼揚雄里上仁之所廬里仁謂避地河西道遐通而不迷此孔子所謂四十而不惑也又申之以烱戒烱戒謂勿墜之語三欒同於一體兮至信畏犧而忌鵩言天道必久而後定惠吉逆凶終為不爽周賈有激放言非通理也要没世而不朽兮乃先民之所程申明勿墜之義虞韶美而儀鳳兮至矧耽躬于道真此言其必通精通靈而感物兮神動氣而入微通於幽朝貞觀而夕化兮至訢來哲而通情謂沒世不朽不啻彭老之夀可以俟百世後之人也注非通字結保身遺名保身猶言不失其身遺猶垂也憂傷夭物忝莫痛兮臨谷而墜憂傷夭物則所謂畏溺自投者也皓爾太素曷渝色兮性命不可渝也尚越其幾淪神域兮援葛而登張平子思元賦仰先哲之元訓兮至緜日月而不衰六句破題利肥遯以保名肥後漢書作飛乃合象詞無所疑也之意肥字不知者妄加雌黄以七啟校之自審然不讀姚令威西溪叢語未有不反疑古善本為誤也歴衆山以周流兮翼迅風以揚聲頂上飛字占既吉而無悔兮至榖崑崙之髙岡俞犀月云歴寫遯象皆合筮詞所謂歴衆山以周流也按筮得飛遯卜遇介鳥似非獨承筮詞發昔夢於木禾兮榖崑崙之髙岡後漢書注昔夜也衡此夜夢禾生於崑崙之上即下文云抨巫咸以占夢含嘉秀以為旉是也注解皆云昔日夢至今日親往見焉是為發昔夢也臣賢謂衡此賦將徃走乎八荒以後即先往東方次往南方乃適西方此時正在𤾉谷扶桑之地崑崙乃西方之山安得已往崑崙見木禾乎良由尋究不精致斯誤耳按此賦後漢書注多出舊注之表當參取而此駁尤當亟登之黄靈詹而訪命兮至孰謂時之可蓄揷入訪夢方不板板四段此文章避直處咎繇邁而種德兮至卉既凋而已育謂英六滅而秦趙興也注非振余袂而就車兮修劔揭以低昂以下言天路之可通而攀玉階也應前天蓋髙而為澤四句意亦兼有大鳥塵外瞥天之象也廓盪盪其無涯兮至臨舊鄉之暗藹浩蕩無涯一念收轉此即歸母氏而後寧之意張平子歸田賦感蔡子之慷慨至與世事乎長辭不可為蔡子之苟富貴亦不若屈子之自狷懟此所以超然逺引也於是仲春令月至懸淵沈之魦鰡以此為樂猶求之於外也下乃反而潛心大業求諸内矣揮翰墨以奮藻至末道既不行退而删述自處陳其規模俟王者之取法潘安仁閒居賦既以親疾輒去復因免官自悔大本既偏自然乾沒不已方貽慈親以戚矣此賦㫖趣近乎子㓜南山之詩豈恬退無欲者乎謝客山居殊多美句不知何以遺之以俟伏臘之費注伏者何也金氣伏藏之日也立秋以金代火金畏火故至庚日必伏按伏者藏也陰氣以盛金已潛伏於火中庚為金可以見其自㣲而著也舊説未盡其理孟母所以三徙也綰太夫人頓足起舞至孰知其佗只是無聊都非真樂若以養親為心則雖天下猶草芥黜免正其所樂又何復用其巧拙之嘆乎卒之孫秀修怨太夫人亦詣東市悲夫司馬長卿長門賦此文乃後人所擬非相如作其詞細麗蓋平子之流也得尚君之玉音今人謂玉音二字本此非也玉音金聲出尚書大傳修薄具而自設兮薄具對上飲食夜曼曼具若歲五六月間之夜而謂曼曼若歲此昔人造語之妙向子期思舊賦不容太露故為詞止此晉人文尤不易及也歎黍離之愍周兮悲麥秀於殷墟使晉不代魏二子其夭枉乎故以黍離麥秀興感非使事之迂大也當陳留之後經山陽之國其猶宗周既滅追溯殷亡矣倒用亦有為也惟古昔以懐今兮曰懐今則所感者不獨吕嵇矣五臣本作人謬陸士衡歎逝賦愍城闕之邱荒此以城闕代親故潘安仁寡婦賦歸空館而自憐兮撫衾裯以嘆息寡婦不夜哭二句有語病上文羣飛斂翼之語尤非所宜言也感三良之殉秦兮甘捐生而自引鄭箋云三良自殺以從死重曰重猶亂也本楚詞逺遊篇班偼伃自悼賦亦用之江文通恨賦文通之賦自為傑作絶思若必拘限聲調以為異于屈宋何以異于三百篇也或有孤臣危涕孽子墜心注心當云危涕當云墜江氏愛奇故互文以見義按此可標舉以為對法春草暮兮秋風驚秋風罷兮春草生起下自古别賦可班荆兮贈恨唯罇酒兮叙悲贈恨叙悲亦互文陸士衡文賦注臧榮緒晉書曰機少襲領父兵為牙門將軍年二十而吳滅退臨舊里與弟雲勤學積十一年被徴為太子洗馬與弟雲俱入洛按此則此賦殆入洛之前所作老杜云二十作文賦於臧書稍疎也心懔懔以懐霜志眇眇而臨雲此文章之本潄六藝之芳潤注周禮曰六藝禮樂射御書數也按謂詩書易禮樂春秋也太史公曰學者載籍極博尤攷信於六藝又孔子弟子身通六藝者七十二人以上下文義求之不當漫引周禮或虎變而獸擾或龍見而鳥瀾二句疑大者得而小者卑之意雖離方而遯員期窮形而盡相二句蓋亦張融所謂文無定體以有體為常也故夫夸目者尚奢惬心者貴當二句語意相承注謬暨音聲之迭代若五色之相宣休文韻學本此二句寤防露與桑間又雖悲而不雅防露指豈不夙夜畏行多露言桑間不可與並論故戒妖冶也闕大羮之遺味至固既雅而不艷後之效法陶韋者是也王子淵洞簫賦此文了不悉其佳處原夫簫幹之所生兮至標敷紛以扶疎上二破簫字下二破洞字幸得諡為洞簫兮至因天性之自然簫之為名舊矣獨以江南之幹條暢罕節故得號為洞簫爾漢書元帝紀如淳曰簫之無底者亦失其義博雅曰大者無底小者有底亦不以無底得名也帶以象牙至挹抐擫㩶觀此八句則比竹之簫也傅武仲舞賦故不減楚人相如之匹於是歡洽宴夜至雲散城邑餘波可當一小賦馬季長長笛賦何其詞費昔庖犧作琴至其音如彼有此乃波瀾濶逺不為徒作潘安仁笙賦嵇之琴潘之笙二賦發端便是文章各各排突前人之法成公子安歗賦晞高慕古長想逺思歗字逺致群鳴號乎沙漠注傅瓚曰沙土曰幕按臣瓚李氏亦謂之傅瓚不獨小司馬史記索隱為然宋玉髙唐賦蘇子瞻謂自玉曰唯唯以前皆賦而此謂之序大可笑按相如賦首有亡是公三人論難豈亦賦耶是未悉古人之體製也劉彦和云既履端于唱序亦歸餘于總亂序以建言首引情本亂以理篇迭致文契則是一篇之中引端曰序歸餘曰亂猶人身中耳目手足各異其名蘇子則曰莫非身也是大可笑得乎神女賦張鳳翼改定為玉夢於文義自當不可因其寡學而並非之姚寛西溪叢語云楚襄王與宋玉遊髙唐之上見靈氣之異問宋玉玉曰昔先王夢遊髙唐與神女遇玉為髙唐之賦先王謂懐王也宋玉是夜夢見神女寤而白王王令玉言其狀使為神女賦後人遂謂襄王夢神女非也今文選本玉王字差誤然則張氏特攘令威昔言矜為獨得耳令威語又本沈存中補筆談其夜王寢至其夢若何王曰王字俱當作玉玉字俱當作王張鳳翼云明日以白王至王曰狀如何也一白分作兩層總避直也王曰若此盛矣試為寡人賦之此既接以王曰試為寡人賦之則上茂矣美矣之為玉曰無可疑者登徒子好色賦以戰國䇿參攷登徒子蓋以官為氏曹子建洛神賦韓詩漢有遊女薛君注游女漢神也洛神之義本於此離騷我令豐隆乗雲兮求虙妃之所在植既不得於君因濟洛川作為此賦託辭虙妃以寄心文帝其亦屈子之志也自好事者造為感甄無稽之説蕭統遂類分入於情賦於是植幾為名教罪人而後世大儒如朱子者亦不加察于衆惡之餘以附之楚人之詞之後為尤可悲也已不揆狂簡稍為發明其意蓋孤臣孽子所以操心而慮患者猶若接于目而聞于耳也蕭粹可注太白詩云髙唐神女二賦乃宋玉寓言洛神則子建儗之而作惟太白知其托詞而譏其不雅可謂識見髙逺者矣是前人已有與予同者自喜愈於無稽也注魏東阿王漢末求甄逸女既不遂按魏志后三嵗失父後袁紹納為中子熙妻曹操平冀州丕納之于鄴安有子建嘗求為妻之事小説家不過因賦中願誠素之先達二句而附㑹之注又曰黄初中入朝帝示植甄后玉鏤金帶枕植見之不覺流涕時已為郭后讒死帝意亦尋悟因令太子留宴飲仍以枕賚植按示枕賚枕里老之所不為况帝又方猜忌諸弟留宴從容正不可得感甄名賦其為不恭夫豈特酗酒悖慢刼脅使者之可比耶注又曰此枕是我在家時從嫁前與五官中郎將今與君王按數語俚俗不復有文義注又曰遣人獻珠于王王答以玉珮按此二句因玉珮明璫之文而附㑹者然忘其尚有抗瓊珶以和余句何也黄初三年余朝京師注謂魏志及諸詩序並云四年朝此云三年誤一云魏志三年不言植朝蓋魏志畧也按魏志丕以延康元年十一月廿九日禪代十一月改元黄初陳思實以四年朝雒陽而賦云三年者不欲亟奪漢年猶之發䘮悲哭之志也注家未喻其微㫖責躬詩表云前奉詔書臣等絶朝豈縁畧也還濟洛川即贈白馬王詩所謂伊洛廣且深欲濟川無梁也古人有言斯水之神名曰宓妃既引古人之言則非實有所感而特假以托諷明矣經通谷注華延洛陽記曰城南五十里有大谷舊名通谷按此即贈白馬王詩所謂大谷何寥廓者是也然則君王所見無乃是乎此設為御者謂植也踐逺遊之文履注繁欽定情詩曰何以消滯憂足下雙逺遊此言未詳其本按同時人語借以互証當法此注無良媒以接懽兮至解玉珮以要之此四句即用騷經解珮纕以要言兮吾用蹇修以為理嗟佳人之信修至指潛淵而為期此四句又反騷經雖美而無禮之意以明非文帝待已之薄忠厚之至也執眷眷之欵實兮至申禮防以自持子建作箜篌引有久要不可忘義薄終所尤謙謙君子德磬折何所求此六句意與之同景初中詔云陳王克已慎行以補前闕則植之自持者可知矣於是洛靈感焉至長寄心於君王子建責躬應詔二詩表云前奉詔書臣等絶朝心離志絶自分黄耉永無執珪之望不圖聖詔猥垂齒召至止之日心馳輦轂僻處西館未奉闕廷踊躍之懐瞻望反仄蓋文帝雖許其入朝而猶未遽令見之也故言宓妃雖已感悟而神光離合乍陰乍陽已猶不得與交接及已長吟永慕哀厲彌甚於是始見其隨從衆靈微步而即我然猶若危若安若往若還已則望其容華婀娜而至于忘食蓋思之尤甚矣於是宓妃始命收風静波屈其尊以相交接良㑹之難至于如此然既朝之後其可必文帝之感悟而常常見之乎故又云悼良㑹之永絶也雖潛處於太陰常寄心于君王文帝以仇讐視其弟而子建睠睠如此不敢稍有怨懟所以雖終不見用亦卒能自全黄初六年文帝東征過雍邱遂幸植宫為兄弟如初蓋茍盡我所為負罪引慝之道君父未有不稍為感悟者後之藩臣徃徃以不學無術自即于誅夷悲夫恨神人之道殊兮怨盛年之莫當神尊而人卑喻君臣也怨植自怨也盖即盛年不可再與盛年處房室之意獻江南之明璫獻于宓妃也子建贈白馬王詩曰蒼蠅間白黒讒巧令親踈以耳飾為獻盖望其無如小弁之所謂君子信讒者也雖潛處于太陰太陰猶言窮陰自言所處之幽逺也君王謂宓妃以喻文帝也不必以上文君臣為疑冀靈體之復形御輕舟而上溯冀得復朝京師而見文帝也義門讀書記卷四十五

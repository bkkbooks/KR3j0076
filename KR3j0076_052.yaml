body:
  text: 義門讀書記巻五十二翰林院侍讀學士何焯撰杜工部集石犀行就正道中又有本末隄防者隨時補救之方調和元氣則先事而圖于未形也安得壯士提天綱二句總收天人二字杜鵑行不如鮑明逺贈蜀僧閭邱師兄太常博士均之孫多士盡儒冠暗藏乃祖吾祖詩冠古二句發明兄字緣起相遇即諸昆出兄字泛溪秋色有餘凄醒上荒僻衣上見新月清新濁醪自初熟二句言酒自熟而人無好懐也戲題畵山水圖歌赤岸水與銀河通伏下逺勢中有雲氣隨飛龍一夲無之舟人漁子入浦溆二句乃風雨欲來之景則中有雲氣句不可少尤工逺勢古莫比顧能事焉得并州快剪刀二句収出戲字與促廹反對題李尊師松樹障子歌老夫清晨梳白頭梳白頭三字含平生好竒并貫注四皓憑軒忽若無丹青下文良工心苦仙客意親两層俱起此句真有神助偃蓋反走虬龍形反走二字從却承二字生出蓋松為巨石所碍乃横致成偃蓋也偃蓋二字即生出松下偶坐二句妙不直接㫁續變化已知仙客意相親仙客指李時危惨淡來悲風風字抱畵松戲為雙松圗歌韋偃絶壁長松起纎末虚勢先含下枝交錯起纎末先從松針寫起一本作絶壁長松两株慘裂苔蘚皮入雙松起下白摧朽骨二句白摧朽骨龍虎死承上皮裂透出古字黒入太隂雷雨垂承上枝廻葉裡松子僧前落終前風起已令拂刷光凌亂光凌亂并映前風起請公放筆為直幹反對屈鐵交錯絶筆放筆前後闗鎖投簡成華两縣諸子赤縣官曹擁材傑指两縣諸子軟裘快馬當冰雪快馬二字暗對飢臥南山豆苖早荒穢一聮從寒字中插出飢飢卧動即向一旬二句從飢轉到寒空墻日色晚五字寒氣隂凝病栢石林以為為明皇作與杜鵑行同意然不敢定其然也豈知千年根以下千秋恨事病橘此比民生窮悴若更愁有司急貢賦則將羣化為盗賊當以天寳前事為鍳也吾愁罪有司鍾惺曰正恐罪及百姓耳故末引荔枝故事以為戒憶昔南海使四句按注謂天寳嵗貢取之涪者公借以諭未必然枯柟此與古柏行同意丈人山綠雲擬住最高峯絶世獨立掃除白髪黄精在劚黄精即煮茯苓之意薑桂夲性非主人所得衣食也百憂集行方云公之來成都以裴冕為地主冕為公作草堂于浣花谿上未幾冕去而為崔光逺之客光逺驕縱特甚公不得已折節事之故曰強將笑語供主人而光逺絶無周卹之意故四壁蕭條妻子凍餒如此又不敢明言姑以少健衰老起興而中間微露其意亦可悲矣戲作花卿歌用如快鶻風火生起下身輕見賊惟多身始輕變化小敵怯大敵勇柟樹為風雨所㧞歎行人不過聼竽籟暗起新詩湘靈云茅破猶可蓋柟㧞不復生矣公安能久㽞于蜀乎是以明年有下峽之興茅屋為秋風所破歌元氣淋漓自抒胸臆非由外襲也歸來倚杖自歎息自歎息三字直貫注結處風雨不動安如山風字帶收前半大雨流惡邑里清將邑襯野有此句方曲折且使勸耕句皆有根沉痾聚藥餌二句將人襯物溪漲當時浣花橋當疑作常不意逺山雨二句前此溪漲之由在此㸃出遭田父泥飲美嚴中丞感此氣揚揚二句一束作前後眼目語多雖雜亂縈拂酒酣仍嗔問升斗透出泥飲喜雨榖根小蘇息顧上農事沴氣終不滅顧上兵戈漁陽漁陽突騎猶精鋭漁陽用光武事此指朔方軍也天邊行此篇亦以屋沃覺藥陌昔職通用大麥行類夲云前四句如童謡苦戰行别時孤雲今不飛二句因雲飛而思猛士述古三首進退固其宜固字註作因不如固字自在脱身無所愛痛飲信行藏此詩是其註脚第二首秦時任商鞅二句此刺元載第五琦之屬第三首似陶觀打魚歌魴魚鱍鱍色勝銀為作鱠先提一句衆魚常才盡却棄二句衆魚為人棄赤鯉不可拘两層波瀾襯出銀魴變化入神潛龍無聲老蛟怒又頓此二句結住打魚徐州秃尾不足憶二句為綿州㸃綴旣飽歡娛亦蕭瑟亦蕭瑟已寓不然之意後篇所謂聖所哀也又觀打魚東津觀魚已再來㸃又觀主人罷鱠還傾盃前篇已詳只一帶以見縱樂日暮蛟龍改窟穴與前篇潛龍無聲老蛟怒相應鳯凰麒麟安在哉猶云鳥亂于上魚亂于下鳯凰不栖其國麒麟不逰其圃暴殄天物聖所哀暴殄天物出尚書戴記越王樓歌起語雄傑千鈞之力碧瓦朱甍照城郭顧磊落君王舊跡今人賞二句古人雖作宫室亦不肯為不終日茍且之計言外深歎今人不能然世運降事力薄皆含蓄在内姜楚公畵角鷹歌梁間燕雀休驚怕二句反跌畵字妙相從歌贈嚴二别駕夲州從事知名夂知名夂正謂見靣新也用筆敏妙黄昏始扣主人門倒敘此句變換生動百年未見歡娱畢竒傑光祿阪行山行落日下絶壁二句日下壁則晦暝矣却接云西望千山萬山赤抑何變化而閒暇也回思開元之治如日之方中并末二句亦籠罩於凝眸注望中矣樹枝有鳥亂鳴時二句鳴字一作棲按日已暝但聞鳴噪而知枝間皆鳥也作棲則複有字亦是死句下暝色二字接得不生動矣無人二字即生出下二句因草動而馬驚又是倒装句不憂者憂有甚于此也陳拾遺故宅此堂豈千年言此堂歸于必敝而千載不朽者以盛事㑹于一時也感遇有遺編感遇詩皆言偽周變革之故微月生西海即指武氏夲為貴公子指敬業玉馬去朝周指相王樂羊為魏將指李勣聖人秘元命指李淳風穣侯富秦寵指无忌聞我言者疑其鑿讀此詩結句可渙然矣碎胡琹而出感遇詩人贈一編小説之不可信者即王適事亦失實也謁文公上方野寺隱喬木上方絳氣横扶疎先寫風光窈窕入風磴應隱字庭前猛虎臥二句出文公亦藏風字俯視萬家邑醒上方煙塵對階除仍帶風來無生有汲引汲引二字雙闗上文兹理倘吹噓吹噓二字又暗映前半之風字通首結搆之宻如此通泉驛南去通泉縣十五里山水作盡目窮壮觀一作盡日按下雖有夕字上已云亭午矣作盡目佳即盡十五里也山色逺寂寞一聮山色漸淡江光轉白從上生層隂句逐層生來愈見其佳過郭代公故宅結句以郭詩沉埋無用自况也觀薛稷少保書畵壁仰看垂露姿書也又揮西方變畵也到今色未填填塵也言未起塵也此行叠壯觀收觀字不知百載後二句百載後公以郭薛自比也作千字謬矣通泉縣署屋壁後薛少保畵鶴詩筆亦如舞鶴低昻各有意顧十一佳此志氣逺起下豈惟粉墨新束上羣遊森㑹神寫十一鶴曝露墻壁外壁後赤霄有真骨襯得妙有真骨應寫真結處廻抱久欲盡猶出塵化工仙韻其中又有一作詩人在也陪王侍御同登東山最髙頂宴姚通泉晚携酒泛江滿空星河光破碎借天寫水竒妙春日戲題惱郝使君兄願携王趙两紅顔二句戲惱也短歌行贈王郎司直王郎酒酣斫地歌莫哀呼而告之徘徊哀歌真長醉耶我能㧞爾抑塞磊落之竒才公不居銓衡而曰我能㧞爾教之使自㧞于使府耳豫章翻風白日動豫章勝任明堂鯨魚䟦浪滄溟開鯨魚濯鱗天池且脱佩劔休徘徊脫佩劔棄所授之官也仲宣樓頭春色深春色深言王路方平可以高衢騁力不必輕踏侯門也青眼高歌望吾子二句碌碌侯門者皆公所白眼視也吾老不能去王郎少年何為淹留此乎類夲云末三字歇後語言無有能用我者矣與西得諸侯相呼應世亂多猜不敢竟其詞焉故命之曰短歌行短歌行送祁錄事後生相動何寂寥註動一作勸按才足動人一見輒記後生如錄事寂寥不可多得也作勸字了無意味矣陪章留後惠義寺餞嘉州崔都督赴州廻䇿匪新岸頂上深字目存寒谷冰句虛言恍如坐對冰雪也出塵閟軌躅顧上雲端勞生共幾何二句結語渾括將適吳楚留别章使君留後兼幕府諸公得桞字此樂或難朽顧上厚字有使即寄書二句悲凉山寺得開字章留後同逰使君騎紫馬入留後公為顧賔從插同遊吾知多羅樹四句發明上信字以兹撫士卒顧樹羽静千里桃竹杖引贈章留後此篇以平入通押皆入鼻音也梓潼使君開一束章留後路幽必為鬼神奪與上江妃水仙惜不得波瀾映帶慎勿見水踴躍學變化為龍變化葛陂使事無迹使我不得爾之扶持二句自比老棄南荒不得扶持國歩也韋諷錄事宅觀曹將軍畵馬圖方云通篇叙曹將軍獨後有韋諷一句㸃綴韋諷冺然無迹可悟詩法起處以畵字真字雙起以後縈廻相間組織變化竒之又竒國初以來畵鞍馬二句先以江都引起將軍人間又見真乗黄出觀字曽貌先帝照夜白先以畵他馬引起九馬昔日太宗拳毛騧二句又以二真馬引起畵馬今之新圖有二馬入畵馬其餘七匹亦殊絶補七馬作两層寫借問苦心愛者誰二句支遁倒襯韋諷與江都引出將軍相對支愛者真馬又與前後相對憶昔巡幸新豐宫又從先帝生波騰驤磊落三萬匹二句映九馬以真馬映畵馬自從獻寳朝河宗舊注河宗句以穆天子事比元宗之升遐也君不見金粟堆前松柏裏二句泰陵在金粟堆送韋諷上閬州録事叅軍操持紀綱地録事當令豪奪吏當令從注作因循為是丹青引贈曹將軍覇類夲云此等太史公列傳也多少事多少議論多少氣魄將軍魏武之子孫名畵記覇曹髦之後文彩風流今尚存見與畵工别也學書初學衞夫人二句帶敘正跌出畵為古今第一也羅隱云書法二王爭巧拙便平富貴于我如浮雲伏後窮途開元之中常引見此可以富貴之㑹將軍下筆開生靣五句曹尤以畵馬著名故前後略叙畵人中間獨詳寫畵馬褒公鄂公毛髪動二句有神畵工如山貌不同貌字任淵黄詩注中作邈不同邈字勝與下真龍句屹相向句呼應㢠立閶闔生長風伏下畵骨意匠慘淡經營中頓挫一筆斯須九重真龍出有神一洗萬古凡馬空一洗畵工凡筆也榻上庭前屹相向屹字應迥字圉人太僕皆惆悵言皆為之茫然失氣自顧日與馬習不如畵者獨得其真也弟子韓幹早入室無過右軍弟畜韓幹前後波瀾相對亦能畵馬窮殊相惟窮其相尚失其真猶去之邈然也即今飄泊干戈際帶起窮途屢貌尋常行路人與凌煙功臣對途窮反遭俗眼白與至尊含笑對但看古來盛名下二句杜征南之子孫亦猶是矣閬州東樓筵奉送十一舅往青城縣得昏字節往顔色昏竒句傑思今我送舅氏以下私恩公義曲盡真小雅之遺嚴氏溪放歌行豈免溝壑常漂漂藏下志字嗚呼古人已糞土言古來志士無不視此曹如糞土不受其豢飬雖放歌而必假古人以為言忠厚之至也獨覺志士甘漁樵言願侣漁樵也喜得與子長夜語喜字對上慽慽知子松根長茯苓二句言不甘隨之啄腐吞腥寧相從于溝壑煮茯苓并無薇之可採矣餓死可忍也慽慽羇旅奔走於驕將之前一日不可忍也夜闌明志出口入耳他人不與焉又見公之危行言孫也南池用韻與客堂篇同所向盡山谷伏下羇束局促芰荷入異縣二句襯出萬頃南有漢主祠方輿勝覧南池在髙祖廟旁寄韓諫議程嘉燧以此詩為李泌而作者得之身欲奮飛病在牀身病故轉望之韓濯足洞庭望八荒望八荒恐其將長徃不返不止潛迹衡岳也影動倒景搖瀟湘影景夲一字此句恐有訛似聞昨者赤松子昨者聞其從赤松故上言不在旁也國家成敗吾豈敢吾豈敢言泌敢自棄也周南留滯古所惜此句應身病南極老人應夀昌南極老人以勉諫議致泌還朝焉得置之白玉堂焉得置之四字一貫憶昔二首類本云用韻疎宻有法鄴城反覆不足怪指郭令失利言之張后不樂上為忙此句前輩多議其徑率至今今上猶撥亂二句亂本在闗中乃今上仍求之四方是再蹈覆轍而至今不悟也為留猛士守未央猛士即朔方之士留猛士謂罷郭子儀兵柄入宿衛也紀綱雖亂爪牙猶在留猛士於内非徒河北賊不去幷致西羗入犯矣百官跣足随天王跣足下殿用梁武事却以百官随走言之直而有體是從春秋中先言㑹溫後言王狩得此句法願見北地傅介子二句身坐御牀安得頭懸北闕故願見介子也昔猶能用回鶻以驅東胡今則致回鶻與吐蕃連兵入宼是以䘮亂以後又成今昔之變况如次篇所憶太平之日也第二首連昌宫詞本擬此篇才力相去誠如子由論長恨歌之於哀江頭也九州道路無豺虎二句上男耕下女桑二句横插在中與後亂離呼應變化如龍復恐初從亂離説妙妙冬狩行時梓州刺史章彛兼侍御史留後東川校獵亦似觀成功言方與西戎角逐弋獵之娱則待功成之後耳胡為乎遽似觀成功也此句暗寓諷刺并後篇無不呼起清晨合圍歩驟同伏下整肅有鳥名鸜鵒感此起興鸜鵒跦跦公在乾侯此起後天子不在咸陽宫也使君五馬一馬驄兼侍御况今攝行大將權留後釋悶此篇方萬里刻入律髓注云此亦所謂吳體抝字失道非闗出㐮野天子奔走天子亦應厭奔走一聮是料風塵之當清但恐誅求不改轍一聮是料風塵之不可復清江邊老翁錯料事二句風人譎諌然豈終不復見老翁自眼暗耳以眼暗不見自釋則此悶何時可釋耶到不忍更言處忽謬其詞愈婉愈痛亦借用世適平眼更明事别唐十五誡因寄禮部賈侍郎少人慎莫投此即所謂苛政猛于虎閬山歌元宗諱隆基先天二年正月詔改隆州為閬州松浮欲盡不盡雲二句景色無窮縮作二句竒絶已覺氣與嵩華敵氣字虛活作勢即死亦不復與上句相應矣閬水歌閬中勝事可腸㫁雖有勝事然中原格鬥留滯五蠻豈願見此哉故曰可腸斷也閬州城南天下稀咏嘆一句無窮曲折落句山谷酷摹而去之轉逺湘靈云落語竹枝體末二句與閬山歌同意可悟虛實變換之法三絶句第三首殺人明不殺賊也殿前兵馬忍為盗賊投鼠忌器故于末章始見之草堂布衣數十人作布衣十數人眼前列杻械四句宛然一李自成飲啄愧殘生二句可悲四松曲折多情味㑹看根不㧞對後無根蒂聊待偃葢張反對千葉黄勿矜千載後勿矜應配爾句主人所以自負也千載後對三嵗慘淡蟠穹蒼應根不㧞水檻無限曲折人生感故物二句又轉破船仰看西飛翼顧平生所悲數奔竄顧避亂營屋東偏若靣勢插入營字蕭蕭見白日頂浮雲句洶洶開奔湍頂積水句寂無斤斧響反結營字除草江色未散憂一折霜露一沾凝又轉自兹籓籬曠二句可悟文章疎密相間為佳揚旗二年夏六月成都尹嚴公置酒公堂觀騎士試新旗幟我公㑹賔客府堂駊騀揚旗旌出題駊騀字本文選李義山襲用之作紅駊騀駊布可切騀五可切説文馬揺頭也廻廻偃飛葢下舒字來纒風颷急二句寫出練字虹霓就掌握下卷字太子張舎人遺織成褥叚復歸成都草堂時作詩極謹嚴命意則微覺太過為後來合閙詩篇之祖奢僭縱横目不忍見不覺一吐胸中感憤故非良時好㑹無端合閙可比嘆息當路子五韻似可省豈以蜀中奢僭自擅不復識上下之分故因事以諷曉之耶媿客茹藜羮從終宴句來莫相疑行湘云此與赤霄行皆為郭英乂作也是年四月嚴武薨英乂為成都尹公雖與有舊然志不相合遂欲去草堂矣按赤霄行當别有謂以牛况尹不若是其易也不争好惡莫相疑汝自好錢好官職我自好聲名功業文章所謂不相争也客居葱青衆木梢頂萬尋蜀麻久不來二句先起商旅客堂嚴云此章叶韻不可觧按屋沃覺藥陌昔職收聲均入鼻故唐人得以通用棲泊雲安縣客字客堂節叙改出客堂具物對羇束具物未詳悠悠日動江二句悠悠當作滺滺漠漠當作莫莫詩淇水滺滺滺音由流貌維葉莫莫成就之貌營葺但草屋顧堂字石硯詩平侍御者其滑乃波濤不澁筆也聫㘭各盡墨不拒墨也水閣朝霽奉簡嚴雲安東城抱春岑二句水閣崔嵬晨雲白二句朝霽雨檻臥花叢六句皆閣中事晚交嚴明府二句公至雲安皆在舟中此則嚴令之水閣也因言晚交明府得以居此閣中况于此而數相見乎感謝之也三韻三萹一二短章却有千鈞筆力第三刪近聞渭水逶迤白日净無風塵之驚也折檻行公以捄清河公被斥朱雲折檻蓋自况也古栢行李義山作詩者乃是惠陵旁廟中栢篇中明云憶昨路遶錦城東其為䕫州作明甚霜皮溜雨四十圍一連材大雲來氣接巫峽長一連材大雖夸飾語然巫峽句是東川雪山句是西川不拉雜下語也憶昨路遶錦城東以下因君臣際㑹之難而托古栢以見意先主武侯同閟宫見昔時之際㑹崔嵬枝榦郊原古二句言徒有古柏不見古人也落落盤踞雖得地四句見長養實難而此柏實能當造化之栽培不為無意大厦如傾要梁棟二句從有其材轉到又値其時萬牛廻首邱山重言莫肯致之為梁木也不露文章世已驚四句言知遇雖遲而此柏已為鸞鳳所棲宿不應終棄苦心豈免容螻蟻言為不知者所陵籍也志士幽人莫怨嗟二句言果如孔明之求志俟時則中興搆厦舍子而誰難為用者惟材之大故也落句公蓋自慰云縛雞行句句轉張王元白具體而微負薪行至老雙鬟只垂頸顧嫁不售野花山葉銀釵並帶負薪靣粧首飾雜啼㾗顧抱恨最能行錢云最能䕫州水手之稱二詩在䕫州偶有所觸信筆而書自是大家數此詩尤近漢魏樂府瞿塘漫天虎鬚怒鬚疑作牙寄裴施州三四語自佳裴冕乃足當斯語耶霜雪迴光避錦袖頂上裘龍蛇動篋蟠銀鈎頂上書鄭典設自施州歸列郡宜競惜注惜一作借音迹本用借宼作借是也廣韵二十二昔中有此下注假借渚拂蒹葭塞注塞一云寒按作塞乃與拂字相應亦與下句穿字羃字相對柴門衆水為長蛇收歸海帶欹斜敢居髙士差言不敢差肩髙士只守分而已迴首猶暮霞收乾旱貽華陽栁少府栁侯披衣笑注作嘯嘯字佳言栁方傲然無所屑意見我乃降顔色也披衣二字暗起清曉並坐石下堂注一云堂下石一云石堂下不如作石下堂乃與絶壁句映帶文章一小技小技對上長策徑微山葉繁應喬木間故里今空村應戎馬存火陸渾山火此其祖師楚俗大旱則焚山撃鼔爆嵌魑魅泣二句承燒蛟龍從低處叙起崩凍嵐陰昈昈赤文也音戸羅落沸百泓顧經月青林一灰燼漸髙雲氣無處所鑿空而出寫髙處仍與雷雨相闗布景方不脫母河棹騰烟柱漢臯詩話河棹應作河漢為是光彌焮洲渚仍收到低處是逺景腥至焦長虵二句挽到蛟龍上逺遷誰撲滅更逺以極經月之勢七月三日亭午以後較熱退晚加小凉穩睡有詩因論壯年樂事戲呈元二十一曹長今茲商用事七月餘熱亦已末末無也筋力蘇摧折虛含穩睡留在結句園蔬抱金玉金玉當作金石亢旱土堅不肯發生抱塊欲枯也臨軒望山閣元二十一所居也殿中楊監見示張旭草書圖俊㧞為之主俊㧞二字書家三昧盡矣念昔揮毫端念昔二字繳到云亡不獨觀酒德草聖酒德首尾相映他人以此發端變作棹尾用不獨二字顧上逸氣楊監又出畫鷹十二扇天寒大羽獵對十二扇贈李十五丈别揚論展寸心束上壯筆過飛泉生下課伐木序列樹白菊一作萄白菊白萄皆可作故實用之賔客憂害馬之徒賔客二字對府主言之藉汝跨小籬二句虛竹苦未能當仗故跨木于籬上乳獸待人肉獸當作虎序中不諱虎穴連里閭四句本是刺苛政故紆其旨則言之無罪所謂可黙息也雷雨蔚含蓄承壯字含煩促季月當泛菊即借白菊反收長夏灑然善變園人送𤓰傾筐蒲鴿青蒲鴿青疑是𤓰名未詳出處仍看小童抱收送字園人非故侯送𤓰非故侯之託以自隱奈何盡取之而絶其生資乎種此何草草詩勞人草草又曰矜此勞人毛傳草草勞心也鄭箋草草者憂將妄得罪也此篇亦刺詩信行逺修水筒秉心識本源雙闗何假將軍佩將軍蓋用魯肅事行諸直如筆行諸句疑有誤槐葉冷淘以槐葉汁和麫為冷淘汁滓宛相俱淘字經齒冷於雪㸃冷字開冰清玉壺收到冷君王納凉晚二句結稍近癡行官張望補稻畦水歸清新可愛主守問家臣行官張望分明見溪伴召信臣有分水法伴依注作溪畔自佳鷗鳥鏡裡來二句百頃千畦成此壯觀㸃染處皆有血脈催宗文樹雞柵稀間可突過馮云相如上林掉稀間未似尸鄉翁二句結反應旅次此篇頭緒太煩園官送菜畦丁負籠至收轉送菜上後園山脚勿謂地無疆四句言惟此地少得陰凉不如雲水之寛濶魚鳥之遂性也石榞遍天下榞一作原敢為蘇門嘯二句蘇門嘯聲在半嶺中梁父則泰山下也結仍暗映山脚秋行官張望督促東渚耗稻向畢清晨遣女奴阿稽豎子阿叚往問上天無偏頗方云洗發耗字有生固蔓延二句申非類戒荒二語督領不無人方云指行官西成聚必散應前免亂常只西成二語可見其用心之仁竊比稷契豈虛語哉阻雨不得歸瀼西甘林壊舟百板坼公前有破船詩虛徐五株態五株指甘喜聞樵牧音雨作則樵牧不得出也雨峽雲行清曉起句用朝為行雲與後楚宫相闗風吹蒼江樹二句陸深曰以實字作虛字用法樹樹立之樹晦菴以為誤欲改作去對來是恐未然東坡有美堂詩天外黒風吹海立浙東飛雨過江來本此髙鳥濕不下峽雲居人門未開清曉雨二首第一首久陰蛟螭出二句承上驚字第二首漁艇息悠悠反襯法晚登瀼上堂注思朝廷晚更登望惓惓欲報悵迫衰老非怨冗散升髙延首徒恐埋骨窮山不能奮飛也故躋瀼岸髙登字起伏深峽修聳故字與迫字相應開襟野堂豁六句又妙在仍寛寛說去春氣晚更生竒傑四序嬰我懐起下衰老所思注東北伏安得隨鳥翎不復夢周孔此句只是衰老濟世數嚮時暗藏公身壯盛之時一層斯人各枯冡自歎衰老恐不能如吕葛之濟時但同歸於枯冡也楚星南天黒一連就晚字又轉一層楚蜀正轉歸注東北上迫此懼將恐懼者懼毘輔之無人恐者恐功名之長已不謂側足群盜之中也或謂斯人指房嚴非是又上後園山脚湘云方爾止謂杜公止有望岳詩未嘗登嶽誤也窮秋立日觀非岱宗乎窮秋立日觀以山頂反對山脚蓐收困用事言兵動也元冥蔚强梁言幽薊尾大不掉也注家以元冥喻范陽則是以蓐收為西方金神喻長安則非雨首六句是一幅瀟湘圖阻雨反得曠望之趣深見應接自卑之不堪也消中日伏枕頂拘悶雨行雲逓崇髙四句是峽雨今雨喜容易逐層寫出德澤間作鼓増氣承上生意種萵苣澒洞青光起神妙信宿罷瀟灑風雨瀟瀟之瀟宗生實於此宗生叢生也暇日小園散病將種秋菜督勒耕牛兼書觸目老病恐拘束小園散病秋耕屬地濕六句將種秋菜督勒耕牛飛來兩白鶴以下以病鶴自比終前半老病句意兼書觸目也鸞鳳不相待比州府八哀詩序王李撥亂之材張公則圖之于未亂未危者也哀逝者則存者其可不亟委任乎贈司空王公思禮髙麗人頴銳物不隔司空言隔相國言留皆逺人無資地者也出入由咫尺由同猶胸襟日沉静二句嚴云寫出大將非豕突可擬兀帥見手格嚴云手格即掣肘之意悲甚田横客為朝廷惜非哭其私也昔觀文苑傳以下是傷時盜賊未息故司徒李公光弼廣德二年七月卒擁兵鎮河汴嚴云公之微詞千里初妥帖此句代為之解内省未入朝周容云就彼一時形迹心事内省兩字說盡可為刻畫平生白羽扇白羽扇未詳豈即使顧榮事耶吾思哭孤冡以下傷時盜賊未息贈左僕射鄭國公嚴公武永泰元年卒小心事友生此句已伏賔客之脈匡汲俄寵辱二句惜其不得入相終於節鎮也記室得何遜二句挿入賔客以下每篇皆兼嘆舊言之堂上指圖畫六句武在蜀頗好遊宴公諸詩中諷刺非一獨于八哀諸將以追惜其材而稍回䕶之身上愧簪纓公復有散郎之除出武所薦故云贈太子太師汝陽郡王璡天寶九載卒色映塞外春注一作寒夜不如塞外佳九州之外猶被麟趾之仁也塞外春猶言冬日之日愛其謹潔極臣子不致失歡於君父只是清慎耳此所謂謹潔極也非平日謹慎則諌獵之書不以為愛君而以為好名矣羽旗動若一二句欲言馬足之髙却以馬上羽旗言之變化我馬既同無迹袖中諌獵書二句言只在苑囿而不逺獵由王所諌也嚴云上言詔王射雁忽接諌獵句此立言之體也水有在藻鱗魚藻箋云此時人物皆得其所匪惟帝老大二句外廷見明皇暮年希出遊獵以為老大氣衰自厭馳逐不知皆因王諌故得頥神九重有松喬之壽耳宛彼漢中郡以漢中王結鄭䖍篇以鄭審結贈秘書監江夏李公邕李邕以贜負謗為燕公所擠故前半詳叙以白之眄睞已皆虛二句言其多而敏獨步四十年二句豈惟不嫌其穢且盡仰其髙如此禍階初負謗收轉前半言不過所得賣文人事豈知階禍于此易力何深嚌深嚌未詳易力猶摧枯朽者易為力是非張相國四句言張燕公尚以争名相扼又于酷吏何怪所以深哀其窮也朗咏六公篇此篇以六公篇結曲江篇以徐孺碑結故秘書少監武功蘇公源明負米晚為身六句所謂求忠臣必于孝子之門吏禄亦累踐註晉作掾吏按作掾吏為是秘書茂松意至胡為投乳贙秘書文昌黎亦稱之當時古文道孤或反被謗傷公之所謂乳贙即昌黎之所謂蚍蜉乎贙字時本韵失載故著作郎貶台州司戸滎陽鄭公䖍親近惟几杖言與俗人隔絶也未曽寄官曹寄註魯作記按作記用王子猷語也但與下句不貫春深泰山秀頂上懐曩故右僕射相國張公九齡開元二十八年七月卒劉辰翁論此詩以謂九齡大節惟論安禄山此既不甚白而末亦不及弔祭為失余謂子壽大節尤在拒武惠妃壽王奪嫡之謀公亦未之及也仙鶴下人間仙鶴是實事風度可想與後朱鳥相映碣石嵗崢嶸碣石指禄山天池日蛙黽蛙黽謂牛仙客以使典作尚書争之不得也南衙宰相所居故以天池言之退食吟大庭至右地恧多幸人但知其憂讒畏譏豈識公之用心惟以不如古大臣之事君是恥乎用才文章境境字重押向時禮數隔嘆舊也杜老嘗為其賔客舊注獨指孟浩然恐非再讀徐孺碑二句兼寓當如南州之哭江夏也寫懐二首二詩阮公風調莊蒙寓言可歎斯須改變如蒼狗與後三年對觀公孫大娘弟子舞劍器行序曲折三致波瀾莫二詩為李十二娘作却只道公孫以感念王室兼之波瀾莫二故也數常于鄴縣見公孫大娘舞西河劍器前輩或於數字絶句觀者如山色沮喪六句先賦劍器感時撫事増惋傷拓開先帝侍女八千人含下樂極五十年間似反掌自開元五年數之風塵澒洞昏王室含下哀來樂極哀來月東出感時撫事處只平平叙過却就自已一時上㸃出樂極哀來四字作斷案老夫不知其所往二語王室傾覆民皆無家末二句亦從自已一身上指陳再世而亂猶未弭皆春秋微而顯之法也往在賊臣表逆節註節作帥按節亦謂節度使但不成語侍祠恧先露注一作霑按似是路字赤墀櫻桃枝至涇渭開愁容新廟之成在乾元元年四月故收京詩云歸及薦櫻桃也結尾特紀其時以為鑒戒所謂願君無忘在莒若京都再火則此幸不可以屢邀也歸號故松柏二句近臣同國休戚陵寢永安則先臣之墓木可歸守矣昔遊吳門轉粟帛二句合此篇與後出塞第四篇徵之可信唐之常用海運矣商山議得失四語當闕所疑如註以吕尚為房琯鑿甚壯遊已具浮海航豪字餘韵到今有遺恨二句頓挫渡浙想秦皇翻疑柁樓底晚飯越中行謂斯時也除道哂要章指朱買臣欲罷不能忘欲罷二字便已帶起歸帆收拾門接最敏春歌叢臺上趙冬獵青邱旁齊脫身無所愛二句文酒跌宕冉冉將老然終不邀時求合蓋生平所志誠不在榮華也杜曲晚耆舊晚出而已為耆舊也國馬竭粟豆二句明皇好鬬雞又有舞馬爪牙一不中蓋指清河公敗于陳陶斜言之非謂相州九節度之潰大軍載草草詩傳草草勞心也廷争守御牀公此言必不誣其慷慨廷諍非獨救房相一事史失其傳耳鬰鬰苦不展二句與壯字反之推避賞從至末國家雖有報功之典然皆人臣分所當為奈何必計榮華之與勲業相為匹敵乎是犯天道之忌而為鴟夷所笑矣因不用而復懐曩遊思尋范蠡五湖之舟然范以功成身去今凶逆未定吾以此待朝廷之英俊矣若阿諛順旨無勲業而取榮華自附靈武元從功臣貪天功者必有天殃吾見朱門傾奪不義而被刑戮者多矣寧病屏逺方不忍為此態也安溪師云人當薄於福享而勲業有餘始不以盛滿致咎若榮華與勲業相敵即嵗暮嚴霜可畏鴟夷子功成身退不為榮華所繫乃超出於尋常者矣遣懐憶與高李輩史言高適五十稱詩以此觀之未必果然先帝正好武言與高李徒負文藻而所值乃好武之主旋遘離亂不惟所懐終於不展方且復有存沒之感然則其何以遣此耶寰海未凋枯自此凋枯用一未字妙百萬攻一城四語詩史同元使君春陵行序簡知我者此篇蓋深惜其去而望廟堂有留之者此黍離大夫所謂知我者非獨公之素交也李潮八分小篆歌字體變化如浮雲此句中并貫注草書秦有李斯漢蔡邕李斯篆蔡邕分丞相中郎丈人行丞相中郎公詩之匹也結句美潮愈淡愈至亦變化超脫我今衰老才力薄二句方云此言作歌之才力不足以敵潮作書之才力也潮以八分傳公以詩傳雖自嘆實自負也才薄將奈石鼓何即是學此結覽栢中允兼子姪數人除官制詞因述父子兄弟四美載歌絲綸戮力自元昆兄弟子弟先卒伍父子絲綸實具載覽詞奉公舉骨肉束上方當節鉞用至末又勉其後効荆南兵馬使太常卿趙公大食刀歌開出李賀憑軒㧞鞘天為髙言肅殺之氣滿空也不似長劍須天倚收刀字王兵馬使二角鷹悲臺蕭颯石巃嵸四句從荆南起角鷹翻倒壯士臂二句並提荆南芮公得將軍至末雙結狄明府因巧詆之詆偶誤作計或疑是上去通叶其實止用十一薺一韵耳太后當朝多巧詆多巧詆謂好議論者譏其事女主也豈知梁公末年執政尚能决䇿迎還房陵若其早也匡復不待五龍矣獨清茹苦惟不世之才能之奈何妄疑大賢乎秋風二首暝傳戍鼓長雲間風傳之也第二首東流之外西日微比暮年白髪天清小城搗練急從風吹衣生下早晚孤㠶他夜歸欲乘此風也此句急欲歸故園池臺今是非言仍不可歸也久雨期王將軍不至前半得字亦以職韵入屋沃中憶昔范増碎玉斗二句未詳别李秘書始興寺所居安為動主理信然所居對下止觀我獨覺子神充實獨字藏自己精神一面老身古寺風泠泠暗指寒妻兒待米且歸去言飢也妻兒待米雖欲安而何可得哉虎牙行虎牙山名在峽口與荆門相對金錯旌竿滿雲直竒句錦樹行垂白之年思見太平而亂猶未弭若此所以當急景而増憂也霜凋碧樹作錦樹興也春草萋萋盡枯死比也赤霄行衛莊見貶傷其足衛一作鮑按衛莊公傷足事則哀十六年所謂踰於北方而隊折股是也成十七年則鮑莊子事詩云見貶則作鮑者得之前苦寒行二首第二首去年白帝雪在山即公所云南雪不到地也復陰江濤簸岸黄沙走二句白者疑翻江濤黄者疑捲灘沙豈知陰晦中雪隨風大作已埋山也江濤句半虛半實怪怪竒竒寄柏學士林居天下學士亦奔波亦字暗藏蒼生一層歎彼幽棲載典籍頂學士寄從孫崇簡武陵春樹他人迷言惟外人不容再至耳與汝林居未相失二句承盡室去牧䜿樵童亦無頼二句承他人迷公欲依崇簡以居故落句托樵牧以觀其意奉酬薛十二丈判官見贈西來有好鳥薛判官無心雲母屏雲母屏非用後漢書鄭宏事即指下卓氏也老夫自汲澗至夢覺有微馨此比言已為争房琯斥亦致君君未聽者也碧色忽惆悵二句發端睡字却暗為此處伏脈人生相感動以下言如薛者未必果不相遇君側無人宜急其大者勿因論一邪不能去而遂出故云休辨渭與涇也此詩多不詳所謂醉為馬墜諸公擕酒相看甫也諸侯老賔客類本云上露一老字下因言少年送髙司直尋封閬州初聞伐松柏二句常意壯語君不見簡蘇徯百年死樹中琴瑟二句竒偉贈蘇四徯不得豁心胸轉蓬之故君今下荆揚以下亂邦固不可居然作客豈必皆適志若所向齟齬轉蓬不已非徒汲汲無歡亦恐誤嬰世網皆因其不得豁心胸故喻解之憶昔行韓多法此類本云今昔南北用得不覺巾拂香餘搗藥塵塵字故實此為佳據青兕黄熊啼向我即指風水聲魏將軍歌此詩亦開長吉類本云用韵可學北風結句言羡其有芝可茹得以全命亂世直至時清也痛語乃曠逸出之白鳬行發端二語壯盛意氣遲莫摧頽讀之可哭白鳬自况末乃指當時卿相特不敢斥言天子蒙塵故耳朱鳳行亦公自况于時南伯無當之者醉歌行贈公安顔少府請顧八題壁八字下疑脫分字顔氏之子才孤標三句主此才而止一尉則時可知矣然不見吾二人乎君不見東吳顧文學二句客詩家筆勢君不嫌二句言當世所知止此實可憐傷君不嫌其為鄙事而請之則聊為題也感君意氣無所惜二句因主以見客三人者皆神仙中人也然而天地閉賢人隱頭白不遇獨其同類意氣相惜耳夜聞觱篥結言未見我於喪亂之中重遭此險阻也别董頲到我舟楫去二句非不覺董君之窮其如我之欲逺就食何殊難為懐又不得不聽其去十字中無窮縕藉老夫䌫亦解四句言愧我亦值饑窮不能相恤視董冐寒逺求甘旨君當諒此别懐也當念著白㡌二句窮愁語最能俊麗送重表姪王砅評事使南海王魏先事隱太子傳聞異詞當以史作房喬之母為正入怪鬂髪空二句方云鬢髪髻鬟四字得左氏法上自既翦而言下自未翦而言以下叙致有法操縱詳略無不如意秦王時在坐二句倒出秦王作上下闗紐何等筆力五色非爾曹非言豈非也自下所騎馬四句如在目前水花笑白首自笑相似也大夫出盧宋盧懐慎宋璟方云此詩分兩叚毎段皆十九韵可見前人詩格精嚴如此咏懐二首倐忽向二紀奸雄反覆赤子糜爛遂至二紀如我者嵗月蹉跎得志無期又將何語拯救之哉髙賢迫形勢四句可痛此得志而不能行者也夜看鄷城氣至末豐城之劍有時化獨我蹉跎沉埋莫問齒髪日衰致君無日徒託深意於苦詞耳回首蛟龍池言將與物化也第二首皦皦幽曠心一連堯舜之君不可逢即我亦欲苟全自活獨善其身棲幽曠而異平素矣未辭炎瘴毒言不惟渡湖且將踰嶺也結托老人星正謂此去亦何所因依也送顧八分文學適洪吉州辨眼工小字工小字上以辨眼綴之頓覺潤細惻隱誅求情惻隱含下賢字誅求含下愚字贈子猛虎行古猛虎行曰飢不從猛虎食蓋不願其從誅求割剥虎而冠者得食也上水遣懐童穉日糊口托童穉以糊其口也但遇新少年二句所遇無故物焉得不速老窮迫挫曩懐二句可哭孤舟亂春華春華疑作青草崷崒清湘石入水黄羆在樹顛二句以黄羆自喻羣虎則童穉也宿鑿石浦飄風過二句飄風暴起之風興下少恩惠句江山雖麗不足投足一宿猶多疑畏也舟楫不敢繫若作敢不繫即死句矣窮途多俊異以下謂眼見俊異多遭殘害不忍盡言故但言少恩惠也詩鄭箋草草憂將妄得罪也聖哲垂彖繫繫字兩義重押過津口春日漲雲岑南岳影在湘水中頂近字神妙回首過津口得風故回首已過也白魚困宻網津口黄鳥喧嘉音楓林瓮餘不盡酒二句是言各遂其性庶幾不遂寂寞也次空靈岸幸有舟楫遲二句次字迴㠶覬賞延次字餘韵宿花石戍農器尚牢固言及今尚可招徠只在減其征調耳吳楚守王度言守王度者僅存此土不當迫之散走復為賊用也早發有求常百慮二句所謂百慮即慮雖斯文以有求傷直亦為病也結句疑悞二字收足百慮意煩促瘴豈侵顧病字仰慚林花盛無主之花尚恐輕折况因人干請乎公卒以餒死於此見其志老而彌壯而詩真不徒作矣薇蕨餓首陽二句寧為伯夷之隘而不敢藉口於南宫之粟馬葢恐傷直性雖斯文輕有假借如早嵗於鮮于太常之徒亦足病也賤子欲適從收慮字結句紆迴其㫖所謂言之無罪詩道之溫柔固然歟次晚洲晚洲適知名二句先㸃洲名為次字逺勢危沙折花當危沙句始得旁洲渚也如此出題明暗竒變吾得終疎放得者慮其不得也望嶽渴日絶壁出一連如此領起望字參靈之極未暇杖崇岡足望字三歎問府主應發端牲璧忍衰俗二句明德維馨豈忍仍衰俗之為而徒事牲璧清明當此喪亂猶以䌓華相矜以樂慆憂不祥孰甚焉公意所當袚除者未有先於此也風雨看舟前落花戲為新句子山體影遭碧水潛勾引二語好句珍重分明不來接是前字蜜蜂蝴蝶生情性二句蜂蝶性情所鍾而蜻蜓不敢正視者避百勞也岳麓山道林二寺行塔刼宫墻壯麗敵四句二寺細學周顒免興孤公詩中凡用周顒傳寫皆誤為何一重一掩吾肺腑頂細字别張十三建封彭城英雄種二句廢帝指髙祖像云渠大英雄彭城劉之望讀者乃誤以張鎮徐州當之此貞元間事耳上並言劉裴此乃從劉入張羽人掃碧海所謂海中乃復揚塵也方云羽人句未詳予謂建封在湖南不樂吏役而去公蓋責以君臣大義勉其别後當樹功業繼外家不可似羽人凌蓬萊耳暮秋枉裴道州手札率爾遣興寄近呈蘇渙侍御齒落未是無心人含下致君使我晝立煩兒孫含下人扶劉毅答詔驚群臣答詔即指可方桓靈之語對上黎元愁痛句奉贈李八丈判官官曹正獨守貞刻正避諱秋枯洞庭石只換枯字便新歲晏行土着之民雖竭澤而漁已無所出其禍將及于客戸次連蓋以為比也嵗云暮矣多北風詩序北風刺虐也去年米貴闕軍食至末去年荒亂至今年之終仍然如故且加以錢荒之患然則竟何所終耶結句收足嵗晏最深渾汝休枉殺南飛鴻重告莫徭割慈忍愛還租庸米賤傷農往日用錢捉私鑄以下又言雖鬻男女仍無從得錢而達官方急杼柚此土必將變起倉卒欲奔走他適恐處處皆然所以悲也好惡不合長相蒙汝厭酒肉民罹死亡好惡相蒙焉得不亂耶追酬故髙蜀州人日見寄并序本追答劉沼東西南北更誰論髙詩中語文章曹植波瀾濶序中漢中王昭州詞翰與招魂序中敬昭州蘇大侍御訪江浦賦八韵紀異序舟楫而已言惟訪我之舟檝也憶其湧思雷出至金石聲文筆須如此賦八韻紀異詩但七韵亦見老夫傾倒於蘇至矣此莊子所謂逃虛者也非公之失人今晨清鏡中先今晨後昨夜乃有回環諷嘆之味昨夜舟火滅叙云接對明日憶其云云題衡山縣文宣王廟新學堂呈陸宰以文為詩題固當如是也旄頭彗紫微新字縁起無復爼豆事上不教也嗚呼已十年二句失墜學者淪素志下不學也歘得文翁肆虛接新字若舞風雩至對上志字是以資雅材入陸宰渙然立新意出新字根源舊宫閟以舊字咏嘆新字大屋加塗塈又細寫新學堂始壓戎馬氣以下收轉旄頭彗紫㣲㸃綴學堂所有兼紀新之時也耳聞讀書聲重言永嘆殺伐災髣髴言髣髴殺伐已息也喜極而反成悲咽語不能終非公不到髙歌激宇宙應首唱意入衡州元惡迷是似迷是似言借以矜恤其下也汨沒隨魚商魚或刻漁吳本是然夢得南謫詩中多以商人魚父屬對也劇孟七國畏指蘇生舟中苦熱遣懐奉呈楊中丞通簡臺省諸公媿為湖外客二句為客則無討賊之權在手若中丞與諸公豈可坐視也沒齒埋冰炭言愧憤交迫也中丞連帥職入楊身當問罪先力足辦賊似聞上游兵勿後隣道驅馳數公子通簡諸公此流須卒斬本詩國既卒斬扣寂豁煩襟二句謂吾言恐不足激此衰愞庶幾天誘其衷也聶耒陽以僕阻水書致酒肉療飢荒江詩得代懐興盡本韵至縣呈聶令陸路去方田驛四十里舟行一日時屬江漲泊于方田方云此十七篠上聲韵正多不旁溢巧皓二韵故曰興盡本韵禮過宰肥羊一連陋生因此二語偽造為牛炙白酒事問罪消息真按此詩去公之殁無幾然汲汲惟以討賊定亂為念可以知其所存矣義門讀書記卷五十二

body:
  text: 義門讀書記卷二十六翰林院侍讀學士何焯撰三國志魏志武帝紀飬子嵩嗣注採吳人作曹瞞傳及郭頒世語並云嵩夏侯氏子按夏侯惇之子楙尚清河公主淵子衡亦娶曹氏則謂嵩夏侯氏子者敵國傳聞蓋不足信大將軍何進與袁紹謀誅宦官太后不聽進乃召董卓欲以脅太后注魏書曰太祖聞而笑之曰閹豎之官古今宜有但世主不當假之權寵使至於此按此注乃事後虛詞掠美厥祖何人斥言閹豎初平元年使袁將軍率南陽之軍至以順誅逆可立定也此項羽戰河北髙祖西入關之勢也卓兵方盛未挫于外故堅壁勿戰待內釁作而後乘之袁紹與韓馥謀立幽州牧劉虞為帝太祖拒之以弒君討卓無故又改立君是二卓也注諸君北面我自西向虞在幽州故曰北面長安為行在所故曰西向紹又嘗得一玉印於太祖座中舉向其肘注魏書曰紹復使人說太祖曰今袁公勢盛兵强二子已長天下群英孰踰于此按紹此時僅為一郡守并未得韓馥讓州未應意盛若此三年毒等攻東武陽太祖乃引兵西入山攻毒等本屯毒聞之棄武陽還烏巢之役袁氏之謀略同而成敗異焉故用兵貴知彼己也青州黃巾衆百萬入兗州至果為所殺光武擊銅馬于鄡賊數挑戰光武堅營自守有出鹵掠者輒擊取之絶其糧道積月餘日賊食盡夜遁去追至館陶大破之此成敗之可參質者也明季與流賊相持者皆不知此謀督促出戰遂皆為劉岱之續四年太祖擊詳術救之至又追之至九江外為紹用實所以保據兗州也興平元年春太祖自徐州還至所過多所殘戮以報讐興師實志在并兼所過殺戮所以不能定徐布出兵戰先以騎犯青州兵青州兵奔所收黃巾精鋭尚未習練猝遇勍騎則偏敗衆擕先犯之者由宫邈素知虛實也二年時太祖兵少設伏縱竒兵擊大破之注魏書云云按布蓋使人踏伏見無兵乃復來操豫料其然設伏以待布兵見乘隄者猝起出不意奪氣遂為所敗也建安元年冬十月公征奉自為大將軍後始稱公蓋天子三公稱公也是歲用棗祗韓浩等議始興屯田注魏書云云按議始祗浩成之者峻淵不憂運饋則可與賊持久伺變施巧勝算常在我矣三年初公為兖州以東平畢諶為别駕至以為魯相孟德待畢諶尚爾况昭烈之于元直乎四年初公舉种孝亷至釋其縛而用之釋畢諶魏种而用之皆假以懷四方之士于時宿儒世胄大抵在河北漢南也評所謂矯情任算不念舊惡指此類使臧霸等入青州入青州者擾紹之左以分其兵十二月公軍官渡裴松之北征記曰中牟臺下臨汴水是為官渡袁紹曹操壘尚存焉在今鄭州中牟縣北五年公曰夫劉備人傑也今不擊必為後患備有雄才加之宗室如與紹連兵備必襲許以迎天子衆心歸仰操事去矣故不得不急破之也時公兵不滿萬傷者十二三上固云分營與相當矣則此但指自將之親兵也然亦必有一二萬人云不滿萬則非其實大破瓊等皆斬之注採曹瞞傳曰公意欲不殺按靈帝時瓊為左軍校尉與魏武皆西園八校尉之一故欲活之六年九月公還許紹地廣衆盛謀議之士附者尚多其兵雖破未可取也故歸許以養威俟釁且以其間剪劉備復起之勢得以全力徐收河北莫能牽制耳八年其令諸將出征敗軍者抵罪失利者免官爵始猶烏合故多寬假至此乃議罰為立國經久之計九年武安長尹楷屯毛城至尚將沮鵠守邯鄲又擊拔之破楷則高幹并州之援北斷拔邯鄲則袁熙幽州之援東絶擊楷自將者運道不通則堅城大衆有自潰之勢所係尤大也紹曰吾南據河北阻燕代兼戎狄之衆南向以爭天下庶可以濟乎紹見光武資河北以定海內故圖據之十二年於是大封功臣二十餘人皆為列侯其餘各以次受封封功臣乃徐議自尊矣十三年秋七月公南征劉表注採皇甫謐逸士傳天下將亂為亂魁者必此二人也按歷世持權賔客翕習其人又小有才鮮不為亂者二袁即前漢之王氏也益州收劉璋始受徵役遣兵給軍時操駸駸有取蜀之機十四年置揚州郡縣長吏開芍陂屯田由此淮南為重鎮十五年春下令注採魏武故事載公十二月己亥令遂平天下按孫劉方睦而云遂平天下蓋其器限之也史家評操攻伐自克紹而止譏過此即鼎足虎爭非復所能戡定矣注以及子植兄弟此子植植字乃子桓傳寫之訛對臣下不以稱子之字為嫌觀陳思王傳注中所載諸令屢稱子建則此為子桓决也十六年先以輕兵挑之戰良久乃縱虎騎夾擊大破之弱者出戰强者繼之其挑戰者乃逰軍也十八年五月丙申天子使御史大夫郗慮持節策命公為魏公關中定而後魏公九錫之事成矣魏公之命及丕禪受之際但録冊書而不著其僞讓承祚之微詞所以殊於他史者也朂辭可以削略注復載勸進箋不亦贅乎初置尚書侍中六卿注採魏氏春秋云云按此魏國之官十九年夫有行之士未必能進取至士有偏短庸可廢乎如此則所得者不過從亂如歸之徒雖取濟一時東漢二百年之善俗俄焉盡矣由此篡亂相循神州左袵豈非中國禮教信義為操所斫喪而然耶二十年賊見大軍退其守備解散至巴漢皆降操誠善兵以諸傳考之獨此役幸成非實録二十一年三月壬寅公親耕籍田注魏書云云春祠令講武奏儼然以天子議禮自處矣二十四年夏五月引軍還長安朱溫末路大敗於李存朂後嗣彌以不振乃知操之斂軍而退為善持盈也冬十月王軍摩陂陸機弔魏武帝文云當建安之三八實大命之所艱雖光昭於曩載將稅駕乎此年憤西夏以鞠旅泝秦川而舉旗踰鎬京而不豫臨渭濵而有疑冀翌日之云瘳彌四旬而成災詠歸塗以反斾登崤澠而朅來次洛汭而大漸指六軍曰念哉觀此則操實以西行不得志而發病及襄樊圍急狼狽還救偃息不遑登頓而死史不盡書耳當以武侯正議參證二十五年遺令曰天下尚未安定至無藏金玉珍寶陸機弔文載遺令有云吾在軍中持法是也至于小忿怒大過失不當效也注中亦宜補見評評無溢美收紹四州之後不復能有為此志所以不得不並列三國也文帝紀建安二十二年立為魏太子注採魏書云云此與朱建平事相類或所傳異也庚午大將軍夏侯惇薨注孫盛曰在禮天子哭同姓於宗廟門之外哭於城門失其所也按魏未嘗以夏侯為同姓故與之婚姻孫盛所議非也庚午遂南征注採魏略云云其言凡近無可採危于纍卵言之又過先王不稱為德犯其所忌性之死非不幸也其得禍尤酷者丕將行禪代之事而治兵以偹非常又欲飾其跡托之南征性不喻而贅言沮衆丕遂莫能容忍耳使兼御史大夫張音持節奉璽綬禪位注採太史丞許芝條魏代漢見䜟緯于魏王又曰初六履霜隂始凝也按此可為無堅冰二字之證黃初二年後有天地之眚勿復劾三公自此遂無水旱劾三公之事然燮理之意微矣三年春正月丙寅朔日有蝕之日食正朝應在昭烈伐吳喪敗若限年然後取士至到皆試用左雄限年之法至此復變欲以誘進鋭進之士一志事已也豈有七百里營至此兵忌也兵勢惡分敵乘其間則救禦難四年三月癸卯月犯心中央大星四月癸巳漢昭烈皇帝崩是月大雨伊洛溢流殺人民壞廬宅宋書五行傳云簡宗廟廢祭祀則水不潤下帝初即位自鄴遷洛營造宫室而不起宗廟太祖神主猶在鄴常於建始殿饗祭如家人禮終黃初不復還鄴而員丘方澤南北郊社稷等神位未有定所此其罰也按此可見魏氏禮制之缺不獨一事之徵附著之評仿漢武贊文帝天資文藻下筆成章博聞彊識才藝兼該注採典論帝自敘云云按觀其自敘所謂望之不似人君已不堪張子布見况立石太學甚矣魏人之不知恥也明帝紀太和三年追尊高祖大長秋曰高皇帝夫人吳氏為高皇后與其追尊曹騰自實其為贅閹乞養不如丕之殺于禮矣此自為睿不能生子而以加隆所後之親為後人勸與下七月詔書連類而觀可以得其情矣青龍二年三月庚寅山陽公薨山陽公薨書日山陽以三月薨及秋而丞相亮適亦卒于渭濵天之于漢數訖於是矣三年是時大治洛陽宫起昭陽太極殿築總章觀百姓失農時諸葛既卒邊鄙不聳而睿遂恣淫荒矣孟子之論中人者不亦信乎秋七月洛陽崇華殿災注採魏氏春秋云云按馬有七其宣景文武惠懷愍之祥乎四年置崇文觀徵善屬文者以充之王肅為祭酒景初元年改太和歷曰景初歷景初歷尚書郎楊偉所造事詳宋書歷志曹爽有參軍楊偉疑即斯人宋書又載黃初中太史丞韓翊嘗造黃初歷時陳群為尚書令奏以為是非得失當以一年决定今注家于群傳遺之楊偉歷施用暨於晉宋而名字翳然亦採掇之闕略也十二月壬子冬至始祀注漢晉春秋云云按金狄泣者睿死魏亡之妖也二年春正月詔太尉司馬宣王帥衆討遼東注魏名臣奏載散騎常侍何曾表云云按孔明殁而軍幾亂頴考置副之義蓋老謀也有彗星見張宿其占與王莽地皇三年有星孛于張同天將除曹氏矣三年癸丑葬高平陵注魏書曰自在東宫不交朝臣不問政事唯潛思書籍而已按不交朝臣不問政事此不獨免于文德之讒亦萬古育德潛邸正法也潛思書籍事其逺者大者而不徒用資文藻則才識開益不待接人臨事胸中自有權衡矣三少帝紀齊王正始五年冬十一月癸卯詔祀故尚書令荀攸于太祖廟庭注臣松之云云按遺郭嘉者亦以非魏臣也景元三年復祀嘉蓋司馬氏以厲其黨獨祀典韋者加之死事也八年尚書何晏奏曰善為國者必先治其身至為萬世法史家於平叔等既于曹爽傳中附見不能為之平反特録此奏於紀使百世下因其言而知其人不欲盡沒其實於異同之口耳嘉平元年太傅司馬宣王奏免大將軍曹爽至語在爽傳莽之殺賢懿之族爽皆稔知其中外殫微猝起乘之六年秋九月太后令曰至以避皇位芳臨御數載非若昌邑始徵若果君德有闕播惡于衆師何難執以為辭今稱太后之令發牀第之私有以知其為誣矣高貴鄉公甘露元年春注採魏氏春秋遂言帝王優劣之差帝慕夏少康按言論之間慨慕少康則澆􅜦有在矣其亦機事不密之端乎丙辰帝幸太學陳氏詳書幸學問難于紀蓋亦深致嗟惜之意二年詔吳使持節都督夏口諸軍事鎮軍將軍沙羡侯孫一至事從豐厚注臣松之云云按時淮南引吳為援一適來奔故司馬氏濫以爵寵之冀以招誘來者五年五月己丑高貴鄉公卒年二十公羊傳曰公薨何以不地不忍言也書高貴鄉公卒其猶有良史之風歟抽戈犯蹕若直書之則反得以歸獄于成濟今公卒之下詳載詔表則其實自著而司馬氏之罪益無可逃所謂微而顯順而辨也史通論之蓋未識變例之深旨沈業即馳語大將軍得先嚴警觀此二語沈業方為司馬借以自解于天下幾與成濟同戮矣使使持節行中護軍中壘將軍司馬炎北迎常道鄉公璜嗣明帝後以親疏論是時丕後尚有人璜為宇之子則操後也當時惟昭之指昭穆逺近莫敢議矣陳留王景元元年故漢獻帝夫人節薨高貴鄉公弒崩之事獻穆猶親見之常道鄉公薨于晉太安元年則又晉室大亂趙王倫盜篡反正之後也噫臣等平議以為燕王章表可聽如舊式章表稱臣于心有所不安不臣可也當更取北魏清河王事參之不至如周世宗之野差順耳咸熙元年春正月行幸長安郭太后在殯蓋墨縗而出也以司空王祥為太尉注採漢晉春秋云云按祥知拜之不可然其自處何以并在楊彪下也厥後馮道受郭威之拜復折而事周是以唯大節不可奪為難罷屯田官以均政役法久漸敝當時罷之必有以也當合司馬芝傳參觀之評仰遵前式至比之山陽班寵有加焉君以此始必以此終評語可謂絞而婉矣后妃傳武宣卞皇后尊后曰皇太后稱永壽宫注採魏書云云按卞亦有權數若顯救植則外廷必有武姜叔段之議不以為言而動以意或可為耳文德郭皇后遂敕諸家曰今世婦女少當配將士不得因緣取以為妾也此時當别有科禁今不可考矣青龍中諸士女嫁非士者一切奪以配戰士亦當緣此為辭耳后崩于許昌以終制營陵注採魏略云云按郭太后殁其宗親恩禮無改故陳氏不取然毛后賜死曽猶遷官曹氏之酷虐變詐難以常理推也董卓傳公卿見卓謁拜車下注採張璠漢紀云云按注前所採山陽公載記之語尤近實觀義真後此其氣已衰未必能為是言僅足以避凶人之鋒耳袁紹傳高祖父安為漢司徒自安以下四世居三公位由是勢傾天下注採魏書云云按游俠之歸必為亂首諸袁是已曹操所語王俊者上之人當圖之于未形也俊事在武紀荆州平下乃召董卓欲以脅太后紹勸進召董卓為謀不臧漢室破壞而袁宗先受其殃天下之罪魁也時紹勸進便可于此决之進意既同紹為司𨽻乘讓忠之出選爪牙武吏執取渠魁盡之于獄反掌可以集事徒見王甫既誅陽球旋亦受禍欲措其身于萬全之地惟望進之早斷不敢自决耳紹自號車騎將軍主盟與冀州牧韓馥立幽州牧劉虞為帝紹此舉更誤方起兵討卓以廢弒少帝為辭乃欲尊立疏宗蹈其覆轍其後終以獻帝君臣之好不固狐疑未即奉迎曹操先之使號令為他人所假不戰而成敗異勢矣圖還說紹迎天子都鄴紹不從注採獻帝傳若迎天子以自近動輒表聞從之則權輕違之則拒命非計之善者也按後之權衡不審為此二語所誤者多矣擊破瓚於易京并其衆注採九州春秋曰紹延徵北海鄭元而不禮按許靖猶當加禮况鄭康成乎出長子談為青州沮授諫紹必為禍始紹不聽紹不從迎天子之謀所以先敗不聽出長子之諫所以速亡史家撮舉之乃一傳之綱也太祖自東征備田豐說紹襲太祖後紹辭以子疾不許若用田豐之言即使許不可拔而紹據臨大河以爭其北徐州出兵擾其東南過于彭越之在梁地操奔命不暇矣注魏氏春秋載紹檄州郡文故復援旗擐甲席捲赴征金鼓響震布衆破沮李善文選注云紹征吕布諸史不載蓋史略也注故使從事中郎徐勛就發遣操天下之人豈可盡欺發遣之云徒為操所嗤耳注又梁孝王先帝母弟墳陵尊顯至士民傷懷此事不知信否文選注曹瞞傳云曹操破梁孝王棺收金寶天子聞之哀泣似緣此檄而實之者也注加其細政苛慘至動足蹈機陷此因其法令必行而動搖之談尚舉兵相攻注引漢書春秋載審配獻書于談曰先公謂將軍為兄子將軍謂先公為叔父按此二句則漢末稱本生父母之親不復係以父母之名矣生禽配配聲氣壯烈至遂斬之配於廢立之際從主于昏雖能死不得與沮授比袁術傳南陽戶口數百萬至舍近交逺如此二事亦是撮舉其敗亡之由注採吳書云云按獻帝幼冲董卓擅命何可比于子胥術書雖非本旨於情理稍分明曹將軍神武應期至信有徵矣當時人心歸操其言至此早知其為漢賊者不過數人而已劉表傳范書以表為魯恭王之後而此注無聞焉表雖遣使貢獻至表不聽注採漢晉春秋云云按此曹操所謂乍前乍却以觀世事者也南收零桂北據漢川注採英雄記云云按喪亂中經籍不遂泯絶實賴有此非可以表無逺略嗤為不急太祖與袁紹方相持於官渡紹遣人求助表許之而不至表不助紹以綴操後則失合從之勢雖欲保江漢間其可得乎太祖軍到襄陽琮舉州降注採漢晉春秋云云按人心瓦解遣之必相率而潰將又凡材豈能徼一時之幸琮之勢比于張繡之素能拊循其衆者又已異矣徒爾覆宗不納為愈吕布傳布覺其意從紹求去注採英雄記云云按布是王官又除董卓故兖徐之士往往附之曹劉天下英雄然其始衆心未一者猶有擅相署置之嫌耳張邈傳太祖曰布狼子野心至拜登廣陵太守據徐揚之中陳登傳年三十九卒安溪師謂元龍於昭烈一見傾心然登父子始終為曹未為知人使永厥年豈能自潔于漢魏之間乎按昭烈固嘗歸曹氏當其奉迎都許從掃地赤立之中使天子復有尊安之勢天下顒顒孰不仰望及後乃知其志在自封耳使登尚在當昭烈復據徐州必戮力合規同奬王室或可不至失土北奔也惜其早殁不得與孔明季直並列季漢輔臣贊中决不隨公逹輩配食魏廟耳臧洪傳紹本愛洪意欲令屈服原之見洪辭切知終不為己用乃殺之注採徐衆三國評為洪計者云云按當時無他國可奔與袁曹不協者北有公孫與超鞭長不及南則袁術方謀僭盜况身又為紹所拘留哉惟有辭東郡之符退而耕野待如昭烈者起而事之報曹氏于後斯上䇿耳公孫瓚傳及劉徙日南瓚具米肉于北芒上祭先人瓚既遼西人前世又非素官于朝何緣先墓乃在北芒虞宗室知名民之望也遂推虞為帝因紹等之謬計亦即可見昭烈當日足以有為但屬宗室自為人所服從乃兩漢稍存封建之效也注吳書曰是時有四星會于箕尾至文曰虞為天子四星㑹于箕尾昭烈起涿郡之祥虞為天子魏虞後也遣人與子書刻期兵至舉火為應注採獻帝春秋云云按更其書者所以譎瓚在昔衰周二十四字後漢書即作瓚與續書發端者近之非琳所更也陶謙傳參車騎將軍張溫軍事注採吳書謙仰曰謙自謝朝廷豈為公耶按漢末爭下士故謙得以行其意是歲謙病死注採吳書云云按子布之筆未為竒傑何以禰衡重之張魯傳魯欲舉漢中降至太祖攻破之遂入蜀注採魏名臣奏載揚暨表云云按此操不敢取蜀之實録其後懲于夏侯授首亦無意復爭漢川也然持勝之道莫善于此為子彭祖取魯女魯薨諡之曰原侯子富嗣注採魏略時又有程銀侯選李堪云云按此屬皆大亂之時塢壁自保因為雄長者也金末封建九公亦因而用之之法力不能平反假以祿位使為扞禦也曹洪傳始洪家富而性吝嗇至乃得免官削爵土按楊沛傳此舉雖文帝不宏而洪舍客亦屢犯法與劉勳並稱得罪亦由素不檢制其下也沛事在賈逵傳注中曹休傳明帝即位進封長平侯孫資别傳有文皇帝晏駕陛下即阼猶有曹休外內之望云云按明帝與休無間知資别傳為妄曹真傳真以蜀連出侵邊境至詔真還軍內審已外量敵于時豈能必取而數道興師子丹此舉幾于敗國喪名昭伯嗣事于蜀遂為結怨天下之始亦徼幸之餘殃也爽齊王即位加爽侍中至贊拜不名爽名位素輕忽膺重寄不勞謙以先天下而偃然輒當殊禮有以知其必敗矣注魏書曰其以太尉為太傅兼大司馬則懿猶典兵但崇以太傅虛名所為實奪之權也揚等欲令爽立威名于天下勸使伐蜀爽從其言曹爽諸葛恪皆以輕舉喪功結怨于民無懷之者遂以致敗後之輔幼主者茍才德不如孔明且務法子孟之休息哉十年正月車駕朝高平陵至遂出屯洛水浮橋昭伯兄弟專政九年乃及禍敗宣王舉事固非聊爾一擲也侍中許允尚書陳泰說爽使早自歸罪是役舊德如蔣濟人望如陳許皆為仲逹所欺晏注採魏末傳晏母歸藏其子王宫中云云按據此則平叔蓋尚有後但亦出魏末傳恐虛妄耳費文偉甲乙論云晏子魏之親甥亦與同戮雖曰敵國傳聞然以彼為可信夏侯尚傳子元夫欲清教審選在明其分叙不使相涉而已清教謂中正審選謂臺閣臺閣則據官長能否之第參以鄉閭德行之次擬其倫比勿使偏頗前代吏部用人略得此意雖不設中正猶參取鄉評也司牧之主欲一而專一則官任定而上下安專則職業修而事不煩此議古今可以通行但吳蜀未一各置重鎮郡守之權不得不有所統又其人素貴驟與令長等列雖爵命不齊必以失權為恨猶當徐俟混一乃議之也又幹郡之吏職監諸縣至若皆并合則亂原自塞此謂刺史之典郡書佐秦時無刺史至其後轉更為官司耳懿之意蓋謂無變官制但刺史所察止于六條循漢之初意則亦無重纍之患郡守以總率令長古有監牧亦不可盡去也今公侯命世作宰至竊未喻焉公侯謂懿三公封侯故兼稱之于時懿方營立私門日暮倒行何暇經逺如清教審選各不相涉而仍互相形檢此反掌可行而亦不能有改有以知其志不在公矣與曹爽共興駱谷之役真嘗建議伐蜀而無功淵被殺于陽平二子所以共興是役也然不料劉葛之澤尚存賢才未盡君臣無釁守偹甚設豈可幸其有功哉年少浮華未練于事無端輕舉遂為國家之憂悲夫元格量宏濟臨斬東市顔色不變舉動自若注採魏氏春秋元之執也衛將軍司馬文王流涕請之按以三少帝紀證之文王于時為安東將軍亦非衛將軍也清河王經注採晉武帝太始元年詔云云按此詔可見因沈業申意之言亦誣荀彧傳今東方皆以收麥至未戰而自困耳如此論事表裏皆見信乎其為留侯之亞夫事固有棄彼取此者至不患本之不固可也如昭烈之取益州亦是此意紹益驕與太祖書其詞悖慢太祖大怒出入動靜變于常此書即陳琳所作檄豫州將校文也操陽怒以激其士卒耳此二人留知後事若攸家犯其法必不能縱也不縱攸必為變此孔明所以優假孝直也太祖就榖東平之安民糧少不足與河北相支時所在屯田積榖猶患糧少况仰給桑椹虜掠田野者宜其一敗之後不能再舉也願公急引兵先定河北至此社稷長久之利也既當時務之要而修復舊京之語亦猶乃心王室太祖將伐劉表注採彧别傳宜集天下大才通儒考論六經刋定傳記存古今之學除其煩重以一聖真並隆禮學漸敦教化則王道兩濟按不及時圖之則宿儒老生日就衰落後生一失派别則聖籍湮微復尋其緒為力甚難此荀令君所以汲汲于兩濟也荀攸傳攸深密有知防至莫知其所言攸後陵夷豈以隂謀故耶賈詡傳注採九州春秋屠三十六萬方按萬字衍因下方字而妄增加也注引九州春秋及英雄記云云人心未忘漢而擁兵作逆必且變生麾下身膏齊斧以膺禍始之罰使嵩聽之則董卓之前驅耳忠導人作賊卒為賊所迫脅憤慨而死其氣焰有以取之矣傕乃西攻長安注松之云云按詡凉州人為此救死當咎王允不得獨恨詡也明公昔破袁氏至太祖不從軍遂無利談尚兄弟三駕而後克順江東下顧易了若是乎從賈言而以為後圖養威持勝之善謀也注臣松之以為詡之此謀至稽服之可期孫權自赤壁之勝始能立國前此荆人何憚之有賈言未可非然使劉琦倚仗昭烈收父故地荆州猶必旋得而復失固無暇遽望江東之稽服耳用軍之道先勝後戰量敵論將故舉無遺䇿良平不易斯言評曰荀彧清秀通雅至未能充其志也謂如魏武者豈能終為純臣恨文若辨之不早有王佐之才而必欲自見遂不暇於擇主不如孔明潛見皆合龍德田疇傳遼東斬送袁尚首至乃往弔祭注臣松之云云按疇自報烏丸耳邴原傳閉門自守非公事不出注採原别傳是時海內清議云青州有邴鄭之學按鄭公業亦以鄭邴並言非家傳妄相推高之語注其不來者惟有邴祭酒耳至謁訖而出如此張弛則無損大節而仍得謙以受福之道矣管寧傳王烈者字彥方本為彥考後漢書注可据方字寡學者所定也北宋本正作考崔琰傳鄉移為正此正疑即正卒羡卒之正時未立太子至琰以死守之以密函下訪乃露板以答非所以處骨肉之間季圭之禍實萌于此初太祖性忌有所不堪者魯國孔融注採續漢書煒曰人小時了了者大亦未必竒也按長大失學故無竒融此對却輕薄注張璠漢紀常嘆曰坐上客常滿樽中酒不空吾無憂矣處亂世遇多忌二語有一于此殺身有餘矣何夔傳以為自今所用必先核之鄉閭至各任其責核之鄉閭時方草創不易行也修保舉故不以實之令則無施不可然于節儉之世最為豪汰孝先清恪叔龍豪汰而相與為友古人所重在大節奉己之奢儉不以相非也叔龍汰侈頴考濟之貽謀一謬子孫卒受其敗不可以不戒鮑勛傳文帝將出游獵至請有司議罪以清皇朝勛語殊壯但丕聞諒隂之語漠無所動毁表行獵復問其樂何如八音心已死矣又何可與言哉亮有餘而識不足又君子所惜也司馬芝傳自黃初以來聽諸典農治生各為部下之計黃初中屯田之制已壞可嘆鍾繇傳注採先賢行狀少府李膺常宗此三人至復以膺妹妻之按李膺之妹嫁姑之子則中外連姻自古不為非也其後河東衛固作亂注採魏略謹按侍中守司𨽻校尉東武亭侯鍾繇至伏須罪誅按此當日自劾之體初太祖下令使平議死刑可宫割者注採袁宏議云云按宏議浮泛育許昌逼狹于城南以氊為殿百年為戎氊殿兆之華歆傳歆知策善用兵乃幅巾奉迎䇿以其長者待以上賔之禮注採胡冲吳歷云云按伯符之致敬子魚猶孔明之待文休風氣所趨雖英賢亦因時以答輿望而已及踐阼改為司徒注採華嶠譜叙歆以形色忤時徙為司徒而不進爵按此華嶠之飾詞歆不恥為魏相國又何忤哉發壁牽后誰所為也公卿嘗並賜沒入生口唯歆出而嫁之注採孫盛云云按孫論似高而逺于情王朗傳及文帝踐阼改為司空注採魏名臣奏載朗節省奏云云按數行中西京經費如指掌不過漢書表志精熟也黃初中鵜鶘集靈芝池至位次三公歆薦寧朗薦彪徒欲汙染遺逸以分損謗議又何能答曹人之刺乎百姓萬民莫不欣欣此亦以百姓為百官族姓故與萬民相屬言之肅是以唐虞之設官分職至公卿尚書各以事進肅此奏欲漸革政歸臺閣之弊乃當日之急務又欲轉移無迹故但以復五日一朝之儀各以事進為言蓋臨朝奏事面取裁决則尚書不得專執大柄可否任心矣則皇是其差輕者也注採孫盛語及臣松之云云按肅之說出于蔡雍然秦尊莊襄王為太上皇漢沿其名未必為其貴而無位高而無民也漢武帝聞其述史記至而不在于史遷也子雍此對本之衛敬仲與班氏所記不同敬仲所紀非實于時主則為善對大司農宏農董遇等注採魏略云云按宏農雖未踰年然嘗北面臣之則故君也遇謂不應謁者非評劉實以為肅方于事上而好下佞巳去其好下佞巳之病則肅可以無譏矣程昱傳夫袁紹據燕趙之地至霸王之業可成也昱等計謀皆啓孟德奸心者與文若須分别觀之劉備失徐州來歸太祖昱說太祖殺備太祖不聽觀荀文若豈不識元德者哉而不聞有郭嘉程昱之䇿文若乃心不為操可知矣論者以為孫權必殺備論者徒見二袁公孫前事乃自表歸兵闔門不出至太祖賜待益厚歸兵闔門告者安能入哉曉於是遂罷校事官罷之是也然當時實以師方擅朝不欲有􅢽詗之人故曉言得伸郭嘉傳彧薦嘉召見論天下事注採傅子云云按與荀文若語少有異同或附㑹也郭奉孝在不使孤至此孟德追惜奉孝而諸葛亦思孝直帷幄之助不可或失其人雖英雄必資群䇿也董昭傳後昭建議宜修古建封五等至不敢不陳昭自顧才謀非荀郭之儔遂首為諂邪以媚于操時操勢已成故不為耿苞耳又圍中將吏不知有救至必不速退倘權計未就樊守已下關遂長驅則許洛瓦解吕䝉亦沮矣昭可謂慮之周也劉曄傳曄覩漢室漸微已為支屬不欲擁兵此時曹氏代漢之勢未成以支屬不欲擁兵乃曄後來飾詞上繚宗民數欺下國此宗民亦是賨賊即當時山越也劉備人傑也有度而遲至無不克也劉氏必死之戰得蜀雖新已能用其豪傑憑險相持非若張魯未遇大敵小小利鈍可恐而走也曄奈何以料陳䇿者料蜀士大夫乎今不取必為後憂太祖不從魏武用兵必圖萬全蜀漢險峻豈肯懸軍深入若身駐漢中遣將攻備則素非其敵往遺之禽徒損威重故不為也注傅子曰居七日蜀降者說蜀中一日數十驚至未可擊也一日數驚震鄰之勢有所必然彼懼我驕敗徵在我先動則又為烏林之覆轍矣操之不從是量彼己而全其力以俟時者也勸丕伐吳則曄近是可因其窮襲而取之注採傅子云云按曄計得矣然蜀得其外乃上游形勝彼以漢之宗支新破一國天下震動名我為賊若天假之年丕豈其敵乎故董昭以兩敝為長䇿也若丕之言乃是下愚彼謂疑天下欲來者心吳外惟蜀又以誰疑如占夢耳彼謂陛下欲以萬乘之重牽巳至未有進退也此言非知兵見事深知彼己不能如此其審有間為大鴻臚注採傅子曄能應變持兩端如此按曄好持兩端而言不由衷所以任術取敗若進謀决策誠當徐俟其機固陵始議韓彭地復道方圖雍齒封此固知言者也注諺曰巧作不如拙誠信矣至豈不惜哉為帷幄之臣本之以忠信持之以慎密則無敗矣若窺伺機詐未有令終者也韓非為說難而不能自脫誠未至猶未有能動者也况以術哉徒歸于一步不可行而已蔣濟傳吾前决謂分半燒船於山陽池中分當作扶問切自料大半如此也通鑑注作分半船誤陛下既已察之於大臣至莫適以聞蔣濟此疏係國安危信公才也使能用之則孫資劉放安得于彌留之際易置顧托大臣使祚移金行哉此疏萬古英主藥石不專一時之務今雖有十二州至于民數不過漢時一大郡葛相不死魏必可滅蓋以此也敝攰之民攰居胃切力乏也劉放傳尋更見放資曰我自召太尉至帝獨召爽與放資俱受詔命疾病則亂數語中足以見放資之弄權敗國矣晉初修史故其辭也微曰獨召則并詔之真僞不可知矣注世語曰放資久典機任至故勸帝召宣王不密注肇出纂見驚曰上不安云何悉共出曹肇曹爽皆以俱出而敗抑辛毗而助王思王思在梁習傳劉馥傳馥子靖靖字文恭見水經注第十四卷中應璩書與靖曰入作納言至有馥遺風以失其事實故採此書靖為治亦杜畿之亞矣靖以為經常之大法至屯據險要其先見在江統之前又廣修戾渠陵大堨水水經注作戾陵堨車箱渠其元康中所立碑宜補録以廣世期之闕司馬朗傳朗以為天下土崩之勢至宜及此時復之伯逹前一條所以救建武之後盡罷郡國都尉官一變西京舊制罷輕車騎士材官樓船士及軍假吏令還復民伍廢立秋講肄課試之禮馴至三十六方同日並起天下土崩也後一條則奪纍世之業王莽慕古制而失其宜及亂後而復世祖懲近謬而失其㑹適在此時然曹氏無逺見創制經久故口分世業反有待于拓跋之據中原也張既傳太祖將拔漢中守恐劉備北取武都氐以逼關中至出居扶風天水界江統徙戎論云魏興之初與蜀分隔疆場之戎一彼一此武帝徙武都氐于秦川欲以弱寇强國扞禦蜀虜蓋指此事當日操所以使劉氏無所資以北伐者不但空漢中之地而已統徙戎之計亦即祖既語而反用之緝與中書令李豐同謀誅注採魏略緝云威震其主功蓋一國欲不死可得乎按料恪實刺師也欲免難矣任峻傳羽林監潁川棗祗建置屯田注採魏武故事載令云云按祗議即龍子貢助之說也魏人屯田之制賴此令而存杜畿傳㑹白騎攻東垣龎德傳云張白騎叛于宏農白騎即上張晟耶後漢書朱雋傳自黃巾賊後復有張白騎之徒並起山谷騎白馬者為張白騎恕乃上疏曰帝王之道莫尚乎安民至此古今之所常患也何不削略冗長使就簡當讀之易起人意乎于此思班孟堅焉有大臣守職辨課可以致雍熙者哉其論則高然考課者所以待中材凡士亦不可廢也恕上疏極諫曰伏見尚書郎亷昭至誠不可以怠也恕言甚煩長不能自逹其意泰初亦然出為宏農太守注採魏略以孟康代恕為宏農按此孟康即注漢書者顏師古曰安平廣宗人鄭渾傳渾兄泰與荀攸等謀誅董卓注採張璠漢紀後又與王允謀共誅卓按後漢書作與何顒荀攸共謀誅卓為得其實其所得獲十以七賞百姓大悅皆願捕賊用此法則無兵而有兵矣文公固善權變渾以百姓新集為制移居之法至以發姦者此非俗吏所知安農息盜皆在移居法中勤稼穡明法令是目倉慈傳慈躬往省閲至曽不滿十人治邊郡固宜寬簡自太祖迄于咸熙魏郡大守陳國吳瓘至咸為良二千石無政可以垂範後來附見其名為己足矣近代紛煩立傳亦何知體要張樂于張徐傳此與下卷序魏諸將但以注記所載稍櫽其略非經意之文徐晃之解樊圍一時竒功而惟存一令亦安得謂之偹詳也序張遼合肥許禇潼關差勝耳任城陳蕭王傳三王以母弟故别為一卷後卷以母貴賤為次其猶春秋之教歟陳思王植於是以罪誅修植益不自安注採典略文之佳麗吾自得之後世誰相知定吾文者耶按自得佳麗則受彈者之益傳之後世但以佳麗見稱亦誰知因改定而佳麗乎今人多誤㑹佳麗文選作佳惡亦未為大逺本意不解讀者何緣憒憒也注世語曰修年二十五至修遂以交搆賜死世語所言皆鄙淺兒戲不足信其年改封鄄城侯注採魏略云云按魏略所載皆規橅前史梁孝王事而忘其失實而臣敢陳聞于陛下者誠與國分形同氣憂患共之者也于時人民稀少東西並騖饋輸是憂若屢喪敗魏將不復能支且植自料才武猶不後于真休故懇懇求試誠不忍為秦越之視也初植登魚山魚山即吾山鄧哀王冲傳時孫權曽致巨象至即施行焉孫䇿以建安五年死時孫權初統事至建安十五年權遣步騭為交州刺史士燮率兄弟奉承節度此後或能致巨象而倉舒已于建安十三年前死矣知此事之妄飾也置船刻水疑算術中本有此法能改齊漫録引符子所載燕昭王大豕命水官浮舟而量之事太祖曰此我之不幸而汝曹之幸也倉舒之死正在軍敗赤壁之年故尤憤不擇音中山恭王袞傳太和二年就國至習為家人之事袞保身之符勝于陳思也王粲傳時舊儀廢弛興造制度粲恆典之以此獨為粲立傳自潁川邯鄲淳注採魏略初平時從三輔客荆州按世傳魏正始中所立一字石經乃邯鄲淳書自漢獻帝初平元年庚子至曹魏邵陵厲公正始元年庚申已五十一年使子叔以弱冠避難荆土已應七十餘安得精力猶辦書七經于石也繁欽注採典略其所與太子書記㗋轉意率皆巧麗按記下疑有脫文當是薛訪車子㗋轉能與笳同音事而注脫其文也瑀子籍注採魏氏春秋大將軍司馬文王常保持之按司馬昭謂嗣宗至慎在李通傳注中吳質注採世語曰魏王嘗出征至而誠心不及也按此鄙妄不足信劉劭傳受詔集五經群書以類相從作皇覽類書疑以皇覽為祖按楊俊傳注中所引魏略皇覽凡四十餘部部有數十篇通合八百餘萬字乃王象一人撰集與此互異韋誕注採文章叙録覬孫恆撰四體書勢至然殊不及文舒也按古人論書者惟巨山獨尋其原留意此藝當背誦之此書學之經也故右軍之傳自衛氏杜摯注採文章叙録儉答曰鳯鳥翔京邑至卒于祕書按儉雖敗滅要是曹氏死臣詩以言志固不碌碌也不得遷者摯之命非儉過比興經緯亦非晉以下所及注臣松之按魏朝自微而顯者不聞胡康疑是孟康孟康郭后外屬始仕見輕晚為良二千石又冀部安平人當時自有胡康也傅嘏傳晏等遂與嘏不平至為河南尹嘏亦一時之良然以不平免官之故自此遂為司馬氏腹心于義有所暗矣特功名之士稍循幅尺者耳注採傅子曰次尹劉靜綜其目而太密按劉馥傳載劉靖為河南尹初如碎密終于百姓便之則靜當為靖也注然持法有恆至吏民久而後安之曽更內職則舉動必與鋒鋭悍吏急名喜事者不同惟進軍大佃至此軍之急務也此雜耕渭濵為蠶食伺利之上策也先儒謂武侯三年不死可以取魏即蘭石之言耳嘏議以為淮海非賊輕行之路至恪自并兵來向淮南耳若使習于海道則亦當有其偹矣此又不可執蘭石之料吳謂後來永無其事嘏常論才性同異鍾㑹集而論之注臣松之云云按實由愛憎耳然其論三士者不惟取友之鍳亦時當以之自省自針也評傅嘏用才逹顯云注臣松之云云按陳評未為失傅鍊逹見成敗耳桓階傳遷趙郡太守水經注引長沙耆舊傳稱桓階為趙郡太守嘗有遺囊粟于路者行人掛囊粟于樹莫敢取之陳羣傳昔陳鴻臚以為死刑有可加于仁恩者至而輕人軀命也陳鴻臚之論原于班固刑法志泰景元元年薨注採魏氏春秋云云按請誅賈充蓋非實録元伯說曹爽自歸者也使持忠入地咸熙之封不及溫矣徐宣傳帝船回倒回即桅也古字通耳盧育傳爽等見收太傅司馬宣王使育行司𨽻校尉治其獄子家議論平易確切一時之良特以與何畢相左遂為司馬氏所用有愧于子幹之抗卓矣和洽傳轉為太常清貧守約至賣田宅以自給陽士嘗非毛崔過崇節儉之弊而處身清約此為深識治體而非立異同之論以苟便己私者也杜襲傳留督漢中軍事綏懷開導百姓自樂出徙洛鄴者八萬餘口先徙八萬餘口蓋知此地之難與蜀爭豫為之所也趙儼傳注臣松之按魏武紀云云按陽焚之而密使人搜閲既安反側又審情僞操多猜或有是今賊圍素固至破賊必矣敵方乘勝若督促解圍士衆豫怯輕動而敗即後至者望風奔北不能禦寇矣晃之成功賴儼能見兵勢也今羽已孤迸至將生患于我矣羽存則兩疲羽亡則劉孫連兵不解為魏利皆甚大也况羽士衆尚盛又無歸路若急追之人皆致死我新勝而驕又自戰其地必喪前勞萬一大衄方生他變昔黃池之役晉甘為吳所先正慮此也謂權改虞而生患於我乃儼之巧詞裴潛傳太祖次摩陂嘆其軍陳齊整摩陂之役蓋集數州之衆以解二城之圍亦勍矣哉崔林傳涿郡太守王雄謂林别駕曰至以此為寄注採魏名臣奏天下之士欲使皆先歷散騎然後出據州郡是吾本意也按不更州郡者不可使處內不歷近職者不可使處外此有深㫖孫禮傳當以烈祖初封平原時圖决之何必推古問故以益詞訟縱不得真獄可折矣此解結之術也評柔保官二十年元老終位比之徐邈常林于兹為疚矣高柔為廷尉二十三年此得人久任之方未可因末路難退并致譏也辛毗傳帝報曰二虜未滅而治宫室直諫者立名之時也千古拒諫根柢在此一語楊阜傳使楊昻殺刺史太守超使楊昻者欲以堅張魯之助阜常見明帝著帽被縹綾半裦䄂裦䄂古今字少章疑下一字衍尋宋書五行志果然帽上宋書有繡字髙堂隆傳升平學行不减劉子政今興宫室起凌霄闕而鵲巢之至斯乃上天之戒也髙堂本以師傅舊恩素所敬信又明帝雖從而不改亦與狠愎惡直者殊使當日身領太史遇災隱默豈不為張禹之續乎今若有人來告權備並修德政至亦不逺矣詞意周至是儒者語備當作禪其科郎吏髙才解經義者三十人至主者具為設課試之法魏世去漢未逺猶有此舉滿寵傳寵一無所報考訊如法注臣松之以為楊公云云按世期此論無異孫氏之責髙文惠也郭淮傳太和二年蜀相諸葛亮出祁山至加建威將軍蜀後主建興八年當魏太和四年魏延破郭淮于陽溪延傳云使延西入羌中魏後將軍雍州刺史郭淮與延戰于陽溪延大破淮等而此傳諱之王昶傳於是遷昶征南大將軍儀同三司進封京陵侯此傳亦諱東關之敗王基傳夫大捷之後上下輕敵至懼挫威也魏不能一天下坐新得荆州乘勝輒進有烏林之敗耳基此論千古持勝之要未有能易之者也嘉平以來至以求外利此深於為司馬氏謀者王母邱諸葛鄧鍾傳諸人惟鍾會可加以逆名鄧艾有功無罪至于三賢乃心王室事連不就而典午之勢益重諸人之終即國之終也故次于此焉王凌傳宣王將中軍乘水道討凌此中軍猶言禁軍不及徵調外軍故以中軍進也廣有志尚學行注採魏氏春秋云云按此言亦後人所增飾若曹爽執權時濟無緣有此既七族同夷濟以恨其失信發病死矣母邱儉傳漢書髙紀下注云曼邱母邱本一姓也語有緩急耳故知此字作母者傳寫之誤史通中音貫是也儉欽自將五六萬衆渡淮西至項儉堅守欽在外為游兵至項即堅守不知將何為無必死之心失勤王之義衆鋭一沮即使逃死敵國亦惡在其為丈夫乎注採儉欽等表賊舉國悉衆號五十萬至莫過於此諸葛恪雖挫于新城以此表觀之亦一時之强對也欽亡入吳注採欽降吳表廢害二主按此表後人僞作髙貴鄉公之弒昭事也何得預言二主乎諸葛誕傳人有所屬托至以為褒貶此絶屬托之一法然未若不受之於先為尤善也使失人而後議之負敗已多矣公休之法欲變屬托為保任要之若此仍與中正不殊徵為司空誕被詔書愈恐遂反注採魏末傳云云按昭初代兄秉政未有恩威及人安得即言禪代哀誕之志甚充之惡者為之也斂淮南及淮北郡縣屯田口十餘萬官兵至遣長史吳綱將小子靚至吳請救儉欽猶出至項誕閉城自守專倚吳救彌為下矣注採世語曰黃初末吳人發長沙王吳芮冡以其磚于臨湘為孫堅立廟立廟何事而發死者之磚乎世語之鄙淺不足信如此三年二月破滅注採干寶晉記云云按外圍既合士衆猥多資糧方竭誕不盡人謀則天棄之矣誕能合虛譽養死士實中情恇怯無逺略者也假使舉淮南之衆直趨洛陽投命勤王司馬昭徵調未集勝負誠未可知耳唐咨誕欽屠戮咨亦生禽三叛皆獲天下快焉唐咨本非巨猾因其面縛生致并張之以為功耳鄧艾傳宣王善之事皆施行事皆施行御覽作皆如艾計下有遂北臨淮水自鍾離而南橫石以西盡沘水沘旁脂切四百餘里五里置一營營六十人且田且守兼修淮陽百咫二渠上引河流下通淮潁大理諸陂於潁南潁北穿渠三百餘里溉田二萬頃淮南淮北皆相連接自壽春到京師農官兵屯雞犬之聲阡陌相屬凡九十四字下接每東南有事云云按冊府引此亦曰鄧艾傳則悉是承祚本書後來所當刋正也每胸奴一盛為前代重患至此御邊長計也江統郭欽之前輒已有此先覺逺猷恪新秉國政至此恪獲罪之日也觀艾之料恪則知王基之忠于司馬昭所謂撫恤上下以立根基者至言要略也曹爽固豚犢終于必敗然不興駱谷之役則民怨未起蜀衛將軍諸葛瞻自涪還綿竹至大破之艾軍入死地理無反顧而瞻不知憑城持重何哉以為可封禪為扶風王至以顯歸命之寵并封爵皆専自擬定宜乎讒言之得入昔太尉王凌謀廢齊王至令祭祀不絶王彥雲畏其為厲鄧士載憐其被寃此襲鄭人立良止之智也艾在西時修治障塞至皆保艾所築塢焉史家于艾有餘惜鍾㑹傳鄧艾追姜維到隂平至會與緒軍向劔閣如此則㑹亦預有其功但使瞻等不敗艾行危地必致飢疲維拒劔閣㑹莫能前迄于無功耳若蜀以破遺民震恐至祗自族滅耳將士思歸不肯同反此即其婦翁䇿淮南事比例得之人但有智識而稍更事便不可當也評曰王凌風節格尚至豈不謬惑耶史家頗審輕重鍾㑹在蜀亦矯太后遺詔不得斷之曰叛也方技傳華陀又有一郡守病至吐黑血數升而愈郡守事似依托吕氏春秋文摯齊王語為之然君壽亦不過十年至不足故自刳裂此最近理孟德所以果於殺他也陳元龍三期當發竟不為除此根原亦所謂養吾病以自重者耳然常人多可療之疾不遇良醫則罹夭枉此他所為可惜仁恕之人必忍此小忿為萬民全之也注採他别傳又有婦人常病經年至汗燥便愈南史中有一事又依托於此注採文帝典論至寺人嚴峻往從問受閹豎真無事於斯術也寺人受房術殆魏公恐為人所窺欲轉從嚴峻學之子桓乃未喻耳杜䕫杜公良當與王仲宣同傳不可與方技伍管輅字公明注採輅别傳嘗謂忠孝信義人之根本不可不厚亷介細直士之浮飾不足為務也按語似小偏然長者當如是也直宋無忌之妖急就篇注古有仙人宋無忌此云妖未詳又見封禪書注引白澤圖云火之精曰宋無忌蓋其人火仙也以入竈故以為火之妖直老鈴下耳御覽引此語下更有公府閣有繩鈴以傳呼鈴下吏者也當亦是裴注輅至安德令劉長仁家注採輅别傳長仁言君辭雖茂華而不實未敢之信按别傳實皆然但陳氏所引用者不外此削去其迂蔓耳卒年四十八注輅别傳書不少也然而世鮮名人皆由無才不由無書也按才由于思不思則無才烏丸鮮卑東夷傳後鮮卑大人軻比能至不能復相扇動矣自冒頓屈強一時其後如檀石槐踏頓軻比能之興皆僅雄長北邊中國無釁人才向用彼固不能有加也劉淵以還皆中國先自敗而後乘之耳謀國之士聞一部新盛即智勇豫怯是又與兒童之見無異義門讀書記卷二十六

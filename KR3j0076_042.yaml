body:
  text: 義門讀書記卷四十二翰林院侍讀學士何焯撰元豐類稿文上歐陽學士第一書此文定少作儔能救而振之乎儔作疇懷疑者有所問執問作間義益堅而德亦髙亦作益上歐陽學士第二書不逹亦以少作故也語太煩絮患在不能峻潔少作之不可觀如此負任挽車挽作挽而獨不識撥襫耜耒辛苦之事撥作襏耜作鋤特賜教誨特作垂不勝馳戀懷仰之至懷仰作慺慺上歐陽舍人書文弱而碎其論事又格格不吐此少作故也莫若朝夕出入在左右五句上蔡君謨書中亦論此事其不以聖人之道𨗳之也也作耶其𨗳之而未信而止也上而字衍是以執事望風殫言所以救之之䇿殫作憚則末利可弛弛作弛欲治之于其心治作洽患不能通豈患通之而少耶名言何獨孟子然七句顔孟之所以不同至張子而始眀其止者蓋止于極也下止字作至字以其意少施焉意字下增而字上蔡學士書顧不賀則不可乎疑有脫訛然而古今難之者豈無異焉豈疑作蓋未有若唐也唐下增太宗二字自唐太宗降戾太宗二字衍則後數百年之患將又興也興作甚伏惟執事莊士也有分寸上杜相公書恐祁公尚未足以當此不過其一二大節可道語而已其作有方人主急于致天下治作人主方急于致天下治雖不充其志作雖其不充其志貫下讀蒙賜之一覽焉覽作見上范資政書其言究無歸宿蓋非得之于心而徒求髙于文詞者也故古之人有斷其志疑有脫文其晦眀消長其字上增至字又懼乎陷溺其心又字上增則字不意閣下欲收之而教焉而辱召之文正公之于人材無往而不留意如此上齊工部書此等何以濫存大抵編緝者之過為事者相與就而質其為士之事也上事字作士與撫州知州書多用韓文腔子是亦少作也與孫司封書反覆馳驟于作者為最有光焰之文殆不減退之張中丞傳後敘也司户孔宗旦司字上有州字度拱終不可得意疑訛智髙得宗旦喜用之喜字下有欲字此非所謂曲突徙薪無恩澤焦頭爛額為上客耶宗旦死亦焦爛者也使宗旦初無一言兩路反覆言宗旦之當恤既遺其言又負其節雙收為天下者賞善而罰惡緣上朝廷寵贈不及為君子者四句起下司封為天下者使萬事已理至以驚動當世文勢極展拓得開發揚褒大其人以驚動當世發作顯驚作警宗旦喜學易至亦可贖矣此又表其平居從栁子厚論段太尉中來况陳拱以下七句又反覆以眀其事之可信前後無一層不照應則其有先知之效效作效下同固有補于天下二句又照應中間為天下者一段再與歐陽舍人書或亦不常有或亦作古今稱之曰有道君子也稱之二字衍猶恨鞏之不即見之矣矣作也又魁閎絶特之人又作必而先生遇甚厚遇下有之字與杜相公書閣下致位天子而歸位下有于字又輒拜教之辱杜祁公待後進以禮如此是以滋不敢有意以干省省下增察字而恐欲知其趨趨作趣答范資政書雖尋常報書然自無秋毫流俗非可責思慮之精可字下增以字而為當世有大賢德至為有激于天下哉自有筆力謝杜相公書卓犖深厚觀此書則揮麈後録謂曽不疑之喪子固適留京師者亦微誤而杜祁公以故相居宋自來逆旅為辦後事之語則其證云不忍一夫失其所之道于自然道字下有出字寄歐陽舍人書曩不甚愛此文今復讀之如四瑚八璉雖欲不寶貴不可得也或納于廟碑本以麗牲故曰或納于廟茍其人之惡三句知貞山志王評事墓為過豈竊取昌黎二李志之義耶至于通材達識又抱轉人之子孫者人字上有為字然則孰為其人接用韓文腔子而世之學者而字疑有訛抑又思若鞏之淺薄滯拙帶出慙字意此一層亦摹擬上宰相書則世之魁閎豪傑不世出之士以下上敘私感此又推言歐公此舉能與人為善雖即前善人喜于見傳四句意然尚是詠歎之法與今人重復不同愧甚不宣愧作幸李云此文蓋即摹歐而為之者按文法多本諸韓而先生云摹歐此論神理與王介甫第二書眀暢此不易之道也誠不易之道一旦卒然梗化梗化作除去故事至于已察此處疑有脫字與介甫第三書尤可為痛可為作為可觀介甫此作至是介甫之意也與所論王逢原志文皆是使或可以澤今或字衍深父書足以徵其言徵作致恐嘗為介甫言恐作頃此日夜惓惓往來于心也夜字下有所字謝章學士書不隆于此已隆作過不能用身于世俗之外用作收固有志者之所歎嗟嗟作笑所以無棄材也所字上有此字惟眀公之垂察焉之字衍答孫都官書且專以久久下有也字而閣下不以所深且專以久者勵鞏上以下有其字答袁陟書而有仕不仕者是也作而有仕有不仕者是也彼固所謂道德眀備四語善論謝曹秀才書鞏為封彌官封彌作彌封與王深甫書與諸令弟應書書作舉宣和日得書疑有訛遂以娣妹歸之娣作苐七與以葬以天下一也上以字衍答王深甫論揚雄書一作答王子堅書一作答王固别紙常夷甫以謂紂為繼世七句夷甫言是亦得其平夫任其難者箕子之志也此數語道箕子則得之有所不得去胡為不得去雄名重其去誠難然以老耄辭祿可也况甚而為美新之文乎則鄉里自好者不為為下增也字且較其輕重仕莽重于美新此言則是雄不得已而已上已字衍箕子者至辱于囚奴而就之欲出雄而不顧厚誣箕子此所謂遁詞也孟子有言曰云云孟子之言曰天下有道以道殉身天下無道以身殉道未聞以道殉乎人者也曽氏獨不之思乎小弱之見役限于國勢非若一身之去就得以自由也夷甫以謂無不可者云云夷甫言是而亦曰我異于是四句若然則蕩然肆志乃棄禮義捐亷恥流于小人無忌憚矣豈不猶孟子之意哉不字下有亦字鞏自度學每有所進二句雄之書退之僅好其詞而介甫子固則直以為學問根柢何其所見之淺也不幾于測之而愈深二句即法言中語福州上執政書和平溫潤則有幣帛箱篚之贈箱作筐曰豈不誠思歸乎曰下增女字來告其君也其作于有一人仕于此二邦者于字衍恩不可以茍止者也者字衍州屬邑州下有之字亦為士吏之所係獲宋本士吏非也吏文吏令長也士乃兵耳宜作吏士市粟麵米麵米作四來為德于士類者甚富為字上有而字分寧縣雲峯院記一篇俱在分寧縣土俗之不善立論然但訐其非而不眀先王之道以道之則尚未合于君子忠厚之至也其人修農業之務至其勤也如此頂勤生業作桑至纍嵗不發至無所捐頂嗇施其間利害不能以稊米五句頂薄義長少族坐至豈比他州縣哉頂喜爭變偽一日千出日字下增百字雖笞朴徙死交迹雖字上有故字不以屬心不字上有一字吾聞道常氣質偉然至未敢必也宜云道常學佛之説猶能勝其嗇施喜爭之心如此况𨗳之以先王之教有不盡變其故俗向善樂義歸于敦龎仁厚者哉方得大體則又若能勝其嗇施喜爭之心可言也能字下增獨字言作喜則桀然視邑人者桀作傑未敢必也未字上增此豫二字可不可也上可字作何此篇本柳子激贊梁邱據之意仙都觀三門記以石本校筆力髙而非記事正體其門亦三之老氏之宫有三門或自唐始宜考之田絶嶺而上田作由至其處地反平寬衍沃處字下作其墬云云其獲之多獲作穫水旱之所不能災之字衍以安且食其衆衆作徒不然安有是耶安作何是不足以稱吾法與吾力句中有眼以禮春秋之義告之義字下增而字禿禿記仿解光劾趙氏書當云書禿禿事乃合捽挽至廡下至作置扼其咽下不死下字衍惟殺禿禿狀蓋不見所以詳書事始末惟杜氏一無忌言表杜氏所以甚齊醒心亭記其言之非諛且妄故後半但覺清新後之人則不可以率爾畫虎也則必即豐樂而飲三句提破名亭之意醒心無可記故但即豐樂而推言之敘題只此數語故即其所以然而為名其字下增事之二字取韓子退之北湖之詩云韓虢州三堂二十一詠其一曰北湖云聞説逰湖棹尋常到此回應留醒心處準擬醉時來其可謂善取樂于山泉之間抱轉樂字而名之以見其實又善者宋本無此十字有此便與後豈公樂哉乃公所以寄意于此二句違反天下學者皆為才且良下字下有之字若公之賢二句因亭名取諸韓子之詩即推言公之賢韓子以來所僅有此文章血脈相通頭緒不錯雜處今同逰之賔客顧前同逰之賔客而鞏也又得以文詞託名于公文之次收得密并自為記一層皆到此亦從韓子名列三王之後有榮耀焉之語翻出蓋子固亦自信為韓子之代興也雖然可謂不讓矣自言之不若待後之人徐論定之繁昌縣興造記太宗二年州以紀元得名故但云太宗二年使得無嵗費而有巨防密而耳目尚得以為之觀得作有凡縣之得令為難得字下增能字墨池記能與學兩層到底因其地為州學舍而求文記之者即教授故推而論之非若今人腔子之文也方羲之之不可強以仕六句按中興書云羲之自會稽王友改授臨川太守梁虞和論書表曰羲之所書紫紙多是少年臨川時迹今晉書漏其為臨川太守此文亦考之不審也中興書見世説新語注豈有徜徉肆恣有作其羲之之書晚乃善上敘過墨池以下發論况欲深造道德者耶脫出正意今為州學舍此句一篇眼目教授王君盛教字上增學字豈愛人之善三句順頂恐其不章其亦欲推其善以勉其學者耶下其字衍句倒應為州學舍夫人之有一能二句足不廢一能意况仁人莊士之遺風餘思二句足勉學者意此篇如放筆數千言即無味矣詞髙旨逺後人無此雄厚萊園院佛殿記期月而用以足役以就就作既再歷千餘載再作故不獨以著其能著其能三字括上自可栖之居此蓋十年矣一段亦愧吾道之不行也已亦字下增以字宜黃縣縣學記宏肆自漢氏以來能為如此之文者不過五六人耳然則與六經五子若是班乎曰否其規模具焉而已聖賢之所以應乎世不外于養其身者也凡臨政治人之方皆在格物致知之內故可分小學大學小成大成而以養其身與無所不知無施不可分為學次第則近似而微有所不合所以為曽王之學也以習恭讓習下有其字進材論獄獄作德其所為具如此所字下有以字則務使人人學其性二句學其性三字意圓語滯如程子云學以復其性始合性之反之之理防其邪僻放肆是易所謂間邪存其誠即復性之事剩不獨二字皆可以進之中中字上有于字無足動其意者無字上有而字為所以養其身之備如此為作而則又使知天地事物之變至其素所學問然也古之學者當其窮理之時所以治天下國家之要無所不講矣特能盡其性乃能盡人性盡物性耳豈待養身者既備又使知乎此哉蓋凡人之起居飲食動作之小事二句總上兩段其動于視聼四支者至豈用力也哉此處渾淪言之意味更厚人之體性之舉動七句對前兩段蓋以不學未成之材至其不以此也歟淋漓條暢賊盜刑罰之所以積賊盜作盜賊積屋之區若干至無外求者伏周字其相基會作之本末二句伏速字何其周且速也速字專為下一段起本固以謂學者人情之所不樂此不足辨可以削嚮應而圖之嚮作響與圖書器用之須與作以至學舍記睢汴淮泗雎字上增與並封禹會稽之山禹作禺繇真陽之瀧湞陽作真避仁宗諱王事之諭諭作輸此豫之自視而嗟也之字下有所字議其隘者議字上有或字平生所好慕生字下有之字挾長而有恃者所得為恃作力南軒記得鄰之茀地燔之燔作蕃蓋為蕃籬耳灌􅀢于其間􅀢作疏與夫論美刺是非是字衍感微記逺記作託星官藥工藥作樂金山寺水陸堂記並楚之衡而濵吳之要也衡作衝蓋其浮江之檻四句金山如在目余固嗟夫未嘗得與時之君子者逰至故成此不難也此處文勢窒而碎則聞夫山之窮堂奧殿窮作穹環傑之觀滋起矣環作瓌此非佛之法足以動天下非字下增徒字夫廢于一時以下始俊健則事廢者豈足憂事字下有之字鵝湖院佛殿記末二句尚似合不上思政堂記夫接于人無窮至則亦豈止于政哉發眀思政之義最條暢其應無方而不可以易者以字衍政者豈止于治文書三句意思到兜率院記如此豈求記者之意哉不作可也此篇有過于造語之病必其少作也亦未嘗過特非記事正體而為途中瘠者如此途作塗有司常錮百貨之利至愚不能釋也斯誠可歎細若蓬芒蓬作莛在治之西十里西下增八字擬峴臺記子朱子謂此篇擬醉翁亭記而不似蓋南豐降格為之以塞流俗之請者也然亦不失為佳作擬峴只一句提過不涉羊杜事蓋所記者臺也非獨講於避就之法虞伯生書此文跋云此記先生是年登進士第歸鄉之時作裴侯名材記不書名亦敬我邦君之意後七十八年其從子紆守撫重刻之久之石又亡又後二百年虞雍集書因城之東隅之字衍繚以橫檻覆以髙甍八字衍然後溪之平沙漫流至而亦各適其適也前云山溪之形擬乎峴山故此處就溪山之形點綴作二段出乎履舄之下出字上增皆字至于平岡長陸陸作陵與夫荒溪藂落藂作聚隱見而繼續者繼作斷變化不同作變化之不同旁皇徙倚旁作仿皇作偟而晏然不知枹鼓之驚驚作警亦將同其樂也將字下增得字結又約豐樂亭之旨撫州顔魯公祠堂記此文零星曲折亦似學王彥章畫像記與常山太守杲卿伐其後與字上有公字常山乃扼其前也公為之唱也唱作倡唐之在朝臣至若公是也荆川謂于捍賊則略之而獨言其忤姦而不悔此皆微顯闡幽處豫謂非平原祠記何得獨詳其扞賊此一段出于伯夷頌故公之能處其死至此足以觀公之大也此段議論他人所不及知撫州聶君某某作厚載通判撫州林君某某作慥夫公之赫赫不可盡者盡作蓋後半亦微覺頭緒太多其結亦從榖城夫子廟記來洪州新建縣廳壁記吏之不能自安三句感諷婉惻任而得擇其自處任作仕清心亭記則萬物自外至者物下有之字亦可謂能知其要矣能字衍此文大旨與梁書目録序相似閬州張侯廟記雨澤之應山川主之閬人以謂張侯之賜者固非而子固遂謂凡祀典之有祈有報皆聖人以世所不得而無因之不廢非其為理信然則誣矣按此文但謂荀卿之論為過未嘗于張侯之祠有譏舊所云者非也皆聖人之法若只皆聖人之法則郊特牲篇何以云仁之至義之盡乎盡己之智而聼于人二句盡己之智盡人之智則以所聞于古者進材叔然非有譏也謂神之為理者信然則過矣聖人所謂敬鬼神而逺之特嚴之而不瀆豈謂其理之非信哉侯以智勇為將侯字上增始字為我書之為字上增其字歸老橋記格已少降然自大雅前半皆學歐公末段本色采陵之澗陵作菱維吾先人遺吾此土者人字下有之字吾所以衣食其力吾字上有此字而榮于寵祿榮作營尹公亭記尹師魯之重于當時讀此文及富鄭公所作哀詞可見然而曰疾沒世而名不稱焉者從尹公二字起論日考圖書日下有以字以茇為嬉為作而是可謂與人同其好也也作矣則李公之傳于世二句尹公餘韻筠州學記元元本本之論子朱子大學章句序亦采其意用之無茍簡之心天下道藝之壞不越茍簡二字其取豫進退去就十句此鄉舉里選之效不説破留在後對勘議論本後漢儒林傳士乃有特起于千載之外三句此公輩所自信者使世無周程者出曽王之立言亦可謂能得六經之支𣲖者矣先生云子固非推先濓洛者蓋即謂已與介甫諸公耳然自胡翼之孫眀復輩倡眀以後士大夫皆尊之觀歐公文集可見也論道德之旨六句逐句對後每多排句此漢之士所不能及卓然自信至于漸磨之久磨作摩今之士選用于文章至先後之過乎不能并發眀其守不足而庠序之教為必不容已之意但勉其進詞意圓婉即于下轉出學之不容已于立尤中窽會夫大學之道一段只是從上所知有餘轉來亦非特舉致知而反遺格物也此與熙寧轉對疏自不同以今之事事作士國子博士鄭君舊舊作蒨誦講之堂作講誦休息之廬休作宿其賢者超然自信而獨立二句歸到守上結勉焉以待上之教化句又綰合上之施化莫易此時一段瀛州興造記黃樓銘蓋學此種為南北角道若干里角作甬昔鄭火災災字衍知公之嘗勤于是也輕筆收重事廣德軍重修鼓角樓記謹潔故障之墟障作鄣以縣附庸庸作宣尚書兵部員外郎知制誥錢公輔守是邦公下疊一公字則又新是四器四字衍廣德湖記因其餘材因字上增又字因以其山名之上為廟名字下增山字尚俾來者有知毋廢前人之功有字衍齊州二堂記核山川固當考堂之所由名也然亦太詞費矣使韓柳為之必不然齊濵濼水濼音洛與梁山音來沃反者不同調材木為舍以寓材作林去則徹之徹作撤乃為徙官之廢屋為字下有之字其北析而西也析作折髙或致數尺致作至齊人皆謂嘗有棄粳于于黑水之灣者句未詳舟之通于濟者濟作齊魯桓公十有八年公字下有之字杜預釋在歷城西北釋字下有一字入濟水下增然濟水三字自王莽時不能被河南續漢書郡國志河內郡溫縣濟水出王莽時大旱遂枯絶蓋特河內濟源耳其伏流之出者如故也子固謂自莽時不能被河南疑未審按酈善長云濟水當王莽之世川瀆枯竭其後川流徑通津渠勢改尋渠脈水不與昔同則溫縣亦如故也齊州北水門記右侍禁兵馬監押伸懷德伸作仲欲後之人知作之自吾三人者始也三人者三字衍襄川宜城縣長渠記秦昭王三十八年秦本紀事在二十八年去􅋣百里立碣碣作堨下同州飲者無所取州作川使還渠中使下有水字蓋水出于西山諸谷者以下蓋有慨于熙寧之言水利者使之源流使下有水字至于濟水又王莽時而絶濟之所出非一惟在河內溫縣者以王莽時大旱枮絶後人不察遂謂四瀆已絶其一豈其然乎此篇與齊州二堂記皆當契勘也用力多而收功少用字上增故字公聽之不疑公字上增唐字故余不得不盡以告後之人盡作書徐孺子祠堂記前論孺子之出處後記祠堂荆川謂當分三段者非此文亦有宋人習氣前半客勝于主漢元興以後漢字下有自字蓋忘已以為人以下此段議論髙按圖記以下吳時顧邵為豫章太守下車祀先賢徐孺子之墓優待其後此見于吳志本傳者不容但據圖記也又溫嶠鎮武昌日親祭徐孺子墓又王綸之為太守下車祭徐孺子墓豫章何緣入拓拔可疑按此圖記之文皆出水經注酈元謂至今謂之聘君亭故易其文為至拓拔魏時而不悟豫章非魏所有也永安亦當是吳主孫休時自戊寅至癸未凡六年晉惠時雖亦嘗以永安紀元然一嵗四改不過數月疑非晉事也否則或永和之訛江州景德寺新戒壇記不侈談其法又不以儒者之論雜之得作記正體為佛殿山門山作三洪州東門記古雅蓋莫得而者也者作考將求豫之識求字衍至間之改作間作門稱其于東南為一都會會下有者字道山亭記陸文裕以為親至閩中乃知為工其路在閩者在字衍其山川之勝其字上增于字非獨忘其逺且險綰定前半篇越州趙公救災記東坡滕達道墓志有待流民之方當參考而備識之以為南北荒政大略滕公守鄆富公守青皆可法青越之政略相近其科條可不待頃而具頃作須試中書舍人制誥三道誥作詔特進觀文殿大學士除節度使開府儀同三下有司制二字當另行近刻誤入文中司制門下司制二字衍肅哲足以禔身哲作括敕監司考核州縣治迹詔以夫民事為尤重夫作吾使處其名必效其實名字下有者字庶夫事舉刑清四句不免又作四六因試文故也曽肇轉官除吏部即中左選中字下增制字左選二字宜側注劉摯禮部郎中制官得人固為急也得字下有其字王子韶禮部員外即制庶能康朕之事事字下有可字胡援壯紘刑部即中壯作杜中字下有制字范子竒工部即中髙遵惠員外即制宫室城隍隍作隍即于隍部隍作起王祖道司封員外即制以稽郡吏之治郡作羣爾尚欽哉欽作起穆珣司封即中制封一作勳論功烈功作勞蔡京范珣考功員外即制珣作峋劉蒙御史臺主簿王子琦太常寺主簿制注王子琦改憲府作卿作王子琦制改憲府作卿寺鐸張崇翟思邵剛太常博士制鐸字上增徐字其尚欽哉欽作起林希著作佐即制往服厥敘服作祗刑恕校書即制刑作邢李常太常少卿制兹為朕志為作惟錢暄光祿卿卿下增制字勞閲有聞閲作閲無曠司作無曠爾司楊汲大理卿王袞韓晉卿少卿制注少卿改云廷尉云二當作廷尉之二陳睦鴻臚卿卿下增制字黃莘職方員外郎制貫利同而材用便疑有訛義門讀書記卷四十二

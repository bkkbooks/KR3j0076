body:
  text: 義門讀書記卷十二翰林院侍讀學士何焯撰公羊春秋隱元年王者孰謂謂文王也至王正月也榖梁不解王字為疎此云文王者本之文王既沒文不在兹之云也劉知幾云年則魯君之年月則周王之月自謂攷竹書紀年始逹此義豈知已不外此傳之中乎大一統也後世正統之說出于公羊母以子貴以子貴謂有子則以次升為貴妾也曷為稱字裦之也字不若子未命姑書字也克之者何殺之也勝之而未殺故曰克傳非也何以不稱弟當國也不弟者鄭伯不以為弟也其言惠公仲子何兼之兼之非禮也兼之所謂於失禮之中又失禮焉二年宋公使公孫夀來納幣則其稱主人何辭窮也辭窮者何無母也身為宗子而又無母故辭窮也紀子伯者何無聞焉爾子者衍文也夫人子氏者何隱公之母也何以不書𦵏成公意也夫人子氏者桓公之母也何以不書𦵏桓未成乎君也三年宋公和卒惟宋公之卒書公而他國則書侯伯子男者自我正其名也𦵏則他國皆書公既從主人而因以不沒其僣稱上公之實也吳楚之君不書𦵏民無二王不得復從彼國盖誅絶之義也吾立乎此攝也自宋魯之禍相仍而攝之道廢攝主廢政在大夫之由也四年翬者何公子翬也至與弑公也隱與桓皆先君也於桓不得不諱則誅翬不得不嚴也翬之罪既不可以質言貶於桓之代於義益無所附今加貶于隱一代之中使人因而推得其故所謂微而顯也五年夏四月𦵏衛桓公書𦵏善其能討賊非譏過期考仲子之宮不袝于姑故别立廟初獻六羽因考宫而獻六羽别而言之者考宫宜也六羽僣也先著其善後譏其惡所謂婉而辨也天子之相則何以三至一相處乎内此說獨見于此六年狐壤之戰至諱獲也事在隱即位前非諱七年何以不名微國也不名者史失其名城中邱何以書以重書也書者當以其不時然傳意有可採十年隱之罪人也故終引之篇貶也桓三年書公子翬故桓二年宋督弑其君與夷及其大夫孔父仇牧荀息不書字孔父書字以祖考故也何賢乎孔父善其能與君共存亡故畧其卑而書及以旌異之器之與人非有即爾器為無情之物不能於人相就五年譏父老子代從政也代從政謂子攝其官於世卿之中又失禮焉書仍叔之子甚之也八年春正月己卯烝書正月烝者以其為周時也此宜烝下則譏爾常時不書獨書之者以正其失常者也祭公來或稱祭伯或稱祭公時王進退之也十一年宋人執鄭祭仲書祭仲舍爵明乎其貶也十二年嫌與鄭人戰也下年二月復㑹鄭伯與四國之師戰則二傳言與鄭人戰為無據也當從左氏十五年許叔入于許入者難也鄭人守之外無援内無應而許叔能復其土地人民可不謂難乎故書字以嘉之注非也皆何以稱人夷狄之也此盖因其國而用其禮也注云不當朝桓失之十八年君子辭也言君子之恕辭也其賊非吾所得討莊五年曷為不言納衛侯朔辟王也此所謂内大惡諱注指下文王人子突謂避王者兵非也六年不得意致伐上雖諱之而仍致伐以顯其實齊人來歸衛寶左氏曰衛俘深沒其文諱取賂以犯王命使若取所歸者乃前伐衛所獲之俘焉爾則其稱齊人何讓乎我也書齊人者見魯前非主兵後分齊利以殺内惡也八年非師之罪也傳意謂非師病而所以出者則病也九年何以不稱公子君前臣名也下言取子糾則明是脫文其言入何簒辭也入者難辭也糾與之爭也及齊師戰于乾時我師敗績經意惜伐齊之師不用于襄存之日而反于襄之既亡勞師欲定讎嗣顛倒失正故獨書敗傳似失之十二年其國亡矣徒歸于叔爾也􅈶不繫齊所以成叔姬之志叔姬一婦人能植其節隱然若紀未亡也十三年曹子請盟桓公下與之盟以非兩君故不盟于壇上也十九年諸侯不再娶不再娶者恐後夫人危嫡子為宗社之禍二十年齊人伐戎魯不與師而大書之嘉其能憂中國也二十二年冬公如齊納幣不言月譏公之忘其在二十五月之中也何譏爾親納幣非禮也本譏忘哀而舉親納幣者大惡諱但因事以見意也注謂不譏喪娶舉滛為重非也二十三年祭叔來聘人方有喪而行嘉好之事故不稱使荆何以稱人始能聘也知有禮義威儀則人之也公在外也在外故不書來朝二十九年何譏爾凶年不脩築邑脩廏皆荒政也其譏者與告糴同例然則并此無之者其得罪于百姓益甚矣紀叔姬卒申其志節也三十年鄣者何紀之遺邑也至盡也觀此知樂生不取二城之意矣三十一年其威我奈何旗獲而過我也傳未必合三十二年無子不廟不廟則不書𦵏不書𦵏者賊不討也與閔公例同閔元年既而不可及因獄有所歸不探其情而誅焉親親之道也季子力不逮爾此傳進退無據冬齊仲孫來前書公子慶父如齊後書公子慶父出奔莒中間復入不見于經二傳以為慶父者近之繫之齊者既外慶父亦譏桓公為伯主不能遏亂萌于早也左氏以為齊仲孫湫則從下書髙子來盟之例兩存其說可也以春秋為春秋以春秋為春秋者據經以解經也注謂以史記氏族為春秋言古謂史記為春秋恐非冬齊髙子來盟髙子久留定魯故不月僖元年上無天子至則救之可也易曰通其變使民不倦聖人之不得已也二年曷為不言狄滅之為桓公諱也前已書狄入衛則此非為桓公諱也榖梁得之曷為為桓公諱至則救之可也義同而復舉之者如詩人之有詠歎所以見春秋之不得已而作𦵏我小君哀姜上不稱姜氏者齊絶之也此仍言哀姜者從其實四年何以致伐楚叛盟也致伐楚者大其績也楚於是始懼中國故又見于詩之頌月者見其役之重注謂危公之久非也十四年曷為為桓公諱至則救之可也存亡國死君難特皆反覆再三發例外異不書此何以書為天下記異也故不繫晉十五年晦者何㝠也春秋不書晦故以晝㝠釋十六年是月六鷁退飛是一作提釋文徒兮反若經本作是則不必注且明其為魯語矣初學記晦日引之作提十八年邢人狄人伐衛既書邢人則不得不書狄人相屬之辭也邢棄親即狄啓亡國之舋使與狄等乃所以譏邢也邵公以為狄稱人者善能救齊恐迂鑿十九年盖叩其鼻以血社也山海經傳引此作叩其鼻以䎶社音釣餌之餌既不見于釋文許氏說文亦無之二十年西宮者何至記災也終前用致夫人傳齊人狄人盟于邢亦相屬之辭齊無能繼桓公之志者譏自見也注謂狄稱人者能常與中國恐非經意二十一年不與夷狄之執中國也然則下釋宋公之經亦諱中國見釋于外裔也楚人使宜申來獻捷上不書楚子執于獻捷著其實曷為不言捷乎宋為襄公諱也此為中國諱不為襄公也公㑹諸侯盟于薄言㑹諸侯者諱背中國㑹二十三年何以不書𦵏盈乎諱也不書𦵏魯即楚背宋不㑹其𦵏傷中國之無人也二十六年曷為以外内同若辭重師也外内同辭者恥即夷二十八年曷為再言晉侯非兩之也大其能攘楚討夏之即夷者也冬公㑹晉侯齊侯宋公蔡侯鄭伯衛子莒子邾婁子秦人于溫天王狩于河陽時溫地已入于晉則是致天子于其國中後世所謂挾天子以令天下者也故以天王自狩為文明非晉之所得私挾也如陋儒則先書王狩矣此聖人之權也三十年衛殺其大夫元咺及公子瑕言及者元咺首禍也注謂是下大夫别尊卑謬三十一年猶三望三望當定從鄭康成之說魯既僣郊何以獨祭三者也魯郊非禮也謂之郊者地在郊也注謂天人相與交接之意非天子祭天諸侯祭土天子祭天與天為體也諸侯祭土與國為體也然則曷祭祭泰山河海三望榖梁注言泰山淮海者得之河非所祭也秋圍衛十有二月衞遷于帝邱桓公城楚邱文公則聽衞之遷帝邱顧私怨而昧夷夏之辨則城濮之戰豈出于天下之公義哉書此者傷天下之無伯注言惡衞畏人非也文元年㑹𦵏禮也此注中論親親失賢甚備但恐于經意非要二年先禰而後祖也此祖禰二字借說僖元年傳此非子也臣子一例則不為昭穆但不得先之耳詩云莊公之子孔子取之五年王使榮叔歸含且賵注去天者含者臣子職以至尊行至卑事失尊之義也按去天者恐因成風為妾失禮六年是月非常月也此傳與左氏歸餘于終之說不同然書曰以閏月定四時成嵗明不專在冬時矣則此說為長七年以師外也注本所以懐持二心者其咎亦由晉侯要以無功當誅也按注甚謬時晉未立君八年冬十月壬午公子遂㑹晉趙盾盟于衡雍乙酉公子遂㑹伊雒戎盟于暴以其名遂故不言遂而再著其名九年以諸侯之踰年即位至三年稱子也禮文散軼當以此法參互求之十年臧孫辰卒自莊二十八年書告糴于齊至此凡五十年十二年子叔姬卒其稱子先君之子也其貴奈何母弟也母弟雖女弟亦貴之以為能變也至是難也此與能悔過不相䝉河千里而一曲也注不别曲直而地以河曲明兩曲也按此兒戲之語十四年邾婁人言曰接菑晉出至貴則皆貴矣皆媵出也注以為邾婁再娶二子母尊同體敵恐非此未踰年之君也其言弑其君舍何商人既公子則書弑其君之子文義複重相亂故從成君之例十八年秦伯罃卒按此是康公注云穆公未知何据宣六年趙盾弑君此其復見何注据宋督鄭歸生齊崔杼弑其君後不復見按宋督鄭歸生齊崔杼不復見于經者無事可書爾公子翬如齊逆女非復見乎此公羊家之曲說也靈公望見趙盾愬而再拜愬即自愬膳宰之事再拜則知過之意故下曰心怍八年頃熊者何宣公之母也注熊氏楚女宣公即僖公妾子以宣公為僖公子異聞九年晉侯黑臀卒于扈不書𦵏者魯不㑹也時楚方盛魯事晉怠十年齊已言取之矣其實未之齊也如宋之嵗幣十一年此楚子也至不與外討也稱人者討賊之辭也雖外討猶之乎稱國以殺爾入陳不譏而於殺徴舒焉譏乎十二年大夫不敵君至而與楚子為禮也大夫不敵君此則夷夏之辭也令之還師而逆晉宼宼者敵國之辭注謂傳序經意謂晉如宼虜非也十五年中國不救狄人不有是以亡也此漢書所笑龜兹王也成元年作邱甲注解作甲不合二年季孫行父臧孫許叔孫僑如公孫嬰齊帥師㑹晉卻克衞孫良父曹公子手及齊侯戰于鞌齊師敗績大夫敵君不貶者曲在齊也齊侯使國佐如師書齊侯者對卻克言之齊既悔過臣不可以敵君也公㑹楚公子嬰齊于蜀至盟于蜀方與晉伐齊旋背晉而與楚其失在内故先書公㑹嬰齊而獨于下盟正其猾夏之罪十年齊人來媵伯姬獨三國來媵意宋王者之後其書則為錄伯姬也晉侯獳卒不書𦵏者楚人方盛魯不㑹𦵏傷中國之失霸也十五年臧宣叔者相也宣叔為司宼謂之為相此孔子攝行相事之證於是使嬰齊後之也注云弟無後兄之義為亂昭穆之序失父子之親故不言仲孫明不與子為父孫按弟無後兄之義自大夫言之也大夫之生也不臣其兄弟則死亦不得以為子夏六月宋公固卒不日者譏赴者之疎襄十四年季孫宿叔老㑹晉士匄至㑹吳于向獨士匄公孫蠆書未詳豈其餘皆非卿耶二十九年公在楚前年十二月書天王崩楚子卒天王崩而不反楚子卒而公留所以譏公且傷中國也爾殺吾兄至以其不殺為仁季子能殺光則討賊也力不逮而去之不懐其寵抑亦庶乎能潔身違亂者歟不殺為仁則公羊子或未盡也昭十年晉欒施來奔晉者齊之訛當從左氏十二年晉伐鮮虞和戎三駕所以復伯楚䖍横而顧伐鮮虞所以失伯也定六年二名非禮也東漢禁二名本此十二年秋大雩觀此則聖人正有放過處不事事爭也哀元年仲孫何忌帥師伐邾婁邾婁子新來奔喪而三家伐之無己所以深著其無君非譏哀公之替其恩也三年冬十月癸卯秦伯卒至此小國皆卒日𦵏月十年楚公子結帥師伐陳吳救陳救中國不進者吳楚結憾志不在救中國故不進十三年此晉魏曼多也至二名非禮也不譏于七年春之侵衞而譏于此何哉然則魏多者闕文也十有四年春西狩獲麟此孔子所親見何為但書春而不月盖天心之仁愛無往不復麟之出也固亂極反治之祥孔子道雖不行於一時猶以望之來者春秋始終以春亦猶易之雜卦始乎乾而終以夬一隂決去即為乾之意云爾愚聞之師說如此盖服膺而弗疑也反袂拭面涕沾袍所謂滿腔子是惻隱之心歟義門讀書記卷十二

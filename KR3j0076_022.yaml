body:
  text: 義門讀書記卷二十二翰林院侍讀學士何焯撰後漢書劉聖公傳論周武王觀兵孟津至斯時有未至者也漢諸劉共起誅莽以順討逆豈商周可比固亦幾運之會也使止由幾運則不必歸劉氏矣王昌傳久守王饒至屯其郭北門王郎衆少無他救徇下州縣皆觀望持兩端故可進兵直薄城下郎誅則河北定矣隗囂傳劉文伯在邊注文伯盧芳字也按芳傳云自詐稱武帝曾孫劉文伯盧芳乃真氏名耳芳有字曰君期囂賔客掾史多文學生每所上事當世士大夫皆諷誦之漢世重文學如此故東京之文自和帝以前尚非後世所及論夫功全則譽顯至或未聞焉范氏所見如此故終以叛誅公孫述傳述遣戎與將軍任滿出江關至竟不能尅北不能定三輔東不能取荆州述事去矣屏蔽一撤相隨為係虜耳述騎都尉平陵人荆邯見東方漸平兵且西向説述曰至冀有大利邯策之晚矣此在李育未敗之時可以耀武廣境耳遇更始政亂復失天下至以爭天命公孫欲用蜀以并楚亦宜在此時東方漸平則天下之望皆歸洛陽矣陛下以梁州之地至將有王氏自潰之變武侯所謂坐而待亡者也故元遜並舉言之帝使諸將攻隗囂至蜀地聞恐動述不悉蜀之衆自將以救囂亡形成矣蓋𫐠材尤出囂下徒有吏幹不識攻取大略又非生長兵間不敢出成都一決也宗室四王三侯傳齊武王縯皆畫伯升像于孰孰字傳寫之訛當從東觀記續漢書作埻論若夫齊武王之破家厚士至而痛明堂之不祀也當時若尊立伯升入關取莽則天下服從何至羣盜蔓延毒流海內生民之禍烈於秦楚之際哉新市平林諸將皆盜賊小人固不可與共大事也是故君子慎始北海靖王興帝驛馬令作草書尺牘十首此草書即史遊章草也李通傳李軼後為朱鮪所殺軼陷伯升身死朱鮪之手事與葛相之處孟達相類鄧禹傳平定山西此時河東已名山西然特此一郡在太行西耳獨與二十四騎還二萬衆止與二十四騎還違勑而以飢卒徼戰之謬也欲功自己成而反致敗散其猶執之不堅之過歟定封禹為髙密侯帝王世紀禹字髙密仲華之封邑世祖殆以相啁耶各使守一藝一藝一經也訓議者咸以羌胡相攻至不宜禁護禁護其時為我用者使其力足以相攻耳議者之言似是而非也騭遣五官中郎將迎拜騭為大將軍騭既知戒懼出師無功何不深自刻責力辭新寵時遭元二之災趙明誠金石録據漢司隸陽厥開石門頌有曰中遭元二西戎虐殘橋梁斷絶若依注讀為元元則為不成文理疑當時自有此語注未必然也洪容齋云安帝永初元年先零滇羌叛郡國地震大水騭以二年十一月拜大將軍則知所謂元二者謂永初元年二年也位次在三公下特進侯上前鄧禹以特進奉朝請即特進侯也下贈宏位特進亦以班位言之注謂在特進及列侯之上誤謀立平原王得平原王得當作翼安紀及章八王傳可據得又無子薨以翼為嗣安帝緣此貶冀為都鄉侯也注未考正論斯樂生所以泣而辭燕也泣而辭燕注中不引報惠王書謬矣寇恂傳建武二年恂坐繫考上書者免恂守河內不過二年遽以文法罷免光武未為能盡人之器用也馮異傳季文豈能居一隅哉一隅謂河北注誤臣本諸生至固敢因緣自陳此書足以見世祖度量不能同符髙祖然臣下謹畏保身之道則當以異為法岑彭傳無為而化至岑君遏之伐枳棘遏蟊賊豈真無為耶先去其害政者以簡撥煩而已贊膠東鹽吏膠東以縣掾迎鹽耳豈可直謂之鹽吏吳漢傳漢先令辨士説陳康曰至此計之至者也説康語甚凡可不載耿弇傳又兄弟無在京師者至帝善之韓信獨當一面何嘗有子弟入侍有以見光武之不宏也秉紀以操將篡漢至夷三族鄧氏恨少此人贊分此凶狄分謂胸奴自此分為南北王霸傳蘇茂客兵逺來至善之善者也大用之即司馬宣王之拒武侯也霸在上谷二十餘歲世祖于邊將亦久任如此祭遵傳遵為人亷約小心至帝以是重焉不改恭儉之素彤彤之威聲至乃悉罷緣邊屯兵久任之效任光傳可募發奔命至則兵可招而致也此外裔所以易盛也初起時不得不為此權計李忠傳六年遷丹陽太守至十四年三公奏課為天下第一為丹陽太守者八年故政教大行邳彤傳明公既西則邯鄲臣民不肯捐父母背城主而千里送公時王郎方據邯鄲邯鄲二字疑有訛當作二郡臣民通鑑作邯鄲勢成下城主作成主朱祜傳注東觀記曰祜作福避安帝諱按孝安諱祜作祐者傳寫之訛也本記及説文可據祜奏古者人臣受封不加王爵可改諸王為公帝即施行按光武紀改封諸王為公侯在十三年此奏是在外所上王梁傳梁穿渠引榖水注洛陽城下東寫鞏川及渠成而水不流梁前以讖文為水土之官不協衆望此復穿渠引水勉強立功欲補塞前負耳劉隆傳其疇輩十餘人皆死此不在深刻之數馬武傳帝雖制御功臣而每能回容宥其小失不能容宥小失則是無復君人之度當書以為戒若此則何足異而書之甚矣范之陋于識也論迄于孝武宰輔至亦何可勝言此數語未諦竇融傳金城太守庫鈞注今羌中有姓庫者音舍云承鈞之後也按音舍者其字上從廠非鈞後多能採取虛偽至以應期會戒其為虛談搆間即勑其立實效以自結于朝廷憲帝大怒召憲切責至憲大震懼雖頗開后族恣橫之端而威福在已所以猶為七制之主憲以前太尉鄧彪有義讓至事無不從竇憲借鄧彪以遂其姦與莽之用孔光相類因疊母元自通長樂宫得幸太后得幸是何語果爾雖如張釜等之奏不為過也刻石勒功紀漢威德令班固作銘至熙帝載兮振萬世此文宜載南單于傳中論列其功庸兼茂於前多矣憲值胸奴衰微何可並論蔚宗特以自抒其抑塞耳贊聽笳龍庭鏤石燕然雖則拆鼎王靈以宣聽笳拆鼎殊不成語馬援傳援至引見於宣德殿世祖迎笑謂援通鑑作宣德殿南廡下但幘坐迎笑蓋從東觀記之文如此乃與子陽適相反也髙帝無可無不可今上好吏事動如節度髙帝曠宇誠非世祖所希若吏事則王莽以吏不賦祿侵牟小民又法令數更不知所守因以致亂不得不先致意髙帝時則天下方苦秦法網之密宜一切且從濶略亦各因其時耳諸曹時白外事至此乃太守事耳竇融居河西亦以寬和得衆治西邊者固尚寬簡然大姓侵小民視之同于黠羌欲旅距亦不茍縱也以扶樂侯劉隆為副注扶樂縣名屬九真郡按通鑑注云九真未嘗有扶樂縣隆初封冗父侯以度田不實免次年封扶樂鄉侯則扶樂乃鄉名非縣名水經注扶樂城在扶溝縣砂水徑其北吾欲汝曹聞人過失至是以不願子孫效也誡兄子書當别敘何事艮限于此况後自有嚴傳耶廖今陛下躬服厚繒至戒成哀之不終廖何以不能教家言之太后顧不可訓勑防與光乎此亦一時希合之語也義防光奢侈好樹黨與防光奢縱樹黨略見第五倫傳楊終以書戒廖廖亦不納稜時榖貴民飢奏罷鹽官以利百姓馬稜奏罷鹽官此救荒者所當知今乃徒為牢盆役民何賴焉卓茂傳河南郡為置守令茂不為嫌理事自若為置守令而不罷其官是河南郡將猶以通儒長者容而假之也及莽居攝至不肯作職吏此前人所謂行已在清濁之間者也有謂子康仕莽朝考之不詳耳魯恭傳謙子旭官至太僕旭疑非謙之子有脫誤劉寬傳但任重責大憂心如醉劉文饒良吏為三公則不足當重寄靈帝失德無能改格則當早退今尸位而已憂心如醉一語可以畢扶顛持危之責乎伏湛傳自行束修訖無毁玷按馮衍傳豈特束修其身而已注謂約束修身蓋於時皆如此解侯霸傳每春下寬大之詔奉四時之令王莽以盛夏斬人百姓駭懼此亦當日之要務也好直言無隱諱至自是大臣難居相位光武為治兼法文宣此則遂蹈宣帝之短自此三公多取充位不收大臣之效矣宋宏傳宏當宴見至聞義則服可乎仲子有大臣之節但此則稍過恐人主不能堪拔同郡韋著扶風法真韋著晚謬不得比法真馮勤傳帝懲王莽專政務自攬威權如勤等在三公位不過恭謹任職如一胥吏而已但當載其名氏于表不必立傳也韋彪傳數陳政術每歸寬厚承光武明帝之後尤知要也白帝就家拜著東海相至隱者恥之著時與薑肱同徴詔書雖逼切何嘗不可隱身遁命哉海內列名五處士而其中有著故士必待于定論也韋著可匹蔡雍杜林傳有恥且格注格來也人皆有恥慙之心且皆來服按集解格至也此所據不知何師之説餘人雖不見譴雖不見譴然收捕諸王賔客機牙于此趙典傳會病卒至諡曰獻侯注引謝承書謂下獄自殺不言病卒按既有弔祠贈諡則范得其實建安十三年至免官三國志注中作十五年非也獻帝紀十三年正月溫免官桓談傳後賢果風太醫令真欽至乃解董賢求傅氏罪事與前書參差不合高武侯傅喜孔鄉侯晏之從兄弟安得復有后弟名喜為侍中者也大抵范史事未核馮衍傳作敬通傳當是本其自敘冗而寡裁辭勝于事聖人轉禍而為福智士因敗而為功語與次下與田邑書同而史家竟忘刪削衍恐伯玉必懷周趙之憂周疑禍字之訛注非也據位食祿二十餘年二十餘年疑有訛否則據位食祿上有脫文也肅宗甚重其文衍文浮靡寡要而肅宗重之和帝以後遂即于衰上好下甚可不謹歟申屠剛傳舉賢良方正對策詞意凡晦不足以尊主折姦宜乎班書不採鮑永傳孔子闕里無故荆棘自除至助吾誅無道耶此顯宗崇儒之先兆太平之基將復興也永乃以此詐敵可謂謬矣路經更始墓至意不平鮑永拜更始之墓稍知禮義者宜為之非盛節也光武因之不平異乎髙祖之待欒布昱吾固欲令天下知忠臣之子復為司𨽻也謂昱父永繼父宣為司𨽻昱復居宣位也郅惲傳直心無諱至盍去之乎鄭次都中行之選王吉儔也其學又在嚴光右乎孟軻以強其君之所不能為忠量其君之所不能為之賊注獨不引離婁篇何也將為巢許乎而父老堯舜也父老堯舜言偹堯舜時民間父老之數也貶東中門候為參封尉賜惲而自引過可也東中門候無緣見貶臣聞夫婦之好至無令天下有議社稷而已君章此言乃獨微婉非復平時悻直卒能進説太子善處人骨肉之間豈其晚學有進耶壽賔客放縱至即時騎驛言上無所容貸可也從事專住王國督郵徙舍宫外則操之已蹙非中正矣楊厚傳入方術傳可也教授門生上名録者三千餘人厚門人任安在儒林傳董扶在方術傳周舒見蜀志子羣傳中襄楷傳前者宫崇所獻神書觀注所引太平經典帝王篇語神書乃若此其鄙而楷方信其説是亦夏賀良之流也太傅陳蕃舉方正不就按魏志注中引司馬彪九州春秋有陳蕃子逸與術士平原襄楷會于冀州刺史王芬坐楷曰天文不利宦者黃門常侍真族滅矣逸喜芬曰若然者芬願驅除于是與許攸等結謀云云宜補注郭伋傳髙祖父解武帝時以任俠聞解已族安得有後范之疏至此亷范傳然依倚大將軍竇憲以此為譏范之所為近于俠故有附勢之纍樊宏傳南陽湖陽人也至為鄉里著姓仲山甫食采之樊非漢之南陽此相仍之誤前書以河內修武為南陽也封弟丹為射陽侯野客叢書丹封謝陽侯正詩申伯番番既入于謝之謝地也樊毅碑曰謝陽之孫可驗倏初倏刪定公羊嚴氏春秋章句東漢經師大抵皆主於刪繁其所發明多在古學倏學張霸又減定之馮魴傳南陽湖陽人也至因以氏焉湖陽之馮猶浚儀之王别於上黨今但為一望何也周章傳貪殤帝孩抱養為已子故立之和帝既崩始收諸皇子於民間殤帝即以其日為太子其夜即位謂貪其孩抱養為已子非實録太后以前既不立至是為安帝太后恐勝為怨不知使騭兄弟強死者祜也但為勝無疾見廢則非實録人有美田宅尚惜之况天下重器以和熹明哲顧肯捨和帝之子以與從子乎梁統傳丞相王嘉輕為穿鑿至百有餘事注謂嘉傳及刑法志並無其事統與嘉時代相接所引固不妄矣但班固略而不載也按王嘉以建平二年十月為御史大夫三年四月為丞相越再歲元壽元年三月下獄死為相不過二期安得數年之間虧除百有餘事宜乎班史之不取也其對尚書稱初元建平初元則刑法志中載元帝議減律令詔書建平則以成帝河平中復下詔議減死刑統因誤以為哀帝之建平非班史失之略注家未細尋耳商商自以戚屬居大位至京師翕然稱為良輔梁商頗似史浩以子不才沒其小善冀此跋扈將軍也通鑑注爾雅釋山卑而大扈跋者不由蹊隧而行言強梁之人行不由正路山卑而大者且欲跋而踰之時太原郝潔胡武皆危言髙論危行言遜東漢君子皆不能孫言自免不疑自恥兄弟有隙至皆髠笞徙朔方其後不疑蒙先冀誅而卒而馬融為冀草飛章以誣李固竟以不疑故冀還陷以罪有天道焉曹褎傳乃次序禮事依凖舊典雜以五經讖記之文此謂古禮之散見于讖記書中者恐非依讖制禮奏褎擅制漢禮奉敕東觀集作何謂擅制鄭康成傳康成入吾室操吾矛以伐我乎康成始通公羊故邵公以為入室操矛厥後范寧之注榖梁徴聖經而詰衆傳不主一師之説以康成為法也鄭興傳子衆衆謂松曰太子儲君至藩王不宜私通賔客伏波之論王肅仲師之辭梁松此出入藩邸者之龜鑑也陳元傳夫至音不合衆聽至固其宜也何不據經傳短長核而論之一篇之中浮詞數見此東京之文所以即於敝也及亡新王莽至身為世戮借亡新指陳故顯著易入張霸傳永元中為會稽太守至道路但聞誦聲順帝始析吳會此在和帝永元中乃吾郡之文翁也惜視事止於三歲耳桓榮傳子郁侍中竇憲自以外戚之重欲令少主頗涉經學上疏皇太后憲蓋知郁不為已患故薦之授經禁中非德舉也以憲傳參觀此疏可削孝昭皇帝八歲即位至平成聖德前書勝授上官太后尚書非若蔡義韋賢進授昭帝詩也丁鴻傳凡口率之科宜有階品至三歲一人今之分南北卷取士者其不聞此議乎法雄傳初平中卒官自安帝永初三年己酉至獻帝初平元年庚午八十餘年當是元初之誤馮緹傳願請中常侍一人監軍財費緄計雖一時權巧中人監軍之禍始此矣是故事當思其所敝度尚傳尚敕令秣馬蓐食明旦徑赴賊屯乘敵用我之鋭悉移深林逺藪椎髻鳥語之人置於縣下此即所謂山越也楊琁傳琁乃特制馬車數十乘至羣盜波駭破散即火牛之餘智用車則即可依以自蔽鼓灰則不測人數車馳矢疾賊無節制遂駭亂奔潰也排與韛義同韋囊可鼓其氣者也論若夫數將者並宣力勤慮至膚受之言互及張宗同傳無乃不類劉般傳般對以常平倉外有利民之名至置之不便若奉行非人增價無實則先以和糴病民矣愷今愷景仰前修景仰之誤始此賈景伯經師也豈范氏妄竄耶趙咨傳陳大夫設參門之木陳大夫事未詳門疑作同檀弓篇云陳乾昔寢疾屬其子曰必大為我棺使吾二婢子夾我陳乾昔死其子曰以殉葬非禮也况又同棺乎弗果殺此所謂參同者歟班彪傳義進項羽陳涉而黜淮南衡山淮南衡山之不為世家與淮陰黥彭同例入則太顛閎夭南宫括散宜生太顛四人至成王時猶在乎固固又撰功臣平林新市公孫述事作列傳載記二十八篇晉書中載記本此雖屈伸無常所因時異至為策近長固議似得大體然于邊計不如勿報其使如其獻見厚賜以遣之可也此于忠信禮義何所虧缺招未臣之北虜擕保塞之南庭不亦徒為好大無補實效乎觀文帝屢與胸奴和親而侵盜不已亦非緣此可保後日強盛無風塵之警耳固又作典引篇述敘漢德此文靡而不實比之兩都之作尤為無益靡號師矢敦奮撝之容敦本詩敦商之旅論而不敘殺身成仁之為美不敘殺身成仁此概言之注家誤引遊俠傳敘非叔駿讀漢書不詳也鍾離意傳縣人防廣為父報讐繫獄至果還入獄廣為父報讐哭母不食孝義之人必不怯死逺竄自可遣也陳升平之世難以急化宜少寬假此非不急濶談更事乃知之宋均傳至於苛察之人至所由而作若貪汚放縱則災害流亡亦立致矣此因戒苛察奬宏厚而詞有偏激耳寒朗傳棄之荆棘至遂收養之天生伯竒以扶持漢室之元氣故棄之數日猶尚氣息也臣見考囚在事者咸共言妖惡太過至無敢牾陛下者明初胡藍之獄若得一寒朗豈至濫刑若此光武十王傳沛獻王輔鯉怨劉盆子害其父因輔結客報殺盆子兄故式侯恭劉恭竭忠于更始為之報殺謝鯉因盆子遷怒所謂刑戮之民也楚王英英遣郎中令奉黃縑白紈三十匹詣國相至英至丹楊自殺贖死得死妖由人興也袁宏所記遣使天竺之事出于牟子皆緣此詔附會廣陵思王荆而兄弟至有束縛入牢獄者入獄為沛王輔及至年老逺斥居邊居邊謂中山太后注云封之於魯非今天下爭欲思刻賊王以求功宋本句下有寧有量耶若歸并二國之衆可聚百萬君王為之主鼓行無前功二十五字功字接下文易於太山破雞子今年軒轅星有白氣至軒轅女主之位軒轅之語將置太后于何地荆之悖逆至此贊此贊有法度本班史景十三王傳序東平之賢不先東海遜國事尤大不得以臨江河間比也中山臨淮無聞夭喪謂中山無聞臨淮夭喪耳注謂二王早終名聞未著者非也中山王焉立五十二年至和帝時薨可謂早終乎朱暉傳南陽宛人也注東觀記曰其先宋微子之後也以國氏姓周衰諸侯滅宋奔碭易姓為朱後徙於宛也按蔡雍朱公叔鼎銘云微子啓生公子朱其孫氏焉與東觀記微異及當幸長安欲嚴宿衛故以暉為衛士令暉進止必以禮故可以嚴宿衛其諸報怨以義犯率皆為求其理多得生濟惟義者為求其理斯不傷孝子之心又塞姦宄之源矣榖所以貴由錢賤故也可盡封錢一取布帛為租布帛為租榖價仍無由平林誠妄言黃髮無愆詔書過耳章帝賴暉言不復施行均輸煮鹽之事所以得全為東京令主穆自和熹太后以女主稱制至通命兩宫母后臨朝不獨權歸外戚閹寺竊柄亦由此起何敞傳六世祖比干學尚書於朝錯朝錯不聞教授少卿從學之説恐未信核湯持法深而比干務仁恕數與湯爭與張湯爭之説恐未信核不如家傳為近張敏傳春秋之義子不報讐非子也至非所以導在醜不爭之義論復讐者此為正平然必參觀韓愈之論乃精密無憾胡廣傳竊見詔書以立后事大至定立為皇后定立梁后本之廣所以優遊建和之際無所猜也六竒之䇿至亦在弱冠不究是非之實以立中制徒托異事相排而已袁安傳初安父沒至故纍世隆盛焉後一卷載吳雄諸人事卓然不惑此傳中不刋削三書生指葬地事自相違反張酺傳帝先備弟子之儀使酺講尚書一篇然後修君臣之禮較之明帝之事桓榮尤足聳易吏民觀聽其于勸學不亦至乎常來候酺候字殊乖義理郭躬傳躬少傳父業講授徒衆常數百人律亦講授故漢之吏治精自明法之科罷此風衰矣論若乃推己以議物捨狀以貪情二句因郭躬之事又推言之以終上用恕之意注以亡命得減為探情非文義矣陳寵傳猶用漢家祖臘祖臘者猶言先祖相承所用之臘祖非祭名注誤夫冬至之節至夏以為春先儒取此以辨春秋家謂孔子以夏時冠周月之誣月令曰孟冬之月趣獄刑無留罪觀下文大刑畢在立冬則孟冬者寫書之人誤耳當作季秋又孟冬之月身欲寧事欲靜此孟字又唐以後人因上文而誤當作仲忠母子兄弟相代死聽赦所代者聽相代而赦所代應劭駁之論然其聽狂易殺人開父子兄弟得相代死斯大謬矣狂易殺人得減重論為其非故也此不當駁議班超傳平陵人徐幹素與超同志幹字伯張善章草書事詳張懷瓘書斷疑出于決録也忠説康居王借兵還據損中注損本或作楨未知孰是按通鑑注按西域傳靈帝建寧三年涼州刺史孟陀遣兵討疏勒攻楨中城楨中是也明年下詔曰至邑千戶此詔有武宣風骨破白山永平十六年竇固破呼衍王于天山即白山也而超妹同郡曹壽妻昭亦上書請超至觸犯忌諱此書元氣淋漓西京亦不多得勇朗遂得免誅勇以後期徴下獄免張朗因勇之成先期邀功免誅為幸而勇反以後期得罪不酬平定西域之勞順帝賞罰乖謬若此論班超梁慬奮西域之略梁慬有戰功無將略非仲升之倫其在西域尚不及宜僚也翟酺傳捐玉堂之盛此人臣不可稱玉堂之證上言孝文皇帝始置五經博士注文帝之時未遑庠序之事酺之此言不知何據按劉歆移太常博士云漢興至孝文皇帝天下衆書往往頗出廣立學官為置博士子超之言即以子駿為據可也應奉傳追愍屈原至數十萬言朱子注楚詞亦本於此霍諝傳是時大將軍梁冀貴戚秉權至陳聞罪失諝勳皆內職故冀不能加害爰延傳時太史令上言客星經帝座光武之于嚴光桓帝之于鄧萬皆動天象此劉葛所謂興隆傾頽之判也王符傳述赦篇古者唯始受命之君至放縱天賊也然則每一君立必下赦者謬矣仲長統傳理亂篇慷慨激昻挾有悍氣此為亂世之文其論存亡迭代晉武志怠于平吳遂貽永嘉之禍皆如燭照損益篇彼君子居位為士民之長至是設機置穽以待天下之君子也此為崔毛之徒言之然有猷有為必兼有守所以取人也既富方穀所以恤下也凖之于經乃不偏矣拘潔注謂即隱逸之人誤論文辭拙滯但見其憒憒不了義門讀書記卷二十二

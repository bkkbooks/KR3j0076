body:
  text: 義門讀書記卷十三翰林院侍讀學士何焯撰史記史記集解序馮鈍吟云唐子西云太史公敢亂道却好班固不敢亂道却不好甚矣宋人之輕於詆古人也尚論古人醜詞惡句有所施之如小人無忌憚背經違理非毁周孔至於無父無君呵而闢之可也賢者文詞時有出入理宜紏正其言則應婉順太史公千古一人亂道二字出口一何容易且所云亂道者正据班固之論也游俠貨殖之傳詞㫖激揚有為而言之其志有可傷者孟堅之言固為正論然亦未免深文至於先黄老後六經自是史談所論談當文景之後尚黄老者隨時也至遷則不然矣老子與韓非同傳仲尼為世家自序言禮以節人云云止言六經不及黄老父子自不同班孟堅揚子雲言無分别盖亦未審耳子長考信於六藝奉之以著書造次必稱仲尼一味抹煞概云亂道何耶至於班固不好自非失心病熱何至出此語哉亂道最文章不好處宋人文字不好只是有亂道如唐庚乃亂道之尤者也按永嘉尊信史記亞於六經真屬強作解事被朱子史記有甚道理一句掃倒但其文章却有微㫖宋儒硬將大話推排又不識史法耳甚多疎略或有牴牾誠所不免然索隱已詳之矣太史公載秦漢間攻取形勝頗詳而於五伯規模即不能舉其要豈因左傳國語已自有不朽故從略耶五帝本紀鈍吟云黄帝始制文字宜始於黄帝也禮有五帝徳書有二典史公据以為書藝五種修神農之舊政也淳化鳥獸蟲蛾蛾古蟻字帝堯者放勲以下云云鈍吟云左史紀言尚書春秋是也春秋傳以釋經太史公合而一之又云古文尚書出孔氏屋壁孔安國以今文讀之因以起其家逸書得二十餘篇司馬遷從安國問書所載多古文又尚書多古語不易通遷所載頗易其本字即太史公之書傳也或譏之似未得其㫖日中星鳥夜中星虚春言日秋言夜順隂陽之道也堯崩三年之喪畢以下云云鈍吟云直据孟子則諸家異說自廢重華父曰瞽瞍云云世系亦倒叙舜舉八愷使主后土天官者相之職舜自主之八愷則主地官也詩言意詩言志此獨作意按趙明誠書孔子廟置卒史碑云華陽國志後漢書注皆云趙戒字志伯而此碑乃作意伯疑其避桓帝諱故改焉此志字其亦後漢人之所改歟北發西戎析枝渠廋氏羌氏疑當作氐帝禹為夏后而别氏姓姒氏曰姓姒云者其後子孫多遂以為姓而當時則其氏也學者多稱五帝至未鈍吟云觀此贊則太史公非好竒明矣孔子所傳至儒者或不傳太史公本此夏本紀壺口治梁及岐康成釋禹貢惟以漢地理志為據此先儒之精慎也田中下賦貞作十有三年乃同鄭注以貞作句殷本紀湯崩注大司空御史長卿按行水災按漢書公卿表建平紀元凡四年無長卿其人為御史者祖巳曰王勿憂殷之及王多曰祖某此祖巳疑王之兄弟其下云祖伊亦仿此孔氏以祖為其氏而云祖伊祖巳之後恐非也封紂比干之墓三句當作封比干之墓封紂子武庚祿父此傳冩之誤周本紀周道之興自此後後作始髙圉立子亞圉立上立字作卒字明年敗耆國耆即黎虎賁三千人千字當從書序作三百人千字不知何時謬改自棄其先祖肆犯不答犯作祀號曰共和鈍吟云共和周召相與和而修政也不必如汲冡竹書之說櫝而去之去一作藏學者皆稱周伐紂居洛邑陸云觀婁敬之言當時直謂周都洛矣不容無辨秦本紀鈍吟云近秦而與秦為難者無如晉與秦同大而足以難秦者莫如楚故插叙晉楚事為多按莊襄之世秦已盡取周地固繼周而王矣然六國未亡則猶存封建之遺制也至始皇并吞而盡有之分天下為三十六郡於是三代規模一變此始皇本紀所以離而為二也其賜爾皁游游當作斿躁公二年南鄭反南鄭春秋戰國時屬楚十四年更為元年改元始此虜其將屈㒺㒺作匄武安君攻皮牢㧞之一本無君攻二字似脫秦始皇本紀昌平軍徙於郢軍當作君即上所謂相國昌平君反之於郢故下項燕得立以為王也因封其樹為五大夫五大夫第九爵也刻所立石其詞曰詞俱有韵發北山山石椁椁字疑衍乃寫蜀荆地材皆至寫當為輸寫之意運其材也舊作寫放解恐非自琅邪北至榮成山亭林云寰宇記秦始皇登勞盛山望蓬萊後人因謂此山一名勞盛山誤也勞盛二山名勞即勞山盛即成山史記封禪書七曰日主祠成山成山斗入海漢書作盛山古字通用齊之東偏環以大海海岸之上莫大於勞成二山故始皇登之史記秦始皇紀令入海者齎捕巨魚具而自以連弩候大魚出射之自琅邪北至榮成山弗見正義曰榮成山即成山也按史及前代地理志並無榮成山余向疑之以為其文在琅邪之下成山之上必勞字之誤後見王允論衡引此正作勞成山乃知晉人傳寫之誤唐時諸君亦未之詳考也遂使勞山并盛之名成山冐榮之號今特正之賛楚師深入戰于鴻門此深入謂周章之師世非無深慮知化之士也以下對前僅得中佐說夫并兼者髙詐力以下承上攻守勢異而暢言之鈍吟云史公以賈生推言一句全載過秦論三篇另是一格其先列第三篇者論始皇興衰應始皇自以為三句次列第一篇者論秦之先公應賛中興邑西垂等句末列第二篇者總論其大勢歸到二世結耳項羽本紀鈍吟云自秦亡後天下之權在項羽故作本紀班孟堅漢書項羽與陳勝同傳與太史公不同按當時羽實主約漢封巴蜀羽為之也故太史公用共工之例列于本紀江西皆反江西猶今言浙西項梁乃以八千人渡江而西鈍吟云自此一路往西擊秦篇中東西二字是眼目乃與呂臣軍俱引兵而東一路向西此引而東暫以兵敗也收其貨寶婦女而東自此東歸乃分天下立諸將為侯王至各就國鈍吟云楚兵初起憂在亡秦須立六國以樹黨六國立則秦已失天下獨有闗中耳秦已滅則患在諸侯盡徙故王王惡地羽之謀也此亦有不得已者但不知桓文處此當何如耳馮氏亦成敗之見也乃其殺魏豹其字誤髙祖本紀騎將灌嬰擊大破楚軍一本無擊字五年髙祖與諸侯兵共擊楚兵至大敗垓下項王大敵雖兵少食盡致死于我勝負未可知先合不利者驕之使惰也却者遷延徐退誘之使疲也縱則夾擊之使不能前後相救楚兵横斷故不利也然後因其亂而以衆乗之項王雖勇豈能支乎絳侯柴將軍之兵則游兵也當楚人既動則繞出其後矣漢書無之皇帝在後皇帝二字史駁文也時髙祖尚未即皇帝位呂后本紀太后封大臣封作風賛作呂太后本紀者著其實賛以孝惠皇帝冠之書法在其中矣孝文本紀乃循從代來功臣循漢書作修是也功下無臣字十一月晦日有食之二句亭林云漢書多有食晦者盖置朔參差之失其云十二月望日又食此當作月耳故夫馴道不純馴古訓字賛漢興至孝文四十有餘載以下言外可思益見補武紀之謬三代世表盖其詳哉與下盖其慎也以詳慎二字作闗鍵于是以五帝繋諜尚書世紀諸本尚書下有集字六國表或曰東萬物所始生萬疑作方秦楚之際月表然虐在位虐作後大聖孰能當此受命而帝者乎大字上脫一非字漢興以來諸侯年表太行左轉度河濟阿甄以東薄海甄疑作鄄小者不軌千法千作于要之以仁義為本仁義為本言當不失親親之初意以至于孤立也髙祖功臣侯年表十二髙祖在位十二年也下倣此平陽七自六年至十二年凡在髙祖世七年也信武别定江陵侯五千三百户陵漢書作漢清陽漢書作清河二千二百户廣嚴六年十二月甲申壯侯呂甌元年呂作召禮書禮由人起至所以捐社稷也此下皆荀子故堅革利兵至刑錯而不用以下本荀子議兵篇天地者生之本也至流澤狹也以下又本荀子禮論樂書復次以為太一之歌與下天馬二詩即漢書禮樂志所載也稍節其文耳此亡國之聲也不可遂遂小字宋本作聽律書雖克所願動亦耗病耗作秏丑者鈕也言氣陽在上未條條作降孰能在天地之神在作存天官書隨北端兌兌漢書作銳古字通右四星曰天棓四作五輔星明近輔星漢書作柄輔其西有句曲九星三處羅羅下漢書有列字三曰九游游漢書作斿下有四星曰狐狐作弧曰東方木主春曰甲乙下曰字作日字其趨舍而前曰羸趨音聚羸作贏下同左行在寅嵗徳所在以三月居與營室東壁晨出居字疑衍以七月與東井輿鬼晨出曰大音音字小字宋本作晉曰南方火主夏曰丙丁下曰字作日字心為明堂營惑廟也營作熒填星其色黄光芒者曰黄鍾宮小字宋本光作九者作音躁圜以靜圜作國其色大圜黄􅗍􅗍與澤一字出而留桑榆間注正出舉日平正出桑榆而上者餘二千里按舉日作氣言而字衍疾其下國疾漢書作病下同未盡其曰過參矣曰作日矣作天太隂之精主冬曰壬癸曰作日當出不出是謂繫卒繋作擊右數萬人戰右作有後至先去前後皆病居暈不勝暈作軍國皇星大而赤注五星之精散為六十四變記不盡按記上脫一志字類狗所墮及望之如火光及下脫炎火二字按漢書亦無炎火二字今從柯氏本增平望在桑榆上千餘二千里上千字衍王朔所候决于日旁王朔人姓名望氣者見李廣傳四始者候之曰曰作日西北戎菽為注為成者按者當作也天之五佐為經緯經字疑衍嬴縮有度嬴作贏月變修刑修作省次修穰次上有其字常大赦載句未詳二曰以辰未詳封禪書而幽王為大戎所害害作敗作鄜祠後七十八年祠作畤薄山襄山也山下脫一者字襄作衰注同從汲古後人得小字宋本校正獨與揚雄河東賦合也遂以十月至㶚上㶚作覇吾聞天有五帝而有四何也莫知其說秦自以水徳黑帝則自當之故不立北畤耳司命施摩之屬摩作糜尤敬鬼神之事事作祀上有古銅器古作故致物而丹砂可化為黄金砂作沙下同明年天子病鼎湖甚亭林云鼎湖宮名漢書揚雄傳南至宜春鼎胡御宿昆吾是也湖當作胡故卒起甘泉而行右内史界史記索隱以為湖縣在今之鄉絶逺且無行宮夀宮神君小字宋本無重四字天子祓然後入祓小字宋本作袚閒者河溢臯陸隄繇不思思作息不吳不鷔鷔作驁卿有札書曰札小字宋本作禮則太史奉以指所伐國太小字宋本作天獨見旗星出如𤓰旗當從漢書作填星故下云信星昭見也春至鳴澤從西河歸鳴小字宋本作明河渠書鈍吟云水患莫大于河故最詳國用莫急于漕而民間所急在水利三事錯綜成文語脉復井井山行即橋注一作􅞬􅞬改作檋入于勃海注河徙東郡更注勃海勃作㪍下同岸善崩乃鑿井亭林云岸當作崖漢書古今人表屠岸賈作屠崖賈是也師古注謂山領像人之顔額者非其指商山者尤非劉攽已辨之功無己時兮吾山平注韋昭曰鑿山以填河也填小字宋本作通而闗中輔渠靈軹引堵水堵作諸東海引鉅定亭林云東海疑是北海之誤按地理志齊郡縣十二其五曰鉅定下云馬車瀆水首受鉅定東北至琅槐入海又千乗郡博昌下云博水東北至鉅定入馬瀆而孝武紀曰征和四年春正月行幸東萊臨大海三月上耕于鉅定還幸泰山修封計其道里亦當在齊去東海逺矣溝洫志同平凖書孝景時至益增修矣漢治始衰于景帝嚴助朱買臣等招來東甌武帝侈心自楚士導之率十餘鐘致一石注鐘六斗四升作六石四斗獲首虜萬五千級所獲首虜皆以一為十士馬死者十餘萬則實數也天子乃損膳損膳與上布被對廢居居邑註服䖍曰居轂于邑也轂小字宋本作糓錢益多而輕下云錢益輕薄而物貴如說是瓉說非也二曰重差小曰下脫一以字按小字宋本無以字三曰復小撱之撱作隨卜式上書願輸家之半縣官助邊式亦欲為俠者變而用之于縣官耳然不能半自出不能半自出者皆聚而為盜也湯奏異當九卿異當作當異于是商賈中家至用益饒矣始之以重斂繼之以奪攘其貧者既為盜賊富者知不可保亦為不終日之計武帝之不亡者賴祖宗休養之澤深耳命曰株送株送當從註應劭說此本二事如說非也就食江淮間欲留之處漢書作欲留留處之字乃寫作二㸃傳誤作之而桑宏羊為治粟都尉領大農盡伐伐作代一國之幣為二等小字宋本作三等吳太伯世家吳使季札聘于魯鈍吟云詳季子事太史公之志也史記雖無褒貶而有筆削文中子云事多志少未得太史公之㫖也惟蘇明允云有是非而無褒貶為知太史公也齊太公世家鈍吟云太公之事仲尼不言諸家不同太史公所敘詳略得宜後人不能作矣又云宋人論三代時專以意見揣摩安得如此妥直左杖黄鉞以下云云鈍吟云載今文尚書泰誓太史雖學古文亦不廢今文與太公作此泰誓鈍吟云按尚書不言太公惟此泰誓有之與詩相應釐公九年此下見春秋桓公元年春齊桓公也管仲病桓公問曰至三子專權鈍吟云舉隰朋亦見管子然管子云鮑叔不可按鮑叔先管仲死不得管仲病時尚存也太史公不以為然故不載舉朋語耳桓公十有餘子二句鈍吟云一總以下敘五公子爭立其事棼如亂絲太史叙之條理秩如也避齊亂故在衞五公子事至此完闞止有寵焉陳完世家以為二人太史公曰吾適齊云云一賛只論齊所以強魯周公世家前据詩書後据春秋武王克殷二年已下事詩書所載注家參錯不同此書又不同卜居焉曰告告作吉初惠公適夫人無子一段與左傳不同賛詞妙在先引孔子二句鈍吟云魯有春秋經故所論止此其後得失不復言管蔡世家叙事鍼線甚密與車予乗徒七十人予作十曹叔世家桓公三十五年魯隱公立鈍吟云世家書魯隱公立春秋之始也衞康叔世家叙莊公處不同毛傳晉世家十年代千畝有功代作伐自獻公為太子時重耳已成人矣重敘起十六年楚將子反怨巫臣至族滅之鈍吟云微與左氏傳不同此略也左氏云趙武畜于公宫與趙本紀亦相同韓厥曰趙襄趙盾之功豈可忘乎至為趙後鈍吟云此言事後耳立趙後非在此年也魏武侯韓哀侯趙敬侯滅晉後而三分其地敬侯當是烈侯楚世家楚東侵廣地至泗上春秋止此鄭世家於是與惠惠王歸當作周惠王故不聽襄王請而囚伯犢犢作犕楚反鄭晉兵來救反作伐趙世家鈍吟云太史公敘事事有牴牾者皆兩存如周本紀依古文尚書齊太公世家又載今文泰誓所謂疑以傳疑也有大事而紀載不詳難敘者缺之史闕文也夏本紀不詳有窮后羿事而于吳太伯世家見之趙世家言殺趙同趙括趙嬰齊左傳頗略然此趙氏之大事必别有所傳趙之亡去太史公近文獻必有可考太史公時書不存者多矣遂謂之妄可乎如此事趙氏所由不絶得以大于後世茍有其文何得削之後世之輕議古人可恨也按程嬰公孫杵臼之事最為無據疑戰國時任俠好竒者為之非其實也定翁謂太史公去春秋不逺趙國亦必有史是固可信吾謂不盡然自始皇焚書列國典籍皆已蕩然太史公雖去春秋不逺然傳聞之誤亦必已多如王文恪明憲宗以後人其記宣室為惠宗之子略無足據者事之有無當斷之以理不在歴年之逺近也初疑載秦穆公趙簡子夢之帝所諸事似乎可略後思之要非無謂飛亷惡來之後昌熾如此天道豈可問耶載之以見事有不可知也史家妙用亦難為㝷行數墨者道矣周宣王時伐戎為御及千畝載載作戰趙盾弑其君史家之書法也晉國之政卒歸于趙武子武作文奉邑俟于諸侯俟作侔財王所以賜吏民財作聽卿秦將而攻伐伐作代魏世家襄王元年與諸侯㑹徐州云云蘇秦合從不載世家兩地無罪而再奪之國地作弟賛魏雖得阿衡之佐曷益乎則此嗟惜深痛之詞譏之者俱非韓世家公子咎公子蟣蝨蟣蝨國策作幾瑟田敬仲完世家以田完制名所以别于太公之齊也故陳桓不得立桓作完田常成子與監正正作止田常于是盡誅鮑晏監正及公族之彊者按前已云殺監止此疑衍田常乃選齊國中女長子七尺以上為後宮長子作子長救韓趙臣擊魏臣作以孔子世家論來孔子只合作列傳太史公自据素王之說三晉田常至戰國始列于諸侯孔子則變例也往日所見謂孔子祖述堯舜憲章文武而終于素王三晉田常以盜簒傳世此生民之不幸而戰爭至秦楚之際也意太史公序論之㫖若此不免鑿矣已而去魯至由是反魯總提孔子生鯉至末世家陳渉世家鈍吟云陳渉起自謫戍半載而敗可與張耳陳餘並為傳不當為世家者也然亡秦之侯王將相多渉所置自項梁未起以天下之命制于一人之手升為世家太史公之㫖也外戚世家鈍吟云通卷皆言命又云先本六藝言妃匹之際係天下之興亡此正言也而漢之諸后或不由徳特言命以志感慨文有煙波盖難言之也鈍吟云妙在此句不然與上文不相顧矣太史公曰秦以前尚略矣二句此處似不宜斷漢興呂娥姁鈍吟云已作呂后本紀此只略敘與班書不同意非天命孰能當之自前敘至此是一篇文字皇后母子母寵下母字作毋長公主欲子王夫人子作予荆燕世家澤以將軍擊陳陳狶衍一陳字令其子求事呂后所宰大謁者張子卿宰作幸太呂欲立呂産為呂王太呂作太后代王亦從代至四句與齊世家不同齊悼惠王世家齊王使路中大夫告于太子太子作天子下太子復令亦作天子復令留侯世家有一老父至乃太公兵法也鈍吟云使歐陽公敘此直云遇一老父授以太公兵法二句便完矣安能如此娓娓賛學者多言無鬼神然言有物昌黎原鬼因此生意絳侯周勃世家此怏怏者非少主臣也立武帝條侯爭之故疑其不能事少主續絳氏後氏作侯義門讀書記卷十三

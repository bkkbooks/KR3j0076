body:
  text: 義門讀書記卷五十七翰林院侍讀學士何焯撰李義山詩集晚唐中牧之與義山俱學子美然牧之豪健跌宕而不免過於放學之者不得其門而入未有不入於江西沠者不如義山頓銼曲折有聲有色有情有味所得為多馮定逺先生謂熟觀義山詩自見江西之病余謂熟觀義山詩兼悟西崑之失西崑只是雕飾字句無論義山之高情逺識即文從字順猶有間也義山五言出於庾開府七言出於杜工部不深究本源未易領其佳處也七言句法兼學夢得錦瑟此悼亡之詩也首特借素女鼓五十絃之瑟而悲泰帝禁不可止以發端言悲思之情有不可得而止者次連則悲其遽化為異物腹連又悲其不能復起之九原也曰思華年曰追憶指趣曉然何事紛紛附㑹乎錢飲光亦以為悼亡之詩與吾意合莊生句取義於鼓盆也但云生平不喜義山詩意為詞掩却所未喻亡友程湘衡謂此義山自題其詩以開集首者次聨言作詩之㫖趣中聨又自明其匠巧也余初亦頗喜其說之新然義山詩三卷出於後人掇拾非自定則程說固無據也重過聖女詞次連乃是聖女祠移向别仙鬼廟不得玉郎㑹此通仙籍玉郎疑是自謂寄羅劭興燕重逺兼泥兼作嗛令狐舍人說昨夜西掖玩月因戲贈第二句說字不落空次連是西掖底月寫月即寫出玩字意末二句因直宿而思薦逹足戲贈意崔處士馮定逺云上六句先將崔處士似先賢事迹寫透末二句結出便通體皆靈自喜定逺云已之寄形宇內以天地為逆旅猶蝸牛也妙在第二句又為物所寄便是莊子逍遙游齊物諸篇見解活潑潑地那得不自喜第三言有竹第四言有花第五言近山第六言近水末二句言又有酒也題僧壁蚌胎未滿思新桂是未來琥珀初成憶舊松是過去異俗二首第二首似有刺貪之意和孫朴韋蟾孔雀歌都護矜羅幕宋黃休復茅亭客話云蛇與孔雀交偶有得其卵者使雞抱伏即成其名曰都護初年生緑毛二年生尾小火眼三年大火眼其尾乃成人欲此必行役既久而切求歸之思故云華山題王母祠勸栽黃竹莫栽桑按穆天子傳則黃竹是地名不知作者何所承也華清宫言明皇幸免驪山之禍耳末二句反言之所以為絞而婉也楚澤第二句伏後早寒三四是澤中潭州此隨鄭亞南遷而作第三思武宗第四刺宣宗五六則悲㑹昌將相名臣之流落也楚詞以蘭比令尹子蘭蓋指白敏中言之今古無端入望中此登潭州官舍樓而作所望者故園人耳今目斷鄉關而潭州已事歷歷在目無端二字從空樓寫出絶妙章法湘淚淺深滋竹色二句入望古今陶公戰艦空灘雨二句雨中壞艦風中破廟令人不堪回首誼作傅目斷故園人不至收望字贈劉司户已斷雁鴻初起勢謂下第更驚騷客後歸魂謂逺貶哭劉司户二首酒甕凝餘桂王建集中有與去華絶句言其病酒故有此句江風吹鴈急言已哭之哀也第二首已為秦逐客謂下第復作楚寃魂謂逺貶悼傷後赴東蜀辟至散關遇雪通首不離悼傷後三字北齊二首上言其一為所惑禍敗即來下言轉入轉迷必將禍至不覺用意可謂反覆深至矣首章最警切又按上篇嘆其不知不見是圖下篇笑其至死不悟南朝此篇亦非楊劉所及南朝偏安江左不思勵精圖治以保其國乃徒事荒淫宋不戒而為齊齊不戒而為梁陳因梁亂而篡取之國勢視前此尤促乃復不戒而甘蹈東昏之覆轍如恐不及且寇警天戒儼然不知安得不滅於隋乎不特此也前此宋齊不過主昏於上江左猶為有人故命雖革而猶能南北分王至陳則君臣荒惑一國俱在醉夢之中長江天塹誰復守之落句深嘆南朝由此終無一豪傑能代興者非特痛惜陳亡也元武湖中玉漏催指宋雞鳴埭口繡襦回指齊誰言瓊樹朝朝見一連誰言不及吐屬殊絞而婉叙致亦錯綜善變敵國軍營漂木柿一連蓋所謂天地人皆以告而王不知戒也此等詩須細味其高情逺識起連便是南朝國勢必為北并况又加之陳叔寶乎二十八字中叙四代興亡全不費力又其餘事也鄠杜馬上念漢書曰人間所謂舊勞於外爰暨小人也曰興罷所謂險阻艱難備嘗之矣民之情僞盡知之矣如是而踐天子位以承天地之眷顧宜有深仁厚德貽億萬無疆之慶乃王伯雜用使漢家之元氣日削再世之後冡嫡屢絶丁傅華軒而王氏得以乘之豈非宣帝之昧於貽厥哉意思深長非一覽可竟渭水天開苑一連言祖宗所傳繼者乃天開地獻之乾坤也同崔八詣藥山訪融禪師縈紆鬱悶四句中無窮曲折聞著明凶問哭寄飛卿腹連言相隔之逺也送崔珏往西川年少因何有旅愁跌宕千里火雲燒益州白公書通州事云四野千重火雲合卜肆至今多寂寞二句年少無愁好好題詩詠玉鈎加好好二字者正見其年少無旅愁也不然首句無著落矣陳後宫定翁云每讀宋初宫體轉嘆此君之不可及也妙在中四句形容得惟日不足此詩極深於作用自覺味在鹹酸之外飲席戲贈同舍左思吳都賦翡翠列巢以重行謝惠連雪賦對庭鵾之雙舞程漸於補注義山詩集引以證珠樹二句則重行雙舞俱有著落西溪第二句便含岑寂意第三句因病廢詩第四句時方喪偶也謔桞上四句寫栁下四句寫謔字字淋漓北禽此詩作於東川義山自北來居幕府故曰北禽以自况也中二連皆憂讒畏譏之意末有羡於雕陵之鵲其為周身之防至矣楚宫落句與鄠杜馬上同一結法韓碑可繼石鼓歌字字古茂句句典雅頌美之體諷刺之遺也行軍司馬智且勇獨提一句帝曰汝度功第一提明晉公功第一以明其詞之非私也古者世稱大手筆四句此等皆波瀾頓銼處不爾便是直頭布袋濡染大筆何淋漓濡作擩離思通首是寫離中之思非單寫離字宿駱氏亭寄懷崔雍崔袞寓情之意全在言外贈歌妓二首下蔡城危莫破顔雋妙寄令狐學士以飛卿投蕭舍人詩相較兩人真相去不啻三十里曉飲豈知金掌迥一連洗發崔嵬二字顧瞻玉堂如在天上流落人間者九關萬里夢不得到而君則曉飲夜吟其中固不啻濁水汚泥清路塵也漫成三首此在桂林幕府思北還也槿花第一首腹連與晉昌李花同哭劉蕡巫咸不下問銜冤以文義論之當作巫陽殆因老杜巫咸不可問之語而娛記六朝人亦有作巫咸者甘泉賦選巫咸兮呌九閽開天庭兮延羣神從來用巫咸者殆因此而訛何曾宋玉解招魂不必將下師友句粘著宋玉說其取義只在作誄招魂四字耳杜司勳高樓風雨感斯文含下傷春短翼差池不及羣含下傷别高樓風雨短翼差池玉溪方自傷春傷别乃彌有感於司勳之文也荆門西下末句楊朱泣路岐下却羡二字正見洞庭之險惡也碧瓦霧唾香難盡霧疑作露酒是蜀城燒燒字押得竒公子歌好惟愁和妙甚只欲家妓擅長惟恐更有和者非公子無此心情也少年封字出韵藥轉風聲偏獵紫蘭叢宋玉風賦獵蕙草社工部蜀中離席起句尤似杜鮑令暉詩人生誰不别恨君早從戎發端奪胎於此一則干戈滿路一則人麗酒濃兩路夾寫出惜别如此結搆真老杜正嫡也詩至此一切起承轉合之法何足以繩之然離席起蜀中結仍是一絲不走也此等詩須合全體觀之不可以一句一字求其工拙荆公只賞他次連猶是皮相隋宫無句不佳三四猶得杜家骨髓前半展拓得開後半發揮得足真大手筆發端先言其虛關中以授他人便已呼起第三句著玉璽一聯直說出狂王抵死不悟方見江都之禍非出於偶然不幸後半諷刺更覺有力二月二日兩路相形夾寫出憶歸精神合通首反覆咀咏之其情味自出隋宫籌筆驛重有感隋師東諸篇得老杜之髓矣如此篇與蜀中離席尤是莊子所云善者機前半逼出憶歸如此濃至却使人不覺所謂國風好色而不淫也其神似老杜處在作用不在氣調東風日暖聞吹笙即溫詩並起别離恨似聞歌吹喧之意新灘莫悟遊人意二句同一江上行也耳目所接萬物皆爽不免引動歸思及憶歸不得則江上灘聲頓有凄凄風雨之意筆墨至此字字化工杜荀鶴詩云此時晴景愁於雨是處鶯聲苦似蟬落句當以此意求之籌筆驛議論固髙尤當觀其抑揚頓挫處使人一唱三嘆轉有餘味不離承祚舊論却非承祚本意讀書論世真難事猿鳥猶疑畏簡書二句一揚簡書切籌筆儲胥切驛徒令上將揮神筆二句一抑破題來勢極重妙在次聫接得矯健不覺其板管樂有才終不沗此句又揚關張無命欲何如此句又抑他年錦里經祠廟對驛字梁父吟成恨有餘對籌筆武侯廟古柏葉凋湘燕雨一聫發古字偏壯麗即日一嵗之花遽休一日之光遽暮真所謂刻意傷春者也金鞍忽散惆悵獨歸泥醉無從排悶不得其强裁此詩真有歌與泣俱者矣觀江間之文疑亦在東川時所作五六言并不使我稍得淹留也落句言風光易過不醉無以遣懷然使我更醉誰家乎無聊之甚也九成宫雲隨夏后雙龍尾一聫對仗之工楊劉所能也其平平寫去不恤民依之意自見言之無罪聞之足戒則楊劉無此作用按九成宫去京師三百餘里次連用事可謂精切此聫頂避暑吳嶽曉光連翠巘一聫寫九成荔枝盧橘沾恩幸二句紫泥天書只為荔枝盧橘風刺極刻然又不覺少將馮云此詩佳在後半烟波别墅醉一聫似吳叔庠詠史未詳何所指以為思文宗則青海馬句終無著落贈白道者贈一作送無題二首昨夜星辰昨夜風二句定翁云起句妙馮已蒼先生云妙在首二句次連襯貼流麗圓美西崑一世所效義山高處不在此無題四首此等只是艷詩楊孟載說迂繆穿鑿風雅之賊也第二首颯颯東風細雨來風作南芙蓉塘外有輕雷長門賦雷隱隱而響起兮聲似君之車音桂林路中作村小一聫確是題位無題莫近彈碁局二句似借用王丞相以腹尉彈碁局事蝶三首初來小苑中首此必所咏之人小字為蝶非必賦蝶也長眉壽陽二首應作無題無題二首八嵗偷照鏡首為少年熱中干進者發慨懸知猶未嫁猶字對上已字妙王十二兄與畏之員外相訪見招小飲時豫以悼亡日近不去因寄更無人處簾垂地二句指悼亡嵇氏幼男猶可憫二句兒女滿前身兼內外之事欲片時宴飲亦復不可然則此懷豈能遣也萬里西風夜正長西風加萬里夜長加正字皆極寫鰥鰥不寐之情隋宫九重誰省諌書函省作削春風舉國裁宫錦二句借錦帆事㸃化得水陸繹騷民不堪命之狀如在目前落花致光惜花七字意度亦出於此李花第六凑泊栁末二句言不甘凄凉所以望秋先零留贈畏之前四句言居禁中者際㑹清時并不須早霜趣朝淪使府者漂零萬里更加以左川陟險所以一日九回也後四句言通顯不如固已回腸骨肉之間畏之又獨際其盛思咏霓裳豈非雲泥之判乎中禁詞臣尋引領二句引領言可望不可親遂以中禁詞臣之態待至戚同年也梓潼在東川故曰左川歸客郎君下筆驚鸚鵡郎君謂瞻之子冬郎即致光也第二首執政皆其所憾獨一至戚同年在中禁而又不足恃則何異生世不諧作太常妻耶從弟一篇自回腸三字咀味則作者之微情但畏之都不能解或冬郎却曉耳難於明言而托於狎昵之詞此離騷之法也第三首二篇畫出一得意一失意相對情味來讀之可以泣下也無題東風無力百花殘已蒼云第二句畢世接不出按此句言光隂難駐我生行休也夜吟應覺月光寒覺作共碧城三首此以咏其時貴主事唐初公主每自請出家與二教人媟近商隱同時如文安潯陽平恩邵陽永安義昌安康諸主皆先後丐為道士築觀在外史即不言他醜於防間復行召入頗著微詞味詩中蕭史一聫及引用董偃水精盤故事大指已明非止為尋恆閨閣寫艷也說本戊籖第一首女牀無樹不棲鸞鳴女牀之鸞鳥東京賦中所用山海經也第二首鄂君悵望舟中夜注引歌詞云心悅君兮君不知蓋自恨不得為洪崖也對雪二首時欲之東細看其層次集中最卑之格留待行人二月歸反結之東第二首輕於栁絮重於霜言漸積也侵夜可能爭桂魄言連宵也忍寒應欲試梅粧言逹曉也此一聫不過雪月交光梅雪爭春兩事却㸃化得生動如此腸斷斑騅送陸郎以之東收蜂趙后身輕欲倚風移用不得辛未七夕起便翻新出竒壬申七夕日薄不嫣花礙夕字日疑作月玉山戊籖云似為津要之力能薦士者咏非情詞也牡丹飛卿作乃咏花此篇亦無題之流也起連生氣湧出無復用事之迹錦幃初卷衛夫人花翠被猶堆越鄂君葉垂手亂翻雕玉佩葉招腰爭舞鬱金裙花牡丹壓徑復緣溝二句方是牡丹大觀終銷一國破二句方極牡丹身分此富貴之花寒餓人一字來不得鸞鳳戲三島二句牡丹非豪家不極其致窮巷寒餓之士所見不過一兩藂如腹連亦懸想出詠史四句中氣脉何等濶逺北湖南埭水漫漫今人都不了首句為風刺鍾山何處有龍盤盤逰不戒則形勝難憑空令敗亡洊至寫得曲折藴藉一片榆莢散來星斗轉二句伏下後期十一月中旬至扶風界見梅花非時裛裛香十一月素娥惟與月中旬讀任彥升碑不得蕭公作騎兵中書堂裡坐將軍也奈何他不得馬嵬二首第一首末二句言其覺悟之不早也第二首縱橫寬轉亦復諷嘆有味對仗變化生動起聫才如江海老杜云前輩飛騰入餘波綺麗為義山足窺此祕五六倒叙竒特看溫飛卿作便只是長恨歌節要不見些子手眼落句專責明皇識見最高此推本言之也可嘆未詳所指何人趙后樓中赤鳳來后作氏宓妃愁坐芝田館二句言宓妃之事猶較此為未甚所以深嘆之也詩固工妙但一首中五人名未免獺祭之病富平少侯此詩刺敬宗漢成帝自稱富平侯家人三四言多非望之濫恩反靳不費之近澤已蒼云猶諺所謂當著不著當關不報侵晨客不一作莫按作莫字方是少侯之意作不字只是閽人拒客耳曉起擬杯當曉起起作氣呵鏡可微寒可作有隔箔山櫻熟熟作發離亭賦得折楊栁二首人世死前惟有别驚心動魄一字千金宫妓定翁云此詩是刺也唐時宫禁不嚴託意偃師之假人刺其相招不忍斥言真微詞也瑶池此首及王母祠王母廟兩篇皆刺武宗也義門讀書記卷五十七

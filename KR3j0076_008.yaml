body:
  text: 義門讀書記卷八翰林院侍讀學士何焯撰詩經小雅鹿鳴之什常棣二章言他日族葬于原隰之間惟此兄弟也六章具字不必說到生死唐王維詩遙知兄弟登髙處遍插茱萸少一人可與此詩對看伐木此與上常棣篇疑皆周公作安溪先生謂二詩實相首尾有伐木而常棣之義益明二章箋云此言許者伐木許許之人上許字作前南陔序方勺曰陔何以有戒意據周官祴夏儀禮作陔夏則陔通于祴且辰窮于亥是戒之時也南有嘉魚之什南有嘉魚序太平君子平下脫一之字蓼蕭四章鞗革沖沖沖作忡六月五章至于太原太原先儒無明文其即書之所謂原隰乎亭林說得之采芑三章􅀈彼飛隼􅀈作鴥車攻二章傳田者大芟草以為防芟作艾吉日四章箋酌而醴羣臣醴作飲鴻鴈之什沔水首章􅀈彼飛隼􅀈作鴥下同鶴鳴首章魚潛在淵二句箋云此言魚之性寒則逃于淵溫則見于渚喻賢者世亂則隱治平則出按如箋云次章何以復有變文當從毛傳良魚在淵小魚在渚之說為長白駒安溪先生云此勸隱之詩也賢者之去同僚惜之故欲縶維朝夕而喜其賁然相顧然又决之曰行也使爾為公為侯則憂深責重暇豫未有期矣優游者猶豫遲回之意言不必優游而可以勉决其遁思士大夫勇于去如此其時勢可知矣末章望其音問常通則朋友之情也斯干三章君子攸芋箋云芋當作幠按集韵幠芋同一字六章箋云乃鋪席與羣臣安燕為歡以落之落别本作樂按落字近之然釋文有樂字八章家室君王家室作室家箋宣王將生之子將作所九章箋云紡磚習其一有所事也一作所所字衍無羊四章牧人乃夢言牛羊息而牧人乃就寢矣節南山之什節南山四章勿罔君子箋云勿當作末按此本又誤刋為未下同正義云末略欺罔正月十章箋云終是用踰度陷絶之險女不曾以是為意乎是用作用是不曾作曾不十月之交首章朔月辛卯月近刻作日者非說見學齊呫嗶及魏了翁正朔考四章家伯冡宰冡作維箋云冡宰掌建邦之六典按先鄭注周禮以宰為宰夫者得之若冡宰不應敘司徒下也小旻四章箋云爭言之異者爭下脫一近字五章箋云王之為政者者作當去聲小宛首章安溪先生云鳩一生九子以為兄弟之喻鳩飛戾天喻人能自奮也故思念父母其心憂耿逹於明發守身之志决矣二章惡㫖酒者以顧養也畏天命者子之翼也三章四章中原之菽蕃其種也蜾螺之子肖其類也草木昆蟲猶有種類人受教誨于父母而不以善似之可乎此所以日月征邁以求無忝此兩章申有懷二人之意四章題彼脊令箋云不有止息有作肯五章六章桑扈而啄粟填寡而岸獄民物失所甚矣當此之時何以修身而避咎乎溫溫矣而惴惴惴惴矣而戰戰兢兢惕彌深矣集木矣而臨谷臨谷矣而履冰危彌至也此其所以守身而庶幾其不辱親也此兩章申各敬爾儀之意小辨五章此比王不恤后與太子將自同無枝之壞木而猶莫知悔悟徒有他人為之憂也七章析薪柂矣杝作扡箋不欲妄挫折之挫折麻沙本挫析八章傳有越人于此關弓而射之之作我巧言首章亂如此憮憮作幠下同六章箋云言力勇者謂易誅除也言下脫一無字既微且􅂒􅂒作腫何人斯首章維暴之云維誤誰二章言從行唯我與汝非女誰為之也巷伯二章傳縮屋而繼之縮廖本摍疏云謂抽也七章箋云以言此讒人欲譖大臣大臣起下君子谷風之什蓼莪首章蓼蓼長大則䝉長育者深矣乃匪莪而蒿匪莪而蔚豈不辜負天地以興子之不才辜負父母之生長也箋莪已蓼蓼長大貌視之以為非莪故謂之蒿貌作我故作反三章瓶受酒于罍瓶罄則罍恥子受身於父母子無善可稱則為父母之羞故寡德之民其生也不如死五章六章末二句有自責之意非徒遭亂自傷而已大東序談在濟南平陵縣西南去周京二千餘里録東人之詩則天下無不困于勞役可知也箋謂言其政偏蓋未盡得經意三章穫而為薪已失其生理矣况忍加之浸乎四章箋云舟當作周裘當作求聲相近故也按以周為舟乃廋詞也欲言之無罪耳五章箋從旦莫七辰一移因謂之七襄旦下脫一至字辰下叠一辰字七章傳翕如也如作合四月八章箋此言草木尚各得其所尚作生小明首章明明上天即後二章神之聽之之根脈非但人窮則呼天也四章五章彼共人爾君子皆作詩者自謂也無恆安處憚毒皆安于命也靖共爾位憂畏惟一于義也神聽而式榖則天之所相罪罟譴怒亦可以不至矣自勵亦以自釋也箋是使聽天乎命乎作任鐘鼓四章傳南夷之樂曰南下南字近刻任者非楚茨三章笑語卒獲安溪先生云笑語卒獲即禮思其笑語之意祭之時如在其上也四章箋云祝遍取黍稷牢肉魚擩于醢以授尸四句分解齊稷匡敕四字信南山三章疆埸翼翼張晏漢書注至此易主故曰易四章箋云獻瓜菹于先祖者順孝子之心也順字衍甫田之什甫田我取其陳傳尊者食新上農夫食陳上字從渠陽雜鈔增廖本有上字箋云倉廩有餘云云鄭箋即社倉出陳易新之法所本大田四章甫田之來止春遊而省耕也大田之來止秋豫而省斂也鴛鴦三章乘馬在廄廏誤廄下同頍辨三章如彼雨雪二句言衰端先見也賔之初筵三章傳屢敗也敗作數廖下無也字魚藻之什采菽首章箋王饗賔客有生俎生作牛角弓二章箋則天下之人皆知之知作如六章箋若教使其為之必也之必作必能都人士三章我心苑結苑作菀瓠葉序棄禮不行則無以懷諸侯此戎狄所以叛也首章箋飲食而曰嘗者食作酒漸漸之石序東征久役京師內虛于是申戎之難作矣役久病在外在作於三章安溪先生云豕皆能涉水者也今且見其蹢則澤涸可知故月離畢而望其滂沱而下也俾字乃欲雨之詞大雅文王之什文王二章陳錫哉周侯文王孫子毛以侯字屬下句鄭則以陳錫哉周侯五字為句不顯亦世傳世者世祿也上世字作仕七章上天之載四句民心悅則天意得矣大明六章傳維行太任之德焉維作能綿首章自土沮漆土漢書作杜齊詩也未有家室亦禮運篇昔者先王未有宮室冬則居營窟夏則居橧巢之意與下築室于兹相對毛傳論髙而非詩人之意三章箋雖有性苦者甘如飴也者下脫一皆字七章宗廟社稷朝市煥然皆新流離播遷之日規模宏逺如此所以能創業垂統也旱麓安溪先生云豈弟之實作人是也物各從其類而君子善類之宗故韓子曰志同而氣合魚川泳而鳥雲飛也此豈弟之實也思齊二章箋云無是痛傷下脫其所為者四字按沿革例云建大字本有此四字皇矣首章箋赫然甚明明下脫一以字上帝耆之傳耆老也老作惡因下箋云而誤五章楚詞惜誦云駭遽以離心兮又何以為此伴也同極而異路兮又何以為此援也畔援之義蓋如之文王有聲三章傳淢城溝也城作成下大小適與城偶之城亦作成生民之什生民首章履帝武當從鄭箋不然則下二章反逺于人情矣三章誕置之隘巷二句傳故承天意而異之于天下按此說過迂鳥乃去矣二句人往收取鳥乃去也傳言于是知有天異則上云承天意者失詩之本義矣四章藝之荏菽傳荏菽戎也戎下脫一菽字七章釋之叟叟釋作釋下同八章于豆于登登作登行葦四章箋薦之禮非葅則醓醢也非作韭既醉首章箋天又助女以大德德作福三章箋天既與以光明之道與作助公尸嘉告公尸先公之尸也皇尸先王之尸也言公尸者舉逺以該近七章箋使祿福天下祿福作録臨公劉序箋云反歸之成王反作及四章箋與羣臣士大夫飲酒以樂之樂作落六章箋止基作宮室之功也也作止卷阿二章傳女則得伴奐而優自休息也優下脫一游字六章如圭如璋圭作圭七章箋亦與衆鳥也與作亦九章傳出東門曰朝陽出作山民勞首章以定我王箋言我者同姓親也今人皆不知我字之義板三章箋及忠告以善道及作欲蕩之什蕩八章殷鑒不逺二句示厲王當以殷為鑒也抑序閻若璩云案衛武公以宣王十六年己丑即位上距厲王流彘之年已三十載安有刺厲王之詩或曰追刺尤非虐君見在始得出詞其人已逝即當杜口是也序云刺厲王非也四章灑掃庭內庭作廷箋云不涖政事涖作恤七章上言恭下言敬所謂抑抑威儀也八章不忮不求何用不臧出于上之化下亦猶之不僭不賊鮮不為則也箋云童羊譬皇后也皇作王九章箋二者竟不同竟作意十一章匪為用教為用作用為十二章箋不及逺也維近耳不及作乃不桑柔二章民靡有黎黎民黑髮之人言壯丁俱盡也六章好是稼穡釋文云家王申毛音駕謂耕稼也鄭作家謂居家也下稼穡維寶句同穡本亦作嗇王申毛謂收穡也鄭云吝嗇也尋鄭家嗇二字本皆無禾下稼穡卒癢始從禾按此則此章稼穡二字皆當作家嗇十四章豫豈不知而作箋而與也與作女雲漢序宣王之詩首之以雲漢者畏天勤民省躬厲治為中興之本也首章寧莫我聽箋曾無聽聆我之精神而興雲雨神作誠二章寧丁我躬言寧使己身獨當其災也三章靡有孑遺箋幸其餘無有孑遺者幸作今六章祈年以下言自此庶幾改過遷善敬事羣神勿以怒我之故致民被其災也嵩髙序陳君舉曰宣王中興亦只理㑹牧伯而已故韓侯在韓召虎在淮申伯在荆方叔在齊按方叔山甫之誤首章商頌亦曰降豫卿士即書所謂命于帝廷者也三章傅御傳所云近之五章往近王舅近作䢋按說文䢋在丌部與近非一字廖木作䢋蒸民三章傳喉舌冡宰也惟冡宰得稱喉舌韓奕序箋云為國之鎮所望祀焉所作祈首章韓侯受命箋韓侯受王命為諸侯諸侯作侯伯五章有貓有虎禮有貓虎之祭似即指食田鼠者言之六章溥彼韓城二句韓燕當如王子雍之說兼据水經注王錫韓侯四句服蠻荆而定申伯伐玁狁而錫韓侯於是南夷不得與北狄交山甫城東方召虎平淮夷其聲勢又足以相應三面底寧西京復見成康之盛矣江漢三章曰至于南海則五嶺之外固嘗臣服建置于周矣東遷而後南風日競隔限不通史失其傳秦人夸詐遂謂蜀與越地皆至秦始開耳常武二章安溪先生云皇父為大司馬程伯休父則小司馬也召旻二章蟊賊內訌箋爭訟相陷人之言也人作入六章頻以喻政中以喻德周頌清廟之什維天之命序周顛告太平之語出于此維清肇禋箋始祭天而枝伐也枝作征烈文安溪先生云此祫祭之詩辟公則先公也維王則太王王季也執競序執競其敬十四字皆釋文誤刋為箋臣工之什臣工安溪先生云此與下篇以嗟嗟噫嘻發端蓋稼穡艱難故重其詞也亦又何求箋云時歸當何求于民時作女噫嘻箋云使民疾耕發其私田下脫竟三十里者言一部一吏主之于是民大事耕其私田草一字豐年傳廩所以藏齍盛之穗也按此則廩與倉異潛傳潛槮也魚冬負冰故曰潛不當解為魚具箋鰋鮎也古人以鮎薦獻閔豫小子之什小毖成王因祿父三監之亂懲創悔禍卒能守成故歌以祀之也良耜其鎛斯趙吳斗南云莊周書銚耨于是乎始修詩庤乃錢鎛又其鎛斯趙毛謂錢為銚鎛為耨銚與鎛相須為用者故詩人言鎛必以是兼之疑古銚趙通以開百室箋云百室一族也又云一族同時納穀親親也云云按族譜序何以無引此者豈緣疏中引四閭為族耶魯頌有駜首章箋云此喻僖公之用臣云云說文駜馬飽也泮水序明其為頌魯公也諸侯能究宣王化則頌魯即所以頌周焉耳其辭也繁與周頌之體異或追作于僖公時歟若以為頌僖公能修復泮宮則詩中未嘗一言及修復也首章從公于邁箋于行邁行也上行字作往七章式固爾猶箋謀為度己之德為作謂閟宮魯不當立姜嫄之廟僖公又不得攘服楚之功如是而侈然頌之孔子奚取焉曰此頌之變也風有變風雅有變雅頌獨無變乎美盛德之形容而不誠録其美即寄其刺也若小毖者其亦周頌之變乎三章莊公之子公羊之說曰臣子一例特謂其尊卑不復變僖雖閔之庶兄生為之臣死不得而先之耳非僖當為閔後也此詩云莊公之子夫子取之八章居常與許箋周公有常邑許許田未聞也作周公有嘗邑所由未聞也按此條廖本最善商頌長發首章幅隕既長箋隕當作圜誤作圓下同三章昭假遲遲箋天命是故愛敬之也命作用六章武王載斾箋勇敢不懼敢作毅七章有震且業箋畏吾之震吾作君殷武序幽厲傷之周轍以東降為國風雅頌聲寢以殷武終眷眷思有如髙宗者出也義門讀書記卷八

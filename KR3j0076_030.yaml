body:
  text: 義門讀書記卷三十翰林院侍讀學士何焯撰昌黎集賦詩感二鳥賦序光耀如此注此下諸本有可以人而不如鳥乎一句按觀後云庶無羡于斯類則此句乃妄人謬贅也篇末注載歐陽文忠讀李習之幽懷賦一段公自云庶無羡于斯類歐陽子豈讀之未終耶復志賦公在汴當董公之衰暮遠猶深慮有所未入欲去之而耕野懼食其祿而與其難故為此賦以自訟也退將遁而窮居此句是志孰與不食而髙翔此句是復閔己賦題注採朝無咎嘗取此賦云云按閔己不得聖人而師之何謂自傷不遇也朝氏於文義可謂滅裂别知賦索微言於亂志六句此敘一時與楊往復之樂公處遷逐所以自樂者用此故非同儕任達者所能及也知來者之不可以數二句懼仁而不能守所以惜陰而感歎于離羣也元和聖德詩掉棄兵革私習簋簠二句鎖上起下琴操十首劉向别録云君子因雅琴之適故從容以致思焉其道閉塞悲愁而作者名其曲曰操言遇災害不失其操也十篇皆得不失其操本意龜山操末句所謂公伯寮其如命何越裳操孰荒于門二句言必內治而後外服亦所謂不泄邇不忘遠也拘幽操篇末注引徐仲車凱風云云按仲車可謂善道文章體源殘形操未得其首蓋歎明王不作也謝自然詩阮公詠懷云王子十五年遊衍伊洛濵朱顔茂春華辨慧懷淸真焉見浮邱公舉手謝時人輕蕩易恍惚飄颻棄其身飛飛鳴且翔揮翼且酸辛退之此篇蓋從之出唐書藝文志李堅東極真人傳一卷注果州謝自然安溪先生云世固有仙道自韓子言之則皆鬼魅所為也信乎曰其入於鬼魅者多矣故首曰凝心感魑魅後曰木石生怪變狐狸騁妖患而中敘其升舉之候風寒幽晦則非休徴可知然韓子本意雖視仙道猶鬼道也故曰莫能盡性命安得更長延其記夢云安能從汝巢神山則直謂世無仙道但窟宅巖崖羣彼異物耳韓子之距邪也嚴故於仙佛皆以鳥獸號之若朱子感興二詩則探其本原之論也秋懷詩十一首第一首悲哉秋之為氣也草木搖落而變衰發端祖此胡為浪自苦二句反結放開第二首墻草蟀蟋又得氣之偏者言物亦各適其時非必以草木之榮悴生感也第三首學堂日無事此詩蓋博士時作丈夫意有在二句志士悲秋不同思女傷春我特以時易失而志難行耳豈歎老哉第四首泬寥兮天髙而氣淸寂寥兮收潦而水淸是首所祖原本前哲却句句直書即目所以為至淸曉卷書坐以下不但去所憎霏開水澄尤秋之可喜也末又因不得手攬蛟龍觸動所懷此固丈夫之猛志奈何為一博士束縛也第五首發端即虛喝下二句悼前猛應攬蛟龍就新懦仍歸於閲史書第六首尚須勉其頑二句仍不能終于幽屏與前首結句反對第七首我無汲汲志二句正言若反低心逐時趨承上塵埃慵伺候文字浪馳騁言之苦勉秖能暫應上章勉字一縱不可纜應頑字豈必求贏餘二句史書之味無窮朝請之求有限何必以人之營營易己之汲汲也第八首君不知兮可奈何蓄怨兮積思心煩憺兮忘食事願一見兮道余意君之心兮與余異詩意似本於此我之所以誦詩讀書者豈惟空言無施之為哉學古之文期於行古之道日月逾邁事業之有無不可知前日變衰者今已搖落矣安得不後顧無窮愴然興懷也第九首白露既下百草兮奄離披此梧楸王逸謂以茂美樹興於仁賢早遇霜露故此篇復獨以梧桐起興也下半篇亦從仰明月而太息兮步列星而極明意變化而出望舒霣其團卿士惟月此篇必有所指靑𡨕無依倚二句豈不髙明或以孤立難安亦公自比也驚心動魄之句憂愁費晷景至末言君自憂愁日月自飛行不顧晷景空費迷復轉賒望舒司御從此果為君駐鞍安驅乎第十首此又自堅其志不欲有所依倚也第十一首菊有黃華則九秋矣故秋懷以是終也西風蟄龍蛇二句蟄龍蛇或自謂一云即賦衆木之凋其枝幹如龍蛇之蟄也乃倒裝句法由來命分爾二句歸之於命言盛衰不足道及時進德修業則有死而不亡者存矣赴江陵途中寄贈三學士早知大理官二句注東漢楊賜云云按此太遠太大不獨漢儒謬于經意峨冠進鴻疇謂鴻範九疇重雲李觀疾贈之安溪云此詩言生憂世之志雖可貴而非職所當今日貧賤如此茍富貴當何如乎有以獨樂而知天命則不以嵗寒改柯易葉如髙飛之鳯凰覽德暉而來下也江漢答孟郊發端疊下四喻極繾綣之致詩亦突過黃初此日足可惜贈張籍捨酒去相語注去方作須按須字是所以飲酒不樂者乃亟待張之至也去字真無理爾詩卬須我友有根易為長少有所知便是根也兒童畏雷電二句韓蘇詩病竊喜復竊笑二竊字暗與衆夫指笑對照驚波暗合沓四句非履涉江湖不知其真臨泉窺鬪龍只此句用一故實趂韻非當時情理閉門讀書史二句驚魂初復不覺及秋二語神助晨坐達五更謂自五更起坐達晨也本老杜午時起坐自天明來百嵗如風狂結歸此日可惜醉後人生如此少二句正言若反醉贈張祕書軒鶴避雞羣避當作辟言軒鶴一至雞羣辟易也猶孟子行辟人之辟與上驚俗語意相類也所以欲得酒八句穿作一事長安衆富兒六句此耳不聞志也不解文字飲詩瓠葉君子有酒箋云此君子謂庶人之有賢行者也其農功畢乃為酒漿以合朋友習禮講道藝也公詩文字飲本此險語破鬼膽四句對上文字三君之為文上既言之此四語乃終及余各能文之意筆勢錯綜不見其誇然於公實不愧也吾徒幸無事二句對上飲字送靈師得母太冗耕桑日失𨽻二句耕桑頂齊民來朝署頂髙士來瞿唐五六月至冒涉道轉延此段見不獨有才調且兼膽勇乘寒恣窺緣嶺外山川惟天寒乃可經尋縣齋有懷發端兩連領起全篇為綱事業窺臯稷二句此二語於公不為夸但意盡於詞無餘味爾身將老寂寞二句已為結處伏脈風雨靈臺夜謂調四門博士也後漢書注第五頡洛陽無主人鄉里無田宅客止靈臺中或十日不炊然公詩似非用此雖陪彤庭臣謂除監察御史惟思滌瑕垢至末事業文章竒偉之實嫌小人儒而不為者也蹉跎摧折悲吒之由今將不得為大人之事行以學稼終所謂悼本志之變化者也後半故謬其詞公豈有樂乎此哉合江亭舊刻五百家注韓集獨此詩三處有箋云疑舊有之注家削去宇文炫又增其制句而私前後二處為已有絶可笑維昔經營初二句箋云故相齊映所作老郎來何暮二句箋云宇文炫又增其制中丞黜凶邪四句箋云前刺史元澄無政亷使楊中丞奏黜之朝廷遂用鄒君陪杜侍御遊湘西兩寺獨宿有題一首因獻楊常侍長沙千里平考異附載云洽嘗至長沙登嶽麓寺見相識云千當作十蓋後人誤增也州城方十里坦然而平湘西嶽麓寺乃獨髙處下視城中故云長沙十里平勝地猶在險寺中道鄉亭觀之信然此朱先生及方氏所未及漫志以偹考訂深林髙玲瓏二句斗起幸逢車馬歸入獨宿靜思屈原沈八句此四連係之夢魔便可味珥貂藩維重楊常侍嶽陽樓别竇司直注劉禹錫有和篇按劉詩見外集炎風日搜攪只賦其大便是死句借風形容因為比興朝過宜春口宜春口未詳注以宜春郡當之謬甚餘瀾怒不已歸到風上飛廉戢其威二句此連是詩中轉關生出下半江豚時出戲風之餘憐我竄逐歸伏後追思南渡一段此下皆賦淸宴之意此禍最無妄不説人以無罪姦猜畏彈射一連退之出官頗猜劉栁泄其情于韋王乃此詩即以示劉令其屬和母乃強直而疏淺乎或者竇庠語次深明劉桞之不然勸其因倡和以兩釋疑猜而劉亦忍詬以自明也嚴程迫風帆關合送文暢師北遊未免以好用險韻減其自然之美酒場舞閨妹六句數語甚鄙恐反為聰明識道理者所笑也答張徹以強韻為工肝膽一古劍一連二句一鎖碧流滴瓏玲甘泉賦和氏瓏玲薦士中間數鮑謝謝自謂康樂若元暉則齊人矣衆作等蟬噪蟬噪對三百篇言之也有窮者孟郊窮字貫注後半行身踐規矩二連古來才子或多文而薄於行不可薦之天子若郊之方正誠篤如此二公又何所疑難不亟進言於上也五十幾何耄此句貫注不汲汲而後時悔懊一連悠悠我之思四句若必待已得者而後進郊則恐後時矣故以此責望二公亦詩人忠厚之至也鶴翎不天生二句謂東野之待薦通波非難圖謂二公尺地易可漕地疑作池此句自謂喜侯喜至贈張籍張徹常思得遊處直貫注結句水鏡涵石劍此謂山水清峭可喜人生但如此二句收得不費力虛含有味古風平準書楊可告緡杜周治之於是商賈中家以上大率破民偷甘食好衣不事畜藏之産業托之方鎮以覺在上者也幸時不用兵蓋以兵方自此不解正言若反也駑驥此詩太直汴州亂二首前傷無伯後傷無王山石直書即目無意求工而文自至一變謝家模範之迹如畫家之有荆關也淸月出嶺光入扉從晦中轉到明出入髙下窮煙霏窮煙霏三字是山中平明真景從明中仍帶晦都是雨後興象又即發端犖確黃昏二句中所包縕也當流赤足踏澗石二句顧雨足鳴雁違憂懷惠性匪他二句注惠一作息按息字長二語促在一處忠厚明快兩得其妙雉帶箭紅翎白鏃隨傾斜帶字醒桃源圖神仙有無何眇芒眇芒言其細已甚也若作渺茫與荒唐重復架巖鑿谷開宫室以下事既流傳已熟又所賦者圖不須更著此鋪敘此詩在韓子非得意者世俗寧知偽與真二句中極鋪張則似有似真矣章法蓋未甚密武陵人三字并太守皆收在內贈侯喜一名始得紅顔衰注採續仙傳藍采和云云按此人在韓公後百年何得引注公詩八月十五夜贈張功曹未免捶楚塵埃間隋文帝以所在屬官不敬憚其上開皇十七年三月壬辰詔諸司論屬官罪有律輕情重者聽於律外斟酌決杖於是上下相驅迭行捶楚唐蓋沿隋俗也謁衡嶽廟遂宿嶽寺題門樓我來正逄秋雨節頂上雲霧豈非正直能感通正直謂嶽神左傳神聰明正直而一者也注引詩者誤紫蓋連延接天柱頂上絶頂松柏一徑趍靈宫頂上窮字星月掩映雲朣朧顧陰晦杲杲寒日生於東反照陰氣永貞行一朝奪印付私黨叔文欲奪中人兵柄還之天子此事未可因其人而厚非之下文九錫天位等語直欲坐之以反公於是乎失大人長者之度矣董賢三公誰復惜四句二連過矣有傷詩教具書目見非妄徴二句具書目見亦有君來路吾歸路之意非長者言也末句言將來朝士咸宜以數子既往之事懲躁進也李有花贈張十一署君知此處花何似插入張復作體物語勢有斷續語有關鍵力擕一尊獨就醉注獨或作共非是按寒食日出遊篇云李花初發君始病杏花此篇真怨而不怒矣若在京國情何窮應曲江滿園不可到明年更發應更好安知明年不仍在江陵京國真不可到矣落句正悲之至也即從飄泊二字生下凄絶語出以平淡感春四首四愁十八拍之間而筆力逾健第二首不到聖處寧非癡此聖字用徐邈中聖人之語注謂傷其違聖之達節者非寒食日出遊曷不薦賢陛下聖句法竒健有月莫愁當火令注東坡嘗為李公擇書此詩作燈火冷考異以坡讀為誤按燈火冷亦禁火之意兩本字不同坡固未誤讀也憶昨行和張十一從此直至耉與鮐反對數日劉生詩往取將相酬恩讎雖因其人而言之然公之生平於恩讎二字耿耿不忘亦心病之形於聲詩者也魯頌所以尚乎克廣德心也哉遊靑龍寺贈崔大補闕炎官張傘金烏啄卵宋人學竒者多矣不能到得後半情味則徒餘惡靣目也躑躅成山開不算不算即無數之意惻耳酸腸難濯浣亭林云是用詩如匪浣衣須知節候即風寒二句安溪謂韓子七言古詩此篇第一尤佳處則在此二句真能隨遇而安也贈崔立之評事有似黃金擲虛牝文選注大戴禮邱陵為牡溪谷為牝枚臯即召窮且忍獨以枚臯比崔為其敏捷也送區宏南歸溫柔敦厚聲如厥志愔愔藹藹所謂伯牙之琴絃乎氣味出于平子思元賦中邊皆甜穆昔南征軍不歸六句與送廖道士序同意觀以彜訓或從違伏後業字落以斧引以纆徽注引張文潛云云按漢鐃歌上邪篇云山無陵江水為竭又汝南童謡云飯我豆食羮芋魁其句脈皆上三字略斷韓子必有本也雖有不逮驅騑騑伏後勤字服役不辱言不譏伏後苦字雖不敕還情庶幾三百篇語妙行行正直慎脂韋伏下志字王道正直即上彝訓歸宿也陸渾山火劉石齡云易説卦離為火其於人也為大腹故以頽胸垤腹擬諸形容又形幢紫纛日轂霞車虹靷豹鞬電光頳目等字亦從為日為電為甲胄為兵戈句化出造語必有依據也新竹小詩自佳日日成淸閟淸閟閣本此黃苞猶掩翠筍添落齒擬止酒詩和虞部盧四酬翰林錢七赤藤杖歌幾重包裹自題署二句似與途經百國二句微礙送侯參謀赴河中幕乖離坐難憑學省官亦是分司乖離獨指繼之去耳東都遇春謀謨收禹績注左茫茫禹迹畫為九州作績恐非按商頌天命多辟設都於禹之績嵗事來辟勿豫禍適稼穡匪懈公詩用此爾鄭箋謂時楚不修諸侯之職此所用告曉楚之義也禹平水土弼成五服而諸侯之國定是以云然感春五首第五首將衰正盛須頻來將衰正盛名理亦筆語俱妙燕河南府秀才得體此都自周公四句安得此才陰風攪短日二句曲折頓挫送湖南李正字歸字字妙招揚之罘一首柏生兩石間十二句此即董子常玉不瑑不成文章君子不學不成其德指趣囂譁所不及二句不應計出柏馬之下或者思山中間曠爾復以此解而招之其用心也苦矣寄盧同猶上虛空跨緑駬注引郭璞注穆天子傳云云按馬亦有黃耳事更遣長鬚致雙鯉以致書反應下狀送無本師歸范陽勉率吐歌詩二句結語恰好便有味石鼓歌辭嚴義密讀難曉文章只一句點過專論字體得之年深豈免有缺畫二句橫插此二句勢不直陋儒編詩不收入四句此劉彥和所謂夸飾然在此題詩反成病纍聖恩若許留太學元人緣公此詩乃置石鼓於太學然公之在唐嘗為祭酒竟不暇自實斯言何獨切責于中朝大官哉羲之俗書趂姿媚對籀文言之乃俗書耳麈史之云愚且妄矣雙鳥詩柳説迂鑿葛説近之三千謂夏秋冬三時也紛紛致疑總不曉詞人夸飾之體耳聽頴師彈琴按李賀亦有聽頴師琴歌中云笠僧前立當吾門梵宫真相眉稜尊頴師蓋僧也題注載六一居士以為此秖是琵琶云云按必非歐公語又吳僧義海并洪慶善云云按義海之云固為膚受洪氏所載則此數聲者凡琴工皆能昌黎何至聞所不聞哉失勢一落千丈強與厯聲尤不肖真妄論也已卯十一月留淸苑行臺聽李世得彈琴出此詩共評記所得於世得者如此余不知琴請世得為余作此數聲求以詩意乃深信或者之妄唐賢詩不易讀也後又與世得讀馮定遠贈單曾傳詩有他人一半是筝聲之句世得云此老亦不知琴法從册子得此語耳琴中固偹有筝琶之聲但不流宕非古樂真可臥也并記之贈張籍吾老著讀書東方朔客難著於竹帛唇腐齒落服膺而不失此著字所本也我身蹈邱軻二句安溪云蹈道何以便須早綰爵位此等與病中贈張籍末數行皆可謂直而無禮也盧郎中雲夫寄示送盤谷子詩兩章歌以和之題注載東坡謂此詩不減子美按此詩頗近太白病中贈張十八中虛得暴下以此為發端自是纍句扶几導之言以下此篇波瀾起伏分明從管公明與諸葛景春往復變化來但不師其辭耳傾樽與斟酌四句夾此乃頓挫東流水淙淙應派别失大江雜詩體源太白要自有公之胸次介甫多學此也寄崔二十六立之詩騷之裔西城員外丞員外置之丞立之雖為藍田丞西城則非謂藍田也注誤不將勢力隨暗伏巢中鷇回首卿相位二句反呼不脫吏部選童稚見稱説十句波瀾頓挫處由來人間事至那用分高卑九辨願自往而徑遊兮路壅絶而不通欲循途而平驅兮又未知其所從然中路而迷惑兮自壓鞍而學誦性愚陋以褊淺兮信未達乎從容篇中意本於此而碩大寬平過之憐我還好古好古二字文書傳道之源又論諸毛功蜀志張裕傳諸毛繞涿居巧能喻其誠正與鯨以興君身八句相對朋交日凋謝一連此二句即為幾輩先騰馳起本文字鋭氣在二句回顧戰藝其下二句即為後贈􅊦以益其誠引脈亦且含思其盛見其衰意我雖未耋老以下數句皆從盛衰意生出燕席謝不詣四句極自狀其衰却又已為傳道起本且吾聞之師以下此則擺掉而出於盛衰之外觀名以計則向之逐利者固未必利何摧戚之有哉從吾所好而已觀名計之利莊子盜跖篇子張問於滿茍得曰觀之名計之利而義真是也不辨薋菉葹薋菉惡草自謂歡華之徒也鯨以興君身以下數句將前半命與道意收攝照應不遺結句只從酒􅊦直收使人不能尋其起伏之迹月蝕詩效玉川子作題注引陳齊之云云按盧詩過於流宕但亦有刪節太多近於暗者完完上天東注古書完多誤作貌此又轉寫為貌耳按黃庭經孔子廟堂碑完皆為貌此下體貌蝕字似應稍存盧語一二連堯呼大水浸十日以下日月二字較盧詩脫卸淸丁寧附耳莫漏泄附耳星名此外內外官以下此處極裁翦省淨但列經星不及五緯者五緯非月所行也盡釋衆罪以蛙磔死注方以為譏宦官而考異謂方説恐亦未必然按方説未為不然是年吐突承璀討成德無功而還憲宗不加誅竄此詩蓋嫉宦官之蔽明耳孟生詩應對多差參注引藝苑雌黃云古詩押韻或有語顛倒而理無害者按山谷謂後人讀書少謂韓杜自作此語者善論也雌黃之説非符讀書城南人之能為人二句詩書乃文章根本人之所以不陷於不義者莫不由之也一為馬前卒六句非過卑也子之才質既不髙而為學亦有序姑先以情之最切近者為之勸誡使其子先講求經訓根源則所知日以明道之逺者大者庶不至有凌節苦難之患耳唐人尤重門第能保其祿位守其祭祀則立身行道揚名後世基之矣潭潭府中居漢書陳勝傳沉沉者沉音長含反與潭潭義同宫室深邃貌也金璧雖重寶四句此即暗用黃金滿籝不如一經之意不見公與相二句注閣本作不見公與汝幸免自犁鉏考異謂其謬按閣本語自佳但與上不繫父母之義不屬文章豈不貴八句唐人重進士而薄明經所學者詩賦文章獨韓氏為此學爾曰通古今則讀書并該史學及當代六典開元禮之屬行身一連已略及躬行矣人不通古今二句應人之能為人腹既空虛則所有者襟裾而已行身陷不義二句身不陷於不義身不離於令名皆孝經語豈不旦夕念下文恩字為爾惜居諸下文義字作詩勸躊躇躊躇不前也應前詩書勤乃有病鴟朱公叔與劉伯宗絶交作詩曰北山有鴟不潔其翼飛不定向寢不定息飢則木攬飽則泥伏叨餮貪汙臭腐是食填腸滿嗉嗜欲無極長鳴呼鳯謂鳯無德鳯之所趣與子異域永從此決各自努力公此詩所刺則又加以負恩反覆者也讀皇甫湜公安園池詩書其後春秋書王法二句安溪先生取二句為讀春秋法先生云春秋如書弒君者有稱國稱人者矣而不虞亂臣賊子之逭於討蓋柄國權姦必不以實赴告而有所委罪春秋欲書其實則非仍舊闕疑之義欲從赴告則其漏大惡也深矣故寧不誅其身而存其法如今律嚴殺人未得真犯而立虛案猶足令抵扞者終身亡魄也此類是春秋大義忽自韓公發之殷員外及啖氏三家豈得以其專門驕公哉又按孔叢載孔子之言曰古之聽訟者惡其意不惡其人所謂不誅其人身者似本此意如先生説則與下二句尤貫穿爾不自間至汙穢豈有臧不自間其間窮年枉智思掎托糞壤間糞壤多汙穢豈有臧不臧按增八字出麈史謝説是瀧吏最古自訟兼望後命亦得體譬官居京邑三句東吳語無謂當如注中或作潮州底處所六句頓挫處贈别元十八協律六首頗有陳思老杜之風六詩勝處在多發天然自流肺腑有意於竒者轉無其工耳何氏之從學四句驚心動魄少年當日誦以自警四句乃思其向晚之由或緣此也子兮獨如何四句上二語言協律初非過于蹇蹇下二語言協律亦非深于閉匿别趙子心平而行髙二句兼此者我思其人早赴街西行香贈盧李二中舍人次連似柳惲何遜語晚寄張十八助教周郎博士擘絮磨鎌皆田野事也奉酬盧給事雲夫四兄曲江荷花行見寄并呈上錢七兄閣老張十八助教風韻佳走馬來看立不正與婆娑反示兒詩以示兒曹二句注載考異云云按峩冠講唐虞考評道精粗則猶行道憂世之為也姑以其外焉者誘進小兒曹耳和李相公攝事南郊覽物興懷呈一二知舊惟彼顛瞑者二句上即其所明而進之下乃窺其所短而諷之也勿憚吐捉勤二句宰相能為人主得人斯可以對越上帝暗收攝事南郊意極深厚和裴僕射相公假山十一韻晉會稽王道子嬖人趙牙為道子開東第築山穿池功用巨萬孝武帝常幸其第謂道子曰府內有山甚善然修飾太過帝去道子謂牙曰上知山是人力所為爾必死矣道子帝弟相王當時築一假山尚以為異事至齊而武陵王自怨貧薄名後堂山曰首陽山池由此遂盛國用人力盡費于園囿自唐至今視為常事矣雖賢如裴韓賦詩相誇曾不致疑也傅氏築已卑二句傅巖磻溪之時其功德尚未昭宣此裴公山池所以尤當其盛也襯語仍不失分寸送諸葛覺往隨州讀書諸葛覺貫休集中作珏其懷珏詩有出山因覔孟踏雪去尋韓注云遇孟郊韓愈於洛下又注云諸葛曾為僧名然公詩蓋送其人也厚齋云李泌父承休聚書二萬餘卷誡子孫不許出門有求讀者别院供饌見鄴侯家傳多書有自來矣新若手未觸倒􅑽不再讀意城南聯句碎纈紅滿杏注中方引唐小説及小杜李賀詩皆出公後與同時不足據鬬雞聯句髙行若矜豪頂上昂字側睨如伺殆頂上竦字精光目相射欲鬭之神磔毛各噤㾕四句是兩雞空鬭未相搏時俗所謂打踫腳踫音如唪裂血失鳴聲二句頂冠來隨旋誠巧紿巧紿是俗所謂遊鬬毒手飽李陽二句頂距來惻心我以仁四句韓孟徒一面知雄欣動顔二句鬭雞主一面爭觀雲填道二句豪甚衆人在場一面事爪深難解頂距來漢書注李竒云東方人以物插地中為事頭垂碎丹砂二句負一靣碎丹砂頂冠來連軒尚賈餘二句勝一靣秋雨聯句氛醨稍疏映四句餘勇吾人猶在陳此蓋用莊子子桑事安溪云東野雖有捷疾響報之材終不如退之愈出不窘也逺遊聯句村飲泊好木飲或作館按飲字勝蒙上宿江岸來亦不必引幽居詩為據題楚昭王廟近體即非公得意處要之自是雅音昭王欲用孔子而為子西所沮公之托意或在於此歟答張十一功曹題注唐本有張署寄公詩按不載張詩并失古人編次之體五六既不如屈子之狷懟結仍借答詩以見其憔悴可謂怨而不亂矣湘中酬張十一功曹此召還志喜也喜雪獻裴尚書氣嚴當酒換換字絶妙略停杯冷已不禁也春雪發端深妙非春雪不稱城險疑懸布一聯語頗工然不必春雪也夜色自相饒夜旦二字相對作關鎖色字仍與看字呼應水芙蓉第二以水破木似太拘於法梁國惠康公主挽歌第一首龍轜非厭翟詩小序王姬下嫁於諸侯車服不繫其夫下王后一等鄭箋謂車乘厭翟勒靣繢總第二首觀三四公主似以乳子死詠雪贈張籍開寶近體初不以多為貴觀此益信奉酬振武胡十二丈大夫證本儒生故有落句奉和庫部盧四兄曹長元日朝回玉珮聲來雉尾髙注唐制人君舉動必以扇雉尾障扇四云云按今呼掌扇者障之訛也戎服上趨承北極按唐書禮樂志元正朝賀上公一人詣西階席脫舄解劔升當御座前北靣跪賀乃降階詣席佩劔納舄復位非戎服也豈艱難以後遂與開元禮殊制乎然則結句乃言當以太平未復為嘆若一身之向老何足計也寒食直歸遇雨唯內直者知此詩之悲然第四亦非有所望也送李六協律歸荆南淡而有味栁花還漠漠二句承羈遊來題百葉桃花張裕江南雜題亦有紅鮮百葉桃之句首句晚字即呼起下連第二愈淡愈艷透出晚更紅戲題牡丹結句非牡丹不稱飛卿希逸近來成懶病不能容易向春風巧於偷意者也雙燕無機還拂掠二句襯出結句奉和虢州劉給事使君三堂新題二十一詠西山下二句的的是虢州詩稻畦是園亭中稻畦梯橋菡蓞似指蓮華峯晚雨首句當如蜀本第二句亦不諧也把酒他人未嘗不間公意中自無對爾送李尚書赴襄陽八韻後半與改命付忠良一破無照應和席八十二韻餘事作詩人班固賔戲著作者前烈之餘事也太安池太安池是郭曖家羊士諤有詩注誤遊太平公主山莊末句透占字廣宣上人頻見過窮年擾擾竟未立功立事稍偷間暇又費之一談一詠能不增葉落長年之悲乎此詩即公所謂聰明日減於前時道德有負於初心者結句妙借廣宣點出更不説盡宣既為僧亦有本分當行之事奈何持末藝與朝士徴逐不懼春秋迅速耶言外亦以警覺之也和侯協律詠笋諷刺苦於太露亦不自然次潼關上都統相公題注都統謂韓宏也按暫辭堂印句則都統即謂晉公李商隱詩亦云腰懸相印作都統晉公破賊回重拜台司以詩示幕中賔客愈奉和後四句只直敘幕中賔客即至公三字便已帶轉晉公相業上下俱有關鎖筆力最髙送鄭尚書赴南海爰居去年榖和熟得天時也蚌蛤回商貨流通得地利也答道士寄樹雞末句注引龍城志云云按公詩當據古詩不可引龍城録左遷至藍關示侄孫湘安溪云妙在許大題目而以除弊事三字了却結句即是不肯自毁其道以從於邪之意非怨懟亦非悲傷也韶州留别張端公使君起句再字與末句淹留反對久欽江總文才妙二句南史劉之遴嘗酬總詩深相欽挹臺城陷避難會稽總舅蕭勃據廣州自會稽往依焉流寓嶺南積嵗陳天嘉四年以中書侍郎徴還此句乃斷章用嶺外事與第七奏課徴拜呼應虞仲翔徙交州不返自危幾類此也清歌緩送欵行人注欵諸本作感按作感便與緩字無情量移袁州張韶州端公以詩相賀因酬之安溪云末句取諸離騷所謂跪敷衽以敶辭者有蒙難正志氣象遊西林寺題蕭二兄郎中舊室蕭存頴士之子為金部員外終檢校倉部郎中生三子皆無祿早世文公少時嘗受金部知賞及自袁州入為國子祭酒途經江州因遊廬山過金部山居訪知諸子凋謝惟二女在因賦詩云云留百縑以拯之見因話録自袁州還京行次安陸先寄隨州周員外第四句謂雲夢也酒中留上襄陽李相公第六句用前有墮珥後有遺簮之意依注作墜為是賀張十八祕書得裴司空馬毛色桃花眼鏡明毛色當從英華作衫色唐人馬詩用衫色者非一旦夕公歸伸拜謝二句賢者不得志而至於從戎則時可知矣元勛大老亦不可以久棄於外也因一馬之微而惓惓於否之還泰公之意於是逺矣奉和兵部張侍郎酬鄆州馬尚書祗召途中見寄開緘之日馬帥已再領鄆州之作名貴仍遷少昊司魯地為少皥之墟此句既切秋官仍雙關鄆師和水部張員外宣政衙賜百官櫻桃詩前四句鄭重正蓄無所報三字之勢結句收出宣政衙非趁韻穆宗昏荒不復可以有為公雖立朝徒俯仰默歎而已曰自知無所報者正傷欲報而無路也公寄崔立之詩無能食國惠豈異哀癃罷其即慚汗二字注腳乎送桂州嚴大夫飛鸞不假驂注假或作暇按暇字佳假字與勝仙不相應奉和僕射裴相公感恩言志次連是感恩故有味義門讀書記卷三十

body:
  text: 義門讀書記卷五十一翰林院侍讀學士何焯撰杜工部集宋景濂為俞默翁杜詩舉隅序以為注杜者無慮數百家大抵務穿鑿者謂一字皆有所出泛引經史巧為附㑹楦釀而叢脞騁新竒者稱其一飯不忘君發為言詞無非忠君愛國之意至于率爾詠懷之作亦必遷就而為之說說者雖多不出于彼則入于此遂使子美之詩不白于世余謂此言蓋切中諸家之病而明人注杜則又多曲為遷就以自發其怨懟君父之私其為害蓋又有甚焉者矣景濂譏劉辰翁于杜詩輕加批抹如醉翁寤語終不能了了其視二者相去不逺元人皆崇信辰翁莫有斥其非者此實自景濂發之而注杜者從未有一言及之何耶默翁名浙字季淵宋開慶己未進士蓋因生不逢辰有所托而為之者序言其各析章句于體假之分明脈絡之聯屬三致意焉亦必有可觀惜余不及見也奉贈韋左丞丈觀唐代贈送之詩惟老杜篇篇意思深長此篇發端二語氣象𥚹迫早年詩如此此詩兼帶齊梁氣調賦料揚雄敵一聨儒者之華致君堯舜上一聨儒者之實此意竟蕭條提起此意竟蕭條至到處潛悲辛出則出處則處若不行道而徒餔啜豈不可痛乎朝扣富兒門四語非身歷京華不知其言之悲扣門二句并縈拂紈褲主上頃見徴四語透出多誤每于百寮上謂林甫之前也竊效貢公喜一聮望其如王陽乃僅同子貢二句寓意深婉焉能心怏怏言不能與衆伍也心怏怏應潛悲辛祗是走踆踆應行歌三十載今欲東入海應隱淪尚憐終南山至末終南頂去秦一飯并縈拂杯炙末句收入海并顧縱鱗誰能非傲世語蓋雖去仍望如韋者能馴之誦于百寮何不言之主上乎終南山屬意大臣清渭濵屬意主上不可以悻悻一决之詞例之也白鷗沒浩蕩志林宋敏求謂鷗不能沒改作波字按小謝集有往敬亭路中聨句云鷖鷗沒而遊此沒字所本不必泥鷗不能沒之說送高三十五書記無窮轉變起伏脫身簿尉中當是由封邱尉為掌書記也十年出幕府二句以封常清前例期之非虛設也念子何當歸邊城有餘力何當歸有餘力應休王師無迹贈李白太白初放還山時作亦有梁宋遊二句雙收遊龍門奉先寺用兩層叠注逼出末句有力已從招提遊二句撇過遊字隂壑生虛籟初夜月林散清影月升天闕象緯逼二句指宿天闕謂伊闕也注改窺字死對無味境之竒在龍門遊宿在寺中四句寫龍門以寺起結界畫輕重自見龍門是最高處却從下方衆壑襯起林開而象緯入牖籟發而衣裳覺冷四句中次第相生恰又逼出覺字晨字望嶽首尾實中四句虛岱宗夫如何嶽字倒起夫如何三字盡望之神理夫如何三字幾不成語然非三字無以成下句有數百里之氣象若上句俱雄麗則一李長吉耳趙間間記前輩論詩語齊魯青未了望字造化鍾神秀二句指嶽蕩胸生曽雲二句是第二層望㑹當凌絶頂反醒望字一覽衆山小收嶽句出法言陪李北海宴歷下亭天寶初雍為汲郡北海二太守東藩駐皂蓋駐字直貫注落日句濟南名士多邑人在坐交流空湧波言水波湧起在空中也落日將如何起難重過從公難重過陪字登歷下古城員外新亭同李雍作圓荷想自昔當指東湖故事記酉陽雜俎有之更考芳宴此時具二句關鎖上下不阻蓬蓽興同字元都壇歌開長吉青石漠漠常風寒蕭爽鐵鎖高垂不可攀二句子午道從杜陵抵終南公夲杜陵人而故人長往遂高不可攀故歎羡其獨能致身福地也今夕行今之輸後之贏者也進者乃退退者真進笑者無逺見耳只說半面有味邂逅豈即非良圖良圖即在輸處兵車行咸陽橋即中渭橋此詩自為河隴用兵而作或謂刺南詔之師非也塵埃不見咸陽橋此不見虛字實用後二不見實字虛用作章法映帶行人但云㸃行頻但云藏下申恨一層目前一層意中也邊亭流血成海水血流入青海故稱海水也君不見漢家山東二百州君指過者言山東二百州已包天下矣千村萬落成荆把起索租借秦人以包天下况復秦兵耐苦戰二句曲折穿漏不直亦有賓主借秦人口中帶出以所見者包舉所不及見者也長者雖有問重喚過者作一頓挫雖字與上但字暗相呼應雖有問當云雖無問易一字即怨而不怒也役夫敢申恨敢之為言不敢也信知生男惡四語回顧爺娘送哭中間健婦句仍不漏妻子君不見青海頭至末君指過者咸陽橋青海頭人哭鬼哭首尾相對篇中逐層相接纍纍珠貫弊中國以邀邊功農桑廢而賦斂益急不待祿山作逆山東已有土崩之勢矣况畿輔根夲亦空虛如是一朝有事誰與守耶借漢以喻唐借山東以切關西尤得體高都護驄馬行唐書高仙芝傳仙芝少隨父至安西纍擢副都護四征都知兵馬使天寶六載虜勃律王及公主還代夫蒙靈察為四鎮節度使九載討石國平之獲其王入朝除武威太守河西節度使代安思順思順諷羣胡剺面割耳請留制復留思順以仙芝為右羽林大將軍公詩蓋作于此時惜其屢立大功而終老于環衛也猛氣猶思戰場利縈拂臨陳萬里方看汗流血束逺字即起何由出青絲絡頭為君老顧伏櫪何由却出橫門道正結應來向東天育驃騎歌畫馬徒存而真馬老死槽櫪不得為天子用公詩蓋寓葉公畫龍之嘆乎只說時無王良伯樂不使其流及上矯矯龍性合變化二句是健字精神乃稱其為天子馬也遂令大奴守天育胡仔曰東坡書此詩作字天育按作守乃與别養合特設天育一廄專官守之也作字不與養字重復乎張公歎其材盡下以張公興良樂鳴呼健步何由騁顧走千里時無王良伯樂死即休縈拂張景順雖欲盡力于天子誰知之者白絲行落絮遊絲亦有情二句極其眩曜而後折之秋雨嘆堂上書生空白頭後時也第三首秋來未省見白日結出本意醉時歌目空一世而不露輕肆之迹人但以為曠達耳先生有道出羲皇四語即下儒術孔徒也下以同襟期三字束住則此四語亦自譽也杜陵野客人更嗤二句野客被褐并不得為廣文先生矣故更為臺省食肉者所嗤日糴太倉五升米日糴太倉亦不如先生猶月請俸嵗縻粟也燈前細雨簷花落燈前頂上夜沉沉簷花落頂上春字相如逸才親滌器歸則無所不堪子雲識字終投閣不歸恐有甚者石田茒屋荒蒼苔言猶可力耕自食孔邱盜跖俱塵埃紛紛袞袞孰非跖之徒與俱為塵埃而我二人雖儒術轗軻自信身後名高萬古則亦不須慘愴無疑樂飲也生前相遇且銜杯身後名生前酒兼而有之我二人高歌曠達真天下窮極貴盛之人矣即餓死何不足况劚荒力作其窮辱僅比于相如之滌器亦非腐鼠所能嚇乎勸其并去此官與已同也醉歌行詞源倒流三峽水能綴文也筆陳獨掃千人軍指草書只今年才十六七更小于陸暫蹶霜蹄未為失承驊騮㑹是排風有毛質承鷙鳥風吹客衣日杲杲至末風吹二句言别之苦貧賤句收轉落第兩路夾出酒盡獨醒來此時即望以一醉遣懷不可得也對酒如此况㑹散乎不欲傷勤之意故聲出復吞然躑躅之間涕零有莫能制者矣贈衛八處士句句轉訪舊半為鬼暗藏衛八之父在內夜雨剪春韭雖然倉卒薄設猶必冒雨剪韭所以見其恭也新炊間黃梁宋子京書作聞黃梁非常生動苦雨奉寄隴西公所思礙行潦指隴西公式瞻北鄰居指王徴士同諸公登慈恩寺塔方云皇州以上十六句形容塔之高凡山頂日夜大風故廟宇皆用鐵瓦老杜烈風無時休非身歷至高處不知其妙也仰穿二句謂塔中磴道盤旋而上每級之下必以邪拄枝撑幽矣既至塔頂身在半空北斗若挂其户河漢若聽其聲羲和少昊仿佛可覩秦中諸山從髙望之皆培塿俯視一氣瀰漫皇州且不辨况涇渭二水乎此段形容其高俱可解回首八句方屬風刺自非曠士懷一聮次聮難接最是曲折變化二句固是行文曲折處然亦暗為後半伏脉仰穿龍蛇窟一聮接語工細登字不枯七星在北戶一聫是跨蒼穹羲和鞭白日二句收到慈恩回首呌虞舜四句從上皇州二字忽然轉入諷刺比興相緯暗移不覺黃鵠去不息二句言欲褰裳去之也君看隨陽㕍二句結語暗與㕍塔相關隨陽又頂日晏來回首以下或有所托前半若如三山老人遽妄為穿穴是忘題目之為登塔也示從孫濟娓娓惻惻宗老訓誡之詞中入比體似歌似謡兩漢風流宋張表臣珊瑚詩話云萱忘憂而已死竹可愛而不蕃則荒落甚矣水濁而不復其清源葵傷而不芘其根本則宗族乖離之况也此詩人因物而興竹枝霜不蕃蕃作翻字佳九日寄岑參兩腳但如舊陳后山夲作雨是也作兩則中間無根矣所向泥活活先起寄岑思君令人瘦風雨思朋友吁嗟乎蒼生申前苦雨大明韜日月四語鄭之雞鳴曹之候人此作者之體源所自出是節東籬菊指九日送孔巢父謝病歸遊江東兼呈李白似用太白體深山大澤龍蛇逺四句虗景作襯自是君身有仙骨四句言我自惜巢父之為人非如俗流欲以富貴縻之也惜君只欲苦死㽜應不肯住南尋禹穴見李白太白刺貴妃辱力士被才還山亦掉頭不屑富貴人也飲中八仙歌董易農云每人為韵句中各見仙字意然以太白為綱領白傳因此詩而附㑹八人未嘗如昔人為竹林之遊也道逢麯車口流涎道逢改路見從白氏長慶集注李白一斗詩百篇一段獨多一句㸃出眼目八人中太白尤與公論交酒罏者也通章皆嘆諸子之不得志有托而逃言外亦自寓已之沉飲聊自遣也八人中焦遂獨無官位詩亦以是終猶之杜陵有布衣也凡三人兩句四人三句一人四句相雜成章曲江三章第一章白石素沙亦相蕩層次深淺麗人行前半鋪揚處皆詩人君子偕老之體紫駝之峯出翠釡二句交互對簫鼓哀吟動鬼神帶叙一句後來鞍馬何逡巡二句即指丞相蓋謂國忠也當軒下馬入錦茵言其一無所避分明指斥其男女無别故只用虛叙却㽜向末句中㸃破楊花雪落覆青萍一聮暗指諸楊覆亡貴妃賜死之事此篇蓋追賦以為後世鍳末句就本事收轉言要津鞍馬炙手可熱者徒以雄狐之醜遺臭萬世五家車騎瞥眼不知所往也若後多費烟墨即與題不稱味亦無餘故略以廋詞􅕍括耳樂遊園歌于今為南內于漢不嘗為樂遊乎芙蓉園夾城仗有時而盡而吾詩可以垂之無窮然則何以無歸為悲哉結句又以自解也獨立二字不但為㑹散寂寞言之煙綿碧草萋萋長此句中暗伏無歸與結處呼應曲江翠幕排銀榜對無歸拂水低徊舞袖翻對獨立只今未醉已先悲貧賤如昔又加以老安得不未醉先悲乎聖朝亦知賤士醜醜謂以有道貧賤為恥也一物自荷皇天慈但荷天慈則不被君恩可知措詞微婉渼陂行縮夲江海賦天地黤慘忽異色與自非曠士懷登兹翻百憂同法晉李顒涉湖詩黯蕩天時隂岧嶤舟航舞長川廣澤雲氣吞吐風浪回旋往往然也鼉作鯨吞不復知為萬頃起伏舟子喜甚無氛埃一半明宛在中流渤澥清二句中間界劃下歸無極終南黑一半晦半陂已南純浸山頂終南黑水靣月出藍田關回舟月出于叙景中暗暗帶出此時驪龍亦吐珠二聮上二連水中之影此二連水中之氣萬頃之竒非此不能參靈極妙亦暗與前黤慘憂思相應也渼陂注入濴水濴當作潦說文亦無此語渼陂西南臺懷新目似擊二句謝家句法乘陵惜俄頃乘陵謂乘扁舟而陵長風也俄頃對後彌年外物慕張邴張是張長公舊注以為留侯與邴曼容不類戲簡鄭廣文兼呈蘇司業賴有蘇司業賴作近近字與三十年呼應時時乞酒錢亦差勝騎驢三十載旅食京華春耳夏日李公見訪貧居類村塢幽也客意已驚秋已字注庶字巢多衆鳥鬥頂逺林以下六句從逺林長流四字更轉一層自作客主極文之變苦遭此物聒反起靜字巢多衆鳥鬥四句偷蟬噪林逾靜鳥鳴山更幽反用之此宋人翻案法所自也但公不肯一概生拗耳水花晚色靜頂長流又見不假清風而自凉也奉同郭給事湯東靈湫作說者為指祿山事豫尚未喻東山氣鴻濛湯泉閬風入轍跡四句轉入湯東靈湫明皇常與妃子行幸湯泉駐蹕靈湫䙝舉祀禮詩乃紀其事以起諷王命官屬休插入郭給事百祥奔盛明二句此當時獻諛之徒為是語下文出見蓋有由則公與給事所見也坡陀金蝦蟆以下或賦當日靈湫所見或因靈湫而感事寓言亦頗似之金蝦蟆注隋書蕭吉傳房陵王為太子言東宫多鬼􅂒鼠妖數見上令吉詣東宫禳邪氣于宣慈殿設神座有回風從艮地鬼門來撲太子座吉以桃湯葦火驅逐之風出宫門而止又謝土于未地設壇于四門置五帝座于時至寒有蝦蟆從西南來入人門升赤帝座還從人門而出行數步忽不見上大異之上言太子當不安位夜聼許十損誦詩愛而有作誦詩渾遊衍似指其言之多溢此詩蓋戲之也人間夜寥閴倒結夜聼橋陵詩三十韵因呈縣內諸官前半布置好坡陀因厚地沃野開也却略羅峻屏崇岡擁也雲闕虛冉冉八句寫得隂沉慘淡髙嶽前嵂崒六句夲呈縣內諸官却兼寫縣外形勝詩為橋陵作也王劉美竹潤四句指縣內諸官驄馬行賜者太常梁卿李鄧公乃後得故賜馬本事至後始出鄧公馬癖人共知指題中注愛而有之夙昔傳聞思一見伏後顧影驕嘶自驚寵暗藏賜馬銀鞍却覆香羅帕轉出賜馬卿家舊賜公取之卿家指梁卿此馬數年人更驚回顧夙昔傳聞不與八駿俱先鳴縈拂賜馬極咏嘆淫泆之致雲霧晦冥方降精大宛之種漢書大宛馬其先天馬子也良驥老始成言其成與八駿俱鳴言其用方降精句言其生自京赴奉先縣咏懷五百字紆回頓挫極溫柔敦厚之味所以異于鄙儒之大言也老大意轉拙咏懷起白首甘契濶未遇堯舜故非無江海志二句對下巢由不憂生逢堯舜君對稷契句葵霍傾太陽二句將稷契堯舜一綰顧惟螻蟻輩螻蟻輩即同學翁之事干謁者下之盈朝多士衛霍食客皆此曺也胡為慕大鯨鯨魚于海公之志則然曰胡為者反言之亦若自嘲其拙也以兹悟生理言自知不得不與螻蟻爭榮忍為塵埃沒承老大白首沉飲聊自遣言吾誠笑螻蟻之卑亦少愧巢由之高矣然終未能以吾之性易彼之節所以進退躑躅沉飲自遣也放歌頗愁絶放歌所以為歡而翻云愁絶者為有失業徒逺戍卒隱憂方大難以自遣也鮑詩長歌欲自慰彌起長恨端公促作一句霜嚴衣帶斷對彤庭分帛蚩尤塞寒空此天戒也蚩尤竟天對後逺戍民之失業尤夲病也故語有詳略鞭撻其夫家指民怨此等語秦中吟之祖君豈棄此物分帛而不分憂則如棄之也多士盈朝廷回顧當今廊廟具二句况聞內金盤二句指國空此又言好武功而寵邊將舉其奢淫驕恣可知也暖客貂鼠裘四句二客字乃所謂無恥而事干謁者也又對下十口飢渴路有凍死骨應霜嚴等句羣冰從西下羣冰與前疾風嚴霜皆比羣小之盈朝也老妻寄異縣應布衣濩落庶往共飢渴赴縣豈知秋未登二句未作禾嵗自豐稔貧家倉卒偏以餒死也生常免租稅對前出帛名不𨽻征伐對下逺戌默思失業徒二句收窮年憂黎元憂端齊終南咏懷結二句言士之窮若此况下民與戍卒乎此憂又有甚于一家十口者故不可掇也中間就溫湯一事言之可憂已有數端况通計民生失業五大在邊其憂真有百端交集者故曰齊終南也自首句至愁絶句皆自叙其志尚也竊比稷契而不遇而猶覬此志之伸至于取笑而不顧者蓋雖有江海之好而不忍忘君雖非廊廟之材而不可奪志故也仕路之徒如螻蟻之求穴鑽營趨附我則又所慕者大恥事干謁所以至於老而不遇猶不能變其夙志以徇巢由之節可謂窮矣故向之浩歌激烈者今又放歌而愁絶也嵗暮至再述叙其經行所見宴遊之事所聞奢靡之風以感切時政壯遊詩所謂舉隅見繁費引古惜興亡者意此類也北轅至末叙已歷險赴家而有飢餓之慘因以念窮民而憂國事蓋應第二節路有凍死之意又終首節所謂歎息熱腸者于是不久而祿山之難作矣系安溪先生語奉先劉少宰新畫山水障歌堂上不合生楓樹畫障怪底江山起烟霧是新畫畫手亦無數六句皆有新字在得非元圃裂四句大槩寫反思前夜風雨急四句跌斷插入四句新障變化曲折并奉先少府亦不漏略野亭春還雜花逺言其明漁翁暝踏孤舟立言其暗滄浪水深青溟濶言其平欹岸側島秋毫末言其側野亭以下六句細寫兩層相對逐層不亂自有兩兒郎帶叙大兒聰明到二句畫其高處小兒心孔開二句畫其下處四句又將大處細景補出青鞋布襪從此始暗應新字結白水縣崔少府十九翁高齊三十韵崇岡相枕帶二句雖有崇岡枕帶而所處既高則曠野皆如咫尺二句曲折善形容泉聲聞復息泉聲是動復息是靜含下動靜二字有似懼彈射起下隱字為我炊雕胡對旅食相對十丈蛟十丈蛟承上長松言之何得空裡雷二句形容松濤也崑崙崆峒顛二句烟霾霧擁則山若增而高故云人生半哀樂二句一綰三川觀水漲二十韵礧磈共充塞充塞字與南池篇用韵同不有萬穴歸四句接法竒變及觀川源漲二句出意反襯江海猶懼其覆則平陸何可復見竒之又竒悲青坂落句深傷中人督戰以致一敗塗地也哀江頭輦前才人帶弓箭四句無賢才廢武偹皆暗寓其中翻身向天仰射雲二句仰天一箭而翼墜雙飛此指陳元禮請殺貴妃事其云輦前才人者姑隱避其詞如聞比興在可解不可解之間欲人思而自得之耳去住彼此無消息去謂上皇住謂肅宗哀王孫長安城頭頭白烏二句烏生八九子猶哀鳴相呼天子出走獨不能庇其子孫乎屋底達官走避胡曰達官不忍斥言也金鞭斷折九馬死曰馬死代為之解諱莫如深也不敢長語臨交衢二句頓斷不直朔方健兒好身手此朔方謂幽燕非朔方軍也大雲寺贊公房四首格詩黃鸝度結構二句暗入花邊第二首取用及吾身對下潤字第三首此篇雖謝元暉無以過玉繩回斷絶二句鐵鳯橫亘於玉繩之中若中斷第四首童兒汲井華根上首塵沙來明霞爛復閣根上首天黑側塞被徑花根上首地清蘇端薛復筵簡薛華醉歌愛客滿堂盡豪翰承交有道坐中薛華善醉歌承文章有神近來海內為長句四句唐初七言歌行多用齊梁舊體至公等乃專法鮑明逺行路難極于遒壯故詩中專以長句為言也岑參有與獨孤漸道别長句兼呈嚴八侍御詩萬事終傷不自保顧垂老遇亂如何不飲令心哀收轉緩憂晦日尋崔戢李封尸寢驚敝裘伏懶字晚定崔李交崔李蘇鄭是切對况因令節求㸃晦日草芽既青出二句春氣和柔濁醪有妙理二句東坡濁醪有妙理賦出此雨過蘇端久旱雨亦好正苦無食可堪久旱喪亂流離得雨一身可延雨亦好三字頂久旱包含結處濁醪必在眼二句入眼只有濁醪欲假以抒懷不覺盡醉二句意亦曲折紅稠屋角花顧雨字喧閙慰衰老暗對妻孥隔軍壘况蒙霈澤垂抱雨糧粒或自保應無食喜晴青熒陵陂麥熒貼陵青貼陂回首白日斜收晴字述懷一首誓報主恩以贊中興家之在否所不暇顧深杯歡㑹盡謝不與故結云云送樊二十三侍御赴漢中判官長驅振凋敝振凋敝者中興之本而驅之為賊用固吾民也南伯從事賢按朱鶴齡云南伯謂山南主將生知七曜歷續漢律歷志劉洪為七曜歷此句天時手畫三軍勢此句地利至尊方旰食二句言不如人和也實藉長久計長久計欲其于征斂之中勿浚民生以鳩集之致滋凋敝庶能如後漢興復長世不然則賊雖滅而民不懷旋有英雄起于草莽矣居人莽牢落至末凋敝之實即離叛之原徴數目見以明吾論之非迂也送從弟亞赴安西判官崆峒地無軸二句轉入安西為畫長久利當時惟仗靈武一軍為興復根本安西存則朔方固故欲其畫長久之利使反正得遂也踴躍常人情四句異人二字精神透出送韋十六評事充同谷郡防禦判官昔沒賊中時伏下沉字今歸行在所伏下浮字逼側兵馬間六句壯其激烈閔其險艱用意深長張目視寇讐伏下憤激鑾輿駐鳯翔八句言防禦之重走馬仇池頭指同谷古色沙土裂二句伏下馳林邱羌父豪猪靴十句言防禦之難吹角向月窟二句即下橫戈矛也鳥驚出死樹二句即下無人境也且復戀良友至末抑何敦厚此望盡復承平舊規非不急語也無公之胸次亦道不到此所謂諸葛君真名士也結善頌善禱塞蘆子黃鶴云時官軍止知東討收復河洛而不知蘆子關之可塞公懼有乘隙而入者故有此作按鶴注為得公意五城何迢迢迢迢反對速字莫謂其逺為寇不能至止隔一水耳思明割懷衛二句割懷衛言思明亦隨秀岩而西恐其意不專在太原崤函蓋虛爾足上句意空國而來豈徒然哉疾驅塞蘆子疾驅對速字岐有薛大夫四句乃憑險扼寇之比例深意實在此公之逺圖正望于靈武之預為􅊀也彭衙行早行石上水二句名句望見白水以為曉光幾墮深澗遙指晚烟以為村落僅宿空林深山間道奔竄之苦盡此十字矣故人有孫宰有者言奔竄以來獨有此一人也暖湯濯我足緣上泥濘翦紙招我魂此句言始歸也命垂絶而忽續如招我魂而忽歸也衆雛爛漫睡二句徒步既久驟得安處無暇索食投地鼾睡字字真景别來嵗月周收轉憶昔北征皇帝二載秋二句書二載秋者都人士之望已久園陵淪賊灑掃廢闕不可泄泄也閏八月秋且向盡正當順肅殺之氣成收復之功也後云禍轉亡胡嵗勢成禽胡月與起二語相應杜子將北征二句開出前半篇君誠中興主二聨伏後半篇憂虞何時畢何時畢幾時休皆中間線脉撥動歲月句靡靡踰阡陌以下北征回首鳯翔縣指行在時肅宗在鳯翔前登寒山重二句漸次脫卸蒼崖吼時裂言若吼則崖裂也菊垂今秋花切閏八月二句言干戈滿地幾于無花數道出師幾于塞路寫出深山最深處青雲動高興十句最頓挫曲折雨露之所濡四句乾坤瘡痍呻吟蕭瑟此獨各遂其性若别一身世也坡陀望鄜畤先望見我行已水濵頂上谷字我僕猶木末頂上岩字二句脫卸錯綜鴟鳥鳴黃桑四句并無復人烟矣况我墮胡塵隨勢跌落經年至茆屋經年從與妻子隔絶計之非久居道塗也以下問家室見耶背靣啼四句垢膩非復玉雪故見耶而反背靣也腳不襪透出寒意才過膝則亦跣足矣男女異詞用筆之細如此嘔泄臥數日一作數日卧嘔泄日字韵重從之為是那無囊中帛二句閏八月授衣候至此亦生理之不可少者似欲忘飢渴忘飢渴中不惟志喜已起下生理句問事競挽鬚暗渡翻思在賊愁應墮胡塵新歸且慰意二句從家事轉到國事幾日休練卒應東胡反未巳仰觀天色改轉到肅殺慘淡隨回鶻注回鶻作回紇是蓋德宗時方請易為回鶻也其俗善馳突善字直貫注鷹騰箭疾送兵五千人二句方云胡人長于騎射其取勝獨以馬故一人有兩馬此古法也按魏主燾帥輕騎兼馬襲擊柔然胡三省注兼馬者每一騎兼有兩馬也聖心頗虛佇至末朝議所恃者回紇助順顧我所卜皇綱未墜者則在上皇悔過足以感人心太宗德澤入人者深但至尊能以宣光自待東胡未必久也胡命其能久鎖胡反皇綱未宜絶鎖中興即開下言興復責在肅宗况上皇亦非亡國之主也姦臣竟葅醢四句國忠先為士卒所殺而後妃子賜死叙得井然宣光果明哲應君誠中興主桓桓陳將軍先言明皇能處敗始歸美元禮得體而不失實寂寞白獸闥悲君側諫諍之無人也煌煌太宗業二句歷叙皇綱未宜遽絶歸本開創責望于中興者愈切矣玉華宫太宗所建梅聖俞曰玉華宫近有苻堅墓直刺太宗結句引歸自已身上不訐露溪回松風長伏萬籟蒼鼠竄古瓦望見不知何王殿前王侈殿謬云不知詩人譎諫之意也隂房鬼火青入尋壞道哀湍瀉顧溪回萬籟真笙竽一聮妙用反櫬接得不直美人為黃土真中有假况乃粉黛假粉黛指塗墍丹雘言之故物獨石馬假按石馬封演曰秦漢以來帝王陵前有麒麟辟邪象馬之屬人臣墓刻石虎羊以為儀衛其在唐有制冉冉征途問二句用木葉落兮長年悲天地四時運行不窮人生其間百年旦暮在虛空則假者或真有形象則真者乃假憂來無方欲浩歌自遣而不覺淚之盈把也雖然此豈自我一人始哉吾但與天地四時委蛇觀化固已解憂矣末二句則所謂莫繫于去來復歸于無物也九成宫立神扶棟梁顧上崖字立神言其初倘鬼神為之也甘泉賦抗浮柱之飛榱兮神莫莫而扶傾鑿翠開戶牖顧上斷字其隂宿牛斗顧上回字紛披長松倒顧上風字羌村三首俱似脫胎于陶叙述家人及鄉鄰情景幼吾幼以及人之幼彌哀婉而彌深厚第一首世亂遭飄蕩二句跌宕第二首且用慰遲暮顧歡趣第三首傾榼濁復清頂上各字逼側行贈畢曜學鮑十日不一見顏色對速字此心炯炯君應識起相就已令請急㑹通籍起相就飲辛夷始花亦已落逼出速字湘靈云始花之始照月令讀作試言初開之花尚且落矣况我與子原非壯年乎一字亦有呼應送李校書二十六韵衆中每一見四句少年而席高門据清貫有盛譽皆悔吝之媒也前半非復泛然鋪叙此四句正見愛之深故誨之切乾元元年春此等健句最不易得已見楚山碧碧字似用春草碧色與後緑野相應歸期豈爛熳伏遲字小來習性懶二句懶慵二字暗代驕亢如覺天地窄苦言行已能夕惕夕惕者少年所難公欲以為贈故先以身歷者警之羡其能者正慮其未能也可謂詞不迫而意獨至矣回身視緑野二句此即孟嘗君所謂使文立為亡國之人者也時哉高飛燕至末及時高飛下復叙重來道途所經反起勿遲頓挫有力長雲拂褒斜二句戒行李事細只留作結衰疾悲夙昔夙昔已衰况過此乎洗兵馬收京後作齊梁體類夲云四假六韵却不可截然分開中興諸將收山東二句曰收山東其實所收只兩京耳自注正合春秋書事之法也袛殘鄴城不日得鄴在河南尚不能下乃遂一葦可杭乎危之也獨任朔方無限功獨任朔方則兵馬可洗公蓋知廟謀已不專委郭相故因已成之功期後效也已喜皇威清海岱已喜者刺其天下未平但收兩京志已驕盈起下小心深謀之意清海岱謂收地僅至淄青滄景以北仍為賊藪也常思仙仗過崆峒此管子所謂願君無忘在莒也三年笛裡關山月二句自我不見于今三年宿兵于外民不得有家室之樂何得以收京自安也成王功大心轉小六句指諸將東走無復憶鱸魚二句此謂朝士鶴禁通霄鳯輦偹二句此謂靈武倉卒本出權宜自今兩宫相見當極天下之養也汝等豈知蒙帝力二句鄴城反覆不足怪關中小兒壞紀綱甲兵未戢所憂在汝等耳關中既留蕭丞相以下勸帝與南衙大臣謀扶顛之策勿聼宦豎邪說致中興之業不竟也青𫀆白馬更何有以下皆所謂安得親見其若是者非已然之實事也淇上健兒歸莫懶二句淇上健兒即鄴城之將潰者也歸莫懶與三年不日遙應戒其將有輿尸髽逆之患而托其詞于莫懶又不忍遽料其然而托于室家愁思夢魂變異微婉深厚安得壯士挽天河二句兩京雖收河北之平尚未有期師老而權分公知鄴城之將喪師而洗兵之難冀也故因頌而致善後之思焉留花門百里見積雪回鶻皆白帽故望之若雪病後遇王倚飲贈歌麟角鳯觜世莫識二句對後命如線句言此飲殆可續命也酷見凍餒不足耻二句非病後則是嗜飲食人矣古人作詩皆存品格也遣人向市賖香粳六句其誠敬欵曲如此故下云情味誰似令我手腳輕欲漩收足續命老馬為駒信不虛借作返老還童用收足續命湖城東遇孟雲卿復歸劉皓宅宿宴飲散因為醉歌蔡本題上有冬末以事之東都七字前十二句叙事後六句感慨一路將虛字㸃撥文機翔舞情事活躍駐馬偶識雲卿靣遇字懶回鞭轡成高宴指復歸照室紅爐簇曙花二句就冬盡春回上㸃化上承艱難下起同軌天開地裂長安陌冬末自子而丑也易闢為裂古人用字常有此體寒盡春生洛陽殿之東都人生㑹合不可常艱難故也庭樹雞鳴淚如線用祖劉事兼寓雞棲樹閿鄉姜七少府設鱠戲贈長歌王倚姜侯俱當公失意時能加敬禮故可佳河凍未漁不易得二句鄭重為設字著意偏勸腹腴愧年少周禮籩人注燕人膾魚方寸切其腴以啖所貴二句方見特為公設所謂情屢極也落砧何曽白紙濕束無聲二句放筯未覺金盤空束偏勸二句并起飽字新歡便飽姜侯德二句重在設鱠清觴異味只用帶叙欲别上馬身無力戲之也不恨我衰子貴時二句少府微官獨重其情耳豈結納他日哉亦戲之也戲贈閿鄉秦少公短歌去年行宫當太白作用寓此二句中每語見許文章伯伏下多才昨夜邀歡樂更無為樂止于昨夜則他日之悲可知也多才依舊能潦倒同為兩省官今年則杜為功曹秦為縣尉俱以直廢艱危扈從時清而反不録無所歸咎故相戲以才為身纍也出之以戲故曰可以怨李鄠縣丈人胡馬行相士失之貧相馬失之瘦通篇託意在是朝飲漢水暮靈州朝飲漢水過金牛也暮靈州見天子也義鶻巨顙拆老拳鶻之擊物以拳非借用語死亦垂千年千年修蛇一朝而斃耳物情有報復此句指鷹急難心炯然透義字功成失所在二句足上意非有所利益見其為義也畫鶻行颯爽動秋骨動字頂上生字乃知畫師妙二句從畫字兜轉生字充君眼中物又顧上見字烏鵲散樛枝八句生字餘韵寧為衆鳥沒反對恐字沒猶乾沒之沒言意不在逐禽也人寰可超越言仍不可拘𬗟思雲沙際四句以生鶻結一篇波瀾寄託總在拘攣句內生出瘦馬行英華作老馬作老馬非也此詩以為自謂者得之驊騮不慣不得將不慣即所謂我不貫與小人乘也新安吏收京後作雖收兩京賊猶充斥不曰關以內而曰新安不曰詔書而曰府帖諱之也次選中男行六嵗曰中何以守王城王城謂洛陽即下所謂舊京也瘦男獨伶俜三句更無送者徒有白水雖隔青山猶聞哭聲也白水暮東流白水謂河水天地終無情言天地無情以抒其怨言僕射父兄以寬其憂僕射如父兄此汾陽所以收再造之功也潼關吏大城鐵不如二句高與厚二句中互見之胡來但自守二句能守潼關尚恐自河東徑渡無補西都之存亡况如哥舒之不能扼險乎但自守句又暗藏一靣議論在慎勿學哥舒若似哥舒築城何為潼關天險患不得其人為守將無事此勞費也石壕吏有吏夜捉人按胡震亨曰人如延切列女傳有此叶老婦出門看蘇潤公本作出看門蓋疑看字為不叶不知真文元寒山先同收上齶音古詩如此為叶者多矣近世名儒又或疑此句為無韻更拘滯也室中更無人二句兼㸃中男之故如聞泣幽咽婦思其姑也靣靣寫到新婚别父母飬我時以下專寫别雞狗亦得將比體勿為新婚念又將新婚一喚上下詞意句句是新婚仰視百鳥飛二句起結俱比體人事多錯忤二句收别字垂老别長揖别上官旁襯别字憶昔少壯日思太平也無家别寂寞天寶後二句自天寶以後困于徴發逃亡已多及祿山亂後則生民略盡矣發端原其本始言之日瘦氣慘悽日瘦言其光之薄也但對狐與狸二句狐狸敢于鼓怒向人則已成鬼窟可知也縣吏知我至二句方欲斬刈高藜而復召習鼓鞞孑遺僅存何從得食生民之窮至此真無所復之也內顧無所携無家人生無家别二句天下之民至于不復能有其生人主安能復有其民哉結句危痛之甚無以加也夏日歎二詩亦逼似漢魏陵天經中街舊注中街黃道之所經也王師安在哉與上蒼無雷相應眇然貞觀初二句本思貞觀之主而但羡貞觀之臣得體夏夜歎茂林延疏光夏月妙句疏字即帶風在內仲夏苦夜短上顧永日下起笳發虛明見纎毫顧月羽蟲亦飛揚顧風立秋後題落句按本傳甫為華州司功屬關輔飢棄官西客秦州此詩殆欲棄官時作貽阮隱居車馬入鄰家伏下榮貴褰裳踏寒雨恐逢俗客又雨窗可以靜對耳避喧甘猛虎避喧避車馬也慕榮貴則能動而不能靜人物所以日陋阮生嘉遁蓬蒿避喧境之靜也鬚眉蒼古貌之靜也苦心近道中之靜也鄰家車馬自以為榮貴亦知世所數者乃此阮生乎遣興三首第一首安得廉耻將廉者不貪殺人之功耻者不逢時主之欲能廉不剝下知耻不避難如此封疆自安矣第三首春苖九月交二句日至皆熟也此篇本子建良田無晚嵗膏澤多豐年幽人幽人見瑕疵見作在字佳在瑕疵與上內懼相應如指李泌文不從矣因草堂本叙荆潭詩內故有此說五湖復浩蕩二句望其不來而悲終前失羣之意佳人合昏尚知時按漏刻銘合昏暮卷注合昏槿也二句比賦參錯在山泉水清以下言門戶雖衰節操益厲庶幾幽居自守以完晚節斥賣珠玉不御花卉婢牽蘿躬采柏不憚勞瘁期保嵗寒而已牽蘿補茒屋有終焉空谷之志摘花不插髮不復事人也天寒翠䄂薄二句依草木也赤谷西崦人家如畫西枝村尋置草堂地夜宿贊公土室二首第一首捫蘿澀先登一聮方曰絶似康樂回顧眺左狹要求陽岡暖以下無一語是死景字字有尋置神味在第二首幽尋豈一路始㸃尋字此首絶唱寄贊上人石田又收足顧兼土夢李白二首李白以永王璘纍竄逐公每作詩懷憶蓋身雖完節而于故交如李與王鄭者猶惓惓然表其心迹不忍遐棄此蘇李之遺音厚之至也是時公在秦州白在江州相去數千里不得消息故作此詩第一首明我長相憶與下首情親見君意呼應何以有羽翼頂上魂來落月滿屋梁二句橫亘在中間生動曲折水深波浪濶二句頂上魂返夢疑非覺復疑是恍惚凄切第二首告歸常局促二句將前篇來返倒轉冠蓋滿京華二句從苦負平生志句借夢境慨歎實事此我所以常惻惻者也白寄元云舉目誰能不惆悵高車大馬滿長安蓋出于此也孰云網恢恢應前篇在網羅天道不恢兔爰雉罹不能致君徒焉憶友所謂苦負平生志不獨久要之云也千秋萬嵗名二句言身後之名正以傷當時之政公于君臣朋友之誼可謂兼至矣遣興第二首林茂鳥有歸二句吕氏春秋水泉深則魚鱉歸之樹木盛則飛鳥歸之庶草茂則禽獸歸之人主賢則豪傑歸之二句以起下劉表之不足事也用成語以變化本詞又一法也第四首客子念故宅故宅即下篇洛陽生涯能幾何二句可悲第五首丈夫貴壯健二句自悲自解遣興朔風首從獵無厭化自五陵刺在上者政事廢弛惟習馳逐也猛虎首此刺酷吏朝逢首人云近陶我謂似鮑前出塞九首第一首戚戚去故里四句逺戍則一身死于兵亡命則父母罹其禍無故興得已之役民莫用命徒為法令所迫強赴程期耳棄絶父母恩二句交河逺戍既已棄絶父母莫報罔極之恩矣况敢亡命以纍父母乎是以吞聲即路也第二首走馬脫轡頭以下言不復顧恤父母之身也第三首欲輕腸斷聲二句言不待聞隴水而腸斷也第四首送徒即有長顧程期生死向前去緣上篇當速朽不復問苦辛生死各不能顧無暇復問苦辛矣第五首隔河見胡騎隔河即上交河我始為奴僕二句緣上篇圗麒麟第六首挽弓當挽強四句緣上篇樹功勳射人先射馬所以制侵陵之要一言盡之殺人亦有限四句如王嗣忠不肯貪石堡之功蓋開元將帥猶有持重而不茍為僥僥之意四句真圖麒麟人語立國自有疆出塞則踰越漢疆也第七首既一創之築城要路制勝在我不敢侵陵矣下篇則單于恐我城之立復空國來爭也第八首單于寇我壘四句以逸待勞閉壘不出俟其飢疲短兵步鬬彼之弓矢馬力無所用長故大奔也第九首從軍十年餘二句應樹功勳欲語羞雷同衆人以殺傷為功而我志在安邉故以雷同為羞也前云但欲制其侵陵此更反之內治意蓋深逺矣况在狄與戎况猶言豈也丈夫四方志二句寧無功而不爭茍得所以不辭固窮若既棄父母之恩又釀公家之禍焉得為丈夫乎後出塞五首前出塞征戍之人猶戀田里而憚行役風俗甚厚後出塞則天子好武不已天下化之其勇悍無賴氣象不待祿山作逆已知天下之將亂矣少年别有贈二句惡少群起看劔相笑無復父母井里之戀矣第二首此篇以朝暮二字結搆悲笳復動從暮字轉到來朝軍動也行軍對陳前九篇已詳此又補出中夜安營之事但歌軍容明無戰績又其分也落日照大旗望纛而集馬鳴風蕭蕭三句騎兵環外為衛步兵列幕然後各歸其伍也借問大將誰二句去病敢深入此句乃正按出塞起下篇四夷孤軍也恐是言外正見非其人也漢書霍去病傳注服䖍云音飄搖小顔乃俱作去聲讀耳第三首遂使貔虎士二句曰遂使者尤之也奸雄惡少孰非自在上者發之哉拔劔擊大荒所收非要地也日收胡馬群所獲非名王也二句言逢迎欺蔽慕虛名而受實禍也第四首獻凱日繼踵二句非言出師之功效也奚契丹同羅寶韋之屬本未嘗蠢動邉帥邀功生事日戮不侵不畔之小夷自以為功天子不知見其獻凱接踵真王兼鎮封崇亂階其實兩蕃固無虞耳漁陽豪俠地六句極形容幽薊富強尾大偏重然後轉到將驕第五首夲圖逺略欲開元冥之北豈知外重變生京師失守六郡良家之地俱為空村然則六合一家何苦重高勳而致畔亂乎此篇暗藏兩京淪沒重為開邉者戒仍止就出塞之士二十年妄思立功歸于僅免一身兒孫遂與兵終始言之詩人所以為無罪也窮老無兒孫與首篇及壯當封侯呼應蓋始期及壯封侯豈知窮老無後亦可為樂禍生事者鑑矣上恤其私而盡人之情則為采薇出車下苦其役而自抒其怨則為前後出塞故正得失者莫近于詩也别贊上人豆子雨己熟熟字以屋與職同押豆子句未詳萬丈潭閉藏修鱗蟄二句造幽幽字餘韻何當炎天過二句發興興字餘韻又反應壓字結以潛龍之見自喻兩當縣吳十侍御江上宅昔在鳯翔都至所以分白黑言當國家紛紜之際慎恤無辜即所以安反側招携貮使之長居臺諫未為無補不必事外逺索閉口休歎息下注樊夲仲尼一聮在朝廷一聮下按當從樊本言吳固安之于我則多負諍臣也意更曲折語更從順余時忝諍臣以下言一夫無辜猶必剖析况宰相誣枉斥逐乎公意蓋歎兩省不復有如吳郁者共救房琯故追論其事而謂昔實負之不留與同諍諫也發秦州乾元二年自秦州赴同谷縣紀行十二首漢源十月交頂無衣况聞山水幽此句對人事稠下有良田疇頂無食實恐人事稠顧懶拙塞田始微收顧生事豈復慰老大顧我衰日色隱孤戍四句題中發字大哉乾坤內二句發字餘音逺勢此詩以衣食二字為眼漢源四句言其地之暖可以有衣也栗亭四句言其産物之多不須憂食也密竹四句言風景之妙可以旅寓也此邦八句言秦州之不可居也日色八句乃發秦州之時也赤谷秦州至成都皆行萬山中艱險自赤谷始故曰方自兹村墟炊烟少未免飢餓加以貧病零落故有性命之憂非久客者不知其痛鐵堂峽山風吹遊子已藏慘字硤形藏堂隍堂字壁色立積鐵鐵字山形似堂壁立如鐵故謂鐵堂峽山氣隂塞重以冬月故行哀壑而徒旅悲涉層冰而我馬瘏也鹽井官作既有程起下知足汲井嵗榾榾顧有程出車日連連起下喧闐我何良歎嗟二句小人道長必漁利以病民若欲轉移其待君子當路乎此公之所歎也寒硤野人尋烟語謂山硤中無不向火之人則泝沿者之寒可知也法鏡寺畏途之中忽得清凉世界前此山行深寂悄然神傷乍經崖寺旅愁頓破故清晨而入亭午而出遂忘前路之久待也嬋娟碧鮮净暗藏雨後冥冥子規啼二句收轉神傷青陽峽憶昨登隴坂即塞外也後半極好龍門鎮過古鎮而見戍卒旌竿慘淡白刃繡澀歎彼鎮成臯此屯龍門豈相及哉故宿其地而問之中夜飲泣也石龕起四語四靣皆石畫出龕字天寒日淡逺道絶壑怪石四合皆如竒鬼猛獸森然摶人非公不能刻酷伐嶮寫此難狀之景仲冬見虹霓仲冬猶虹見則陽氣不收無以伸肅殺之威使蒼生安枕也苦云直簳盡篠簜且盡師老無成故假伐竹者以抒其悲積草嶺卜居尚百里而茆茨已如眼中見以來書眷我之深也同谷諸彥公尚未靣先以書候之報章欣然相迎故有此喜食蕨不願餘二句言粗有居食便可息肩不必更投足百里之外矣眼中見三字叙致變化即指倦休之地也泥功山起本三朝三暮黃牛如故乃將汨沒同注作及此不如乃將二字佳小兒成老翁方云小兒陷于泥中不能自出亦似老翁之力竭也哀猿透却墜說文透跳也鳯凰臺此詩極變西伯今寂寞對後王者群盜何淹留與上西伯寂寞彼此暗暗激射亦以二老天下之父自待也按公之志蓋在長飬人才以光中興之業而自傷為小人所忌不得入朝又不欲斥言故托之群盜為梗阻絶淹留也乾元中寓居同谷縣作歌七首七歌以擬四愁其音節則胡笳十八拍而竒健勝之七歌以第一篇作領下六篇乃分言之第一首嵗拾橡栗隨狙公拾橡栗與下劚黃精皆言不可倚仗他人固窮獨立之意中原無書歸不得為下弟妹逺隔起夲悲風為我從天來與末篇仰視皇天白日速首尾相應知我者天亦惟自守以俟天命而已方曰七歌結句俱有深意其言為我者四悲風自天天憐之也鄰里惆悵人憐之也林猿晝啼物憐之也溪壑回姿地憐之也至皇天白日速天不我憐人物又何問焉前後互應用意殊慘第二首鄰里為我色惆悵鄰里反對弟妹第五首白狐跳梁黃狐立狐指祿山作逆兩京皆為賊藪也第六首南有龍兮在山湫三句龍之蟄也時至則伸自比也蝮蛇東來水上遊比盜賊小人溪壑為我回春姿回春則蟄者起矣或云此篇為明皇作鑿甚第七首言若我未亂之時得致卿相則天下當不至此此共話夙昔懷抱增傷也然天意亦當厭亂矣白日速者回春不久也嗚呼七歌兮悄終曲七者復之數也今我悄然其悲懸知有終期矣木皮嶺再聞虎豹鬥帶上艱險白沙渡層次無一字不工細差池上舟楫渡字水清石礧礧醒白沙迥然洗愁辛頓挫洗愁辛反對畏途高壁抵嶔崟對上渡口下絶岸攬轡復三歎攬轡不漏我馬復三歎則前途仍可畏也退之示張籍詩乃規仿此種聮為長篇不露痕迹耳水㑹渡微月沒已久路暗也崖傾路何難地險也歌笑輕波瀾反對下千憂霜濃木石滑一聨即下文陟巘回眺積水外二句朱云言水勢洶湧非登岸而回眺水外幾不知天水之為二也下句竒句湘靈曰舟行積水衆星皆濕猶言日月沐浴出入昆明則今登山四眺始知是乾耳飛仙閣棧雲闌干峻至所歷高閣道雖險而結搆堅牢闌干在旁故奔濤出其下亦不足畏也惟是歇鞍後四望所歷始覺其高峻梯石結搆牢雖知其牢然勢則危矣曲折入神萬壑欹疏林起風字歇鞍在地底二句倒醒飛閣妙妙往來雜坐卧方云是日暮投店之景我何隨汝曹安溪云汝曹何隨我倒裝法按言我何相隨有汝曹乎五盤謂棧道盤互有五重俯映江木疏襯出閣道之髙地僻無網罟頂上俯字野人半巢居頂上仰字喜見淳朴俗二句已伏故廬歸思成都萬事好二句結句已到自然龍門閣仰望垂線縷至末蜀道之龍門與天對峙仰望雲天只一線縷耳不知何人鑿此滑石以繫浮梁過渡時頭目搖眩稍失足則不可起矣往聞瞿唐大庾之險而未經今歷此險之後無數恐懼當從此起也浮梁裊相拄閣字目眩隕雜花二句寫險艱乃爾細麗石匱閣唐子西詩話最愛暝色帶逺客五字信甘孱懦嬰二句言山水幽異處不能停息往探其竒雖由行李催迫亦因吾身孱懦無濟勝之具耳所以深有愧于陶謝也桔柏渡江永風蕭蕭永字起下連字連笮動嫋娜二句刻出渡竹橋時景急流鴇鷁散二句方云流急故散岸絶故驕高通荆門路承上東逝二句就渡字一縱不測言寒江東逝尚得朝宗若余則方竄走窮山西轅未知所稅也妙在隱躍有餘味前登但山椒指西轅劍門宋子京知成都過之謂人曰老杜連山云云此四句蓋劍閣實録也兩崖崇墉倚門字一夫怒臨關設險天下百萬未可傍顧壯字珠玉走中原顧北向岷峨氣悽愴顧抱西南氣悽愴所謂漏天也二語言其險而富并吞與割據二句盜賊據險君失其德之罪也恐此復偶然二句到此說明不得故謬其詞默惆悵三字包藴無限意思鹿頭山及兹險阻盡顧慰飢渴冀公柱石姿慰飢渴斯人亦何幸二句踰嵗月而已為幸者傷前此非人而又恐公去而無其繼也成都府正用仲宣七哀之旨落句故謬其詞翳翳桑榆日二句明皇晚而幸蜀改名曰南京升為成都府故云大江東流去故鄉在東下云側身望川梁自恨不如此水也喧然名都㑹府字信美無與適所謂信美非吾土也鳥雀夜各歸此句興下羇旅應上未見故鄉初月出不高臣子一例故以肅宗比月按此時肅宗之立已久厚齊說乃宋人喜附㑹耳厚齊云初月出不高衆星尚爭光謂肅宗初立盜賊未息也初立之說固非然作者託寄自在王室微弱故結句云云此魯連所謂衆人不知止為一身者也義門讀書記卷五十一

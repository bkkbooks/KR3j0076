body:
  text: 義門讀書記卷十五翰林院侍讀學士何焯撰前漢書髙帝紀寬仁愛人意豁如也寬仁愛人起自布衣代秦之本故首著之令諸大夫曰下卷詔書有云秦民爵公大夫以上令丞與亢禮諸大夫當謂此也生孝惠帝魯元公主至遂不知老父處及此二事王氏所謂記繁而志寡者也服虔以元為長韋昭以元為諡師古謂韋説失之按西京人質無文長公主為元理况一代更無稱元者歸乎田成子豈非諡耶韋説無妨勝服秦二世元年秋七月陳涉起蘄至陳自立為楚王遣武臣張耳陳餘略趙地八月武臣自立為趙王始皇末年亡聚山澤者所在而是故陳涉一呼雲會饗應亂固不始于二世也特繼世者復加以昏虐益速其亡耳是月項梁與兄子羽起吳至秦將章邯破之總敘于此見秦已有必亡之勢秦二年秦泗川監平將兵圍豐師古曰泗川郡川字或為水其實一也按地里志作泗水郡川字傳寫之誤作水者是也秦三年沛公從碭北攻昌邑遇彭越越助攻昌邑史記云沛公引兵西遇彭越昌邑因與俱攻秦軍戰不利還至栗云云下乃云與魏將之軍并攻昌邑沛公蓋與越再攻昌邑也襄侯王陵降師古以晉灼王陵即安國侯王陵之説為非按下云因王陵兵從南陽迎太公吕后於沛亦出武關之道則此王陵即安國侯王陵也襄侯則初起時所假封爵耳功臣表云以自聚黨定南陽漢王還擊項籍以兵屬從非别一人可知章邯舉軍降項羽羽以為雍王羽擅以邯為雍王已不守懷王之約矣秦相趙髙恐乃殺二世使人來欲約分王關中沛公不許不許賊臣真能扶義而西者矣張良曰此獨其將欲叛至大破之藍田南此即韓信所以破齊也元年與父老約法三章耳此約法與上苛法對因紀末有初順民心作三章之約改約字為讀始厚齋王氏然文紀中宋昌有約法令之語刑法志言約法三章者非一當仍舊也傷人及盜抵罪觀注中服虔李竒解抵罪之義則盜亦當以臧之多少科罪今法惟竊盜計臧強盜則已行而但得財者不分首從皆斬或恐過也可急使守函谷關注文穎曰是時關在宏農縣衡嶺今移東在河南榖城縣按地理志宏農郡有宏農有新安武帝元鼎三年徙函谷關于新安當為宏農之新安也河南郡有榖成師古曰即今新安然則非漢宏農之新安明矣潘嶽西征賦注嶽以元康二年五月十八日乙未自洛陽之長安二十五日壬寅次于新安之千秋亭榖成去洛陽甚近疑非漢武徙關之地文穎注及後書郡國志更當詳考以求真是二年拔隴西至繕治河上塞拔隴繕塞關中安固而後東兵故秦苑囿園池令民得田之既反暴政且益足關中食施恩德至復勿繇戍稍休息其民使有樂生之心又略知禮教而後用之此當日蕭何治關中規模也兵出無名至天下之賊也天下苦秦并起亡之秦亡而復搆兵以爭中原劉項曲直未有分也明其為賊而後民望在劉不在項天下洶洶皆知非以自利動非無名之師比矣漢王以故得劫五諸侯兵師古以五諸侯為常山王張耳河南王申陽韓王鄭昌魏王豹殷王卬按韓王是韓信不當云鄭昌漢王拜越為魏相國令定梁地越已有衆三萬故得獨當一面兵復大振與楚戰滎陽南京索間破之史記書此戰在六月立太子下此為得之三年冬十月甲戌晦日有食之十一月癸卯晦日有食之兩月再蝕與魯襄公二十一年同歷家云或此月食在交前而次月復食在交後亦時有之後孝文三年同按史記孝文本紀但書十月丁酉晦食項羽數侵奪漢甬道漢軍乏食時關中大飢僅仰敖倉粟既為羽侵奪甬道滎陽即以乏絶不守其後劉賈入楚地佐彭越燒楚積聚而曹咎等守成臯亦為漢所破矣項王必引兵南走至破之必矣項王既引而南不能驟為河北聲援取趙亦可以萬全矣轅生之計即伍子胥所以覆楚也晨馳入張耳韓信壁而奪之軍乃使張耳北收兵趙地已舉燕趙則前所請益三萬人可收之以自將若盡奪其軍則張耳所北收趙地之兵豈足以東擊齊哉使盧綰劉賈將卒二萬人至佐彭越燒楚積聚既奪信軍乃可分二萬人與劉賈助彭越絶楚糧道矣四年漢王羽相與臨廣武之間而語之間按萟文類聚當作澗然以上文孟注兩城相對之説觀之則如字也梟故塞王欣頭櫟陽市章邯罪過於欣獨梟欣頭者以其既降漢而復叛去故也五年漢王為發喪哭臨而去誅羽以正君臣之義仍為發喪哭臨者嘗受命懷王約為兄弟故也漢王還至定陶馳入齊王信壁奪其軍羽死所畏惡者信故乘其不意而奪之軍此正所以息天下之兵端間不容髮者也後陳豨之獄使信被參夷之禍則于報功之義儉耳義帝亡後至都下邳仍以義帝為言終擊楚之殺義帝者之事亦使信不自以徙王驚疑其家在楚又本所欲得也民以飢餓自賣為人奴婢者以飢餓自賣為人奴婢則不獨以罪沒身始為官奴婢矣今賣身劵契必云口食不周其來逺矣燕王臧荼反臧荼項氏所置又負殺故主之罪故懼誅最先反六年西有濁河之限晉灼注孟津號黃河故曰濁河也按孟津不在齊界字有誤或是鬲津地理志平原郡有鬲縣平當以為鬲津韓王信等奏請以故東陽郡鄣郡吳郡五十三縣立劉賈為荆王文穎注吳郡本會稽也當以會稽治吳故亦得稱吳郡當班氏作書時亦未分也此正與下郯郡義同今上尊太公曰太上皇秦始皇追尊莊襄王為太上皇漢仍其舊師古不預治國故不言帝之説非也皇帝本兼採三皇五帝義三皇古之盛天子也顔説出蔡伯喈蓋據定陶恭皇孝德皇諸號以後事臆斷七年民産子復勿事二歲大亂之後户口減半優之使生聚日滋也九年罪三族按刑法志孝文詔明指父母妻子及同産為三族則注中張晏説為是如淳説不惟禍及舉宗復妄增母妻二異姓一言之誤其為不仁甚矣以今法準之亦如張説賢趙臣田叔孟舒等十人至盡拜為郡守諸侯相用之則國家收其效彼亦無所妄覬矣十年令諸侯王皆立太上皇廟于國都失禮之始至韋元成貢禹始覺其非十一年御史大夫昌下相國臣瓚注周昌已為趙相御史大夫是趙堯耳按當時周昌疑以御史大夫行趙相事趙堯特以御史守御史大夫故詔書仍言昌也十二年陳平灌嬰將十萬守滎陽至亡可蹻足待也五代郭威之事近之上尊號曰髙皇帝後世人主生上尊號不祥莫大焉贊置祠祀官則有秦晉梁荆之巫漢之報本逺矣漢承堯運至得天統矣順民心得天統此髙紀眼目也惠帝紀外郎滿六歲二級蘇林以外郎為散郎按外郎宜對在中者而言非員外之散郎也後世散郎稱外郎者乃借用舊名令郡諸侯王立髙廟諸侯不得祖天子而左氏云鄭祖厲王似因諸侯王得立髙廟附益之也元年春正月城長安髙帝六年令天下縣邑城至惠帝元年乃城長安先使百姓有所保聚而後規拓京師後世所不及也二年郃陽侯仲薨子封王而父仍侯爵三年春發長安六百里內男女十四萬六千人城長安以漸城之則民不勞費可給檢察可精漢初休息天下事必有次第若此即國祚悠久之氣象也六月發諸侯王列侯徒隸二萬人城長安諸侯王逺近地異故豫以六月發之使各及期而至其築城仍在春正月也六年女子年十五以上至三十不嫁五算産子復二歲不嫁謫五算與武帝之口賦重困民産子輒殺者可以觀世運矣起長安西市修敖倉五年九月城成明年六月乃始起市其修敖倉是當時亦有兩都並建之意髙后紀取後宫美人子名之以為太子名之名為皇后所産子也是少帝非劉氏乃大臣既誅諸吕從而為之辭耳以其能匡漢祚立太宗功既大故後世不之求備文帝紀願請楚王計宜者隂安侯頃王后皆婦人琅邪王疏屬帝言請楚王計宜斯識體矣賜民爵一級女子百户牛酒後書注云姚察云女子謂賜爵者之妻史記封禪書百户牛一頭酒十石臣賢按此女子百户若是户頭之妻不得更稱為户此謂女户頭即今之女户也恩當普洽所以男户賜爵女户賜牛酒按此説近之又按昭紀始元元年秋七月賜民百户牛酒元紀初元元年夏四月賜吏民五十户牛酒而别無女子百户五十户之文或者吏民但賜牛酒而不賜爵則其妻不别沾賜非女户也惟章帝元和二年夏四月詔書獨繫以經曰無侮鰥寡惠此煢獨加賜河南女子百户牛酒或當如章懷之説詔書曰河南則止于河南尹所屬縣不普洽天下與前書中事不同元年因賜天下民當為父後者爵一級按當為父後正謂嫡長耳顔注非其曰非己生尤乖於理皇太后曰立太子母竇氏為皇后先建太子後立皇后者時代王王后先卒竇姬乃以子貴也立皇后稱皇太后命得著代之意立太子母上史記有諸侯皆同姓五字蓋周之天子逆后於媯薑之國今諸侯皆同姓則不可拘以舊制必貴姓也然自此景立王武立衛安于立賤矣此等皆漢事與三代始判分處况此時固亦有長沙王在乎唯中尉宋昌勸朕至官皆至九卿髙文二帝氣象雖不同其開誠無飾則一也二年為吏及詔所止者遣太子周公留相伯禽之魯此其遺意人主不德至災孰大焉自秦以來不畏于天至文帝始聞此言九年春大旱十年冬行幸甘泉將軍薄昭死無興革大事其簡如此後漢諸紀書事太煩碎矣十三年今厪身從事至其除田之租稅盡除租稅不可為經常蓋欲極所以勸農之道耳非帝之節儉亦莫之能行也後元年孝惠皇后張氏薨不以后禮喪葬故不曰崩書曰皇后則但退處未嘗廢也此文帝之失張晏云廢處北宫者仍外戚傳之文後卷景紀中三年顔注云廢后死不書六年以中大夫令免為車騎將軍屯飛狐至次棘門曰屯曰次屯有分地次備調發也後書郡國志上曲陽故屬常山恆山在西北注引晉地道記云自縣北行四百二十五里恆多山坂名飛狐口按此則飛狐口即代郡之常山關與上曲陽相接者也句注則雁門關也七年以下服大紅十五日小紅十四日纖七日釋服史記索隱曰以下謂柩已下於壙語尤分明足明三十六日斷自已葬之後矣禮服不講乃有易月之謬説顔師古及劉貢父駮正者是然大紅小紅當如應氏之説閻丈百詩云漢文此制行之三百七十年魏武帝始令葬畢便除無所為三十六日之服者後又不知何代以三十六日為除服期而不論葬與否唐元肅二宗之喪又降三十六日為二十七日則所謂以日易月者於是焉始按元肅二宗之喪為二十七日見常衮議中贊斷獄數百幾致刑措貢禹言文帝貴廉潔賤貪汙吏坐臧者皆禁錮賞善罰惡不阿親戚罪白者伏其誅是帝之為政不専于寬也特刑不濫耳張武舊勛受賂不飭未至大惡故加賜以愧之豈槩施諸下姑息成風致貪吏放手哉景帝紀丁未太子即皇帝位文帝以乙巳葬既葬乃即位也史記云太子即位于髙廟此皆典禮所徵不宜削略四年十月戊戌晦日有蝕之貢父曰此年記事十月在年終誤按此十月或九月之誤史記是年有後九月然近下中四年亦記十月于年終七年夏四月乙巳立皇后王氏丁巳立膠東王徹為皇太子先立皇后而後立太子與文帝故事異中二年令諸侯王薨至大行奏諡誄䇿䇿者初封及除官之䇿命注謂哀䇿者非四年死罪欲腐者許之以腐贖死是則異于使無罪幼童輕絶其世傷天地生物之和者矣後二年今訾算十以上乃得宦董仲舒所謂選郎吏以訾冨指此訾算也張釋之司馬相如皆以訾算為郎耳武帝紀建元元年丞相綰奏所舉賢良至請皆罷自此乃一于儒術士始尚經學而揚于廷者有仲舒之對矣不可謂非衛綰之功也二年御史大夫趙綰坐請毋奏事太皇太后及郎中令王臧皆下獄自殺直筆五年夏四月平原君薨可不書于本紀元光元年於是董仲舒公孫宏等出焉按仲舒傳謂州郡舉茂材孝廉自仲舒發之而是年十一月已有郡國各舉孝廉之令則仲舒對䇿當在元光之前此總舉其得人之著者言之四年魏其侯竇嬰有罪棄市坐矯先帝詔非獨如師古所云黨灌夫也元朔二年於是藩國始分而子弟畢侯矣元朔二年藩國始分然而不能絶淮南衡山之謀也五年其令禮官勸學至學者益廣其議本發于宏故先著詔書以章人君興起絶學之美而仍不沒其實焉元狩元年丁卯立皇太子因治淮南獄聞武安之謀故立太子四年青至幕北圍單于至兩軍士戰死者數萬人書功而必并言所喪戰士之多以見雖幸而勝得失僅足相償所以為良史明年復書馬少亦以終前事也五年徙天下姦猾吏民於邉秦始皇三十四年適治獄吏不直者築長城及南越地此徙天下姦猾吏民於邉其用同也元鼎三年徙函谷關於新安應劭注時樓船將軍楊僕數有大功恥為關外民上書乞徙東關以家財給其用度按五年南越反楊僕始拜樓船將軍事在徙關之後以武帝之雄豈展拓都畿費出臣下之家財乎應注出於流傳非實事也元封五年初置刺史部十三州是時刺史不常厥居至東漢始有治所顔注微誤劉昭續書郡國志注補謂傳車周流匪有定鎮者得之其令州郡察吏民有茂材異等史記儒林傳有秀才異等輒以名聞可證茂之為秀矣應劭所云避光武諱是也秀才所由命名則出于管子小匡篇其秀才之能為士者則足賴也之文太初元年正歷以正月為歲首師古曰謂以建寅之月為正也未正歷之前謂建亥之月為正今此言以正月為歲首者史追正其月名按既曰正歷以正月為歲首明前此不改月固以建寅之月為正月矣若前此果謂建亥之月為正則當云以建寅之月為正也更從識者質之贊有改正朔之文故師古云然發天下謫民西征大宛謫者獨非民乎而使二十萬衆暴骨異域其不喪而僅報虐于子孫幸耳蝗從東方飛至敦煌從東方飛至敦煌則幾遍天下矣書其所見辭微而顯二年籍吏民馬補車騎馬此籍馬為伐宛也征和四年上耕于巨定服虔曰地名也近東海按服説亦據溝洫志東海引巨定之文蓋不悟東海乃北海之訛耳贊孝武初立卓然罷黜百家至何有加焉但美其文德而不及武功末始以不改恭儉一語見意可謂微而章矣自蔚宗以下未能然也昭帝紀始元二年以宗室毋在位者至辟疆守長樂衛尉此霍光之善亦足以間執燕與廣陵之口遣使者振貸貧民毋種食者至毋令民出今年田租稍修文景之政天下所以復安五年夏陽男子張延年至要斬即成方遂兩書之以傳疑也元鳳二年三輔太常郡得以叔粟當賦此事得禹貢甸服之本意可視年之豐嗇時時施行也四年毋收四年五年口賦貢禹上書言古民無賦算口錢起武帝征伐四夷重賦于民民産子三歲則出口錢故民重困至于生子輒殺宜令兒七歲去齒乃出口錢年二十乃算如淳所引漢儀注乃元帝以後之制也三年以前逋更賦未入者皆勿收如淳曰更有三品有卒更有踐更有過更按其實則二也踐更即是代人卒更但以月計私得雇直過更則是總代人繇戍以歲計人輸戍邉三日之直于官官為給與久住之人也蓋卒更即古者田賦出兵之制戍邉三日則仿力役之制為之雇更即雇役之法所昉贊承孝武奢侈餘敝至戶口減半武帝之失因事著見所謂不溢美不隱惡也宣帝紀皇太后歸長樂宫宣帝秋七月即位十一月太后乃歸長樂宫者懲昌邑前事也本始元年詔內郡舉文學髙第各一人師古曰中國為內郡緣邉有夷狄障塞者為外郡成帝時內郡舉方正北邉二十二郡舉勇猛士按此為兩得之今取士以文章而為緣邉設解額誤矣二年以水衡錢為平陵徙民起第宅於為人後之恩有加隆也地節二年乃復使樂平侯山領尚書事至以傳奏其言漢家氣象至宣帝復一變漸已任法不任人矣侍中尚書功勞當遷至品式備具久于其任則諳習故事故品式備具也由此尚書權重人主得倚以裁決庶務東漢政歸臺閣不任三公原于宣帝也四年詔曰父子之親至延尉以聞此詔最得法意非前人不知及此也蓋古者議事以制子首匿父母等固在所原宥耳父母匿子情雖同而平居失于不教故坐之然猶必上請將權衡其輕重以行法或直原宥之也其令郡國歲上繫囚至課殿最以聞令法監斃罪囚管獄官有罰蓋始于宣帝也元康元年其博舉吏民厥身修正至各二人宣帝雖不甚用儒然於通經者未嘗不加勸誘亦武帝家法也二年聞古天子之名至其更諱詢宣帝因人有以觸諱犯罪者故更其名然則生而諱名前此已然疑起秦世也三年封賀所子弟子侍中中郎將彭祖為陽都侯平帝元始元年始著令諸侯王公列侯關內侯亡子而有孫若子同産子者皆得以為嗣今彭祖特以賀舊恩得封蓋從來殊數也四年諸年八十以上非誣告殺傷人他皆勿坐誣告人與殺傷人同在不以老耄縱舍之科當時誣告之重如此神爵元年朕之不明震於珍物服虔曰震驚也蘇林曰震動也按以震為驚乃與下懼不能任之意協服説是三年起樂遊苑樂遊苑猶景帝之德陽宫皆自作廟也微眇時尤樂杜鄠之門故以杜東原為初陵而以樂遊名苑甘露二年其以客禮待之位在諸侯王上王者所客議中已發其端待以殊禮則恩自天子出耳元帝紀漢家自有制度至何足委任德教不可不純俗儒不足委任宣元各有所偏或治或亂又非盡由所操之術其天資乃判智愚也元紀初元三年丞相御史舉天下明隂陽災異者至或進擢召見隂陽月令發于魏相至此言隂陽者遂盛永光元年詔丞相御史舉質朴敦厚遜讓有行者光祿嵗以此科第郎從官光祿亦以此科第郎從官則周官宰夫正嵗于宫中羣吏書其能者與其良者以告小宰大宰之餘意也稼秋罷如説為近稼秋罷不成文義四年詔曰安土重遷至令明知之法窮則變此詔得之五年潁川水出至士卒遣歸此便民善政建昭五年方春農桑興至公卿其明察申敕之此今法農忙停訟所始贊吹洞簫如注簫之無底者按王褒頌曰原夫簫幹之所生于江南之邱墟洞條暢而罕節標敷紛以扶踈是洞簫以一幹無節故得此名博雅謂簫大者無底小者有底如注非也自度曲被歌聲從注中瓚説則度讀本音然班之文義先度而後被之于歌則應説為諦也貢薛韋匡迭為宰相顔師古以韋為韋賢按韋賢為相在昭宣之際則此應謂其子元成也成帝紀宣帝愛之字曰太孫漢諸帝髙祖宣帝光武興于民間以字著獻帝遜位字亦著焉唯成帝之字則以古無太孫之號宣帝以世嫡故特呼之亦傳為字後世遂目世嫡皇孫曰太孫也建始四年中謁者丞陳臨殺司隸校尉轅豐于殿中司隸校尉天子倚以清輦轂而中人得以殺之豈非祿去公室之兆乎河平三年光祿大夫劉向校中祕書劉向校中祕書孟堅大書于帝紀尊經籍也陽朔元年京兆尹王章有罪下獄死王章不言為王鳳所害于體例不能一也鴻嘉四年被災害什四以上至思稱朕意如此則雖遇凶災尚可不至流為寇賊亦治標之善䇿永始二年吏民以義收食貧民至萬錢以上一年如此乃成國體安桓預下詔書計金受官則市賈矣且安桓爵得至關內侯此亦不至甚濫也冬十一月行幸雍祠五畤建始二年罷雍五畤至此始復而于後年總書之四年出杜陵諸未嘗御者歸家宣帝之葬至是三十六年矣以無繼嗣故出之也綏和元年詔曰朕承太祖鴻業至其立欣為皇太子以此詔文觀之哀帝背大宗顧私親其罪于是為大因此傷元后之心姦臣煽惑借以竊權國之將亡未有不基于倫紀不立者其微則又自成帝昧夫婦判合之重賤者得以色升自貽絶嗣并及宗社也永始元年五月封王莽為新都侯六月立皇后趙氏適相符會終成禍胎豈偶然哉封中山王舅諫大夫馮參為宜鄉侯馮參有賢名而此時不固讓宜鄉之封他日傅太后修怨幾至覆宗亦自昧其幾也以大司馬票騎大將軍根為大司馬票騎將軍疑不當有大字贊可謂穆穆天子之容者矣謂有其容爽其德也哀帝紀田宅亡限至皆無得過三十頃哀帝行限田之制本善王莽之行王田蓋務以祈勝而致不便于民也博士弟子父母死豫寧三年漢制之失莫大于仕者不為父母行服三年達禮于是焉廢其豫寧者不過自卒至葬後三十六日而已哀帝既許博士弟子豫寧三年何不推之既仕者乎至安帝元初三年鄧太后臨朝初聼大臣二千石刺史行三年喪至建光三年安帝親政宦豎不便復議斷之桓帝永興二年初聼刺史二千石行三年喪延熹二年復斷之若公卿則終漢之祚不議行三年喪服也建平元年太皇太后詔外家王氏田非冢塋皆以賦貧民自此而王氏家施漸及民矣二年定陶恭皇之號不宜復稱定陶去定陶而直稱恭皇以太上皇為比也待詔夏賀良等至宜改元易號張衡謂讖起哀平則夏賀良其漢人內學之祖歟平帝紀諸有臧及內惡未發至不以小疵妨大材此莽羅致屏棄不齒之人被以望外過恩使為已用耳莽謂諸有臧及內惡未發者不以小疵妨大材曹操亦謂若必亷士而後用則齊桓其何以伯世篡賊所求往往必于其類以為此屬皆計不反顧不得不奮效鳴吠以圖富貴一時乃可惟我所使也元始二年諭説江湖賊至送家在所收事收事猶今編入里甲當差三年立官稷及學官自周衰學廢至王莽復天下皆立學官稷似瓚説得之五年漢元至今十有餘萬人至致教訓焉時諸侯王皆同編户民無足憚者然以十餘萬之衆慮諸劉相結起事故隂置其所厚黨於王氏斫喪公室者隂檢束之非教訓其人也其出媵妾皆歸家得嫁如孝文時故事出媵妾歸家得嫁者莽欲階此奪孝平皇后之志賴其女賢耳凡姦人為一善事亦必為其私故可誅也義門讀書記卷十五

body:
  text: 義門讀書記卷十六翰林院侍讀學士何焯撰前漢書諸侯王表周公康叔建於魯衛至亦五侯九伯之地左傳但言五侯九伯汝實征之非兼有其地蓋班氏誤也若魯衛各數伯里則以方計之耳被竊鈇之言竊鈇事必出諸子書注中應説近之而不詳顔乃迂謬王子侯年表王莽擅朝偽褒宗室侯及王之孫焉王孫畢侯則近屬無不分裂無復大藩之可懼矣居攝而愈多非其正故弗録例正而嚴號諡姓名此姓字乃衍文蘇氏洵求其説而不得遂謂加以異姓之例示天子不能有其同姓以戒權歸于下不思莽偽褒宗室居攝愈多班氏固云非正弗録無在此表者也况此表自孝昭以訖哀平前此者安能曲傳私説哉髙惠髙后文功臣表是以燕齊之祀與周並傳禮記武王克殷反商未及下車而封黃帝之後于薊陸德明云黃帝姓姬君奭其後也故燕齊並稱三人為衆雖難盡繼宜從尤功從其尤者亦非以三人一人為限注孟服二説皆失之景武昭宣元成功臣表將帥受爵至續元功次云以應本約故亦謂之功臣表可續元功之次也元功即指髙惠髙后孝文功臣所謂以昭元功侯籍者也外戚恩澤侯表其餘后父據春秋褒紀之義至是以别而敘之皆不應功臣本約不可續前二表之後故别之為恩澤也廣博言其濫百官公卿表或説司馬主天司徒主人司空主土是為三公或説是諸侯執政之卿天子六卿大國三卿猶之大國三軍半于天子之六軍也自秦漢皆沿諸侯之制太尉秦官應劭曰自上安下曰尉武官悉以為稱按宋時以太尉為武官相呼通稱本應氏説奉常秦官又均官都水兩長丞都水屬太常治都以內之水故其官曰長山陵所在尤以流水為急故太常有専責也郎中令秦官至更名光祿勳當從注中如淳説勳讀閽今閩越間猶有此音下更中大夫為光祿大夫亦以在宫門內耳僕射秦官至有主射以督課之僕射之義如此則已矣秦官不徵諸漢書乃反附會周制耶以射為讀如夜音者尤謬宗正秦官至更名宗伯應劭曰周成王之時彤伯入為宗正也師古曰彤伯為宗伯不謂之宗正按宗正亦謂之宗伯王莽緣此以改官名應説非無本但是後儒曲説與周官不合故班氏斷為秦官中尉秦官至更名執金吾崔豹古今注曰金吾棒也以銅為之黃金塗兩末近代言金吾者祖之明人呼錦衣衛指揮使為大金吾以所領官校御仗中持此云太子太傅少傅古官至舍人庶子先馬舍人屬二傅則賔友也水衡都尉屬官有上林均輸御羞禁圃御羞與禁圃連類而言則是出珍羞之地名如説在藍田者為近不得如師古指御宿川以當之也越騎校尉掌越騎如淳曰越人內附以為騎也晉灼曰取其材力超越也按騎非越人所長似晉説是不當如師古以下文胡騎比例也元朔五年不書列將軍按此年長平侯衛青為大將軍不書脫漏於三劉後也元狩三年廷尉張湯為御史大夫按史記表湯為御史大夫在二年此疑誤古今人表今人則褒貶具于書中雖云總備古今之略要其實欲人因古以知今也師古謂不表今人其書未畢故也恐非而諸子頗言之至故博采焉此班氏以史遷但考信六藝猶有踈略故復著此表存其大都雖百家所言不遺其人也禮樂志夀何以不若髙宗師古注享國五十九年故云夀然石經云肆高宗之享國百年如五行志劉向傳言髙宗百年者非一周道始缺怨刺之詩起怨刺起人表注以為懿王時漢興樂家有制氏服虔曰魯人也按周樂在魯故制氏猶傳其聲律周有房中樂宋祁曰周上有曰字按有曰字為是蓋相傳唐山夫人云然而孟堅所見非周之舊特楚聲也與下曰本舜招舞也義同孝惠二年使樂府令夏侯寬備其簫管按武帝始立樂府此樂府令疑作大樂令采詩夜誦師古曰其言詞或祕不可宣露故于夜中歌誦也按夜誦與祕祝不同豈為不可宣露哉下文云昏祠至明蓋慮臨祭或以倦惰獲罪于天神地示故先教之夜誦以肄習樂童也西皓含秀垂穎續舊不廢續猶嗣續也不曰登新而曰續舊善言天地生物之心矣元冥易亂除邪革正異俗兆民反本抱素懷朴書所謂朔易者其義如此丞相匡衡更定詩六章詩甚凡鄙乃欲更定相如輩所作不自量矣天馬以下十章天馬之歌雜以析酲之語臚于郊祀其如樂何景星空桑琴瑟結信成空桑琴瑟見周禮大司樂夏至祀地示所奏也今漢郊廟詩歌未有祖宗之事至所為發憤而增歎也後之作史者於本朝制作能昌言以折其衷若此者罕矣刑法志一同百里至是謂千乘之國百乘千乘惟此及康成注周禮為審宋儒以百里出千乘後人并以十里出百乘謬矣踵秦而置材官於郡國至修武備云七語中括盡一代兵制古人有言天生五材至帝王之極功也此兼為建武以還悉罷郡國都尉之官罷材官樓船士歲時不講肄武備言之命甫侯度時作刑以詰四方至用重典者也志中雖序甫刑而無一言及于金贖蓋以唐虞之法止於官府學校鞭朴輕刑而又情法可議者穆王則五刑皆得罰鍰以免衰世敝法不可以訓故從削略而於蕭望之傳中駁難張敞之議致其意焉勸趣農桑減省租賦此平刑之本省刑罰薄稅斂深耕易耨三者實相為表裏選張釋之為廷尉罪疑者豫民主於平刑而又必得其人斯民實被其澤非徒為寬柔姑息縱舍有罪而已其減笞三百曰二百至畢一罪乃更人隋行新律除訊囚酷法考掠不得過二百行杖者不得易人枷杖大小皆有程式蓋亦本此今行笞五則更一人宜禁止於是選于定國為廷尉選張釋之為廷尉招進張湯趙禹之屬於是選於定國為廷尉大書治亂得失以為法戒非獨文章照應之法上罪梏拲而桎即所謂身親三木也故俗之能吏公以殺盜為威按今俗頗有此弊然盜得財而未傷人者戮起意一人而流宥其餘固得古人用刑之意專殺者必有報虐之隂禍不可不戒也食貨志農民户人已受田周禮載師注引此作農民户一人已受田脫一字則文義不可曉庠序之異者移國學於少學諸侯之國學為少學不敢擬天子之太學也貴粟之道在於使民以粟為賞罰至令出而民利者也以下不過戰國權宜之計又李商末流也以術籠取富民使粟入於官錢歸於農茍便目前詫為兩利數年之後爵不足重富亦無餘雖修賣爵之令應者漸少至於裁價招民國體大壞又其窮也不得不趨丐奪而告緡鹽鐵之徒出矣洪範傅説有作為姦詐以傷民財豈非朝氏作法於貪乎邊食足以支五歲可令入粟郡縣矣爵罔及惡德可以入粟得之人主礪世之柄去矣况復入粟郡縣不顧其後乎以中鹽變易賣爵明制為最善矣足支一歲以上可時赦勿收農民租誘民入粟而勿收其租豈非欲取故與朝三暮四之術乎是故漢文之除租不如三代之什一也乃下詔賜民十二年租稅之半至宫室列館車馬益增修矣自髙帝以來儉素之美至景帝稍改前此五六十年未嘗以天下為樂也漢祚之長安得不差肩三代乎人人自愛而重犯法至固其變也人人自愛以下管子所謂倉廩實而知禮節也於是罔疏而民富以下孟子所謂飽食暖衣逸居而無教之弊也禮義不明則淳厚之俗未幾而散故霸者之治易興亦易衰難以維持經久也見稅什五如今者計所收彼此均分吳地賦重則有不止於此者故平都令光教過以人挽犁以人挽犁似始於此故事歲漕關東榖四百萬斛至可以省關東漕卒過半此即後代和糴所本二年齊地飢至毋與民爭利常平倉猶微寓損上益下之意何謂與民爭利此諸儒毁所不見耳榖石三百餘正為常平法但行於邉郡關東未遍也漢氏減輕田租至天下謷謷然陷刑者衆王莽亦仿董生之意而不度時宜行之過當遂擾天下凡輕重斂散之以時則凖平守凖平使萬室之邑必有萬鍾之臧臧繦千萬上凖平句其始事也必行之經久而後能有藏蓄守字極有關係近刻脫下守凖平句者失之錢輕則以術斂之重則以術散之貨物必平此中即兼寓斂散民粟之術矣公孫宏以宰相至然而無益於俗奉已而不在民所以無益於俗也益廣開置左右輔當從平準書作益廣關開字誤也式既在位至上不説卜式始進不正一旦更弦誰能聼之不敢言輕賦法矣輕史記作擅謂常法正供外擅取諸民以訾給所過軍也徐廣注云擅一作經謂不顧經常法則此刻輕者傳寫誤也當改作經租稅祿賜皆以布帛及榖使百姓一意農桑元世祖不師此意而承襲趙宋之會子金源之交鈔亦不善變法矣哉樂語有五均周書大聚解市有五均早暮如一送行逆來振乏救窮其樂語之所本乎郊祀志能知四時犧牲壇場上下氏姓所出者以為宗師古曰宗宗人按宗人宗伯之屬周禮春官有都宗人家宗人禋于六宗師古以乾坤六子之説為是按六子乃所畫之卦象豈可指為六神乎天宗三地宗三則與下山川重復要之孟説為長設射不來不來者諸侯之不來朝者也史記作設射貍首貍首者諸侯之不來者也徐廣注貍一名不來合七十年而伯王出焉師古曰七十當為十七今史記舊本皆作十七字按漢書中當據史記刋正者甚多不止七十之為十七也小顔當日多拘於俗師之傳未及博求是正耳自齊威宣時騶子之徒至不可勝數也此一段是秦漢淫祀根柢亦此志之樞紐也薄山者襄山也襄山當從史記作衰山揚雄河東賦爪華蹈衰而雍有日月參辰南北斗仲馮曰二十八宿既已備而又言參與南北斗衍字也按參即叄字謂三辰也仲馮誤以參昴當之耳對曰四帝有白青黃赤帝之祠無黑帝者秦自以水德當其一也以為漢乃水德之時河決金隄其符也河決豈佳事而云水德之符乎於是作渭陽五帝廟作廟以祠五帝黷禮甚矣置賈生而用妄人無稽之説豈非不學之纍乎於是始更以十七年為元年此人主自改元之始不祥莫大焉古天子常以春解祠解即袚除也張晏説是齊人少翁以方見上至天子自帷中望見焉今人謬以少翁事為李少君誤始於長恨歌有司言元宜以天瑞至曰狩云自改元已非而又阿諛附會之漢廷亦可謂無人哉樂成侯登上書言欒大按功臣表樂成侯為丁義元鼎五年大坐誣罔腰斬義亦坐言五利不道棄市此志作登互異又以衛長公主妻之此天子女亦稱長公主以衛主妻大者令為親屬如大所言也皆嘗鬺亨上帝鬼神師古曰鬺亨一也鬺亨煮而祀也按鬺古烹飪字下亨乃古亨祀字也一之者非亨音香兩反而神靈之封君七千封君七千當如注中李竒之説此方士自為地也又慮有斥其妄者故下文又有斷斬之説凡進邪術異端未有不欲假此以竊刑賞二柄者也百餘歲然後得與神遇恐其言不驗被誅故逺其期於百餘歲即後言非少寬暇神不來之意其秋有星孛於東井至天其報德星云以彗孛為德星紀一時阿諛兼以明封禪無益也明堂中有一殿至名曰昆侖依古名而其制度之不經若此禹建言漢家宗廟祭祀多不應古禮至宜於長安定南北郊為萬世基後世郊祀之禮稍存古制者貢匡之所貽也天地以王者為主此語乃參贊之本中庸之藴也又罷髙祖所立梁晉秦荆巫梁晉秦荆之巫不當罷家人尚不欲絶種祠至恐其咎不獨止禹等以子政而為此言學固不可雜耶莽遂崈鬼神淫祀至語在其傳以莽事終之者懼東京之主有藉口法祖宗復為武宣之淫祀俾其鑒於莽也天文志星者金之散氣其本曰人漢者亦金散氣其本曰水今西人竊金之散氣一語謂雲漢者乃衆星所聚而成固未必非然忘其本曰水四字遂目天河之説為古人之誤則又妄矣孟康注水生於金一語亦失本義在地成形莫大於水故聚精而成河漢之象耳凡星皆金散氣何以上云其本曰人不曰其本曰水乎長庚至天暒而見景星天暒而見景星當屬下條五行志鯀堙洪水汨陳其五行天一生水水失其性則五行由此皆亂其序列也今髙廟不當居遼東至於禮亦不當立此貢禹匡衡罷諸廟所本視親戚貴屬在諸侯至承天意之道也此即吕步舒不知其師書以為大愚者董子亦幾得禍以故言不可不慎也劉歆以為金石同類此邵子金生於石所本先是一年有司奏罷郡國廟至通儒以為違古制五行傳本向歆故絀毁廟之議過河陽主作樂河陽當如外戚傳作陽河注家未及并此舉正昭帝始元二年冬亡氷至欲以説下此乃由臣下殺不時之象非為行寬緩也書序又曰五行志已引書小序則孔傳乃真西漢古書耶河平元年四月己亥晦日有食之至月同孝惠孝惠時以十月為嵗首今食於夏正之四月雖變之大者月固不同也地理志堯遭洪水懷山襄陵天下分絶為十二州言十二州者此最為得之經師相承以為十二州在禹治水之後不可通矣厥田中下賦貞師古注州第九賦亦正當也按賦乃與田正當不謂與州也鄭康成曰其賦中下其不曰同者避乃同之文浮於淮泗達於河河讀作荷説文荷字下注云荷澤水在山陽胡陵禹貢浮於淮泗達於荷兼引此志及禹貢之文則作河者乃寡學者因經文之訛而妄改也滎波既豬波史記作播是也後云泆為滎非水名東為北江入於海師古曰自彭蠡江分為三遂為北江而入海史記注孔安國云自彭蠡江分為三道入震澤遂為北江而入海按入震澤之語最為謬妄顔氏削去得之錫土姓師古注言封諸侯賜之土田因以為姓按因以為姓所謂以國為姓也改禹徐梁二州合之於雍青分冀州之地以為幽并周禮注此州界揚荆豫兖雍冀與禹貢略同青州則徐州地也幽并則青冀之北也無徐梁梁屬於雍猶幽并之屬於冀也􅐛曰五湖師古曰五湖在吳按具區在吳既為藪則五湖不専在吳明矣京兆尹船司空百官公卿表都司空注如淳曰律司空主水及罪人船既司空所主兼有罰作船之徒役皆在此縣也左馮翊髙陵左輔都尉治范煜漢書郡國志劉昭注引潘嶽關中記曰三輔舊治長安城中長吏各在其縣治民光武東都之後扶風出治槐里馮翊出治髙陵蓋左馮翊治長安城中故左輔都尉治髙陵也太原郡有家馬官後漢咸宣傳云衛青充使買馬河東太原家馬官其以此時置耶河內郡溫續書郡國志溫下注濟水所出王莽時大旱遂枯絶孟堅不載豈為此耶陳留郡濟陽莽曰濟前東漢光武生於濟陽官舍莽更名濟前其北也汝南郡慎陽師古曰慎字本作滇音真後誤為慎耳今猶有真邱真陽縣字並單作真知其音不改也闞駰云永平五年失印更刻遂誤以水為心今合馬伏波傳觀之知小學壞於王莽之亂矣誤以水為心亦或因汝南更有慎故常山郡上曲陽恆山北谷在西北恆山有北谷即飛狐口後書注引晉地道記自縣北行四百二十五里恆多山坂名飛狐勃海郡南皮莽以南皮為迎河亭殆因書有同為逆河之文故并以是名郡也鄗世祖即位更名髙邑莽曰禾成亭東漢光武名秀禾成則秀莽之更名若兆之矣平原郡阿陽按外戚傳注當作陽阿傳寫誤也宋本監本亦誤阿陽北海郡平夀應劭曰古斟尋今斟城是按斟尋當在河南瓚説是也既云太康居斟尋桀亦居之安得無豫夏國之都乎應説因下斟縣而誤琅邪郡匱根艾水東入海莽曰袚同根水經注作匱縣或以是得名縣西南有匱艾山莽曰袚同四字疑袚下注誤入匱下丹楊郡丹楊楚之先熊繹所封十八世文王徙郢按左傳子革曰熊繹僻在荆山則云在枝江者近之蓋丹水之陽非此丹楊也班氏誤黝漸江水出南蠻夷中蠻夷字誤按羅願新安小志蠻夷中蠻中乃率山之訛仍衍夷字廣漢郡涪應劭曰涪水出廣漢南入漢與剛氐道班注涪水出徼外南至墊江入漢互異疑有誤巴郡墊江墊許氏説文作褻從衣不從土此傳寫誤朐忍朐忍字書作􅓃䏰􅓃音蠢與顔異説文有朐字無􅓃字金城郡昭帝始元六年置莽曰西海平紀元始四年冬置西海郡乃王莽遣中郎將平憲等持金幣誘羌豪良願等獻地為之非改金城故名也注疑有訛字特附見西海之名於此郡下耳允吾莽曰修逺允街莽曰修逺兩地屬一郡不應有兩修逺疑注中有訛字允吾注修字監本半刻為食字豈飭字耶五原郡西安陽汝南有安陽故此加西代郡加東也後郡國志西安陽北有隂山注引徐廣曰隂山在河南陽山在河北史記曰蒙恬築長城臨洮延袤萬里餘度河據陽山漁陽郡雍奴水經注雍奴藪澤之名四面有水曰雍水不流曰奴元菟郡樂浪郡武紀云朝鮮降以其地為樂浪元菟臨屯真番四郡今志但有二郡按昭帝始元五年夏罷儋耳真番郡臨屯之罷不見於紀志但有二郡可以意推也南海郡中宿有洭浦官按此官字疑當作關唐書地理志廣州湞陽縣西南有洭浦故關日南郡比景比疑讀為背闞駰曰比讀蔭庇之庇影在巳下言身所庇也見水經注趙國邯鄲後書光武紀注云邯山名鄲盡也邯山至此而盡則張晏注中衍一鄲字中山國北新成河南有新成故此加北河間國應劭曰在兩河之間按兩河當即指滹沱河滹沱别河言之長沙國收酃訛以攸酃二縣為一脫音收二字注直書攸作收北宋小字本上音收二字在音鈴下則皆孟注也韓地伯益能儀百物以佐舜若豫上下草木鳥獸所謂儀百物也燕地南得涿郡之易容城范陽北新成故安涿縣良鄉新昌北新成屬中山國非涿郡可貴哉仁賢之化也雖仁賢之化亦以簡而嚴故齊地號為冠帶衣履天下故漢三服官在齊其一在陳留之襄邑其中具五民云賈於其地者多故有五方之民吳地謂虞仲夷逸師古注虞仲即仲雍也夷逸言竄於蠻夷而遁逸也然以論語敘述逸民之例求之夷逸自别為一人自太伯夀夢稱王六世自下衍太伯二字粵地其君禹後至云封於會稽西漢會稽一郡吳越共之故前以會稽為吳分此仍敘封於會稽明百越所始溝洫志禹堙洪水堙之者鯀耳同為迎河入於勃海臣瓚注武帝元光二年河移徙東郡更注勃海禹時不注也按更注勃海者當在周定王五年河徙之時若始於元光二年則下不得云復禹舊迹矣乃鑿井深者四十餘丈往往為井井下相通行水多鑿井則可以灌溉此法行之尤便易而有漸非若大役難興也金史泰和八年七月詔諸路規畫水田部民謂水田之利甚大沿河通作渠如平陽掘井種田俱可灌溉比年邳沂近河布種豆麥無水則鑿井灌之計六百餘頃比之陸田所收數倍以此較之他境無不可行者遂令諸路按察司因勸農可按問開河或掘井如何為便規畫具申以俟興作惜當時未及盡行平陽邳沂則仿井渠而有效者也然井非極深亦不能蓄水許商以為古説九河之名至不離此域古説九河在沇之境不在冀東據沇有九河既道之文也然禹貢又言至於大陸又北播為九河大陸即今巨鹿又迤而北其非沇境可知許商謂其三見在成平東光鬲界中者是也惟其北載之髙地又分泄之使不盈溢則沇居下流可以無被泛溢故原本九河既道為沇地降邱宅土之由乃互見之文施功實在冀州東北包舉於恆衛既從大陸既作二句之內耳按杜佑通典以魏德滄三州屬古兖州舊疆則九河之地實在沇境大陸又北於唐為德滄二州於今為河間府之地也按經義治水有決河深川而無隄防雍塞之文二語不愧明禹貢蓋隄防之作至趙魏亦為隄去河二十五里商周行水皆法禹之智不立隄防長水校尉平陵關並至乃無水災禹疏九河所以防猥盛放溢之患蓋以河復受東北諸水非一道所能容播之為九則清濁可以分流即空下流近水之地勿為官亭民室之意若入海則止由一道然後能括除成空而無貯淤之患故經云同為逆河入於海此四人之説當合而用之乃盡治河之要而關並韓牧王橫三條考其實則止為一説今若能仿此意而行則河可免百年潰決之患至於入海之道但當隨其所向専注一口聞議者乃不廣其容水之區徒欲多穿入海之空其毋乃兩失之乎張戎言水性就下行疾則自刮除成空而稍深此即近代刷沙之説所本也藝文志於是建臧書之䇿文選注載劉歆七略曰孝武皇帝勑丞相公孫宏廣開獻書之路百年之間書積如山又曰尚書有青絲編目録即此所謂臧書之䇿也易及秦燔書而易為筮卜之事傳者不絶隋書經籍志云惟失説卦三篇後河內女子得之詩而齊轅固燕韓生皆為之傳前敘六家齊詩止有后氏孫氏不及轅固按儒林傳固傳夏侯始昌始昌傳后蒼則后氏故傳皆本諸轅固也禮周官經六篇師古曰即今之周官禮也亡其冬官以考工記充之按周禮天官凌人注引漢禮器制度賈公彥疏云叔孫通前漢時作漢禮器制度多得古之周制惜乎不載七略故此志無稱焉故曰禮經三百威儀三千注中韋顔説皆出於鄭康成禮運篇經禮三百曲禮三千注宋儒朱子取注中瓚説以下文求之固皆謂儀禮也春秋世本十五篇古今人表權輿於世本小學謂象形象事象意象聲轉注假借造字之本也字書當以此六者部分吏民上書字或不正輒舉劾今訛字必飭行蓋其遺意蒼頡七章者秦丞相李斯所作也梁庾元威云漢晉正史及古今字書並云蒼頡九篇是李斯所作今竊尋思必不如是其第九章論豨信京劉等郭景純云豨信是陳豨韓信京劉是大漢西土是長安此非讖言豈有秦時朝宰談漢家人物先逹何以安之今按此志止言七章則自八以下或後人所附益元威景純皆未核論至此爾墨家是以右鬼如淳注右鬼謬甚農家孔子曰所重民食師古注誤以武為湯小説家伊尹説二十七篇依托之書皆入小説弗為弗滅斯舉衷矣詩賦家上所自造賦二篇上所自造賦不以冠趙幽王之上而介於夀王兒寬之中此漢人所以近古也隂陽家神農兵法一篇神農兵法一篇其今之握機乎形法家山海經十三篇山海經在形法家今作十八篇不知始於何時經方神農黃帝食禁七卷食禁周禮疏中作食藥義門讀書記卷十六

body:
  text: 義門讀書記卷四十六翰林院侍讀學士何焯撰文選詩東廣微補亡詩首之以補亡詩編集欲以繼三百篇之緒非茍然而已也南陔彼居之子居當讀為誰居之居猶詩云彼其之子也注以為未仕者於文義未妥色思其柔思柔則愛敬交至矣由庚蕩蕩夷庚王伯厚云左傳成十八年披其地以塞夷庚正義謂平道二字本於此注誤辨亡論旋皇輿於夷庚同崇邱恢恢大圜至于何不養資生於九壤仰化於大圜謝靈運述祖德詩二首二詩首尾呼應拯溺由道情二句道情神理縈拂前後如此則駿烈豐功非麄材幸成方是述祖徳詩秦趙欣來蘇二句獻武乘符堅衰敗克復兗青司豫四州逺圖因事止獻武移鎮東陽於道疾篤上疏云去冬奉司徒道子告括囊逺圖遺情捨塵物與委講改服呼應所謂不纓塵垢也韋孟諷諌詩家父凡伯之流斯惟皇士謂天子之命士也注非時靡不練言今年長當委練也張茂先勵志詩漢末東北之士為學最盛張公此詩居然有端緒可尋張公詩惟此一篇餘皆女郎詩也輕薄壯士諸篇鮑明逺所祖微過多耳雖有淑姿八句應上自舍養由矯矢八句以立志言之應上求焉斯至安心恬蕩八句以力行言之應上衆鮮克舉水積成淵八句此章伸立志下章伸力行應上大猷抽緒纆牽之長實累千里力行中包改過進徳修業四句應上先民髙矩曹子建責躬應詔詩表表與詩俱載夲傳時封雍邱王二篇詞義之美漢魏以來不可多見責躬詩恩不遺物謂復立為鄄城王也注非願蒙矢石四句此即求自試表之意同氣一體冀可感動立功報國即不虛此生未可律以自晦免猜之常也應詔詩騑驂倦路二句頓挫潘安仁闗中詩觀晉書孟觀傳所載事甚略此詩可補其闕議論竒偉非陸士衡所及以萬為一三國志國淵傳破賊文書舊以一為十此因舊制而譎諌也情固萬端至伏尸漢邦此言首虜不實情所常有惟叛酋忽生忽死宜核其實嚴示賞罰以明國之大法尋繹此詩當日廷議于觀太苛于駿太狥故作者特為平兩人之功罪也周人之詩至我心傷悲萬年小醜編戸𨽻屬非獫狁昆夷之比不足聲歌其事以曜威吾詩特愍民莫而已如熙春陽老子衆人熙熙如享太牢如登春䑓曹子建公讌詩何等興象明月一聨賦而比也朱華冐緑池西園有芙蓉池千秋長若斯結到讌亦以頌終之王仲宣公讌詩守分豈能違守分則猶以漢臣自處也結處頌之以同符周公則猶以北面事之也劉公幹公讌詩此篇似與子建一時所作應德璉侍五官中郎將建章䑓集詩音節自壯敘致亦欵曲陸士衡皇太子宴元圃宣猷堂有令賦詩入夲題後太促亦絕無勸勉愍懐之語陸士龍大將軍讌㑹被命作詩陵風協極以上二句例之則極字當指八極非北極也陵風特言其風教之崇髙耳王在華堂謂成都也應吉甫晉武帝華林園集詩登庸以徳二句此即明聰之實也貽宴好㑹貽疑作怡謂歡宴也謝宣逺九日從宋公戲馬䑓集送孔令詩宣逺與康樂詩皆從九日直起都忘此集宋公乃為孔令出也中間巢幕無留燕二句亦似興歸者然送孔令終覺太略謝靈運九日從宋公戲馬臺集送孔令詩康樂較優於宣逺然皆不見宋公優賢孔令知止之美此齊梁間詩人知體要者鮮也在宥一聨似亦有優賢之意遂海隅亦似以二疏比孔卒章微致不能見幾逺逝之感是其心猶不忘事二姓為可恥也顔延年應詔讌曲水作詩昔在文昭至屏京維服此㑹特為二藩祖道故兼頌之而并及義康也於赫王宰相王者當時語此云王宰於義乃順朏魄雙交四句敘致偉麗化際無間即指二王出牧也幙帷蘭甸至末畫流折波㸃出曲水出濟句收祖二王末以自叙結乃當時體皇太子釋奠㑹作詩巾卷充街宋書禮樂志國子太學生冠葛巾服單衣以為朝服執一卷經以代手板此所謂巾卷也注未審細胡三省于王儉事下注巾卷則尤憒憒矣邱希範侍宴樂遊苑送張徐州應詔詩注齊明帝時張謖為北齊州刺史又五臣本題無張字吕向注希範時為中郎武帝弟宏為徐州刺史應詔送之按詩中有匪親孰為寄之語則五臣本是也善注又曰集題曰兼中書侍郎邱遲上按集題益知為梁時詩體製未工而有新句實惟北門重注引史記黔夫守徐州燕人祭北門謂齊之北門按此徐州從人與䣄同乃魯國薛縣也與南北两徐州無與若引此則趙人祭西門更如何牽合耶沈休文應詔樂遊苑餞吕僧珍詩大手不重樂遊故只餞席樽上林一句㸃命師一聨語極深厚函轘二聨地理不必可尋齊梁詩皆然妄生穿鑿則謬矣結有千鈞力曹子建送應氏詩清時首繾綣百折孫子荆征西官屬送于陟陽候作詩漫浪無歸等于狂易時方貴老莊而見之于詩亦為創變故舉世推髙子荆魏孫資之孫骨力甚健與後來孫許不同潘安仁金谷集作詩勝地盛遊兼叙景物儗建安公讌猶與應氏為近謝宣逺王撫軍庾西陽集别時為豫章太守庾被徴還東叙三人更難為工舉觴矜飲餞二句捻集字于王已不略來晨無定端四句上二警痛下二如畫謝靈運鄰里相送方山詩留别鄰里借以自解于徐傳又變體也析析一聨直書即目絕去雕飾上句興積痾下句興寡欲積痾一聨話别在目解䌫及流潮去之速資此永幽棲居之安謝元暉新亭渚别范零陵詩雲去一聨既有興象兼之故實沈休文别范安成詩清便婉轉自成永明以後風氣上四句總起第三聨指范第四聨自叙送别者所以申道彼此之情行者居者俱須寫到後人多偏重行者無復依依如畫矣夢中不識路二句楚詞曾不知路之曲直又曰魂識路之營營王仲宣詠史詩仲宣之詩最為沉鬰頓挫而鍾記室以為文秀而質羸殆所未喻曹子建三良詩此秦公子髙上書臣請從死願葬驪山之足者也魏祚安得長功名一聨是説自家話左太冲詠史詩題云詠史其實乃詠懐也八首一氣揮洒激昂頓挫真是大手晋詩中傑出者太白多學之弱冠首志欲無東吳詩作于武帝時故但曰東呉凉州屢擾故下文又云定羌胡鬰鬰首良圖莫騁職由困于資地托前代以自鳴所不平也唐劉秩云曹魏中正取士權歸著姓于時賢哲無位詩道大作怨曠之端也讀太冲詩而論其世可以為今之不病而呻者戒矣世胄一聨横貫地勢一聨上極經緯相雜之妙叚干木首申前功成不受爵意濟濟首謂王愷羊琇之屬言地勢既非立功難覬則柔翰故在潛於篇籍以章厥身者乃吾師也言論准宣尼二句非句法與首篇重複正自竊比子雲耳皓天首揚子猶三世不遷栖栖執㦸老死京師向上更有由光至髙之行世人豈得為我輕重哉荆軻首又言雖博徒狗屠猶有軼倫之才視碌碌豪右自詫攀龍者方復夷然不屑况吾儕也貴者雖自貴四句上二句言在人者輕下二句言在已者重主父首此乂言士之遇合固自有時顧為國家計則方隅未靖創業垂統方待竒才不當棄羣策而任私昵耳遺烈光篇籍籍讀為鵲籍從昔讀鵲乃諧聲陳第以為當讀為酌誤矣習習首末篇言誠欲俟時而勢利相激幾不可堪自守亦難矣然栖托篇翰亦足自通于後如蘇李之躁動爭光榮於俄頃策用身危者吾束髪讀書思之熟矣卒非所願也飲河期滿腹四句此太冲所以獨得考終異乎潘陸輩也太冲之於二十四友特以身托戚屬難以自疎然非有所附麗乾沒讀此足以知其志也張景陽詠史詩恬退之人自寫胸臆故其詞亦瀟灑可愛詠史者不過美其事而詠歎之櫽括本傳不加藻飾此正體也太冲多攄胸臆乃又其變叙致本事能不冗不晦以此為難盧子諒覽古詩通篇直叙藺生事而結以張弛二字何等筆力疑為越石從事時見并幽搆釁而作謝宣逺張子房詩從衰周說起議論劇有根柢自神武以下兼叙今事蓋詠古兼應敎也時劉裕猶為人臣瞻之比儗無乃不倫後有採詩者自此以下可以不録皆凡語耳興亂罔不亡啇書太甲篇云與亂同道罔不亡此興字為傳寫之誤吕向解為復興于亂道未有不亡謬悠甚矣大抵唐人不信古文故不引以為注伊人感天工二句吐屬不凡婉婉幙中畫四句上聨風流次聨壯麗爵仇建蕭宰二句并四事為二句顔延年秋胡詩詠秋胡者傅休奕得之焦仲卿妻詩質而近野此過於文却似少真味獨取此者與此書氣味協也題是秋胡詩然重在潔婦今詩中詳叙秋胡宦遊之事而于桑下拒金一事顧略焉體製殊不可解五君詠既能自序仍不溢題五篇簡鍊遒𦂳後人多方摹儗終不能及劉參軍韜精日沈飲二句即自道其深衷也頌酒雖短章二句二豪侍側焉如蜾蠃之與螟蛉以比劉班也阮始平一麾乃出守注麾指麾也言為朂所指麾也按後人作旌麾之麾用非也向常侍交吕攀嵇自寓惟陶徵君輩得為文酒之㑹眼中于劉班等何有也鮑明逺詠史詩不脱左思窠臼其壯麗則明逺本色虞炎序其集曰雖乏精典而有超麗為悉之矣詩至于鮑漸事夸飾雖竒之又竒頗乏天然又不􅈺于朝廟之製於時名價不逮顔公非但人微也從過舊宫一篇亦自深厚朝廟之詩不過鋪陳耳故非頓有所短虞子陽詠霍將軍北伐詩妙有起伏非徒鋪叙為工老杜前後出塞之祖也然此詩有永明緩弱風氣不如子美詩為俊健前用飛狐瀚海則後用骨都日逐前用羽書刁斗則後用胡笳羌笛歩歩相為映發此永明以後詩體也曰隴頭曰玉門皆非幽并地不待梁元帝關山月詩地理謬誤也應璩百一詩備體何敬祖遊仙詩遊仙正體宏農其變此詩似為愍懐太子作郭景純遊仙詩景純之遊仙即屈子之逺遊也章句之士何足以知之京華首結言雖如夷齊之髙潔而猶在風塵之内故必髙蹈以遊仙也青谿首結言許由且逃堯何况我乃無媒者乎翡翠首曹詩蜉蝣之羽衣裳楚楚興昭公之朝其羣臣皆小人也言我當師赤松友浮邱洪崖終不共此屬比肩也六龍首此悲往者之不可悔而思决去也逸翮首珪璋以下未喻雜縣首首聨只言風至結二句言燕昭漢武不當一眄處仲輩欲以權勢駕馭殆亦愚矣晦朔首猶韓子詩云煌煌東方星奈此衆客醉也日行秋令王誅將至左太冲招隱詩曰雲停隂岡雲字當從宋本作雪為更佳非必絲與竹四句言其無待外求也躊躇足力煩二句始而欲招其出繼乃欲從之遊經始首桃李不言下自成蹊今乃榛棘塞路則自有美實而莫之採也然而寒泉終非不食王明照之則並受其福矣豈其修已全潔而不見用徒為心惻哉大器晚成猶松柏後凋誠不争一時之先榮與當世之好惡故屈伸得以自主耳惠連以下又自明其非一于隱而俟時也良辰至則相招以出矣首陽非吾仁言魏晉禪代已在易世之後如我者不當復以自處也陸士衡招隱詩疑亦有其二而逸之至樂非有假二句至此不自知其平夷而悦懌也王康琚反招隱詩俊邁魏文帝芙蓉池作丹霞一絶直書即目自有帝王氣象合結語恰似文帝生平也丹霞夾明月二句托興與子建公讌詩同寫景亦有雲霞之色壽命非喬松收足夜遊遨遊快心意二句即君知吾喜否意丕之所見如此其語偷不似民主呉人所以劵其不十也殷仲文南州桓公九井作氣象廹促謝惠連泛湖歸出樓中玩月曲折層次曲盡玩字之妙首聨泛湖次聨樓中哀鴻一聨藏下風字斐斐一聨藏下從夕至朝謝靈運從遊京口北固應詔皇心美陽澤二句結裹有力曾是縈舊想以曾是為在位亦當時之語晚出西射堂連障疊巘崿二聨夕曛隂沈丹楓轉灼四語妙于參差掩映登池上樓只似自寫懐抱然刋置别處不得循諷再四乃覺巧不可階池塘一聨兼寓比托合首尾咀之文外重㫖隱躍祁祁二句亦傷不及公子同歸也池塘一聨驚心節物乃爾清綺惟病起即目故千載常新遊南亭發端先寫眺望所見下只感歎時移一馳字全篇三時移易都已貫注旅館句倒出眺字藥餌情所止服餌本以扶衰而藥石不能平情故力所止也賞心惟良知良知謂良友遊赤石進帆老杜渼陂行奪胎于此波瀾頓挫在數詩中尤為出格首夏猶清和唐人省試命題作夏首請附任公言二句直以鳥獸待人矣如之何其免于天伐也石壁精舍還湖中作首聨警絶入舟句憺忘歸也林壑二句寫山芰荷二句寫水又林壑二句所謂變氣候蒲稗相因依此别一種水稗非秕稗也慮淡物自輕二句語近淵明登石門最髙頂夕息句襯出髙頂連巖四句倒補尋字心契九秋幹二句此亦既有寒木又發春華之意於南山徃北山經湖中瞻眺俛視喬木四語可悟畫理解作竟何感二句上句結上下句生下二句倒叙方又暗藏不露巧變前規别開奥窔撫化心無厭二句化字應觧作物字應升長顔延年應詔觀北湖田收較康樂從遊京口北固詩顔謝優劣何啻霄壤車駕幸京口侍遊蒜山作從京口發端文帝此行下詔者三此詩實櫽括其意以本紀參觀而後見其工也銑注其意乃不得從駕恐題之誤園縣極方望宋書文帝紀元嘉二十六年二月己亥車駕陸道幸丹徒謁京陵宅道炳星緯一聨文帝紀晉安帝義熙三年生於京口盧循之難上年四嵗髙祖使劉粹輔上鎮京城春江壯風濤其還也車駕水路發丹徒故云車駕幸京口三月三日侍遊曲阿後湖作唐初諸公所作勝之逺矣無論少陵也是年帝始與王元謨謀北伐五州望幸之語延年或以抵其巇乎彤雲麗璇葢六句如此則已盡反乎髙祖儉素之徳而流連荒亡之務矣延年顧侈陳之不已於六義安取焉鮑明逺行藥至城東橋開芳一聨興起下文含采句造語極妙謝元暉遊東田齊武帝時文惠太子立樓館于鍾山下號曰東田太子屢遊幸之詩之所云乃其地也節候已過強事登望所以見其戚戚無歡也呼應無迹古人所以髙陶詩曖曖逺人村依依墟里烟元暉葢用之結句見魚鳥之有得而思歸也當塗青山謝眺宅在焉江文通從冠軍建平王登廬山香鑪峯首聨從鑪峰雙關起絳氣一聨極體物之竒日落長沙渚六句宋史江淹傳景素為荆州淹從之鎮少帝即位多失徳景素專據上游咸勸因此舉事淹每從容進諫景素不納末章托意賈生葢示不欲如市賈相求為同惡也沈休文鍾山詩應西陽王教規撫蒜山詩而峭蒨則過春光發隴首二句舉春秋以該四序桂樹叢生兮山之幽二句中以髙下暗對宿東園開出宋之問王維風氣槿籬疎復宻三句前此諸公詩所無若蒙西山藥西山東郊相映起結遊沈道士館休文五言詩此篇是其壓卷復立望仙宫西嶽華山碑云孝武皇帝立宫其下宫曰集靈宫殿曰存仙殿門曰望仙門一舉陵倒景收足遊字徐敬業古意詶到長史溉登琅邪城詩普通之末拓䟦内亂梁武屢命將北伐悱以此時和到溉詩也南史到溉傳湘東王為㑹稽到溉為輕車長史行府郡事徐勉傳悱在宫坊者歴稔以足疾出為湘東王友上谷北邉郡而樓蘭在西域齊梁中詩筆地理多不審阮嗣宗詠懐詩詠懐之作其歸在于魏晉易代之事而其詞㫖亦復難以直尋若篇篇附㑹又失之也注顔延年曰常慮禍患故發此詠按籍豈徒慮患也哉延年遜詞以謝逆劭宜其不足知此所選十七篇作者之要指已具矣惟其間尚有王子年十五一篇言明帝不能辨宣王之奸輕以愛子付託最為深永當時以德施方當明兩之地嫌于甄録耳其源本諸離騷而鍾記室以為出于小雅夜中首注每有憂生之嗟按籍之憂思所謂有甚于生者注家何足以窺之二妃首此蓋托友朋以喻君臣非徒休文好德不如好色之謂也結謂一與之醮終身不易臣無貮心奈何改操乎嘉樹首此詩指趣灼然略無隱避而當時得全者以其不過志於自全避禍非若叔夜之非薄湯武指斥賊臣故也秋風吹飛藿傷六族之被夷也凝霜被野草二句所謂非一木所能支也昔日首此葢指賈充鍾㑹輩為賊臣用事者言之謂爾斵䘮公室自詡佐命不知行且自及也登髙首此言人皆有死若苟求富貴者其卒亦貽五刑車裂之悔何如求仁得仁如夷齊者為得其所乎王經之母知斯義矣求仁得仁借曰禍福相倚自取之也甘為蘇秦李斯之續者彼實見利忘患趨死之不顧吾又何歎哉開秋首首聨言典午以臣逼主隂盛而陽微也微風吹羅袂二句猶屈子之言獨清獨醒也晨雞鳴髙樹二句言已之居亂世不改其度平生首趙李相經過漢書外戚傳鴻嘉後隆于内寵班媫妤侍者李平得幸立為媫妤上曰始衛皇后亦從微起乃賜平姓衛所謂衛媫妤也其後趙飛燕姊弟亦從㣲賤興踰制越禮寖盛于前趙李並稱當指此序傳有及趙李諸侍中皆引滿舉白談笑大噱之語注誤也白日忽蹉跎明帝崩也黃金百鎰盡二句資用雖多俄焉易盡失路故也倒裝句法北臨太行道二句司馬氏河内温人也故上文托三河言之太行在河内之上言此道嶮巇恐不可輕失足也昔聞首言古人即易代失侯可以種𤓰食力何事不可固窮欲事二姓乎此又為雖非黨惡而依違者諷也歩出首此言惟夷齊為歸差可自全天下忠臣義士皆已斬刈無餘也懿既誅曹爽七族師又殺泰初夏侯諸君子于是魏之肺腑無人矣昔年首此言少時敦味詩書期追顔閔及見世不可為乃蔑禮法以自廢志在逃死何暇顧身後之榮名哉因悟安期羡門亦遭暴秦之代詭託神仙耳徘徊首嘉平六年二月司馬師殺李豐夏侯㤗初等三月廢皇后張氏九月遂廢帝為齊王十月立髙貴鄉公嗣宗詩蓋謂此也九月甲戍廢齊王乃十九日是月丙辰朔十月庚寅立髙貴鄉公乃初六日是月乙酉朔師旣定謀而後白于太后則正日月相望之時也末句言詩以言志後之誦者攷是嵗月論我之世則所以詠懐者見矣還顧望大梁大梁戰國時魏地借以指王室也炎暑首首聨以春秋代謝喻易代甘露五年六月甲寅常道鄉公即皇帝位改元景元月之二日也故云三旬灼灼首君臣之義無所逃於天地之間豈獨名汚青史為可慮乎末言已寧没身下位不附司馬取尊顯也西日喻魏室也磬折忘歸句即君非賈豫州子耶之意獨坐首我瞻四方蹙蹙靡所騁窮途能無慟也孤鳥離獸喻逃死吳蜀者北里首焉見王子喬四句言輕薄閒遊者不足以見之也注非湛湛首此篇以襄王比明帝以蔡靈侯比曹爽嗣宗爽之故吏痛府主見滅王室將移也朱華句為私取先帝才人為伎樂髙蔡句謂兄弟數出遊也逺望令人悲二句吕向謂望此則知春氣不留故悲也按當春而悲則無時非悲者不如向注謝惠逺秋懐詩一徃清綺而不乏真味金石終消毁至末金石丹青方為憂患之媒故寧無志而為目前之適性末云聊用布親串正為此籌之爛熟欲親厚者味此苦言耳歐陽堅石臨終詩抱責守微官以匡正有隟潛圖宻已搆二句勸允事未行嵇叔夜幽憤詩民之多僻此引司馬叔游誡祁盈語以况吕安事也古人有言四句生今之世可為座右銘也嗣宗至慎卒得保持非薄湯武徒騰口説亦何為哉蓋悔之也曹子建七哀詩情有七而偏主於哀惟其所遭之窮也明月照髙樓二句明月喻君徘徊比恩之易移而仍冀其逺照浮沉各異勢二句蓋望文帝之悔悟復為兄弟如初也賤妾當何依依烏皆切白詩中猶如此用王仲宣七哀詩路有饑婦人六句杜詩宗祖驅馬棄之去六句欲棄去而復顧念京師然安得明王賢伯一拯此患乎荆蠻首前詩哀王室之亂此又自傷覊旅也山岡有餘昳餘昳之在山比天子微弱流離播遷光曜不能及逺也羈旅無終極與前篇方搆患首尾呼應言亂靡有定也張孟陽七哀詩恭文遥相望後漢靈帝紀靈帝所𦵏者曰文陵則注中文帝乃靈帝之誤也漢道始衰於安而極弊於靈故舉恭文言之潘安仁悼亡詩悼亡之作蓋在終制之後荏苒冬春謝寒暑忽流易是一期已周也大功去琴瑟古人未有有䘮而賦詩者首云僶俛恭朝命後云改服從朝政又云投心遵朝命謂釋服而復出也當晋時禮教已壊然期䘮猶解官行服荏苒首庶幾有時衰反結上文言無時而衰也曜靈首朔望臨爾祭禫而後祭也謝靈運廬陵王墓下作文帝既誅徐傅乃追還顔謝及慧琳道人流連徃復字字悽斷顔延年拜陵廟作顔詩大抵長於鋪陳讀老杜昭陵二詩乃歎延年為陋㓜壯困孤介二句收轉晚達謝元暉同謝諮議銅雀䑓詩詩可以怨作者其知之矣前一絕諷充奉園陵之愚後一絕仍歸於忠愛此篇為兩得之有哀有歎一味嗤笑味反短矣任彦昇出郡傳舍哭范僕射朋友哭諸寢門之外故出傳舍而為位以哭也位髙年促有哀有諷隱約言表末句仍為時惜而不徒以其私也王仲宣贈蔡子篤詩吕向曰子篤與仲宣同避難荆州子篤還㑹稽仲宣贈以詩按詩有濟岱語則向所云還㑹稽者乃憑臆妄撰也王仲宣贈文叔良猶有古人贈言遺意劉公幹贈五官中即將昔我首元后豐沛之語殊傷詩教余嬰首叙致款曲清利可誦十餘旬所謂告滿百日也贈徐幹魏志云楨以不敬被刑刑竟署吏此詩有仰視白日之語疑此時作也歩出北寺門或楨方輸作於北寺耳贈從弟此敎以修身俟時首章致其潔也次章厲其節也三章擇其幾也峻骨凌霜髙風跨俗要惟此等足當之曹子建贈徐幹發端言嵗月不居與後久字相呼應和氏刖足以明玉而已不能力進偉長故云有愆也然而彈冠結綬意豈有間哉君其俟時而已興文自成篇幹著中論二十餘篇贈王粲繾綣得風人之㫖又贈丁儀王粲魏志曰建安二十三年秋七月治兵遂西征劉備九月至長安此其事也征魯未嘗至長安自陳倉以出散關也注誤李氏注此詩以為征張魯時作者蓋以魏志王粲傳粲以建安二十一年從征吳二十二年春道病卒若二十三年西征為粲已亡故也按文帝書云徐陳應劉一時俱逝獨不言粲則粲之亡在二十二年之後矣若作征張魯時詩則權家愛勝謂劉曄請乘蜀新定以先聲下之時曹公不敢與劉氏爭漢中二十四年夏五月引軍還此篇非特為内諱敗其實固善謀也贈白馬王彪小雅嗣音五言可與此篇匹敵者其昭姬悲憤乎何縁録此廢彼魏氏春秋曰是時待遇諸國法峻任城王暴薨諸王既懐友于之痛及白馬王彪還國欲同路東歸以叙隔濶之思而監國使者不聽植發憤告離而作詩按魏氏春秋載此詩極有識與六代論表裏也彪傳是時為吳王五年改封壽春縣七年乃徙白馬霖雨泥我塗四句不直言有司禁其同塗而托之淫潦改轍恐傷國家親親之恩也下乃言非我馬竟不能進勢固有不克俱者婉轉深厚䲭梟鳴衡枙二句䲭梟豺狼指監國使者欲還絶無蹊言欲還愬而不可得也丈夫志四海恐彪復以不得同宿止故憂傷成疾故復為此語以寛之天命信可疑不得於君故呼天與前天命與我違反覆相應嵇叔夜贈秀才入軍四言詩叔夜淵明俱為秀絶浩浩首洪流則魚龍聚焉春林則羣鳥集焉此謂生才之盛然必待同志而招故思我友朋也息徒首嘉彼釣叟得魚忘筌二語斷章以取忘字之義蓋諷其勿入軍也司馬紹統贈山濤豪健不減劉越石向謂紹統椅桐泰機寒女並為當時所重然詞㫖淺廹有乖君子不知不愠遯世無悶之義後讀彪本傳髙陽王眭長子少以好色蕩行為眭所責不得為嗣由此不交人事而專精學習博覧羣籍按此則其求知於山公葢非獲已不容概譏之也冀願神龍來二句非山公莫能當此語張茂先荅何劭洪鈞首結言自處於知足非敢以鎮俗也陸士衡贈馮文熊遷斥邱令僉曰爾諧百里惡事師錫此摹儗之病也答賈長淵鋪陳整贍實開顔光禄之先鍾嶸品第顔詩以為其源出於陸機是也然士衡較為遒秀呉實龍飛曰龍飛則非偽也曰改獻為故主諱銜璧之辱纂戎于魯纂戎當引毛詩戎大也濟同以和時謐多無禮於太子和同之語蓋有刺也惟南有金金以朂賈故下云狂狷厲聖自謂恃宿昔相知乃敢云然也注似微逺本義於承明作與士龍永安有昨軌二句永安則猶有昨軌可尋承明則悄然獨徃人殊路絶矣二句極淡極悲贈尚書郎顧彦先水鄉之士値愁霖而憶桑梓今古同也朝遊首沉稼湮梁潁梁國及潁川也贈從兄車騎士衡之言如此而終以懐安罹患不能還守先人之邱墓亦可鑑矣故藪舊林雙起結但云思鳥古人詩筆多如此安得忘歸草萱草只取能忘忘憂忘歸皆可贈弟士龍中四句分首尾合潘安仁為賈謐作贈陸機發端太逺子嬰面櫬漢祖膺圖靣膺借對偽孫銜璧未有欲稱美其人而斥其故主者以答詩觀之潘陸固難同價矣撫翼宰庭注宰謂駿也宰或作紫非也按楊賈怨敵岳必不敢代謐為詩顧及之也下文廊廟惟清即指誅駿事作紫為是潘正叔贈侍御史王元貺膏蘭孰為銷二句遙呼結句傳長虞贈何劭王濟深婉得陳思一體麟趾邈難追至末言二人並貴公子早歴華要自顧非其匹也以尸素自謙實亦諷之我雖不以戚屬之故介爾並進然退耕於野亦望王道清夷可以獨樂惟汝二人身侍省闥當懼不稱其服勉盡職業耳郭泰機答傅咸按詩乃贈傅非答也陸士龍為顧彦先贈婦佳麗良可美二句奈何先薄待其夫耶此等最乖詩教因其夫之思已而以此明其感恩則固無害於詩教矣若為怨望之詞即不可也本集謂顧彦先贈婦往返四首此但録其答詩故耳浮海首總章饒清彈後漢書獻帝紀總章始備八佾之舞注云總章樂官名古之安世樂是女伎兼領於總章耳王僧䖍論三調歌今之清啇實由銅雀然清彈謂清啇樂也答兄機注士衡前為太子洗馬時贈别士龍今答之按選詩者偶分兩卷耳遂以為贈答異時固哉李叟之為詩也答張士然通波激枉渚陳浩然杜詩注曰此詩枉渚以斜曲為義非武陵湘潭之枉渚蓋用士龍此詩中枉渚二字善注非李周翰謂曲渚者得之劉越石答盧諶書詞慷慨有建安諸人韻詩則二雅之變厄運初遘陽爻在六注陽爻在六謂乾上九也周易曰上九亢龍有悔盈不可乆也按所謂陽九之義只如此注漢書者失之坤儀舟覆即所謂水能載舟亦能覆舟也逆有全邑四句夏落冬敷不忍斥言故用比也其一既言晋朝則此無完都者乃指晋陽之䧟也下其三忠陷孝隕俱並承上二章言之逸珠盈椀珠即謂竹實重贈盧諶慷慨悲凉故是幽并本色越石時為匹磾所幽故有白登鴻門之語前史所謂以張陳激諶者也下二聨則謂所志惟在興復晋祚比績桓文不計黨讐欲諶深逹此意于匹磾使其顧念前好同奬王室我終不以被幽為恨如小白于管仲何嘗問從前射鈎之事也盧子諒贈劉琨書中云貢詩一篇此贈字後人所題書詞非不翩翩但多陳言耳濬哲惟皇注謂懐帝也按當指愍帝三台摛朗時琨為司空故云王室䘮師注為劉聰所敗也按此乃用殷之未䘮師妙哉蔓葛古妙與眇通契濶百罹毛傳契濶勤苦也尤彼意氣使是節士注云尤而使之按此文義乖違甚矣若云尤其為意氣所使差為可通當如五臣本作狹是為允每慿山海二句言已徃依段氏亦志在獲雪讐恥如土壤細流慿山海以成髙深用以少謝存没也山海似不專指越石言之收跡西踐銜哀東顧西謂并東謂幽承此衝飈以喻已之不能固留非喻亂亦忘厥餌注以餌為筌則當從荃如司馬紹統之訓然自宋本已誤從竹先民頤意六句此一轉尤變化肝膽楚越注謂琨被謗也臧榮緒晉書曰衆人謂琨詩懐帝王大志按楚越之語必當時有以諶之去而議之者故下文謂惟大觀如越石乃能信其不二也若帝王大志之語唐時所修晋書紀載甚明似可為據亦不得裁取臧書以牽合被謗贈崔溫李牧鎮邉城四句李牧趙奢即指越石鎮并州而言亦得徒煩飛子御飛子葢指越石言之倪寛以殿黜至末倪寛何武應前賢士風言朔鄙多侠自古以武健為理謂地固宜然自惟短弱欲於䘮亂之後與之休息寛其賦歛簡其撃斷雖人非倪何素志若此顧非我良儔莫之訴也答魏子悌俱渉晋昌艱注引王隠晋書曰惠帝以燉煌土界濶逺分立晋昌郡又曰晋昌䕶匈奴中郎將别領戸然時匹磾為此職諶在匹磾所難斥言之故曰晋昌也按晋昌艱即指越石晋陽之敗越石父母為令狐泥所害諶父母兄弟亦為劉聰所害陽與昌音相近傳寫誤也晋雖設晋昌䕶匈奴中郎將考匹磾生平未為此職安得而附㑹之况晋昌乃燉煌所分逺在隴右而匹磾方為幽州刺吏尤如風馬牛之不相及也謝宣逺答靈運後半淺促於安成答靈運華萼相光飾唐時華萼相輝之樓本此萎葉愛榮條二句與發端相應復禮愧貧樂謂康樂窈窕承明内注靈運謂秘書監故云按靈運為秘書監在嘉元中義熙時乃秘書丞也謝惠逺西陵遇風獻康樂清便婉轉此等詩亦復憲章陳王但比之康樂為差弱耳今宿浙江湄入西陵屯雲蔽曾嶺二句重在康樂故至此始入遇風西瞻興遊歎應趣途東睇動悽歌應念離積憤成疢痗積字收盡全篇欵曲謝靈運還舊園作見顔范二中書此等詩真初日芙蕖偶與張邴合二句見本志固在舊園所謂情素也焚玉發崑峰謂廬陵如卭願亦愆穿漏一筆長與懽愛别對顔范閩中安可處東越即號閩中猶言蠻中也事躓兩如直四句謂中間得還東山感深操不固中仍乖張邴之微尚曩基即先築四句如話雖非休憇地對東山息隂謝所牽謂終還東山不更扳纒也探懐授徃篇徃字收盡今昔酬從弟惠連陳王緩歩謝公同行獨冠元嘉不當以其模山範水逼真贈白馬王篇巖壑寓耳目反儭下句辛勤風波事二句括盡小謝一篇顔延年贈王太常方流圓折九泉丹穴國華朝列邦𢡟鄉耋拉雜而至亦復何趣庭昏見野隂二句近野先晦逺峰忽明二句連看咏雪獨絕即寓遲王之至夏夜呈從兄散騎車長沙側聽風薄木二句頂上獨静和謝監靈運和還舊園作也顔詩中最清新之作要非謝匹弔屈汀洲浦六句謂謝在㑹稽始寧何用充海淮淮從濰省惟唯維皆可讀陳苐以為當讀熙非是謝元暉郡内髙齋閒坐答吕法曹結構何迢逓從髙齋起已有池上酌二句入閒坐以下是答蹔使下都夜發新林至京邑贈西府同僚元暉俊句為多然求其一篇盡善葢不易得如此沉鬰頓挫故是壓卷之作元暉一章之中自有玉石等語鍾記室抑揚之詞不可據也其名章如此詩尚捶掇未盡耳大江流日夜二句江流不返故憶西府而心悲耳秋河曙耿耿淒斷引領見京室起髙翔思見昭邱陽西府風雲有鳥路以下自明不得已而去西府也常恐鷹隼撃謂王秀之軰詶王晋安注晋安郡太康三年置即今之泉州也按初泉州今之福州陸韓卿奉答内兄希叔嘉惠承帝子二句帝子王孫皆指竟陵下文㸃銅龍乃言遷官平津孟嘗始指王晏歸來翳桑柘二句言中間罷歸又歴温凉注非相如恧溫麗注引西京雜記云長卿首尾溫麗按西京雜記梁時書不當以注齊詩也為溫麗二字無攷耳范彦龍贈張徐州􅀈疑是徐方牧八句流風廻雪記室固最得其如此恨不具雞黍恰是范張當家事古意贈王中書搏飛出南皮南皮以魏文比竟陵王子良也結句亦有諷其勿知小謀大之意任彦昇贈郭桐廬出溪口見候余既未至郭仍進村維舟乆之郭生方至此當是之新安途中作結句索漠宜乎不反潘安仁河陽縣作安仁氣質髙於士衡數倍陸蕪潘静故是定論也微身首連陪厠王寮連五臣本作違言在陪臣之列也今掌河朔傜謂為河陽熲如稿石火二句慷慨日夕首朱博糾舒慢六句晋初綱紀不立豪貴奢僭論政者欲糾之以猛安仁則謂民和而俗自化終前篇示民不佻之意陸士衡赴洛詩羈旅首撫劍遵銅輦注銅輦太子車飾按長吉䑓城應教人秋衾夢銅輦用此呉王郎中時從梁陳作實自寡味語渉儲𨽻必見甄録當時欲侈為美談耳元冕無醜士二句語太陋陶淵明始作鎮軍参軍經曲阿作苐五句入始字終反班生廬終字反對始字辛丑嵗七月赴假還江陵夜行塗口注沈約宋書曰所著文章皆題年月義熈已前則書晋氏年號自永初以來惟云甲子而已按集當云自永初以來不書甲子詩自丙辰嵗八月中于下潠田舍穫稻一篇外無復書者丙辰義熙十二年也又三年己未恭帝立改元元熙又一年庚申六月宋代晋改元永初塗口一作塗中按塗當為除即滁字也謝靈運過始寧墅自然流出且為樹枌檟以示老死不出亦所以息徐傅之猜也富春渚且汲富春郭且汲當從宋本作旦及遡流觸驚急六句皆托意徐傅平生協幽期至末既以重險比執政之見排復言適協本趣固非干木季友所得輕重萬事零落則終於無復當世之志曲折三致不卑不激七里瀨遭物悼遷斥二句上句結上下句起下登江中孤嶼放眼江天脱屣遺世興象殆欲參靈江南倦歴覧二句南北起中字亂流趨正絕二句妙在上句一頓舟行兀兀忽推蓬逺眺心目俱曠叙寫生動表靈物莫賞二句景物靈曠尚莫能賞况埋照而藴真者乎初去郡貢公未遺榮貢禹終為當世所縻卒于御史大夫之官故曰未遺榮也牽絲及元興注應璩詩曰不悟牽朱絲三署來相尋按此牽絲二字用之郎署尤妙野曠沙岸净二聨耳目心神為之爽易極有初字興味入華子崗是麻源第三谷羽人絶髣髴羽人謂華子期恒充俄頃用二句張銑注少時為樂不足為長乆之事於文義較明義門讀書記卷四十六

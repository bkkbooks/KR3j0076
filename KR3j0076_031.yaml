body:
  text: 義門讀書記卷三十一翰林院侍讀學士何焯撰昌黎集原道安溪云韓子言道其論仁義之意甚美其抵佛老所謂爭四代之惑比于距楊墨之功者也或謂終篇無及釋氏者意退之未讀其書不知其瑕舋之所在此可謂輕指古人不自知其膚略者歟夫道之裂也必有一人始為邪誕然後尤者得以繼焉楊墨非老氏比也而皆竊乎老氏之意及佛之入自謂超然尚矣識者審其根實究其崇長增髙之僞又以為與老源流表裏而大濟以夸虛是故孟氏專攻楊墨障其流也退之則源之務塞而謂道德仁義之說自老氏雜也然後楊墨肆行佛乃以晚出而承其敝且謂不及釋氏者彼謂淸淨寂滅之言去父子君臣之言老書有之歟三代之下為夷狄之人老氏當之歟吾則曰其所謂蔑禮樂刑政者老氏也棄君臣父子者佛氏也又申其說以為蔑禮樂刑政者為太古之無為者也棄君臣父子者治其心而外天下國家者也韓之時佛之禍為烈故悲其不遇列聖而生于夷狄之邦哀後王之不能黜之正之而反使加于先王之教之上老子詖淫之始而釋氏邪遁之窮其言之蓋有序矣荀况之言雜駁乖離擇焉而不精揚雄之書艱難晦塞語焉而不詳故道之傳斷自孟氏而止而以為其流也長曰其仁義之說朱程猶譏之何也曰先原性後原道則未可譏也博于愛宜于行情之用道之經也其論性則異是性有五在七情之先矣原道自情始殆敘文者失之歟故未可譏也然則韓其醇歟曰惜其于性詳于三而略于五也詳于三故謂孟子不知品之區略于五故未知孟子所謂善之腴也茍求其故則知下焉者可制以法也乃其善焉者之有同于初而聖人之意得矣是故精焉而有未精詳焉而有未詳不然則朱程曷譏焉于道豈獨粗傳爾乎魚豢魏略西戎傳載臨兒國在天竺城中蓋据浮屠經言之浮屠見於中國載籍所眆也豢之言云浮屠所載與中國老子經相出入蓋以為老子西出關過西域之天竺教胡浮屠屬弟子列號今載三國志注中由是言之但非斥老子而佛氏固在其中矣博愛之謂仁四句破原字仁與義為定名二句昧其定名遂使異端冒其虛位此原道所以作也老子之小仁義至一人之私言也此段雖單闢老氏之說然佛氏所謂道亦去仁義言之蓋老佛二氏實相為源流公之首闢老者探源之論也周道衰至其孰從而求之此二段伏後當火其書後之人其欲聞道德仁義之說孰從而聽之所以作原道不求其端不訊其末求端訊末㸃出原道眼目古之為民者四至今之教者處其三此段伏後當人其人古之時人之害多矣至患生而為之防公言今其言曰至而民不爭私言是故君者出令者也至則誅公言今其法曰至以求其所謂淸靜寂滅者私言淸淨寂滅此晉魏之佛欲治其心則梁隋之佛也帝之與王至所以為智一也公言今其言曰曷不為太古之無事私言傳曰古之欲明明德於天下者至民焉而不事其事佛書之精者皆出於老子而濟以莊列之辨其怪幻則自為也故每層附見於闢老氏之下達摩西來直指心體不立語言文字又其再變故最後闢之然則古之所謂正心而誠意者將以有為也此又發明道之必不可外仁義以之為已至廟焉而人鬼饗仁故順而祥愛而公義故和而平處而當此四句對老氏說老氏外仁義以治身治世下四句對佛氏說佛氏以死生鬼神之說愚天下而不本於仁義曰斯道也何道也曰斯吾所謂道也非向所謂老與佛之道也鎖住公私醒出原字軻之死至語焉而不詳明已文不得不作不精謂荀不詳謂揚然則如之何而可也至末括盡前文無㸃滲漏人其人火其書廬其居塞止明先王之道以道之如是則流行矣原性皆是也列以三品則非也不揣其本而齊其末也性也者與生俱生也情也者接於物而生也極合樂記及伊川顏子好學之㫖性之品有三氣質之性而其所以為性者五天命之性上焉者之於五也至反於一而悖於四周子謂誠者聖人之本即主於一也少有少反與下二字尚有病在同此一也後儒謂有拘焉蔽焉者得之主於一者仁義禮智皆根于信而實有之此所以善也少有少反於一者不能至實而極信也故仁義禮智皆混雜而不純此所以可道而上下也反於一者無實德故仁義禮智皆悖此所以惡也上焉者之於七也至亡與甚直情而行者也動而處中發而皆中節也甚過也亡不及也言雖有過不及而能求中也直情而行者拘于過與不及而不知返情之於性視其品性善則情善情善則性善夫始善而進惡與始惡而進善以下皆言氣質之性不可一概以完三品之說叔魚之生也至人之性果善乎故曰論性不論氣不備論氣不論性不明君子道其常此三人者蓋千萬人中之變奈何据以疑孟子之說上之性就學而愈明至其品則孔子謂不移也此一段又言人性雖有上下而下者猶可制是其所受之正而不同於物者以終為性者五之說將已說與孔子融通為一今之言性者異於此何也至末又特闢佛老以虛無言性之誕其謬妄又在荀揚諸子上矣原毁毁人之根在忌忌人之根又在自怠節節搜出恐恐然惟懼其人之不得為善之利誠哉君子之用心怠與忌之謂也此句是原將有作於上者暗收古之君子原人宏肆即以發明君不出令則失其所以為君數語之意只就發端三語變出無數層折賔主相形波瀾洶湧聖人一視而同仁博愛之仁篤近而舉逺行而宜之之義原鬼五原之序當以原性為一原道為二原人為三原鬼為四原毁為五行難求備於一二人而又不思廣求其人以自輔是則名為好士卒無一士也以其從而不改故曰行難行字當讀平聲某與某可人也注可或作何按當作何為是蓋不知者因下引管子事而妄改也任之誄之亦指他人非陸自引為已罪考正之云亦非抑猶有舉其多而缺其少乎缺其少似言人材未盡足以備用不謂一人之身本譏舉其少而缺其多曰缺其少者蓋遜辭也先生曰固然吾敢求其全固然言理則如此吾敢求其全似焉知賢才而舉之之意雜說四首第一首只兩意反復然龍弗得雲至信不可歟直接皆所自為一覽可盡矣有此一層乃反復馳驟第二首脈不病紀綱不失則得天矣第四首此言士待知己者而伸在上者無所辭其責世有伯樂然後有千里馬翻轉說且欲與常馬等不可得抉入一層䇿之不以其道以下不當其任不盡其用總歸於不知人其真無馬邪有無二字前後關鎖獲麟解此文自宋以後皆極稱之李習之亦書一通與人極歎為佳德與形本只兩意翦作四段層疊曲折轉變萬千不是用祥不祥兩字轉換是以知不知兩字轉換麟之為靈昭昭也麟字含下第二段知其為麟靈字含下第一段祥字昭昭含下數段中不可知詠于詩書于春秋雜出于傳記百家之書三句中暗藏德字與形字對雖婦人小子皆知其為祥也第一段之知知其為祥不可知其為麟也第二段之知知其為麟角者吾知其為牛四句隨手生變惟麟也不可知應第二段不可知則其謂之不祥也亦宜應第一段雖然麟之出必有聖人在乎位應不恆有二句聖人者必知麟又應第二段言必有明君出而用之麟之果不為不祥也此又應第一段世得云知其非不祥者由于知其為麟也疊一麟字省一知字師說世得云無貴無賤見不當挾貴無少無長見不當挾長聖人出人也逺矣猶且從師見不當挾賢後即此三柱而申之童子之師是年不相若者引起世俗以年相若相師為恥巫醫樂師百工是無名位之人引起世俗以官位不同相師為恥而語勢錯綜不露痕也是故無貴無賤無長無少二句伏中二段此古之學者所以異於今時也古之聖人其出人也逺矣至其皆出于此乎聖人則生而知之矣然猶以道之無窮不恃其聖而必師之求况學者而否焉有不終于莫解其惑者哉愛其子擇師而教之至其可怪也歟二段即師道之僅存于世者反覆曉折見不當拘于時也上愚益愚統言惑之不解此二段中恥焉惑矣未見其明智反不及就拘于時一節斷之則羣聚而笑之拘于時下落則曰彼與彼年相若也應無少長位卑則足羞二句應無貴賤有下句道理方穩足聖人無常師至如是而已又舉孔氏以實之能行古道之準學者惟道所在而無常師則道業兼該可以至聖無不通之域不當以為可恥進學解有輕世肆志之意然怨而不怒亦無愧詞業進于勤對學與文行成于思對言與行蓋有幸而獲選此句伏解孰云多而不揚此句開解諸生業患不能精四句不明不公在側靣反㸃先生口不絶吟於六藝之文至可謂勤矣此段是學抵排異端至可謂有勞矣此段是言沈浸濃郁至可謂閎其中而肆其外矣此段是文下逮莊騷四句上則其所規模此自謂直與之並者也少始知學至可謂成矣此段是行以上四段發明多字左右具宜請以三千人入蔡自取元濟及折王庭凑非具宜乎昔者孟軻好辨至其遇于世何如也得為孟荀後何待於世自解亦自慰也今先生學雖勤而不繇其統四句收前四段此非其幸歟應轉動而得謗名亦隨之不遇者名髙則不公不明之失重矣妙有含蓄是所謂詰匠氏之不以杙為楹至末就匠氏醫師反收暗用四段配前學文言行妙在錯綜無迹守戒似為董晉鎮宣武而作汴居淄靑淮蔡之中南北二寇所窺伺所謂介于屈强也幕中之辨反以為叛其斯文之謂歟知備鄰道則知所以制禦叛亂將卒者必有先事之圖矣身處軍中又有難于盡言者故雖設兩喻下皆就鄰道戒之而以乘其便暗藏一半諸侯之於天子三句故相出鎮而僅同于不侵不叛之臣豈所以報天子哉知猛獸之為害此鄰道之吞噬於外者知穿窬之為盜此叛將之窺伺於內者介於屈强之間汴之南則蔡北則鄆所謂屈强之間也而王公大人反不能焉謂董晉蓋以謂不足為而不為耳晉輩材力既不足又不先事而思一旦有變其不為鹿之見殺于豹者鮮矣公云不足為者稍遜其詞耳冀天下之有事以乘吾之便便者內變作而外侮乘之也賁育之不戒四句材力足而不戒者如是下喻又見陸長源以下皆不足用晉死而公亟行見之早矣然則如之何而備之曰在得人得人豈倉卒可圖先事而思莫急于此矣雖為董晉言之然亦未見有將佐無人而可以成功者圬者王承福傳借題諷刺學楊朱之道一段正行文變滅不測處腐生則以為非昌黎不能衷之大道矣圬之為技賤且勞者也直敘起其色若自得者聽其言約而盡先伏中間主意以下皆述其言任有小大六句先一挈取其直雖勞無愧發明自得嘻吾操鏝以入富貴之家有年矣至或曰死而歸之官也議論中間夾此幾句敘事行文方不直又曰功大者其所以自奉也博至雖聖者不可能也翦作兩段此段是諷當世之人本不足以畜妻子而紛然智小謀大明殃禍皆所自致也蓋賢者也此句正然吾有譏焉此句反謂其自為也過多至其肯勞其心以為人乎哉此段迂其㫖晦其辭欲擒故縱也雖然其賢於世之患不得之而患失之者至其亦逺矣收拾中間世得云以喪其身應獨善其身句後漢三賢贊三首贊後漢人即用後漢文體體似古樂府祠洛陽令王君哥王符為鄉人所輕本傳安定俗鄙庶孽而符無外家為鄉人所賤述赦之篇三句潜夫論本傳著其五篇曰貴志曰浮侈曰實貢曰愛日曰述赦述赦尤善可以革古今之通弊故公獨取之仲長統三句一韻論說古今三句本傳簡撮其略載者三篇曰理亂曰損益曰法誡昌言確切為勝潜夫論也稱其文章注文章方云考本傳當作才章按唐人大抵謂詞賦為文章作才章乃合諱辨此易辨之事故不難於辨論之長而美在深厚愈與李賀書注李上方有進士二字非是按唐時能為詩賦應舉者皆稱進士方本不為非但無之句法較簡健律曰二名不偏諱至為犯嫌名律乎引律以明其無罪但言晉本不當諱况又其嫌乎父名晉肅至子不得為人乎二十字詞氣不類公文杭本無之是也况又非律非經夾和在此亦錯雜無序周公作詩不諱至曾子不諱昔引經以明其是非二名嫌名意雙頂來然當時執以責賀者乃嫌名也故辨嫌名尤詳周之時有騏期至將不諱其嫌者乎但有不諱一層波瀾便狹妙在將諱字對靣縱開與前段文法一樣漢諱武帝名徹為通四句上下俱從不諱翻到諱此從諱翻到不諱變換史記天官書氣來卑而偱車通者是車轍之轍亦嘗諱之漢志作車道則通字傳寫之訛治字髙宗諱公多犯之時已祧也今上章及詔不聞諱滸勢秉機也又旁引典故以見當世亦無有行之者乃不敢言諭及機以為觸犯諭是嫌名機是二名之嫌仍有兩層密甚今考之於經質之於律先經後律理當然也前半先舉律者承上得罪言之也與下文先曾參語勢一也不務行曾參周公孔子之行三句安溪云此處承上事父母說故先曾參以下泛論故先周孔韓文之不茍如此夫周公孔子曾參卒不可勝至末只用反掉截然而止推辨中有餘味訟風伯厚齊云曹子建詰咎文假天帝之命以詰風伯雨師公訟風伯蓋本於此伯夷訟士之特立獨行三句聖一層信道篤而自知明者也智一層一家非之力行而不惑者寡矣至則千百年乃一人已耳總上二層昭乎日月至不足為容也六語訟昭乎句以知言崒乎句以行言巍乎句以知行之極言夫豈有求而為哉應適於義句張南軒無所為而為之謂義蓋出於此彼獨非聖人而自是如此應未有非之者也句言非武王周公之所為而自以為是夫聖人乃萬世之標凖也聖人二字從武王周公聖也生下余故曰至亘萬世而不顧者也結特立獨行聖人萬世之標準彼非聖人是不顧萬世矣子産不毁鄉校頌謗者使監世得云監字乃閉口音不知公何以同言用釋言吾時在翰林三句與後李公關照唐時翰林學士不接賔客此一證人莫不自知以下轉夫敖雖凶德從敖字又轉若夫狂惑喪心之人又轉愈也不狂不愚至愈何懼而慎獨抽此數語變化亦明白易曉又曰亂之初生至則有時而信之矣見其失不獨在讒者而在三公自近之也夫聰明則聽視不惑三句上規之此進之彼讒人者孰敢進而為讒哉至亦莫之聽矣將逺佞人穿入信讒中孰敢為讒承公正雖進莫聽承聰明敦大前之謗我於宰相者四句合穿今二公合處而㑹至吾乃今知免矣言及必曰緣上思字來結法竒絶仰青雲覩白日却在重陰積霧中張中丞傳後叙開門納巡三句上一句是無疑下二句是無忌逺誠畏死至而謂逺之賢而為之邪只就能守上反復明其不畏死當二公之初守也至其誰之功也此一段就翰所論而暢其說蔽遮江淮則租稅得通可資以成中興之業故以天下不亡為二臣之力則文無一虛語當是時棄城而圖存者至設淫辭而助之攻也世得云此數語暗渡下賀蘭史記列傳過接處多有此法過泗州船上人猶指以相語添毫法籍時尚小粗問巡逺事不能細也夾此句錯綜生動嵩從巡久亦不見巡常讀書也添毫法巡怒鬚髯輒張再一寫生動逺寬厚長者至死時年四十九世得云寬厚二句應無所疑忌呼巡為兄應處其下故敘逺死即互見巡年以收應與巡俱守死句燕喜亭記題固記其名文是當行家語得其翦裁之法雖參入議論仍不礙記事體矣大原王宏中在連州突起伏後半追敘斬茅而嘉樹列二句地藏出者突然成邱四句天作既成愈請名之至頌也此段敘致特有古意非公無此世得云皆伏有宏中之德意按此評既使前後關鍵分明又頌字乃美盛德之形容正總攝得此一段其非衍文明矣考異疑頌字是衍文燕喜二字非狀景物故并上排臚復就命名上指敘於是州民之老至以遺其人乎恐一往議多於敘故夾此段虛景在中間宏中自吏部郎至飫聞而厭見也前半自邱而亭層折甚多追叙此段文勢方配今其意乃若不足然則是樂之也智者樂水二句兩樂字關合喜字智以謀之四句終上頌字之意吾知其去是而羽儀於天朝也不逺矣收轉自吏部貶秩遂刻石以記以作記收一語不溢徐泗濠三州節度掌書記􅈦石記掌書記無封疆之責三州之故非所宜書從使節之能文發意自不可移别處淡寫必切要無陳言元戎整齊三軍之士至莫宜居之數千年中兼之者幾人茍其帥之不文反影厯十一年而掌書記者三人此句見相得後之人茍未知南陽公之文章至魚川泳而鳥雲飛也俱是空際生出公之教人自為不獨造語也蔚乎相章四語濃淡相參更有情味畫記騎而立者五人至而莫有同者焉此段人騎而立是形狀五人是數馬大者九匹至皆曲極其妙此段物朝無咎蓮社圖記本此意為之藍田縣丞􅈦壁記極意摹寫見其流失非一日既為斯立發其憤悶亦望為政者聞之使無失其官守也鉗以左手三句細瑣如畫丞濡筆占位更細濡從苑本改諺數慢必曰丞又著此語伏後故字丞之設豈端使然哉應於一邑無不當問即反呼故字一躡故跡書名之意寄喟於躡故迹故一篇皆從此感慨非恐其名氏之將湮也悉書前任人名氏皆不得施用者也余方有公事子姑去以不問一事反結跌宕殊有簡兮詩人之意新修滕王閣記切新修切王公切袁州刺史作記愈少時至願莫之遂凌空而起便是新修發端又不著迹走筆書大意自是超妙絶倫其胸次要無㸃塵也而滕王閣獨為第一直入及得三王所為序賦記等併關㑹宏中緊甚春生秋殺陽開陰閉魁宏八字非此老無此心胸令修於庭戶數日之間二句兼之以頌却於不得造觀中㸃出都化雲烟了無痕迹吾雖欲出意見三句斷續穿漏前公為從事此邦至實書在壁照應文辭句以前一層襯新修前後以此為關鎖中間又一提醒於是棟楹梁桷板檻之腐黑撓折者六句新修記無侈無廢二句極造語之妙其江山之好至尚能為公賦之照應臨觀之美句以後一層襯作記老少二字首尾關鍵搖曵不盡進士䇿問十三首第七首以至於吳蜀魏吳先蜀魏豈以其獨後亡歟爭臣論將進陽子以聖賢之用心而非徒詆訐為名髙以故其言藹如也居於晉之鄙注城徙居陜州夏縣按實録不載徙居事栁子遺愛碣家於北平隱於條山乃滄州一土阜非晉鄙也夫不以所居之時不一而所蹈之德不同也發明不可恆貞破上如在野孟子所謂禹稷顔回同道若蠱之上九至而尤不終無也并將對靣一層說透道理八靣員足亦無可躲閃矣志不可則是蠱尤不終無是蹇忽焉不加喜戚於其心與後畏天閔人相反問其官至固如是乎哉學管仲得君如彼文法且吾聞之有官守者不得其職則去一轉陽子將為祿仕乎是或一道也又轉出去與辭兩層却從上段中問其官祿二句生下亦不敢曠其職不敢二字就一節上明其用心夫陽子之用心亦若此者從上不加喜戚于其心來滋所謂惑者矣非特曠官而且越分非特無功而且有罪夫陽子本以布衣至熙鴻號于無窮也此段發揮爭臣二字更快又洗發對靣使人知一層義理此無曠官之刺居位而使人隨時得以薰其德者亦從上恆貞則凶來且陽子之心將使君人者惡聞其過乎是啓之也又破其招君過為名一層深推其用心之謬以見其未為無尤也何子過之深也言不當刻論其用心自古聖人賢士皆非有求于聞用也以上既與明辨其職守以下又極論其不得為有道之士閔其時之不平至誠畏天命而悲人窮也此則聖賢之用心所謂有道之實而望陽子以改而從之者也閔字暗顧用心聖賢者時人之耳目也四句似荀楊語此即原人大意且陽子之不賢三段三且字皆進一步惡得自暇逸乎哉終前髙不事之心好盡言以招人過招人過與招君過暗對君子居其位則思死其官此句雙關陽子我將以明道也二句作者本趣如此所以異于小丈夫也傳曰惟善人能受盡言至末應第四問就作掉尾應轉起處極有神力仍不絶其為善人方是責善非訐直也禘祫議世得云此文或疑不言禘祫之後獻懿二主應藏何處不知上文第一條議者已見獻懿之主藏于夾室矣今所當定者應祭不應祭非疑藏主之所也既曰禘祫之時宜正獻祖東向之位則不禘祫時藏主仍在夾室而不當毁瘞及别立廟可見矣自魏晉以降始有毁瘞之議毁瘞之議乃自漢始比于伸孫之尊廢祖之祭不亦順乎注韓公本意云云按韓公未嘗議以獻祖為始祖而景皇帝不當居東向之位四時之享皆壓于獻祖又安得云所屈之祭至少所伸之祭至多乎考異曲為此說以為牽合熙寧廟議之地爾注又云則唯懿祖不與按獻祖亦不與也注又云室自為尊不相降厭按如此則所伸者不獨景皇帝而已省試顔子不二過論不二者蓋能止之于始萌四句安溪云此論邵子以為過許然觀易繫所引則恐韓論誠不為過擇乎中庸得一善則拳拳服膺而不失之矣正應擇善而固執顔氏之子其殆庶幾乎言猶未至也正應不二之于言行于是居陋巷以致其誠至竟莫之致陋巷六句是立志高堅二句是致知任重道逺是力行太學生何蕃傳不從朱泚乃其行義之尤大者留在最後自見輕重今人必入手獨舉此立論則反似節取一事而惜其不遇處反味短矣以之升於禮部謂舉進士也蕃正色叱之二句是誠可書矣兹非其勇歟仁勇從問答中分見敘致不直其仁則所施有限勇其大節故特表之惜乎以下又歎其仁之可僅于或之云也義門讀書記卷三十一

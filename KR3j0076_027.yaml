body:
  text: 義門讀書記卷二十七翰林院侍讀學士何焯撰三國志蜀志劉二牧傳二牧不從董袁群雄之例而列蜀志首非夷昭烈于割據也王者之興先有驅除評云慶鍾二主即以漢家故事明統緒所歸天祚眞主即二牧猶不得以闇干耳其文則若霸國之書其義莫非天子之事遺臣故主之思淵矣哉序呉事則正禮不先于討逆系漢統則二牧乃冠乎興王變其例遜其詞所以待後之人自遇其㫖于參錯迷謬之中故非當時所測也劉焉扶亦求為蜀郡西部屬國都尉注陳壽益部耆舊傳董扶褒秋毫之善貶纎芥之惡按趙岐孟子注云孔子舉毫毛之善貶纎芥之惡故皆錄之於春秋二語必經師成語也焉徙治緜竹東漢益州治雒縣焉以郤儉被殺故徙治緜竹緜竹西漢都尉所治也張魯母始以鬼道又有少容常往來焉家所謂少容蓋能久視之意後漢書作有姿色蓋范欲醜之甚其詞耳先主傳先主姓劉諱備至因家焉漢書王子侯表陸城侯貞元朔二年六月甲午封十五年元鼎五年坐酎金免蓋以始封之明年爲元年也此云元狩六年少十年矣恐誤續漢書百官志宗正卿下注云郡國歳因計上宗室名籍補注胡廣曰又歳一治諸王世譜差序次第故西京枝屬其後衰者猶皆可考承等皆伏誅至先主乃殺徐州刺史車胄魏志建安四年偹殺車胄五年承等謀洩乃死袁紀備據下邳亦在承死前蜀志誤也十二年曹公南征表㑹表卒曹公南征在建安十三年此上疑有脫文權遣周瑜程普等水軍數萬與先主并力注採江表傳云云按江表傳欲専赤壁之功而不能掩樊口之即爲一地也二十四年一百二十人上言曰昔唐堯至聖至雖死無恨据後注乃廣漢李朝作此文在西京亦不多得疑諸葛公潤色也先主上言漢帝曰臣以具臣之才至以報萬分前一篇是西京此一篇西京氣味東京節奏於是還治成都還治成都當時未必懐安但與髙祖氣燄差異或以得其地不得其民故不久駐耶章武元年立宗廟祫祭髙皇帝以下注臣松之云云按臣子一例昭烈當日蓋以孝愍爲禰而於本生則仍光武南頓君之例此可以意推而知也三年夏四月癸巳先主殂於永安宫注引諸葛亮集載先主遺詔勿以惡小而爲之勿以善小而不爲按易之繫辭曰善不積不足以成名惡不積不足以滅身小人以小善無益而弗爲也以小惡爲無傷而勿去也故惡積而不可掩罪大而不可解昭烈以此爲誡則不甚樂讀書特少年之事其後則知書之要矣射君即射援見上表中列名後主傳建興五年春丞相亮出屯漢中營沔北陽平石馬注諸葛亮集載禪三月下詔云云按此詔猶有過繁去二百餘字則愈嚴重延熙九年冬十一月大司馬蔣琬卒董允亦卒于是年蜀内外之政始壊十五年呉王孫權薨不書呉主書呉王耶恐字誤景耀元年宦人黃皓始專政皓專政五年而國亡六年紹良與艾相遇於雒縣注採王隱蜀記禪又遣尚書郎李虎送士民簿云云按蜀窮匱至此固難以支久矣評禮國君繼體至體理爲違介于二冦加之南中煽動必執踰年之禮非所以係屬人心鎭撫方夏也又國不置史至猶有未周焉呉蜀之主雖均曰傳然皆編年紀事于史家之例實亦紀也紀則災異當詳書而舊史闕其承傳是以作者用此自明非欲持此以詆毁葛相注華陽國志先帝亦言吾周旋陳元方鄭康成間陳元方鄭康成皆避地徐州而先主以建安元年領徐州牧其啟告以治亂之道在此時也先主穆皇后傳先主既定益州而孫夫人還呉注採漢晉春秋云云按此妄言先主定益州時諸葛公與張趙等泝流至蜀孫夫人還呉當在建安二十年爭荆州時諸葛亮傳好爲梁父吟蔡中郎琴頌云梁父悲吟周公越裳武鄉之志其有取于此乎今所傳之詞蓋非其作先主自葭萌還攻璋至成都平兵勢已合豈得中息若議公不當泝流合規者眞迂儒俗士也智能之士思得明君如張松法正之情固夙昔所畫亦未有逆拒不往者耳先主外出亮嘗鎭守成都足食足兵當先主時但寄以蕭何之任若嗣子可輔輔之如其不才君可自取注採孫盛云云按此堯舜之心非同詭僞封亮武鄉侯十道記武鄉谷在南鄭縣孔明受封之地然侍衛之臣不懈於内至可計日而待也以不懈于内任群司以忘身于外自効以修身正家納諫任人責難其主蓋此又興復之本也其眞王佐之才與伊訓說命相表裡者歟將軍向寵至優劣得所馳驅于外可以使貪使詐故魏延可任若宿衛之選必以信行爲本也向寵居攸之等之前者寵督中部掌宿衛兵蜀小或兼攝虎賁羽林之職亦其近于君者也故先言之於是以亮爲右將軍注漢晉春秋使孫策坐大遂并江東按下有脫文當是指斥孫權之語呉臣諱而削之注此表亮集所無出張儼黙記按趙雲以建興七年卒散闗之役乃在六年後人或据此疑此表爲僞非也以元遜傳觀之自明苐此表乃劇論時勢之盡非若發漢中時所陳得以激厲士衆不妨宣洩于外失之蜀而傳之呉或伯松冩留箱篋元遜鈎致之于身後耳集不載者益明武侯之慎非由陳氏之疏若趙雲傳七年字當爲六年雲本信臣宿將箕谷失利適由兵弱既貶雜號將軍以明法散闗之役使其尚在必别統萬衆使復所負而不聞再出其必殁于是冬之前矣十二年春亮悉大衆由斜谷出注引魏氏春秋云云按罰二十以上豈無參佐可以平之孔明雖蹇蹇夙夜不若是之不諳政體也亮遺命葬漢中定軍山葬漢中者欲後人嗣事于魏也蓋天命有歸不可以智力爭也上云人傑在其子孫之朝故耳歸之天命則仍夷之也孟軻有云以逸道使民至信矣上云不戢蓋對敵國之詞此又申明其眞王者之師也喬年二十五建興元年卒公北駐漢中在建興五年元字誤思逺之生即在建興五年也詳元字當作六伯松亦以轉運之勤死于王事闗羽傳先主斜趣漢津適與羽船相値共至夏口注採蜀記云云按蜀記語多淺妄恐不足信馬超傳聞先主圍劉璋于成都宻書請降賴得所歸不終名爲賊趙雲傳瓚遣先主爲田楷拒袁紹雲遂隨從爲先主主騎注雲别傳云云按本傳先主爲平原相時雲已隨從主騎别傳謂就袁紹雲見於鄴則在建安五年後此違反不可信者也成都既定以雲爲翊軍將軍注雲别傳云云按雲駁議甚忠正然經國之務有諸葛公在必得其當未應反待武臣駁議殆家傳掠羙耳其諫伐呉則又諸葛公所不能得之其主追思孝直恐散號列將非所及也别傳大抵依仿諸葛子瑜書及孫權稱尊號諸葛公不明絶其僭之義爲之軍退貶爲鎭軍將軍注雲别傳云云按諸葛賞罰之肅雲猶貶號其下安得濫賜又足以明其不然别傳類皆子孫溢羙之言故承祚不取龎統傳性好人倫勤於長養至使有志者自勵不亦可乎士元此論東漢之風流已耳欲興世教非務實不可也參取其意則足以資奬勸孔子曰如有所譽者其有所試矣有所試而誘之使竟其志勿徒以浮聲競煽斯得者多親待亞於諸葛亮遂與亮並爲軍師中郎將注九州春秋云云按以皇極幽昧漢祚將墜較其輕重則取璋不爲非法正傳璋既稽服先主以此薄靖不用也薄靖而不薄李嚴是先主之所見以其虛名無實用不爲大節亮又知先主雅愛信正故言如此注採孫盛云云按艱難之初權以濟事未宜以常道論也先主初定益州與晉君祖宗世守之國勢殊且諸葛公方以審配不容許攸爲鍳也今策淵郃才畧至時不可失也孝直智術不下公瑾且猶知尊奬王室非碌碌程郭惟思攀附孟徳者也許靖傳進退天下之士沙汰穢濁顯㧞幽滯此靖所以名盛一時靖收恤親里至莫不嘆息文休與子魚景興人物相等使處太平猶不失公望也正禮師退術兵前進術兵即孫策也復相扶持前到此郡至豈可具陳哉注臣松之云云按袁術僭盗策爲其部曲文休避地未可厚非文休雖曰覊客然名滿八區誠畏爲袁氏僞命所汙當時誰能預計伯符絶術厥後兄弟相繼開呉鼎立哉即于季玉非有君臣之分慕仰宗傑希欲歸命亦與臨難邀利殊科論者原其本末可也建安十六年轉在蜀郡注採山陽公載記云云按斯時稍覺悟操之將簒非復歸死國家故意故應優于劉子初也靖雖年逾七十至丞相諸葛亮皆爲之拜文休一生不逾漢末名士風格求之以知幾望之以匡世誠所不暇若以諸葛公所敬而輕相毁詆亦安國輩之不自量也簡雍傳性簡傲跌宕至自縱適視恃舊不䖍見誅者度量相越是以當困厄而士歸之者多也秦宓傳仲舒之徒不逹封禪相如制其禮相如雖爲封禪書臨殁乃成未與諸儒共定其禮蜀士多誇往往過實參伐則益州分野漢書地理志蜀系秦分統于輿鬼東井參伐乃魏地星也此云參伐則益州分野未詳評然專對有餘文藻壯羙可謂一時之才士矣承祚此書大趣簡質而獨推秦子勅之文藻異于諸傳斯則文無定體之謂耶董和傳先主定蜀至並署左將軍大司馬府事董和並署李嚴並托皆所以慰蜀士大夫之心特幼宰端良正方傾邪耳若使黃公衡不因喪敗隔絶則受遺當屬斯人不傷昭烈之明矣劉巴傳俄而先主定益州巴辭謝罪負先主不責昭烈初定蜀土人懐反側其加意于子初即高帝之封雍齒也而諸葛孔明數稱薦之注採零陵先賢傳亮亦曰運籌於帷幄之中吾不如子初逺矣按子初粗有筆耳此助而張之造作劉葛之語也注初攻劉璋至府庫充實必無此事錢至直百豈復可以通行初得一州公私囂然是五均之續也以張益徳傳中頒賜之差觀之則聽其赴藏競取亦不然矣董允傳以允秉心公亮至則戮允等以彰其慢此疏已載孔明本傳則休昭及向寵傳中可勿重出允遷爲侍中領虎賁中郎將至備員而已既任宫省兼統宿衛孔明蓋用周公立政之言治内也和順與公亮者相參並在左右則劑之使平徐以養成君徳無暌否之憂矣蜀人無不追思允注臣松之云云按允事闗蜀存亡故與和傳别出劉封傳以封爲副軍中郎將副軍之名失之尊寵太過是以事當愼始諸葛亮慮封剛猛至使自裁先主無他枝葉後嗣庸弱封地處疑偪又嘗將兵一朝作難則禍生肘腋國祚方危故不得不因其罪速㫁也後代如潞王從珂事可相參爲鍳恨不用孟子度之言注逹子興爲議督軍按此則孟逹家且不誅况黃公衡乎其不承信郭冲之言不虛也彭羕傳如永年者自可不爲立傳廖立傳昔先主不取漢中至徒失一方此實前事之失亦當參取觀之當吕蒙襲奪三郡即與呉追好棄惡先收漢中以圖闗隴于時生齒殷盛錄其客戸爲兵聲勢十倍也亮表立曰至於是廢立爲民方受託付主少國疑不得不廢立以懲不恪非度之未宏也李嚴傳李嚴所以並當大任者既蜀土故臣宜加奬慰又南陽人諸葛公僑客兹郡有鄉黨之分必能協規荆土歸操嚴獨西奔似有志操理民治戎幹畧亦優是故取之然自其歸降即領郡于外不共帷幄何由得其腹心昭烈用人必由試可嚴特未試之于左右周旋歴年所以猶有失也章武二年先主徵嚴詣永安宫至留鎭永安武帝失之于宏羊昭烈失之于李嚴人固難知而權位相逼猜嫌易構亦事勢之常矣部分如流趣舍罔滯正方性也使正方胸無鱗甲則文偉匹也注採諸葛亮集雖十命可受况於九耶孔明㳟遜十命之語未必出自其口諸葛氏集當以承祚叙錄者爲正平遣參軍狐忠狐忠即馬忠注採亮公文上尚書行前監軍征南將軍臣劉巴此别劉巴非子初乃廢平爲民注引諸葛亮與平子豐教云云按平既見廢豐猶在留府非公之公忠無此量也劉琰傳又悉教誦讀魯靈光殿賦誦靈光者以宗姓隨從惟琰一人也本出魯國文考此賦自負若爲己作又于侈靡中炫其風流耳魏延傳當得重將以鎮漢川至一軍盡驚㧞延而益徳不見望非君臣相信之深何以能然平叱延先登曰至軍皆散丞相之澤數十年追思不忘况此日乎順逆一明則延雖善養士卒一叱即散矣楊儀傳往者丞相亡沒之際至令人追悔不可復及何乃無賴自棄至此然公琰亦有以致之稍崇其祿位以答前勞不亦優乎自審不能駕馭唯勿寄以重任可耳向朗傳亮卒後徙左將軍朗爲左將軍時行丞相事見後主張皇后冊文中自去長史優游無事垂二十年二十年之功何書不可讀朗去長史已六十餘老而好學正吾儕過時者所宜師法也雖公淵之口終能以凡俗批詆邪寵弟充歴射聲校尉尚書注襄陽記云云按此語即漢晉春秋之所由作也孫盛語已見魏書三少帝紀此重出張裔傳丞相亮以爲參軍至領留府長史既重裔幹理亦不欲但用公琰文偉署府事一府皆楚人失蜀士心也人自敬丞相長史男子張君嗣附之疲倦欲死語頗輕薄然深悟此理即無死權之愚也豈惟長史即貴極公侯亦猶是耳戀慕外物薾然疲役不無謂乎少與犍爲楊恭友善至行義甚至行義如此故諸葛公以貞亮死節並許之不緣季休之言遂與威公一視費詩傳隆崇於漢室室當作升黃忠字也御覧作漢叔叔字草書似升字耳由是忤指左遷部永昌從事費詩左遷雍茂見殺固由不宏亦其暮氣杜瓊傳周緣瓊言乃觸類而長之曰至意者甚於穆侯靈帝之名子君子好仇豈怨耦之謂師服已屬傅會後人不必恃此自喜爲知㣲也宋明帝之多諱皆譙叟輩啟之何闗治亂興亡乎許慈傳善鄭氏學治易尚書三禮毛詩論語鄭氏尚書注今與易皆僅存于正義中乃鳩合典籍沙汰衆學此荀文若曾與孟徳言而不暇行者稍遷至大長秋卒大長秋用通經之士爲之則可以修周官内宰之職注孫盛曰蜀少人士故慈潛等並見載述按仁篤通大經四小經三即在中土亦烏可無述來敏傳爲虎賁中郎將丞相亮住漢中請爲軍祭酒請敏軍職而以董允領宿衛此楊洪勸留向朗之意故敏言奪我榮資也尹黙傳自劉歆條例鄭衆賈逵父子陳元方服䖍注說咸畧誦述傳寫之譌衍一方字按後漢書陳元字長孫父欽習左氏春秋事黎陽賈護與劉歆同時而别自名家元少傳父業爲之訓詁與范升爭立左氏學李譔傳從司馬徽宋忠等學司馬二人于前思潛傳則稱字欽仲傳則稱名似疎譙周傳時後主頗出游觀增廣聲樂延熙元年立子璿爲皇太子至八年冬蔣琬始卒然則自琬之存後主已荒縱矣故傳于建興十四年大書至湔㸔汶水旬日而還識其不恤國事盤游于外自此始也傷大臣不能正書以示譏後不書者不可諫則不足譏也若至南方外當拒敵至誠恐邳彤之言復信于今此所料皆是奔南亦歸于亡不若以此勸之死守君臣共殉社稷不亦爲四百年之光乎邳彤之言世祖從之以破邯鄲豈從之以降王郎何周之昧于義而愚于術必使其主蹈軹道之轍也若遂適南勢窮乃服其禍必深此則不然但爲張魯之入巴則再辱耳於是遂從周策至周之謀也從周之謀則蜀人免屠戮之慘故鄉邦韙之非萬世公議也注孫盛云云按指畫實自了了從來轉亡爲存因敗爲功茍有可資務盡人事則事機俄返此非書生事外作好語也然而能爲此者必其君之有志者也公嗣非所及也時群臣但以恐不受降爲難則退次東鄙亦無可俱逹之臣矣周長子熙熙子秀字元彥元彥之去承祚逺矣此十字皆裴注之文評注採張璠云云張璠識陋旨迂注家何以取諸黃權傳權閉城堅守至先主假權偏軍先主奬㧞公衡故霍弋羅憲皆不失事君之禮景初三年蜀延熙二年權遷車騎將軍儀同三司注採蜀記云云按凡取精多用物宏者皆應天象太白入太㣲中而漢兵誅莽不害爲僭盗也公衡一時遜詞耳宋書天文志云按三國史並無熒惑守心之文黃初六年五月十六日壬戌熒惑入太㣲至二十七日癸酉乃出宜是入太㣲崇帥厲軍士期於必死臨陣見殺崇死國此劉葛推誠之效也李恢傳後軍還南夷復叛殺害守將觀此傳及馬忠張嶷二傳中皆有南夷復反事蓋雖諸葛公猶不能要其終不反也蔣琬傳琬曰吾實不如前人無可推也自反必期于當理此伊傅之心非獨寛厚而衆論咸謂如不克㨗還路甚難非長策也此即黃公衡所諫先主者衆論不爲非也以凉州胡塞之要至赴之不難按蜀本僻在一隅必圖闗中則義聲可以震動天下若能克敵則洛陽皆有劻勷之勢今入羌圖隴借使挫之未爲壊其心腹中原念舊者漸無所繫屬矣昔三郡常反應王師而丞相不速行赴利蓋不欲舉我之全力顧用于彼之偏師魏延入羌蓋聊欲掩其不備㫁賊右臂仍不階此爲進取雖勝敵而不再往也維先琬繼所規則小矣雜耕跨渭遺蹟未逺若之何計止于畧民廣境與東呉之士共矜邊角之勢也哉雖然君子猶有取焉異乎蹈丞相所料坐而待亡者也費禕傳孫權性既滑稽嘲啁無方仲謀氣象無異子桓雖昭烈猶不免以諸毛遶涿取侮豈漢末風氣使然辛有百年之歎亦㣲見魄兆耶姜維傳維自以練西方風俗至與其兵不過萬人欲㫁隴則當及曹爽初誅衆志二三未遑外事之時文偉身駐漢川以牽闗中之救伯約以萬衆招誘羌胡披割西鄙過相裁制又失事機元遜輕舉于東文偉坐待于西皆若天之假助典午以成其奸者可長太息大破魏雍州刺史王經於洮西此功若在秦川不亦偉哉呉殷禮言於仲謀曰民疲威消時往力竭不能不相爲惜此小用也與鎭西大將軍胡濟期會上邽此胡濟又一人非胡偉度鄧艾亦自隴右皆軍于長城鄧艾得自隴右赴闗中之急故丞相以間擊破費郭也六年維表後主至啟後主寢其事而群臣不知此宻表而不闗尚書故思逺不能力爭伯約不貽思逺書言其事者當以素非同心故耶因將維等詣成都自稱益州牧以叛注臣松之以爲殺㑹復蜀不爲難矣按殺會易復蜀難華陽國志載王崇論曰維徒能謀一㑹不慮窮兵十萬難爲制御評然猶未盡治小之宜至而可屢擾乎哉此皆承祚在晉之遜詞裴注駁之或未喻其旨也宫中府中理民治戎立國一不可闕今伯約孤立後主昬蔽其本已揺加之政刑非昔不能使民忘其敗上邽之役甚于街亭伯約但知前人裁制之過不知失文偉之助亦不復可以有爲此誠志士爲之深悲者也蜀事以葛始以姜終十卷實相首尾其末卷則特爲楊戱之贊而設也蜀都賦云匪葛匪姜疇能是恤宗預傳蜀聞之亦益永安之守以防非常永安益守則圖闗中者力又减矣此劉葛所以優與呉盟然斯時公琰未有逺名于事勢宜然楊戯傳維外寛内忌意不能堪伯約于此不及公琰逺矣戱以延熙四年著季漢輔臣贊其所頌述今多載于蜀書是以記之於左承祚身入晉室奉命修史彼自謂三禪相承同符舜禹不得不以魏爲正乃于蜀書之末記文然之贊假託網羅散軼隂著中漢季漢皇統斯在躋蜀于曹氏之上大書贊昭烈皇帝則已之所述曰先主傳者明其遜詞實以文然所贊代已序傳也張茂先能譚史漢而爲承祚所面欺千載以下吾猶取其區區乃心辨正閏戀眞舊也其戲之所贊而今不作傳者余皆注疏本末於其詞下注中凡引他書者皆裴注卷末所採益部耆舊雜記載王嗣常播衛繼三人亦然縻芳士仁郝普潘濬四子叛臣故獨書名傷天下三分不歸一統始於荆州失闗侯敗故以三叛人終之并及郝普者吕蒙襲奪南三郡荆呉之釁所由成也畧孟逹而專言此意有所寓矣闗羽傳作傅士仁而贊止曰士仁則其人姓士傅字衍也評楊戲商畧意在不群意在不群承祚自譽信乎其不群也義門讀書記卷二十七

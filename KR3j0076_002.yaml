body:
  text: 義門讀書記卷二翰林院侍讀學士何焯撰中庸中庸全旨朱子云中庸當作六節看首章是一節説中和自君子中庸以下十二章是一節説中庸君子之道費而隱以下八章是一節説費隱哀公問政以下七章是一節説誠大哉聖人之道以下六章是一節説大德小德末章是一節復申首章之義第一章第一節天命之謂性私箋云注兼人物然只以人為主與誠者自成皆不必兼物按誠者自成可不兼物蓋成物之物亦人也此處不兼物説則末節注中天地萬物本吾一體句無根矣率性之謂道朱子云此率字不是用力字按未有不離道工夫只是言道之本然故章句亦云人物各循其性之自然修道之謂教注中所當行三字承第二句所固有承第一句修之則於道無復乖戾於性亦無復昏蔽錯雜矣雙承上文即涵下致中致和根脈注天以陰陽五行至所謂性也陰陽五行是氣健順五常是理第二節安溪先生云上節是在性上做功夫而本文却就道字説起故注云日用事物當然之理先解釋道字接云皆性之德而具於心便已引歸到性上又曰無物不有不是指道之散在事物者乃緊頂性之德而具于心一句言無不有是性也無物不有是性而性體無時不存此所以不可放肆而離之也自大全小注以來解説多錯遂使日用事物當然之理及無物不有兩句皆成剩語矣道也者不可須臾離也不可者人不可離道也不然只是離不脫耳楊氏以飢食渴飲夏葛冬裘講不可離不幾似異學所云作用是性乎君子戒慎乎其所不睹二句須看注中存天理之本然句非寂守也欲使具于心者清明昭著不至于昏則天命之本體常存有以為酬酢萬變之本爾故或問亦云瞭然心目之間常若見其不可離者不當疑其説成睹乎其所不睹聞乎其所不聞也此節或問之語實與太極圖解中惟人得其秀而最靈二節相為表裏或問云學者當無須臾毫忽之不謹而周防之以全其本然之體也按此二句則該貫覩聞而言之矣曰周防則是該乎動靜而慎獨則尤遏乎人欲之初萌也慎獨固方動之時而遂以戒慎恐懼二句為主靜則愚所不解也圖説曰主靜立人極非偏於靜也靜中涵得動之理及動而止其所這靜的道又常在故定性書又云靜亦定動亦定注無物不有按言無不有是性也第三節其所以一念之萌而知之若是其審者亦由平日養之已熟慎獨是義以方外事貴於博學問辨可見致和中自有知底工夫集義少不得精義一段事也不然大學首一章推本於致知格物為大學始教何緣中庸開卷第一章不及致知一段工夫注不曰幽獨之中而曰人所不知己獨知之者以應物之處言也第四節不曰仁義禮智而曰喜怒哀樂者性皆善而情易流也末節前是下學此是上逹致字只是涵養純熟使無一息間斷之意工夫固不外上二節也注中兩無少二字極重注戒懼二字指睹聞至靜之中指不睹聞謹獨二字指隱微應物之處指見顯四句皆上二節事不得誤看至于二字作致字注腳總注首明道之本原四句按道也者三句鄭氏自為一節惟章句尋求兩故字語脈截分二節總注則尚與先儒節解略同蓋亦未及修改之故以去夫外誘之私二句按不可分屬第二章第二節時中從來作圓通識變講看來宜照忌憚二字為妙靜時有忌憚則戒慎恐懼而靜得中之體動時有忌憚則必慎其獨而動得中之用靜亦中動亦中此之謂隨時處中此之謂無時不中戒慎恐懼即是忌憚無戒懼工夫靜時不能合無偏無倚之中動時不能合無過不及之中故小人反中庸第四章首節舉氣稟之失即可見世教之衰使教化隆盛則民自皆變化氣質而協于中矣第二節詩曰民之質矣日用飲食言飲食見道在日用平常之事不著不察人預有責焉非獨世教之衰也第六章或問以好問二句對非知之過執兩端二句對非愚者之不及然由不明故不行知愚各有之若舜之無遺善而人無不樂告以善是無所不知又知之不過也執兩端以取中則擇之審用中於民則行之至是既知所以行而又不以為不足行也兩截皆兼知愚説為密所引孔子語或非一時之言不容于口氣中牽綴上章字面然必意思相對使明行次第確然可尋乃盡文斷意屬脈絡相承之序注淺近之言猶必察焉按邇言內仍當雙頂好問好察則下隱揚句方可從言字一脈相承第七章不知辟是不知辟禍之理欲以知免而反入禍也第八章顔子天資純粹既不刻意尚行驚世駭俗能行所不必行若賢者之過中而以為不足知又不卑汚茍賤不能行君子所當行若不肖者之不及乎中而不求所以知此其所由得為真知而能擇能守中庸之道以明也第九章無一毫人欲之私方是仁熟義精處第十二章第二節從夫婦與知與能説起正以救索隱之弊朱子自謂初見延平説得無限道理也曾去學禪李先生云公恁地懸空理會得許多道理而面前事却理會不下道亦無他元妙只在日用間著實做工夫處便自見得可以會經文立言之意與知與能之道皆日用常行而不可忽者正極切近下手處不可因愚不肖看作卑淺沒要緊事與知與能蓋即良知良能凡日用倫常之事皆是不可泥居室二字至下文造端句亦蔓引詩始關雎等語此章皆就極小處形容出道之費來語大語小四句語氣不平大小只是一個道自語之時各有大小耳如孝一也自其小言之則冬溫夏淸昏定晨省莫非道也自其大言之則通於神明光于四海又莫非道也聖人所不知不能以龜山所解堯舜之道孝弟而已矣二句求之自可見朱子亦有謂侯氏説得亦粗一條在語類首章説戒懼條內第三節此節明雖細如鳶魚而道著于是也可謂費矣承上語小而起下造端夫婦之意也説一察字正以破除隱字見得索隱於費外者非也既以費隱發端似宜兼説到隱而不言隱者費外無隱也安溪先生問陸稼書前輩文謂飛躍即是道是否陸云飛躍是氣其飛躍之是處乃是道先生請舉一端言之陸云色斯舉矣翔而後集道之即飛躍而在者也若自投羅網背乎道矣先生賞其的當雖鳶魚也不離陰陽匹偶之理這便是道若泥飛躍著解則是以知覺運動為性矣二條楊賓實所記無性外之物知得遍滿逼塞有是氣即莫非是所性之理便須盡己之性由是以盡人之性盡物之性矣故程子曰喫緊為人十三章伐柯節是一人自觀忠恕節是兩人對觀道四節是三人參觀首節非所當知所當行而造為虛偽之説則不忠非所能知所能行而強為怪異之行則不恕注固衆人之所能知能行者也按此承上節與知與能來第二節注即以其人之道還治其人之身安溪先生謂不如云即以其人之心治之使盡其人之道更明切治人者正為使之盡道而以人治人則以其有自具之性故也第三節善推其所為者存乎恕預養其誠者存乎忠第四節吾所求乎子之事我者即以此心事父下倣此子臣弟友即是人字所求即言也以事即行也庸言至微也庸行至細也一脫口而不敢涉於易一措足而不敢避於難此古人敬威儀矜細行之事主敬之功存誠之學也故曰慥慥大凡小節小事乃大德大間之本小者克盡則大者不患其不能推矣充其無易乎言之心即恕己量物之心也充其必勉於行之心即自責自修之心也有是厚重篤實之基則推之於人倫之間以行其恕而道在是矣先儒忠恕形影之喻蓋謂此也茍非存誠養忠之有素雖欲強恕於施受之頃而有所不能矣慥慥即所謂忠也對高逺難行説總注道不逺人者至皆費也以此解上章即無汗漫之弊而君子之道皆貼率性之謂矣十四章首節外字即下命字第二節富貴四項逐層自易以及難無入不自得照下不怨尤看并有失而反求亦包在內蓋自得者自得其性分也非但自適之謂乙未侍先生偶言莊生齊物只是不知此章義理先生曰莊生是將富貴作貧賤貧賤作富貴看却漏了行乎二字即如處患難便該要動心忍性有多少事在不容恁地滚過去第三節正己而不求于人是就上章責己推進一層正己者自修之極功也到能盡其性方可謂之正己下學上逹知我其天自不求于人矣十五章首節卑邇是小髙逺是大此章是前後過文只重在兩自字十六章安溪云鬼神非理非氣而在理氣之間在人則心之神明是已程張所謂天地造物陰陽二氣者是這箇本文所謂祭祀如在者亦只是這箇體於人心為人心之鬼神亦即是這箇首節鬼神是氣之精英鄭康成曰陰陽之神曰精氣情性之神曰魂魄鬼神者神之運于氣者也故注兼性情功效言之第二節夔孫問此章以太極圖言是所謂妙合而凝也曰立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義便是體物而不可遺第三節林一之問萬物皆有鬼神何故只於祭祀言之曰以人具是理故於人言按此語極緊要此章仍當以人為主體物而不可遺者實理齋明盛服而不可射者實心也末節鬼神雖兼聚散屈伸然體物不遺則其聚也神之格思則其伸也顯字却在聚而伸處見其微也可以謂之散而屈而不可謂之無此理張子正蒙言之詳矣其以鬼為屈以神為伸者又就二物分别字義如此耳實則鬼神皆有屈伸也説本安溪十七章安溪云人必和妻子宜兄弟而後可以順父母盡人倫而後可以格鬼神此上數章相承之意齋明盛服以承祭祀則有如在來格之感矣所謂有其誠則有其神未能事人焉能事鬼是也修德格天理不過如是但上數章言其理而此下則實以聖人故自大舜文武周公皆盡孝弟以至於諴神動天饗先饗帝者即上順父母格鬼神之實事也按此數章血脈無不貫通又云仁為五常之本而孝又為仁之本然則孝是德之本修德者必先孝是孝乃德中事然必修德之盡乃能完孝之量而可以名孝則德又是孝中事矣二義相為首尾大德不至格天不足以言大孝然而舜德之大又豈有大于孝者乎第四節宜民宜人此句不可作引證落空説必能仁民愛物乃極乎孝之量也末節注受命者受天命為天子也按受命不但為天子雖一命之士但簡在帝心為法于天下可傳于後世者皆是十八章第三節斯禮也指上祀下文祭以大夫即上祀之意祭以士是陪説喪之逹又以證祭之不可以不逹也三年句不即指父母先儒論之甚詳朱子語類中則以為獨指父母十九章第二節注通于上下者言之按此故祖廟兼舉諸侯以下乃與上章追王以下意相似第三節此節是從將祭説起祖廟謂太祖之廟非通論七廟之制四時之祭亦於太祖之廟行禮宗器兼先世寶器與庸器言時食在庖人為共祭祀之好羞注引禽獻於祭為踈鬼神不貴褻味不言煎和也第四節此節是詳祭時之事因及助祭之人燕毛句則以類而畢舉之也注中只説左昭右穆不説南昭北穆則兩節相承説至末節中始推而及之於大禘也宗廟之次按次乃廟制之次子孫亦以為序按亦字上先補羣廟之主有事於太廟按太廟即上祖廟相維辟公卿大夫在天子之廟則內謂侯也林次崖謂依儀禮旅酬只是兄弟之子舉觶于其長長兄弟則舉其觶以酬賔無賔子弟舉觶于其長之文賔弟子舉觶于其長乃是下文無算爵之事不知朱子如何引來解曩嘗論此説似細而實泥特牲饋食經文詳故逐節區分中庸經文略則言旅酬便統下無算爵蓋必兼賔弟子之舉觶於其長於下文逮賤之義乃備朱子此句本之康成康成又即引特牲饋食之禮豈肯漫下賔弟子三字乎第五節此節是主祭之人私箋云第二節注言以所制祭祀之禮通於上下者言之觀廟制天子七諸侯五大夫三適士二官師一可見自天子逹乎大夫士皆同此二節之行事矣踐位一節即以證上諸色人各踐其位云云尤自快暢而注又専指先王則似獨此一節單指天子言矣何以云結上文兩節乎按雖通上下而文義以武周為主故云末節安溪先生云人物之生固分形而異氣矣然而祖宗一本者也天地同體者也知父而不知祖者飛鳥是也知人而不知天者衆庶是也明所本而知天則乾坤父母也民物兄弟朋類也舉五倫而措之其於天下也殆亦如示掌之近而易易乎撮其大意樂樂其所生禮不忘其本故制禮樂者必極於郊社禘嘗也知其義則萬民庶物本吾一體不可得而間則父母宗子之責自不可得而辭於治國又何有哉二十章因説人存政舉歸到明善誠身誠為一篇樞紐天道人道又下數章根原第六節知人句王守溪文用一助字極妥不可泥注中欲字必字説成尊賢為親親之本顛本末之序第七節有父子而後有君臣而逹道先言君臣者對君之辭也第九節困勉尚是中人此則因哀公遜謝故復示以中人以下入德之門中人以下即末節所謂愚柔也此説吾所創然新而不穩學莫先于立志知恥即立志之謂第十節治人句猶大學之論治國在道理上説下句猶大學之平天下在經制上説第十一節上文修身修道首言親親而及尊賢此先言尊賢者敷政之序也注柔逺人所謂毋忘賓旅者也按此賓客非朝聘之人此九經之序也私箋云序不重按觀下節是逐層推開則此序字如何不重第十二節修身則道立上老老而民興孝所謂道立也注不惑謂不疑於理按理即修身事親之理要説得細第十三節非禮不動九經主於立政此只莊涖動禮之事繼絶世至厚往而薄來繼絶舉廢當請命于天子而行之治亂持危則修方伯連率之職哀公所當自行也繼絶則其國尚在但使之無君而有君其事較易故先言之亂則禍在一國之中易於整頓危則或將并於強大或地當水患非治亂可比先後次第皆非漫然者四者皆使諸侯得保其舊安其常而後徐講於邦交之典也亂則君臣相獄父子相獄幾殄厥世矣危則侵削日滋息肩無所幾亡其國矣四項又相承也第十五節此節正是結束上文豫者先知其理之實而素定之即下節明善之根末節所謂明者即後之至誠如神所謂強者即後之至誠無息須透入誠字方能挽歸所以行之者一來脈總注明其所傳之一致舉而措之亦猶是耳讀以下十三章當以此言思之則于考諸三王而不謬等句無滯礙矣二十一章此明誠二字即從上章明善誠身來二十二章贊天地之化育則至命也吾之性本自化育中來注巨細精粗四字直從十二章語大語小發脈注在二十七章洋洋乎二節尊德性一節知無不明句頂上察之處無不當句頂上由之二十三章致曲有誠對至誠形著明對己之性盡動變化對人物之性盡或曰變與化何别程子曰變如物方變而未化化則更無舊迹自然之謂也二十四章理之先見處便是鬼神發見流行之實以實心而知其實理故曰如神此神字非如曺人夢衆君子謀於社之謂也吕氏曰誠一於理無所間雜則天地人物古今後世融徹洞逹一體而已興亡之兆猶心之有思慮如有萌焉無不前知蓋有方所即有彼此先後之别既無方所彼即此也先即後也未嘗分别隔礙自然逹乎神明非特前知而已二十五章安溪先生謂此章書義淺説最清楚首節此節是從源頭上説下見人當立誠以盡行道之責誠者自成句雖天地萬物無所不該然不可説得泛了去須以人作主乃喝得下節誠之為貴起大全所載俱是槩論道理若作文則當顧口氣血脈也明道曰至誠事親則成人子至誠事君則成人臣四句中便包得道之在我者亦無不行意第三節亦只須用此意一貫講去末節智即誠之明處外內猶言己物道理一有內外之殊豈能自然及物所以成不獨成惟其出於所性之固有也時措之宜正申明自然處而其用功在盡性者既得於已領一誠字便一以貫之二十六章首節誠者物之終始不誠無物故不可一息間斷君子誠之則自始至終更無間斷舜五十而慕乃是誠於孝第三第四節悠遠博厚高明注云以其驗于外者言之蓋就一身發見處説所謂盛德之光輝也如其次致曲節所云形著明皆就一身言之講家多説入政治風俗上以井田學校禮樂文章填實説殊覺語無倫次至講博厚所以載物節覺所以二字難通便云博厚即其載物處也於文義亦欠安穩不知以下文天地對照觀之為物不二對至誠無息是一層博厚髙明悠久對至誠之徴是一層生物對至誠之覆物載物成物是一層節次本是分明天地之博厚髙明悠久乃由不二而發見者如此惟其博厚髙明悠久故有生物之功天地之覆載成物乃是天地博厚髙明悠久之驗也博厚髙明悠久與載物覆物成物堯舜孔子皆然不必専以有天下為天子者説第四節先言悠逺而後博厚髙明者至誠不息故驗於外有悠逺之象博厚配地髙明配天則宜先言髙明而後言博厚乃先博厚於髙明者蓋髙以卑為基凡誠之形於外必先覺其有與物同體氣象是博厚也於博厚中又覺其超乎萬物之上是髙明也載覆成合大小言之方與今夫天節相對此只是過化存神之意時文家用學校農桑等語與不見而章節背須體味所以二字言其德可以載物覆物成物爾先生謂有是德則有是業雖未見之事功而規模亦已具矣第七節張長史云其為物不二天地之性一於生物也朱子曰天地别無勾當只是以生物為心程子屢云天只是以生為道第九節昭昭之多是小者及其以下是大者注中十二章句乃實理血脈處非假以指點文法下章大小根源亦即在此兩層合來乃見不測非及其以下乃不測也日月星辰華嶽河海即是無窮廣厚之實不在生物內此天地之所以為體也故注中云以其全體而言邵子觀物外篇云觀星而天體見矣觀山水而地體見矣郭象莊子注云天地者萬物之總名也天地以萬物為體此語殊有名理何以能覆能載總此一誠故也天地山水三層逐層吐出下節又收到天上此節書顧麟士所論極清楚見説約中可補先儒所未備注由其不二不息按此句在及其二字上以致盛大四字是及其句末節上文極言生物之盛此節恐是天地生物而厚於人天地生人而厚於聖人之意故下章即接云大哉聖人之道然前人未有如此道者未敢遂自信也在天為命在人為性此節明至誠無息者以其盡性也盡性則全盡天理無一點氣質用事故無二無雜成性存存而不已矣曰命曰德皆收在裏頭説張子所謂性與天道合一存乎誠二十七章第二第三節發育峻極是道之著于物理者禮儀威儀是道之見於人事者人事得其宜則萬物得其理矣禮儀威儀所以經緯乎萬物者也故下文議禮制度考文専言禮儀威儀之事徐壇長文講優優大哉句云自其委曲善入而無微不至也似不可謂之大也然其􅊏悉必周而取之不盡也得不謂之大哉第五節注凝聚也成也按聚是立大本成是四面湊合得成即包下存心致知兩事第六節存心固是根本然程子謂涵養須用敬進學則在致知惟聖人本末一貫自聖人而下其致功皆是博文約禮從散殊處精察力行逐一實踐以復其性方始不是一個空殼子輔漢卿所録優優大哉下一條云聖人將那廣大底收拾向實處來教人從實處做去老佛之學則説向髙逺處去都無工夫了聖人雖説本體如此及做時須事事著實如禮樂刑政文為制度觸處皆是體用動靜互換無端都無少許空闕處若於此有一毫之差則便于本體上有虧欠處最屬此章要義涵泳已知敦篤已能不獨不慮而知不學而能者為德性之知能凡由學問而成者亦莫非德性之知能也天下無性外之物問學皆所以復其德性所固有已知己能即為我德性中物矣未知未能則有藉于學問廣大是宅心髙明是立志溫故是涵養敦厚是持守末節朱子云大小精粗一齊理會過貫徹了後盛德之效自然如此二十八章第二第三節徐壇長文云議道自上必經緯人倫無所失而後簡器用謹書契則由大及小而不失其序風行於下必法度文章莫之悖而後重禮教敘彛倫則由粗及精而乃觀其成按二節經文必非無故為此錯綜窺尋到此可入義疏疑得之師門緒論也第二節注文書名按書名兼形聲言之管子君臣篇云兵戈一度書同名車同軌二十九章第三節三王後聖以往與來對言天地鬼神以隱與顯對言下節知天知人乃舉來以該往即隱以該顯實總結此四句建諸天地猶言天髙地下萬物散殊而禮行矣流而不息合同而化而樂興焉質諸鬼神猶言郊焉而天神格廟焉而神鬼饗若云象其屈伸往來仍舊是建諸天地矣第五節動而世為天下道三句當與見而民莫不敬一例動字且就動作威儀上説三十章首節注皆兼內外該本末而言也按內外本末即下大德小德末節川流即是逹道敦化即是大本惟仲尼能致中和故亦如天地之大也安溪先生云小德川流已發之和也大德敦化未發之中也所謂一以貫之忠恕而已者也三十一章自溥博而淵泉自淵泉而時出所謂小德川流也四時萬物之並育並行也自時出而淵泉自淵泉而溥博所謂大德敦化也天之所以為天也此章從內説向外故曰是小德之川流首節有臨不必専以有天下者言凡以上臨下皆臨也聲名洋溢莫不尊親堯舜孔子皆然仁義禮智渾然全體者謂之大本下章立天下之大本是也時出而為仁為義為禮為智則所謂發而皆中節者也非川流而何和以喜怒哀樂言而此云仁義禮智之德何也曰喜而中節則無喜也寬裕溫柔而已怒而中節云云四德之先又有聰明睿智何也曰水於五行獨兩德焉朔易之位子半之時前乎此者以藏萬物之用後乎此者以開萬物之基以故聖賢之言智者或後之或先之中庸此章則先之而又後之德可先而可後者道成始而成終也蓋聰明睿智者開先之哲所謂神以知來也所謂火日外光能散而施也文理密察者精義之極所謂知以藏往也所謂金水內光能翕而受也以是而終始乎四德孔子所以集大成而中於百步之外也易言元亨利貞於冬獨復其文曰貞固揚子言罔直蒙酋冥於水獨重其名罔冥其理皆由此爾生知之質是大底智主于合藏文理密察之智是從幹上又逐枝上生出主于分别第二節注充積于中按充積者大德之所敦也此二章道理皆交感互發第三節見言行皆發也莫不敬信悅則中節而和之至也末節配天逹天皆從前章譬如天地二節來天大無外而天下無性外之物至聖自明而誠為能盡性以盡人物之性故廣大如天也血氣當關合性字説三十二章此章從外説向內故曰是大德之敦化首節經綸出之時立本泉之淵知化溥博之原夫焉有所倚中之極也惟天下至誠為能盡其性五品之人倫乃其五性自然之用也不可誤看注中功用句為體用意説向外去若以首句為體中三句為用至誠為大德中三句為化不惟立本知化二句更説不去兩章分屬之旨亦無歸宿矣注以功用言者蓋經綸字知字皆就發用處見立本雖不可以發用言然便有千變萬化皆從此出意思是亦發用也無倚者以其渾然自一誠流出不失其未發之中也肫肫三句正是未發氣象功用之本而無倚之實處第二節上六字是未發氣象朱子云至聖一章説發見處至誠説存主處聖以德言誠則所以為德也以德而言則外人觀其表但見其如淵如天誠所以為德故自家裏面却真箇是其天其淵按此非特如之而已方解得出肫肫其仁只就至誠盡倫上見天下後世賴其分之合之非正意時文多倒説修道者有仁義禮知之四德而但曰其仁何也曰仁統乎四德也所謂修道以仁是也前章既以智始終四德而此又統以仁何也曰言明誠者智為主所以目之曰至聖也言誠明者仁為主所以目之曰至誠也然至聖之道則自溥博淵泉而出矣是即至誠之淵淵浩浩者也至誠之德則以聰明聖知而知矣是即至聖之聰明睿知者也夫然則誠明合矣中和一矣性命道教豈不同條共貫者哉三十三章尚絅一章自潛雖伏矣以下又自下學存養省察之事以推而極之聖人功化之盛其終乃明所性之妙出於天命而無聲臭之可言一一與首章相應首節先以為已知謹引其端總注云反求其本正首章總注中欲學者反求諸身而自得之意也陳定宇謂下文謹獨意已萌於此然幾者動之微善惡所由分當留在下節不疚無惡中正貼獨字此節只宜虛説知謹耳知微之顯與莫顯乎微不可滚作一事首節守溪文解溫而理理字云良知之别白天則之分明知逺之近三句逺之近盡物性始于盡人性盡人性始于盡己性也盡性又始于致曲也風之自化動變始于形著也微之顯惟有誠則漸而形著也逐層收向裏注尚絅故暗然衣錦故有日章之實須看兩故字惟其有惡著之心故收斂向裏外之亦無不暗也日章之本在內章字即誠之形著處惟其誠日積于內故內之英華不可遏於外也判然離而二之則非矣第五節或問云其曰不顯亦充尚絅之心以至其極耳不作豈不顯也講末節朱子答陸子靜書云上天之載無聲無臭是就有中説無無極而太極是就無中説有義門讀書記卷二
